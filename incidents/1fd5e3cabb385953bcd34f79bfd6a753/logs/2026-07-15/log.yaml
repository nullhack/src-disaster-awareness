log_date: '2026-07-15'
summary: A fast-moving wildfire in southern Spain's Almería province, starting around July 9-10, 2026, killed at least 13 people and left over 20 missing, many of them foreign nationals (including British and Belgian). The fire, which prompted evacuations of roughly 800 people, is suspected to have been ignited by a broken power line amid a severe summer heatwave. It is considered one of Spain's deadliest wildfires on record.
