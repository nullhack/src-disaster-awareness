title: Majority of 12 victims of Spain wildfires believed to be foreigners, officials say
body: Around 500 firefighters, backed by Spain's Military Emergency Unit, battled to contain the flames and search for victims. Around 800 people were evacuated, including nearly 200 to temporary shelters.
