title: Deadliest Spain wildfire in years kills at least 13 people near Los Gallardos
body: At least 13 people have died in one of the deadliest fires on record in Spain. "We are facing one of the fastest and most complex fires in recent times," Andalusian President Juanma Moreno said in a statement shortly after the fire started last Thursday.
