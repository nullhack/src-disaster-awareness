title: 6.3-magnitude earthquake reported on South Island of New Zealand
body: An earthquake measuring 6.3 on the Richter scale was reported north of Te Anau on the South Island of New Zealand on Thursday evening, prompting a tsunami warning from authorities. Earth Sciences New Zealand reported the strong quake at 9:14 p.
