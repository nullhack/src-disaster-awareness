title: Magnitude 5.9 earthquake rattles New Zealand's South Island, tsunami alert lifted
body: A magnitude 5.9 earthquake struck near the town of Te Anau in New Zealand's South Island, shaking buildings and prompting authorities to briefly issue a tsunami warning.
