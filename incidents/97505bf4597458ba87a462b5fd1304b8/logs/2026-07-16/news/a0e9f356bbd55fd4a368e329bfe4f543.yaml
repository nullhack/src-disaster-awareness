title: Earthquake of magnitude 5.9 jolts New Zealand, tsunami advisory issued - India TV News
body: The epicentre of the earthquake was reported to be near Te Anau town of New Zealand. The country's National Emergency Management Agency said it has issued a tsunami warning for the coastal areas.
