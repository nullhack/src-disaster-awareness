  Title: Cholera - Angola
  Epidemiology: <p>Cholera is an acute diarrheal infection&nbsp;caused by consuming food or water contaminated with the bacterium <em>Vibrio cholerae</em>. It is primarily associated with poor sanitation and limited access to safe water. The disease can cause severe acute watery diarrhea, resulting in significant morbidity and mortality. The speed of spread depends on exposure levels, population vulnerability, and environmental conditions. Cholera affects both children and adults and can be fatal if left untreated.</p><p>The incubation period ranges from 12 hours to five days after consuming contaminated food or water. While most infected individuals remain asymptomatic, they can still shed the bacteria in feces for up to 10 days, potentially spreading the infection to others. Among symptomatic cases, most experience mild to moderate illness, while a smaller proportion develop severe diarrhea and vomiting, which can lead to life-threatening dehydration. However, cholera is highly treatable,
    with most cases successfully managed through prompt administration of Oral Rehydration Solution (ORS).</p><p>Humanitarian crises and natural disasters, such as floods, heighten the risk of cholera transmission by disrupting water and sanitation systems and forcing populations into overcrowded, unsanitary conditions. Controlling cholera outbreaks requires a multisectoral approach, combining surveillance, WASH (water, sanitation, and hygiene) interventions, social mobilization, adequate case management, and oral cholera vaccination.</p><p>Angola has faced recurrent cholera outbreaks since the 1970s, with major surges in&nbsp;1987&nbsp;(16 000 cases, 1460 deaths) and&nbsp;2006&nbsp;(over 67 000 cases, 2700 deaths). After annual outbreaks from&nbsp;1987 to 1996, cholera re-emerged in&nbsp;2006&nbsp;following a decade-long absence. Since then, periodic outbreaks&mdash;often linked to cholera activity in the adjacent&nbsp;Democratic Republic of the Congo,&nbsp;and worsened by poor water and
    sanitation&mdash;have occurred, notably in&nbsp;2011&ndash;2013&nbsp;and&nbsp;2016&ndash;2018, with peaks during the rainy season​.</p><p>Since 2021, there has been an increase in cholera cases and their geographical spread globally. Between 1 January and 23 March 2025, a total of 93 172 cases and 1197 deaths were reported across 24 countries spanning three WHO regions, with the African Region recording the highest numbers (55 622 cases from 18 countries).</p>
  Advice: <div>A multi-pronged approach is essential to combat cholera and reduce mortality. The key measures to address cholera include strengthening surveillance systems, improving water supply, sanitation, and hygiene, promoting risk communication and community engagement, providing effective treatment, and using OCV. Countries affected by cholera are encouraged to enhance their national preparedness and surveillance capabilities to rapidly detect and respond to potential outbreaks.</div><div><p>WHO emphasizes the importance of timely and proper case management, ensuring access to safe drinking water, and improving sanitation infrastructure. Effective infection prevention and control measures are critical to reducing transmission of cholera and other pathogens that can cause health care-associated infections in facilities caring for patients with cholera. WHO recommends risk communication and community engagement interventions to build trust and empower communities with evidence-based
    information, enabling them to make informed decisions to protect their health.</p><p><span style="background-color:initial;color:#333333;font-family:var(--kendo-font-family, inherit);font-size:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Promoting preventive hygiene practices and food safety in communities is one of the most effective strategies to control cholera. Public health risk communication is vital to ensure that communities understand the importance of hygiene, safe food practices, and the use of oral rehydration solutions (ORS). Rapid access to ORS is essential, especially in rural areas where larger health centers may not be easily accessible. Educating communities on how to prepare ORS at home, along with emphasizing the importance of staying hydrated while seeking medical care, can significantly reduce the risk of severe outcomes. With timely care, the case fatality rate can be kept below 1%.</span></p></div><div>Long-term
    measures, such as improving water and sanitation infrastructure in cholera-prone areas, are critical for preventing cholera and other waterborne diseases. Sustainable solutions for clean water, sanitation, and hygiene are not only crucial for controlling cholera but also contribute to broader public health goals such as poverty reduction and education. Community involvement in planning and implementing these solutions is key to ensuring long-term success.</div><div><p>OCV campaigns are an important tool for controlling cholera outbreaks. When used alongside improvements in water and sanitation, OCV can help prevent the spread of cholera, particularly in high-risk areas. Strong risk communication efforts are needed to manage vaccine demand, inform communities about vaccine schedules, and build trust regarding the vaccine&rsquo;s safety and efficacy.</p><p><span style="background-color:initial;color:#333333;font-family:var(--kendo-font-family, inherit);font-size:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">WHO
    recommends that countries strengthen surveillance, particularly at the community level, for early detection of suspected cases and to prevent the spread of cholera. Cooperation between neighboring countries is crucial to control outbreaks, especially in regions with high cross-border movement. Strengthening these efforts will enable affected countries to effectively control and prevent cholera outbreaks, improving public health outcomes.</span></p></div><div>WHO does not recommend travel or trade restrictions to and from Angola due to the cholera outbreak.</div>
  Assessment: <div><p>Angola is experiencing a substantial cholera outbreak with a significant proportion of deaths occurring in the community, exacerbating cholera transmission by delaying case detection and response, hindering timely public health interventions, and increasing environmental contamination through unsafe burials. The high CFR of 3.9% highlights critical challenges, including late case presentation, gaps in surveillance and early response, inadequate healthcare capacity, and barriers to accessing life-saving treatment, particularly in underserved areas. Inadequate access to clean water and sanitation continues to leave Angola highly vulnerable to cholera outbreaks, especially in densely populated urban centers and remote rural communities. The rainy season (October-April), with its associated heavy rainfall and flooding, directly amplifies this risk by contaminating water sources and facilitating rapid cholera transmission. Flood-prone provinces like Bengo face a heightened
    risk of further spread as the season progresses.</p><p><span style="background-color:initial;color:#333333;font-family:var(--kendo-font-family, inherit);font-size:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Angola shares borders with the Democratic Republic of Congo and Zambia, both currently experiencing cholera outbreaks. Frequent population movement between Angola and surrounding countries heightens the risk of cross-border transmission, particularly in high-mobility areas like Luanda.</span></p></div><div>Given the ongoing outbreak, the rainy season, and Angola&rsquo;s proximity to cholera-affected countries, the risk of further spread within Angola and to neighboring countries is considered very high. Cholera transmission may escalate without effective public health measures, including WASH improvements, and vaccination campaigns. The risk remains elevated nationally and regionally due to the interconnectedness of
    populations and the seasonal conditions that facilitate the spread of waterborne diseases.</div>
  Overview: <p>Angola reported its first cholera case in early January 2025. As of 23 March 2025, a cumulative total of 8543 cholera cases have been reported, including 329 deaths (CFR 3.9%), of which 112 (34%) occurred in the community. The CFR for hospitalised cases is 2.5%. Currently, 253 cases are hospitalized. The outbreak initially saw a rapid increase in cases, exceeding 1000 weekly cases in early February. This was followed by a decline and a plateau, with case numbers stabilizing at approximately&nbsp;800 cases per week for a month. However, in the&nbsp;week of 23 March, cases surged again, reaching close to 1200 cases&mdash;the highest&nbsp;weekly count to date.</p><p><strong>Figure 1</strong>. Number of cholera cases by epidemiological week of reporting (n=8543), as of 23 March 2025. Data source:&nbsp;<a href="https://www.afro.who.int/pt/countries/publications?country=973%22">Rep&uacute;blica de Angola. Boletim de C&oacute;lera</a></p><p><strong></strong> <img sf-image-responsive="true"
    src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/don_cholera_angola_fig_1.jpg?sfvrsn=d6615d07_3" height="408" style="max-width:100%;" title="DON_Cholera_Angola_Fig_1" width="660" alt="" sf-size="40589" /></p><p>The 6-14 year age group is the most affected, with 1976 cases, representing 23.1% of the total cases, followed by the 15-24 year age group with 1850 cases (21.7%), and the 25-34 year age group with 1475 cases (17.3%). Slightly over half of reported cases are male (4725; 55.3%).</p><p>Figure 2. Age-gender distribution of cholera cases (n=8543), as of 23 March 2025. Data source:&nbsp;<a href="https://www.afro.who.int/pt/countries/publications?country=973%22">Rep&uacute;blica de Angola. Boletim de C&oacute;lera</a> <img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/don_cholera_angola_fig_2.jpg?sfvrsn=bc266d32_3" height="525" style="max-width:100%;" title="DON_Cholera_Angola_Fig_2"
    width="726" alt="" sf-size="42131" /></p><p>The cholera outbreak is affecting 16 (76.2%) of the 21 Angolan provinces, with the highest number of cases reported from Luanda (4143; 48.5%) and Bengo (2485; 29.1%) provinces.</p><p><strong>Figure 3. </strong>Map of cholera cases by province (n=8543), as of 23 March 2025. Data source:&nbsp;<a href="https://www.afro.who.int/pt/countries/publications?country=973%22">Rep&uacute;blica de Angola.Boletim de C&oacute;lera</a> <img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/don_cholera_angola_fig_3.jpg?sfvrsn=64e20a53_3" height="754" style="max-width:100%;" title="DON_Cholera_Angola_Fig_3" width="810" alt="" sf-size="77211" /><br /></p>
