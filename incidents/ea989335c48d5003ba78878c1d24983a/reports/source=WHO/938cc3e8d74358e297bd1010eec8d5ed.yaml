  Response: <p><strong>Coordination</strong></p><ul type="disc"><li data-list="2" data-level="1">The Ministry of Health, supported      by international partners such as WHO, UNICEF, and others, is leading      efforts to mitigate the impact of the cholera outbreak. The Ministry is      actively coordinating with local and international partners to ensure an      efficient response, while reinforcing the health system's capacity to      manage the outbreak.</li></ul><p><strong>Epidemiological Surveillance and Laboratory</strong></p><ul type="disc"><li data-list="3" data-level="1">WHO has trained over 120 health      workers in active case detection and reporting, rapid infection surveys,      data processing, and community mobilization for preventive measures.</li><li data-list="3" data-level="1">In Bengo province, WHO is      supporting the deployment of 13 rapid response teams, which are working      daily within affected communities to identify and respond to new cases.</li><li data-list="3"
    data-level="1">The Ministry of Health, with      WHO&rsquo;s support, is enhancing the capacity of data management experts in      Luanda to improve case mapping, strengthen surveillance, and enhance case      detection and analysis at health units.</li><li data-list="3" data-level="1">WHO is further      assisting the government by reinforcing response teams to ensure the      timely identification of affected individuals, support community      engagement efforts, manage infection control measures, and protect the      population. </li></ul><p><strong>Case Management</strong></p><ul><li>Cholera treatment centers (CTCs) in Bengo province are being expanded to accommodate the increasing number of cases and enhance healthcare capacity.</li><li>WHO is supporting case management by providing technical support, including the dissemination of treatment protocols and clinical posters.</li><li>WHO has facilitated comprehensive training and supervision of clinical staff working in&nbsp;the cholera
    treatment units (CTUs) and CTCs across affected provinces.&nbsp; </li><li>WHO has assisted in establishing CTCs, CTUs, and oral rehydration points (ORPs), expanding access to life-saving treatment.</li></ul><p><strong>Infection Prevention and Control (IPC)/Water, Hygiene, and Sanitation (WASH)</strong></p><ul type="disc"><li data-list="1" data-level="1">UNICEF is supporting WASH      initiatives by distributing hygiene supplies to over 64 500 children in 63      schools, ensuring that the most vulnerable populations have access to      essential resources.</li><li data-list="1" data-level="1">The installation of water tanks      in affected communities is helping to improve access to safe drinking      water, a critical factor in controlling cholera transmission.</li><li data-list="1" data-level="1">Long-term improvements to water,      sanitation, and hygiene infrastructures are being prioritized to mitigate      the spread of cholera and other waterborne diseases, and to ensure      sustainable
    solutions that align with broader public health goals.</li></ul><p><strong>Risk Communication and Community Engagement</strong></p> <ul type="disc"><li data-list="6" data-level="1">Community mobilization efforts to      promote safe behaviors and increase vaccine uptake are underway, with      support from religious leaders, community influencers, and local      organizations.</li><li data-list="6" data-level="1">The WHO, alongside local      partners, is conducting awareness campaigns to educate the public about      the importance of proper hand hygiene, the use of latrines, and food      safety. </li></ul><p><strong>Vaccination</strong></p><ul type="disc"><li data-list="5" data-level="1">The Ministry of      Health, with support from WHO, UNICEF, the World Bank, and the      International Committee of the Red Cross, carried out a five-day reactive      vaccination campaign in January 2025. Over 900 000 people were vaccinated,      with a 99.5% administrative coverage rate. </li><li
    data-list="5" data-level="1">WHO has      provided logistical support and operational guidance for the vaccination      campaign, ensuring the efficient distribution of vaccines and the      establishment of vaccination centers in affected areas.</li><li data-list="5" data-level="1">700 000 additional doses of oral cholera vaccines arrived      in country mid-March for a second reactive campaign.</li></ul><p><strong>Preparedness and Readiness </strong></p><ul><li>A readiness assessment will be conducted to identify preparedness and readiness gaps across all response pillars. The findings will inform the development of a comprehensive plan to strengthen systems in unaffected areas, with the ultimate aim of limiting the spread of the outbreak.</li></ul>
