title: Severe typhoon Bavi triggers orange alert as authorities in China’s affected regions step up precautions with some flight, train services suspended
body: Typhoon Bavi, the ninth typhoon of the year, reintensified into a severe typhoon around midnight on Saturday, prompting China's National Meteorological Center (NMC) to issue an orange typhoon alert as authorities in affected regions suspended in-person school activities, closed tourist attractions and halted some ferry services.
