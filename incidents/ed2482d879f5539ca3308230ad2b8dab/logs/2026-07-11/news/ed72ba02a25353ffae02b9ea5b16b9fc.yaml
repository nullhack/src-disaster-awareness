title: Typhoon Bavi pounds Guam, other Pacific U.S. territories | Honolulu Star-Advertiser
body: Typhoon Bavi lashed Guam and the Northern Mariana Islands with powerful winds and heavy rain today, downing power lines and prompting warnings of potential flash flooding.
