log_date: '2026-07-11'
summary: As Typhoon Bavi approached China’s eastern coast, authorities evacuated over 900,000 people and issued an orange alert, suspending flights and trains in affected areas. In the Philippines, the death toll rose to at least 17 with nine missing due to the typhoon and enhanced monsoon rains, while the storm moved toward southern Japan and continued to batter Taiwan and Japan’s southern islands.
