title: Typhoon Bavi wreaks havoc across nation's eastern coast
body: Chinese authorities have intensified flood control and disaster relief efforts as Typhoon Bavi continued to affect large parts of the country on Sunday. As the typhoon moved inland after making landfall twice on the eastern coast, many areas experienced record-breaking rainfall, destructive winds and disruption in transportation, prompting the precautionary relocation of millions of people.
