log_date: '2026-07-10'
summary: Typhoon Bavi weakened from a super typhoon to a typhoon as it moved over the Philippine Sea, with Signal No. 2 raised in parts of northern Luzon and enhanced monsoon rains causing at least 10 deaths and affecting nearly 50,000 people in the Philippines. The storm then churned toward Taiwan and China's east coast, prompting evacuations and preparations for what forecasters warned could be the most powerful typhoon to hit the region in years.
