title: Super Typhoon Inday enters PAR, Signal No. 1 over seven areas — PAGASA
body: Super Typhoon Inday is now inside the Philippine Area of Responsibility (PAR) with seven areas under Signal No. 1, according to the Tropical Cyclone Bulletin posted by PAGASA.
