title: 'From The Marianas To East Asia: Super Typhoon Bavi Targets Taiwan And China After Battering Guam'
body: Super Typhoon Bavi battered Guam and the Northern Marianas before tracking toward Taiwan and China with major wind, flood, and surge risks.
