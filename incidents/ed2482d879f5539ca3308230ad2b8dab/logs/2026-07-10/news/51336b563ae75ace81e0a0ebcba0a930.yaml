title: Inday slightly weakens, decelerates; Signal No. 2 raised over three areas
body: Typhoon Inday slightly weakened as it slowed down over the Philippine Sea east of Northern Luzon with Signal No. 2 raised over three areas, according to the 11 p.m. Tropical Cyclone Bulletin posted by PAGASA.
