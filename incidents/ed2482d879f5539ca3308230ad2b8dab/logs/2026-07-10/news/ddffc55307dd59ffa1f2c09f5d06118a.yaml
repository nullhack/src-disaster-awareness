title: Signal No. 2 up over Batanes as Typhoon Inday moves over Philippine Sea
body: Tropical Cyclone Wind Signal (TCWS) No. 2 was raised over Batanes on Thursday even as Typhoon Inday slightly weakened as it moves northwestward over the Philippine Sea, according to state weather bureau PAGASA.
