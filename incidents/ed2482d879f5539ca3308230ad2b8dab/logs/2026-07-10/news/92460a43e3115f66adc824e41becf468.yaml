title: 10 dead, nearly 50k affected as 'Inday,' monsoon rains batter parts of PH
body: '(UPDATE) MANILA, Philippines — The combined impact of Typhoon ''Inday'' (international name: Bavi) and the southwest monsoon have left at least 10 people dead, affected nearly 50,000 people, flooded several areas and forced the suspension of classes in public and private schools, disaster agencies said on Friday.'
