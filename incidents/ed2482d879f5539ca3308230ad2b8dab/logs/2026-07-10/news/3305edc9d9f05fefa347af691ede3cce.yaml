title: Typhoon Inday weakens, moves faster towards sea of Batanes; Signal No. 2 over three areas
body: Typhoon Inday weakens further as it accelerates northwestward over the sea east of Batanes with Signal No. 2 raised over three areas, including Batanes, according to the latest Tropical Cyclone Bulletin posted by PAGASA.
