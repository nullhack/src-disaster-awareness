title: 'PAGASA: Inday Weakens Into Typhoon as it Moves Over PH Sea'
body: The state weather bureau reported the Inday has weakened into a typhoon as it moves over the Philippine Sea. On Thursday (July 9, 2026), the Philippine Atmospheric, Geophysical and Astronomical Services Administration released the latest weather update in the country.
