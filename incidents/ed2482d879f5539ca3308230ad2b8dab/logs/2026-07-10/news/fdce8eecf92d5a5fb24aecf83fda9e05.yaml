title: Tropical Storm Maysak Floods Kill 39 In South China As Typhoon Bavi Nears
body: Flooding from Tropical Storm Maysak has killed 39 people in southern China after a reservoir partly collapsed in Hengzhou. The disaster has stretched rescue operations and raised fresh concern as Typhoon Bavi approaches the east coast.
