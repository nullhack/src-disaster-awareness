title: Philippines landslides kill 15 as Typhoon Bavi heads towards Taiwan- Moneycontrol.com
body: Typhoon Bavi has killed at least 15 people in the Philippines after triggering deadly landslides, while Taiwan evacuated more than 2,000 residents and cancelled hundreds of flights as the largest typhoon in over three decades approached.
