title: Typhoon Bavi Nears China and Taiwan, Raising Fears of Most Powerful Storm to Strike Region in Years
body: China, Taiwan and parts of Japan are preparing for what forecasters warn could become one of the most destructive tropical storms to strike the region in decades, as Typhoon Bavi continues to strengthen over the western Pacific while communities are still recovering from the devastation caused by Typhoon Maysak.
