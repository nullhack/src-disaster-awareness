title: Typhoon Inday weakens, but southwest monsoon to trigger significant rain
body: Typhoon Inday (Bavi) is expected to be closest to extreme Northern Luzon between Friday night, July 10, and Saturday morning, July 11. It is still enhancing the southwest monsoon.
