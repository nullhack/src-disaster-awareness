log_date: '2026-07-05'
summary: Super Typhoon Bavi (Inday) intensified to a Category 5 storm, pounding the U.S. Northern Mariana Islands and Guam with catastrophic winds. The storm is now expected to weaken as it threatens northern Taiwan and Japan's Ryukyu Islands. Separately, landslides in the Philippines attributed to Bavi have killed 15 people.
