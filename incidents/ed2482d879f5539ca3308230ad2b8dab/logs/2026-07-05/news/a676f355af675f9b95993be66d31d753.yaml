title: Super Typhoon Bavi becomes the 3rd Cat 5 of 2026 » Yale Climate Connections
body: Bavi is expected to pass through the U.S. Northern Mariana Islands near Tinian and Saipan islands Sunday afternoon (U.S. EDT) as a Cat 5, potentially causing catastrophic damage.
