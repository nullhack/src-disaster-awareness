  Summary: "Between 17 May and 12 July 2025, the Information and Public Relations Department, Government of Kerala informed through a series of official press releases about four confirmed cases, including two deaths, due to Nipah virus (NiV) infection in two districts of Kerala State. \r\nNiV infection is a bat-borne disease transmitted to humans through infected animals (such as bats or pigs), contaminated food or, less commonly, through close contact with infected individuals. Since 1998 NiV outbreaks have been reported in Bangladesh, India, Malaysia, the Philippines, and Singapore. In India, NiV infections have occurred multiple times since 2001 with outbreaks in West Bengal State in 2001 and 2007, and in Kerala State regularly since 2018.\r\nSince 2018, Kerala has reported a total of nine NiV outbreaks. While the state has a strong healthcare system and improved infection control measures since 2023, it is advisable to maintain strong preparedness and surveillance efforts while ensuring\
    \ continued care for patients. At the same time, States that may be at risk should be encouraged to continue strengthen their detection systems and response capacities.\r\nWith no licensed vaccine or treatment available, public health efforts should focus on raising awareness of risk factors and promoting preventive measures to reduce exposure to the virus, and on early case detection supported by adequate intensive supportive care. Currently, the risk of international disease spread is considered low. There is no evidence of human-to-human transmission of NiV internationally in this event. "
