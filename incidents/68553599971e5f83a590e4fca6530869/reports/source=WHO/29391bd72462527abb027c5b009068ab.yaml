  Response: '<p>Several public health measures have been implemented by local authorities including:</p><ul><li>The Kerala state health minister chaired an emergency meeting to assess the situation and confirmed that preventive measures have been strengthened in accordance with the established NiV protocol.&nbsp;&nbsp;</li><li>As of 17 July, contact tracing is intensively implemented. A total of 723 individuals have been identified as contacts of confirmed Nipah virus (NiV) cases across several districts: Palakkad (394), Malappuram (212), Kozhikode (114), Ernakulam (2), and Thrissur (1).&nbsp;&nbsp;</li><li>Based on an in-depth investigation, Kerala health authorities have released route maps for the movement of three confirmed NiV cases reported in July, to trace potential community exposures.&nbsp;&nbsp;</li><li>Alerts have been issued by health authorities in Kozhikode, Malappuram, and Palakkad districts. In response, 26 special teams were deployed to carry out contact tracing, monitor
    symptoms among contacts and inform the public.&nbsp;</li><li>Additionally, a special alert has been issued to hospitals in Kannur, Kozhikode, Malappuram, Palakkad, Thrissur and Wayanad districts, instructing them to remain vigilant and promptly report any suspected cases with NiV symptoms.&nbsp;&nbsp;</li><li>The public has been advised to avoid non-essential visits to healthcare facilities to minimize the risk of transmission.</li><li>WHO is closely coordinating with the National Centre for Disease Control on One Health and capacity building for high threat pathogens including NiV.</li></ul>'
