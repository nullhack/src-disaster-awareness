  Advice: <p>In the absence of a vaccine or licensed treatment available for NiV disease, the only way to reduce or prevent infection in people is by raising awareness of the risk factors and supporting people with measures they can take to reduce exposure to the virus. Case management should focus on the delivery of timely, supportive care and be supported by a good laboratory system. Intensive supportive care is recommended to treat severe respiratory and neurologic complications.&nbsp;&nbsp; </p><p>Public health educational messages should focus on:</p><p><strong>Reducing the risk of bat-to-human transmission </strong></p><ul><li>Efforts to prevent transmission should first focus on decreasing bat access to date palm sap and other fresh food products. Freshly collected date palm juice should be boiled, and fruits should be thoroughly washed and peeled before consumption. Fruits with signs of bat bites should be discarded. Areas where bats are known to roost should be avoided. </li></ul><p><strong>Reducing
    the risk of human-to-human transmission. </strong></p><ul><li>Close unprotected physical contact with NiV-infected people should be avoided. Regular hand washing should be carried out after caring for or visiting sick people.</li></ul><p><strong>Controlling infection in health care settings</strong></p><ul><li>Health-care workers caring for patients with suspected or confirmed infection, or handling specimens from them, should implement standard infection control precautions at all times.&nbsp;</li><li>As human-to-human transmission has been reported, in particular in health-care settings, contact and droplet precautions should be used in addition to standard precautions. Airborne precautions may be required in certain circumstances.</li><li>Samples taken from people and animals with suspected NiV infection should be handled by trained staff working in suitably equipped laboratories.</li></ul><p>WHO does not recommend any travel and/or trade restrictions toward India based on the currently
    available information.<br /></p>
  Assessment: '<p>As of July 2025, a total of nine NiV outbreaks have been reported in Kerala State. Recent case numbers reported in Kerala State are consistent with trends observed in previous years and are therefore not entirely unexpected. However, they continue to highlight a localized risk associated with NiV in that area. At this time, the overall risk to the broader national and regional population remains low. &nbsp;The first outbreak was reported in 2018 (23 cases including confirmed and probable; CFR: 91%), followed by subsequent outbreaks in 2019 (a single case who survived), 2021 (one case; CFR: 100%), 2023 (six cases including two deaths; CFR: 33%), 2024 (two cases; CFR 100%), and 2025. So far in 2025, four confirmed cases of NiV, have been reported, all from Kerala State, with the symptom onset in April (one case), June (two cases) and July (one case).&nbsp;&nbsp;</p><p>These recurrent spillover events highlight the ongoing risk of NiV in Kerala. In addition, studies indicated
    that fruit bats tested positive for NiV antibodies in several other Indian states, suggesting that NiV infection may potentially emerge in other States.&nbsp;&nbsp;</p><p>Kerala State has a robust healthcare system. While nosocomial transmission was confirmed during the 2023 outbreak, the Infection Prevention and Control (IPC), and waste management practices have since been strengthened and audited.&nbsp;&nbsp;</p><p>The sources of infection for the 2025 cases are yet to be confirmed.&nbsp;</p>'
  Overview: <p>Between 17 May and 12 July 2025, the Information and Public Relations Department, Government of Kerala through a series of official press releases informed about four confirmed NiV cases, including two deaths, due to NiV infection from two districts of Kerala State. Of the four cases, two were reported from Malappuram and two from Palakkad district. This marks the first-ever outbreak in Palakkad District. Of the four cases, one case was reported in May (with symptom onset in April) and three in July with symptom onset June (two cases), and July (one case).</p><p>The first patient was an adult woman from Malappuram district with symptom onset on 25 April. &nbsp;The patient was admitted in critical condition to a local hospital in Malappuram with fever, cough, and respiratory distress due to worsening of symptoms. She was transferred to intensive care on 2 May due to acute encephalitis syndrome. Samples were collected and tested positive for NiV at Calicut Medical College on
    6 May. Confirmatory testing was conducted by the National Institute of Virology, Pune, and results confirmed on 8 May.</p><p>The second patient, also an adult woman from Malappuram district developed symptoms on 23 June and died on 1 July. She visited multiple healthcare facilities, before being transferred to a government medical facility, where clinical suspicion of NiV led to sample collection and laboratory testing.&nbsp;</p><p>The third patient is an adult woman from Palakkad district who developed symptoms on 25 June. She sought care at several healthcare facilities, before being admitted to a multi-specialty hospital, where she remains in critical condition on ventilator support. This is the first confirmed NiV case in Palakkad district.&nbsp;</p><p>The fourth case was an adult male also from Palakkad district, who developed symptoms on 6 July 2025. He sought initial medical care on the same day, was admitted to a private hospital on 10 July, and transferred to a multi-specialty
    hospital on 11 July. On 12 July, he died and was confirmed with NiV infection. This is the second confirmed case in Palakkad district. &nbsp;</p><p>The sources of infection of the cases remain under investigation. None of these cases appear to be linked to each other, suggesting independent spillover events from the natural reservoir. A significant presence of fruit bats, the known reservoir for NiV has been observed in the affected areas.</p>
