title: 5.5 magnitude earthquake hits Peru's Andes region and kills at least 6 people
body: LIMA, Peru (AP) — A 5.5 magnitude earthquake shook the Andes region of Peru, killing at least six people, authorities said Sunday. More than 30 people were injured and 300 displaced.
