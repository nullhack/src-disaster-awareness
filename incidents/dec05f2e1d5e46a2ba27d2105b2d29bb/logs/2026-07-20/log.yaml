log_date: '2026-07-20'
summary: A 5.5-magnitude earthquake struck Peru's central Junín region on July 19, 2026, killing at least five people and injuring more than 20, with around 300 displaced. Rescue crews searched rubble for a trapped person and continued to assess damage as aftershocks occurred. Reports varied on the exact death toll, with some sources citing up to six deaths and 32 injuries.
