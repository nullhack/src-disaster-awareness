title: At least 6 dead and 21 injured after 2 earthquakes in Peru | Honolulu Star-Advertiser
body: LIMA >> At least six people were killed and 21 injured after two earthquakes struck a mountainous region of Peru, the country’s civil defense chief said on Sunday.
