title: Peru declares emergency in 2 districts after 5.1-magnitude quake
body: LIMA, July 23 (Xinhua) -- The Peruvian government on Thursday declared a state of emergency in two districts of the central Junin department after a recent 5.1-magnitude earthquake killed six people.
