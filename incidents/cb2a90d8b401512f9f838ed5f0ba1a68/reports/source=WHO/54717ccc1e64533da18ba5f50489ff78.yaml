  Response: <p>The CDC and State public health officials have initiated several public health response measures:&nbsp;</p><ul><li>Public health officials are conducting surveillance in the area, that included additional case investigations and contact tracing. &nbsp;</li><li>Since March 2024, at least 30,100 people have been monitored, and at least 1260 have been tested after exposure to infected animals in the USA.&nbsp;</li><li>The CDC conducts enhanced routine surveillance to detect and monitor influenza activity, including infections caused by novel influenza viruses such as avian influenza A(H5). &nbsp;</li><li>The CDC recommends that state and local public health departments monitor individuals exposed to birds or other animals (including livestock) suspected of being infected with avian influenza A viruses for the onset of signs and symptoms for up to 10 days after their last exposure. Individuals who develop signs or symptoms of respiratory illness and/or conjunctivitis should be
    tested for influenza.&nbsp;&nbsp;</li><li>The CDC has issued recommendations for the public to avoid unprotected contact with sick or dead animals, including wild birds, poultry, other domestic fowl, and other wild or domestic animals, as well as animal droppings, litter, or materials contaminated by birds or other animals suspected of being infected with the influenza A(H5) virus.&nbsp;</li><li>The CDC has interim recommendations for prevention, monitoring, and public health investigations of avian influenza A(H5) virus infections in people. The CDC has also updated recommendations for occupational protection and the use of personal protective equipment (PPE). &nbsp;<br /></li></ul>
