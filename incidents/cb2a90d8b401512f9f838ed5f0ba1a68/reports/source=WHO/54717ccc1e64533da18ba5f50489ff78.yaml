  Epidemiology: <p>Animal influenza viruses typically circulate within animal populations, but some have the potential to infect humans. Human infections are predominantly acquired through direct contact with infected animals or&nbsp;<span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">exposure to contaminated environments. Based on the original host species, influenza A viruses can be categorized such as avian influenza, swine influenza, and other animal-origin influenza subtypes.</span></p><p>Human infection with avian influenza viruses may result in a spectrum of illness, ranging from mild upper respiratory tract symptoms to severe, life-threatening conditions. Clinical manifestations may include conjunctivitis, respiratory, gastrointestinal symptoms, encephalitis (brain swelling), and encephalopathy (brain damage). In some cases, asymptomatic infections with the virus have been reported in individuals
    with known exposure to infected animals and environments.</p><p>A definitive diagnosis of human avian influenza infection requires laboratory confirmation. WHO regularly updates its technical guidance on the detection of zoonotic influenza, utilizing molecular diagnostic methods such as RT-PCR. Clinical evidence indicates that certain antiviral agents, particularly neuraminidase inhibitors (e.g., oseltamivir, zanamivir), have been shown to shorten the duration of viral replication and improve patient outcomes in some cases. This antiviral agent should be administered within 48 hours of symptom onset. </p><p>High pathogenicity avian influenza A(H5) clade 2.3.4.4b A(H5N5) viruses have been detected in North America in wild birds and wild mammals since at least 2023.<sup>[2]</sup>&nbsp;This is the first laboratory-confirmed human infection with an influenza A(H5N5) virus in the United States of America and reported globally.</p>
