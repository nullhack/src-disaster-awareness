log_date: '2026-07-08'
summary: A 5.6-magnitude earthquake struck Northern California on June 24, 2026, approximately 11 km north of Redwood Valley in Mendocino County, at 8:10 a.m. Pacific time. The quake was felt across the region, including the Bay Area, and triggered alerts from the U.S. Geological Survey. No major damage or injuries have been reported in the immediate aftermath.
