title: Southern Mexico Hit By 7.3 Quake, Triggering Tsunami Alert
body: Southern Mexico and parts of Central America were hit by a 7.3 magnitude earthquake on Friday, according to the US Geological Survey (USGS), with a tsunami alert issued for a stretch of the Pacific coast.
