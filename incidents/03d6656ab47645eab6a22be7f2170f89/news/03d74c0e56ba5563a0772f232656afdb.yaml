title: Powerful earthquake in Mexico shakes Guatemala and El Salvador
body: (CNN) — A powerful earthquake in southern Mexico shook nearby countries Guatemala and El Salvador on Friday, with the US Geological Survey (USGS) measuring its preliminary magnitude at 7.3.
