log_date: '2026-07-17'
summary: A powerful magnitude 7.3-7.4 earthquake struck off the southern Pacific coast of Mexico near Puerto Madero on July 17, 2026, triggering tsunami warnings for nearby coasts of Mexico and Guatemala. The quake was felt across southern Mexico, Guatemala, and El Salvador, prompting evacuations in Guatemala City. No immediate reports of major damage or casualties were available as authorities continued to assess the situation.
