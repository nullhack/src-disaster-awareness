title: Earthquake of 7.3 hits Mexico's Pacific coast, felt in Guatemala too
body: An earthquake with a 7. 3 magnitude struck off Mexico's Pacific coast, shaking southern Mexico and neighbouring Guatemala, the US earthquake monitoring agency said on Friday.
