  Response: '<p><strong>1. Leadership and coordination:</strong></p><ul><li>Coordination has been strengthened at the national, provincial, and community levels. On 30 November 2024, the first Public Health Emergency Operations Center (PHEOC) meeting was held with all partners to address the alert, after which a rapid response team (RRT) from Kwango Province was deployed to Panzi. On 3 December 2024, a second PHEOC meeting was convened with partners, leading to the decision to deploy a national-level RRT to Panzi with support from WHO.&nbsp;</li><li>Daily coordination meetings are being held at the national level, with provincial teams actively participating in ongoing planning and response. <br /></li></ul><p><strong>2.&nbsp; Surveillance:</strong></p><ul><li>A case definition has been developed based on clinical symptoms observed, which is guiding surveillance and reporting efforts.&nbsp;&nbsp;</li><li>Active case search is being conducted in health facilities, including reviews of hospital
    registers to identify additional cases. Investigations and active case search are also being organized in the community.&nbsp;</li><li>Data collection is ongoing, focusing on the preparation of a line list and detailed epidemiological analysis.&nbsp;&nbsp;</li><li>Community deaths are being investigated to better understand transmission dynamics and the scope of the outbreak.&nbsp;&nbsp;</li></ul><p><strong>3.&nbsp; Case Management:</strong></p><ul><li>A provincial RRT was deployed to Panzi on 30 November, and a multidisciplinary RRT from the national level, including WHO experts, was deployed on 7 December to investigate the outbreak, and reinforce the response.&nbsp;&nbsp;</li><li>The teams are carrying medication to support case management and prevent more deaths.</li><li>Efforts are underway to strengthen capacity of healthcare providers to ensure the best possible care for patients.&nbsp;</li></ul><p><strong>4.&nbsp; Laboratory: </strong><strong></strong></p><ul><li>Laboratory equipment
    was transported to collect samples from cases and send for testing at INRB in Kinshasa. Additionally, RDTs for malaria and COVID-19 have been provided to assist in diagnosis.&nbsp;</li></ul><p><strong>5.&nbsp; Risk communication and community engagement:</strong></p><ul><li>Key messages have been developed to enhance public awareness and encourage general preventive behaviors. These messages are being disseminated through community engagement, with sensitization campaigns underway.&nbsp;</li></ul><p><strong>6.&nbsp; Infection prevention and control:</strong></p><ul><li>Infection prevention and control measures are being reinforced. Health and care workers have been briefed on key practices, including the proper use of masks, hand washing, and gloves, to reduce the risk of further transmission.&nbsp;</li></ul><p><strong>7.&nbsp; Logistics</strong></p><ul><li>Logistical support is being provided for effective case management, including the transportation of samples to INRB Kinshasa for
    laboratory testing. Health facilities and hospitals in the most affected health areas are being supplied with appropriate medications and sampling kits to support the response.&nbsp;</li></ul>'
  FurtherInformation: '<ul><li>Democratic Republic of the Congo Ministry of Health Press Release: <a href="https://x.com/i/broadcasts/1YqGovjjrwAKv?s=09" target="_blank">https://x.com/i/broadcasts/1YqGovjjrwAKv?s=09</a>&nbsp;<strong></strong></li><li>Democratic Republic of the Congo: Acute Malnutrition Situation For July - December 2024 and Projection for January - June 2025 <a href="https://www.ipcinfo.org/ipc-country-analysis/details-map/en/c/1157190/?iso3=COD" target="_blank">https://www.ipcinfo.org/ipc-country-analysis/details-map/en/c/1157190/?iso3=COD</a>&nbsp;&nbsp;<strong></strong></li></ul><p><strong>Citable reference:</strong> World Health Organization (8 December 2024). Disease Outbreak News; Undiagnosed disease &ndash; Democratic Republic of the Congo. Available at: <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON546">https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON546</a></p>'
  Summary: "Between 24 October and 5 December 2024, Panzi health zone in Kwango Province of Democratic Republic of the Congo recorded 406 cases of an undiagnosed disease with symptoms of fever, headache, cough, runny nose and body ache. All severe cases were reported to be severely malnourished. Among the cases, 31 deaths have been registered.  The majority of cases reported are among children, particularly those under five years of age.  \r\nThe area is rural and remote, with access further hindered by the ongoing rainy season. Reaching it from Kinshasa by road takes an estimated 48 hours. These challenges, coupled with limited diagnostics in the region, have delayed the identification of the underlying cause.\r\nRapid response teams have been deployed to identify the cause of the outbreak and strengthen the response. The teams are collecting samples for laboratory testing, providing a more detailed clinical characterization of the detected cases, investigating the transmission dynamics,\
    \ and actively searching for additional cases, both within health facilities and at the community level. The teams are also aiding with the treatment of patients, risk communication and community engagement. \r\n\r\nGiven the clinical presentation and symptoms reported, and a number of associated deaths, acute pneumonia, influenza, COVID-19, measles and malaria are being considered as potential causal factors with malnutrition as a contributing factor. Malaria is a common disease in this area, and it may be causing or contributing to the cases. Laboratory tests are underway to determine the exact cause. At this stage, it is also possible that more than one disease is contributing to the cases and deaths."
