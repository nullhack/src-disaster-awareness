  Advice: "<p>To reduce the impact of the\r\noutbreak in the Panzi health zone and mitigate further spread, WHO advises the\r\nfollowing measures:&nbsp;&nbsp;<o:p></o:p><br /></p>\r\n\r\n<p>Strengthening coordination\r\nmechanisms at all levels&mdash;national, provincial, zonal, and local&mdash;is critical for\r\na unified response. Enhanced communication infrastructure, such as satellite\r\nphones, is required to overcome the limited network coverage in affected areas.\r\nCross-border collaboration with Angola is also crucial to monitor for similar\r\ncases and prevent potential cross-border transmission.&nbsp;&nbsp;<o:p></o:p><br /></p>\r\n\r\n<p>Improving surveillance efforts\r\nis a priority to identify and respond to cases promptly. Active case searches\r\nshould continue in both health facilities and communities, with a particular\r\nfocus on areas reporting deaths and family clusters. Community-based\r\nsurveillance must be strengthened to ensure early case detection and rapid\r\n\
    response. <o:p></o:p><br /></p>\r\n\r\n<p>Careful characterization of\r\nthe clinical syndrome and outcomes and an improved case definition based on the\r\ninformation collected will be necessary to understand the situation. In\r\nparticular, data which clarify possibility of coinfection and multiple pathologies,\r\nand uncertainties in outcomes among vulnerable groups should be collected. The\r\nWHO has established the Global Clinical Platform to provide rapid turnaround of\r\nstructured data analysis using anonymized case records; its use is recommended in\r\nthe detailed capture of patient syndromes and outcomes.&nbsp;<o:p></o:p><br /></p>\r\n\r\n<p>Effective case management requires ensuring an adequate\r\nsupply of essential medications to support treatment and prevent more deaths.\r\nRDTs for malaria should be distributed to facilitate differential diagnosis,\r\nwhile laboratory testing must be expedited through the shipment of samples to\r\nINRB Kinshasa to confirm or rule out\
    \ suspected causes, including COVID-19 and\r\ninfluenza. Long-term laboratory capacity strengthening, and decentralization\r\nwill be important in provision of diagnostic capability in the affected health\r\nzone.&nbsp;&nbsp;<o:p></o:p><br /></p>\r\n\r\n<p>Infection prevention and\r\ncontrol (IPC) measures must be reinforced across all health facilities.\r\nHealthcare workers should receive training on IPC practices, including the\r\nproper use of personal protective equipment (PPE) such as masks and gloves, as\r\nwell as strict hand hygiene protocols. These measures will reduce transmission\r\nrisks within health facilities and improve the safety of healthcare\r\ndelivery.&nbsp;&nbsp;<o:p></o:p><br /></p>\r\n\r\n<p>Risk communication and\r\ncommunity engagement are essential to raising public awareness. Targeted\r\nmessages should be disseminated to educate the public on respiratory illness\r\nsymptoms, preventive measures, and the importance of seeking care early.\r\nCommunity leaders\
    \ must be engaged to build trust and encourage adherence to\r\npublic health guidance. Addressing misinformation and fears within the\r\ncommunity is critical to ensuring effective collaboration in the\r\nresponse.&nbsp;&nbsp;<o:p></o:p><br /></p>\r\n\r\n<p>Logistical and security\r\nchallenges also require attention. Strengthening logistical support for the\r\ndeployment of teams and supplies will ensure timely access to affected areas.\r\nContingency plans should be developed to address potential insecurity posed by\r\narmed groups, safeguarding response personnel and maintaining continuity in\r\nresponse activities. &nbsp;<o:p></o:p><br /></p>\r\n\r\n<p>Further investigations are needed to clarify whether anaemia\r\nobserved in severe cases is linked to the outbreak. The main hypothesis of\r\nrespiratory illness should be validated by studying its relationship with\r\nseasonal influenza and other potential factors. Additionally, historical\r\noutbreaks, such as that of typhoid fever\
    \ which was reported in the health zone\r\ntwo years ago, should be reviewed to identify recurring vulnerabilities that\r\nmay inform current response efforts. In addition, understanding general\r\nmalnutrition rates and identifying cases of acute malnutrition in the affected\r\npopulation can inform appropriate nutritional care and prevent further\r\ndeaths.&nbsp;&nbsp;<o:p></o:p><br /></p>"
  Assessment: <p>There are ongoing efforts to address the outbreak in Panzi health zone, however significant challenges in the clinical and epidemiological response remain, that increase the public health risk for the affected population. Severe cases with anaemia, respiratory distress, and malnutrition have been reported. The affected area is remote, complicating the assessment and response. &nbsp;The Integrated Food Security Phase Classification (IPC) for acute food insecurity levels in Kwango province increased from IPC 1 (acceptable) in April 2024 to IPC 3 (Crisis Level) in September 2024. This suggests a significant phase of increase in food insecurity and risk of severe acute malnutrition.<br /></p><p>Symptoms such as fever, cough, headache, and body ache have been observed since 24 October, primarily through health worker reports, yet Integrated Disease Surveillance and Response (IDSR) data on baseline respiratory illness rates are not available for affected health zone to establish
    trends. Cases have been reported in family clusters, suggesting potential transmission dynamics within households, though additional investigation is needed. Furthermore, there is no information available on specific vaccination coverage, including childhood vaccination, in the affected health zone, leading to uncertainties about vaccine-deprived population immunity.&nbsp;<br /></p><p>Gaps in case management have also been identified. Stock-outs of medications for treating common diseases frequently occur, and care is not provided free of charge, which could limit access to treatment for vulnerable populations. &nbsp;<br /></p><p>The affected area&rsquo;s remoteness and logistical barriers, including a two-day road journey from Kinshasa due to the rainy season affecting the roads and limited mobile phone and internet network coverage across the health areas, have hampered the rapid deployment of response teams and resources. Furthermore, there is no functional laboratory in the health
    zone or province, requiring the collection and shipment of samples to Kinshasa for analysis. This has delayed diagnosis and response efforts. The lack of sample collection supplies has further limited diagnostic capacity, leaving significant gaps in understanding the outbreak&rsquo;s aetiology.&nbsp;<br /></p><p>Insecurity in the region adds another layer of complexity to the response. The potential for attacks by armed groups poses a direct risk to response teams and communities, which could further disrupt the response.&nbsp;<br /></p><p>Based on the above rationale, the overall risk level to the affected communities is assessed as high. <br /></p><p>At the national level, the risk is considered moderate due to the localized nature of the outbreak within the Panzi health zone in Kwango province. However, the potential for spread to neighboring areas, coupled with gaps in surveillance and response systems, this assessment underscores the need for heightened preparedness.&nbsp;<br /></p><p>At
    the regional and global levels, the risk remains low at this time. However, the proximity of the affected area to the border with Angola raises concerns about potential cross-border transmission, and continued monitoring and cross-border coordination will be essential to mitigate this risk.&nbsp;<br /></p><p>The current confidence in the available information remains moderate, as significant gaps in clinical, epidemiological, and laboratory data persist. <br /></p>
  Overview: '<p>On 29 November 2024, the Ministry of Public Health of the Democratic Republic of the Congo reported to WHO an alert regarding increased deaths from an undiagnosed cause in Panzi health zone. <br /></p> <p>Between 24 October and as of 5 December 2024, Panzi health zone in Kwango Province has recorded 406 cases of an undiagnosed disease with symptoms of fever, headache, cough, runny nose and body ache and 31 deaths (Case Fatality Ratio or CFR of 7.6%). &nbsp;The reported cases had a peak in epidemiological week 45 (week ending 9 November 2024). The outbreak is still ongoing.&nbsp;According to a press briefing by the Ministry of Health on 5 December, there have been several additional deaths outside of health facilities (community deaths). These deaths still need to be investigated, characterized (age, gender etc) and verified. </p><p>Cases have been reported from nine out of 30 health areas in Panzi health zone: Kahumbulu, Kambandambi, Kanzangi, Kasanji, Kiama, Mbanza Kipungu,
    Makitapanzi, Mwini ngulu, and Tsakala Panzi. The majority of cases (95.8%) are reported from Tsakala Panzi (169), Makitapanzi (142) and&nbsp; Kanzangi (78) health areas.<br /></p> <p>In Panzi health zone, children aged 0-14 years represent 64.3% of all reported cases, with the age groups 0-59 months, 5-9 years, and 10-14 years accounting for 53%, 7.4%, and 3.9% of cases, respectively. Females constitute 59.9% of the total cases. Among the deaths, 71% are below the age of 15, with 54.8% of the total in children under the age of five years. All severe cases were reported to be malnourished. There are 145 cases aged 15 and above, of which nine died (CFR: 6.2%). Deaths have primarily occurred in the village communities. </p><p>The area experienced deterioration in food insecurity in recent months, has low vaccination coverage and very limited access to diagnostics and quality case management. There is a lack of supplies and transportation means and shortage of health staff in the area. Malaria
    control measures are very limited.</p><p>The clinical presentation of patients includes symptoms such as fever (96.5%), cough (87.9%), fatigue (60.9%) and a running nose (57.8%). The main symptoms associated with death include difficulty in breathing, anaemia, and signs of acute malnutrition. Based on the current context of the affected area and the broad presentation of symptoms, a number of suspected diseases need to be ruled out through further investigations and laboratory testing. These include but are not limited to measles, influenza, acute pneumonia (respiratory tract infection), hemolytic uremic syndrome from <em>E. coli</em>, COVID-19, and malaria.&nbsp;</p>'
