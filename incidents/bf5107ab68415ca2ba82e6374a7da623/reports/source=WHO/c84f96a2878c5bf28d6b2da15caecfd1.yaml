  Title: Trends of acute respiratory infection, including human metapneumovirus, in the Northern Hemisphere
  Epidemiology: ''
  Advice: <p>WHO recommends that individuals in areas where it is winter take normal precautions to prevent the spread and reduce risks posed by respiratory pathogens, especially to the most vulnerable. People with mild symptoms should stay home to avoid infecting other people and rest. People at high risk or with complicated or severe symptoms should seek medical care as soon as possible. Individuals should also consider wearing a mask in crowded or poorly ventilated spaces, cover coughs and sneezes with a tissue or bent elbow, practice regular handwashing, and get recommended vaccines as per physician and local public health authorities&rsquo; advice.<sup>[2]</sup></p><p>WHO advises Member States to maintain surveillance for respiratory pathogens through an integrated approach, considering country context, priorities, resources and capacities. WHO has published guidance on integrated surveillance <a href="https://iris.who.int/handle/10665/379678">here</a>. WHO has also updated guidance
    on assessing influenza epidemic and pandemic severity, including the impact on healthcare facilities, <a href="https://www.who.int/publications/i/item/9789240093881">here</a>.</p><p>Based on the current risk assessment, WHO advises against any travel or trade restrictions related to current trends in acute respiratory infections.<span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span></p>
  Assessment: <p>In temperate climates, seasonal epidemics of common respiratory pathogens, including influenza, occur often during winter periods. The observed increases in acute respiratory infections and associated pathogen detections in many countries in the Northern hemisphere in recent weeks is expected at this time of year and is not unusual. The co-circulation of respiratory pathogens may pose a burden to health facilities.&nbsp;</p>
  Overview: <p>In many countries of the Northern Hemisphere, trends in acute respiratory infections increase at this time of year. These increases are typically caused by seasonal epidemics of respiratory pathogens such as seasonal influenza, RSV, and other common respiratory viruses, including hMPV, as well as mycoplasma pneumoniae. The co-circulation of multiple respiratory pathogens during the winter season can sometimes cause an increased burden on health care systems treating sick persons.</p><p>Currently, in some countries in the temperate Northern hemisphere, influenza-like illness (ILI) and/or acute respiratory infection (ARI) rates have increased in recent weeks and are above baseline levels, following usual seasonal trends. Influenza activity is elevated in many countries in Europe, Central America and the Caribbean, Western Africa, Middle Africa, and many countries across Asia, with the predominant seasonal influenza type and subtype varying by location, typical for this time
    of year, except during most of 2020 and 2021, when there was little influenza activity during the COVID-19 pandemic (Figure 1). SARS-CoV-2 activity as detected in sentinel surveillance and reported to Global Influenza Surveillance and Response System (GISRS), along with wastewater monitoring from the reporting countries, is currently low in countries in the Northern hemisphere following prolonged high level activity during summer months in the Northern hemisphere. Where surveillance data is available, trends in RSV activity are variable by region with downward trends observed in most subregions of the Americas, except in North America where RSV activity has increased, and decreases have been observed in the European region in recent weeks. Some countries conduct routine surveillance and report trends for other commonly circulating respiratory pathogens, such as hMPV, and report such information on a routine basis. Some countries in the Northern hemisphere have reported increased trends,
    varying by virus, in recent weeks, typical for this time of year.&nbsp;&nbsp; <strong></strong></p><p><strong>Figure 1. Virus detections by subtype reported to FluNet, 01 October 2017 to 30 December 2024 from countries in the Northern hemisphere, as of 07 January 2025</strong></p><p><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/don.png?sfvrsn=cde1646a_5" style="display:block;margin-left:auto;margin-right:auto;" class="-align-center" alt="DON  for influenza and COVID-19" sf-size="93866" /><strong></strong><br /></p><p><strong>Source:</strong> (<a href="https://worldhealthorg.shinyapps.io/flunetchart/">https://worldhealthorg.shinyapps.io/flunetchart/</a>).</p><p>There has been international interest in a potential increase of respiratory virus transmission in China, particularly hMPV, including suggestions of hospitals being overwhelmed. China has an established sentinel surveillance system for ILI and severe acute respiratory infections (SARI),
    including hMPV, and conducts routine virological surveillance for common respiratory pathogens with detailed reports published weekly on the China Center for Disease Control and Prevention (CDC) website.<sup>[1]</sup> Surveillance and laboratory data for hMPV is not available routinely from all countries.</p><p>According to the <a href="https://www.chinacdc.cn/jksj/jksj04_14275/202501/t20250102_303654.html">most recent surveillance data</a> on acute respiratory infections shared by the China CDC with data up to 29 December 2024, there has been an upward trend of common acute respiratory infections, including those due to seasonal influenza viruses, RSV and hMPV &ndash; as expected for this time of year during the Northern Hemisphere winter. Influenza is currently the most reported cause of respiratory disease, with the highest positivity rate among all monitored pathogens for all age groups except children aged 5-14 years for whom mycoplasma pneumoniae had the highest positivity rate.
    SARS-CoV-2 activity remains low however with an increase in reported severe COVID-19 cases. The predominant circulating SARS-CoV-2 variant in the country is XDV and its sublineages accounting for&nbsp; 59.1% detection among sequenced samples. ILI activity in China&rsquo;s northern and southern provinces have been increasing since late 2024, following the previous year&rsquo;s trends. Current ILI activity in the southern provinces remains below that of the previous two years, while current ILI activity in the northern provinces is similar to levels seen at this time in the previous two years.</p><p>China&rsquo;s reported levels of acute respiratory infections, including hMPV, are within the expected range for the winter season with no unusual outbreak patterns reported. Chinese authorities confirmed that the health care system is not overwhelmed, hospital utilization is currently lower than this time last year, and there have been no emergency declarations or responses triggered. Since
    the expected seasonal increase was observed, health messages have been provided to the public on how to prevent the spread of respiratory infections and reduce the impact of these diseases.</p>
