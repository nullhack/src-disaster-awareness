log_date: '2026-07-21'
summary: Selected news from July 21 reports that France has experienced its worst wildfire season in 20 years, with over 42,000 hectares burned by mid-July, already surpassing the previous record. The Fontainebleau forest fire is highlighted as a key part of this trend, with analysts pointing to a combination of extreme heat, suspected arson, and land management issues driving the fires. Articles also emphasize the threat to the historic Fontainebleau forest, underscoring its cultural and ecological significance.
