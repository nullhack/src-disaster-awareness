title: Large wildfires south of Paris consume thousands of acres | Arkansas Democrat Gazette
body: NOISY-SUR-ÉCOLE, France -- Hundreds of firefighters battled two blazes Tuesday in the Fontainebleau forest south of Paris that have consumed about 4,900 acres and forced the evacuation of 1,000 people, local authorities said.
