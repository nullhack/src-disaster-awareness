title: French police detain 59 over nationwide wildfires, 2 linked to Fontainebleau blaze
body: French police have detained 59 people across the country in connection with wildfires, including two suspects linked to the blaze in the Fontainebleau forest in Seine-et-Marne department, southeast of Paris, French Interior Minister Laurent Nunez said on Monday.
