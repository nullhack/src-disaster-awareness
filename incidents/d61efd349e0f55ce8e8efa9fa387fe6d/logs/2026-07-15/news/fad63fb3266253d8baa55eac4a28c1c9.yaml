title: Firefighters battle to stop forest blaze near Paris from erupting again
body: Fires have consumed nearly 2,000 hectares and forced the evacuation of about 1,000 people. Bigger fires have been ravaging areas of southern France, but the Fontainebleau fire is exceptionally close to the densely populated region surrounding Paris.
