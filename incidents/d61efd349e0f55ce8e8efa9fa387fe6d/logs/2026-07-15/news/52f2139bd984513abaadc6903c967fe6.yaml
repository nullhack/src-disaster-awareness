title: Firefighters battle Fontainebleau forest fire near Paris as two arrested
body: PARIS, July 14 (Reuters) - One of the people arrested on suspicion of having started the fire in a historic forest near Paris was a volunteer firefighter who confessed on Tuesday, French media said, citing the local prosecutor, as fire brigades continued to battle the blaze near one of France's best-known royal palaces.
