title: France records worst wildfire season in 20 years by mid-July - ProtoThema English
body: More than 42,000 hectares have burned across France since January, already surpassing the total for all of 2025, as satellite monitoring shows fires this month tearing through Fontainebleau, the Var, the Drôme and Corsica alike
