log_date: '2026-07-08'
summary: The magnitude 7.8 earthquake that struck southern Mindanao on June 7, 2026, has caused at least 37 deaths and displaced 32,000 people. Rescue operations are ongoing, with the mayor of a devastated town requesting helicopter food deliveries to stave off hunger. Power in the region is expected to return to normal within the week, according to the Energy Secretary.
