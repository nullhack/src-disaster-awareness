title: Earthquake of magnitude 6.05 strikes Mindanao, Philippines, GFZ says
body: A magnitude 6.05 earthquake struck Mindanao in the Philippines on Tuesday, the German Research Centre for Geosciences said. The quake was at a depth of 10 km (6.21 miles), GFZ said.
