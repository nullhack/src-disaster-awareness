title: 6.5-magnitude offshore earthquake strikes S. Philippines
body: MANILA, July 15 (Xinhua) -- The Philippine Institute of Volcanology and Seismology said a 6.5-magnitude offshore earthquake struck Davao Occidental province in the southern Philippines on Tuesday night.
