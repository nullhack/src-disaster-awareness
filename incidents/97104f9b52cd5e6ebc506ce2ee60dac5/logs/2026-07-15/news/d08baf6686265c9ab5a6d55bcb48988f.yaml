title: Magnitude 5.2 earthquake rocks Philippines' Masbate
body: 'MANILA: A magnitude 5.2 earthquake jolted Claveria, Masbate on Tuesday (July 14) afternoon, with aftershocks expected, the Philippine Institute of Volcanology and Seismology (Phivolcs) said.'
