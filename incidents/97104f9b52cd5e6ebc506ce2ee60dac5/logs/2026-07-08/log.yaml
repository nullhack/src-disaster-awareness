log_date: '2026-07-08'
summary: A magnitude 6.6 earthquake struck off the coast of Sarangani, Davao Occidental, Philippines on June 26, 2026, at around 7:34 PM according to Phivolcs. The quake generated reports of strong shaking in nearby areas, and aftershocks are expected. No immediate damage or casualties have been reported in the available excerpts.
