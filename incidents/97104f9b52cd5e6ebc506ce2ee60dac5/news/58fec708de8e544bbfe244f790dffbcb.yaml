title: Reckitt Philippines Inc. donates P283k to PRC for Mindanao earthquake response
body: RECKITT Philippines Inc. has once again demonstrated its steadfast commitment to humanitarian service by donating P283,421 worth of essential hygiene and health products to the Philippine Red Cross (PRC) in support of relief operations for families affected by the magnitude 7.8 earthquake in Mindanao.
