log_date: '2026-07-08'
summary: A magnitude 5.3–5.4 earthquake struck Costa Rica near the town of Orotina and the coastal area of Jacó on July 7, 2026, at approximately 12:11 p.m. local time (1811 GMT). The tremor, with a depth of about 29.4 km, was felt across the Central Pacific, Central Valley, and parts of Guanacaste. No immediate damage or casualties were reported in the initial coverage.
