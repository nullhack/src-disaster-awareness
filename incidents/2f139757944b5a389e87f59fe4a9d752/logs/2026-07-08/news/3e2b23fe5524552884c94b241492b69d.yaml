title: Satellite data helps UNM researchers map massive rupture of 2025 Myanmar earthquake
body: An international team of researchers led by The University of New Mexico set out to understand how these mature faults break during massive seismic events, focusing on a long-debated phenomenon known as the “shallow slip deficit.” In many earthquakes, the surface shifts far less than the rocks deep underground, leaving scientists to question whether the missing energy is absorbed by surrounding rock or simply unmeasured. By analyzing the 2025 Myanmar earthquake, the team aimed to determine how a simple, ancient fault system releases energy, and whether that energy reaches the surface.
