title: 'Thai-Chinese company denies flouting safety measures in probe of skyscraper collapse following quake | The Asahi Shimbun: Breaking News, Japan News and Analysis'
body: BANGKOK--A Thai-Chinese company denied Monday allegations its steel rods did not pass safety standard tests after nationwide criticism prompted an investigation into the collapse of a high-rise building under construction after an earthquake last month in Bangkok.
