log_date: '2026-07-08'
summary: Nestlé recalled several batches of infant formula products (including SMA, BEBA, and NAN) across Europe after detecting cereulide toxin. The EU food safety regulator (EFSA) subsequently set a maximum safe limit for cereulide in infant formula, and France lowered its permitted threshold in response to the recalls. ECDC and EFSA also published a Rapid Outbreak Assessment confirming that continued recalls reduce exposure risk.
