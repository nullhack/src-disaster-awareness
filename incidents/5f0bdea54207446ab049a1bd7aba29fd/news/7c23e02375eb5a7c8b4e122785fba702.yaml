title: Hundreds of pets were rescued following Venezuela’s earthquakes. Now they’re looking for their families | CNN
body: Catira Alejandra couldn’t contain her excitement when she was reunited with her family. Tail wagging, frenzied leaping, and loving licks to the face marked the moment the small dog finally saw the familiar faces she didn’t know if she would see again.
