log_date: '2026-07-24'
summary: |-
  Twin earthquakes in Venezuela caused at least $19.6 billion in direct physical damage, according to World Bank estimates. The country's healthcare system is facing unprecedented strain as thousands are injured and displaced, with international aid organizations struggling to cope. An AP photo captured a mother's anguish as families searched through collapsed buildings for survivors.
  A new report criticizes Venezuela's emergency response, suggesting many of the over 5,000 deaths could have been avoided with professional efforts in the first 72 hours. Global Empowerment Mission is expanding into a second phase of earthquake relief. Additionally, insurer Mapfre estimated losses at €25 million, and CNN reported on hundreds of rescued pets seeking reunification with their families.
