title: 'Report: Many Venezuela quake deaths may have been avoidable | Jefferson City News-Tribune'
body: Many of the more than 5,000 people killed in Venezuela's devastating twin earthquakes might have survived had authorities mounted a professional emergency response during the critical first 72 hours after the disaster, according to a new report that sharply criticizes the government's handling of the crisis.
