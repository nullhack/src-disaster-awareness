title: One frame captures a mother’s anguish during a search through a collapsed building in Venezuela
body: AP photographer Ariana Cubillos photographed a woman praying while families searched the rubble of a collapsed apartment tower in Caraballeda, Venezuela. Cubillos used a telephoto lens to frame the brief moment through cables and other debris.
