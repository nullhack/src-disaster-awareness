  Response: <ul type="disc"><li data-list="0" data-level="1">The Ministry of Health developed a national response plan to guide response      activities. </li><li data-list="0" data-level="1">A National      Incident Management System was activated to coordinate the response to the      event and a national task force was activated, and meetings are held      weekly. At the sub-national level, regular coordination meetings are being      held in Kagera Region. </li><li data-list="0" data-level="1">A national rapid response team was deployed to the affected region to      enhance outbreak investigation and response, with technical and      operational support from WHO and health partners.</li><li data-list="0" data-level="1">WHO has deployed experts to support      the MoH with partner coordination and other response activities in      different pillars.</li><li data-list="0" data-level="1">Surveillance activities continue with active case finding and contact tracing across      affected
    areas. </li><li data-list="0" data-level="1">The mobile      laboratory deployed in Kabaile continues to support the testing of suspect      cases for rapid turnaround time, and samples are referred to the central      public health laboratory in Dar es Salaam for additional tests. Additionally,      genomic sequencing was conducted on the two positive samples. </li><li data-list="0" data-level="1">Screening of travellers departing from Kagera Region continues at key points of      entry and exit, including Bukoba airport. </li><li data-list="0" data-level="1">Healthcare worker sensitization      sessions on infection prevention and control are ongoing across Kagera and      other regions. </li><li data-list="0" data-level="1">The Marburg Treatment Unit has been upgraded with enhanced triage, patient      wards, and donning and doffing areas. Public awareness campaigns,      including health education, door-to-door outreach by community health      workers, and public announcements in
    high-risk areas, are ongoing. </li><li data-list="0" data-level="1">Cross border meetings have been convened between Tanzania, Uganda      and Burundi.</li><li data-list="0" data-level="1">WHO has procured and delivered four VHF kits to Kagera region to      support the response.</li></ul>
