  Title: Marburg Virus Disease–United Republic of Tanzania
  Epidemiology: <p>MVD is a highly virulent disease that can cause severe disease and is clinically similar to Ebola disease (EBOD).&nbsp; EBOD and MVD are caused by orthoebolaviruses and orthomarburgviruses respectively; both are members of the Filoviridae family (filovirus). People become infected after prolonged exposure to mines or caves inhabited by Rousettus fruit bat colonies, a type of fruit bat, that can carry the Marburg virus. &nbsp;Marburg virus then spreads between people via direct contact (through broken skin or mucous membranes) with the blood, secretions, organs or other bodily fluids of infected people, and with surfaces and materials (e.g. bedding, clothing) contaminated with these fluids. Health workers have previously been infected while treating patients with suspected or confirmed MVD. Burial ceremonies that involve direct contact with the body of the deceased can also contribute to the transmission of Marburg virus.</p><p>The incubation period varies from two to 21
    days. Illness caused by Marburg virus begins abruptly, with high fever, severe headache and severe malaise. Severe watery diarrhoea, abdominal pain and cramping, nausea and vomiting can begin on the third day. Although not all cases present with haemorrhagic signs, severe haemorrhagic manifestations may appear between five and seven days from symptoms onset, and fatal cases usually have some form of bleeding, often from multiple areas of the body. In fatal cases, death occurs most often between eight and nine days after symptom onset, usually preceded by severe blood loss and shock. There is currently no approved treatment or vaccine for MVD. Some candidate vaccines and therapeutics are currently under investigation.</p><p>Eighteen outbreaks of MVD have previously been reported globally. The most <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON548">recent</a> outbreak was reported from Rwanda between September and December 2024. Additional countries that previously
    reported outbreaks of MVD in the African Region include Angola, the Democratic Republic of the Congo, Equatorial Guinea, Ghana, Guinea, Kenya, South Africa, the United Republic of Tanzania and Uganda.&nbsp;</p>
  Advice: '<p>Human-to-human transmission of Marburg virus is primarily associated with direct contact with the blood and/or other bodily fluids of infected people. WHO advises the following risk reduction measures be taken as an effective way to reduce MVD transmission and control an outbreak.</p><p><strong>Prevention</strong>: Protective measures individuals should take to reduce human exposure to the virus include: </p><ul><li>Close physical contact with MVD patients should be avoided to reduce the risk of human-to-human transmission in the community arising from direct or close contact with infected patients, particularly with their body fluids. </li><li>People suspected or confirmed for MVD should immediately seek care in health facilities and be isolated in a designated treatment centre for early care and to avoid transmission at home.</li><li>Community and family members should avoid caring for symptomatic individuals at home and avoid touching the bodies of people deceased with MVD
    symptoms. They should avoid touching other potentially contaminated items and surfaces. They should be encouraged to go to a health facility for assessment and treatment if they have symptoms.</li><li>During work or research activities or tourist visits in mines or caves inhabited by fruit bat colonies, people should wear gloves and other appropriate protective clothing (including masks) to reduce the risk of bat-to-human transmission arising from prolonged exposure to mines or caves inhabited by fruit bat colonies. Additionally, during outbreaks, all animal products (blood and meat) should be thoroughly cooked before consumption.</li></ul><p><strong>Coordination:</strong> Multisectoral coordination, pillar meetings and sharing of detailed situation reports is encouraged at all levels involved in the response. The involvement of different stakeholders and partners in preparedness and response activities is also encouraged. To ensure an effective and sustained response, resource mobilization
    efforts within the government and with partners are recommended.</p><p><strong>Risk communication and community engagement</strong>: Raising public awareness and engaging with communities are important for successfully controlling MVD outbreaks. This includes raising awareness of symptoms, risk factors for infection, protective measures and the importance of seeking immediate care at a health facility. This awareness should be increased through targeted campaigns and direct work with communities. Special attention should be given to high-risk groups, such as traditional healers, clergy, and community leaders, who may inadvertently facilitate disease spread, and who are important sources of information for the community. </p><p>Recommendations for responders involved in RCCE for MVD, are available in <a href="https://iris.who.int/bitstream/handle/10665/379761/B09185-eng.pdf?sequence=1">WHO&rsquo;s risk communication and community engagement for Marburg virus disease outbreaks</a>; in
    summary:</p><ul type="disc"><li data-list="3" data-level="1">Allocate sufficient resources to RCCE so at-risk      communities are ready to respond to outbreaks. </li><li data-list="3" data-level="1">Collect, analyse and use social and behavioural      data and evidence to guide MVD readiness and response measures. </li><li data-list="3" data-level="1">Rapidly communicate risks relating to MVD through      multiple channels; share tailored messages that raise awareness, encourage      seeking healthcare, and explain uncertainty. </li><li data-list="3" data-level="1">Address infodemics through integrated community      feedback mechanisms; counter misinformation and rumours with accurate      health information to foster trust and promote early symptom reporting.</li><li data-list="3" data-level="1">Understand, prevent and address MVD stigma and      discrimination.</li><li data-list="3" data-level="1">Involve communities in planning and implementing      MVD readiness and response measures,
    with a particular focus on providing      sensitive and supportive information about safe and dignified burial      practices for those who have died from MVD symptoms.</li></ul><p><strong>Surveillance:</strong> Active case detection, contact tracing, and alert management across affected and neighbouring regions should be intensified. Community-based surveillance systems should be strengthened to promptly identify and report new cases, particularly in high-risk areas. Close monitoring of healthcare workers, family members and individuals who have had contact with suspected cases or other high-exposure settings should be ensured. Surveillance capacities should also be intensified at relevant points of entry and along borders to reduce the risk of further spread, including internationally.</p><p><strong>Infection prevention and control (</strong><strong>IPC) measures</strong>: Critical infection prevention and control measures should be implemented and/or strengthened in all health care
    facilities, per <a href="https://www.who.int/publications/i/item/WHO-WPE-CRS-HCR-2023.1">WHO&rsquo;s Infection prevention and control guideline for Ebola and Marburg disease</a>, which highlights the importance of the rapid implementation of the IPC ring approach including but not limited to IPC rapid assessment, decontamination of the health facilities and household and early detection and identification of the cases through the screening and isolation of the suspected cases to minimize the transmission risk.<strong></strong></p><ul type="disc"><li data-list="0" data-level="1">Health workers caring for      patients with confirmed or suspected MVD should apply <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2%22%20%EF%B7%9FHYPERLINK%20%22https:/www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2">transmission-based precautions</a> in addition to <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1%22%20%EF%B7%9FHYPERLINK%20%22https:/www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1">standard
    precautions</a> including appropriate use of personal protective      equipment (PPE) and hand hygiene according to the <a href="https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21%22%20%EF%B7%9FHYPERLINK%20%22https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21">WHO 5      moments</a> to avoid contact with patient&rsquo;s blood and other      body fluids and with contaminated surfaces and objects. Waste generated in      healthcare facilities must be safely segregated, safely collected,      transported, stored, treated and finally disposed. Follow the national      guidelines, rules and regulations for safe waste disposal or follow the <a href="https://iris.who.int/bitstream/handle/10665/85349/9789241548564_eng.pdf;sequence=1%22%20%EF%B7%9FHYPERLINK%20%22https:/iris.who.int/bitstream/handle/10665/85349/9789241548564_eng.pdf;sequence=1">WHO&rsquo;s
    guidelines on safe waste management</a>&nbsp;</li></ul><ul type="disc"><li data-list="1" data-level="1">Patient-care activities      should be undertaken in a clean and hygienic environment that facilitates      practices related to the prevention and control of health-care-associated      infections (HAIs) as outlined in <a href="https://www.who.int/publications/i/item/9789241547239" target="_blank">Essential environmental health standards in      health care.</a> Safe water, adequate sanitation and hygiene      infrastructure and services should be provided in healthcare facilities.      For details on recommendations and improvement, follow the <a href="" target="_blank" data-sf-ec-immutable="">WASH FIT      implementation Package</a></li></ul><p><strong>Laboratory testing:</strong> The processing and analysis of samples should be expedited, with results promptly shared with responders and clinicians to guide patient management, containment strategies and broader response efforts.
    This includes the sequences resulting from the genomic sequencing of positive samples. International referral of samples to a regional reference laboratory should be considered for inter-laboratory comparison. <a href="https://iris.who.int/handle/10665/380073">Diagnostic testing for Ebola and Marburg virus diseases: interim guidance</a></p><p><strong>Evaluation of candidate medical countermeasures</strong>: There are no licensed vaccines or therapeutics against MVD. Several candidate vaccines are in the pipeline and outbreaks offer an opportunity to assess their efficacy and safety. There are <a href="https://www.who.int/teams/blueprint/ebolavirus">protocols available</a> and a network of experts in filovirus ready to support national researchers. &nbsp;&nbsp;</p><p><strong>Safe and dignified burials</strong>: Safe and dignified burial protocols should be implemented for people who have died to minimize community exposure. Additional training and equipment for healthcare workers and
    burial teams should be provided to ensure safe management of MVD-related fatalities. Thorough community engagement is required to ensure that affected communities are empowered to adhere to the protocol. <a href="https://www.who.int/publications/i/item/WHO-EVD-Guidance-Burials-14.2">How to conduct safe and dignified burial of a patient who has died from suspected or confirmed Marburg virus disease.</a></p><p><strong>Case management and psychosocial support:</strong> Isolation and treatment facilities should be adequately equipped to ensure the safety and efficacy of patient care, while simultaneously preventing the spread of the disease. Supportive care such as rehydration, symptom management, and psychological support for patients and their families is essential to improving survival rates and mitigating the outbreak''s impact.</p><p><strong>Border health and c</strong><strong>ross-border coordination:</strong> Surveillance and response capacities should be strengthened at relevant
    points of entry, onboard conveyances, and in border regions to prevent further spread, including internationally. Cases, contacts and individuals in affected areas who present signs and symptoms compatible with case definitions should be advised not to travel in line with WHO&rsquo;s border health and points of entry technical guidance for filovirus disease outbreaks. Collaboration with neighbouring countries should be enhanced to harmonize reporting mechanisms, conduct joint investigations, and share critical data in real-time. Surrounding countries should enhance readiness activities to enable early case detection, isolation and treatment. <a href="https://www.who.int/publications/m/item/considerations-for-border-health-and-points-of-entry-for-filovirus-disease-outbreaks">Considerations for border health and points of entry for filovirus disease outbreaks</a></p><p><strong>Preparedness and Readiness:</strong> Readiness assessments in high-risk regions should be conducted to ensure
    adequate response mechanisms, such as laboratories and isolation units, are adequately equipped for early detection and management of new cases.</p><p><strong>Travel and Trade:</strong> Based on the current risk assessment, WHO advises against any travel and against any trade restrictions with the United Republic of Tanzania.</p>'
  Assessment: <p>The risk of this MVD outbreak is assessed as&nbsp;<strong>high</strong>&nbsp;at the national level due to several concerning factors. The outbreak thus far involves 10 cases (eight probable and two confirmed), including 10 deaths, resulting in a CFR of 100%. One case was a healthcare worker, highlighting the risk of nosocomial transmission. The source of the outbreak is still unknown. The delayed detection and isolation of cases could lead to a missed chain of transmission.</p><p>The regional risk is considered&nbsp;<strong>high</strong>&nbsp;due to Kagera's strategic location as a transit hub, with significant cross-border movement of the population to Rwanda, Uganda, Burundi and the Democratic Republic of the Congo. This highlights the potential for spread into neighbouring countries. &nbsp;MVD is not easily transmissible (i.e. in most instances, it requires contact with the body fluids of a sick patient presenting with symptoms or with surfaces contaminated with these
    fluids). However, it cannot be excluded that a person exposed to the virus may travel.</p> <p>The global risk is currently assessed as&nbsp;<strong>low</strong>. There is no confirmed international spread at this stage, although there are concerns about potential risks. Kagera region of Tanzania, while not close to the country&rsquo;s capital or major international airports, is well-connected through transportation networks, and has an airport that connects to Dar es Salaam for onward travel outside Tanzania by air. This highlights the need for enhanced surveillance and case management capacities at relevant points of entry and along borders, as well as close coordination with neighbouring countries to strengthen readiness capacities.</p>
  Overview: '<p>Since the previous<a href="https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON552"> </a><a href="https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON552">Disease Outbreak News</a> on this outbreak was published on 14 January 2025, two confirmed cases have been reported, and efforts are ongoing to ascertain the source of infection.</p><p>As of 10 February 2025, a cumulative of 10 cases have been reported including two confirmed and eight probable cases. All cases resulted in death, including eight who died before the confirmation of the outbreak. The two cases confirmed since the outbreak declaration died while in isolation at a designated MVD treatment centre. &nbsp;On 28 January, a safe and dignified burial was performed for the last confirmed case. No new confirmed or probable cases have been reported following this burial.</p><p>The presumptive index case, an adult female, had symptom onset on 9 December and died on 16 December 2024. &nbsp;All
    10 cases were reported from Biharamulo district in Kagera region; the median age of cases was 30 years (range: 1 to 75 years) and the majority of cases (70%, 7) were females. Cumulatively, 90 suspected cases were reported between 20 January and 10 February, all of which tested negative for MVD. </p><p>As of 10 February 2025, all 281 contacts that were listed have completed 21 days of follow-up.</p><p>The <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2023-DON471">first MVD outbreak</a> in Tanzania was reported in March 2023 in Bukoba district in Kagera region, and zoonotic reservoirs, such as fruit bats, remain endemic to the area. The outbreak in March 2023 lasted for nearly two months with nine cases including six deaths. </p><p><strong>Figure 1: Map of district reporting Marburg virus disease confirmed and probable cases in the United Republic of Tanzania, as of 10 February 2025</strong></p><p style="text-align:center;"><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/don-map-mvd-tanzania.png?sfvrsn=44f64167_4"
    alt="Map for DON MVD in Tanzania" sf-size="97405" /></p>'
