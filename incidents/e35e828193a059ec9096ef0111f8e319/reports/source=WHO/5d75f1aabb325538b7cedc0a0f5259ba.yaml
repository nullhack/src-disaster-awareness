  Summary: "Since the declaration of the Marburg Virus Disease (MVD) outbreak on 20 January 2025 in the United Republic of Tanzania, one additional confirmed death was reported by the Ministry of Health from the epicentre of the outbreak in Biharamulo district in Kagera region. \r\nAs of 10 February 2025, a cumulative of two confirmed and eight probable cases were reported by the Ministry of Health. All 10 cases have died, including eight who died before the confirmation of the outbreak. \r\n\r\nAs of 10 February 2025, all 281 contacts that were listed and under monitoring have completed the 21-day follow-up.\r\n\r\nThe Ministry of Health developed a national response plan to guide activities. Additionally, a national rapid response team was deployed to the affected region to enhance outbreak investigation and response, with technical and operational support from WHO and health partners."
