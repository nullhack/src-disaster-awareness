  Title: Marburg virus disease– United Republic of Tanzania
  Epidemiology: <p>MVD is a highly virulent disease that can cause severe disease and is clinically similar to Ebola disease (EBOD). EBOD and MVD are caused by orthoebolaviruses and orthomarburgviruses respectively; both are members of the Filoviridae family (filovirus). People become infected after prolonged exposure to mines or caves inhabited by Rousettus fruit bat colonies, a type of fruit bat that can carry the Marburg virus. &nbsp;Marburg virus then spreads between people via direct contact (through broken skin or mucous membranes) with the blood, secretions, organs or other bodily fluids of infected people, and with surfaces and materials (e.g. bedding, clothing) contaminated with these fluids. Health workers have previously been infected while treating patients with MVD. Burial ceremonies that involve direct contact with the body of the deceased can also contribute to the transmission of Marburg virus.</p><p>The incubation period varies from two to 21 days. Illness caused by the
    Marburg virus begins abruptly, with a high fever, severe headache, and severe malaise. Severe watery diarrhoea, abdominal pain and cramping, nausea, and vomiting can begin on the third day. Although not all cases present with haemorrhagic signs, severe haemorrhagic manifestations may appear between five and seven days from symptom onset, and fatal cases usually have some form of bleeding, often from multiple areas of the body. In fatal cases, death occurs most often between eight and nine days after symptom onset, usually preceded by severe blood loss and shock. There is currently no approved treatment or vaccine for MVD. Some candidate vaccines and therapeutics are currently under investigation.</p><p>Eighteen outbreaks of MVD have previously been reported globally. The most <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON548">recent</a> outbreak was reported in Rwanda between September and December 2024. Additional countries that previously reported outbreaks
    of MVD in the African Region include Angola, the Democratic Republic of the Congo, Equatorial Guinea, Ghana, Guinea, Kenya, South Africa, and Uganda.&nbsp;</p>
  Advice: <p>WHO encourages maintaining early detection and care capacities in addition to sustaining the ability to quickly respond after the outbreak ends. This is to make sure that if the disease re-emerges, health authorities can detect it immediately, prevent the disease from spreading again, and ultimately save lives.</p><p>Raising awareness of risk factors for Marburg virus infection and protective measures that individuals can take is an effective way to reduce human transmission. WHO advises the following risk reduction measures as an effective way to reduce MVD transmission in healthcare facilities and in communities:</p><ul type="disc"><li>Reducing the      risk of bat-to-human transmission arising from prolonged exposure to mines      or caves inhabited by fruit bat colonies. People visiting or working in      mines or caves inhabited by fruit bat colonies should wear gloves and      other appropriate protective clothing (including masks).</li><li>Capabilities for      early
    detection of MVD patients should be maintained over time in settings      at risk of the disease.</li><li>Reducing the      risk of human-to-human transmission in the community arising from direct      or close contact with infected patients, particularly with their body      fluids. Close physical contact with MVD patients should be avoided.      Patients suspected or confirmed for MVD should be isolated in a designated      treatment centre for early care and to avoid transmission at home.</li><li>Communities affected by MVD, along with health authorities, should ensure that the      population is well informed, both about the nature of the disease itself      and about necessary outbreak containment measures.</li><li>Outbreak containment measures include safe and dignified burial of the deceased,      identifying people who may have been in contact with someone infected with      MVD and monitoring their health for 21 days, separating the healthy from      the sick to prevent further
    spread and providing care to the confirmed      patient. Maintaining good hygiene and a clean environment need to be      observed.</li><li>Critical infection prevention and control      measures should be implemented and/or strengthened in all health care      facilities, per&nbsp;<a href="https://www.who.int/publications/i/item/WHO-WPE-CRS-HCR-2023.1">WHO&rsquo;s Infection prevention and control      guideline for Ebola and Marburg disease</a>.&nbsp;Health workers caring for patients with      confirmed or suspected MVD should apply&nbsp;<a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2">transmission-based precautions</a>&nbsp;in addition to:&nbsp;<a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1">standard precautions</a>, including appropriate use of PPE and hand      hygiene according to the&nbsp;<a href="https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21">WHO
    5 moments</a>&nbsp;to avoid contact with patient&rsquo;s blood and      other body fluids and with contaminated surfaces and objects. Waste      generated in healthcare facilities must be safely segregated, collected,      transported, stored, treated and finally disposed. Follow the national guidelines,      rules and regulations for safe waste disposal or follow the&nbsp;<a href="https://iris.who.int/bitstream/handle/10665/85349/9789241548564_eng.pdf;sequence=1">WHO&rsquo;s guidelines on safe waste management</a>.</li><li>Patient-care activities should be      undertaken in a clean and hygienic environment that facilitates practices      related to the prevention and control of health-care-associated infections      (HAIs) as outlined in&nbsp;<a href="https://www.who.int/publications/i/item/9789241547239">Essential environmental health standards in      health care</a>. Safe water, adequate sanitation and hygiene      infrastructure and services should be provided in healthcare facilities.      For
    details on recommendations and improvement, follow the&nbsp;<a href="https://openwho.org/courses/wash-fit">WASH FIT implementation Package</a></li><li>WHO encourages countries to implement a      comprehensive care programme to support people who have recovered from MVD      (if any) with any subsequent sequelae and to enable them to access body      fluid testing and to mitigate the risk of transmission through infected      body fluids by adequate practices.</li></ul><p>Based on the current risk assessment, WHO advises against any travel and trade restrictions with the United Republic of Tanzania.</p>
  Assessment: <p>With two confirmed cases and eight probable cases reported, this is the second MVD outbreak reported in the country in the last three years. Both outbreaks occurred in the same region of Kagera located at the border with Rwanda and Uganda.&nbsp; </p><p>The case fatality ratio of 100% is concerning, although has been recorded in previous outbreaks, additionally 8 of the 10 cases were probable i.e. reported after their death. Late health seeking behaviour in MVD outbreaks increases the risk of further transmission. &nbsp; </p><p>The source of the outbreak is still unknown, and research activities are planned. Based on the outbreak investigation and surveillance activities during the response, which included contact tracing, alert management, active case search, and mortality surveillance, no additional cases have been reported during the 42-day countdown period. However, there remains a risk of re-emergence of MVD following the declaration of the end of the outbreak, linked
    to a new spillover from interactions with the animal reservoir. </p> <p>Based on the available information at the end of MVD outbreak in Tanzania, the risk is considered as&nbsp;moderate<em>&nbsp;</em>at the national level, and low at regional and global levels.</p>
  Overview: '<span style="background-color:transparent;color:inherit;font-family:''Noto Sans'', Arial, Helvetica, sans-serif;font-size:1rem;text-align:center;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Since the last </span><a href="https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON554" style="font-family:''Noto Sans'', Arial, Helvetica, sans-serif;font-size:1rem;text-align:center;text-transform:inherit;word-spacing:normal;white-space:inherit;">Disease Outbreak News </a><span style="background-color:transparent;color:inherit;font-family:''Noto Sans'', Arial, Helvetica, sans-serif;font-size:1rem;text-align:center;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">on this event, published on 14 February 2025, no new confirmed cases of Marburg virus disease (MVD) have been reported in the United Republic of Tanzania.</span><p>As of 12 March 2025, 10 cases have been reported including two confirmed and eight
    probable cases. All cases resulted in deaths, including eight who died before the confirmation of the outbreak and were classified as probable cases, resulting in a case fatality ratio of 100%. </p><p>The first identified case, an adult female, had symptom onset on 9 December and died on 16 December 2024. The last confirmed case died on 28 January, and a safe and dignified burial was performed. No new confirmed or probable cases have been reported following this burial. All 10 cases were reported from Biharamulo district in Kagera region; the median age of cases was 30 years (range: 1 to 75 years) and the majority of cases (70%, 7) were females. </p><p>Cumulatively, 108 suspected cases were reported between 20 January and 11 March, of which 106 tested negative for MVD. </p><p>As of 12 March 2025, 281 contacts had been listed, including nine who were subsequently classified as probable and confirmed cases and 272 contacts who completed 21 days of follow-up.</p><p>On 13 March 2025, after
    two consecutive incubation periods (a total of 42 days) without a new confirmed case being reported after the last confirmed case died on 28 January 2025, the Ministry of Health of the United Republic of Tanzania declared the end of the MVD outbreak, as per WHO recommendations.</p><p><strong>Figure 1: Map of district reporting confirmed and probable Marburg virus disease cases in the United Republic of Tanzania, as of 12 March 2025</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/don-map-mvd-tanzania.png?sfvrsn=44f64167_4" height="469" style="max-width:100%;height:auto;display:block;margin-left:auto;margin-right:auto;" title="DON Map MVD Tanzania" width="504" alt="Map for DON MVD in Tanzania" class="-align-center" sf-size="97405" /></p>'
