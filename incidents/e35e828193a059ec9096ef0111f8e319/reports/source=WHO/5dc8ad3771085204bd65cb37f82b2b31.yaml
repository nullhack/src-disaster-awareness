  Summary: "On 13 March 2025, the Ministry of Health of the United Republic of Tanzania declared the end of the Marburg virus disease (MVD) outbreak. This declaration came after two consecutive incubation periods (a total of 42 days) since the last person confirmed with MVD died on 28 January 2025 and was given a safe and dignified burial, in accordance with WHO recommendations. No new confirmed cases were reported since then.\r\n\r\nThe outbreak was declared on 20 January 2025. As of 12 March 2025, two confirmed and eight probable cases were reported by the Ministry of Health from Biharamulo district in Kagera region. All 10 cases died (case fatality ratio 100%), including eight who died before the confirmation of the outbreak. \r\n\r\nA total of 272 contacts that were listed for monitoring completed their 21-day follow-up as of 10 February 2025.\r\n\r\nWHO, through its country office, and partners provided technical, operational and financial support to the government to contain this outbreak.\
    \ The risk of re-emergence of MVD remains after the official declaration of the end of the outbreak, linked to the animal reservoir’s presence in the country. WHO encourages maintaining early case detection and care capacities in addition to sustaining the ability to quickly respond, and continued risk communication and community engagement."
