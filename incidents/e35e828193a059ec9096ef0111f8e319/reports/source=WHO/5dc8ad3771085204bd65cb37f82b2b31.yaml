  Response: <ul type="disc"><li data-list="0" data-level="1">The Ministry of Health developed a national response plan to guide response      activities. </li><li data-list="0" data-level="1">A National      Incident Management System was activated to coordinate the response to the      event; a national task force was activated, and meetings were held weekly.      At the sub-national level, regular coordination meetings were held daily      in Kagera Region. </li><li data-list="0" data-level="1">A national rapid response team was deployed to Kagera to enhance outbreak      investigation and response, with technical and operational support from      WHO and health partners.</li><li data-list="0" data-level="1">WHO deployed experts to support the Ministry of Health with Emergency      management and partner coordination, clinical management, health      logistics, infection prevention and control, and other response activities      in different pillars.</li><li data-list="0" data-level="1">Surveillance
    activities were conducted with active case finding, contact tracing and      mortality surveillance across affected and neighbouring areas. </li><li data-list="0" data-level="1">The mobile laboratory      deployed in Kabyaile was utilized to support the testing of suspect cases      for rapid turnaround time, and samples were referred to the National Public      Health Laboratory in Dar es Salaam for additional tests. &nbsp;</li><li data-list="0" data-level="1">Travellers departing from the Kagera Region were screened at key points of entry and      exit, including Bukoba airport. </li><li data-list="0" data-level="1">Health and care worker      sensitization sessions on infection prevention and control were conducted across      Kagera and other regions. </li><li data-list="0" data-level="1">The Marburg Treatment Unit was upgraded with enhanced triage, patient wards,      and donning and doffing areas. </li><li data-list="0" data-level="1">Public awareness campaigns were conducted,
    including health education,      door-to-door outreach by community health workers, and public      announcements in high-risk areas.</li><li data-list="0" data-level="1">Cross-border meetings were convened between Tanzania, Uganda, and      Burundi.</li><li data-list="0" data-level="1">WHO procured and delivered four VHF kits to Kagera region to      support care for patients and infection prevention and control measures.<strong></strong></li></ul>
