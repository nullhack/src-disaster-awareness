title: Rubio says U.S. is ready to help end war in Ukraine but no quick deal ahead
body: Secretary of State Marco Rubio, who met with his Russian counterpart Sergey Lavrov, said that President Trump was committed to the work "if conditions and factors have changed to make that possible."
