title: Ukraine’s Drone War Is Choking Kazakhstan’s Oil Exports
body: 'Kazakhstan has emerged as one of the Russia-Ukraine war’s silent victims: its oil is unsanctioned, but the infrastructure carrying it to market is increasingly trapped inside the conflict.'
