log_date: '2026-07-24'
summary: |-
  Ukraine struck additional warehouses of Russia's top online retailer Wildberries and intensified attacks on Ozon, causing economic disruption. In leadership moves, President Zelensky replaced the commander-in-chief with Mykhailo Drapatyi and fired Defense Minister Mykhailo Fedorov, sparking protests. Meanwhile, U.S. Secretary of State Marco Rubio met with Russia's Lavrov in Manila, expressing readiness to help end the war but noting no quick deal is imminent.
  Ukrainian strikes on Russia's Wildberries warehouses produced massive pillars of black smoke as fires raged at the facilities. Russia, stretched by Ukraine's drone attacks on its Black Sea Fleet, has pulled all warships from the Mediterranean Sea. Both sides have increased bridge strikes to disrupt resupply networks, indicating expectations of a prolonged stalemate, while the Kremlin warned against optimism on peace following the Rubio-Lavrov meeting.
