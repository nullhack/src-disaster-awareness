title: US is ready to help end the 'senseless war' in Ukraine but no quick deal ahead — Rubio
body: MANILA, Philippines — US Secretary of State Marco Rubio said Thursday that the Trump administration is poised to help end the “senseless war” in Ukraine but acknowledged there is no quick path to a deal, saying diplomacy will require sustained effort and new ideas.
