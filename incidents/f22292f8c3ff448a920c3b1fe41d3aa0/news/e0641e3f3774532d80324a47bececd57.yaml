title: Ukraine hits Russia's largest online marketplace, hurting small businesses and bringing the war home | Chattanooga Times Free Press
body: The Ukrainian attacks on the sprawling Russian warehouses produced stark images, with massive pillars of black smoke rising above fires that raged at facilities for Wildberries, the country's biggest online retailer and its equivalent of Amazon.
