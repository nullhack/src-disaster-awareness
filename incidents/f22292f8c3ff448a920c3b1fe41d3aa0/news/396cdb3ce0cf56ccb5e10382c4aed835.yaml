title: US is ready to help end the 'senseless war' in Ukraine but no quick deal ahead, Rubio says
body: U.S. Secretary of State Marco Rubio says the Trump administration is ready to help end the war in Ukraine but acknowledges there's no quick path to a deal. Rubio met Thursday with Russian Foreign Minister Sergey Lavrov, who said he emphasized Moscow's readiness for a political resolution. The meeting took place during an ASEAN gathering in Manila, focusing on international conflicts. U.S. efforts to broker peace between Russia and Ukraine have stalled and have been overshadowed by other global tensions. Rubio has warned that Iran would keep facing strikes and said its leaders aren't ready to make a deal. Rubio also discussed maritime disputes with China, highlighting the need for careful management to avoid conflict.
