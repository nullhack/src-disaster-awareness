  Response: <div><p paraid="1140557113" paraeid="{3f28f1fa-5c81-47a7-b823-7b794a5b7297}{205}"><strong>Coordination&nbsp;</strong></p></div><div><p paraid="1986097222" paraeid="{3f28f1fa-5c81-47a7-b823-7b794a5b7297}{211}">The WHO African Regional Office (AFRO) reviewed and expanded the regional incident management support team to ensure that Member States receive the necessary support for managing the mpox outbreak. A critical meeting held in South Africa discussed urgent measures to address the rising number of mpox cases. It also proposed a review of the regional risk assessment given the acute situation. WHO has engaged in technical coordination meetings with the Africa Centres for Disease Control and Prevention (Africa CDC) to develop a joint mpox taskforce. Additionally, both organizations agreed on actions to accelerate the operational response, particularly in strengthening the technical working group on vaccines and enhancing cross-border readiness and surveillance.&nbsp;</p><p paraid="1986097222"
    paraeid="{3f28f1fa-5c81-47a7-b823-7b794a5b7297}{211}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Risk Communication and Community Engagement (RCCE)&nbsp;&nbsp;</strong></p></div><div><p paraid="1758401120" paraeid="{be10ce5c-0c85-4e5a-ad04-15f78b1f752e}{32}">There is ongoing development of an RCCE operational plan in Sud-Kivu, with regular partner meetings to coordinate efforts. Online social listening software called DIGIMIND has been employed to capture discussions and rumours about mpox. This data is analysed to produce reports that inform risk communication strategies. A series of briefings were conducted for 141 stakeholders, including journalists, social mobilizers, and community leaders in South-Kivu and Sankuru Provinces.&nbsp;</p></div><div><p paraid="906682699" paraeid="{be10ce5c-0c85-4e5a-ad04-15f78b1f752e}{76}">WHO has produced and broadcast interactive programs in multiple
    regions and languages, conducted public sensitization, and engaged in home visits and advocacy with political authorities to raise awareness and manage the outbreak.&nbsp;</p><p paraid="906682699" paraeid="{be10ce5c-0c85-4e5a-ad04-15f78b1f752e}{76}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Infection Prevention and Control (IPC)</strong></p></div><div><p paraid="560431325" paraeid="{be10ce5c-0c85-4e5a-ad04-15f78b1f752e}{94}">An IPC Rapid Assessment Tool (RAT) for health facilities has been developed and disseminated to countries that are experiencing an active outbreak of mpox, in order to rapidly assess IPC and WASH capacities to care for mpox patients safely in health facilities. Countries are encouraged to work with partners to support improvements as identified through this rapid assessment.&nbsp; WHO has also published <a href="https://www.who.int/teams/health-care-readiness/infection-prevention-and-control"
    target="_blank" rel="noreferrer noopener">posters for health and care workers on how to put on and remove personal protective equipment</a>. WHO is also coordinating actions with IPC focal points in countries currently experiencing an active outbreak of mpox. WHO is supporting South Africa through a review of protocols, national IPC guidelines for mpox and strengthening the capacity of health and care workers through training.&nbsp;</p><p paraid="560431325" paraeid="{be10ce5c-0c85-4e5a-ad04-15f78b1f752e}{94}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Preparedness and Readiness</strong><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">&nbsp;</span></p></div><div><p paraid="824875172" paraeid="{be10ce5c-0c85-4e5a-ad04-15f78b1f752e}{251}">WHO is supporting Member States to increase their preparedness
    and readiness capacities. Additionally, South Africa has undergone subnational readiness assessments, focusing on non-affected provinces. The organization is supporting the development of contingency plans in priority and bordering countries and will continue to provide technical support to address gaps in readiness.&nbsp;</p><p paraid="824875172" paraeid="{be10ce5c-0c85-4e5a-ad04-15f78b1f752e}{251}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Surveillance</strong></p></div><div><p paraid="1319945481" paraeid="{dd298a25-00d8-4fe9-a809-cf7ce25a01ce}{34}">WHO continuously collects and analyses data from affected countries to monitor the spread and impact of the mpox outbreak, utilizing epidemiological tools to identify trends and transmission patterns. WHO also provides real-time situation reports and implements dashboards to help stakeholders interpret complex data. Training sessions and
    workshops are conducted for national surveillance teams, along with the development and distribution of guidelines and Standard Operating Procedures (SOPs) to ensure consistent surveillance activities.&nbsp;</p></div><div><p paraid="164248840" paraeid="{dd298a25-00d8-4fe9-a809-cf7ce25a01ce}{70}">WHO supports the upgrading of surveillance infrastructure and the implementation of community-based surveillance programs, particularly in high-risk areas such as Internally Displaced People&rsquo;s (IDP) camps. In the short term, WHO&rsquo;s focus is on implementing standardized protocols, deploying real-time reporting systems, enhancing data integration and sharing, building local capacity, and strengthening early warning systems.&nbsp;</p><p paraid="164248840" paraeid="{dd298a25-00d8-4fe9-a809-cf7ce25a01ce}{70}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Laboratory</strong></p></div><div><p
    paraid="238473507" paraeid="{dd298a25-00d8-4fe9-a809-cf7ce25a01ce}{116}">WHO has supported the procurement of laboratory reagents for South Africa and Liberia, and aims to improve logistics for specimen collection and transportation, ensuring timely delivery and adequate supplies across all health facilities. Countries are encouraged to sequence a subset of samples to monitor evolutionary trends and transmission partners.&nbsp;</p><p paraid="238473507" paraeid="{dd298a25-00d8-4fe9-a809-cf7ce25a01ce}{116}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Vaccination</strong></p></div><div><p paraid="1651280715" paraeid="{dd298a25-00d8-4fe9-a809-cf7ce25a01ce}{149}">WHO supports countries in obtaining regulatory approval for vaccine products, identifying target populations, and developing vaccination strategies. WHO provided technical support for a vaccination strategy workshop took place in
    Kinshasa in the Democratic Republic of the Congo, ahead of anticipated deployment of mpox vaccines in the country. WHO is assisting countries in developing research protocols to address existing data gaps.&nbsp;</p><p paraid="1651280715" paraeid="{dd298a25-00d8-4fe9-a809-cf7ce25a01ce}{149}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Case Management</strong></p></div><div><p paraid="1587837517" paraeid="{dd298a25-00d8-4fe9-a809-cf7ce25a01ce}{193}">WHO is supporting the distribution of mpox therapeutics (tecovirimat) to South Africa. Participation in clinical webinars and review of guidelines for mpox dead body management are ongoing. Future efforts include engaging with WHO Country Offices in the Democratic Republic of the Congo and South Africa to develop clinical case identification job aids, creating home-based care guidelines for mild mpox cases, and collaborating with neighbouring
    countries to enhance regional preparedness.&nbsp;</p><p paraid="1587837517" paraeid="{dd298a25-00d8-4fe9-a809-cf7ce25a01ce}{193}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Response measures by country</strong><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">&nbsp;</span></p><p paraid="1587837517" paraeid="{dd298a25-00d8-4fe9-a809-cf7ce25a01ce}{193}"><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"><em>Burundi&nbsp;</em></span></p></div><ul style="margin-left:30px;"><li><p paraid="909159423" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{20}">The national
    Emergency Operations Centre (EOC) has been activated, with support from WHO.&nbsp;&nbsp;</p></li><li><p paraid="1805263214" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{28}">An alert system is in place and surveillance field visits are taking place for validation of alerts, investigation of suspected mpox cases, and contact tracing for confirmed cases. However, the current resources are limited and not sufficient for all surveillance activities.&nbsp;&nbsp;</p></li><li><p paraid="1706651233" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{38}">Laboratory sample analysis is performed at the National Reference Laboratory which has received technical and reagent support from WHO and partners but, nevertheless, faces resource challenges.&nbsp;&nbsp;</p></li><li><p paraid="1070078828" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{44}">Most cases are treated and isolated in hospitals because of the absence of isolation conditions in other health facilities. Case management consists of
    syndromic treatment of mpox.&nbsp;&nbsp;</p></li><li><p paraid="1016672252" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{58}">RCCE activities are ongoing to advise the population on protecting themselves from contracting the disease. Nevertheless, the awareness about the disease among patients and healthcare workers is limited and must be enhanced at all levels.&nbsp;</p></li></ul><p paraid="1016672252" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{58}"><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"><em>Kenya&nbsp;</em></span></p><div><p paraid="743856258" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{86}">Following the confirmation of the mpox case in Kenya, the Ministry of Health has undertaken various response measures, including:&nbsp;&nbsp;</p></div><ul paraid="1015906574" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{96}" style="margin-left:30px;"><li>Public Health Emergency
    Operations has been activated.&nbsp;&nbsp;</li><li><p paraid="1023353682" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{106}">Incident Management Teams have been established to coordinate the response activities.&nbsp;&nbsp;</p></li><li><p paraid="1818352760" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{124}">Draft national mpox response plan and case management guidelines have been developed.&nbsp;&nbsp;</p></li><li><p paraid="1153470202" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{138}">Contact tracing of all patient&rsquo;s close contacts along the travel itinerary in the country is ongoing.&nbsp;&nbsp;</p></li><li><p paraid="1214916870" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{162}">There is heightened surveillance in all counties along the Busia to Mombasa highway and the Mombasa to Taveta Road, to identify all contacts and any other unidentified cases.&nbsp;&nbsp;</p></li><li><p paraid="1064832582" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{170}">Mpox case
    definition has been developed and shared with all counties.&nbsp;</p></li><li><p paraid="417504211" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{178}">Cross-border communication with health authorities in neighbouring countries where the patient travelled to trace all potential contacts is ongoing.&nbsp;&nbsp;</p></li><li><p paraid="318091286" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{196}">Rapid Response Teams have been deployed to support affected counties with detailed investigations.&nbsp;&nbsp;</p></li><li><p paraid="1721833853" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{210}">The evolution of outbreaks in neighbouring countries is being monitored to assess the risk of regional transmission and adjust response measures accordingly.&nbsp;&nbsp;</p></li><li><p paraid="414580808" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{222}">Public sensitization in all counties is ongoing to sensitize on the outbreak, necessary preventive measures, and steps to take if they contract
    the disease, including frequent handwashing with soap and water or hand sanitizer, seeking early treatment, and avoiding close contact with sick persons.&nbsp;&nbsp;</p></li><li><p paraid="2092400448" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{236}">Emergency Hotline Numbers have been provided for the public to report suspected cases and seek further information about the outbreak.&nbsp;</p></li><li><p paraid="605037489" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{250}">The Ministry of Health issued advisories to the health workers and the public, risk communication messages have been developed and disseminated to the public and at the Points of Entry (PoEs).&nbsp;</p></li></ul><p paraid="605037489" paraeid="{57334a76-0536-45fe-8d10-b7ded2fb870d}{250}"><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"><em>Rwanda&nbsp;</em></span></p><div><p paraid="1418393214" paraeid="{a5316ebc-621b-43fa-9250-19720279c87b}{49}">After
    the confirmation of two mpox cases, the Ministry of Health and relevant stakeholders went to Rusizi and Rubavu Districts, which are bordering the Democratic Republic of the Congo where mpox cases are increasing, to conduct a situation analysis which led to the investigations of the confirmed cases. Efforts to contain cases are actively underway, with thorough contact tracing and active case search in high-risk groups in Rubavu, Rusizi, Kicukiro and Gasabo districts. The Ministry of Health, in collaboration with its partners, is continuing to implement the following response interventions:&nbsp; &nbsp;</p></div><div><p paraid="704779479" paraeid="{a5316ebc-621b-43fa-9250-19720279c87b}{149}" style="margin-left:30px;">Coordination leadership:&nbsp;</p></div><ul paraid="1232062586" paraeid="{a5316ebc-621b-43fa-9250-19720279c87b}{155}" style="margin-left:30px;"><li>National Rapid Response Team (RRT) was deployed to support Rusizi and Rubavu Districts and conduct a rapid situation assessment.&nbsp;</li><li>A
    national mpox contingency plan and management guidelines were developed.&nbsp;&nbsp;</li><li>Stakeholders' dissemination meeting was held on 1 August.&nbsp;</li><li><p paraid="1153424105" paraeid="{a5316ebc-621b-43fa-9250-19720279c87b}{203}">&nbsp;A functional mpox Command Post was set up.&nbsp;</p></li></ul><div><p paraid="559135624" paraeid="{a5316ebc-621b-43fa-9250-19720279c87b}{227}" style="margin-left:30px;">Surveillance:&nbsp;</p></div><ul paraid="1665857093" paraeid="{a5316ebc-621b-43fa-9250-19720279c87b}{233}" style="margin-left:30px;"><li>Surveillance has been heightened at PoEs, community, and at health facilities.&nbsp;</li><li>Data collection for suspected and confirmed cases and their contacts.&nbsp;</li><li>Contact tracing and follow-up of close contacts to confirmed cases.&nbsp;</li></ul><div><p paraid="1249740841" paraeid="{90b3762b-85a2-4704-b38e-f6d76bea5d62}{22}" style="margin-left:30px;">RCCE:&nbsp;</p></div><ul paraid="279688725" paraeid="{90b3762b-85a2-4704-b38e-f6d76bea5d62}{30}"
    style="margin-left:30px;"><li>Audio and video spots development.&nbsp;</li><li>TV and radio program on mpox outbreak.&nbsp;</li><li>Translated mpox awareness materials at PoEs.&nbsp;</li><li>Social media assets on mpox awareness and social media influencer engagement on mpox awareness.&nbsp;</li></ul><div><p paraid="2029175103" paraeid="{90b3762b-85a2-4704-b38e-f6d76bea5d62}{96}" style="margin-left:30px;">Case Management and IPC:&nbsp;</p></div><ul paraid="63769201" paraeid="{90b3762b-85a2-4704-b38e-f6d76bea5d62}{106}" style="margin-left:30px;"><li>Isolation and case management of confirmed cases are ongoing.&nbsp;</li><li>Training of Trainers (ToT) for healthcare providers on case management, IPC and referral of suspected cases for testing.&nbsp;</li><li>ToT for community health workers on case identification, IPC and referral of suspected cases at health facilities.&nbsp;</li></ul><div><p paraid="235161420" paraeid="{90b3762b-85a2-4704-b38e-f6d76bea5d62}{146}" style="margin-left:30px;">Diagnostic
    and laboratory capacity:&nbsp;</p></div><ul paraid="1962466802" paraeid="{90b3762b-85a2-4704-b38e-f6d76bea5d62}{152}" style="margin-left:30px;"><li>Ongoing testing of suspected cases and the country has capacity to conduct PCR and genomic sequencing.&nbsp;</li><li><p paraid="1390716048" paraeid="{90b3762b-85a2-4704-b38e-f6d76bea5d62}{164}">ToT for laboratory technicians on mpox sampling.&nbsp;</p></li></ul><p paraid="1390716048" paraeid="{90b3762b-85a2-4704-b38e-f6d76bea5d62}{164}"><em style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Uganda&nbsp;</em></p><p paraid="1390716048" paraeid="{90b3762b-85a2-4704-b38e-f6d76bea5d62}{164}"><em style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></em><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Following
    the confirmation of the mpox cases in Uganda, various response measures have been undertaken, including:&nbsp;&nbsp;</span></p><ul paraid="1245260496" paraeid="{90b3762b-85a2-4704-b38e-f6d76bea5d62}{218}" style="margin-left:30px;"><li>The Ministry of Health and partners, including the WHO, have deployed members of the national and district RRTs.&nbsp;&nbsp;</li><li>A preparedness and response plan are in place, having been approved by the National Task Force of the Ministry of Health.&nbsp;&nbsp;</li><li>The country has employed the Incident Management System (IMS) to respond to all public health emergencies, including the current mpox outbreak.&nbsp;&nbsp;</li><li>Active case-finding is ongoing in all the high-risk and moderate-risk local sub-counties and health facilities, samples are being collected from suspected cases and shipped to both the field-based and national laboratory for testing.&nbsp;</li></ul><p><em style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">C&ocirc;te
    d&rsquo;Ivoire&nbsp;&nbsp;</em></p><ul paraid="1767864548" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{29}" style="margin-left:30px;"><li>The government activated the Public Health Emergency Operations Center on 15 July 2024.&nbsp;&nbsp;</li><li>Epidemiological surveillance has been strengthened, including preparation and distribution of surveillance guidance, as well as contact tracing and contact follow-up. All cases are being investigated and active case and contact search is ongoing.&nbsp;&nbsp;</li><li>Diagnostic capacity has been strengthened and sampling kits have been provided.&nbsp;&nbsp;</li><li>Treatment and isolation are ongoing in hospitals and in the community, and IPC measures around cases and health facilities have been strengthened.&nbsp;&nbsp;</li><li>Public awareness campaigns have also been implemented to inform citizens about preventive measures through mass media channels.&nbsp;</li></ul>
  FurtherInformation: '<div><p paraid="342357716" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{92}"><strong>Situation Reports&nbsp;</strong></p></div><div><p paraid="431361071" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{98}">Mpox situation reports can be found in the following link: <a href="https://www.who.int/emergencies/situation-reports" target="_blank" rel="noreferrer noopener">WHO - Emergency situation reports</a>&nbsp;</p></div><div><p paraid="1666363658" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{115}">The <a href="https://www.who.int/publications/m/item/multi-country-outbreak-of-mpox--external-situation-report-35--12-august-2024" target="_blank" rel="noreferrer noopener">latest situation report</a> published provides details on the latest epidemiological trends, including an update on the geographic expansion of mpox in the WHO African Region from July &ndash; August 2024.&nbsp;&nbsp;</p><p paraid="1666363658" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{115}"><strong
    style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Disease Outbreak News&nbsp;</strong></p></div><div><p paraid="714109909" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{140}">Recently published Disease Outbreak News:&nbsp;&nbsp;</p></div><ul paraid="1666625878" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{152}" style="margin-left:30px;"><li><a href="https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON525" target="_blank" rel="noreferrer noopener">Mpox &ndash; South Africa</a>&nbsp;</li><li><a href="https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON522" target="_blank" rel="noreferrer noopener">Mpox &ndash; Democratic Republic of the Congo</a>&nbsp;</li></ul><p paraid="411518984" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{161}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Further
    Information&nbsp;</strong></p><ul paraid="594077653" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{184}"><li>First meeting of the International Health Regulations (2005) Emergency Committee regarding the upsurge of mpox 2024: <a href="https://www.who.int/news/item/19-08-2024-first-meeting-of-the-international-health-regulations-(2005)-emergency-committee-regarding-the-upsurge-of-mpox-2024" target="_blank" rel="noreferrer noopener">https://www.who.int/news/item/19-08-2024-first-meeting-of-the-international-health-regulations-(2005)-emergency-committee-regarding-the-upsurge-of-mpox-2024</a>&nbsp;&nbsp;</li><li>World Health Organization (2022). Transmission-based precautions for the prevention and control of infections: aide-memoire. Available at: <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2" target="_blank" rel="noreferrer noopener">Transmission-based precautions for the prevention and control of infections: aide-memoire (who.int)</a>&nbsp;</li><li>World Health
    Organization | African Region (2024). Mpox in the WHO African Region: Regional Mpox Bulletin. Available at: <a href="https://iris.who.int/bitstream/handle/10665/378456/AFRO-Mpox%20bulletin%20-11%20August%202024.pdf" target="_blank" rel="noreferrer noopener">AFRO-Mpox bulletin -11 August 2024.pdf (who.int)</a>&nbsp;&nbsp;</li><li>Standing recommendations for mpox issued by the Director-General of the World Health Organization (WHO) in accordance with the International Health Regulations (2005) (IHR); <a href="https://www.who.int/publications/m/item/standing-recommendations-for-mpox-issued-by-the-director-general-of-the-world-health-organization-(who)-in-accordance-with-the-international-health-regulations-(2005)-(ihr" target="_blank" rel="noreferrer noopener">https://www.who.int/publications/m/item/standing-recommendations-for-mpox-issued-by-the-director-general-of-the-world-health-organization-(who)-in-accordance-with-the-international-health-regulations-(2005)-(ihr</a>)&nbsp;</li><li>Risk
    communication and community engagement readiness and response toolkit: mpox, 23 April 2024; <a href="https://www.who.int/publications/i/item/9789240091559" target="_blank" rel="noreferrer noopener">https://www.who.int/publications/i/item/9789240091559</a>&nbsp;</li><li><p paraid="454051940" paraeid="{e09f6325-30e9-41d5-a7f9-64209e0ced2c}{10}">Risk communication and community engagement public health advice on understanding, preventing and addressing stigma and discrimination related to mpox; <a href="https://www.who.int/publications/m/item/communications-and-community-engagement-interim-guidance-on-using-inclusive-language-in-understanding--preventing-and-addressing-stigma-and-discrimination-related-to-monkeypox" target="_blank" rel="noreferrer noopener">https://www.who.int/publications/m/item/communications-and-community-engagement-interim-guidance-on-using-inclusive-language-in-understanding--preventing-and-addressing-stigma-and-discrimination-related-to-monkeypox</a>&nbsp;&nbsp;</p></li><li><p
