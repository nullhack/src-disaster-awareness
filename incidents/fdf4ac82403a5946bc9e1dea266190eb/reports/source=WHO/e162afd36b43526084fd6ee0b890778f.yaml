  Title: Mpox – African Region
  Epidemiology: '<div><p paraid="1944630047" paraeid="{86827577-9c67-4bc0-89bc-0b97e6398b81}{236}">Mpox is an infectious disease caused by the monkeypox virus (MPXV). There are two known clades of MPXV: clade I, previously called the Congo Basin clade, which includes subclades Ia and the recently identified Ib; and clade II, previously called the West African clade, which includes subclades IIa and IIb. Subclades Ia and Ib have been defined based on the emergence of subclade Ib in the South Kivu province of the Democratic Republic of the Congo, where it has predominantly spread through sexual contact. Subclade Ia is currently considered to encompass all other strains of Clade I that are not Ib.&nbsp;</p></div><div><p paraid="1782771878" paraeid="{3f28f1fa-5c81-47a7-b823-7b794a5b7297}{29}">MPXV transmits between humans through close contact with lesions, body fluids, infectious respiratory particles or contaminated materials, or from animals to humans through contact with live animals or
    consumption of contaminated bushmeat. Mpox causes signs and symptoms which usually begin within a week of exposure but can start one to 21 days later. Symptoms typically last for two to four weeks but may last longer in someone with a weakened immune system. Normally, fever, muscle aches and sore throat appear first, followed by skin and mucosal rash. Lymphadenopathy (swollen lymph nodes) is also a typical feature of mpox, present in most cases. Transmission through sexual contact has been observed to lead to the appearance sometimes of only genital lesions. Children, pregnant women and people with weak immune systems are at risk of developing complications and dying of mpox.&nbsp;</p></div><div><p paraid="1921215357" paraeid="{3f28f1fa-5c81-47a7-b823-7b794a5b7297}{95}">It is important to distinguish mpox from chickenpox, measles, bacterial skin infections, scabies, herpes, syphilis, other sexually transmissible infections, and medication-associated allergies. Someone with mpox may also
    concurrently have another sexually transmissible infection such as herpes. Alternatively, a child or adult with suspected mpox may have chickenpox. For these reasons, laboratory testing is important for confirmation of mpox, particularly for the first cases in an outbreak or new geographic area.&nbsp;</p></div><div><p paraid="746210817" paraeid="{3f28f1fa-5c81-47a7-b823-7b794a5b7297}{121}">The primary diagnostic test for MPXV infection is polymerase chain reaction (PCR). The best diagnostic specimens are taken directly from the rash &ndash; skin, fluid or crusts &ndash; collected by vigorous swabbing. In the absence of skin lesions, testing can be done on oropharyngeal, anal or rectal swabs. However, while a positive result of oropharyngeal, anal or rectal sample confirms mpox, a negative result is not enough to rule out MPXV infection. Testing of blood is not recommended. Serology does not distinguish between different orthopoxviruses and is therefore restricted to reference laboratories
    where antibody detection methods may be applied for retrospective case classification or in special studies.&nbsp;&nbsp;&nbsp;</p></div><div><p paraid="1466204248" paraeid="{3f28f1fa-5c81-47a7-b823-7b794a5b7297}{143}">Treatment is based primarily on managing clinical symptoms, ensuring skin care, reducing pain, and preventing and managing complications. Where available through emergency or compassionate use programmes, specific antiviral medications such as tecovirimat can also be used in the treatment of mpox, particularly for severe cases or individuals at higher risk of complications.&nbsp;</p></div><div><p paraid="1790041616" paraeid="{3f28f1fa-5c81-47a7-b823-7b794a5b7297}{153}">Three vaccines are currently available for use to prevent mpox in different countries (MVA-BN, LC16-KMB, and OrthopoxVac - the latter not yet commercialized). WHO recommends use of MVA-BN or LC16 vaccines when the others are not available.&nbsp;&nbsp;</p></div><div><p paraid="1446257427" paraeid="{3f28f1fa-5c81-47a7-b823-7b794a5b7297}{181}">Vaccination
    is recommended by WHO for individuals at high risk of exposure.&nbsp;</p></div>'
  Advice: '<div><p role="heading" aria-level="2" paraid="1945155014" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{10}"><strong>General&nbsp;</strong></p></div><div><p paraid="1807559879" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{16}">Health authorities and clinicians/health and care workers of all countries should be aware that the global mpox outbreak linked to clade IIb MPXV is ongoing in all WHO regions, and Clade I monkeypox virus (MPXV) outbreaks are increasing in Central and East Africa, therefore, the risk of cross-border and international spread persists.&nbsp;</p></div><div><p paraid="971328166" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{26}">WHO strongly advises that countries continue to follow the <a href="https://www.who.int/publications/m/item/standing-recommendations-for-mpox-issued-by-the-director-general-of-the-world-health-organization-(who)-in-accordance-with-the-international-health-regulations-(2005)-(ihr)" target="_blank" rel="noreferrer noopener">Standing
    Recommendations of the Director-General of the WHO</a> issued in August 2023 and extended for another year, as well as the <a href="https://www.who.int/news/item/19-08-2024-first-meeting-of-the-international-health-regulations-(2005)-emergency-committee-regarding-the-upsurge-of-mpox-2024" target="_blank" rel="noreferrer noopener">Temporary Recommendations</a> issued by the Director General after the declaration of the PHEIC.&nbsp;&nbsp;</p></div><div><p paraid="1112187598" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{68}">Countries need to have in place mpox epidemiological surveillance and strengthen laboratory diagnostic capacities in line with updated WHO interim guidance, including genomic sequencing of viruses. Additionally, countries need to have diagnostic capacities capable of detecting both MPXV clades.&nbsp;&nbsp;</p></div><div><p paraid="144453950" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{90}">There must be sustained implementation of risk communication and community
    engagement appropriate to each context, maintenance or initiation of vaccination (where available) for persons at risk, optimal case management, adherence to infection control measures, strengthening research to better appreciate modes of transmission in different contexts, and sustained support for the development of rapid diagnostic methods and treatments adapted to the needs of patients.&nbsp;&nbsp;</p></div><div><p paraid="611083296" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{96}">Where circulation remains low, health authorities should strive to achieve the elimination of human-to-human transmission of mpox and ensure the maintenance of capacity for outbreak response.&nbsp;&nbsp;</p></div><div><p paraid="1317630427" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{106}">Anyone with a clinical or laboratory-confirmed diagnosis of mpox should follow the instructions of health authorities according to the local context, possibly including isolation during the infectious period.
    Mpox cases should avoid travel, including international travel, unless the reason for travel is seeking mpox medical care, until they do not present any mpox symptoms and the scabs of their lesions have fallen off. Contacts of a confirmed case are asked to limit their movements (and, if necessary, to abstain from sexual relations) for 21 days, the monitoring period for the appearance of possible symptoms.&nbsp;</p></div><div><p paraid="1599054747" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{128}">Smallpox vaccines composed of vaccinia virus also protect against mpox, cross-protecting due to the antigenic similarity of the viruses. Vaccination against mpox is recommended for people possibly at risk of contracting the disease. Mass vaccination is not required nor recommended for mpox at this time.&nbsp;</p></div><div><p paraid="327711701" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{152}">For specific antiviral treatments currently being assessed for effectiveness against mpox,
    such as tecovirimat, access is possible through a request from WHO for compassionate use, application for use under the <a href="https://iris.who.int/handle/10665/352902" target="_blank" rel="noreferrer noopener">WHO </a>MEURI protocol or direct purchase from the manufacturer.&nbsp;&nbsp;</p></div><div><p paraid="162645888" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{173}">It is essential to deepen knowledge in different contexts on the epidemiological links between mpox and HIV infection, their respective and common risk factors for infection and progression to severe disease, optimal case management in the event of co-infection and the effectiveness of vaccines and therapeutic approaches.&nbsp;&nbsp;</p><p paraid="162645888" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{173}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">In the community&nbsp;</strong></p></div><div><p data-ccp-border-bottom="0px
    none #000000" data-ccp-padding-bottom="0px" data-ccp-border-between="0px none #000000" data-ccp-padding-between="0px" paraid="1138478239" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{193}">RCCE activities are vital in motivating affected communities to become aware of the risks and protective behaviours, as well as to understand, prevent and combat stigma and discrimination. Key audiences should be identified, which depending on the context may include health professionals, commercial sex workers, men who have sex with men, trans- and gender-diverse individuals, people working at or attending venues and events where sexual activity takes place, and people at risk of more serious illness (including persons living with untreated or poorly controlled HIV infection).&nbsp;&nbsp;</p></div><div><p data-ccp-border-between="0px none #000000" data-ccp-padding-between="0px" paraid="1112390903" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{221}">Please refer to the <a href="https://www.who.int/publications/i/item/9789240091559"
    target="_blank" rel="noreferrer noopener">WHO RCCE toolkit for mpox</a> for further guidance on risk communication and community engagement.&nbsp;&nbsp;</p></div><div><p paraid="379258626" paraeid="{bd5cc3a9-7f5c-4adf-80ec-b76359e2e220}{238}">It is also crucial that IPC and WASH measures be followed within the community to prevent and control transmission of mpox. Patients diagnosed with non-severe mpox can be isolated at home for the duration of the infectious period, provided a home assessment confirms that IPC and WASH conditions are met in the home setting. Patients being cared for at home should remain in a dedicated, well-ventilated room (e.g., with frequently opened windows) separate from other household members. Items such as eating utensils, linens, towels, electronic devices, and beds should be used exclusively by the person with mpox. Personal items should not be shared. If a health or care worker provides care at home, they should wear appropriate personal protective equipment
    (PPE) (gloves, gown, eye protection, and respirator), perform hand hygiene using soap and water or alcohol-based hand rub (ABHR) according to <a href="https://www.who.int/publications/m/item/five-moments-for-hand-hygiene" target="_blank" rel="noreferrer noopener">WHO''s 5 moments</a>, and clean and disinfect any patient care equipment used and frequently touched surfaces or items. Contaminated laundry from an infected person should not be mixed with other laundry and should be managed in a way that does not produce splashes and particles in the air. Contaminated laundry can be washed in a washing machine using detergent.<sup>[1]</sup> Waste generated in the infected person&rsquo;s area should be placed in a strong bag, securely tied before disposal into the general waste stream (not recycling). Hand hygiene should be performed immediately after disposing of waste.&nbsp;</p></div><div><p paraid="2097633153" paraeid="{1a66dfa8-7f9d-4a5b-bddb-ff9aa7025f19}{96}">Please refer to &ldquo;<a
    href="https://www.who.int/publications/i/item/WHO-MPX-Clinical-and-IPC-2022.1" target="_blank" rel="noreferrer noopener">Clinical management and infection prevention and control for monkeypox: Interim rapid response guidance</a>&rdquo; for further guidance on IPC measures in community settings.&nbsp;</p><p paraid="2097633153" paraeid="{1a66dfa8-7f9d-4a5b-bddb-ff9aa7025f19}{96}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">In healthcare settings&nbsp;</strong></p></div><div><p paraid="10901626" paraeid="{1a66dfa8-7f9d-4a5b-bddb-ff9aa7025f19}{121}">Implementing IPC and WASH measures in healthcare settings is necessary to prevent and control the transmission of mpox. It is important to train health and care workers on the modes of transmission for mpox and the control measures, including following standard and transmission-based precautions to prevent and control transmission of mpox. Screening
    of patients for mpox followed by appropriate patient placement and isolation should be in place. Health-care facilities should ensure health and care workers have access to and appropriately wear PPE (gloves, gown, eye protection, and respirator), adhere to <a href="https://www.who.int/publications/m/item/five-moments-for-hand-hygiene" target="_blank" rel="noreferrer noopener">WHO''s Five Moments</a> for hand hygiene using soap and water or alcohol-based hand rub and ensure frequent cleaning and disinfection of the patient environment. Health and care workers should be reminded to handle and dispose of sharps safely and where possible and avoid the use of sharps on lesions (e.g. avoid deroofing) when collecting specimens. All bodily fluids and solid waste from patients with mpox should be treated as infectious waste. For further guidance on IPC measures that are required when caring for patients with mpox, please refer to the <a href="https://www.who.int/publications/i/item/WHO-MPX-Clinical-and-IPC-2022.1"
    target="_blank" rel="noreferrer noopener">Clinical Management and infection prevention and control for mpox: Interim rapid response guidance</a>.&nbsp;&nbsp;</p></div><div><p paraid="2035331764" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{16}">Fully functioning water, sanitation, hygiene (WASH) and health care waste management services are a critical aspect of IPC practices and ensuring patient safety and quality of care. To ensure that the health care facility is compliant with imperative WASH standards, please refer to WASH FIT: A practical guide for improving quality of care through water, sanitation and hygiene in health care facilities.<sup>[2]</sup>&nbsp;&nbsp; &nbsp;</p></div><div><p data-ccp-border-bottom="0px none #000000" data-ccp-padding-bottom="0px" data-ccp-border-between="0px none #000000" data-ccp-padding-between="0px" paraid="852578948" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{32}">While protecting themselves with recommended measures, health and care workers
    should also ensure that the stigmatization of patients with mpox presenting for care is avoided, and that psychological support is provided when needed.&nbsp;</p><p data-ccp-border-bottom="0px none #000000" data-ccp-padding-bottom="0px" data-ccp-border-between="0px none #000000" data-ccp-padding-between="0px" paraid="852578948" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{32}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">At points of entry&nbsp;</strong></p></div><div><p paraid="1205095725" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{54}">States Parties are recommended to encourage authorities, health and care workers and community groups to provide travellers with relevant information to protect themselves and others before, during and after travel to events or gatherings where mpox may present a risk.&nbsp;</p></div><div><p paraid="1201151054" paraeid="{13e67283-a066-4c0b-b2e5-b7c51d392119}{64}">WHO
    does not recommend any restrictions for travel to and trade with these countries, or any other mpox-affected country.&nbsp;</p></div>'
  Assessment: <div><p paraid="1185826980" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{75}">The current expansion of mpox in the African continent is unprecedented. At least four countries have identified cases for the first time and others, such as C&ocirc;te d&rsquo;Ivoire, are reporting re-emerging outbreaks. The modes of transmission in these countries are not fully described yet and are likely to include exclusive human-to-human transmission.&nbsp;</p></div><div><div><p paraid="724728075" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{101}">Clade I mpox is being identified for the first time outside of the countries that had been previously affected. Initial transmission in the newly affected countries in East Africa and beyond has been linked to travel to or from the Democratic Republic of Congo, but the expansion of the outbreak in Burundi suggests that in some settings, there may already be sustained community transmission. Epidemiological links between confirmed cases are not
    always known, therefore, multiple transmission chains might be ongoing in the different countries, and more undetected cases in the community are likely. Based on available epidemiological data, this clade has been spreading rapidly among adults through close physical contact, including sexual contact identified within networks of sex workers and their clients. As the virus spreads further, the affected groups are changing, with the virus also taking hold within households and other settings.&nbsp;&nbsp;</p></div><div><p paraid="1846531574" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{129}">In areas or congregate settings with high population density as well in high-risk sexual networks, transmission could lead to explosive outbreaks, further compounded by population movements or insecurity. Conversely, the virus can also spread silently along commercial travel routes as in some cases symptoms may be less severe, access to health services in transit may be limited or concerns about
    stigma may cause persons affected to avoid seeking care.&nbsp;&nbsp;&nbsp;</p></div><div><p paraid="1103526960" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{135}">While vaccination against smallpox was shown in the past to be cross-protective against mpox, any immunity from smallpox vaccination will only be present in persons over the age of 42 to 50 years or older, since natural exposure to smallpox and smallpox vaccination programmes ended in 1980 after smallpox eradication. None of the four newly affected countries has access to mpox vaccines or antivirals.&nbsp;&nbsp;&nbsp;</p></div><div><p paraid="1269074348" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{153}">Based on the above, WHO has separately assessed the risk of mpox in the eastern Democratic Republic of the Congo and neighbouring countries as high and in Cote d&rsquo;Ivoire, and other West African countries as moderate. This risk applies to the general population, especially those who have sexual contact with a mpox
    case, as well as health workers if they are not taking appropriate precautions when examining, testing and treating mpox cases.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</p></div><div><p paraid="1931922801" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{175}">Currently no deaths have been reported in the five above mentioned countries, however, there is the potential for increased health impact with wider spread among vulnerable groups such as children, immunocompromised individuals, including persons with uncontrolled HIV infection or advanced HIV disease, or pregnant women in whom mpox can be more severe.&nbsp;&nbsp;</p></div><div><p paraid="1354754300" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{189}">There is concern that the mpox outbreak in Africa will continue to evolve given:&nbsp;&nbsp;</p></div><div><ul role="list"><li data-leveltext="" data-font="Symbol" data-listid="2" data-list-defn-props="{"335552541":1,"335559685":720,"335559991":360,"469769226":"Symbol","469769242":[8226],"469777803":"left","469777804":"","469777815":"hybridMultilevel"}"
    aria-setsize="-1" data-aria-posinset="1" data-aria-level="1" role="listitem"><p paraid="996181676" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{199}">The evidence of possible under-detection and under-reporting of local transmission. Many reported cases have no established epidemiological link and have been identified in different countries and in different locations within each country.&nbsp;&nbsp;</p></li></ul></div><div><ul role="list"><li data-leveltext="" data-font="Symbol" data-listid="2" data-list-defn-props="{"335552541":1,"335559685":720,"335559991":360,"469769226":"Symbol","469769242":[8226],"469777803":"left","469777804":"","469777815":"hybridMultilevel"}" aria-setsize="-1" data-aria-posinset="2" data-aria-level="1" role="listitem"><p paraid="1812908073" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{205}">While all of the governments have activated emergency responses in the countries, with support from in-country and global partners, resources to respond remain limited
    in some of the countries, and resource mobilization may be slow. Technical and financial support is needed to ensure a robust response at national and provincial/local levels.&nbsp;</p></li></ul></div><div><ul role="list"><li data-leveltext="" data-font="Symbol" data-listid="2" data-list-defn-props="{"335552541":1,"335559685":720,"335559991":360,"469769226":"Symbol","469769242":[8226],"469777803":"left","469777804":"","469777815":"hybridMultilevel"}" aria-setsize="-1" data-aria-posinset="3" data-aria-level="1" role="listitem"><p paraid="10463221" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{223}">Although the governments and partners are all mobilized to support adequate patient care for affected patients and introduce vaccines for people at risk, these measures are currently not in place in most countries in Africa, and their acquisition and roll-out will still require some time for implementation.&nbsp;&nbsp;</p></li></ul></div><div><ul role="list"><li data-leveltext="" data-font="Symbol"
    data-listid="2" data-list-defn-props="{"335552541":1,"335559685":720,"335559991":360,"469769226":"Symbol","469769242":[8226],"469777803":"left","469777804":"","469777815":"hybridMultilevel"}" aria-setsize="-1" data-aria-posinset="4" data-aria-level="1" role="listitem"><p paraid="828440002" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{229}">Since some of the countries have not reported mpox before, public awareness of the disease, as well as knowledge about and capacity for identifying it among health and care workers in newly affected countries remains limited.&nbsp;&nbsp;</p></li></ul></div><div><ul role="list"><li data-leveltext="" data-font="Symbol" data-listid="2" data-list-defn-props="{"335552541":1,"335559685":720,"335559991":360,"469769226":"Symbol","469769242":[8226],"469777803":"left","469777804":"","469777815":"hybridMultilevel"}" aria-setsize="-1" data-aria-posinset="5" data-aria-level="1" role="listitem"><p paraid="196469710" paraeid="{08749184-4fa1-4255-ab92-369ddf360111}{239}">Concurrently,
    the global multi-country outbreak of mpox is still ongoing. Countries outside of Africa that seemed to have achieved control of human-to-human transmission continue to detect sporadic cases ` outbreaks, and an unprecedented increase of cases and reporting countries has been observed in the African Region, especially in the Democratic Republic of the Congo, increasing the risk of further transmission in the region and the whole world.&nbsp;</p></li></ul></div></div>
  Overview: '<div><p paraid="1904311452" paraeid="{d73a1699-454f-481f-b30c-84608eaf8385}{90}">Described below are the latest countries in the African region newly affected by mpox, either clade I or clade II, since the start of the multi-country outbreak in 2022. Additional countries in the region are continuing to report cases, please refer to the  <a href="https://worldhealthorg.shinyapps.io/mpx_global/" target="_blank" rel="noreferrer noopener">dashboard recently published</a> for an update on these countries including the latest epidemiological trends.&nbsp;&nbsp;</p><p paraid="1904311452" paraeid="{d73a1699-454f-481f-b30c-84608eaf8385}{90}"><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Central and East Africa&nbsp;</strong><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">&nbsp;</span></p></div><div><p
    paraid="316892560" paraeid="{d73a1699-454f-481f-b30c-84608eaf8385}{153}"><em>Burundi&nbsp;&nbsp;</em></p></div><div><p paraid="307782557" paraeid="{d73a1699-454f-481f-b30c-84608eaf8385}{159}">On 25 July 2024, the Ministry of Health of Burundi declared an outbreak of mpox following the confirmation of three cases by the National Reference Laboratory of the National Institute of Public Health. These cases were identified on 22 July; one case from Kamenge University Hospital, a second case from Kamenge Military Hospital, and the third case from Isare Health District. They reported symptom onset on 24 July including fever, joint pain, and a widespread rash. Samples collected during a multidisciplinary investigation tested positive for mpox on 25 July with PCR. These are the first confirmed mpox cases ever identified in Burundi.&nbsp; &nbsp;</p></div><div><p paraid="1869544443" paraeid="{d73a1699-454f-481f-b30c-84608eaf8385}{219}">As of 17 August 2024, there had been 545 alerts of mpox cases
    since the outbreak declaration, of which 474 suspected cases (86.9%) had been investigated and validated. Of 358 suspected cases tested, 142 (39.7%) tested positive for MPXV. Genomic sequencing analysis has confirmed clade Ib MPXV. No deaths were reported as of 17 August.&nbsp;&nbsp;</p></div><div><p paraid="780824480" paraeid="{e2a9c9a4-a105-4ec4-a531-ca341d1ef9f8}{34}">Confirmed cases have been reported from 26 of the 49 districts (53.1%). The most affected district is Bujumbura Nord, an urban area, with 54 of the 142 confirmed cases (38%). No deaths had been documented at the time of reporting.&nbsp;&nbsp;</p></div><div><p paraid="1568694043" paraeid="{e2a9c9a4-a105-4ec4-a531-ca341d1ef9f8}{78}">Males account for 55.6% of the cases and females for 44.4%. Children under the age of five years make up 28.9% of the cases, followed by those aged from 11 to 20 years (20.4%), and those aged from 21 to 30 years (18.3%).<strong>*</strong><br /></p></div><div><p paraid="1963413295" paraeid="{e2a9c9a4-a105-4ec4-a531-ca341d1ef9f8}{152}"><em>Kenya&nbsp;&nbsp;</em></p></div><div><p
    paraid="1594195816" paraeid="{e2a9c9a4-a105-4ec4-a531-ca341d1ef9f8}{158}">On 29 July 2024, the Ministry of Health confirmed a case of mpox in Taita Taveta County bordering Tanzania. The patient is a 42-year-old Kenyan male residing in Kiambu County (neighbouring Nairobi). The case has a history of travel from Kampala, Uganda, to Mombasa, Kenya, and at the time of identification, the patient was travelling to Rwanda through Tanzania.&nbsp;&nbsp;</p></div><div><p paraid="1992080801" paraeid="{e2a9c9a4-a105-4ec4-a531-ca341d1ef9f8}{228}">As of 13 August, a total of 14 suspected cases had been identified, one case had tested positive for MPXV Clade Ib,12 suspected cases had tested negative, and the test result for one case was pending. This is the first mpox case ever identified in Kenya. No deaths had been reported as of 13 August.&nbsp;&nbsp;</p></div><div><p paraid="1293900953" paraeid="{8f9a3536-c311-4af1-8bd5-85567006bc83}{59}"><em>Rwanda&nbsp;&nbsp;</em></p></div><div><p paraid="612075078"
    paraeid="{8f9a3536-c311-4af1-8bd5-85567006bc83}{65}">On 24 July 2024, IHR National Focal Point (NFP) for Rwanda notified WHO of two laboratory-confirmed mpox cases in Rwanda, and on 27 July, the Ministry of Health declared an outbreak of mpox in the country. The cases included a 33-year-old female (case 1) who frequently travels to the Democratic Republic of the Congo, and a 34-year-old male (case 2) with a recent travel history to the Democratic Republic of the Congo. Case 1 was identified at a point of entry (PoE) and isolated in Rusizi district, and case 2 was identified at Kibagabaga hospital of Gasabo district. Both cases were reported to be in stable condition and under continuous medical follow-up. These are the first confirmed mpox cases ever identified in Rwanda.&nbsp;&nbsp;</p></div><div><p paraid="2057111541" paraeid="{8f9a3536-c311-4af1-8bd5-85567006bc83}{107}">As of 7 August 2024, four confirmed mpox cases and zero deaths had cumulatively been reported by the country. Among
    the two new cases, one is a 34-year-old male, residing in Gasabo District in Kigali. His symptoms started on 15 July 2024 with fever, swollen lymph nodes, sore throat, and rashes on the arms, face and genitals. He had travelled back from Burundi on 12 July 2024 and is currently in isolation. Five close contacts are under follow up. The other case is a 39-year-old Rwandan male, resident of Kicukiro District with travel history to the Democratic Republic of the Congo. He had similar symptoms, along with headache, which started on 12 July 2024. Four of his close contacts have been identified and they are under follow up. Sequencing analysis has confirmed MPXV Clade Ib.&nbsp; &nbsp;</p></div><div><p paraid="318055841" paraeid="{8f9a3536-c311-4af1-8bd5-85567006bc83}{221}"><em>Uganda&nbsp;&nbsp;&nbsp;</em></p></div><div><p paraid="396957388" paraeid="{8f9a3536-c311-4af1-8bd5-85567006bc83}{227}">In June and early July 2024, Kasese District enhanced surveillance for mpox disease along the border
    with the Democratic Republic of the Congo in light of reported increasing cases in the neighbouring country. Following the orientation of screeners at the Bwera point of entry and Bwera Hospital, six suspected cases were identified on 11 July. Samples were collected for laboratory testing from the suspected cases, two of which tested positive for MPXV Clade Ib on 15 July. The first of the confirmed cases is a 37-year-old female and the second case is a 22-year-old female national of the Democratic Republic of the Congo. These are the first mpox cases identified in the country. Both cases had onset of symptoms on 11 July and were confirmed by a PCR test at the Uganda Virus Research Institute on 15 July 2024.&nbsp;</p></div><div><p paraid="1973415186" paraeid="{86827577-9c67-4bc0-89bc-0b97e6398b81}{72}">Investigations revealed that transmission occurred outside Uganda and no secondary transmission has been linked to the two cases as of 12 August 2024. By the same date, 39 suspected cases
    had been reported. Furthermore, 37 contacts of the confirmed cases were under follow-up. No deaths have been reported as of 20 August.&nbsp;&nbsp;</p></div><div><p paraid="106054075" paraeid="{86827577-9c67-4bc0-89bc-0b97e6398b81}{128}"><strong>West Africa&nbsp; </strong>&nbsp;</p></div><div><p paraid="110151977" paraeid="{86827577-9c67-4bc0-89bc-0b97e6398b81}{140}"><em>C&ocirc;te d&rsquo;Ivoire&nbsp;</em>&nbsp;</p></div><div><p paraid="434920384" paraeid="{86827577-9c67-4bc0-89bc-0b97e6398b81}{148}">In July 2024, C&ocirc;te d&rsquo;Ivoire confirmed two non-fatal cases of mpox. The first case is a 46-year-old patient who consulted a doctor on 1 July with a fever, headache and skin rash, in Tabou district, San Pedro region, on the border with Liberia. Mpox was confirmed by the Institut Pasteur de C&ocirc;te d''Ivoire laboratory on 3 July and again on 14 July by the Institute Pasteur in Dakar. The second case is a 20-year-old patient, in the Koumassi health district in Abidjan, who presented
    with skin rash and oral mucosal lesions on 14 July. No epidemiological link between these first two cases has been identified.&nbsp; &nbsp;</p></div><div><p paraid="1351873030" paraeid="{86827577-9c67-4bc0-89bc-0b97e6398b81}{178}">As of 7 August 2024, seven mpox cases had been confirmed in three health districts: Koumassi (one case), Tabou (one case), and Yopougon-Ouest-Songon (five cases). Four of the confirmed cases (57%) are male, and all seven cases are above 15 years of age.&nbsp; Forty contacts have been identified and are being followed up. The country has previously reported mpox, but no cases had been notified since the start of the multi-country outbreak in 2022. The newly detected cases in 2024 belong to clade II MPXV.</p></div>'
