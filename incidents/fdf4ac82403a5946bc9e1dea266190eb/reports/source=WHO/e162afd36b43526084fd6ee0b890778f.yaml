    and infection prevention and control for monkeypox: Interim rapid response guidance, 10 June 2022; <a href="https://www.who.int/publications/i/item/WHO-MPX-Clinical-and-IPC-2022.1" target="_blank" rel="noreferrer noopener">https://www.who.int/publications/i/item/WHO-MPX-Clinical-and-IPC-2022.1</a>&nbsp;</p></li><li><p paraid="421288406" paraeid="{e09f6325-30e9-41d5-a7f9-64209e0ced2c}{105}">Strategic framework for enhancing prevention and control of mpox (2024-2027): <a href="https://www.who.int/publications/i/item/9789240092907" target="_blank" rel="noreferrer noopener">https://www.who.int/publications/i/item/9789240092907</a>&nbsp;</p></li><li><p paraid="1363425699" paraeid="{e09f6325-30e9-41d5-a7f9-64209e0ced2c}{118}">2022-24 Mpox (Monkeypox) Outbreak: Global Trends: <a href="https://worldhealthorg.shinyapps.io/mpx_global/" target="_blank" rel="noreferrer noopener">https://worldhealthorg.shinyapps.io/mpx_global/</a>&nbsp;</p></li><li><p paraid="995841017" paraeid="{e09f6325-30e9-41d5-a7f9-64209e0ced2c}{131}">Surveillance,
    case investigation and contact tracing for mpox (monkeypox): interim guidance, 20 March 2024&lrm;:&nbsp; <a href="https://www.who.int/publications/i/item/WHO-MPX-Surveillance-2024.1" target="_blank" rel="noreferrer noopener">https://www.who.int/publications/i/item/WHO-MPX-Surveillance-2024.1</a>&nbsp;&nbsp;&nbsp;</p></li><li><p paraid="1949154518" paraeid="{e09f6325-30e9-41d5-a7f9-64209e0ced2c}{146}">Diagnostic testing for the monkeypox virus (MPXV): Interim guidance, 10 May 2024: <a href="https://www.who.int/publications/i/item/WHO-MPX-Laboratory-2024.1" target="_blank" rel="noreferrer noopener">https://www.who.int/publications/i/item/WHO-MPX-Laboratory-2024.1</a>&nbsp;&nbsp;&nbsp;</p></li><li><p paraid="858230872" paraeid="{e09f6325-30e9-41d5-a7f9-64209e0ced2c}{157}">Meeting of the Strategic Advisory Group of Experts on Immunization, March 2024: conclusions and recommendations: <a href="https://iris.who.int/handle/10665/376936" target="_blank" rel="noreferrer noopener">https://iris.who.int/handle/10665/376936</a>&nbsp;</p></li><li><p
    paraid="1014997676" paraeid="{e09f6325-30e9-41d5-a7f9-64209e0ced2c}{166}">Highlights from the Meeting of the Strategic Advisory Group of Experts (SAGE) on Immunization&nbsp;<br />11-13 March 2024:&nbsp; <a href="https://cdn.who.int/media/docs/default-source/immunization/sage/2024/march/sage-meeting-highlights_v3-march2024.pdf?sfvrsn=b7e9f570_2&amp;download=true" target="_blank" rel="noreferrer noopener">https://cdn.who.int/media/docs/default-source/immunization/sage/2024/march/sage-meeting-highlights_v3-march2024.pdf?sfvrsn=b7e9f570_2&amp;download=true</a>&nbsp;</p></li><li><p paraid="743856628" paraeid="{e09f6325-30e9-41d5-a7f9-64209e0ced2c}{177}">WHO. Standard precautions for the prevention and control of infections: aide-memoires: <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1ge-" target="_blank" rel="noreferrer noopener">https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1ge-</a>&nbsp;</p><p><sup>[1] </sup>Department of Health and Aged Care. (2022).
    Interim guidance on monkeypox at home or in a nonhealthcare setting. Accessed at: https://www.health.gov.au/sites/default/files/2022-12/iceg-interim-guidance-on-the-infection-prevention-and-control-of-monkeypox-at-home-or-in-a-non-healthcare-setting.pdf </p><p><sup>[2]</sup> Water and Sanitation for Health Facility Improvement Tool (WASH FIT). (n.d.). Available at: <a href="https://www.who.int/publications/i/item/9789241511698">https://www.who.int/publications/i/item/9789241511698</a>&nbsp; &nbsp;</p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"><strong>*Corrigendum</strong>:&nbsp;</span>The distribution percentages of cases by age group in Burundi have been corrected. The revised data is as follows: Children under the age of five years make up 28.9% of the cases, followed by those aged from 11 to 20 years (20.4%), and those aged from 21 to 30 years (18.3%).</p></li></ul><div><p paraid="738692707"
    paraeid="{e09f6325-30e9-41d5-a7f9-64209e0ced2c}{190}">Citable reference: World Health Organization (22 August 2024). Disease Outbreak News; Mpox in African Region. Available at:&nbsp;&nbsp;&nbsp; <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON525" target="_blank" rel="noreferrer noopener">https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON528</a>&nbsp;</p></div>'
  Summary: "On 14 August 2024, the WHO Director-General determined that the upsurge of mpox in the Democratic Republic of the Congo and a growing number of countries in Africa constitutes a Public Health Emergency of International Concern (PHEIC) under the International Health Regulations (2005) (IHR), the highest level of alarm under the IHR. Here we describe the latest countries in the region newly reporting cases since the start of the multi-country outbreak in 2022.  \r\n\r\nThe clade Ib MPXV outbreak, which began in September 2023 in the Democratic Republic of the Congo, is having an increasing number of cases in the country and also expanding to neighbouring countries. Burundi, Kenya, Rwanda and Uganda have each reported their first mpox cases. Several of these cases have travel links to eastern parts of the Democratic Republic of the Congo and each of these countries has identified clade Ib monkeypox virus (MPXV). Based on available epidemiological data, this clade has been spreading\
    \ rapidly among adults through close physical contact, including sexual contact identified within networks of sex workers and their clients. As the virus spreads further, the affected groups are changing, with the virus also taking hold within households and other settings. Additionally, Cote d’Ivoire is reporting cases of clade II mpox for the first time since the start of the multi-country outbreak in 2022."
