  Response: '<p>In both countries, multidisciplinary rapid response teams, comprising personnel from the ministries of health and veterinary services at both national and subnational levels, have been deployed to conduct thorough investigations and implement outbreak response measures. These efforts are being conducted in coordination with local authorities, ministries of agriculture and livestock, and partners, including WHO, FAO and WOAH.</p><p>In Senegal, as part of the response to the RVF outbreak, regional coordination teams have been set up in each affected region, using a One Health approach, with the designation of regional incident managers. A national response coordination unit has also set up a national incident management system, based on the same One Health framework.</p><p>WHO is providing support to Mauritania and Senegal, and is undertaking the following actions:</p><ul type="disc"><li data-list="1" data-level="1">Supporting countries in accelerating the rolling out of key
    priority interventions      accordingly to their national plans: risk communication and community engagement      (RCCE), deployment of SURGE and rapid response teams, briefing of      clinicians, procurement and distribution of supplies, improved      understanding of transmission dynamics. &nbsp;</li><li data-list="1" data-level="1">Supporting surveillance activities and expanding diagnostic capacities at district      level (including trainings) in human and animal health sectors, to      minimize delayed detection, underreporting, and reliance on central PCR      confirmation.&nbsp;</li><li data-list="1" data-level="1">Organizing targeted training for health worker, community health workers and      community-based animal health workers on RVF awareness and preventive      measures, zoonotic and vector risks, case recognition and management as      well as community engagement best practices.&nbsp;</li><li data-list="1" data-level="1">Improving capacities for clinical care for severe
    patients through training,      provision of supplies, and surge capacity as required.&nbsp;</li><li data-list="1" data-level="1">Scaling up RCCE efforts significantly to focus on meaningful engagement with the      most affected groups (e.g. herders, slaughterhouse workers) to raise      awareness of transmission risks, preventive measures, care pathways, and      access to trustworthy information.&nbsp;</li><li data-list="1" data-level="1">Procuring and distributing medical, IPC and laboratory supplies based on country      needs.</li><li data-list="1" data-level="1">Continuing investigation of      transmission patterns, including examination of malaria circulation as      well dual mapping of the human and animal outbreaks.&nbsp;</li><li data-list="1" data-level="1">Supporting digital data management      and production of updated, high-quality sitreps.&nbsp;</li><li data-list="1" data-level="1">Scaling up vector-control      activities, for RVF but also importantly against malaria
    and dengue.&nbsp;</li><li data-list="1" data-level="1">Continuing partner coordination      efforts with FAO, WOAH and other key operational partners and sectors.</li></ul><p>FAO and WOAH<strong> </strong>are undertaking the following in support of national authorities:<strong></strong></p><ul><li>Providing personal protective equipment (PPE) for veterinary laboratories.</li><li>Providing operational support on the ground to strengthen response activities in affected areas.</li><li>Supporting countries with technical expertise and monitoring the animal situation in Senegal, Mauritania and in neighbouring countries. &nbsp;</li><li>Supporting community engagement by disseminating targeted messages to communities with exposure to livestock.&nbsp;</li></ul>'
