  Summary: "Between 20 September and 30 October 2025, a total of 404 confirmed human cases of Rift Valley fever (RVF), including 42 deaths, were reported by national health authorities in two West African countries: Mauritania and Senegal. \r\nRVF is a zoonotic disease, which mainly affects animals, but can also infect humans. The majority of human infections result from contact with the blood or organs of infected animals, but human infections have also resulted from the bites of infected mosquitoes. To date, no human-to-human transmission of RVF has been documented. While RVF often leads to severe illness in animals, its impact in humans varies, ranging from mild flu-like symptoms to severe hemorrhagic fever that can be fatal.\r\nRVF is endemic in both countries, where recurrent outbreaks have been previously reported in both livestock and humans. The risk of further spread remains high, especially with environmental conditions favorable to the proliferation of mosquitoes, periods of heavy\
    \ rains and increased mosquito activity, as well as movements of livestock within country and towards Mali and Gambia for grazing and trade.\r\nThe response to RVF outbreaks requires a One Health approach, based on enhanced collaboration between the human health, animal health and environmental sectors, in both countries and at the regional level.\r\nWHO, in collaboration with the World Organization for Animal Health (WOAH), and the Food and Agriculture Organization of the United Nations (FAO), currently assesses the overall risk as high at the national levels, moderate at the regional level and low at the global level."
