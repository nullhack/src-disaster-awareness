  Title: Rift Valley fever- Mauritania and Senegal
  Epidemiology: '<p>Rift Valley fever (RVF) is a viral zoonotic disease primarily affecting domestic animals in sub-Saharan Africa, including cattle, sheep, goats and camels. Human infection may occur through bites from infected mosquitoes, however the majority of cases result from direct contact with the blood, tissues or organs of infected animals. Occupational groups at highest risk include livestock breeders, farmers, slaughterhouse workers and veterinarians. Humans can become infected by consuming unpasteurized or undercooked milk from infected animals. To date, no human-to-human transmission of RVF has been documented. </p><p>While RVF often leads to severe illness in animals, its impact in humans varies, ranging from mild flu-like symptoms to severe hemorrhagic fever that can be fatal. The majority of the infected individuals experience no symptoms or only mild illness, characterized by fever, general weakness, lower back pain and dizziness. However, a small percentage of patients
    (about 2%) progress to a severe form of the disease, which may manifest in one or more of the following three clinical presentations: ocular form (involving inflammation of the eye), meningoencephalitis (inflammation of the brain), and hemorrhagic form (bleeding).&nbsp;</p>'
  Advice: '<p>RVF is a viral zoonotic disease primarily transmitted by mosquitoes, with transmission dynamics influenced by environmental factors (rainfall and floodings), which predominantly affects domestic animals such as cattle, sheep, camels and goats. Human cases usually occur in the vicinity of animal outbreaks, in areas with favorable conditions for mosquito transmission. The majority of human infections result from direct or indirect contact with the blood or organs of infected animals. Care should be taken when handling sick or dead animals, patients, or biological materials. It is recommended that a One Health approach be applied, integrating animal, human and environmental health efforts into all RVF prevention and control activities. </p><p>During outbreaks, countries need to strengthen their capacity to detect human cases early and ensure adequate patient care. Public awareness campaigns on the risks of RVF transmission and protective measures are essential to reduce infection
    and mortality rates.</p><p><strong>Preventive measures for the public should focus on:</strong></p><ul><li>Reducing the risk of animal-to-human transmission through safe livestock handling and slaughter practices. Maintaining good hand hygiene, including wearing gloves and protective equipment when handling sick animals or infected tissues, or during slaughter. </li><li>Avoiding unsafe consumption of fresh blood, raw milk or animal tissue. In regions where epizootics are reported, all animal products (blood, meat, milk) must be thoroughly cooked before consumption.</li><li>Preventing mosquito bites through vector control measures, including eliminating breeding sites, using insecticide-treated nets and repellents when possible, wearing long, light-colored clothing, and avoiding outdoor activities during peak mosquito activity hours.</li></ul><p><strong>Preventive measures at healthcare facilities </strong><strong>should focus on</strong><strong>: </strong></p><p>Although human-to-human
    transmission of Rift Valley fever (RVF) has never been documented, health care workers caring for suspected or confirmed cases should follow standard precautions when providing care or handling biological samples.</p><p><strong>Measures at the animal level should include:</strong></p><ul type="disc"><li data-list="1" data-level="1">Considerations for restricting or banning livestock      movement to help mitigate the risk of virus spread between infected and      non-infected areas.</li><li data-list="1" data-level="1">Routine livestock vaccination before outbreaks to prevent      epizootics. Vaccination should not be initiated once an outbreak has begun      as use of multi-dose vials and reused needles/syringes could inadvertently      contribute to virus spread.</li></ul><p>WHO does not recommend any travel or trade restrictions to or from Mauritania and Senegal or affected regions based on the current information.</p>'
  Assessment: <p>The current outbreak of RVF in Senegal and Mauritania is unusual in its scale and severity, although both countries are endemic for the disease. It affects several districts in international border areas, particularly along the Senegal River, increasing the risk of inter-regional transmission due to animal movements. In Mauritania, RVF has been confirmed in eastern regions bordering Mali, raising concerns about potential regional spread beyond the Senegal River Basin through livestock movements. </p><p>A high proportion of severe human cases have been reported, potentially reflecting gaps in case detection and limitation in optimized clinical management. In Senegal, approximately 11% of confirmed human cases have presented with hemorrhagic symptoms, of which 20 have resulted in death. The situation is particularly concerning in Mauritania, where the case fatality rate has reached 30% indicating heightened severity. </p><p>As a result, the public health risk is assessed as
    high at the national level, moderate at the regional level and low at the global level. The risk to animal health is considered high at the national level, moderate at the regional level and low at the global level. </p><p>WHO, in collaboration with FAO and WOAH, has carried out a joint rapid risk assessment, which will be revised as new information becomes available.</p>
  Overview: '<p><strong>Mauritania</strong></p><p><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Human cases: </strong><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Between 27 September and 30 October 2025, a total of 46 confirmed human cases of RVF, including 14 associated deaths (case fatality ratio: 30%), were reported in eleven districts from thirteen regions (wilayas), three of which share international borders: Assaba (bordering Mali to the south), Brakna and Trarza (both bordering Senegal along the Senegal River). Out of a total of 190 samples tested, 46 were positive, i.e. a positivity rate of 24.2%.</span></p><p><strong>Animal cases: </strong>On 30 October 2025, the Mauritanian Ministry of Animal Resources reported a total of 62 animal outbreaks, with 235 positive samples out of 1106 collected
    and tested. The first animal cases, involving goats and dromedaries, were reported in August 2025. A total of 235 animal cases, including 71 deaths (two in camels and 14 in goats), have been reported in Aioun (Hodh El Gharbi region) and Timbedra (Hodh Ech Chargui region), both located in the southeast near the border with Mali, as well as in Maghta Lahjar (Brakna region) in the center of the country. In the Brakna region, 46 animal cases and 55 deaths have been reported to WOAH. Affected species include sheep, goats, dromedaries and cattle. </p><p>RVF is endemic in Mauritania. The last major outbreak occurred in 2022, with 47 confirmed human cases, including 23 deaths (case fatality ratio 49%), mainly affecting pastoralists in nine of the fifteen regions. During this outbreak, cattle, camels and small ruminants were also affected, with positivity rates in animals approaching 21.2%.</p><p><strong>Senegal</strong><br /></p><p><strong>Human cases: </strong>Between 20 September and 30 October
    2025, the Republic of Senegal reported a total of 358 confirmed human cases of RVF, including 28 deaths (case fatality rate: 7.8%). The cases were recorded in 22 health districts from eight administrative regions, with the vast majority (78%) reported in the Saint-Louis region. Additional cases have been reported in Dakar (nine cases), Fatick (12 cases), Kaolack (13 cases), Louga (18 cases), Matam (23 cases), Thi&egrave;s (2 cases) and Tambacounda (2 cases). The affected districts in the Saint-Louis region, namely Dagana (32 cases), Pete (9 cases), Podor (32 cases), Richard-Toll (133 cases) and Saint-Louis (73 cases), are all located along the northern border with Mauritania, close to the Senegal River.</p><p><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Animal cases: </strong><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Animal
    infections have been detected in the same areas as human cases. On 23 September 2025, authorities collected 1122 blood samples and four abortion samples from small ruminant herds in the affected villages. Laboratory analyses confirmed 36 positive samples from six herds. As of 29 October 2025, a total of 160 confirmed animal cases of RVF have been reported in sheep, goats and cattle in seven regions of Senegal: Dakar, Fatick, Louga, Matam, Saint-Louis, Tambacounda and Thi&egrave;s. In addition, 640 animal abortions were reported in three regions. As of 22 October 2025, the country has notified WOAH of 26 RVF outbreaks, affecting a total of 59 animals, including two deaths.</span></p><p>RVF is endemic in Senegal, with previous outbreaks affecting both human and animal populations. The last confirmed human case prior to this outbreak was reported in January 2025 in Touba, Diourbel region, while the last human case in the Saint-Louis region was in 2022.<strong></strong></p><p><strong>Figure
    1. Geographic distribution of confirmed human RVF cases (404) and deaths (n=42) in Mauritania and Senegal, September 20 to 30 October 2025.</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/rvf-number-of-cases-and-deaths.jpg?sfvrsn=c9bbe559_3" height="525" style="max-width:100%;height:auto;" title="RVF number of cases and deaths" width="588" alt="RVF number of cases and deaths" sf-size="39315" /><br /></p>'
