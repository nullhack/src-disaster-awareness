  Advice: <p>This event does not change the current WHO recommendations on public health measures and influenza surveillance.</p><p>The public should avoid contact with high-risk environments such as live animal markets/farms and live poultry, or surfaces that might be contaminated by poultry droppings. Additionally, it is recommended to maintain good hand hygiene with frequent washing or the use of alcohol-based hand sanitizer.</p><p>The general public and at-risk individuals should immediately report instances of sick or unexpected animal deaths to veterinary authorities. Consumption of poultry that are sick or have died unexpectedly should be avoided.&nbsp;</p><p>Any person who has had exposure to potentially infected animals or contaminated environments and who feels unwell should seek health care promptly, inform their healthcare provider of their possible exposure, wear a face mask and limit contact with others. For more information, please visit the updated guidance <a href="https://www.who.int/news-room/questions-and-answers/item/influenza-avian">here</a>.
    </p><p>Close analysis of the epidemiological situation, further characterization of the most recent influenza A(H5N1) viruses in both human and animal populations, and serological investigations are critical to assess associated risks to public health and promptly adjust risk management measures.</p><p>There are no specific vaccines for influenza A(H5N1) in humans. However, candidate vaccines have been developed for pandemic preparedness in some countries. WHO continues to update the list of zoonotic influenza candidate vaccine viruses (CVV), which are reviewed and updated twice a year at the WHO consultation on influenza virus vaccine composition.</p><p>WHO advises against implementing travel or trade restrictions based on the current information available on this event. WHO does not advise special traveller screening at points of entry or other restrictions due to the current situation of influenza viruses at the human-animal interface.</p><p>State Parties to the IHR (2005) are required
    to immediately notify WHO of any laboratory-confirmed case of a recent human infection caused by a new subtype of influenza virus. Evidence of illness is not required for this notification.</p>
  Assessment: <p>This is the first human infection with an avian influenza A(H5N1) virus reported by Australia. Most human cases of infection with avian influenza viruses reported to date have been due to exposure to infected poultry or contaminated environments. Currently, the likely source of exposure to the virus in the case remains unknown but likely occurred in India where the patient travelled before onset of illness.</p><p>Human infection can cause severe disease and has a high mortality rate. These A(H5N1) influenza viruses, belonging to different genetic groups, do not easily infect humans, and human-to-human transmission thus far appears unusual. As the virus continues to circulate in poultry, particularly in rural areas, the potential for further sporadic human cases remains.</p><p>Currently, available epidemiological and virological evidence suggests that A(H5) viruses have not acquired the ability of sustained transmission among humans, thus, the likelihood of human-to-human
    spread is low.</p><p>Based on available information, WHO assesses the current risk to the general population posed by this virus as low. The risk assessment will be reviewed if additional virological and epidemiological information becomes available.</p>
  Overview: <p>On 17 May 2024, the WHO Collaborating Centre (WHO CC) for Reference and Research on Influenza in Australia notified the NFP of Australia of a suspected case of human A(H5N1)&nbsp;avian influenza&nbsp;(HPAI) in Melbourne, Victoria. </p><p>The state Victorian Department of Health confirmed this case on 18&nbsp;May&nbsp;2024. Under Article 44, the NFP of Australia advised the NFP of India of the confirmed case on 21&nbsp;May&nbsp;2024. Under Article 8, the IHR NFP of Australia notified WHO of the case on 22 May 2024. </p><p>The case is a 2.5-year-old-female child with no underlying conditions.&nbsp; She had a history of travel to Kolkata, India from 12 to 29 February 2024. She returned to Australia on 1&nbsp;March&nbsp;2024.</p><p>Upon returning to Australia, the child presented at a hospital in Victoria on 2&nbsp;March&nbsp;2024, where she received medical care and was admitted on the same day. On 4 March, the patient was transferred to the intensive care unit at a referral
    hospital in Melbourne, Victoria, due to worsening symptoms, for a period of one week. The patient was discharged from hospital after a 2.5-week admission. The case is now reported to be clinically well. </p><p>The Victorian Department of Health reported on 23 May 2024 that the family advised that the child started to feel unwell on 25&nbsp;February&nbsp;2024, with loss of appetite, irritability and fever, and was taken to a doctor on the evening of 28 February 2024 in India. She was febrile, coughing and vomiting and was given paracetamol. It was not reported to an Australian airport biosecurity officer that the child was unwell when she arrived in Australia on 1&nbsp;March&nbsp;2024.</p><p>Additional information provided by the family indicates that the case did not travel outside of Kolkata, India, and did not have any known exposure to sick persons or animals while in India. It is understood that no close family contacts of the case in Australia or India developed symptoms, as of
    22 May 2024.</p><p>A nasopharyngeal swab and endotracheal aspirate taken on 6 and 7 March respectively tested positive for influenza A at the referral hospital. The samples were sent to the WHO CC for further characterisation on 3 April as part of a batch, as there was insufficient knowledge from the referring practitioners at the hospital to connect the case to the H5N1 virus. Virus genetic sequence obtained from the samples confirmed the subtype A(H5N1) and indicated that the haemagglutinin (HA) gene belonged to clade 2.3.2.1a, which circulates in South-East Asia and has been detected in previous human infections and in poultry.</p>
