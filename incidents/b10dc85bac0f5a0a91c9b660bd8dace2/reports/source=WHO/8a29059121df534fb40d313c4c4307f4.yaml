  Epidemiology: <p>Animal influenza viruses normally circulate in animals but can also infect humans. Infections in humans have primarily been acquired through direct contact with infected animals or contaminated environments. Depending on the original host, influenza A viruses can be classified as avian influenza, swine influenza, or other types of animal influenza viruses.</p><p>Avian influenza virus infections in humans may cause disease ranging from mild upper respiratory tract infection to more severe disease and can be fatal. Conjunctivitis, gastrointestinal symptoms, encephalitis and encephalopathy have also been reported. There have also been several detections of A(H5N1) virus in asymptomatic persons who had exposure to infected birds.</p><p>Laboratory tests are required to diagnose human infection with influenza. WHO periodically updates technical guidance protocols for the detection of zoonotic influenza using molecular methods, e.g., RT-PCR. Evidence suggests that some antiviral
    drugs, notably neuraminidase inhibitors (oseltamivir, zanamivir), can reduce the duration of viral replication and improve prospects of survival in some cases.</p><p>From 2003 to 22 May 2024, 891 cases of human infections with avian influenza A(H5N1), including 463 deaths, have been reported to WHO from 24 countries. Almost all of these cases have been linked to close contact with infected live or dead birds, or contaminated environments.</p><p>India has reported detections of avian influenza A(H5N1) in domestic birds in 2024 to the World Organisation for Animal Health (WOAH). As the virus continues to circulate in poultry, the potential for further sporadic human cases remains. This is the first human infection with avian influenza A(H5N1) reported in Australia.&nbsp;In this case, the exposure likely occurred in India where this clade of A(H5N1) viruses has been detected in birds in the past, although the likely source of exposure to the virus is currently unknown.</p>
