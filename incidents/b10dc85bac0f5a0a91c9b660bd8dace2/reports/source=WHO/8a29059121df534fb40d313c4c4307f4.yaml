  Summary: "On 22 May 2024, the World Health Organization (WHO) was notified of a laboratory-confirmed case of human infection with avian influenza A(H5N1) virus (clade 2.3.2.1a) by the International Health Regulations (IHR) National Focal Point (NFP) of Australia.  This is the first confirmed human infection caused by avian influenza A(H5N1) virus detected and reported by Australia. Although the source of exposure to the virus in this case is currently unknown, the exposure likely occurred in India, where the case had travelled, and where this clade of A(H5N1) viruses has been detected in birds in the past. \r\nAccording to the IHR (2005), a human infection caused by a novel influenza A virus subtype is an event that has the potential for high public health impact and must be notified to the WHO. Based on available information, WHO assesses the current risk to the general population posed by this virus as low."
