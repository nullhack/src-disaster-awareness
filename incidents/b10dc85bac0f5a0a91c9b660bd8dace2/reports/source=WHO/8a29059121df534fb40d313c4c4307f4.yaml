  Response: <p><strong>Australia</strong></p><ul><li>The Australian Government Department of Health and Aged Care convened a Monitoring and Investigation Team (MIT), with the first meeting held on 20 May 2024. Currently the MIT is meeting weekly, to assess any ongoing risk of the overall highly pathogenic avian influenza situation in Australia associated with the confirmed case of H5N1 in Victoria and the current international HPAI outbreaks. The frequency of the MIT meetings will be reassessed, as required.</li><li>The National Incident Centre of the Australian Government, Department of Health and Aged Care, has been activated to coordinate the response to the event.</li><li>The IHR NFP of India was notified on 21 May 2024.</li><li>On 22 May 2024, the Chief Health Officer of Victoria issued a health advisory on their website, informing of a recently reported human case of avian influenza in Victoria. </li><li>On 23 May 2024, the Head of the interim Australian Centre for Disease Control
    issued a media release about Australia&rsquo;s first human case of avian influenza A(H5N1) in Victoria. The interim CDC&rsquo;s website was updated and included public health advice about avian influenza. This included the importance for people who work on a poultry farm or factory, or travelling overseas to countries with avian influenza outbreaks, to get a seasonal influenza vaccination each year which can help prevent avian influenza from mixing with other influenza viruses which may lead to new mutated viruses thus becoming a greater threat to people.&nbsp;</li></ul><p><strong>India</strong></p><ul><li>On receipt of information from IHR NFP Australia, the Ministry of Health and Family Welfare, Government of India, initiated an epidemiological investigation with participation of all relevant sectors.<strong></strong></li></ul>
