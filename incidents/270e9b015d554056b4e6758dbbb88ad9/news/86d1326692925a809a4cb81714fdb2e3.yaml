title: Mexico struck by powerful 7.4 earthquake as buildings shake and tsunami warning issued
body: A powerful 7.4 magnitude earthquake struck near the coast of Mexico's southern state of Chiapas on Friday, triggering a tsunami warning and shaking buildings in neighboring Guatemala and El Salvador.
