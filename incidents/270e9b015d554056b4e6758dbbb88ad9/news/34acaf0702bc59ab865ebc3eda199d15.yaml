title: 7.4-magnitude earthquake shakes Mexico, Guatemala and El Salvador
body: A powerful 7.4 magnitude earthquake strikes near the coast of Mexico's southern state of Chiapas, triggering a tsunami warning and shaking buildings in neighboring Guatemala and El Salvador. No damage is immediately reported by authorities.
