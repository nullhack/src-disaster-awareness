title: '7.4 magnitude earthquake jolts southern MexicoPublished on: July 17, 2026 9:43 PM'
body: Pakistan, July 17 -- A powerful 7.4-magnitude earthquake struck off Mexico's southern coast on Friday, prompting a tsunami warning. The strong tremor was also felt in neighbouring Guatemala and El Salvador.
