title: 'Mexico earthquake: 7.3-magnitude tremor hits Puerto Madero sparking tsunami threat'
body: A magnitude 7.3 earthquake has reportedly struck Puerto Madero, Mexico. The incident was announced on Friday morning by the U.S. Geological Survey, which originally reported it as a 7.4 magnitude before revising it down to 7.
