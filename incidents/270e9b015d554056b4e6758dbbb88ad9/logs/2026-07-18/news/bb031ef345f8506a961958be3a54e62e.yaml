title: 7.3 Magnitude Earthquake Strikes Off Mexico Coast Near Puerto Madero, Tsunami Alert Issued
body: A 7.3 magnitude earthquake struck off Mexico near Puerto Madero at a depth of 10 km, triggering a tsunami alert for Pacific coasts within 186 miles as tremors were felt in Guatemala and El Salvador.
