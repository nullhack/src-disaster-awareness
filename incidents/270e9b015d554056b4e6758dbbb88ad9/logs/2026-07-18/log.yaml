log_date: '2026-07-18'
summary: A powerful earthquake of magnitude 7.3–7.4 struck off the coast of Chiapas, Mexico, near Puerto Madero on July 17, 2026, at a shallow depth of about 10 km. The quake triggered a tsunami warning and was strongly felt in Guatemala and El Salvador, prompting evacuations in some areas. No immediate damage or fatalities were reported, though a series of aftershocks were recorded.
