  Epidemiology: '<p>Mpox is an infectious disease caused by the MPXV, which is part of the genus&nbsp;<em>Orthopoxvirus</em>, that includes the variola virus, the causative agent for smallpox. There are two known clades of MPXV: clade I (previously called the Congo Basin clade), which includes subclades Ia and&nbsp;Ib; and clade II (previously called the West Africa clade), which includes subclades&nbsp;IIa&nbsp;and clade IIb. Subclades Ia and&nbsp;Ib&nbsp;were defined after the emergence of subclade&nbsp;Ib&nbsp;in the South Kivu province of&nbsp;the Democratic Republic of the Congo&nbsp;in 2023, and subclade Ia encompasses all other strains of clade I that are not&nbsp;Ib.​ As reported here, there have also been two cases of the clade&nbsp;Ib/IIb&nbsp;recombinant strain, detected in the UK and in India.</p><p>Mpox spreads&nbsp;among humans through direct close physical contact with an infected person, including sexual contact. Transmission can also occur through indirect contact (with
    contaminated materials),&nbsp;through infectious respiratory particles in limited cases,&nbsp;and from mother to child&nbsp;(vertical transmission).​ Historically&nbsp;mpox was primarily&nbsp;characterized by zoonotic transmission,&nbsp;with outbreaks&nbsp;occurring&nbsp;in tropical rainforest regions of East, Central and West Africa, and occasional exportation&nbsp;of cases&nbsp;to other areas.&nbsp;In the context of zoonotic transmission, which continues to occur in historically endemic areas,&nbsp;MPXV&nbsp;is&nbsp;transmitted&nbsp;to humans&nbsp;through direct contact with infected wild animals (e.g.,&nbsp;through hunting, trapping, or petting), and possibly through processing and consuming infected wild game or their body parts and fluids.&nbsp;To date, animal-to-human transmission has always been documented in or linked to known endemic regions of Africa. All other outbreaks in Africa or in other parts of the world are to date presumed to be due to human-to-human transmission,
    until proven otherwise. Symptoms of mpox in humans include swollen lymph nodes, fever, and a skin rash and/or mucosal lesions that may initially resemble those of other illnesses such as chickenpox (caused by the varicella virus), or sexually transmitted infections such as herpes or syphilis if the rash or lesions appear in the genital or anal region. The ongoing &nbsp;global outbreak has shown that mpox can also present with few lesions, and asymptomatic infection can occur.​ The contribution of pre- and asymptomatic infection to transmission&nbsp;remains&nbsp;poorly understood.&nbsp;</p>'
