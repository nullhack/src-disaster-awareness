  Response: '<p><strong><em>WHO Response: </em></strong></p><p>WHO maintains global mpox surveillance and continues to provide response guidance and support for all countries, including access to diagnostics and vaccines through multi-partner coordination including through the Access and Allocation Mechanism for mpox. WHO and partners are establishing the longer-term International Coordinating Group for mpox vaccine provision (ICG) to further accelerate timely outbreak response and ensure sustainable support for the future. Furthermore, WHO continues to evaluate available rapid diagnostic tests for field use. </p><p><strong><em>Response measures in the United Kingdom: </em></strong></p><p>The United Kingdom Health Security Agency (UKHSA) continues to work closely with the National Health Service England, public health agencies in Scotland, Wales and Northern Ireland, and is monitoring the situation in the United Kingdom and undertaking public health actions in accordance with the <a href="https://www.gov.uk/government/publications/mpox-control-and-elimination-uk-strategy-2025-to-2026/mpox-control-uk-strategy-2025-to-2026">Mpox
    control: UK strategy 2025 to 2026 </a>.</p><p>Public health information was made available to health care providers and the public. Contact tracing was completed in line with national guidance. Contacts were given appropriate health advice, offered vaccination, and monitored for symptoms. </p><p>All suspected mpox cases in the UK are tested using Orthopoxvirus-generic, MPXV-generic, and MPXV-specific PCR as primary testing, with clade differentiation assays performed on any positive samples. All samples identified as clade Ib, and selected samples identified as clade IIb cases undergo whole genome sequencing through Illumina-based workflows.<br /></p><p><strong><em>Response measures in India: </em></strong></p><p>Public health measures, including contact tracing and monitoring, were implemented to prevent onward transmission. No secondary case was detected.</p><p>All suspected mpox cases in India are tested using Orthopoxvirus‑generic and MPXV‑specific PCR with clade differentiation
    assays. Positive cases undergo whole genome sequencing through Illumina‑based workflows.</p>'
