  Response: <p>To respond to yellow fever outbreaks, regional and national public health measures have been organized across several domains.</p><p><strong>Coordination - </strong>Countries have developed and rolled out national response plans aimed at tackling YF outbreaks with a focus on preventive measures, improved surveillance, and reactive vaccination campaigns. As per its strategy, the global Eliminate Yellow Fever Epidemics (EYE) secretariat led the coordination of significant preventive and reactive efforts and, notably, during 2023, substantially enhanced vaccination coverage. Approximately 62 million people have been protected in Africa through PMVC and reactive mass vaccination campaigns (RMVC). Also, approximately&nbsp; &nbsp; &nbsp; 17.4 million children are protected through Routine Immunization in Africa. The WHO Regional Office for Africa, in conjunction with the EYE Strategy Secretariat, is supporting countries in their efforts to prevent and respond to YF outbreaks.</p><p><strong>Surveillance</strong>
    - Efforts have been bolstered in some countries including Cameroon, the Central African Republic and Guinea, to enhance their systems for the early detection and monitoring of&nbsp;cases. This includes conducting root cause analyses to understand the factors driving outbreaks and performing immunity gap analyses to pinpoint vulnerable population groups for targeted vaccination efforts.</p><p><strong>Case Management and Vector control</strong>&nbsp;&ndash; Improvements have been made in capacity building for the clinical case management and measures for prevention and control have been enhanced nationally in the most affected countries. Vector control activities have also been planned in urban areas with confirmed YF cases to curb further spread.</p><p><strong>Laboratory testing - </strong>There has been a significant strengthening of capabilities. National reference laboratories have enhanced YF IgM testing and PCR diagnosis capacities in some countries, complemented by regional reference
    laboratories for confirmatory testing. This strengthening extends to national and regional levels, facilitated by EYE strategy operations.</p><p><strong>Vaccination &ndash; </strong>Vaccination<strong> </strong>campaigns form a crucial pillar in the YF outbreak response.<br />In 2023, nearly 62 million individuals received vaccinations under the EYE strategy. This comprised 57.2 million reached through Preventive Mass Vaccination Campaigns (PMVCs) in the Democratic Republic of the Congo, Nigeria, and Uganda, along with 686 405 individuals vaccinated through reactive campaigns in areas including the Central African Republic (Mbaiki), Guinea (Dabola district and Dinguiraye), and Niger (Gazaoua). Additionally, approximately&nbsp; &nbsp;4 million individuals received&nbsp;&nbsp; vaccination against YF under catch-up campaigns in Sudan. All International Coordination Group (ICG) requests for vaccination have been met with funding and technical support, ensuring a timely vaccine supply to
    affected countries.</p><p><strong>Risk Communication and Community Engagement - </strong>These&nbsp;involve targeted communication strategies to enhance awareness about YF risks, preventive measures, and the importance of vaccination, especially targeting hard to reach populations such as nomads, refugees, forest workers, and internally displaced persons. Engagement with these communities is being prioritized to ensure a comprehensive understanding of YF risks and the benefits of vaccination.</p><p>This multi-faceted approach, which covers coordination, surveillance, case management, laboratory enhancement, vaccination, vector control and community engagement, underscores the essential components of the public health response to Yellow Fever outbreaks.</p><p>Despite these robust measures, certain&nbsp;vulnerabilities&nbsp;remain. These include the challenge of competing outbreaks which may divert resources and delay response efforts, surveillance and laboratory challenges characterized
    by inadequate logistics, poor sample collection, and lengthy diagnostics turnaround times, and observed delays in reactive vaccination following yellow fever cases and submissions of ICG requests.</p><p>As of 4 March 2024, WHO is providing technical support to the national health authorities of Burkina Faso, Cameroon, Congo, DRC, South Sudan and Togo to assess the final classification of cases.</p>
