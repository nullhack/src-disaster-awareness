  Title: Yellow fever – African Region (AFRO)
  Epidemiology: <p>Yellow fever is an epidemic-prone, vaccine-preventable disease caused by an arbovirus transmitted to humans primarily through the bites of an infected <em>Aedes spp.</em> and <em>Haemagogus spp.</em> mosquitoes. The incubation period ranges from 3 to 6 days. Many people do not experience symptoms, but when they occur, the most common are fever, muscle pain with prominent back pain, headache, loss of appetite, and nausea or vomiting. In most cases, symptoms disappear after 3 to 4 days. A small percentage of cases progress to a toxic phase with systemic infection affecting the liver and kidneys. These individuals can have more severe symptoms of high-grade fever, abdominal pain with vomiting, jaundice and dark urine caused by acute liver and kidney failure. Bleeding can occur from the mouth, nose, eyes, or stomach.&nbsp; Death can occur within 7 to 10 days in about half of cases with severe symptoms.</p><p>Yellow fever is prevented by an effective vaccine, which is safe
    and affordable. A single dose of yellow fever vaccine is sufficient to grant sustained immunity and life-long protection against yellow fever disease. A booster dose of the vaccine is not needed. The vaccine provides effective immunity within 10 days for 80-100% of people vaccinated, and within 30 days for more than 99% of people vaccinated.</p>
  Advice: <p>Yellow Fever is an epidemic-prone mosquito-borne vaccine- preventable disease transmitted to humans by infected mosquitoes, notably&nbsp;<em>Aedes sp</em>. and&nbsp;<em>Haemagogus</em>&nbsp;species. The urban proliferation of Aedes spp. mosquitoes (day feeders)) can significantly amplify transmission risks, particularly in densely populated areas, leading to swift outbreaks. </p><p><strong>Surveillance and Coordination:</strong>&nbsp;WHO emphasizes the importance of active surveillance, cross-border coordination, and information sharing. Investigating and testing suspected cases is crucial for outbreak control and prevention. Enhanced surveillance with investigation and laboratory testing of suspect cases is recommended.</p><p><strong>Vaccination as a Primary Prevention Tool:</strong>&nbsp;Vaccination is the primary means for prevention and control of YF. The WHO's EYE strategy prioritizes vaccination in countries reporting YF, integrating it into routine immunization schedules
    for individuals aged 9 months and above. Proof of vaccination is required for travellers to and from countries with YF risk, with specific exemptions. The WHO supports the expansion of vaccination coverage through routine programs and mass vaccination campaigns to enhance communal immunity.</p><p><strong>Guidance for International Travelers:</strong>&nbsp;All international travellers aged 9 months and above heading to areas at risk of YF transmission, as determined by WHO, are advised to get vaccinated. The vaccine is deemed safe and effective, offering life-long protection. However, vaccination recommendations for infants under 9 months, and pregnant or breastfeeding women are nuanced, advocating for vaccination in high-risk scenarios after weighing the benefits against potential risks.</p><p><strong>Regulatory Aspects and Vaccine Validity:</strong>&nbsp;Under the International Health Regulations (IHR 2005), countries have the autonomy to require proof of YF vaccination from incoming
    travellers. The International Certificate of Vaccination or Prophylaxis (ICVP) must document this vaccination, with validity extending throughout the vaccinated individual's lifetime. WHO-approved YF vaccines guarantee lifelong immunity, negating the need for booster doses for international travel.</p><p><strong>Vector Control and Risk Communication:</strong>&nbsp;Effective vector control in urban settings and general mosquito bite avoidance strategies are recommended to prevent disease transmission. WHO urges Member States to inform travellers about YF risks, preventive measures, and to seek immediate medical attention if symptoms arise. This approach helps prevent the establishment of local transmission cycles through infected travellers.</p><p><strong>International Travel and Trade:</strong> WHO advises against imposing travel or trade restrictions related to YF. Continuous efforts to educate travellers on preventive measures, including vaccination, are encouraged.</p><p><strong>Additional
    Recommendations:</strong>&nbsp;Given the evolving nature of YF transmission, WHO advises Member States to remain updated with the latest information and guidelines available on the WHO International Travel and Health website. Local health authorities are encouraged to collaborate closely with WHO and other relevant stakeholders to implement effective YF prevention and control measures, ensuring the safety and well-being of populations at risk.</p>
  Assessment: <p>As part of the ongoing efforts to monitor and respond to infectious disease outbreaks,&nbsp;on 12 February 2024, the World Health Organization conducted a Rapid Risk Assessment&nbsp;for yellow fever. It aimed to reassess the current regional risk of multiple ongoing YF outbreaks, in the context of a resurgence of YF outbreaks in countries with a history of preventive vaccination campaigns and persisting immunity gaps, including capacities to support the response (e.g., technical capacities, vaccine supply and vaccination campaigns, laboratory and operations, support and logistics (OSL)) and to provide recommendations for a more effective and coordinated response.</p><p>The overall&nbsp;risk at the regional level<strong>&nbsp;</strong>was re-assessed as&nbsp;moderate based<strong>&nbsp;</strong>on several contributing factors observed in the region despite the efforts to control the spread of YF:</p><ul type="disc"><li>Stable number of&nbsp;ongoing      outbreaks&nbsp;across
    the region.</li><li>Persistence of pockets of unimmunized      populations&nbsp;although considerable efforts have been made in recent      years to protect the population through PMVC and reactive mass vaccination      campaigns (RMVC).</li><li>Detection of YF confirmed cases in      urban areas,<strong>&nbsp;</strong>such as Douala city in Cameroon, which pose      significant risks due to high population density and international travel      connections, noting nevertheless the risk mitigation provided by a      relatively high average vaccination coverage</li><li>Risk of cross-border spread,&nbsp;particularly      from the outbreak in South Sudan, which shares borders with neighbouring      countries.</li><li>Limited surveillance and laboratory      capacity&nbsp;in certain regions may result in delayed detection,      underestimation of the extent of the disease and delayed response.</li><li>Persisting&nbsp;response challenges<strong>&nbsp;</strong>with the case classification,
    investigation, and response operations,      exacerbated by competing health emergencies.</li><li>Competing outbreaks<strong>&nbsp;</strong>strainthe capacity to respond effectively, with various simultaneous health crises,      including measles, poliomyelitis, mpox, cholera, diphtheria, hepatitis E,      Lassa fever, and dengue. These challenges are compounded by factors such      as food insecurity, security constraints, and complex humanitarian      contexts. Furthermore, public health and medical personnel are overburdened,      managing multiple parallel outbreaks alongside other health emergencies.</li><li>Socio-economic factors,&nbsp;high      levels of poverty and limited resource allocation contribute to the      challenge of controlling outbreaks effectively.</li></ul><p>While the global risk remains low, active surveillance is required due to the potential for onward transmission through viremic travellers and the presence of the competent vector in neighbouring regions.</p><p>While
    progress has been made in controlling outbreaks, ongoing challenges and vulnerabilities underscore the need for sustained and coordinated efforts to protect public health. The impact on public health will persist until the ongoing outbreaks are controlled, vaccination coverage is high and immunity gaps in the population closed. The importation of cases to countries with suboptimal coverage and persisting population immunity gaps poses a high risk and may jeopardize the tremendous efforts invested to achieve elimination.</p>
  Overview: '<p>Since the beginning of 2023, and as of 25 February 2024, a total of 13 countries&nbsp;in the WHO African Region have documented probable and confirmed cases of yellow fever (YF), namely Burkina Faso, Cameroon, the Central African Republic, Chad, Republic of the Congo, C&ocirc;te d&rsquo;Ivoire, the Democratic Republic of the Congo (DRC), Guinea, Niger, Nigeria, South Sudan, Togo and Uganda. </p><p>Preliminary data for 2023 indicate a case fatality rate (CFR) of 11% and a sex ratio of 1.7 (M: F). The median age of cases is 25 years, with two-thirds (69%) of cases aged over 15 years. &nbsp;Suboptimal surveillance capacity exists in many affected countries, with data fragmentation, limited integration with routine surveillance and clinical systems, and a lack of standardized case definitions that contribute to underreporting and increased mortality rates.</p><p>During the last quarter of 2023 and as of 25 February 2024, a total of eight countries (Cameroon, Chad, Congo, DRC,
    Guinea, Niger, Nigeria, and South Sudan), have reported active YF transmission with confirmed YF cases&nbsp;(Table 1). These countries have initiated response planning activities.</p><p>Chad, Gabon, Niger, Nigeria, and Togo** are currently awaiting the final classification of the YF laboratory plaque reduction neutralization test (PRNT) positive samples.</p><p><strong>Cameroon: </strong>Three YF cases were confirmed by polymerase chain reaction (PCR) testing, occurring in the weeks ending on 22 October and 13 November 2023. The country recorded probable and confirmed YF cases consistently throughout 2023, starting from the week ending 29 January 2023.</p><p><strong>Chad: </strong>A yellow fever PCR-positive case with negative serology was reported on 18 January 2024 from a patient sampled on 10 October 2023, in the L&eacute;r&eacute; district of the Mayo-Kebbi Ouest region.</p><p><strong>Republic of the Congo: </strong>Cases pending classification with the national health authorities.
    No further information was available as of February 2024.</p><p><strong>Democratic Republic of the Congo: </strong>One YF PCR-positive case with unknown vaccination status was reported on&nbsp; &nbsp; 18 December 2023. Additionally, nine PRNT positive cases were recorded, eight of which have unknown vaccination status and one lacks information in the medical charts.</p><p><strong>Guinea: </strong>Three YF PCR-positive cases were confirmed at the Institute Pasteur Dakar (IPD). These cases were reported on 17 October and 23 December 2023 in a 6-year-old female from Faranah region, a 7-year-old male from the Koundara health district (sample collected on 6 December), and a 60-year-old female from the Gui&eacute;ck&eacute;dou district (sample collected on 15 December), representing three out of the seven country&rsquo;s regions. Notably, this occurrence is less than three years since cases were confirmed in the Koundara health district in 2020 and 2021.</p><p><strong>Niger: </strong>Case
    reported in the Tahoua city, Department of Tahoua during the first week of January 2024. No further information was available as of February 2024. Investigations are ongoing. </p><p><strong>Nigeria: </strong>One YF PRNT-positive case was reported in January 2024 in Lagos state in a 49-year-old male residing in a rural area. Investigations are ongoing.</p><p><strong>South Sudan: </strong>A confirmed YF case was reported on 24 December 2023, following the investigation of suspected cases and deaths of viral hemorrhagic fever. The case, a 24-year-old male, presented with fever, vomiting blood, and jaundice. Two additional cases were confirmed on 2 February 2024. As of 12 February 2024, South Sudan reported a total of 64 cases that fulfil the current outbreak case definition of YF, including 61 suspected cases and three confirmed cases from six out of 10 counties in Western Equatoria state: Yambio (33), Nzara (09), Tambura (12), Ibba (4), Ezo (5) and Maridi Counties (1). Among 61 suspected
    cases, there were six suspected deaths currently under investigation.</p><p><strong>Figure 1. Distribution of reported confirmed yellow fever cases in eight countries in the WHO African Region between 1 October 2023 (EW40/2023) and 21 February 2024 (EW8/2024)&nbsp;</strong><strong></strong></p><p><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/yf_afro.jpg?sfvrsn=2c34b4ff_4" alt="" sf-size="50262" /><br /></p><p><strong>Table 1.</strong> <strong>Classification of reported confirmed yellow fever cases by country in the WHO African Region based on regional reference laboratory results and outputs of classification sessions,&nbsp;from 1 October 2023 (EW40/2023) to 21 February 2024 (EW8/2024). </strong></p><p><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/yf_table_afro.jpg?sfvrsn=62f309da_6" alt="" sf-size="49689" /><br /></p><div><p>Footnotes:</p><p><strong>PRNT</strong>: Plaque reduction neutralization
    test</p><p><strong>RT-qPCR</strong>: quantitative reverse transcriptase-polymerase chain reaction</p><p><strong>Confirmed case</strong>: a confirmed case of yellow fever virus infection by a positive RT-qPCR result</p><p>* Of note, during 2023, Cameroon reported 32 confirmed cases from all 10 country regions, including 23 PRNT-positive and nine RT-PCR-positive cases. Among the six PRNT positive samples, four were rejected. Notably, six cases were classified as confirmed within Douala''s densely populated urban area during Epi Weeks 8 &ndash; 38 of 2023.</p><p><sup>&yen; </sup>Not available</p><p>** Kindly note that one case in Togo is pending classification</p><p>&nbsp;<strong>Togo</strong>&nbsp;- EW 5 (29 Jan 2024) - During EW5, a 7-year-old female presented to the health care facility with fever and jaundice with no other symptoms. The child was vaccinated against YF, five years before and had no history of travel. Laboratory results showed a positive rapid diagnostic test for malaria,
    and she was treated accordingly. In addition, she presented a YF-PRNT result of 1/60. The child fully recovered from symptoms.&nbsp;&nbsp; This case is pending case classification with the Ministry of Health.</p></div>'
