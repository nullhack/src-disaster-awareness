  Summary: "Since the beginning of 2023, and as of 25 February 2024, a total of 13 countries in the WHO African Region have documented probable and confirmed cases of yellow fever (YF), namely Burkina Faso, Cameroon, the Central African Republic, Chad, Republic of the Congo, Côte d’Ivoire, the Democratic Republic of the Congo (DRC), Guinea, Niger, Nigeria, South Sudan, Togo and Uganda. Preliminary data for 2023 indicate a case fatality rate (CFR) of 11%. \r\nWhile the overall risk at the regional level was re-assessed as moderate and the global risk remains low, active surveillance is required due to the potential for onward transmission through travel and the presence of the competent vector in neighboring regions. The urban proliferation of Aedes spp. mosquitoes, which bite during the day, can also significantly amplify transmission risks, particularly in densely populated areas, leading to swift outbreaks.\r\nThe WHO-led global Eliminate Yellow Fever Epidemics (EYE) secretariat coordinated\
    \ preventive and reactive efforts and notably during 2023, substantially enhanced vaccination coverage. Approximately 62 million people have been vaccinated in Africa through preventive and reactive mass vaccination campaigns. Additionally, under catch-up campaigns in Sudan, approximately 4 million individuals received vaccination against YF."
