  Epidemiology: <p>Measles is a highly contagious acute viral disease which affects individuals of all ages and remains one of the leading causes of death among young children globally. The mode of transmission is airborne or via droplets from the nose, mouth, or throat of infected persons.<strong></strong></p><p>Initial symptoms, which usually appear 10-14 days (range 7-23 days) after infection, include high fever, usually accompanied by a runny nose, bloodshot eyes, cough and tiny white spots inside the mouth. The rash usually appears 10-14 days after exposure and spreads from the head to the trunk to the lower extremities. A person is infectious from four days before up to four days after the appearance of the rash. There is no specific antiviral treatment for measles, and most people recover within 2-3 weeks.<br /></p><p>Measles is usually a mild or moderately severe disease. However, measles can lead to complications such as pneumonia, diarrhoea, secondary ear infection, inflammation
    of the brain (encephalitis), blindness, and death. Postinfectious encephalitis can occur in about one in every 1000 reported cases. About two or three deaths may occur for every 1000 reported cases.<br /></p><p>Vaccination with measles containing vaccine is safe and effective, providing protection against measles and its complications for all eligible populations. WHO recommends two doses of Measles Containing Vaccine (MCV) to be provided through the routine immunization schedule. Strong routine immunization systems are therefore critical foundations for achieving and sustaining high levels of population immunity to vaccine preventable diseases such as measles. <br /></p><p>WHO further recommends the conduct of Supplementary Immunization Activities (SIAs) or mass immunization campaigns as an effective strategy for delivering vaccination to children who may have been missed by routine services. In protecting vulnerable populations against measles, mass vaccination campaigns can rapidly
    improve population immunity by reducing the number of susceptible individuals in the population. <br /></p>
