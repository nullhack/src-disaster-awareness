  Response: <p>A nationwide&nbsp;measles-rubella (MR)&nbsp;vaccination campaign was approved by&nbsp;the National Immunization Technical Advisory Group (NITAG)&nbsp;on 30 March 2026, targeting children aged 6&ndash;59 months (with expanded coverage for 6&ndash;8 months), and started&nbsp;on&nbsp;5 April in 30 upazilas (sub-districts) of 18 priority districts. A&nbsp;nationwide campaign commenced on&nbsp;20 April.&nbsp;</p><p>Vitamin A&nbsp;campaign was held throughout the country&nbsp;on 15&nbsp;March&nbsp;2025.&nbsp;&nbsp;During this outbreak response,&nbsp;Vitamin A supplementation&nbsp;is&nbsp;provided&nbsp;to all suspected and confirmed measles cases as an essential&nbsp;component&nbsp;of standard treatment and case management.&nbsp;</p><p>District Rapid Response Teams (RRTs) have been&nbsp;activated,&nbsp;and vaccine procurement fast-tracked by the Ministry of Health.&nbsp;Other outbreak response actions include strengthening routine immunization to prevent further spread of the outbreak,
    enhancing hospital preparedness, ensuring availability of vitamin A, strengthening isolation capacity, and reinforcing infection prevention and control measures.&nbsp;</p><p>Strengthening nationwide surveillance and epidemiological analysis, is also ongoing including measures to improve case detection and reporting. <a name="_Int_QFu5Vy9H" data-sf-ec-immutable="">Trainings&nbsp;are</a> being conducted at health facilities to improve case detection and reporting, and weekly situation reports <a name="_Int_bZMZpTwC" data-sf-ec-immutable="">produced</a> to support evidence-based decision-making.&nbsp;</p><p>National and divisional guidelines have been issued to guide response activities, including vaccination, clinical management, infection prevention and control, patient care pathways, and procurement.&nbsp;</p>
