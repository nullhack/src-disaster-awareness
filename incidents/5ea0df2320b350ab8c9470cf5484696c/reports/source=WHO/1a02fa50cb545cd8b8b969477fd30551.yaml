  Advice: <p>WHO recommends&nbsp;maintaining&nbsp;sustained homogeneous coverage of at least 95% with the first and second doses of the MCV vaccine in all municipalities and strengthening integrated epidemiological surveillance of measles and rubella to achieve&nbsp;timely&nbsp;detection of all suspected cases in public, private, and social security healthcare facilities.&nbsp;&nbsp;</p><p>WHO recommends strengthening epidemiological surveillance in high-traffic border areas to rapidly detect and respond to highly suspected measles cases. Providing a rapid response to imported measles cases to avoid the re-establishment of endemic transmission through the activation of rapid response teams trained for this purpose and by implementing national rapid response protocols when there are imported cases. Once a rapid response team has been activated, continued coordination between the national, sub-national,&nbsp;and local levels must be ensured, with permanent and fluid communication channels
    between all levels. During outbreaks, it is recommended to&nbsp;establish&nbsp;adequate hospital case management to avoid nosocomial transmission, with&nbsp;appropriate referral&nbsp;of patients to isolation rooms (for any level of care) and avoiding contact with other patients in waiting rooms and/or other hospital rooms.&nbsp;&nbsp;</p><p>WHO recommends vaccination of at-risk populations (without proof of vaccination or immunity against measles and rubella), such as healthcare workers, persons working in tourism and transportation (hotels, airports, border crossings, mass transportation, and others), and international travelers. Implementing a plan to immunize migrant populations in high-traffic border areas, prioritizing those considered at-risk, including both migrants and residents, in these municipalities increases vaccination coverage to increase population immunity.&nbsp;&nbsp;<br /></p><p>In all settings, consideration should be given to providing susceptible contacts with post-exposure
    prophylaxis (PEP), including a dose of MCV or normal human immunoglobulin (NHIG) (if available) for those at risk and in whom the vaccine is contraindicated. In well-resourced settings, MCV should be provided to susceptible contacts within 3 days. For contacts for whom vaccination is contraindicated or is not possible within 3 days post-exposure, consideration can be given to providing NHIG up to 6 days post-exposure. Infants, pregnant women, and the immunocompromised should be prioritized.&nbsp;&nbsp;<br /></p><p>WHO recommends&nbsp;maintaining&nbsp;a stock of the MR and/or measles, mumps, rubella (MMR) vaccine, and syringes/supplies for control actions of imported cases. Facilitating access to vaccination services according to the national scheme to those from other countries or people from the same country who perform temporary activities in countries with ongoing outbreaks; displaced populations; indigenous populations, or other vulnerable populations.&nbsp;&nbsp;<br /></p><p>WHO
    does not recommend any&nbsp;restriction&nbsp;on travel and trade based on the information available on the current outbreak. &nbsp;<br /></p>
  Assessment: '<p>Measles is a highly contagious viral disease that affects susceptible individuals of all ages and&nbsp;remains&nbsp;one of the leading causes of death among young children globally. Measles can cause serious illness in at-risk groups, including children under 5 years of age, those who are malnourished especially those with vitamin A deficiency and people with weakened immune systems. Measles complications include hearing loss, diarrhoea, pneumonia and blindness. Severe complications of measles include encephalitis, brain damage, and death.&nbsp;<br /></p> <p>The current outbreak in Bangladesh is occurring in the context of suboptimal population immunity. A substantial proportion of cases occurred among children who were either unvaccinated or had received only one dose of measles-containing vaccine. In addition, some children were infected before reaching the age of eligibility for vaccination at 9 months. Most cases (91%) occurred among children aged 1 to 14 years,&nbsp;indicating&nbsp;substantial
    immunity gaps in this age group.&nbsp;<br /></p> <p>Before this outbreak, Bangladesh had made substantial progress towards measles elimination. Reported coverage with the first dose of measles-containing vaccine increased&nbsp;considerably between&nbsp;2000 (89% - WUENIC) and 2016 (118% - WUENIC), while coverage with the second dose also improved between its nationwide introduction in 2012 (22% - WUENIC) and 2024 (121% - WUENIC). During the same period, confirmed measles incidence declined sharply. However, recent declines in MR1 and MR2 coverage due to nationwide stockout of MR vaccine between 2024-2025, combined with routine immunization gaps and the absence of regular nationwide supplementary measles-rubella campaigns since 2020, have increased&nbsp;the number of susceptible children and contributed to the current outbreak.&nbsp;<br /></p> <p>The risk at the national level is assessed as high due to ongoing transmission across multiple divisions, the&nbsp;large number&nbsp;of susceptible
    children, documented immunity gaps, and the occurrence of suspected measles-related deaths. The concentration of cases among unvaccinated and under-vaccinated children including infants too young to be vaccinated, raises concern for continued uninterrupted transmission and severe disease outcomes.&nbsp;<br /></p> <p>Overall, the outbreak suggests a reversal from Bangladesh&rsquo;s&nbsp;previous&nbsp;progress towards measles elimination and highlights increasing vulnerability to sustained transmission. Continued spread is likely unless urgent measures are implemented to strengthen surveillance, rapidly detect and respond to cases, and close immunity gaps through high-quality vaccination activities.&nbsp;<br /></p> <p>There are considerable risks of cross-border spread,&nbsp;facilitated&nbsp;by cross-border population movement, with major urban&nbsp;centres&nbsp;such as Dhaka, Chattogram, Sylhet, and Cox&rsquo;s Bazar&nbsp;being&nbsp;important international travel and transit hubs&nbsp;increasing
    the likelihood of national and international spread, particularly among unvaccinated or inadequately vaccinated travelers.&nbsp;<br /></p> <p>Measles is endemic across the South-East Asia region. The risk is assessed as high at regional level. </p><p>Bangladesh shares extensive land borders with India and Myanmar, and population mobility across these borders may&nbsp;facilitate&nbsp;continued transmission.&nbsp;In Myanmar there is a considerable number of unvaccinated/zero dose children. With ongoing conflict and humanitarian crisis, surveillance and response capacities are limited. India, despite achieving high vaccination coverage, has reported a rise in case count over the past six months. Cities with high incidence&nbsp;such as&nbsp;Jashore&nbsp;and&nbsp;Chapainawabganj&nbsp;(an identified hotspot) share busy land crossings with India, thereby increasing the risk of introduction across the border. Despite Bangladesh&rsquo;s progress towards measles elimination the current outbreak
    highlights the vulnerability of the population and underscores the fragility of immunization gains. </p><p>The risk at the global level is assessed as moderate due to high levels of population mobility, combined with ongoing widespread measles transmission and immunity gaps.<br /></p> '
  Overview: <p>On 4 April 2026, the National IHR Focal Point of Bangladesh notified WHO of a significant increase in measles cases, driven by sustained domestic&nbsp;transmission. Since&nbsp;January 2026, Bangladesh has experienced a marked increase in measles cases.&nbsp;Geographically, cases have been reported across all eight divisions, in 58 out of 64 districts (91% of districts),&nbsp;indicating&nbsp;widespread transmission nationally.&nbsp;&nbsp;<br /></p><p>Since 15 March 2026 and as of 14 April, a total of 19 161 suspected measles cases and 2973 laboratory-confirmed measles cases have been reported. Moreover, 166 suspected measles-related deaths (CFR 0.9%) and 30 confirmed measles-related deaths (CFR= 1.1%) have been recorded. A total of 12 318 hospital admissions and 9772 hospital discharges have also been reported.&nbsp;<br /></p><p>The highest cumulative burden of suspected measles cases since 15 March 2026 has been reported in Dhaka (8263 cases),&nbsp;Rajshahi&nbsp;(3747 cases),
    Chattogram (2514 cases), and Khulna (1568 cases).&nbsp;In Dhaka, cases are concentrated in densely populated informal settlements, including&nbsp;Demra, Jatrabari, Kamrangirchar,&nbsp;Korail, Mirpur, and Tejgaon industrial and slum clusters.&nbsp; (HEOC, DGHS, 15 April 2026).<br /></p><p>Children aged under 5 years account for&nbsp;the majority of&nbsp;reported cases&nbsp;(79%), including children aged under 2 years (66%) and infants aged under 9 months (33%).&nbsp;A total of&nbsp;166&nbsp;suspected deaths&nbsp;have&nbsp;been&nbsp;reported (CFR&nbsp;1%),&nbsp;mainly among&nbsp;unvaccinated children aged under 2 years.</p>
