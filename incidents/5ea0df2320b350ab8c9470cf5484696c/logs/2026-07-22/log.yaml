log_date: '2026-07-22'
summary: |-
  Four more children died from measles in Bangladesh, raising the death toll to 797. Since March 15, over 102,000 suspected cases have been hospitalized nationwide, and confirmed cases have reached 14,708.
  As of July 22, six more children died from measles or suspected measles symptoms in Bangladesh within the last 24 hours, raising the total death toll to 803. Over 1,030 new suspected cases were reported, bringing total hospitalizations since March 15 to more than 103,000.
