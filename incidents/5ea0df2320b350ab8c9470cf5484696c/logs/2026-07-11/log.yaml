log_date: '2026-07-11'
summary: The measles outbreak in Bangladesh continues to worsen, with three more children dying in the last 24 hours, bringing the death toll to 753. Since March 15, 13,410 confirmed measles cases have been recorded, and 702 new suspected cases were reported. Poor living conditions and malnutrition are cited as driving factors, and the outbreak has expanded internationally with possible measles exposures on flights from Bangladesh to Toronto.
