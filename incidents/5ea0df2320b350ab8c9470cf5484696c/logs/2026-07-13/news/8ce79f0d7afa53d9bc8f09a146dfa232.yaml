title: Bangladesh measles death toll rises to 758 amid growing dengue threat
body: Bangladesh reported five more child deaths from measles-like symptoms, taking the combined confirmed and suspected death toll to 758. Health experts warned that rising dengue infections during the monsoon could further overwhelm hospitals already struggling with the measles outbreak
