  Response: '<p><strong>Regional level: </strong></p><ul><li>Epidemiological alerts and updates have been issued to alert Member States and recommend actions to be implemented. Information has also been disseminated through regional and national webinars for health personnel.</li><li>Algorithms for laboratory testing have been developed and disseminated. Training on molecular testing (RT-PCR) and characterization (whole genome sequencing) has been provided through workshops or remote assistance, and critical reagents have been distributed. As a result of regional and national efforts, molecular testing capacity is available in 23 of the 33 countries in Latin America and the Caribbean. WHO is working to expand these capacities as necessary. </li><li>The available clinical information has been reviewed to recommend interim case definitions (suspected, probable, and confirmed, vertical transmission).</li><li>A virtual collaboration space has been created at the regional level to develop epidemiological
    analytics of the disease. </li><li>Generic research protocols for the characterization of pregnancy outcomes in infants from OROV-exposed pregnant individuals have been drafted and shared.</li><li>WHO experts are providing support in countries that are experiencing outbreaks.</li><li>Development and publication of Interim guidance on entomological surveillance and prevention measures for Oropouche virus vectors.</li><li>Regional workshop on the biology, ecology and surveillance of insects of the genus Culicoides (Diptera: Ceratopogonidae) vectors of the Oropouche virus (OROV) in the Americas was held in FIOCRUZ Manaus-Brazil from 18 to 22 November 2024, with the participation of eight countries.</li></ul>'
