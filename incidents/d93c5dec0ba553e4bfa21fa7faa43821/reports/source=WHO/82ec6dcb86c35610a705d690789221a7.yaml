  Response: '<ul><li><strong>Regional level</strong>: Epidemiological alerts and updates have been issued to alert Member States and recommend actions to be implemented. Information has also been disseminated through regional and national webinars for health personnel.</li><li>Algorithms for laboratory testing have been developed and disseminated. Training on molecular testing (RT-PCR) and characterization (whole genome sequencing) has been provided through workshops or remote assistance, and critical reagents have been distributed. As a result of regional and national efforts, molecular testing capacity is available in 23 of the 33 countries in Latin America and the Caribbean. The Pan American Health Organization (PAHO; the WHO Regional Office for the Americas) is working to expand these capacities as necessary. </li><li>The available clinical information has been reviewed to recommend interim case definitions (suspected, probable, and confirmed, vertical transmission).</li><li>A virtual
    collaboration space has been created at the regional level to develop epidemiological analytics of the disease. </li><li>Generic research protocols for the characterization of pregnancy outcomes in infants from OROV-exposed pregnant individuals have been drafted and shared.</li><li>PAHO/WHO experts are providing support in countries that are experiencing outbreaks.<br /></li></ul> <p>Brazilian local and national health authorities have implemented the following public health measures:</p><ul type="disc"><li data-list="0" data-level="1">Entomo-epidemiological actions have been developed      to identify the main vector species and the landscape where they are      breeding, to cut the chains of transmission and achieve control of the      disease in the shortest time possible.</li><li data-list="0" data-level="1">Surveillance is being maintained in all      Federative Units of the country. The Ministry of Health monitors cases and      possible deaths from Oropouche through the National
    Arbovirus Room, in      constant dialogue with Federative Units.</li><li data-list="0" data-level="1">Monitoring has also been carried out through      technical visits, on-site research, active search and research of vectors,      supporting the local response of states and municipalities.</li><li data-list="0" data-level="1">Three research groups are working on OROV fever.      One is focused on laboratory information, such as the lineage of the virus      and genomic characteristics. Another is monitoring the clinical      manifestations of patients, and the third is investigating the disease      cycle in the mosquitoes that transmit it.</li></ul>'
