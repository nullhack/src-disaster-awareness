  Title: Oropouche virus disease - Region of the Americas
  Epidemiology: <p>Oropouche virus disease is an arboviral disease caused by the Oropouche virus (OROV), a segmented single-stranded RNA virus that is part of the genus <em>Orthobunyavirus</em> of the <em>Peribunyaviridae </em>family. The virus has been found to circulate in Central and South America and the Caribbean. OROV can be transmitted to humans primarily through the bite of the&nbsp;<em>Culicoides paraensis&nbsp;</em>midge, found in forested areas and around water bodies, or certain <em>Culex quinquefasciatus </em>mosquitoes<em>.</em> It is suspected that viral circulation includes both urban epidemic and sylvatic cycles. In the sylvatic cycle, primates, sloths, and perhaps birds are vertebrate hosts, but a definitive arthropod vector has not been identified. In the urban epidemic cycle, humans are the amplifying host and OROV is transmitted primarily through the bite of the&nbsp;<em>Culicoides paraensis</em>&nbsp;midge. Vertical transmission has recently been documented and is being
    investigated further. To date, there is no evidence of other modes of human-to-human OROV transmission.&nbsp;</p><p>The disease symptoms are similar to dengue and start four to eight days (range between three to 12 days) after the infective bite. The onset is sudden, usually with fever, intense headache, joint stiffness, pain, chills, and sometimes persistent nausea and vomiting, for up to seven days. Up to 60% of cases have a relapse of symptoms after the fever stops. Most cases recover within seven days, however, in some patients, convalescence can take weeks. Severe clinical presentation is rare, but it may result in aseptic meningitis during the second week of the disease. </p> <p>There is no specific antiviral treatment or vaccine for Oropouche virus disease.&nbsp;</p>
  Advice: <p>The proximity of midge vector breeding sites to human habitations is a significant risk factor for OROV infection. Prevention strategies are based on control measures against the arthropod vectors and on personal protection measures. Vector control measures rely on reducing midge populations through the control of breeding sites, achieved by reducing the number of natural and artificial water-filled habitats that support midge larvae, thereby reducing the adult midge populations around at-risk communities. Personal protection measures rely on the prevention of midge bites using mechanical barriers (mosquito nets), insect repellant devices, repellent-treated clothing and mosquito repellents. Chemical insecticides such as deltamethrin and N,N-Diethyl-meta-toluamide (DEET) have been demonstrated to be effective in providing protection against bites from <em>Culicoides</em> and <em>Culex</em> species.&nbsp;</p><p>Given its clinical presentation and considering that this is the ongoing
    season for dengue in Central America and the Caribbean and for other vector-borne diseases in the Region of the Americas, laboratory diagnosis is essential to confirm cases, characterize the outbreak, and monitor disease trends.&nbsp;&nbsp;</p><p>Since it is an emerging and poorly identified arbovirus in the Americas, the detection of a positive sample and confirmation of a case requires the use of Annex 2 of the IHR and its consequent notification through the established channels of the IHR.</p><p>WHO advises against applying any travel or trade restrictions based on the current information available on this event.</p>
  Assessment: <p>In the Region of the Americas, outbreaks of Oropouche virus disease have occurred mainly in the Amazon region during the last ten years. With geographical limitations, OROV causing persistent endemicity and periodic outbreaks are reported in in both rural and urban communities in Brazil, the Plurinational State of Bolivia, Cuba, Colombia, Ecuador, French Guiana, Panama, Peru, and Trinidad and Tobago&nbsp;(7).</p><p>The ongoing outbreak highlights the need to strengthen epidemiological and entomological surveillance and to reinforce preventive measures in the population. This is crucial due to the potential expansion of the virus's transmission area and the growing understanding of the disease spectrum, including possible new transmission routes, and possible new vectors that could affect both the general population and vulnerable groups, such as pregnant women, their fetuses, and newborns.</p><p>Based on available information, WHO assesses the overall public health risk
    posed by this virus to be high at the regional level and low at the global level. </p>
  Overview: "<p><p>Between 1 January and 20 July 2024, there were 8078 confirmed Oropouche cases reported in the Region of the Americas, including two deaths. The cases are reported among five countries in the region: the Plurinational State of Bolivia (356 cases), Brazil<sup>1 </sup>(7284 cases, including two deaths), Peru (290 cases), Colombia (74 cases), and Cuba (74 cases). <span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\"></span></p><p><span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Brazil has reported one fetal death and one miscarriage in the state of Pernambuco, as well as four cases of newborns with microcephaly, identified through retrospective studies in the states of Acre and Par&aacute; indicating possible cases of vertical transmission of OROV infection and their consequences.<sup>2</sup>&nbsp;</span>Three\
    \ additional\r\npossible cases of vertical transmission are being investigated in the state of\r\nPernambuco. Despite the evidence of vertical transmission of OROV (polymerase\r\nchain reaction [PCR] positivity on tissues from pregnancy loss reported), it\r\ncannot be concluded that OROV is the cause of the fetal deaths, and\r\ninvestigations are still ongoing. &nbsp;&nbsp;<o:p></o:p></p><p>As of 30 July 2024,\r\nfive cases of possible vertical transmission have been identified in Brazil:\r\nfour cases of stillbirth and one case of spontaneous abortion in the state of\r\nPernambuco, as well as four cases of newborns with microcephaly in the states\r\nof Acre and Par&aacute;. The investigations are ongoing(1).<o:p></o:p></p><p><strong>Figure 1. Number of\r\nconfirmed Oropouche cases in 2024 by country and epidemiological week of\r\nsymptom onset, Region of the Americas*</strong></p><p><strong><o:p><img alt=\"Oropouche epi curve\" src=\"https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/oropouche.png?sfvrsn=921e8e55_3\"\
    \ sf-size=\"26248\" /><br /></o:p></strong></p><p>*Note: Data by epidemiological week of onset are not available for Cuba. Source: Adapted and reproduced by PAHO/WHO from the data reported by the respective countries.</p><p>The following is a summary of the situation in the countries that have reported confirmed Oropouche cases in the Americas during 2024. </p><p><strong>The Plurinational State of Bolivia:</strong> Between 1 January and 20 July 2024, there were 356 Oropouche cases confirmed using reverse transcription polymerase chain reaction (RT-PCR). Transmission has been recorded in three departments: La Paz, with 75.3% of the cases (268 cases); Beni, with 21.3% of the cases (76 cases); and Pando, with 3.4% of the cases (12 cases). The cases are reported among 16 municipalities that are considered endemic for this disease, with the highest proportion of cases reported in the municipalities of Irupana, La Paz, with 33% of the cases, followed by La Asunta, La Paz, with 13% of the cases,\
    \ and Chulumani, La Paz, and Guayaramerin, Beni, with 12% each. </p> <p>Half of the cases are female (179 cases) and the age group with the highest number of cases in the 30-39 years age group, with 20% of cases (70 cases). No deaths have been recorded that could be associated with OROV infection. Additionally, between 16 March and 13 April 2024, five cases of Oropouche virus disease co-infection with dengue were reported in patients from three municipalities in the department of La Paz, who presented with positive RT-PCR results for DENV-1 serotype (one case) and DENV-2 (four cases) (2).</p> <p><strong>Brazil:</strong> Between 1 January and 27 July 2024, 7284 Oropouche cases were confirmed by RT-PCR. The Amazon region, considered endemic for Oropouche virus disease, accounted for 75.7% of the cases recorded in the country, with six states reporting cases: Amazonas (3224 cases), Rond&ocirc;nia (1709 cases), Acre (265 cases), Roraima (239 cases), Par&aacute; (74 cases), and Tocantins\
    \ (two cases) (3). Additionally, autochthonous transmission has been documented in ten non-Amazonian states, some of which had not previously reported cases: Bah&iacute;a (831 cases), Esp&iacute;rito Santo (420 cases), Santa Catarina (165 cases), Pernambuco (92 cases), Minas Gerais (83 cases), Rio de Janeiro (64 cases), Cear&aacute; (39 cases), Piau&iacute; (28 cases), Maranh&atilde;o (19 cases), and Mato Grosso (17 cases). In addition, the probable place of infection is being investigated for several cases registered in the states of Amap&aacute; (seven cases), Paran&aacute; (three cases), Sergipe (two cases), and Para&iacute;ba (one case). </p> <p>Over half of the cases (51.9%; 3779) are male and the age group with the highest number of cases is 30-39 years, with 21.2 % of cases (1541 cases) (3).</p> <p>On 23 July 2024, Brazil's IHR National Focal Point (NFP) reported two fatal cases of OROV infection detected retrospectively in the state of Bahia. Both cases were in females, aged\
    \ 21 and 24 years old. These two deaths would be the first fatal cases due to acute OROV infection in Brazil and in the Region of the Americas, occurring amid an active outbreak on the southern coast of Bahia. Both cases, without a history of chronic diseases, tested RT-PCR positive for OROV and serology and negative for other arboviruses. The cases showed a rapid evolution from the onset of symptoms (fever, myalgia, headache, retro-orbital pain, pain in the lower extremities, asthenia, and joint pain) to death, with severe coagulopathy and liver involvement identified as probable causes of death. Additionally, the Brazilian Ministry of Health is investigating two other fatal cases associated with OROV, in Paran&aacute; and Maranh&atilde;o (4).</p><p><strong>Colombia</strong>: Between 1 January and 20 July 2024, 74 confirmed Oropouche cases have been reported in three departments of the country: Amazonas (70 cases), Caquet&aacute; (one case), and Meta (one case); additionally, two cases\
    \ were identified in travelers from from Tabatinga, Brazil. The cases were identified through a retrospective laboratory case-finding strategy implemented in 2024 by the National Institute of Health of Colombia based on dengue surveillance (38 cases) and through investigation of febrile syndrome cases (36 cases). Over half of the cases (51.4%; 38) were female and the age group with the highest number of cases was 10-19 years, with 36.5% of the cases (27 cases). No deaths have been recorded that could be associated with OROV infection.</p> <p><strong>Cuba: </strong>On 27 May 2024, the Ministry of Public Health of Cuba reported the country's first outbreak of Oropouche virus disease. A total of 74 confirmed cases were reported from the Santiago de Cuba Province (54 cases) and Cienfuegos Province (20 cases). Half of the cases (50%; 38) were female and the age group with the highest number of cases was 15-19 years, with 16% of the cases (12 cases). No deaths have been recorded that could\
    \ be associated with OROV infection (5). </p> <p><strong>Peru</strong>: Between 1 January and 20 July 2024, 290 confirmed Oropouche cases have been reported in five departments, the highest number of cases reported to date in this country. The departments are: Loreto (193 cases), Madre de Dios (47 cases), Ucayali (41 cases), Hu&aacute;nuco (eight cases), and Tumbes (one case). Over half of the cases (52%; 150) were male, and the age group with the highest number of cases was 30-39 years, with 40% of the cases (115 cases) (6).</p><p></p></p>"
