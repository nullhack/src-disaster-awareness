log_date: '2026-07-08'
summary: Recent reports indicate that Oropouche virus outbreaks have emerged in the Caribbean, Central America, and South America, with cases identified among Canadian and American travelers since late 2023. The virus, which causes febrile illness similar to dengue and Zika, is more prevalent in Latin America than previously recognized, and there are early indications that infections during pregnancy may pose risks to unborn babies.
