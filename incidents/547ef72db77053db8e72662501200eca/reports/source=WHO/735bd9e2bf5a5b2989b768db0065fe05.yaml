  Response: '<p>Federal, State, local health authorities and community partners in the United States are implementing the following public health measures to control the outbreak: US CDC escalated to a level 3 Incident Management Structure on 3 March 2025 to provide remote technical assistance on diagnostics, post-exposure prophylaxis, healthcare infection and prevention, case investigation and confirmation, and communication support. The Texas Department of State Health Services is leading the investigation in Texas. US CDC deployed subject matter experts to assist the response. WHO has issued epidemiological alerts and updates due to the increase in measles cases in several countries in the WHO Region of the Americas that started in 2024. WHO continues to monitor the situation and work closely with countries in the Region of the Americas to support their vaccination, surveillance and rapid outbreak response efforts to prevent the spread and reintroduction of measles and to protect the
    health of the entire population.</p>'
