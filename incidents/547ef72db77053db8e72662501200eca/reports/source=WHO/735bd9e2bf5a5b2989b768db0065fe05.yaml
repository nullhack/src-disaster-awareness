  Advice: <p>WHO recommends maintaining sustained homogeneous coverage of at least 95% with the first and second doses of the measles-containing vaccine (MCV) and strengthening integrated epidemiological surveillance of measles and rubella to achieve timely detection of all suspected cases in public and private healthcare facilities.</p><p>WHO recommends strengthening epidemiological surveillance and preparedness and response capacities in high-traffic border areas to rapidly detect and respond to suspected measles cases. Providing a rapid response to imported measles cases to avoid the re-establishment of endemic transmission through the activation of rapid response teams trained for this purpose and by implementing rapid response protocols when there are imported cases. Once a rapid response team has been activated, continued coordination between the national, sub-national and local levels must be ensured, with continuous and effective communication channels across all levels. During outbreaks,
    it is recommended to establish adequate hospital case management and infection prevention and control capacity to avoid health care-associated infection transmission, with appropriate referral of patients to airborne infection isolation rooms (for any level of care) and avoiding contact with other patients in waiting rooms and/or other hospital rooms.</p><p>WHO recommends providing broad access to measles, mumps and rubella (MMR) vaccination to maintain high vaccination rates of the general population and to ensure individuals at high risk of exposure are up-to-date on this vaccination, such as health and care personnel and international travellers. Individuals living in outbreak areas within the United States should follow local public health guidance. Globally, between 2000 and 2023, vaccination successfully prevented an estimated 60 million deaths<sup>[2]</sup> and decreased an estimated measles death from 800 062 in 2000 to 107 500 in 2023, which is an 87% decrease.<sup>[3]</sup></p><p>In
    all settings, consideration should be given to providing susceptible contacts with post-exposure prophylaxis, including a dose of MCV or normal human immunoglobulin (NHIG) (if available) for those at risk and in whom the vaccine is contraindicated. In well-resourced settings, MCV should be provided to susceptible contacts within 3 days. For contacts for whom vaccination is contraindicated or is not possible within 3 days post-exposure, consideration can be given to providing NHIG up to 6 days post-exposure. Infants, pregnant women, and the immunocompromised should be prioritized.</p><p>WHO recommends maintaining a stock of the measles-rubella (MR) and/or MMR vaccine, and syringes/supplies for responding to imported cases. Facilitating access to vaccination services according to the national scheme to incoming and outgoing international travellers, including individuals due to perform activities, domestically or abroad, in areas with ongoing measles outbreaks, displaced populations, indigenous
    populations, or other vulnerable populations.</p><p>WHO advises international travellers to check and update their vaccination status against measles prior to departure, including when planning to travel to the United States. Unvaccinated individuals from areas in the United States experiencing measles outbreaks, with knowledge of exposure to measles cases and/or presenting signs and symptoms compatible with measles virus infection, should consult local health authorities before undertaking an international voyage. At present, no additional measures that significantly interfere with international traffic are warranted.<span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span></p><div><div id="ftn2"><p>&nbsp;</p></div></div>
  Assessment: <p>Measles is a highly contagious viral disease that affects individuals of all ages and remains one of the leading causes of death among young children globally. The transmission mode is airborne or via droplets from the nose, mouth, or throat of infected persons. Initial symptoms, which usually appear 10-14 days after infection, include high fever, usually accompanied by a runny nose, bloodshot eyes, cough and tiny white spots inside the mouth. A rash develops several days later, usually starting on the face and upper neck and gradually spreading downwards. A patient is infectious four days before the start of the rash to four days after the appearance of the rash. There is no specific antiviral treatment approved for measles; most people recover within 2-3 weeks. Measles can also cause serious complications, including blindness, encephalitis, severe diarrhoea, ear infection, and pneumonia, which are more common in children under 5 years and adults more than 20 years of age.
    Measles can be prevented by immunization. </p><p>In 2016, the Region of the Americas was the first WHO Region to be declared free of the endemic transmission of measles by the International Expert Committee for Documenting and Verifying Measles, Rubella and the Congenital Rubella Syndrome in the Americas. Nevertheless, maintaining the Region free of measles is an ongoing challenge due to the permanent risk of importation and reintroduction of the virus.</p><p>The public health risk in the Region of the Americas for measles is considered high due to the persistence of the circulation of the virus from imported cases, which have resulted in a limited number of outbreaks, with several generations of cases and the appearance of cases associated with pre-existing outbreaks in new geographical areas. Additionally, an increase in the susceptible population due to persistently low vaccination coverage related to factors such as the COVID-19 pandemic, increased vaccine hesitancy in some communities
    and sectors of the population, and limited access to health services, particularly for vulnerable populations.</p>
  Overview: '<p>On 11 March 2025, the NFP of the United States notified to WHO an ongoing outbreak of measles in the United States.</p><p>From 1 January to 20 March 2025, 378 cases have been reported from 17 States including: Alaska, California, Florida, Georgia, Kansas, Kentucky, Maryland, Michigan, New Jersey, New Mexico, New York State, Ohio, Pennsylvania, Rhode Island, Texas, Vermont, and Washington. Two deaths have also been reported, one confirmed in Texas and one under investigation in New Mexico. The majority of cases are in children who are unvaccinated or have unknown vaccination status. The hospitalization rate is 17%. &nbsp;</p><p>Ninety percent of the 378 cases (341 cases) have been associated with three distinct outbreaks (defined as three or more related cases) reported in 2025, while the remainder are sporadic cases that are part of the larger outbreak.</p><p>From late January until 14 March 2025, the Texas Department of State Health Services reported 259 cases in the South
    Plains and Panhandle regions of Texas. Of these, 34 patients have been hospitalized, and 257 (99%) were unvaccinated or with unknown vaccination status. In February 2025, an unvaccinated school-aged child who lived in the Texas outbreak area died of measles. This was the first death in the United States related to measles in a decade. </p><p>As of 14 March, the New Mexico Department of Health reported 35 cases of measles. Of the 35 cases, 28 were unvaccinated, two were vaccinated, and five had unknown vaccination status<span style="color:#092862;">.</span></p><p>From 1 January 2025 to 20 March 2025, the US CDC reported 128 measles DNA sequences. Texas submitted 92 identical DNA sequences in genotype D8; while 10 DNA sequences from New Mexico and one DNA sequence from Kansas were identical to those from Texas. Texas also reported three genotype D8 sequences (a total of 19 D8 sequences have been reported from the affected States) with single nucleotide substitutions. Additionally, a total
    of five distinct genotype B3 sequences were reported from the States of Alaska, California, Florida, Kentucky, New York, Rhode Island, Texas, and Washington. </p><p>The source of this outbreak is unknown. Currently, there is no evidence of decreased vaccine effectiveness or changes in the virus that would result in increased severity.</p><p>In 2000, measles was declared eliminated<sup>[1] </sup>in the United States and, since then, imported cases of measles have been detected in the country since the disease remains endemic in many parts of the world.&nbsp; The United States last verified the ongoing elimination of measles in 2024. In 2023, the vaccination coverage rate for two doses of measles, mumps, and rubella (MMR) vaccine among children in kindergarten in the United States was 92.7%.<span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span></p>'
