  Epidemiology: <p>Measles is a highly contagious acute viral disease which affects individuals of all ages and remains one of the leading causes of death among young children globally. The mode of transmission is airborne or via droplets from the nose, mouth, or throat of infected persons.</p><p>Initial symptoms, which usually appear 10-14 days after infection, include high fever, usually accompanied by a runny nose, bloodshot eyes, cough and tiny white spots inside the mouth. The rash usually appears 10-14 days after exposure and spreads from the head to the trunk to the lower extremities. A person is infectious from four days before up to four days after the appearance of the rash. There is no specific antiviral treatment for measles and most people recover within 2-3 weeks.</p><p>Measles is usually a mild or moderately severe disease. However, measles can lead to complications such as pneumonia, diarrhoea, secondary ear infection, inflammation of the brain (encephalitis), blindness,
    and death. Postinfectious encephalitis can occur in about one in every 1000 reported cases. About two or three deaths may occur for every 1000 reported cases.</p><p>Immunization against measles prevents measles and its complications.</p>
