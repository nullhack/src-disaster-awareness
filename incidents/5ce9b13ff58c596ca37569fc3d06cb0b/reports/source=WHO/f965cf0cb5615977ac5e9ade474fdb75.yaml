  Advice: <p>This case does not change the current WHO recommendations on public health measures and surveillance of influenza. </p><p>The public should avoid contact with high-risk environments such as live animal markets/farms or surfaces that might be contaminated by poultry feces. Respiratory protection is highly recommended for those handling live or dead (including slaughtering) poultry in occupational or backyard-farming settings. Good hand hygiene, i.e. frequent washing of hands or the use of alcohol-based hand sanitizer is recommended. WHO does not recommend any specific additional measures for travelers.</p><p>Under Article 6 of the IHR, all human infections caused by a new subtype of influenza virus are notifiable. The case definition for notification of human influenza infection caused by a new subtype under the IHR is provided <a href="https://cdn.who.int/media/docs/default-source/documents/emergencies/case-definitions-ihr-four-diseases7f1ee707-3d13-4581-a1af-d5f44f86423a.pdf?sfvrsn=9c68df20_1&amp;download=true">here</a>.
    State Parties to the IHR are required to immediately notify WHO of any laboratory-confirmed case of a human infection caused by such an influenza A virus.</p><p>WHO advises against the application of any travel or trade restrictions based on the current information available on this event.&nbsp;</p>
  Assessment: <p>Most reported human cases of A(H9N2) virus infection have been linked to exposure to infected poultry or contaminated environments, with the majority of cases experiencing mild clinical illness. Sporadic human cases following exposure to infected birds or contaminated environments can be expected since the virus remains enzootic in poultry populations. Avian influenza A(H9N2) viruses have been detected in poultry and environmental samples collected at live bird markets in Senegal and authorities in the country&nbsp;<span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">reported a human case of infection with an A(H9N2) virus in 2020.</span></p><p><p>Current epidemiological and virological evidence indicates that none of the characterized influenza A(H9N2) viruses thus far have acquired the ability for sustained transmission among humans. Thus, the likelihood of sustained human-to-human
    spread is low at this time. Infected individuals traveling internationally from affected areas may be identified in another country during or after arrival. However, if this were to occur, further community-level spread is considered unlikely. The risk assessment would be revisited if and when further epidemiological and virological information becomes available.</p></p>
  Overview: <p>On 21 March 2026, the National IHR Focal Point for Italy notified WHO of&nbsp;the identification of a&nbsp;human&nbsp;case of avian influenza&nbsp;A(H9) in an adult male.<br /></p> <p>The patient had been in Senegal for more than six months and traveled to Italy in mid-March. Upon arrival, he visited the emergency department with a fever and a persistent cough.<br /></p> <p>On 16 March, a bronchoalveolar lavage specimen was collected, which showed a positive&nbsp;<em>Mycobacterium tuberculosis</em>&nbsp;result, as well as detection of&nbsp;un-subtypeable&nbsp;influenza&nbsp;A virus.&nbsp;The patient was placed in a negative-pressure isolation room with airborne precautions. He was treated with antitubercular medication and antiviral oseltamivir. By 9 April, his condition was stable and improving. <br /></p> <p>On 20 March, a regional reference laboratory identified the A(H9) subtype, and on 21 March, next-generation sequencing confirmed influenza A(H9N2). Initial genetic findings
    suggest the infection was likely acquired from an avian source linked to Senegal. Additional samples have been sent to Italy&rsquo;s National Influenza Center, where further characterization confirmed virus subtype Influenza A(H9N2), with close genetic similarity to strains previously identified in poultry in Senegal. <br /></p> <p>No direct exposure to animals, wildlife or rural environments was identified. There was also no reported contact with symptomatic or confirmed human cases. Further epidemiological investigations on the source of exposure are ongoing.<br /></p> <p>Contacts identified in Senegal were asymptomatic. All identified and traced contacts in Italy have tested negative for influenza and completed the period of active monitoring for the onset of symptoms and the quarantine required by national guidelines. They also received oseltamivir as a preventive measure.&nbsp;</p>
