  Response: <p>Contact tracing procedures have been initiated, and relevant authorities in Italy, as well as internationally (National IHR Focal Point for Senegal, WHO, and European Centre for Disease Prevention and Control (ECDC)) have been informed through IHR channels. Once avian influenza was suspected, the response moved quickly from hospital-level management to regional laboratory confirmation and national coordination. Additionally, the regional surveillance system was notified, integrated within the One Health avian influenza reporting framework.</p>
