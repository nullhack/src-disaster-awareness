  Epidemiology: <p>Animal influenza viruses normally circulate in animals but can also infect people. Infections in humans have primarily been acquired through direct contact with infected animals or through indirect contact with contaminated environments. Depending on the original host, influenza A viruses can be classified as avian influenza, swine influenza, or other types of animal influenza viruses.<br /></p> <p>Avian influenza virus infections in humans may cause diseases ranging from mild upper respiratory tract infection to more severe diseases and can be fatal. Conjunctivitis, gastrointestinal symptoms, encephalitis and encephalopathy have also been reported.<br /></p> <p>Laboratory tests are required to diagnose human infection with influenza. WHO periodically updates technical guidance protocols for the detection of zoonotic influenza using molecular methods.&nbsp;<br /></p> <p>Human&nbsp;infections with influenza A(H9) viruses have been reported from countries in Africa and Asia,
    where these viruses are also detected in poultry. The majority of cases&nbsp;of human avian influenza A(H9N2) infection have been reported&nbsp;from&nbsp;China.&nbsp;This is the first&nbsp;imported&nbsp;human case of avian Influenza A(H9N2) virus infection reported in the&nbsp;European Region.&nbsp;<br /></p>
