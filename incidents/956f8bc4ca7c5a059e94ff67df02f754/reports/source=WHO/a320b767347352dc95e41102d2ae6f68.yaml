  Response: <p>Local and national health authorities in Ethiopia implemented the following public health measures:&nbsp;&nbsp;</p><ul><li>A National Taskforce established at the Ministry of Health to provide strategic guidance, make decisions and mobilize resources. </li><li>A costed national three-month response plan developed and launched by the MoH/EPHI</li><li>The MoH regularly disseminated information on the MVD outbreak to the public and key partners.</li><li>Public Health Emergency Operational Centres were activated at national and regional levels, with incident management structures established to coordinate the response. </li><li>The Ministry of Health, in collaboration with EPHI and regional health offices, conducted integrated surveillance and response activities, including at priority points of entry (PoEs) and points of control (PoCs). </li><li>Community surveillance, contact tracing, house-to-house visits, and medical service delivery were enhanced. </li><li>Two hospitals designated
    as treatment centres, with dedicated health workers deployed to manage cases. </li><li>Laboratory capacities were strengthened both at national level and through the deployment of a mobile laboratory in Jinka for timely confirmation. </li><li>Field assessments conducted by a rapid response team (RRT). </li><li>Risk Communication and Community Engagement (RCCE) teams disseminated MVD prevention messages, conducted community dialogues, developed activity plans for targeted community interventions, monitored social media to address misinformation, and assessed trusted communication channels to enhance public awareness and engage local networks and influencers.</li></ul><p>WHO, through its country office and partners, provided technical, operational and financial support to the government to contain this outbreak. These include:</p><ul><li>WHO provided policy, technical and operational support across all response pillars, including on PoE surveillance, laboratory, case management, IPC, safe
    and dignified burial, RCCE, logistics and cross-border coordination. </li><li>Provided emergency supplies including testing kits, VHF kits, treatment centre modules. </li><li>Deployed technical experts to provide operational support across all response pillars. </li><li>Provided technical support for capacity building and supervision on surveillance, integrated case management and IPC activities. </li><li>Continued providing technical and strategic support for the transition plan, including the integration of the MVD response into essential health services. <strong></strong></li><li>Supported the Regional Health Bureau (RHB) with community-based active case searching and mortality surveillance across various clusters. <strong></strong></li><li>Provided technical and programmatic support to the RHB for the development and implementation of the Survivors Program.&nbsp;<strong></strong></li></ul>
