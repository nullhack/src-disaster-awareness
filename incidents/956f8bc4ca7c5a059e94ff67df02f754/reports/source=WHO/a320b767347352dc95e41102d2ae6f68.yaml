  Summary: "On 26 January 2026, the Ministry of Health of Ethiopia declared the end of the Marburg virus disease (MVD) outbreak. This declaration came after two consecutive incubation periods (a total of 42 days) since the last person confirmed with MVD died and was given a safe and dignified burial, in accordance with WHO recommendations on 14 December 2025. As of 25 January 2026, a cumulative total of 19 cases, including 14 confirmed (including nine deaths) and five probable cases (all deaths), were reported. \r\nA total of 857 contacts listed for monitoring all had completed their 21-day follow-up as of 25 January 2026.\r\n\r\nWHO, through its country office and partners, provided technical, operational and financial support to the government to contain this outbreak. "
