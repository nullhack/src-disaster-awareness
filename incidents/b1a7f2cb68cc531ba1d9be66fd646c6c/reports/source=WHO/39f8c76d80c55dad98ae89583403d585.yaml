  Response: '<p>Authorities from States Parties managing cases and/or contacts, WHO, and partners have initiated coordinated response measures, including:</p><ul type="disc"><li data-list="0" data-level="1">Ongoing engagement between WHO and the NFPs of countries      managing cases and/or contacts to ensure timely information sharing and      coordination of response actions. </li><li data-list="0" data-level="1">International contact tracing is ongoing.</li><li data-list="0" data-level="1">WHO is requesting regular information sharing and periodic      updates from States Parties through IHR channels regarding contact      monitoring and the health status of high-risk contacts</li><li data-list="0" data-level="1">Crew members still onboard, to take the MV      Hondius to the Netherlands, have been advised to practice physical      distancing and remain in their cabins where possible, while on the cruise      ship.</li><li data-list="0" data-level="1">Experts from WHO and the European Centre
    for Disease Prevention      and Control (ECDC) were deployed on board the ship to support epidemiological      investigation and provide public health advice before disembarkation in the      Canary Islands, Spain.</li><li data-list="0" data-level="1">Two Dutch medical doctors boarded the ship in Cabo Verde to      conduct health monitoring and provide any health care that may be      necessary. One disembarked in Tenerife, while a Dutch nurse boarded, to      assist in monitoring and providing any healthcare to the remaining crew      members on board.</li><li data-list="0" data-level="1">WHO Director-General Dr Tedros Adhanom      Ghebreyesus travelled to the Canary Islands on 9 May, along with other      experts from WHO, to meet with the national authorities, including      ministers, and support the coordination of the operations. He met with the      Prime Minister of Spain on 12 May.<sup>[4]</sup> </li><li data-list="0" data-level="1">Epidemiological investigations continue to
    better      define epidemiological links between cases and exposure factors on the      ship, as well as to try to understand the potential source of exposure</li><li data-list="0" data-level="1">WHO has developed and published specific technical      guidance documents to support response to the event, including: </li></ul><ul style="margin-left:30px;"><li>Technical guidance on the management of       hantavirus on board the ship;</li><li><a href="https://www.who.int/publications/m/item/who-technical-note-for-the-disembarkation-and-onward-management-of-passengers-and-crew-in-the-context-of-an-andes-virus-associated-cluster-mv-hondius-cruise-ship">Technical note for the       disembarkation and onward management of passengers and crew</a> in the context of an Andes-virus-associated       cluster;</li><li><a href="https://www.who.int/publications/m/item/management-of-contacts-of-andes-virus-(andv)-cases-fromthe-mv-hondius-cruise-ship">Management of contacts of Andes       Virus (ANDV)
    cases</a> from the MV Hondius cruise ship</li></ul><ul type="disc"><li data-list="0" data-level="1">NFPs of affected countries have been in contact      about passenger and crew information through established IHR channels for those      on the ship, as well as on planes where a known case was on board. </li><li data-list="0" data-level="1">The NFP of Argentina aided in the reconstruction      of the travel itinerary of the first two cases in the Southern Cone      subregion of the Americas and assess any potential exposure to      hantavirus. They also shared the National Hantavirus Epidemiological      Circular: Update epidemiological Surveillance and Management Standards on      Hantavirus.&nbsp;</li><li data-list="0" data-level="1">WHO supported collaboration across relevant      laboratories with prior experience to ensure timely testing, with further      analyses ongoing, including serology, molecular diagnostics, sequencing,      and metagenomics. </li><li data-list="0" data-level="1">Risk
    communication coordination and support are      being provided to ensure sharing of regular, timely and evidence-based      information. WHO has activated three-level coordination and is supporting      national authorities in implementing risk-based, evidence-informed public      health measures in accordance with the provisions of the IHR and related      WHO technical guidance documents. </li><li data-list="0" data-level="1">WHO regularly convenes expert calls across      laboratory, clinical management, epidemiology, and Infection prevention and      control (IPC) domains to facilitate timely experience sharing and      coordinated expert support.</li><li data-list="0" data-level="1">WHO supported the streamlining and development of      research protocols on the natural clinical history in collaboration with      national partner institutions and planned a hantavirus scientific consultation      on medical countermeasures.</li></ul>'
