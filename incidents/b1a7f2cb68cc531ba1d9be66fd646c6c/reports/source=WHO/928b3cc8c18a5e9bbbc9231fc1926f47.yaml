  Title: Hantavirus outbreak linked to cruise ship travel, Multi-locations
  Epidemiology: <p>Hantavirus disease is a zoonotic viral disease caused by hantaviruses of the genus <em>Orthohantavirus</em>, family <em>Hantaviridae</em>, order <em>Elliovirales, </em>class <em>Bunyaviricetes</em>. More than 20 viral species have been identified within this genus.&nbsp;<br /></p><p>Human hantavirus infection is primarily acquired through contact with the urine, faeces, or saliva of certain species of (specific) infected rodents, or by touching contaminated surfaces. Exposure typically occurs during activities such as cleaning buildings with rodent infestations, though it may also occur during routine activities in heavily infested areas. Human cases are most commonly reported in rural settings, such as forests, fields, and farms, where rodents are present and opportunities for exposure are greater.<br /></p><p>Limited human-to-human transmission has currently only been reported for hantavirus pulmonary syndrome (HPS) associated with ANDV virus infection. ANDV is endemic
    in South America, with confirmed circulation and human infections reported primarily in Argentina and Chile, and additional cases and related strains identified in Uruguay, southern Brazil, and Paraguay.<br /></p><p><strong>Andes virus transmission between humans</strong><br /></p><p>Based on the available information and the existing observations of the current outbreak, limited human-to-human transmission of ANDV is known to occur. However, no large-scale human-to-human outbreaks have been observed historically.<sup>[1]</sup> ANDV circulates in specific species of rodents in the Americas, and there have been many sporadic cases reported in Argentina and Chile that have not led to onward transmission.<sup>[2]</sup>&nbsp; Clusters of human cases have been reported in multiple past outbreaks and have been typically associated with close and prolonged interactions, often in shared indoor environments such as households.&nbsp; The largest reported outbreak of ANDV was reported in Argentina
    in 2018-2019,<sup>2</sup> where high viral titres in combination with attendance at large social gatherings or extensive contacts among people were associated with higher transmission. &nbsp;While the available evidence suggests that there are multiple modes of transmission that occur with ANDV, the probability of onward transmission between humans remains low.<br /></p><p>Initial epidemiological investigation and the genomics analysis<sup>[3]</sup> of the identified cases show that in this outbreak of ANDV infection, human-to-human transmission has occurred on the ship. While detailed information on the interaction between cases or with a contaminated environment aboard the ship is currently not available, these exact modes of transmission might be elucidated by upcoming results from an in-depth epidemiological investigation, as well as publication of the environmental sampling performed after the disembarkation.&nbsp;&nbsp;</p><p>Response activities operated under the assumption that
    ANDV transmission:</p><ul type="disc"><li data-list="0" data-level="1">may have included contact with an infected individual or contaminated surfaces;</li><li data-list="0" data-level="1">and/or through-the-air transmission (via direct deposition of infectious respiratory particles onto exposed facial mucosal surfaces&mdash;mouth, nose, or eyes);</li><li data-list="0" data-level="1">and/or airborne transmission (via inhalation of infectious respiratory particles).</li></ul><p>Given the attack rate among the ship passengers, as well as the absence of secondary cases among contacts off the ship, the virus did not exhibit transmission dynamics consistent with highly transmissible airborne pathogens (such as measles).</p>
  Advice: <p>WHO advises all countries to sustain strong engagement and collaboration to document and learn from this outbreak response, including both successes and operational challenges, and to apply the lessons identified to strengthen preparedness, surveillance including international tracing and follow up of contacts, clinical care, IPC, risk communication, and response capacities for future public health emergencies.</p><p>WHO further encourages the continuation of epidemiological, clinical, laboratory, and ecological studies to better understand the outbreak, its transmission dynamics, risk factors, and determinants of disease severity.</p><p>In areas where hantavirus is endemic, WHO recommends strengthening measures to prevent and control transmission through enhanced surveillance, public awareness, environmental management, reduction of exposure to rodent reservoirs and contaminated environments, and early detection, implementation of IPC measures and management of cases.</p><p>WHO
    also encourages continued investment in research and development to advance the availability of effective diagnostics, therapeutics, and vaccines, and to improve preparedness and response capabilities for future hantavirus outbreaks.</p>
  Assessment: <p>The ANDV outbreak associated with the MV Hondius cruise ship no longer poses a public health risk and no further related transmission is expected. &nbsp;ANDV remains endemic in South America, and it is associated with hantavirus pulmonary syndrome with substantial case fatality, its transmissibility remains limited, typically requiring close and prolonged exposure, and tends to result in temporally and spatially restricted clusters.<br /></p> <p>While the confined maritime environment of this event likely facilitated transmission during the voyage, epidemiological and genomic evidence supports a point source outbreak, originating either from contact with an infected animal or infected person, followed by limited chains of human-to-human secondary transmission, without evidence of sustained transmission.<br /></p> <p>The completion of the 42-day follow-up period for all identified contacts without further detection of additional secondary cases demonstrates effective interruption
    of transmission and confirms outbreak containment. Additionally, IPC measures continue to be applied for the management of the two cases still hospitalized.</p>
  Overview: <p>&nbsp;</p><p>On 2 May 2026, in accordance with the International Health Regulations (2005) (IHR), WHO received a notification from the National IHR Focal Point (NFP) of the United Kingdom of a cluster of severe acute respiratory illness aboard the Netherlands-flagged cruise ship M/V Hondius, with further details rapidly notified authorities in the Netherlands and South Africa.</p><p>As of 2 July, a total of 13 cases (12 confirmed and one probable case), including three deaths (two confirmed and one probable), have been reported globally linked to the cruise ship. The case fatality ratio for this outbreak to date is 23%. Since the last <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON604">Disease Outbreak News</a> was published on 28 May 2026, ANDV infection was laboratory confirmed in a probable case in Tristan da Cunha who developed signs and symptoms after disembarkation from the cruise ship. The early detection and isolation of the case prevented
    further transmission of the virus, but the limited diagnostic capacities on the island delayed the confirmation of the case until a sample was shipped and tested in the United Kingdom. The patient has recovered and has been discharged.</p><p>Among the confirmed cases admitted to hospital, eight have recovered and been discharged, while two, one in South Africa and one in France, continue to be hospitalized. All 13 cases are among people who travelled on board the M/V Hondius.<strong></strong></p><strong>Figure 1. Epidemiological curve of Andes hantavirus cases (n = 13) reported to WHO as of 2 July 2026.&nbsp;</strong><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/hantavirus_epi_curve.jpg?sfvrsn=f5c6f2a1_3" height="475" style="max-width:100%;height:auto;" title="Hantavirus_epi_curve" width="1062" alt="Hantavirus_epi_curve" sf-size="44755" /><br /></p><p>Nine of the reported cases were males, and four were females.
    The median age was 65-years-old (IQR 56-70), similar to the median age of the passengers onboard the ship (Figure 2). The ages of the three deceased cases were 69, 70 and 79-years-old.<br /></p><p><strong>Figure 2. Age and sex distribution of</strong> <strong>Andes hantavirus cases (n = 13) reported to WHO as of 2 July 2026.</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/hantavirus_age_sex-figure.jpg?sfvrsn=ba7ba64b_3" height="546" style="max-width:100%;height:auto;" title="Hantavirus_age_sex figure" width="823" alt="Hantavirus_age_sex figure" sf-size="37122" /></p><p>Currently available information suggests that infection of initial cases was likely acquired on land prior to embarkation, although the exact source and route of exposure remain undetermined, with subsequent human-to-human transmission occurring aboard the vessel. Investigations remain underway to establish the circumstances and source of
    the outbreak, including genomic sequencing of ANDV samples from surveillance cases in Chile and Argentina, and will be published as soon as these are available. </p><p>This outbreak was managed through a coordinated international response, which included comprehensive epidemiological investigations, case isolation and clinical management, medical evacuations, laboratory testing, repatriation of passengers and crew from the ship and international contact tracing, as well as quarantine and monitoring measures.<br /></p><div><div id="ftn3"></div></div><p>Contact identification and follow-up of contacts of hantavirus cases linked to the cruise ship has been conducted in 33 countries and overseas territories. This included passengers and crew onboard the ship, contacts of the case on Tristan da Cunha, contacts from two different international flights, healthcare workers and airport crew who assisted cases before the detection of the outbreak. As of 2 July 2026, 317 high-risk contacts have
    completed quarantine and monitoring by local health authorities in the countries and territories where they were repatriated, evacuated or identified. Some 336 low-risk contacts completed self-monitoring in line with the updated guidance on <a href="https://www.who.int/publications/m/item/management-of-contacts-of-andes-virus-(andv)-cases-fromthe-mv-hondius-cruise-ship">management of contacts of Andes virus (ANDV) cases from the MV Hondius cruise ship</a> published on 17 May 2026.&nbsp;</p>
