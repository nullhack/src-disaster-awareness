  Response: '<p>Authorities from States Parties managing cases and/or contacts, WHO, and partners such as the European Centre for Disease Prevention and Control have coordinated response measures, including:</p><ul type="disc"><li data-list="0" data-level="1">Ongoing engagement between WHO and the NFPs of      countries managing cases and/or contacts ensured timely information      sharing and coordination of response actions.</li><li data-list="0" data-level="1">International contact tracing and follow-up of      contacts was conducted by local health authorities in line with national      arrangements.</li><li data-list="0" data-level="1">WHO requested regular information sharing and periodic      updates from States Parties through IHR channels regarding the follow-up      of contacts and their health status.</li><li data-list="0" data-level="1">Ongoing epidemiological investigations to define      epidemiological links between cases and exposure factors on the ship, as      well as to
    try to understand the potential source of exposure.</li><li data-list="0" data-level="1">A prospective natural history study designed to      improve understanding of Andes virus (ANDV) transmission dynamics,      incubation periods, immune responses, viral kinetics, and the determinants      of severe disease through harmonised longitudinal follow-up of exposed      individuals. The study uses a standardised prospective protocol      implemented across 21 participating countries.<sup>[4]</sup></li><li data-list="0" data-level="1">WHO developed and published specific technical guidance      documents to support response to the event, including: </li><ul type="circle"><li data-list="0" data-level="2">Technical guidance on the management of       hantavirus onboard ships was shared with States Parties through IHR       channels</li><li data-list="0" data-level="2"><a href="https://www.who.int/publications/m/item/who-technical-note-for-the-disembarkation-and-onward-management-of-passengers-and-crew-in-the-context-of-an-andes-virus-associated-cluster-mv-hondius-cruise-ship">Technical
    note for the       disembarkation and onward management of passengers and crew</a> in the context of an ANDV-associated cluster;</li><li data-list="0" data-level="2"><a href="https://www.who.int/publications/m/item/management-of-contacts-of-andes-virus-(andv)-cases-fromthe-mv-hondius-cruise-ship">Management of contacts of Andes       Virus (ANDV) cases</a> from the MV Hondius cruise ship</li><li data-list="0" data-level="2"><a href="https://www.who.int/publications/i/item/B09765">Laboratory testing of Andes virus       (Orthohantavirus andesense) infection</a>: Interim guidance</li></ul></ul><ul type="disc"><li data-list="0" data-level="1">The NFPs of countries managing cases and/or      contacts have been exchanging passenger- and crew-related information. </li></ul><ul><li>WHO provided risk communication coordination and support, ensured timely evidence-based information sharing, activated the coordination mechanisms across the three organizational levels, and supported national authorities
    in implementing public health measures, including in accordance with IHR provisions.</li><li>WHO convened regular Member State briefings, expert discussions covering key technical, laboratory, clinical care and infection prevention and control (IPC) topics, and global webinars via the EPI-WIN knowledge platform to facilitate experience sharing and coordinate support.</li><li>WHO supported the development of research protocols with national and international partners and planned a hantavirus consultation on medical countermeasures.</li><li>WHO coordinated the distribution of the laboratory testing and reference materials made available by Chile and Argentina, as well as diagnostic protocols and information on available test kits and their performance.</li></ul>'
