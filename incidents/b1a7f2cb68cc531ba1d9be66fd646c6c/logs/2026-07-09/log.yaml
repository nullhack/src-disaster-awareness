log_date: '2026-07-09'
summary: A Canadian passenger tested positive for Andes hantavirus after returning from the cruise ship, making Canada the fourth country with a confirmed case linked to the outbreak. The U.S. Centers for Disease Control and Prevention ended its response to the hantavirus cluster, and all 18 U.S. passengers from the MV Hondius returned to their home states. Additionally, an American passenger, Angela Perryman, was ordered by Health Secretary RFK Jr. to remain in quarantine against her will, sparking a controversy over her confinement.
