  Response: '<div><p paraid="2108908504" paraeid="{c23837d6-0850-4e15-936b-c48ed8a01943}{91}">Health authorities in the Democratic Republic of the Congo and Uganda, in collaboration with WHO and partners, continue to implement extensive public health measures, including implementing the continental response plan, engaging donors and mobilizing additional resources to address critical funding gaps and sustain response operations across affected and at-risk areas.&nbsp;</p></div><div><p paraid="156910081" paraeid="{c23837d6-0850-4e15-936b-c48ed8a01943}{127}">For further information about public health response actions by the respective Ministry of Health, WHO and partners, please refer to the latest situation reports published by the WHO Regional Office for Africa: <a href="https://www.afro.who.int/health-topics/ebola-disease/outbreak-drc-26" target="_blank" rel="noreferrer noopener">Ebola Bundibugyo Virus Disease Outbreak Democratic Republic of the Congo | Uganda Weekly External Situation
    Report | WHO | Regional Office for Africa </a>&nbsp;</p></div>'
