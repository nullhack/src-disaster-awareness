  Summary: "The Bundibugyo virus disease (BVD) outbreak in the Democratic Republic of the Congo remains active, with sustained transmission driving increases in reported cases and deaths. As of 15 July 2026, a cumulative total of 2124 confirmed cases, including 828 deaths, have been reported from the Democratic Republic of the Congo. On 13 July 2026, German authorities informed WHO of a laboratory-confirmed case of Ebola disease caused by Bundibugyo virus in a humanitarian worker from the United States of America who was medically evacuated from the Democratic Republic of the Congo. This is the second United States citizen to be treated in Germany, reflecting the ongoing international response efforts. \r\n\r\nIn Uganda no new cases have been reported since 21 June 2026. The most recent case was discharged from the treatment centre on 16 July after two negative tests results. The country has therefore begun the 42-day period of enhanced surveillance required before the end of the outbreak\
    \ can be declared.  \r\n\r\nNational authorities in Uganda and the Democratic Republic of the Congo, in collaboration with WHO and partners, continue to implement extensive response measures. A regional preparedness and prioritization framework continues to guide readiness activities across the African Region. "
