  Title: Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo & Uganda
  Epidemiology: <div><p paraid="710405995" paraeid="{ded14160-1a9c-4c2a-a660-9ddcf173bc60}{156}">Bundibugyo virus disease (BVD) is a severe Ebola disease caused by the Bundibugyo virus, one of the Orthoebolavirus species. It is a zoonotic disease, with fruit bats suspected to be the natural reservoir.&nbsp;</p></div><div><p paraid="677574308" paraeid="{ded14160-1a9c-4c2a-a660-9ddcf173bc60}{170}">Human infection is thought to occur through close contact with the blood or secretions of infected wildlife, such as bats or non-human primates, and it subsequently spreads from person-to-person through direct contact with the blood, secretions, organs, or other bodily fluids of infected individuals or contaminated surfaces and materials. Transmission is particularly amplified in health-care settings when IPC measures are inadequate and during unsafe burial practices involving direct contact with deceased persons.&nbsp;</p></div><div><p paraid="1295580800" paraeid="{ded14160-1a9c-4c2a-a660-9ddcf173bc60}{222}">The
    incubation period for BVD ranges from 2 to 21 days, and infected individuals are not infectious until symptom onset. Early symptoms such as fever, fatigue, muscle pain, headache, and sore throat, are non-specific, which complicates clinical diagnosis and can delay detection. These symptoms then progress to gastrointestinal symptoms, organ dysfunction, and, in some cases, haemorrhagic manifestations.&nbsp;</p></div><div><p paraid="2006760097" paraeid="{c23837d6-0850-4e15-936b-c48ed8a01943}{25}">CFRs in the past two BVD outbreaks, reported in Uganda and in the Democratic Republic of the Congo in 2007 and 2012 were 30% and 50%, respectively.&nbsp;</p></div><div><p paraid="935143066" paraeid="{c23837d6-0850-4e15-936b-c48ed8a01943}{67}">Differentiating BVD from other endemic febrile illnesses such as malaria is challenging without laboratory confirmation using PCR or antigen- or antibody-based assays. Outbreak control relies on rapid case identification, isolation and care, contact tracing,
    safe burials and strong community engagement, as no approved vaccines or specific treatments currently exist for BVD.&nbsp;</p></div>
  Advice: '<div><p paraid="1270548175" paraeid="{407e79ce-9c58-4dd9-8b1a-b838c5e8661e}{96}">WHO advises against any restriction of travel to, or trade with, the Democratic Republic of the Congo or Uganda based on the currently available information. WHO continues to closely monitor and, where necessary, verify travel and trade measures in relation to this event.&nbsp;</p></div><div><p paraid="1493428972" paraeid="{407e79ce-9c58-4dd9-8b1a-b838c5e8661e}{102}">For further information on the considerations for implementing border health and international travel-related temporary recommendations, please see the relevant  <a href="https://iris.who.int/items/b07def43-df30-41b8-83e0-deb33bcfd697" target="_blank" rel="noreferrer noopener">technical note issued on 26 May 2026</a>.&nbsp;</p></div><div><p paraid="710210868" paraeid="{407e79ce-9c58-4dd9-8b1a-b838c5e8661e}{116}">The <a href="https://www.who.int/news/item/22-05-2026-first-meeting-of-the-ihr-emergency-committee-regarding-the-epidemic-of-ebola-bundibugyo-virus-disease-in-the-democratic-republic-of-the-congo-and-uganda-2026-temporary-recommendations"
    target="_blank" rel="noreferrer noopener">Temporary Recommendations</a> issued to State Parties on 22 May 2026 underscore the importance of coordinated outbreak control, strengthened&nbsp;&nbsp;cross‑border collaboration, and sustained surveillance and preparedness to prevent further regional spread and ensure an effective public health response.&nbsp;&nbsp;</p></div><div><p paraid="2144045326" paraeid="{407e79ce-9c58-4dd9-8b1a-b838c5e8661e}{138}">Rapid recognition of cases, testing and optimized supportive care can reduce mortality, and improve community perceptions and acceptance of health care within the response.&nbsp;</p></div><div><p paraid="2106897655" paraeid="{407e79ce-9c58-4dd9-8b1a-b838c5e8661e}{152}">WHO has convened several technical advisory groups, including the Strategic Advisory Group of Experts on Immunization (SAGE) to assess candidate vaccines and therapeutics for BVD. Key recommendations are available in the&nbsp;&nbsp;<a href="https://www.who.int/news/item/28-05-2026-experts-convened-by-who-advise-on-candidate-treatments-and-vaccines-for-ebola-disease-caused-by-bundibugyo-virus"
    target="_blank" rel="noreferrer noopener">news release published on 28 May 2026.</a>&nbsp;</p></div><p paraid="1812528342" paraeid="{407e79ce-9c58-4dd9-8b1a-b838c5e8661e}{168}"><strong>Regular Information products on the outbreak of BVD in the Democratic Republic of the Congo and Uganda&nbsp;</strong></p><ul><li><strong>Daily update: </strong><a href="https://www.who.int/emergencies/alert-and-response">Epidemiological update on BVD outbreak in Democratic Republic of the Congo and Uganda</a> </li><li><strong>Published every Tuesday:</strong> <a href="https://www.afro.who.int/health-topics/ebola-disease/outbreak-drc-26">Weekly External Situation Report on Ebola Bundibugyo Virus Disease Outbreak, Democratic Republic of the Congo | Uganda</a> </li><li><strong>Published biweekly:</strong><a href="https://www.who.int/emergencies/disease-outbreak-news"><strong></strong>Disease Outbreak News | All Hazards Public Health Events, Ebola disease caused by Bundibugyo virus, Democratic Republic of
    the Congo</a><strong></strong></li></ul><ul></ul>'
  Assessment: <div><p paraid="2105732305" paraeid="{c23837d6-0850-4e15-936b-c48ed8a01943}{161}">On 6 June 2026, WHO reassessed the risk of the outbreak of BVD to incorporate newly available information and align with the WHO <a href="https://www.who.int/news/item/22-05-2026-first-meeting-of-the-ihr-emergency-committee-regarding-the-epidemic-of-ebola-bundibugyo-virus-disease-in-the-democratic-republic-of-the-congo-and-uganda-2026-temporary-recommendations" target="_blank" rel="noreferrer noopener">Temporary Recommendations</a>. The risk for countries sharing land borders with countries with documented Bundibugyo virus detection, the Democratic Republic of the Congo and Uganda at the time of assessment, has been separated from the risk for other countries in the African Region.&nbsp;</p></div><div><p paraid="1504517252" paraeid="{c23837d6-0850-4e15-936b-c48ed8a01943}{219}">The risk in the Democratic Republic of the Congo remains assessed as very high due to ongoing transmission and the continued
    expansion of the outbreak into new health zones, increasing the potential for further national and regional spread.&nbsp;</p></div><div><p paraid="82059134" paraeid="{c23837d6-0850-4e15-936b-c48ed8a01943}{225}">The risk in Uganda is still assessed as high due to confirmed cross-border spread through imported cases and ongoing epidemiological links along the eastern Democratic Republic of the Congo&ndash;western Uganda corridor, which has historically been affected by Ebola outbreaks, including Bundibugyo virus and Sudan virus disease.&nbsp;&nbsp;</p></div><div><p paraid="329074013" paraeid="{407e79ce-9c58-4dd9-8b1a-b838c5e8661e}{10}">The risk for countries sharing land borders with countries reporting BDBV detection is assessed as high due to sustained population mobility linked to cross-border trade and mining activities, variation in capacities and experience of BVD response, and variable levels of readiness.&nbsp;&nbsp;</p></div><div><p paraid="1383071648" paraeid="{407e79ce-9c58-4dd9-8b1a-b838c5e8661e}{54}">The
    risk for the rest of the African region and at the global level is assessed as low.&nbsp;</p></div><div><p paraid="788217968" paraeid="{407e79ce-9c58-4dd9-8b1a-b838c5e8661e}{68}">For further information, please see the <a href="https://www.who.int/publications/m/item/who-rapid-risk-assessment-ebola-disease-caused-by-bundibugyo-virus--democratic-republic-of-the-congo--uganda-and-countries-with-land-borders-adjoining-countries-with-documented-bdbv-detection-v3" target="_blank" rel="noreferrer noopener">WHO Rapid Risk Assessment &ndash; Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo, Uganda and countries with land borders adjoining countries with documented BDBV detection v3</a>.&nbsp;</p></div>
  Overview: '<p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Since the previous&nbsp;&nbsp;</span><a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON612" target="_blank" rel="noreferrer noopener" style="text-align:inherit;text-transform:inherit;word-spacing:normal;white-space:inherit;">Disease Outbreak News</a><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"> was published on 3 July 2026, the number of confirmed cases and deaths has increased substantially in the Democratic Republic of the Congo. In total, 2145 confirmed cases have been reported:&nbsp;&nbsp;2124 in the Democratic Republic of the Congo (including two cases with diagnosis in the Democratic Republic of the Congo and subsequent treatment in Germany), 20 in Uganda and one in France. A total of 830 deaths has been
    reported, including two in Uganda.&nbsp;&nbsp;</span></p><div><p paraid="1562830329" paraeid="{bff9d4bc-65b2-45dd-bd67-fd7a3bbc5ac8}{113}">To date, at least 410 patients have recovered, including 390 in the Democratic Republic of the Congo, 18 in Uganda, one in France, and one in Germany.&nbsp;&nbsp;</p><p paraid="1562830329" paraeid="{bff9d4bc-65b2-45dd-bd67-fd7a3bbc5ac8}{113}"><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"><strong>Figure 1. Distribution of cumulative confirmed cases of Bundibugyo virus disease in the Democratic Republic of the Congo as of 15 July and Uganda as of 17 July&nbsp;</strong></span></p></div><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/don_evd_17july2026_map.png?sfvrsn=faa0cb49_1" height="517" style="max-width:100%;height:auto;" title="DON_EVD_17July2026_map" width="739" alt="" sf-size="222743"
    /></p><div><p paraid="1899123609" paraeid="{bff9d4bc-65b2-45dd-bd67-fd7a3bbc5ac8}{244}"><strong>Democratic Republic of the Congo&nbsp;&nbsp;</strong></p></div><div><p paraid="1395301755" paraeid="{bff9d4bc-65b2-45dd-bd67-fd7a3bbc5ac8}{250}">Since 3 July 2026, an additional 664 confirmed cases, including 376 confirmed deaths, have been reported in the Democratic Republic of the Congo. The increase is in part due to the scale-up of surveillance activities, testing, and diagnostic capacities.&nbsp;</p></div><div><p paraid="705776601" paraeid="{a4b796cd-6cf1-443f-9dda-5c387fe27c30}{63}">As of 15 July 2026, a total of 2124 confirmed cases, including 828 deaths (crude case fatality ratio [CFR] 39%) have been reported in the Democratic Republic of Congo. So far, 390 patients have recovered.&nbsp;</p></div><div><p paraid="1203341370" paraeid="{a4b796cd-6cf1-443f-9dda-5c387fe27c30}{147}">Cases have been reported from 46 health zones (HZ) across five provinces:&nbsp;&nbsp;Ituri (27/36 HZ), North
    Kivu (11/34 HZ), South Kivu (1/34 HZ), Haut-Uele (4/13 HZ) and Tshopo (3/23 HZ).</p></div><div><p paraid="811220502" paraeid="{a4b796cd-6cf1-443f-9dda-5c387fe27c30}{229}">Of the 46 affected health zones, the outbreak remains active in 38 health zones, which have reported cases within the past 21 days. The remaining health zones have not reported any new cases during this period. In the past 21 days, 969 confirmed cases, including 524 confirmed deaths, have been reported.&nbsp;&nbsp;</p></div><div><p paraid="84117390" paraeid="{924ebe32-501d-4563-8cb9-5b3812474f17}{26}">Ituri&nbsp; remains the most affected province, accounting for 89.6% (1904/2124) of all confirmed cases and 83.6% (692/828) of all reported deaths nationwide. Within the province, the highest number of confirmed cases have been reported from Bunia (570 cases), Rwampara (418 cases), Mongbwalu (347 cases), Nizi (148 cases), and Nyankunde (99 cases) health zones.&nbsp;&nbsp;</p></div><div><p paraid="1696497923" paraeid="{924ebe32-501d-4563-8cb9-5b3812474f17}{160}">As
    of 15 July, 12 693 contacts have been identified and are under follow-up across Ituri (10 183), North Kivu (2360) and Tshopo (150). Of these, 10 195 contacts have been followed up, corresponding to follow-up rates of 78.1% in Ituri, 50.0% in Tshopo and 91.7% in North Kivu. Previously listed contacts in South Kivu have completed their 21-day followup. In addition, 107 contacts of the case reported in France have been listed and are under follow-up in Kinshasa.&nbsp;&nbsp;</p></div><div><p paraid="1584842443" paraeid="{3a40c07b-0bb7-4b37-a026-cb82313ca869}{31}">Infections among health workers continued to increase, with 119 confirmed cases, 61 recoveries and 36 deaths reported among health workers, corresponding to a CFR of 30.3%. This highlights persistent occupational exposure risks, inadequate infection prevention and control (IPC) implementation in health facilities, and exposure risk in the community.&nbsp;</p></div><div><p paraid="875646354" paraeid="{3a40c07b-0bb7-4b37-a026-cb82313ca869}{89}">The
    outbreak continues in a complex humanitarian and conflict-affected environment, characterized by highly mobile and often displaced populations, many of whom have limited access to basic services, including food, clean water, shelter, health care and protection.&nbsp;&nbsp;These conditions increase the risk of transmission, particularly in overcrowded sites for internally displaced people. Security incidents affecting health facilities, have created additional operational challenges in affected provinces, including restricted access for response teams, disruption of surveillance and response activities and an increased risk of undetected transmission. These conditions underscore the need for response efforts to be led by local leaders and anchored in communities.&nbsp;&nbsp;</p></div><div><p paraid="1544136869" paraeid="{3a40c07b-0bb7-4b37-a026-cb82313ca869}{221}"><strong>Figure 2: Number of confirmed cases (n = 2124), in the Democratic Republic of the Congo, by date of reporting and
    as of 15 July 2026&nbsp;</strong></p><p paraid="1544136869" paraeid="{3a40c07b-0bb7-4b37-a026-cb82313ca869}{221}"><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/don_evd_17july2026_drc-cases.png?sfvrsn=7de75edc_1" height="522" style="max-width:100%;height:auto;" title="DON_EVD_17July2026_DRC cases" width="961" alt="" sf-size="60987" /></p></div><p><strong>Figure 3: Number of deaths among confirmed cases (n = 828), in the Democratic Republic of the Congo, by date of reporting and as of 15 July 2026.&nbsp;&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/don_evd_17july2026_drc-deaths.png?sfvrsn=95c71b61_1" height="549" style="max-width:100%;height:auto;" title="DON_EVD_17July2026_DRC deaths" width="959" alt="" sf-size="72783" /></p><div><div id="ftn1"><p>&nbsp;</p></div></div><div><p paraid="1021883511" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{52}"><em>NB:
    Newly reported confirmed cases/deaths may be part of the backlog of samples and therefore not necessarily newly acquired infections. </em>&nbsp;</p></div><div><p paraid="309683619" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{76}"><strong>Uganda&nbsp;</strong></p></div><div><p paraid="1893762625" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{82}">The last confirmed case was reported to be identified on 21 June 2026.&nbsp;&nbsp;As of 14 July 2026, a cumulative total of 20 confirmed cases have been reported, including two deaths in imported cases (reported on 15 May and 5 June) and one probable case resulting in death.&nbsp;</p></div><div><p paraid="1156811081" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{102}">Of the confirmed cases, 15 were imported cases and five were secondary cases among contacts and health workers linked to imported cases from the Democratic Republic of the Congo.&nbsp;&nbsp;All cases were reported in Kampala District. To date, no community transmission has
    been in Uganda. Exposure risks have been associated with health-care settings and cross-border movements.&nbsp;&nbsp;</p></div><div><p paraid="584951842" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{144}">Following case reclassification, the number of affected healthcare workers was revised from five to four. In total, 18 recoveries have been reported.&nbsp;</p></div><div><p paraid="954364166" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{152}">Of the 831 contacts listed as of 28 June, 821 contacts have completed their 21-day follow-up period as of 14 July.&nbsp;&nbsp;</p></div><div><p paraid="104430596" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{158}">The most recent case was discharged from the treatment centre on 16 July after two negative tests results. This marks the start of the 42-day countdown period (twice the maximum incubation period) to ensure surveillance activities continue to be implemented and detect any cases that were missed before the declaration of the end
    of the outbreak. Given the ongoing outbreak in the Democratic Republic of the Congo, the risk of importation still exists.&nbsp;&nbsp;&nbsp;</p></div><div><p paraid="1911753127" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{176}"><strong>Figure 4: Number of confirmed cases (n = 20), in Uganda by date of reporting and as of 17 July 2026&nbsp;</strong></p><p paraid="1911753127" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{176}"><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/don_evd_17july2026_uganda-cases.png?sfvrsn=e947cab8_1" height="553" style="max-width:100%;height:auto;" title="DON_EVD_17July2026_Uganda cases" width="960" alt="" sf-size="57982" /></p><div><p paraid="1113257143" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{233}"><strong>France</strong></p></div><div><p paraid="1302384039" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{247}">No additional BVD cases have been reported in France since the previous
    update.&nbsp;</p></div><div><p paraid="1300966228" paraeid="{f90d8ee3-e2f9-4ac5-a14e-0d312f997443}{253}">The imported confirmed BVD case reported on 24 June recovered and was discharged from the healthcare facility on 4 July after two negative PCR test results. No secondary transmission has been identified among the five low-risk flight contacts&nbsp; placed under precautionary quarantine. These contacts&nbsp;&nbsp;completed their follow-up period on 14 July.&nbsp;</p></div><div><p paraid="2068949604" paraeid="{ded14160-1a9c-4c2a-a660-9ddcf173bc60}{26}">French authorities have been monitoring&nbsp;&nbsp;these individuals in coordination with relevant regional public health authorities as well as with the National IHR Focal Points of Belgium and the Netherlands who conducted an individual risk assessment. None of the contacts developed symptoms, and no addtional&nbsp;&nbsp;at-risk individuals have been identified.&nbsp;</p></div><div><p paraid="1315987234" paraeid="{ded14160-1a9c-4c2a-a660-9ddcf173bc60}{46}"><strong>Germany</strong></p></div><div><p
    paraid="164890167" paraeid="{ded14160-1a9c-4c2a-a660-9ddcf173bc60}{52}">A&nbsp;&nbsp;physician from the United States&nbsp;&nbsp;working in the Democratic Republic of the Congo, was medically evacuated and treated in Germany in May 2026. The patient recovered and was discharged. No secondary cases were reported.&nbsp;</p></div><div><p paraid="1153524372" paraeid="{ded14160-1a9c-4c2a-a660-9ddcf173bc60}{100}">A second United States citizen, a humanitarian worker, tested positive for Bundibugyo virus in the Democratic Republic of Congo in July 2026 and was medically evacuated to a university hospital in Frankfurt/Main, Germany. The patient&nbsp;&nbsp;is reported to be in stable condition.</p><strong></strong></div></div>'
