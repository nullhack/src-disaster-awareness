title: Over 1,000 deaths recorded in Ebola outbreak in DRC, Uganda—WHO - Jamaica Observer
body: GENVA, Switzerland(AFP)—The Ebola outbreak declared in May has killed more than 1,000 people in the Democratic Republic of Congo and Uganda, the World Health Organization said Wednesday. In all, 2,473 cases of the deadly virus, including 999 deaths, have been confirmed in DRC, while 20 cases, including two deaths have been registered in neighbouring Uganda, according to a WHO overview based on official data from the two countries. The DRC&#039;s...
