log_date: '2026-07-21'
summary: As of late July 2026, the Ebola outbreak in DR Congo has escalated sharply, with confirmed cases rising to over 2,400 and the death toll approaching 1,000. Violence against health workers and health centers in Ituri province continues to hinder containment efforts, and many patients remain in treatment facilities. The outbreak is on track to become one of the deadliest on record.
