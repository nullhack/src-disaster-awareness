title: South Africa steps up Ebola screening for travelers from DR Congo, Uganda
body: CAPE TOWN, July 21 (Xinhua) -- South Africa has introduced mandatory health screening measures for travelers arriving in the country from the Democratic Republic of the Congo (DRC) and Uganda following the ongoing Ebola virus disease (EVD) outbreak.
