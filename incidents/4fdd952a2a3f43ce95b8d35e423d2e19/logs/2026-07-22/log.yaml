log_date: '2026-07-22'
summary: As of July 19, confirmed Ebola cases in the DRC have risen to 2,423 with 967 deaths and 469 recoveries, while 734 patients remain in quarantine or treatment. South Africa has introduced mandatory health screening for travelers arriving from DRC and Uganda in response to the outbreak. The WHO reports signs of stabilization but warns of continued spread in displacement camps.
