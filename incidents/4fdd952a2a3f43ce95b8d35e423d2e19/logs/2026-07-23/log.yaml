log_date: '2026-07-23'
summary: |-
  As of late July 2026, the Ebola outbreak in DR Congo has surpassed 1,000 confirmed deaths, with Africa's top public health official warning it could become one of the worst outbreaks on record without rapid control measures. The World Health Organization continues to caution that the true scale of the outbreak may be two to four times larger than official figures.
  As of July 23, 2026, the Ebola outbreak in DR Congo has recorded 2,536 confirmed cases and 1,033 deaths, according to government data. The outbreak is described as the fastest fatal surge in history, with the WHO warning the true scale may be larger.
