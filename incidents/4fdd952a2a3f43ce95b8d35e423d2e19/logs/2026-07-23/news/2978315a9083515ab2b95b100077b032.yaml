title: Ebola Deaths Top 1,000 in Congo as Response Trails Fastest-Spreading Outbreak
body: Confirmed Ebola deaths in Democratic Republic of Congo have surpassed 1,000, prompting Africa’s top public health official to warn the outbreak could become one of the worst on record unless transmission is rapidly brought under control.
