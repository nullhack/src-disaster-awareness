title: Over 1,000 people have died in Congo's Ebola outbreak
body: Congo's Ebola outbreak has crossed the grim 1,000-death threshold, marking the fastest fatal surge in recorded history of the virus and raising fears the outbreak is entering a dangerous new phase.
