log_date: '2026-07-18'
summary: The Ebola outbreak in DR Congo has surged by about 70% over the past two weeks, with over 40 new cases reported daily. Confirmed cases have risen to 2,181 with 864 deaths, and most deaths are occurring outside health facilities due to funeral practices. A US citizen working for a humanitarian organization has tested positive, and US aid workers have been quarantined in Kenya as the CDC expands travel restrictions.
