  Response: '<p><p>WHO is enhancing national, regional, and global capacities for influenza preparedness and response, including: </p><ul><li>continuous global monitoring of influenza viruses and disease activity;<ul type="disc"></ul></li><li data-list="1" data-level="1">issuing seasonal influenza vaccine composition      recommendations for both hemispheres;</li><li data-list="1" data-level="1">providing technical guidance to Member States on      vaccine selection and campaign timing;</li><li data-list="1" data-level="1">supporting countries in developing prevention and      control strategies;</li><ul type="disc"></ul><li data-list="0" data-level="1">enhancing diagnostic capabilities and laboratory      networks;</li><li data-list="0" data-level="1">monitoring vaccine effectiveness and susceptibility      to approved antivirals;</li><li data-list="0" data-level="1">supporting disease surveillance and outbreak      response activities;</li><li data-list="0" data-level="1">promoting increased
    vaccine coverage among      high-risk groups;</li><li data-list="0" data-level="1">facilitating research and development of new      therapeutics and countermeasures; and</li><li data-list="0" data-level="1">enhancing risk communication for the onset of the      influenza season.</li></ul></p>'
