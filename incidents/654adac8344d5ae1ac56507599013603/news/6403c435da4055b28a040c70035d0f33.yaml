title: Mount Semeru Erupts Again This Afternoon, Ash Plume Reaches 800 Meters Above Peak | Pusat Data Ekonomi dan Bisnis Indonesia | Databoks
body: Mount Semeru (East Java) erupted 14 July 2026 with 800m ash plume. Semeru has 1403 recorded 2026 eruptions, most in Indonesia. PVMBG maintains Level III alert with exclusion zones.
