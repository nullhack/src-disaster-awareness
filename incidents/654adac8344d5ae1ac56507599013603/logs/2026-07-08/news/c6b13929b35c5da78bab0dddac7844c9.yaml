title: Indonesia evacuates stranded climbers after Semeru volcano erupts | Honolulu Star-Advertiser
body: JAKARTA >> Indonesian authorities evacuated more than 900 people and were facilitating the safe return on Thursday of 170 climbers stranded after the eruption of its Semeru volcano, one of the country’s tallest mountains.
