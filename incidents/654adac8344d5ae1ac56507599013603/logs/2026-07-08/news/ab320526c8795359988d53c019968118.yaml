title: Volcano erupts, sending ash over 6,500 feet into the sky, threatening air traffic in Indonesia
body: Indonesia’s Mount Semeru volcano erupted Wednesday afternoon around 4:00 p.m. local time, sending ash more than 6,500 feet into the air, according to data from the country’s Center for Volcanology.
