log_date: '2026-07-22'
summary: |-
  Updated 2025-2026 formulations of mRNA-1283 and BNT162b2 COVID-19 vaccines have been shown to reduce hospitalization risk in older adults, providing new evidence of protection against severe outcomes. A separate article details an FBI matter involving EcoHealth Alliance, and another reports a $5 million settlement over a vaccine policy lawsuit at Idaho National Lab, but these are less central to the global situation.
  Newly released federal documents have revived questions about COVID-19 origins, showing top scientists privately doubted the bat origin theory despite public statements. Separately, COVID-19 levels in Bay Area wastewaters are increasing, signaling a possible summer surge.
