summary: COVID-19 is showing a seasonal summer uptick in California, with experts noting many people haven't been recently infected. Bengaluru, India has recorded 121 cases this year, with medical experts warning that periodic rises are expected as immunity wanes and new variants emerge, urging vigilance without panic. Meanwhile, Ireland's evaluation panel on its pandemic response is due to report in six months.
