  Advice: "<p>WHO\r\nadvises all Member States to continue applying a risk-based, integrated\r\napproach to managing COVID-19, embedded within broader disease prevention and\r\ncontrol programmes, in particular those for other respiratory disease threats,\r\nin line with the WHO Director-General&rsquo;s Standing Recommendations. Sustained\r\ninvestment in core public health capabilities, notably collaborative surveillance,\r\ncommunity protection, clinical care, access to and delivery of medical\r\ncountermeasures, and coordination, is critical to monitoring SARS-CoV-2 circulation\r\nand evolution, and mitigating its ongoing health and socioeconomic impacts.</p><p>Following the expiration of the last Global Strategic Preparedness and Response Plan (SPRP) from 2023-2025, WHO has published a high level <a href=\"https://www.who.int/publications/m/item/strategic-and-operational-plan-for-coronavirus-disease-threat-management-at-a-glance\">strategic and operational plan for coronavirus disease\
    \ threat management</a> that sets out the global framework for supporting Member States in the sustained, integrated, evidence-based management of coronavirus disease threats, including COVID-19, MERS, and potential novel coronavirus diseases of public health importance. The plan builds on and supersedes previous WHO strategic preparedness and response plans for COVID-19. It emphasizes long-term, routine management of COVID-19 and other coronavirus diseases, embedded within national healthcare and health emergency systems and aligned with broader respiratory disease management strategies. An <a href=\"https://www.who.int/publications/m/item/strategic-and-operational-plan-for-coronavirus-disease-threat-management-at-a-glance\">&lsquo;At a glance&rsquo; document</a> is available and provides a high-level overview of the plan in advance of a more detailed plan&rsquo;s release. &nbsp;</p><p>WHO\r\nreleased an updated package of <a href=\"https://www.who.int/emergencies/diseases/novel-coronavirus-2019/covid-19-policy-briefs\"\
    >policy\r\nbriefs</a> in December 2024 designed to help countries formulate\r\nevidence-based policies to manage SARS-CoV-2 transmission, particularly in\r\nhigh-risk and vulnerable populations, and to reduce morbidity, mortality and\r\nlong-term sequelae from COVID-19. The briefs outline essential actions that\r\nnational and sub-national policy-makers can implement to work towards\r\ncomprehensive COVID-19 prevention and control. Member States should prioritize\r\nefforts to:</p><ul><li>Maintain multi-source, multi-tiered collaborative surveillance systems for early detection, variant monitoring, and disease burden assessment, using both sentinel and wastewater surveillance, integrated into respiratory pathogen monitoring platforms.<sup>[7-8]</sup><sup></sup></li><li>Ensure continued equitable access to and uptake of COVID-19 vaccines, particularly among high-risk groups, guided by national immunization strategies aligned with WHO SAGE recommendations.<sup>[9-10]</sup><sup></sup><sup></sup></li><li>Strengthen\
    \ healthcare delivery systems to ensure high-quality clinical management of COVID-19 and Post-COVID-19 Condition (PCC), embedded in scalable care models and featuring robust infection prevention and control standards.</li><li>Enhance risk communication and community engagement to empower individuals to make informed decisions, counter misinformation, and support community-led protection strategies.</li><li>Institutionalize national and subnational coordination mechanisms, including those developed during the acute phase of the pandemic, into long-term respiratory disease threat management systems, aligned with a One Health approach.</li></ul><p>WHO further reminds Member States that the <a href=\"https://apps.who.int/gb/ebwha/pdf_files/WHA78/A78_INF7-en.pdf\">International Health Regulations (IHR) Standing Recommendations on COVID-19</a>, issued by the Director-General following the expiration of the PHEIC in May 2023, remain valid through 30 April 2026. These recommendations provide\
    \ ongoing guidance for sustained COVID-19 threat management, and WHO encourages countries to align their national policies with these recommendations to ensure continued vigilance and preparedness.</p><p><span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">WHO recommends that countries remain vigilant, adapt to evolving epidemiological trends, and leverage COVID-19 management strategies to strengthen systems for all respiratory disease threats. Member States should continue offering COVID-19 vaccines in line with WHO recommendations.<sup>[11]</sup></span><sup></sup></p><p><span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Based on the current risk assessment of this event, WHO advises against imposing travel or trade restrictions.</span></p>"
  Assessment: '<p>As per the latest WHO global risk assessment, covering the period July-December 2024, the global public health risk associated with COVID-19 remains high. There has been evidence of decreasing impact on human health throughout 2023 and 2024 compared to 2020-2023, driven mainly by: 1) high levels of population immunity, achieved through infection, vaccination, or both; 2) similar virulence of currently circulating JN.1 sublineages of the SARS-CoV-2 virus as compared with previously circulating Omicron sublineages; and 3) the availability of diagnostic tests and improved clinical case management. SARS-CoV-2 circulation nevertheless continues at considerable levels in many areas, as indicated in regional trends, without any established seasonality and with unpredictable evolutionary patterns. WHO produces global COVID-19 risk assessments every six months; the global risk assessment covering the period January-June 2025 is currently under development.&nbsp;</p><p>WHO continues
    to monitor emerging SARS-CoV-2 variants and undertakes risk evaluation for designated variants of interest (VOI) and VUMs with the support of the Technical Advisory Group of Virus Evolution (TAG-VE). Evaluation of the currently predominant VUM, <a href="https://www.who.int/publications/m/item/risk-evaluation-for-sars-cov-2-variant-under-monitoring-lp81">LP.8.1</a>, and the most recently designated VUM, <a href="https://cdn.who.int/media/docs/default-source/documents/epp/tracking-sars-cov-2/23052025_nb.1.8.1_ire.pdf?sfvrsn=7b14df58_4">NB.1.8.1</a>, suggests no increased public health risk posed by these variants compared to other circulating variants.&nbsp;</p><p>To permit robust COVID-19 risk assessment and management, WHO reiterates its recommendations to Member States to continue to monitor and report SARS-CoV-2 activity and burden, public health and healthcare system impacts of COVID-19, strengthen genomic sequencing capacity and reporting, in particular information on SARS-CoV-2
    variants&nbsp;<sup>[6]</sup><sup></sup>, promptly and transparently to support global public health efforts.</p>'
  Overview: "<p>There\r\nhas been an increase in SARS-CoV-2 activity globally, based on SARS-CoV-2 data\r\nreported to the Global Influenza Surveillance and Response System (GISRS) from sentinel\r\nsurveillance sites. As of 11 May 2025, the test positivity rate is 11% across 73\r\nreporting countries, areas and territories. This level matches the peak\r\nobserved in July 2024 (12% from 99 countries) and marks a rise from 2% reported\r\nby 110 countries back in mid-February 2025 (Figure 1). The increase in test\r\npositivity rate is mainly being driven by countries in the Eastern\r\nMediterranean Region, the South-East Asia Region, and the Western Pacific Region.&nbsp;</p><p>Countries\r\nin the African Region, European Region, and the Region of the Americas are\r\ncurrently reporting low levels of SARS-CoV-2 activity with percent positivity\r\nfrom sentinel or systematic virological surveillance sites ranging from 2% to\r\n3%. However, some areas&mdash;particularly in the Caribbean and Andean\
    \ subregions in the\r\nRegion of the Americas showed increasing trends of SARS-CoV-2 test positivity as\r\nof 11 May. Publicly available wastewater monitoring data from countries in the\r\nEuropean Region and the Northern America subregion remain low and, at present,\r\ndo not indicate any upward trend in SARS-CoV-2 activity as of 11 May 2025.<o:p></o:p></p><p>The reporting of COVID-19 associated hospitalizations, Intensive Care Unit (ICU) admissions, and deaths is very limited from the countries in the Eastern Mediterranean Region, the South-East Asia Region, and the Western Pacific Region and does not allow for evaluation of the impact on health systems by WHO.&nbsp; <img sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/sars-cov-2-tested-specimens-and-percent-positive.jpg?sfvrsn=b2516061_3\" height=\"495\" style=\"max-width:100%;height:auto;\" title=\"SARS-CoV-2 tested specimens and percent positive\" width=\"1013\"\
    \ alt=\"SARS-CoV-2 Tested specimens and percent positive\" sf-size=\"71705\" /></p><p><strong>Figure 1. SARS-CoV-2 tested specimens and percent positive reported from sentinel sites to eGISRS from countries, areas and territories from January 2023 to May 2025*</strong></p><p><em>*Most recent week&rsquo;s data may be incomplete. </em><em>Source: </em><a href=\"https://www.who.int/teams/global-influenza-programme/surveillance-and-monitoring/influenza-surveillance-outputs\"><em>Global Influenza Programme</em></a><em></em></p><p><strong>SARS-CoV-2 Variant Evolution and\r\nCirculation<o:p></o:p></strong></p><p><span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">SARS-CoV-2\r\ncontinues to evolve, and between January and May 2025, there were shifts in global\r\nSARS-CoV-2 variant dynamics. At the beginning of the year, the most prevalent\r\nvariant tracked by WHO at the global level was XEC, followed\
    \ by KP.3.1.1. In\r\nFebruary, circulation of XEC began to decline while that of LP.8.1 increased,\r\nwith the latter becoming the most detected variant in mid-March. Since\r\nmid-April, the circulation of LP.8.1 has been slightly declining as NB.1.8.1 is\r\nincreasingly being detected.</span></p><p><img sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/sars-cov-2-variants-of-interest-and-variants.jpg?sfvrsn=9d4bb9d7_3\" height=\"498\" style=\"max-width:100%;height:auto;\" title=\"SARS-CoV-2 Variants of Interest and Variants\" width=\"1130\" alt=\"SARS-CoV-2 Variants of Interest and variants\" sf-size=\"76070\" /></p><p><strong>Figure 2. SARS-CoV-2 Variants of Interest and Variants Under Monitoring proportions from January 2025 to May 2025.</strong></p><p><em>Source</em><em>:&nbsp;</em><a href=\"https://gisaid.org/\"><em>GISAID</em></a>&nbsp;<em>and&nbsp;</em><a href=\"https://cov-spectrum.org/explore/World/AllSamples/Past6M\"\
    ><em>CoV-SPECTRUM</em></a></p><p>The most recently designated variant under monitoring (VUM) is NB.1.8.1, which is a descendent lineage of XDV.1.5.1, in turn a descendent of JN.1, with the earliest sample collected on 22 January 2025. In comparison to the currently dominant SARS-CoV-2 variant, LP.8.1, NB.1.8.1 has the following additional spike mutations: T22N, F59S, G184S, A435S, V445H, and T478I. Spike mutations at position 445 have been shown to enhance binding affinity to hACE2 receptor, which could increase the variant&rsquo;s transmissibility; mutations at position 435 have been shown to modestly reduce the neutralization potency of class 1 and class 1/4 antibodies; mutations at position 478 have been shown to enhance the evasion of Class 1/2 antibodies.<sup>[2]</sup></p><p>As of\r\n18 May 2025, 518 NB.1.8.1 sequences were submitted to GISAID from 22 countries,\r\nrepresenting 10.7% of the globally available sequences in epidemiological week (EW)\r\n17 of 2025 (21 to 27 April 2025).\
    \ While the percentage remains low, this presents\r\na significant rise from 2.5% four weeks prior in EW14 of 2025 (31 March to 6\r\nApril 2025). Between EW14 and EW17 of 2025, increased circulation of NB.1.8.1\r\nwas detected in all three WHO regions that are consistently sharing SARS-CoV-2\r\nsequences, i.e. from 8.9% to 11.7% for the Western Pacific region, from 1.6% to\r\n4.9% for the region of the Americas, and from 1.0% to 6.0% for the European\r\nregion. There are only 5 NB.1.8.1 sequences from the South-East Asia Region,\r\nand none from the African Region or the Eastern Mediterranean Region.<o:p></o:p></p><p><strong>COVID-19 Vaccination Update</strong></p><p>From the latest available global data covering the period between 1 January and 30 September 2024, overall COVID-19 vaccine uptake among high-risk groups remains low, with significant&nbsp;disparities across regions and income levels. Among older adults<sup>[3]</sup><sup></sup>, just 1.68% were reported as having received\
    \ a dose so far in 2024 up to 30 September 2024 across 75 reporting Member States, and among health and care workers, uptake stood at 0.96% across 54 reporting Member States. An estimated 39.2 million individuals, across 90 reporting Member States covering 31% of the global population, had received a dose in 2024 through 30 September 2024, including 14.8 million in the third quarter. Uptake was notably higher in the Region of the Americas and the European Region, with older adult coverage reaching 5.1% in the European Region and 3.6% in the Region of the Americas compared to less than 0.5% in other regions. A similar disparity was observed when comparing countries by income level. High and upper middle-income countries (HIC/UMIC) reported higher vaccine uptake among older adults with 4.3% and 1.2% respectively, compared to less than 0.5% in low-income countries (LIC) and lower middle-income countries (LMIC). Similar patterns were seen among health and care workers, with uptake in the\
    \ Region of the Americas (2.8%) far exceeding the less than 0.5% seen in other regions. Among income groups, UMICs reported 2.1% coverage, compared to just 0.3% in LICs and 0.1% in LMICs. Complete vaccination data for 2024 is being collected now and will be released in mid-July 2025. </p><p>Currently approved COVID-19 vaccines continue to provide protection against severe disease and death. To ensure approved vaccines remain effective, the WHO Technical Advisory Group on COVID-19 Vaccine Composition (TAG-CO-VAC) continues to monitor and review the impact of SARS-CoV-2 evolution on the performance of available vaccines.&nbsp; In May 2025, <a href=\"https://www.who.int/news/item/15-05-2025-statement-on-the-antigen-composition-of-covid-19-vaccines\">TAG-CO-VAC advised that monovalent vaccines targeting the JN.1 or KP.2 lineages remain appropriate</a>. They also noted that vaccines targeting the LP.8.1 lineage can be considered as a suitable alternative. Vaccination should not be delayed.\
    \ However, in anticipation of access to latest variant-containing vaccines, there is a greater benefit in ensuring that persons at high risk of developing severe COVID-19 receive a dose of any available vaccine as compared to delaying vaccination.</p><p><strong><em>Overview of selected WHO regions</em></strong></p><p><strong style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Eastern Mediterranean Region</strong></p><p>In the Eastern Mediterranean Region, sentinel surveillance data have been reported from 12 countries via test positivity rates from sentinel sites in 2025. The test positivity rate increased from 4% in EW13 to 17% in EW17 and then declined to 15% in EW19. Following lower circulation in the first ten weeks of 2025, a sharp upward trend surpassed the levels of last year (11% in EW17 2024). Across the region, recent reports of increases in circulation have been observed in five countries\
    \ to date, including Egypt, Kuwait, Oman, Saudi Arabia, United Arab Emirates and Pakistan.&nbsp;</p><p><img sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/sars-cov-2-tested-specimens-emro.jpg?sfvrsn=ca9a8237_3\" height=\"528\" style=\"max-width:100%;height:auto;\" title=\"SARS-CoV-2 tested specimens EMRO\" width=\"823\" alt=\"SARS-CoV-2 Tested specimens EMRO\" sf-size=\"37604\" /></p><p><strong>Figure 3. SARS-CoV-2 tested specimens reported from sentinel sites to eGISRS from countries, areas and territories in the Eastern Mediterranean Region for 2024 and 2025*</strong></p><p><em>*Most recent week&rsquo;s data may be incomplete. Source: </em><a href=\"https://www.who.int/teams/global-influenza-programme/surveillance-and-monitoring/influenza-surveillance-outputs\"><em>Global Influenza Programme</em></a></p><p><strong>South-East Asia Region</strong></p><p>In the South-East Asia Region, sentinel surveillance data have\
    \ been reported by eight countries in 2025. Since the beginning of April, the test positivity rate increased from 0.5% in EW15 to 5% in EW19. Although at a lower level, a similar upward trend was observed during the same period in 2024, with rates rising from 4% in EW15 to 6% in EW19, and further to 10% by EW24. The recent increases are observed in the Maldives and Thailand. As per published national reports, a rise in COVID-19 case detections was observed in India <sup>[4]</sup> in EW20 and Thailand<sup> [5]</sup>&nbsp;between EW16 to EW20.</p><p><img sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/sars-cov-2-tested-specimens-searo.jpg?sfvrsn=2d0b28a2_3\" height=\"475\" style=\"max-width:100%;height:auto;\" title=\"SARS-CoV-2 tested specimens SEARO\" width=\"719\" alt=\"SARS-CoV-2 Tested specimens SEARO\" sf-size=\"31021\" /></p><div><div id=\"ftn1\"><p><strong>Figure 4. SARS-CoV-2 tested specimens reported from sentinel\
    \ sites to eGISRS from countries, areas and territories in the South-East Asia Region for 2024 and 2025*</strong></p><p><em>*Most recent week&rsquo;s data may be incomplete. Source: </em><a href=\"https://www.who.int/teams/global-influenza-programme/surveillance-and-monitoring/influenza-surveillance-outputs\"><em>Global Influenza Programme</em></a></p><p><strong style=\"background-color:transparent;font-family:'Noto Sans', Arial, Helvetica, sans-serif;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Western Pacific Region</strong></p><p>In the Western Pacific Region,\r\nsentinel surveillance data have been reported by ten countries and areas via\r\ntest positivity rates from sentinel sites in 2025. In the past month, the test\r\npositivity rate increased from 5% in EW14 to 11% in EW19. Following lower\r\ncirculation in the first ten weeks of the year, a sharp upwards trend reached similar\r\nlevels as last year (10% in EW18 2024).\
    \ The recent increases have been observed\r\nin four countries and areas to date: Cambodia, China, Hong Kong SAR and\r\nSingapore.&nbsp;&nbsp;</p><p><o:p><img sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/sars-cov-2-tested-specimens-wpro.jpg?sfvrsn=87ed4f90_3\" height=\"518\" style=\"max-width:100%;height:auto;\" title=\"SARS-CoV-2 tested specimens WPRO\" width=\"833\" alt=\"SARS-CoV-2 Tested specimens WPRO\" sf-size=\"35953\" /></o:p></p><p><strong>Figure 5. SARS-CoV-2 tested specimens reported from sentinel sites to eGISRS from countries, areas and territories in the Western Pacific Region for 2024 and 2025*</strong></p><p><em>*Most recent week&rsquo;s data may be incomplete. Source: </em><a href=\"https://www.who.int/teams/global-influenza-programme/surveillance-and-monitoring/influenza-surveillance-outputs\"><em>Global Influenza Programme</em></a><br /></p></div></div>"
