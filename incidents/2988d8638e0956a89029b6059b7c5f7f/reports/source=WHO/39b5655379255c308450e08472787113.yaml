    SAGE Roadmap for prioritizing uses of COVID-19 vaccines: <a href="https://www.who.int/publications/i/item/WHO-2019-nCoV-Vaccines-SAGE-Prioritization-2023.1">https://www.who.int/publications/i/item/WHO-2019-nCoV-Vaccines-SAGE-Prioritization-2023.1</a></li><li>Statement on the antigen composition of COVID-19 vaccines: <a href="https://www.who.int/news/item/15-05-2025-statement-on-the-antigen-composition-of-covid-19-vaccines">https://www.who.int/news/item/15-05-2025-statement-on-the-antigen-composition-of-covid-19-vaccines</a></li></ul><p>&nbsp;</p><p>[1] Director-General&rsquo;s Standing Recommendations: <a href="https://apps.who.int/gb/ebwha/pdf_files/WHA78/A78_INF7-en.pdf">https://apps.who.int/gb/ebwha/pdf_files/WHA78/A78_INF7-en.pdf</a>&nbsp;&nbsp;</p><p>[2] NB.1.8.1 initial risk evaluation:&nbsp;<a href="https://cdn.who.int/media/docs/default-source/documents/epp/tracking-sars-cov-2/23052025_nb.1.8.1_ire.pdf?sfvrsn=7b14df58_4">https://cdn.who.int/media/docs/default-source/documents/epp/tracking-sars-cov-2/23052025_nb.1.8.1_ire.pdf?sfvrsn=7b14df58_4</a></p><p>[3]
    Minimum age of &lsquo;older adults&rsquo; is defined by Member States; often it is 50 or 60 years and older.</p><div id="ftn1"><p>[4] India COVID-19 Statewise Status:&nbsp;<a href="https://covid19dashboard.mohfw.gov.in/">https://covid19dashboard.mohfw.gov.in/</a></p></div><div id="ftn2"><p>[5]&nbsp;Thailand:&nbsp;<a href="https://dvis3.ddc.moph.go.th/t/DDC_CENTER_DOE/views/_v2/sheet26?%3Aembed=y">https://dvis3.ddc.moph.go.th/t/DDC_CENTER_DOE/views/_v2/sheet26?%3Aembed=y</a></p><p>[6] Updated working definitions and primary actions for SARS-CoV-2 variants:&nbsp;<a href="https://www.who.int/publications/m/item/updated-working-definitions-and-primary-actions-for--sars-cov-2-variants">https://www.who.int/publications/m/item/updated-working-definitions-and-primary-actions-for--sars-cov-2-variants</a></p><div id="ftn1"><p>[7] Surveillance for respiratory viruses of epidemic and pandemic potential:&nbsp;<a href="https://www.who.int/initiatives/mosaic-respiratory-surveillance-framework/">https://www.who.int/initiatives/mosaic-respiratory-surveillance-framework/</a></p></div><div
    id="ftn2"><p>[8] Global Influenza Surveillance and Response System (GISRS):&nbsp;<a href="https://www.who.int/initiatives/global-influenza-surveillance-and-response-system">https://www.who.int/initiatives/global-influenza-surveillance-and-response-system</a></p></div><div id="ftn3"><p>[9] Statement on the antigen composition of COVID-19 vaccines (15 May 2025):&nbsp;<a href="https://hq_who_departmentofcommunications.cmail20.com/t/d-e-shiliiy-ijjyjhwtr-g/">https://hq_who_departmentofcommunications.cmail20.com/t/d-e-shiliiy-ijjyjhwtr-g/</a></p></div><div id="ftn4"><p>[10] WHO SAGE Roadmap for prioritizing uses of COVID-19 vaccines (10 November 2023):&nbsp;<a href="https://www.who.int/publications/i/item/WHO-2019-nCoV-Vaccines-SAGE-Prioritization-2023.1">https://www.who.int/publications/i/item/WHO-2019-nCoV-Vaccines-SAGE-Prioritization-2023.1</a></p></div><p>[11] &nbsp;WHO SAGE Roadmap for prioritizing uses of COVID-19 vaccines:&nbsp;<a href="https://www.who.int/publications/i/item/WHO-2019-nCoV-Vaccines-SAGE-Prioritization-2023.1">https://www.who.int/publications/i/item/WHO-2019-nCoV-Vaccines-SAGE-Prioritization-2023.1</a></p></div><p><strong>Citable
    reference:&nbsp;</strong>World Health Organization (28 May 2025). Disease Outbreak News; COVID-19 - Global situation. Available at:&nbsp;<a href="https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON572">https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON572</a> </p>'
  Summary: "Since mid-February 2025, according to data available from sentinel sites, global SARS-CoV-2 activity has been increasing, with the test positivity rate reaching 11%, levels that have not been observed since July 2024. This rise is primarily observed in countries in the Eastern Mediterranean, South-East Asia, and Western Pacific regions. \r\nSince early 2025, global SARS-CoV-2 variant trends have slightly shifted. Circulation of LP.8.1 has been declining, and reporting of NB.1.8.1, a Variant Under Monitoring (VUM), is increasing, reaching 10.7% of global sequences reported as of mid-May.\r\nRecent increases in SARS-CoV-2 activity are broadly consistent with levels observed during the same period last year, however, there still lacks a clear seasonality in SARS-CoV-2 circulation, and surveillance is limited. Continued monitoring is essential.\r\nWHO advises all Member States to continue applying a risk-based, integrated approach to managing COVID-19 as outlined in the Director-General’s\
    \ Standing Recommendations [1].  As part of comprehensive COVID-19 control programmes, vaccination remains a key intervention for preventing severe disease and death from COVID-19, particularly among at risk groups. "
