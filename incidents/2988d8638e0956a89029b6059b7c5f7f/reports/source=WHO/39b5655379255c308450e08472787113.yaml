  Response: <p>Since the formal ending of the public health emergency of international concern (PHEIC) in May 2023, Member States have adopted diverse approaches to sustaining COVID-19 and broader coronavirus disease threat management. While some countries have integrated COVID-19 activities into existing respiratory disease programmes, others remain in transitional phases, maintaining targeted vertical interventions while adapting systems and structures for integrated management of infectious diseases. This variation reflects differing national contexts, resource availability, health system capacities and other national priorities.</p><p>Routine public health measures for COVID-19 are increasingly being embedded within broader surveillance and response systems. Countries have been moving to operate integrated respiratory disease surveillance platforms &ndash; such as eGISRS and <a href="https://www.who.int/groups/who-coronavirus-network">Coronavirus Network</a> (CoViNet) &ndash; which include
    sentinel surveillance, virological characterization and wastewater monitoring, enabling the detection of circulating SARS-CoV-2 variants and providing insight into broader trends in viral respiratory illness. Clinical pathways developed during the acute phase of the COVID-19 pandemic are being refined and sustained, supporting access to diagnosis, treatment, and care for individuals with COVID-19 and post-COVID-19 (long COVID) condition. Vaccination efforts remain a cornerstone of protection for high-risk groups, with updated vaccines being offered through routine or targeted immunization strategies, often alongside those for seasonal influenza and respiratory syncytial virus (RSV). Risk communication and community engagement&nbsp;activities continue to inform and empower the public, adapted to local contexts and evolving levels of perceived risk.</p><p>However, the long-term sustainability of these activities and the financing to support this remain a challenge in many countries. Health
    systems face an increasing number of competing priorities, including other infectious disease threats, the growing burden of non-communicable diseases, health workforce strain, and the persistent need to recover essential services disrupted during the pandemic. Beyond the health sector, broader societal and economic pressure, such as inflation, political instability, and humanitarian crises, further complicate efforts to maintain COVID-19 disease threat management at scale. WHO and partners continue to support countries in navigating these realities by promoting context-sensitive integration, prioritization, and long-term investment in respiratory disease threat management systems.</p><p>WHO continues to support Member States by convening and coordinating global stakeholders and relevant networks, developing evidence-based guidance and policy recommendations, and providing tailored support to assist Member States in building and sustaining core capabilities, in collaboration with other
    key partners.</p>
