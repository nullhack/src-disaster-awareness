title: Suzuki extends assistance to earthquake-affected dealership employees in GenSan
body: FOLLOWING the recent earthquake that affected parts of Mindanao, Suzuki Philippines immediately extended assistance to employees of Suzuki Auto General Santos and Suzuki Auto SM City General Santos to help support them during the initial stages of recovery.
