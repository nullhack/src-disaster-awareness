title: No unusual sea-level changes observed following strong earthquake off Balut Island, says PHIVOLCS
body: The recommendation for minor sea-level disturbances for the strong earthquake that occurred on Tuesday, July 14, 2026 has been cancelled, the Philippine Institute of Volcanology and Seismology (PHIVOLCS) reported.
