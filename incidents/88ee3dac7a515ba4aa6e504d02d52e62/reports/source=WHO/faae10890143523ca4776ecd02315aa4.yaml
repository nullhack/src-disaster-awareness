  Response: <p>WHO maintains global mpox surveillance and continues to provide response guidance for all countries and support to access diagnostics and vaccines through multi-partner coordination. WHO and partners have established the International Coordinating Group for mpox vaccine provision (ICG) to further accelerate timely outbreak response and ensure sustainable support for the future. Furthermore, WHO continues to evaluate available rapid diagnostic tests for field use.<br /></p><p>Public health response measures taken in the affected WHO Regions include:</p><h3>WHO African Region</h3><ul><li>A continental mpox response is ongoing in the region, including all <a href="https://africacdc.org/download/mpox-continental-response-plan-2-0/">main response pillars</a>.</li><li>Surveillance activities continue, and most countries have mpox diagnostic capacity in place</li><li>Sixteen countries have received mpox vaccines and are vaccinating people at risk to contain the outbreaks.</li></ul><h3>WHO
    Region of the Americas</h3><ul><li>WHO supports Member States with surveillance, preparedness, and outbreak response in activities for mpox in affected countries.</li><li>WHO provides information through situation reports and the mpox dashboard.</li><li>Vaccines remain available to countries through the PAHO Revolving Fund.</li><li>The response is focused on communication and engagement of at-risk communities, timely detection of cases and treatment of patients, laboratory confirmation, surveillance, and containment of transmission chains, securing access to critical health supplies and protection of health workers.</li></ul><h3>WHO South-East Asia Region</h3><ul><li>WHO provides weekly briefings and technical guidance to Member States to enhance preparedness, including laboratory diagnostics and access to medical countermeasures (MCM).</li><li>Access to MCM is facilitated through allocation and supply chain coordination for diagnostics and support to regulatory preparedness through
    a regional regulatory network.</li><li>WHO provides guidance on clinical management and infection prevention and control to strengthen capacity for safe and scalable care.</li><li>A collaborative surveillance mechanism for early detection and reporting includes coordination between HIV/STI and emergency programmes. Support includes genomic sequencing, reagent supply, training, and bioinformatics to improve regional capacity.</li><li>Community protection and communication strategies are being scaled up, with targeted outreach to high-risk groups, social listening, rumour tracking, and regional adaptation of messaging, alongside efforts to improve genomic sequencing capacity and regulatory preparedness for diagnostics.</li></ul><h3>WHO Eastern Mediterranean Region</h3><ul><li>WHO continues to support coordination, reporting, and information sharing between countries through the IHR mechanism.</li><li>WHO continues advocating with national stakeholders to integrate mpox prevention and care
    in routine STI services.</li><li>WHO supports countries to access mpox diagnostics services through facilitating procurement and distribution of kits.</li><li>WHO works closely with national health authorities to strengthen surveillance and ensure inclusion of mpox in lists of diseases for routine surveillance.</li></ul><h3>WHO European Region</h3><ul><li>WHO and the European Centre for Disease Prevention and Control (ECDC) have asked all Member States to report mpox due to clade I MPXV through official International Health Regulations (IHR) and/or surveillance mechanisms.</li><li>WHO has conducted modelling to better understand drivers of mpox transmission in the region.</li><li>ECDC published a threat assessment brief following the detection of local transmission of clade Ib MPXV in the EU/EEA.</li><li>A Risk Communication, Community Engagement, and Infodemic Management package for health workers and travel advice has been shared with Member States through IHR focal points.</li><li>Questions
    and answers documents on mpox have been updated.&nbsp;</li><li>WHO and ECDC are planning a community briefing on the situation to understand community perceptions.</li></ul><h3>WHO Western Pacific Region</h3><ul><li>Following notification of a locally acquired case due to clade Ib in the Region, and exportation of clade Ib from the Region, WHO has been working with national authorities on epidemiological investigation, contact follow-up up and assessment of potential transmission settings and continues to monitor for additional cases and offer cross-border support.</li><li>WHO continues to support countries with surveillance, preparedness, and investigation of suspected mpox events, including rapid risk assessments, technical advice on case management and IPC, and verification of event information through IHR channels.</li><li>WHO provides targeted support to strengthen diagnostic capacity, including guidance on clinical sampling, access to PCR testing for clade I and clade II MPXV,
    and coordination with national laboratories to increase genomic sequencing capability for clade and subclade identification.</li><li>WHO is working to integrate mpox preparedness within services for HIV and sexually transmitted infections, promoting early HIV testing and prompt antiretroviral therapy (ART) initiation for any person with mpox, in line with WHO guidance for clinical care and infection prevention and control.</li><li>WHO supports clinical readiness through regional webinars, technical exchanges, and Communities of Practice, enabling countries to access updated clinical management guidance, peer support, and context-specific tools for managing suspected and confirmed cases.</li><li>Risk communication and community engagement activities focus on social listening, information, education and communication (IEC) material production and close collaboration with health workers and key population networks, including men who have sex with men, sex workers, and community-based organizations,
    to strengthen awareness of symptoms, promote early care seeking, and reduce stigma associated with mpox.</li><li>WHO continues to assist countries in reviewing and strengthening national preparedness measures, including support for intra-action reviews and integration of mpox within all-hazards emergency preparedness and response frameworks.</li></ul>
