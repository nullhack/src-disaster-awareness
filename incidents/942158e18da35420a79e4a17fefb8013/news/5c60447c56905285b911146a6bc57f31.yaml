title: Extreme rainfall threatens north as China enters peak flood season
body: HONG KONG, July 22 (Reuters) - China has entered its peak flood control period, weather experts said, with extreme rainfall set to increase in frequency and intensity from late July to early August, with much of northern China set to experience 20 per cent to 50 per cent more rainfall than usual.Rising temperatures are shifting the rain belt westward and...
