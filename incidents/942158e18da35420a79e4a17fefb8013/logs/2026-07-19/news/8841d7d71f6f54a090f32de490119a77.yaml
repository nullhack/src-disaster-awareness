title: Heavy floods submerge roads, vehicles in northern China - BusinessWorld Online
body: HONG KONG — Severe flooding in China’s northern Hebei province and northeastern Liaoning province submerged roads and swept away cars, while people swam, paddle-boarded and wake surfed along neighborhood streets, videos on social media showed. Water levels rose to more than two metres on roads in Kuancheng, a county in Hebei, according to a resident’s […]
