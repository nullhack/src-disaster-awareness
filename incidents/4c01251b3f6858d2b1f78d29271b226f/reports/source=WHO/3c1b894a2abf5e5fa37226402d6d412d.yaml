  Response: '<p><strong>Overview of public health response in WHO Regions</strong></p><p>WHO is supporting Member States in strengthening preparedness and response to arbovirus epidemics and pandemics, in alignment with the pillars of the <a href="https://www.who.int/initiatives/global-arbovirus-initiative">Global Arbovirus Initiative</a>,&nbsp;the <a href="https://www.who.int/publications/m/item/global-strategic-preparedness--readiness-and-response-plan-for-dengue-and-other-aedes-borne-arboviruses">Global Strategic Preparedness, Readiness and Response Plan</a>,&nbsp;and the 5Cs of WHO&rsquo;s global architecture for&nbsp;<a href="https://cdn.who.int/media/docs/default-source/emergency-preparedness/who_hepr_wha2023-21051248b.pdf?sfvrsn=a82abdf4_3&amp;download=true">Strengthening health emergency prevention, preparedness, response and resilience</a>&nbsp;(HEPR).&nbsp;<br /></p><p>WHO has undertaken the following actions:&nbsp;</p><ul type="disc"><li data-list="0" data-level="1">Issued an
    alert at the&nbsp;<a href="https://webtv.un.org/en/asset/k17/k171wx8d0u">UN Geneva Press      Briefing</a>&nbsp;in July 2025 regarding the rapid global spread of      chikungunya.&nbsp;</li></ul><p><strong><span style="text-decoration:underline;">African region</span></strong></p><p>In 2025, WHO and partners supported countries reporting chikungunya in the WHO African Region to respond to this outbreak. While sporadic transmission was reported in four countries, the most significant impact was observed in Mauritius and Kenya, where comprehensive response operations have been implemented.<br /></p><p><strong>Mauritius:</strong></p><ul type="disc"><li data-list="0" data-level="1">Surveillance has been strengthened to detect new      cases early and monitor transmission trends.</li><li data-list="0" data-level="1">Vector control measures have been implemented including      larval source reduction, household spraying, and fogging.</li><li data-list="0" data-level="1">Community engagement
    activities have been implemented      through awareness campaigns promoting personal protection, household      vector control, and early care-seeking.</li><li data-list="0" data-level="1">A Rapid Risk Assessment was conducted with WHO      support to guide response actions.<br /></li></ul><p><strong>Kenya:</strong></p><ul type="disc"><li data-list="7" data-level="1">A national response plan was developed, and an      Incident Management System team was established for coordination.</li><li data-list="7" data-level="1">The Ministry of Health issued advisories to coastal      counties, including Mombasa, to reinforce surveillance and clinical case      management.</li><li data-list="7" data-level="1">Vector control activities were implemented including      treating 2198 mosquito breeding sites with larvicide, fogging in 306      villages, and spraying 218 houses.</li><li data-list="7" data-level="1">Community sensitization activities were conducted      which reached 780 people, and
    insecticide-treated nets were distributed to      vulnerable groups.<br /></li></ul><p><strong><span style="text-decoration:underline;">Eastern Mediterranean region</span></strong></p><p>In response to the chikungunya outbreaks, WHO EMRO is taking the following actions:<strong></strong></p><ul><li>A webinar to provide an orientation for national health authorities, public health professionals, and relevant stakeholders, offering a comprehensive overview of chikungunya epidemiology and outbreak prevention and control is planned.</li><li>An online training session for Somalia on case management was conducted. &nbsp;</li><li>Technical support is being provided to review national multisectoral arboviral response plans in affected countries, ensuring alignment with WHO-recommended strategies, integrated vector management, case management protocols, laboratory preparedness, and risk communication approaches.<br /></li></ul><p><strong><span style="text-decoration:underline;">European region</span></strong></p><p>In
    response to the chikungunya situation in La R&eacute;union and Mayotte, authorities activated the corresponding levels of the Organisation de la R&eacute;ponse de S&eacute;curit&eacute; Civile (ORSEC) arbovirus plan. </p><ul><li>Enhanced surveillance, began on 1 May 2025, is being carried out at the local level (traps, individual reporting by citizens, etc.). This surveillance should enable the detection of new mosquito species. It is accompanied by health interventions around detected cases, whether imported or indigenous, particularly during periods of enhanced surveillance. </li><li>Door-to-door surveys are being carried out for enhanced entomological and epidemiological investigations and active search for clinically suggestive cases; </li><li>Vector control treatments in the affected area are being carried out (adulticide mosquito control treatments within a 300-metre radius of the case) ; </li><li>Awareness is being increased among healthcare professionals in the sector and local
    authorities;</li><li>The Ministry of Health published several press releases specifying the actions planned by the health authorities and best practices for vector control for the general population, and regularly posts updates on its social media accounts. Safety measures for products of human origin are implemented in accordance with the recommendations of the High Council for Public Health, including a 28-day deferral for donors of labile blood products and the introduction of viral genomic diagnosis.</li><li>Posters and prevention messages targeting travellers are currently displayed on aircraft (for flights between mainland France and R&eacute;union, as well as to the French West Indies and French Guiana) and in airport terminals to raise awareness.</li><li>In Italy, in the regions affected by local transmission events, all the control measures set out in the National Plan for the Prevention, Surveillance and Response to Arboviral Diseases have been implemented, including the immediate
    activation of epidemiological and entomological surveillance, the adoption of vector control interventions, population protection measures, and the safeguarding of transfusion and transplant safety.<br /></li></ul><p><strong><span style="text-decoration:underline;">Region of the Americas</span></strong></p><p>PAHO has undertaken the following actions: </p><ul><li>Issued an Epidemiological alert on chikungunya in the Americas Region on 28 August 2025 regarding the rapid global spread of chikungunya. </li><li>Provides advice and technical support to prevent and control chikungunya on the basis of the Integrated Management Strategy for Arboviral Disease Prevention and Control, adopted by PAHO/WHO Member States in 2016 (CD55.R6).</li><li>Support is being provided for the implementation of an integrated epidemiological surveillance system model for dengue, chikungunya and Zika. This model integrates epidemiological, clinical, laboratory and entomological surveillance to generate standardized
    and timely information for decision-making.</li><li>Technical support is being provided to implement a collaborative surveillance strategy for arboviral diseases, operationalized through virtual collaboration spaces (VCS). Through the VCS, countries and PAHO collaborate in the real-time analysis of their epidemiological, clinical, laboratory and entomological data, as well as the generation of automated reports and bulletins. </li><li>National capacities are being strengthened for clinical diagnosis and case management of dengue, chikungunya, and Zika in the Region through the implementation of technical documents and clinical guidelines, virtual continuous training strategy that includes distance-based self-learning courses, and the establishment of national networks of clinical experts in arboviral diseases. Developed several initiatives to improve entomological surveillance systems, as well as the monitoring and management of resistance to insecticides used in public health.</li><li>In
    August 2025, a &nbsp;workshop was held on updating the Integrated Management Strategy for the Prevention and Control of Arboviral Diseases (IMS-Arbovirus) and the roadmap for the implementation, monitoring, and evaluation of the IMS-Arbovirus in countries and territories of the Americas for the period 2026&ndash;2030.</li><li>Public health laboratories are being supported in the implementation of RT-PCR testing and serology (IgM) interpretation (technical cooperation, training, provision of key reagents) and of genomic surveillance for chikungunya monitoring and characterization. </li><li>Entomo-virological surveillance guidelines are currently being implemented to enable early detection and assessment.</li><li>A new operational model for <em>Aedes</em> control is being developed and is currently in the implementation phase in the Americas Region.</li><li>Vector-control activities are being strengthened in affected countries.<br /></li></ul><p><strong><span style="text-decoration:underline;">South-East
    Asia Region</span></strong></p><p>WHO SEARO is supporting Member States by undertaking the following actions:<strong><span style="text-decoration:underline;"></span></strong></p><ul><li>Continuing to monitor the situation and raise awareness of chikungunya and other arboviruses in the region.</li><li>Enhancing vector control for <em>Aedes</em> mosquitos to better control chikungunya and other arbovirus, strengthening community engagement. </li><li>Advocacy and planning for integrated arbovirus surveillance&mdash;covering dengue, chikungunya, and Zika&mdash;are underway to generate stronger evidence for informed decision-making.</li><li>The implementation of guidelines on the clinical management of chikungunya is actively being promoted.<br /></li></ul><p><strong><span style="text-decoration:underline;">Western Pacific Region</span></strong></p><p>The WHO Regional Office for the Western Pacific has      implemented the following measures:</p><ul><li data-list="9" data-level="1">Shared
    the global situation and      technical guidelines with Member States in the Western Pacific Region to      support chikungunya preparedness and response. These      include:&nbsp;(1)&nbsp;<a href="https://www.who.int/emergencies/outbreak-toolkit/disease-outbreak-toolboxes/chikungunya-outbreak-toolbox">WHO Chikungunya Outbreak Toolbox</a>, (2)&nbsp;<a href="https://www.who.int/publications/i/item/9789240111110">WHO Guidelines for Clinical Management of Arboviral Diseases&nbsp;(Dengue,      Chikungunya, Zika, and Yellow Fever) &ndash; 4 July 2025</a>, and (3)&nbsp;<a href="https://www.who.int/publications/i/item/9789240108325">Policy Considerations for Strengthening Preparedness and Response to Arbovirus      Epidemics and Pandemics&nbsp;&ndash; 16 July 2025</a>&nbsp;</li><li data-list="8" data-level="1">Requested Member States in the WPR to provide updates      on the chikungunya situation in their respective countries for risk      assessment.&nbsp;</li><li data-list="2" data-level="1">Conducted
    a Community of Practice (CoP)&nbsp;session      on&nbsp;14 August 2025&nbsp;to share updates and best practices with      Member States.&nbsp;<br /></li></ul><p>In response to the chikungunya outbreaks, Member States have implemented response measures based on the evolving chikungunya situation at national and subnational levels:</p><ul><li>National and local health authorities have been conducting field investigations in areas with case clustering and outbreaks to assess transmission dynamics, inform decision-making, and coordinate multisectoral response efforts in the affected areas.</li><li>Medical care is being provided to affected individuals, including hospitalization or home isolation for laboratory-confirmed cases, ensuring appropriate clinical management and reducing transmission risk.</li><li>Surveillance systems have been strengthened to enable early detection, laboratory confirmation, and timely reporting of cases. Enhanced monitoring in healthcare facilities is supporting
    rapid identification and response to potential clusters and importation risks.</li><li>Targeted vector control interventions are being implemented in high-risk areas, including environmental cleanup to eliminate breeding sites, larviciding, and adult mosquito control through fogging operations. Innovative approaches such as drone-assisted spraying are also being utilized.</li><li>Community health workers are mobilized for door-to-door inspections and public education campaigns to promote source reduction and personal protection. Authorities are maintaining regular communication with the public to share updates, promote preventive measures, and address concerns.</li></ul>'
