  Title: Chikungunya virus disease- Global situation
  Epidemiology: '<p>Chikungunya is a mosquito-borne viral disease caused by the CHIKV, an RNA virus in the&nbsp;<em>alphavirus</em>&nbsp;genus of the family&nbsp;<em>Togaviridae</em>.&nbsp;CHIKV is transmitted by infected female mosquitoes, most commonly&nbsp;<em>Aedes&nbsp;aegypti</em>&nbsp;and&nbsp;<em>Aedes albopictus</em>, which can also transmit dengue and Zika viruses. These mosquitoes bite primarily during daylight hours and&nbsp;<em>Aedes aegypti</em>&nbsp;feeds both indoors and outdoors, whereas <em>Aedes albopictus</em> feeds primarily outdoors. They lay eggs in manmade and natural containers with standing water. <br /></p><p>When an uninfected mosquito feeds on a person who has CHIKV circulating in their bloodstream, the mosquito can ingest the virus. Over a period of about 10 days (range: 7-12 days), the virus replicates in the mosquito and enters its salivary glands. Once this occurs, the mosquito becomes capable of transmitting the virus to a new human host through a subsequent
    bite. &nbsp;In the newly infected individual, the virus begins to replicate and reaches high concentrations in the blood, enabling further transmission to other mosquitos and perpetuating the transmission cycle.</p><p>In symptomatic patients, CHIKV disease onset is typically 4&ndash;8 days (range 2&ndash;12 days) after the bite of an infected mosquito. Disease is characterized by an abrupt onset of fever, frequently accompanied by severe joint pain. The joint pain is often debilitating and usually lasts for a few days but may be prolonged, lasting for weeks, months or even years. Other common signs and symptoms include joint swelling, muscle pain, headache, nausea, fatigue and rash.&nbsp;Since these symptoms overlap with other infections, including those with dengue and Zika viruses, cases can be misdiagnosed. In the absence of significant joint pain, symptoms in infected individuals are usually mild and the infection may go unrecognized. Most patients recover fully from the infection;
    however, occasional cases of eye, heart, and neurological complications have been reported with CHIKV infections. Patients at extremes of the age spectrum are at higher risk for severe disease including newborns infected during delivery to infected mothers or bitten by infected mosquitoes in the weeks after birth, and older people, particularly those with underlying medical conditions. Patients with severe disease require hospitalization because of the risk of organ damage and death. Once an individual is recovered, available evidence suggests they are likely to be immune from future chikungunya infections. CHIKV may be detected directly in blood samples collected during the first week of illness using molecular tests such as reverse transcriptase&ndash;polymerase chain reaction (RT&ndash;PCR), and after the first week of illness using serologic tests to detect antibodies produced in response to CHIKV infection.</p><p>Clinical management includes managing fever and joint pain with anti-pyretic,
    analgesics, maintaining adequate hydration by consuming sufficient fluids &nbsp;and ensuring general rest.&nbsp;There is no specific antiviral drug treatment for CHIKV infections. Paracetamol or acetaminophen are recommended for pain relief and reducing fever until dengue infections are ruled out, as non-steroidal anti-inflammatory drugs (NSAIDs) can increase the risk of bleeding.<br /></p> <p>There are currently two chikungunya vaccines that have received regulatory approvals and/or have been recommended for use in populations at risk in several countries, but the vaccines are not yet widely available nor in widespread use. WHO and external expert advisors are reviewing vaccine trial and post-marketing data in the context of global chikungunya epidemiology to inform possible recommendations for use.&nbsp;<br /></p>'
  Advice: '<p>WHO encourages countries to develop and maintain the capacity to detect and confirm cases, manage patients, and implement social communication strategies to gain community support to reduce the presence of the mosquito vectors. This includes training and alerting healthcare workers on case detection and potential complications, identifying risk groups for severe disease, ensuring appropriate clinical management, and following up on cases to prevent deaths. Targeted integrated vector surveillance and control measures are essential to reduce transmission rates.&nbsp;<br /></p><p><strong>Strengthening health care capacity: </strong></p><p>Chikungunya can cause large outbreaks with high attack rates, affecting one-third to three-quarters of immunologically susceptible populations with the potential to cause heavy burdens on healthcare systems. Early detection of severe disease progression and access to proper medical attention are key to addressing clinical complications and reducing
    mortality, particularly among people at higher risk of severe disease (associated factors include age &gt;65 years and &lt;1 year, comorbidities, pregnant women specially in the third trimester due to vertical transmission during birth, which leads to neonatal chikungunya, with several complications such as encephalitis, hepatitis, and myocarditis). <br /></p><p>Countries vary in their capacity to detect and report chikungunya and other vector-borne diseases, and outbreaks are often reported retrospectively, meaning real-time epidemiological data necessary for public health response is lacking. WHO reiterates to all countries the importance of strengthening their&nbsp;healthcare capacity&nbsp;to rapidly detect and report chikungunya and other vector-borne diseases to understand real-time epidemiological data necessary for public health response. It is important to include measures for appropriate clinical detection and management as well as preparing health services for surges in case
    counts.<strong></strong><br /></p><p><strong>Strengthening surveillance: </strong></p><p>Enhanced surveillance and epidemiologic investigations are essential to more accurately determine the incidence and trends of CHIKV infection. Current surveillance systems often prioritize dengue over other <em>Aedes-</em>borne<em> </em>arboviruses, leading to frequent clinical misdiagnosis and misreporting of CHIKV as dengue. Strengthening surveillance capacity will support more effective risk communication and guide targeted vector control strategies. Ongoing, close monitoring of the regional situation is also critical, along with active cross-border coordination and information sharing, given the potential for transmission in neighboring countries.<br /></p><p><strong>Laboratory confirmation:</strong></p><p>Although many countries have acquired the capacity to perform RT-PCR testing in recent years, the availability of reagents for chikungunya testing is limited and costs may be prohibitive. Serology
    is generally cheaper and more accessible but, in some regions, serological tests can cross-react with other alphaviruses and produce false positive test results.<br /></p><p><strong>Prevention and control: </strong></p><p>Prevention efforts are highly focused on surveillance and control of predominantly day-biting&nbsp;<em>Aedes</em> mosquitoes. For protection against mosquito bites, clothing that minimizes skin exposure to mosquitoes indoors and outdoors is advised. Window and door screens should be used to prevent mosquitoes from entering homes. Repellents can be applied to exposed skin or clothing in strict accordance with product label instructions. <br /></p><p>Avoidance of mosquito bites offers the best protection against CHIKV infection.&nbsp;Patients suspected of having CHIKV infection should avoid getting mosquito bites during the first week of illness to prevent further transmission to mosquitoes, that may in turn infect other people.&nbsp;<br /></p><p>The main method to reduce
    transmission of CHIKV is through control of the mosquito vectors and reduction of mosquito breeding sites. This requires mobilization of communities, who are critical in reducing mosquito breeding sites through emptying and cleaning containers that contain water on a weekly basis, disposing of waste, and supporting local mosquito control programmes.<br /></p><p>During outbreaks, intensified vector control activities targeting adult mosquitoes and larvae are a priority to interrupt the CHIKV transmission cycle. This may also be performed by health authorities as an emergency measure to control the mosquito population.<br /></p><p>Insecticide-treated mosquito nets should be used against day-biting mosquitoes by persons who sleep during the daytime, for example young children, sick patients or older people.<br /></p><p>No measures related to international traffic and trade are warranted at this time.&nbsp;</p>'
  Assessment: '<p>CHIKV disease is an <em>Aedes-</em>borne disease widely distributed in tropical and subtropical regions. While the overall fatality rate is low, severe disease can occur, especially in vulnerable populations such as infants, the elderly, and those with pre-existing conditions. Chikungunya can be introduced to new areas by viremic travelers and generate local transmission in the presence of competent vectors, an immunologically susceptible population and favorable environmental conditions. <br /></p><p>Factors associated with increased CHIKV transmission include: </p><ul><li>broader geographic range of <em>Aedes </em>mosquitoes associated with transport of immature stages in goods and vessels, and expansion of conducive mosquito habitats due to climate change and periodic extreme events, with increased potential for chikungunya transmission in previously unaffected areas; </li><li>unplanned urbanization and poor water management contribute to vector reproduction and persistent
    transmission cycles; </li><li>low coverage or lack of sustainability of the vector control programs.</li><li>political instability and conflict in countries at risk, such as Somalia, Sudan, and Yemen face exacerbated public health challenges include disruption of healthcare infrastructure hampering case detection and outbreak response; </li><li>increased travel to and from endemic regions introducing cases into areas with established populations of competent mosquito vectors and favorable environmental conditions.<br /></li></ul><p>The public health impact of the outbreaks depends on several factors, including the ability to detect chikungunya transmission, overall capacities for a coordinated public health response and clinical management, and the proportion of the population immunologically susceptible to CHIKV infection (i.e., people not previously infected with CHIKV). Young children, elderly individuals, and those with pre-existing health conditions such as diabetes, hypertension,
    and cardiovascular diseases are at higher risk of developing severe disease. Additionally, people living in areas with high mosquito populations and inadequate vector control measures are at greater risk of being infected. Effective public health strategies such as vector surveillance and control, and community education, are crucial in reducing the risk infection for susceptible individuals and preventing outbreaks.&nbsp;<br /></p><p>In some areas, there is a lack of medical facilities with limited geographical access, making it difficult for people to access basic health care. Other challenges can be stockouts of several essential supplies for prevention and control, lack of reagents and consumables for laboratory diagnosis, and need for re-training field teams and health workers.&nbsp;<br /></p><p>Given the ongoing outbreaks reported globally in 2025, the potential for further spread remains significant. Although some WHO Regions are currently reporting lower case numbers compared
    to 2024, others are experiencing a resurgence with significant increases in case numbers, furthermore some countries are seeing an emergence of chikungunya in previously unaffected populations. This uneven distribution of cases across regions makes it challenging to characterize the situation as a global rise but rather substantial increases in particular geographical areas. Further, the potential for geographic spread remains substantial given that chikungunya can be introduced into new areas by infected travelers where local transmission may be established in the presence of <em>Aedes</em> mosquito and a susceptible population. The risk is heightened by limited population immunity in previously unaffected areas, favorable environmental conditions for vector breeding, gaps in surveillance and diagnostic capacity, and increased human mobility and trade. Strengthening surveillance, enhancing vector surveillance and control, and improving public health preparedness are essential to mitigate
    the risk of further transmission.</p>'
  Overview: "<p class=\"no-margin\"><strong>Global overview</strong></p><p class=\"no-margin\">Globally as of December 2024, current or previous autochthonous transmission of CHIKV had been reported from 119 countries and territories across six WHO regions. In addition, 27 countries and territories had evidence of established and competent <em>Aedes aegypti</em> and<em> Aedes albopictus</em> vector populations but had not yet documented autochthonous CHIKV transmission. </p><p>Per available data from January to September 2025, 263 592 suspected and 181 679 confirmed CHIKV disease cases and 155 CHIKV disease-related deaths have been reported globally. While certain WHO Regions are reporting lower case numbers compared to 2024, others are experiencing marked increases. This heterogeneity in regional trends complicates the interpretation of a global increase. Instead, the data suggest localized resurgence or emergence in specific geographic areas. The region of the Americas has reported the\
    \ highest number of cases followed by the European region (comprised of cases reported predominantly from French Overseas Departments in the Indian Ocean).&nbsp;</p><p><strong>Table 1: Number of suspected and confirmed CHIKV disease cases and deaths by region in 2025, as of September 2025.&nbsp;</strong></p><p><img sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/emergencies-and-disasters/screenshot-2025-10-03-140203.jpg?sfvrsn=d299d775_3\" height=\"354\" style=\"max-width:100%;height:auto;\" title=\"CHIKV disease cases and deaths by region in 2025\" width=\"1294\" alt=\"CHIKV disease cases and deaths by region in 2025\" sf-size=\"131693\" /></p><p><em>*Note: the date of last report varies by country</em></p><p><strong>Figure 1: Geographical distribution of CHIKV disease cases as reported to WHO or Publicly shared by Ministries of Health from January to September 2025</strong> <img sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/screenshot-2025-11-18.jpg?sfvrsn=8d9f469_4\"\
    \ height=\"614\" style=\"max-width:100%;height:auto;\" title=\"CHIKV disease cases and deaths\" width=\"961\" alt=\"CHIKV disease cases and deaths\" sf-size=\"78647\" /></p><p><strong style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Regional overview</strong></p><p><strong>African region</strong></p><p>As of September 2025, a total of 2197 suspected and 108 confirmed CHIKV disease cases have been reported from four countries: Comoros, Kenya, Mauritius, and Senegal with Mauritius recording the highest number of cases.</p><p><span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">In Comoros, between 1 January to 31 May 2025 (epi week 1 and epi week 22), a total of four confirmed cases have been reported, while Senegal reported seven confirmed cases.&nbsp;&nbsp;</span><br /></p><p>In Mauritius, a total of 1583\
    \ cases have been reported between 15 March to 4 August 2025 (epi week 12 to epi week 32), including 1543 local and 40 imported cases. There have been no reported deaths. <strong></strong><br /></p><p>In Kenya, a chikungunya outbreak was confirmed in Mombasa County as of 8 June 2025 (epi week 23). By 6 July 2025 (epi week 27), a total of 614 cases had been recorded, including 97 laboratory-confirmed cases. Since then, no further cases have been reported. No chikungunya-related deaths have been recorded to date.</p><p><strong>&nbsp;</strong><strong>Eastern Mediterranean Region</strong></p><p>As of September 2025, a total of 1596 suspected, and 67 confirmed CHIKV disease cases have been reported from Pakistan and Somalia. </p><p>In Pakistan, CHIKV disease cases in 2025 have been reported at rates similar to those in 2024. A notable increase occurred between 4 May to 21 June 2025 (epi weeks 19 to 25), with 101 to 121 suspected CHIKV disease cases reported per week during this period.&nbsp;</p><p>In\
    \ Somalia, a chikungunya outbreak\r\nhas been confirmed in Sool region, with 488 suspected cases reported between\r\nJanuary and June 2025. Eight out of 10 samples tested were laboratory-confirmed\r\nfor chikungunya. Somalia has also recorded imported travel related cases.&nbsp;<o:p></o:p></p><p><strong>European Region</strong></p><p>As of 15 September 2025, two European countries&mdash;France and Italy&mdash;have reported locally acquired cases of CHIKV disease. France has recorded 479 cases distributed across 54 clusters, with 40 clusters currently active. Italy has reported 205 locally acquired cases distributed across four clusters of which three clusters are currently active. A total of 56 456 CHIKV disease cases, and 40 deaths, have been reported from four countries in the European region in 2025.<br /></p><p>In France, the increased incidence of CHIKV outbreaks in 2025 represent a deviation from observed patterns in previous years<em>.</em> In 2024, only one CHIKV disease case\
    \ was reported. The larger number of chikungunya cases this year, along with their early onset, are linked to an epidemic in La R&eacute;union and the broader Indian Ocean region, driven by a viral strain that is highly adapted to the <em>Aedes albopictus </em>mosquito.<br /></p><p>In the French overseas department of La R&eacute;union, a total of 54 517 confirmed cases and 40 deaths have been reported in 2025 (as of 14 September). There has been a steady decline in new cases since 26 April (epi week 17) indicating that the outbreak is waning. This marks the first autochthonous transmission of chikungunya on the island since 2014.</p><p>In Mayotte, following two imported cases from La R&eacute;union, the first locally acquired CHIKV disease case was confirmed in March 2025. As of 18 September 2025, a total of 1255 locally acquired cases, including 39 hospitalizations, have been reported<em>. </em>The transmission receded since August with only a few cases reported per week on average.</p><p><strong>Region\
    \ of the Americas</strong></p><p>As of 20 September 2025, CHIKV disease transmission continues across the Americas in line with expected seasonal patterns. A total of 228 591 suspected cases have been reported from 14 countries, including 100 329 confirmed cases and 115 deaths.<br /></p><p>In Bolivia, a total of 5372 CHIKV disease cases have been reported, 73% of which are laboratory confirmed, along with four deaths. The outbreak primarily affected the department of Santa Cruz with 99% of cases (n=3905, including four deaths). Additionally, cases were reported in the departments of Beni, Chuquisaca, Cochabamba, Pando, and Tarija.<br /></p><p>Brazil accounts for nearly 96% of all reported cases and deaths in the region, with 96 159 confirmed cases and 111 deaths. <br /></p><p>In Cuba, between 1 January to 20 September, 34 cases of chikungunya were reported, all confirmed by laboratory by RT-PCR test, in the provinces of Guantanamo, La Habana, Matanzas, Pinar del Rio and Santiago de Cuba.\
    \ Public health interventions have been implemented.</p><p><strong>South- East Asia Region</strong><br /></p><p>As of early September 2025, over 34 628 CHIKV disease cases, both suspected and confirmed, have been reported in the WHO South-East Asia region, primarily from India and Bangladesh. <br /></p><p>In India, between 1 January and 31 March 2025, a total of 30 876 suspected cases and 1741 confirmed cases were reported. The states reporting the highest number of confirmed cases were Maharashtra, Karnataka and Tamil Nadu.</p><p>In Bangladesh, the Institute of Epidemiology, Disease Control and Research between reported a total of 732 suspected CHIKV disease cases in Dhaka city between 1 January and 31 August 2025. Of these, 400 cases were laboratory-confirmed by RT-PCR. <br /></p><p>In Sri Lanka, a total of 151 confirmed CHIKV disease cases were reported from sentinel sites in Colombo, Gampaha and Kandy between 1 January 2025 and the second week of March 2025. According to the Epidemiology\
    \ Unit Division situation report, dated 31 August 2025, the CHIKV disease cases continued to increase and peaked in June 2025. Over half of the reported cases were from the Western Province, with Colombo District alone reporting 33%. The most affected age group was 41&ndash;60 years (36.4%), although an increasing trend was noted among children.</p><p><span style=\"background-color:transparent;text-align:justify;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">In Thailand, a\r\ntotal of 1128 CHIKV disease</span><span style=\"background-color:transparent;text-align:justify;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">&nbsp;cases were reported between 1 January and 14 September 2025. Bueng Kan (142), Chiang\r\nMai (411), and Loei (125) are the provinces reporting the most cases. The age\r\ndistribution of cases is: 0-4 years 2%, 5-9 years 3%, 10-14 years 6%, 15-19\r\nyears 4%, 20-29 years 9%, 30-39 years 17%, 40-49\
    \ years 17%, 50-59 years 16%, &ge;\r\n60 years 26%.</span></p><p><strong>Western Pacific Region </strong><br /></p><p>A total of 21 299 CHIKV disease cases including four countries reporting imported cases, with no deaths, have been reported from 16 countries and areas in the Western Pacific region in 2025. Of these, five countries reported local transmission, six reported imported cases, and five reported no cases during the year.<br /></p><p>In China (excluding Hong Kong SAR, Macao SAR, and Taiwan, China), as of 27 September 2025, a total of 16 452 locally transmitted cases has been reported in Guangdong Province. All cases were laboratory-confirmed. This&nbsp;represents&nbsp;the largest documented chikungunya outbreak to date in China. The cases have been reported in 21 cities,&nbsp;mainly in&nbsp;Foshan City (10032), Jiangmen City (5209), Guangzhou City (590), Shenzhen City (128), Zhanjiang City (112), Zhuhai City (60), and Zhongshan City (54).&nbsp;Additionally, during 1-21 September,\
    \ Guangxi Zhuang Autonomous Region reported 297 local and associated cases; Fujian Province reported 124 local and associated cases; and some other provinces (such as Hunan, Sichuan, and Hainan&nbsp;provinces) also reported a few local&nbsp;cases.&nbsp;<br /></p><p>According to the data as of 16 August 2025, among all locally reported cases nationwide, the age distribution is: 0-5 years 3.1 %, 6-17 years 13.6 %, 18-45 years 37.0 %, 46-60 years 23.3 %, 61-74 years 15.2 %, and &ge;75 years 7.8 %. Up to now, all reported cases have been mild, with no severe cases or deaths.&nbsp;</p><p>In Indonesia, as of 31 July 2025, a total of 3608 confirmed CHIKV disease cases across 19 provinces have been reported, compared to 1399 confirmed cases reported during the same period in 2024. No chikungunya-related deaths have been recorded to date. The risk of future increases persists, particularly during the transition from the rainy to the dry season, with heightened concern in the most populous and\
    \ frequently visited provinces: West Java, Central Java, East Java, and Banten. The Ministry of Health of Indonesia has strengthened detection and reporting through its Early Warning Alert and Response System (EWARS) and has implemented response measures in high-risk areas.<br /></p><p>In Malaysia, as of 2 August 2025, a total of 40 CHIKV disease cases have been reported in 2025, compared to the 63 cases reported during the same period in 2024. No chikungunya-related deaths have been recorded to date. During the current reporting year, three chikungunya clusters were reported. Case investigation, integrated vector management, community engagement, and multisectoral collaboration efforts were implemented. All outbreaks were successfully contained within two weeks of detection, indicating an effective public health response and outbreak management.</p><p>In Philippines, as of 16 August 2025, a total of 628 CHIKV disease cases have been reported, a 78% decrease from 2886 cases reported\
    \ in the same period in 2024. The national trend has been fluctuating, with 46 cases reported from 20 July to 2 August 2025, which is 10% lower than the 51 cases reported two weeks prior (6 to 19 July 2025). Cases ranged from 1 to 87 years old, with a median age of 33. Females accounted for 66% of cases (414 out of 628). There was one death reported (CFR: 0.16%). Local health authorities have investigated areas with clustering of cases to determine risk factors and implement vector control activities<br /></p><p>In Singapore, as of 20 September 2025, 25 cases of CHIKV disease cases have been reported, compared to 12 cases reported during the same period in 2024. The majority of the cases were individuals with recent travel to chikungunya-affected areas. No chikungunya-related deaths and no sustained local transmission have been reported. The Communicable Diseases Agency Singapore continues to monitor the situation closely and provides ongoing guidance on prevention and control measures,\
    \ particularly focusing on vector control to limit further transmission.<br /></p>"
