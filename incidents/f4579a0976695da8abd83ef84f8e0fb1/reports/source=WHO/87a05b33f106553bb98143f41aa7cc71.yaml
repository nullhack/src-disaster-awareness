  Summary: "As of 30 April 2024, over 7.6 million dengue cases have been reported to WHO in 2024, including 3.4 million confirmed cases, over 16 000 severe cases, and over 3000 deaths. While a substantial increase in dengue cases has been reported globally in the last five years, this increase has been particularly pronounced in the Region of the Americas, where the number of cases has already exceeded seven million by the end of April 2024, surpassing the annual high of 4.6 million cases in 2023.  Currently, 90 countries have known active dengue transmission in 2024, not all of which have been captured in formal reporting. In addition, many endemic countries do not have strong detection and reporting mechanisms, so the true burden of dengue globally is underestimated. In order to control transmission more effectively, real-time robust dengue surveillance is needed to address concerns about potential undetected cases, co-circulation and misdiagnosis as other arboviruses, and unrecorded travel\
    \ movements. These factors could contribute to unrecognized disease spread and establish a potential risk for local transmission in non-endemic countries. \r\n\r\nDengue virus is transmitted to humans through the bite of infected mosquitoes. Cases are most commonly asymptomatic or result in mild febrile illness. However, some cases will develop severe dengue, which may involve shock, severe bleeding or severe organ impairment. \r\n\r\nTo strengthen global surveillance, and monitor temporal trends and disease incidence, WHO has established a global dengue surveillance system with monthly reporting across all WHO regions with a new dashboard now live (https://worldhealthorg.shinyapps.io/dengue_global/). \r\n\r\nThe overall capacity for countries to respond to multiple, concurrent outbreaks continues to be strained due to the global lack of resources, including shortages of good quality dengue diagnostic kits for early disease detection, lack of trained clinical and vector control staff\
    \ and community awareness. Emergency response mechanisms have been established, and WHO supports high-risk countries across affected regions.\r\n\r\nGiven the current scale of the dengue outbreaks, the potential risk of further international spread and the complexity of factors impacting transmission, the overall risk at the global level is still assessed as High and thus dengue remains a global threat to public health."
