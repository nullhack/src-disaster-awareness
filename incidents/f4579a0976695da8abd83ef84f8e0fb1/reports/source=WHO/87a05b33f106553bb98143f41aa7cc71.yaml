  Response: <p>The overall capacity for countries to respond to multiple, concurrent outbreaks continues to be strained due to the global lack of resources, including shortages of good quality dengue diagnostic kits for early disease detection, lack of trained clinical and vector control staff and community awareness. Emergency response mechanisms have been established, and WHO supports high-risk countries across affected regions; however, the needs continue to outweigh the available resources. Coordination with partners, including UNICEF, has led to the development and implementation of common analyses and priority-setting tools. Nevertheless, it is imperative to sustain and enhance partner collaboration.&nbsp;&nbsp;</p><p>Countries are encouraged to learn and adopt successful examples of effective case management, prevention, and control of dengue and other arboviruses through heightened research projects, which is also aimed at limiting the vectors reducing their ability to spread across
    the urban context. WHO should closely review local interventions and under the best evidence to accept and recommend them for public health programmes, facilitating early adaptation to reduce the growing health impact of dengue.&nbsp;&nbsp;</p><p>Other response activities within WHO to support countries in their ongoing response activities include:&nbsp;&nbsp;</p><p><strong>WHO Leadership and Coordination</strong>&nbsp;</p><ul><li>Establishment of Joint WHO Health Emergencies Programme/Neglected Tropical Diseases (NTD) Incident Management System Team to coordinate the global response </li><li>Integrated response to address dengue, chikungunya, and Zika viruses aligned with the Global Arbovirus Initiative&nbsp;&nbsp;&nbsp;</li><li>Current global response strategy contributing to the WHO Global NTD roadmap by 2030 and the Global Vector Control Response 2017-2030</li><li>Release of Global Contingency Fund for Emergencies (CFE) USD 5.5 million on 7 March 2024 to support urgent response to
    global dengue outbreaks</li><li>Development of regional operational plans for dengue response, aiming to boost regional and national resource mobilization&nbsp;&nbsp;</li><li>Inclusion of dengue in the WHO flash appeal for health emergencies in 2024&nbsp;</li><li>Development of the Strategic Preparedness, Readiness and Response Plan (SPRRP) for dengue and other arboviruses, set to launch end of May 2024&nbsp;&nbsp;</li><li>Resource mobilization activities and donors' briefing to be organized. </li><li>Preventing and Responding to Sexual Exploitation, Abuse and Harassment (PRSEAH) interventions to be integrated in dengue operational response according to Emergency Response Framework (ERF) requirements. Interventions will depend on the type and phase of the response (active response or readiness/preparedness mode), context, location and scale of the response</li><li>Collaboration with key One Health partners to coordinate supply and ensure optimal access to supplies</li><li>Operational
    Support and Logistics (OSL) contacting suppliers to secure<strong> </strong>dengue kits and maintaining a pipeline for bulk items&nbsp;&nbsp;&nbsp;</li><li>Provision of technical support to all ongoing outbreaks, including epidemiology, laboratory, case management, risk communication and community engagement (RCCE), and vector control</li><li>Support deployment through the Global Outbreak Alert and Response Network (GOARN) and Standby Partners</li><li>Advocacy for research initiatives</li></ul><p><strong>WHO Health Operations Support</strong>&nbsp;</p><p><strong></strong><strong>Clinical Management:&nbsp;</strong>&nbsp;&nbsp;</p><ul><li>Systematic review for the updated arbovirus clinical guidance in progress, to be completed by May 2024&nbsp;&nbsp;</li><li>Meeting of the Guideline Development Group (GDG) scheduled for July 2024 to discuss dengue and other arbovirus clinical management recommendations&nbsp;&nbsp;</li><li>Work on standardized forms to support clinical management in hospitalized
    patients and outpatients, aimed at reducing CFR</li><li>Expansion of the clinical data platform for COVID-19 to include dengue and other infectious diseases outbreaks&nbsp;&nbsp;</li><li>Development of online training courses in OpenWHO&nbsp; </li><li>In the South East Asian Region facilitation of dengue case management training and TOT by Regional experts to countries </li><li>Expansion of WHO &ldquo;Virtual Patient&rdquo; training initiative to include dengue and other vector borne diseases.</li></ul><p><strong>Health Information Management:</strong>&nbsp;</p><ul><li>&nbsp;WHO global dengue surveillance system is capturing data on cases, confirmed cases, severe cases, deaths and circulating serotypes where available, with countries reporting monthly. Note, not all countries&rsquo; data are available yet and the system will continue to develop and add these as they become available</li><li>Data from the WHO European Region will be included when autochthonous cases are reported. Member
    States in EURO are being notified of heightened surveillance that will begin from 1 June to 1 December, with requests to submit via IHR mechanisms any autochthonous cases of dengue</li><li>A Global Dengue Surveillance Dashboard has been launched. And regional level dashboards are planned to include more granular data (sub-national, age, gender)</li><li>Member States will be supported to improve their surveillance and reporting systems including joint case definitions and case classifications and enhancing community-based reporting and integration of vector surveillance data for hot spot mapping </li></ul><p><strong></strong><strong>Risk Communication and Community Engagement (RCCE):&nbsp;&nbsp;</strong>&nbsp;</p><ul><li>Development and piloting of an RCCE toolkit </li><li>Adaptation of Community Conversation Kits with Dengue Topic Sheets&nbsp;</li><li>Testing of key dengue messages for health promotion&nbsp;&nbsp;</li></ul><p><strong>Laboratory:&nbsp;</strong>&nbsp;</p><ul><li>Development
    of an interim diagnostic laboratory testing guide for timely and accurate confirmation of dengue&nbsp;&nbsp;&nbsp;</li><li>Planned product evaluation by the WHO NTD-WHE Expert Review Panel dengue for Diagnostic tests</li><li>Together with OSL working to guarantee the provision of critical supplies for laboratory and diagnostics</li></ul><p><strong>Vector Control:&nbsp;&nbsp;</strong>&nbsp;</p><ul><li>Systematic review for updated dengue vector control guidance in progress, to be completed by August 2024</li><li>A n operational manual for novel vector control tools is planned</li><li>A position paper on Water, Sanitation, and Hygiene (WASH) and vector-borne diseases&nbsp;was published. <a href="https://www.who.int/publications/i/item/9789240090644">Link</a></li><li>Provision of technical support to Mauritius for field operations</li><li>Reporting of insecticide resistance monitoring at the global level by July 2024&nbsp;</li><li>Development of online training courses in OpenWHO&nbsp;</li><li>Information
    on dengue for travellers published. <a href="https://www.who.int/publications/m/item/dengue-information-for-travelers">Link</a></li></ul><p><strong>International Health Regulations and Border Health (Vector Control):&nbsp;&nbsp;</strong>&nbsp;</p><ul><li>Evidence review for the disinsection of conveyances to prevent or reduce the spread of mosquito vectors via international travel</li><li>Development of OpenWHO online course for vector surveillance and control at PoE including aircraft disinsection</li></ul><p>&nbsp;</p>
