body: 'Mosquito killer drone: A palm-sized AI micro-drone has autonomously detected, tracked and intercepted a flying moth in mid-air, marking a significant engineering milestone. The technology could one day help target disease-carrying mosquitoes without relying on chemical insecticides.'
