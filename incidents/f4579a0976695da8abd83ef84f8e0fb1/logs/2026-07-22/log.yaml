log_date: '2026-07-22'
summary: India approved its first dengue vaccine, QDENGA, for individuals aged 4 to 60 years. In India, Mumbai reported 99 deaths from vector-borne diseases including dengue between 2023 and 2025, while Delhi recorded 205 dengue cases so far this year. Madhya Pradesh reported 550 dengue cases and introduced an AI-based prediction system with drone mapping to identify outbreak hotspots.
