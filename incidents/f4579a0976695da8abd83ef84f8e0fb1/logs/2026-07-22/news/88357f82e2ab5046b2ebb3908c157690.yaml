title: 'Malaria, dengue, leptospirosis killed 99 people in Mumbai between 2023 and 2025: RTI'
body: 'Mumbai: Between 2023 and 2025, 99 people died of leptospirosis, malaria and dengue out of 236 suspected fatalities reviewed by the BMC’s death audit committee, according to the latest RTI data.'
