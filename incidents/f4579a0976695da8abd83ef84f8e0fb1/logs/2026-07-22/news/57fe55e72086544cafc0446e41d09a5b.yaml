title: 550 Dengue Cases In State; AI, Drone Mapping To Aid Prevention
body: Madhya Pradesh has introduced an AI-based dengue prediction system integrated with drone mapping to identify potential outbreak hotspots before cases surge. The technology analyses weather, historical case data and population trends. The state has also provided free dengue testing at 64 sentinel laboratories to strengthen early detection and treatment.
