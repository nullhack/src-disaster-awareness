title: India Approves Its First Dengue Vaccine Qdenga How It Works Who Is Eligible And Why It Isnt A Silver Bullet
body: Qdenga, cleared this week for ages 4 to 60, is one of only a few dengue vaccines in the world. It is to be injected in two doses three months apart.
