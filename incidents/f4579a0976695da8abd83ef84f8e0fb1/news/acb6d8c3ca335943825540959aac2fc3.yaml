title: 'India approves first dengue vaccine Qdenga: Which age group can get the shot that targets all 4 virus sub-types?'
body: India has approved its first dengue vaccine, for people aged 4-60 years. The vaccine protects against all four dengue virus serotypes and has shown strong long-term safety and effectiveness.
