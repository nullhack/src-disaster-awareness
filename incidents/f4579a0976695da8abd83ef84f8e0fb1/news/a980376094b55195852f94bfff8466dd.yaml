title: India Approves First Dengue Vaccine QDENGA For Ages 4-60, No Pre-Vaccination Tests Required
body: India has approved its first dengue vaccine after DCGI granted market authorisation to Takeda's QDENGA. The vaccine is approved for people aged 4-60 years.
