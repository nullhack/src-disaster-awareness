log_date: '2026-07-23'
summary: Mount Lewotobi Laki-laki erupted again on July 18, 2026, and July 23, 2026, with a volcanic ash column reaching 1,000 meters on the latter date. The volcano remains at Alert Level III with a 5 km exclusion zone, and has now erupted 45 times in seven days and 461 times total in 2026.
