  Summary: "As of 10 October 2024, a total of 58 cases of Marburg virus disease (MVD), including 13 deaths (case fatality ratio (CFR): 22%), have been reported in Rwanda. Fifteen recoveries have been reported among the confirmed cases as of 10 October 2024. Contact tracing is underway, with over 700 contacts under follow-up as of 9 October 2024. \r\n\r\nWHO classified the outbreak as a grade 3 emergency, the highest internal level for emergencies based on the WHO Emergency Response Framework and a surge team from WHO has travelled to support the in-country response across the functions of incident management: epidemiology, health operations, case management, health logistics, vaccines research, partner coordination and infection prevention and control. "
