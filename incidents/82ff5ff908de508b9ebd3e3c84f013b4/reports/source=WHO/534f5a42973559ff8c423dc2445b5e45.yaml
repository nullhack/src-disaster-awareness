  Response: <p><em>Please see the </em><a href="https://www.afro.who.int/countries/rwanda/publication/weekly-operational-update-response-marburg-virus-disease-rwanda"><em>WHO Rwanda Country Office operational update</em></a><em> for ongoing response activities in Rwanda. </em></p><ul type="disc"><li data-list="1" data-level="1">The Government of      Rwanda is coordinating the response with support from WHO and partners.</li><li data-list="1" data-level="1">WHO classified the      Marburg virus disease outbreak in Rwanda as a grade 3 emergency, the      highest internal level for emergencies based on the WHO Emergency Response Framework.</li><li data-list="1" data-level="1">A surge team from WHO has travelled to support      the in-country      response across the functions of incident management, epidemiology, health      operations, case management, health logistics, vaccines research, partner      coordination and infection prevention and control. </li><li data-list="1" data-level="1">A
    Global Outbreak Alert and Response Network (GOARN)      request for assistance was issued on 2 October 2024, seeking the support      of GOARN partners in the functions of case management and therapeutics      research. Since then, five GOARN experts have travelled in the functions      of case management and therapeutics research.</li><li data-list="1" data-level="1">A request for      expressions of interest was issued by the Ministry of Health of Rwanda, in      partnership with the WHO Emergency Medical Teams (EMT) Secretariat, seeking EMT      support for deployment to Marburg treatment centers or to provide      specialized care teams to tertiary hospitals.</li><li data-list="1" data-level="1">The <a href="https://www.who.int/publications/m/item/marburg-virus-disease-global-strategic-preparedness-and-response-plan-for-rwanda">Marburg virus disease      strategic preparedness and response plan</a> and <a href="https://www.who.int/publications/m/item/who-appeal--marburg-virus-disease-outbreak-rwanda-2024">WHO
    appeal</a> for the&nbsp;Marburg      virus disease outbreak in Rwanda have been published. </li><li data-list="1" data-level="1">WHO is supporting the      transportation of samples to a regional reference laboratory for      inter-laboratory comparison.</li><li data-list="1" data-level="1">Given the increasing      number of survivors, WHO is supporting the&nbsp;Government in the establishment      of a programme for survivors, by sharing technical guidance and protocols      for the establishment of a national programme, including exploring a      potential prospective observational study. </li><li data-list="1" data-level="1">WHO is supporting the Government of Rwanda      and partners in the launch of the therapeutics clinical trials in Rwanda.</li><li data-list="1" data-level="1">WHO has provided technical advice to public health authorities in Rwanda and at-risk countries on the implementation of evidence-informed and risk-based health measures; the strengthening of detection,
    reporting and management capacities at points of entry and across borders; and travel advice. <strong></strong></li><li data-list="1" data-level="1">WHO has published interim guidance on the <a href="https://www.who.int/publications/m/item/considerations-for-border-health-and-points-of-entry-for-filovirus-disease-outbreaks">Considerations for border health and points of entry for filovirus disease outbreaks</a>, which applies to but is not limited to the current MVD outbreak in Rwanda. </li><li data-list="1" data-level="1">WHO has also published a statement <a href="https://www.who.int/news-room/articles-detail/who-advises-against-any-travel-and-trade-restrictions-with-rwanda-in-the-context-of-the-ongoing-marburg-virus-disease-(mvd)-outbreak">advising against any travel restrictions and against any trade restrictions with Rwanda</a> in the context of the ongoing MVD outbreak.&nbsp; </li><li data-list="1" data-level="1">WHO is providing support in surrounding countries to assess the readiness
    of healthcare facilities within surrounding countries and specifically risk mapping for areas bordering Rwanda.</li></ul>
