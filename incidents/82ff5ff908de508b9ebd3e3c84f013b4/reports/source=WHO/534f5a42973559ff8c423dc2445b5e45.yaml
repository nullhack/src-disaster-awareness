  Advice: <p>MVD outbreak control relies on using a range of interventions, including prompt isolation and case management; surveillance including active case search, case investigation and contact tracing; a laboratory service; infection prevention and control, including prompt safe and dignified burial; and social mobilization &ndash; community engagement is key to successfully controlling MVD outbreaks. Raising awareness of risk factors for Marburg virus infection and protective measures that individuals can take is an effective way to reduce human transmission. WHO advises the following risk reduction measures as an effective way to reduce MVD transmission in healthcare facilities and in communities:</p><ul type="disc"><li data-list="0" data-level="1">To reduce human infections and deaths, it is      essential to raise community awareness about the risk factors for Marburg      virus infection particularly of human-to-human transmission, and the      protective measures individuals can
    take to minimize exposure to the      virus.&nbsp; This includes encouraging anyone with symptoms to seek      immediate care at a health facility or designated treatment center to      lower the risk of community transmission and improve their chances for      recovery.</li><li data-list="0" data-level="1">Surveillance activities, including the wide      dissemination of the MVD case definition, should be strengthened in all      affected districts, including contact tracing and active case finding.</li><li data-list="0" data-level="1">Critical infection prevention and control      measures should be implemented and/or strengthened in all health care      facilities, per <a href="https://www.who.int/publications/i/item/WHO-WPE-CRS-HCR-2023.1">WHO&rsquo;s Infection prevention and control guideline for Ebola and Marburg disease</a>. &nbsp;&nbsp;</li><li data-list="0" data-level="1">A&nbsp;comprehensive strategy to manage deceased individuals      in communities should be implemented in
    communities. Safe and      dignified burials should be carried out, with strong engagement communities.</li><li data-list="0" data-level="1">Rapid qualitative assessments should be      implemented to collect socio-behavioural data, which can then be utilized      to guide the response.</li><li data-list="0" data-level="1">Timely laboratory testing      of all suspected cases needs to be maintained and supported with a reliable      sample transportation system. </li><li data-list="0" data-level="1">Border health readiness      and response capacities should be strengthened at points of entry and in      communities bordering areas reporting MVD cases and &nbsp;onboard conveyances, and public &nbsp;health advice should be provided to travellers      in line with <a href="https://www.who.int/publications/m/item/considerations-for-border-health-and-points-of-entry-for-filovirus-disease-outbreaks">WHO&rsquo;s interim guidance on considerations for border health and points of entry      for
    filovirus disease outbreaks</a>.</li><li data-list="0" data-level="1">WHO encourages all countries to send the first      samples that&nbsp;tested positive for Marburg virus and a subset of      negative samples to a WHO Collaborating Centre or a regional reference      laboratory for inter-laboratory comparison. </li><li data-list="0" data-level="1">WHO recommends that      clinical data from suspected and confirmed Marburg virus disease cases be systematically      collected to improve the limited understanding of the clinical course and      direct causes and risk factors for poor outcomes. This can be done by      contributing anonymized data to the&nbsp;<a href="https://www.who.int/tools/global-clinical-platform/viral-haemorrhagic-fever">WHO Global Clinical Platform</a>&nbsp;for viral      haemorrhagic fevers.</li></ul><p>Based on the current risk assessment, WHO advises against any travel restrictions and against any trade restrictions with Rwanda. For further information, please
    see <a href="https://www.who.int/news-room/articles-detail/who-advises-against-any-travel-and-trade-restrictions-with-rwanda-in-the-context-of-the-ongoing-marburg-virus-disease-(mvd)-outbreak">WHO advice for international traffic in relation to the Marburg virus disease outbreak in Rwanda</a>.&nbsp;</p>
  Assessment: <p>Marburg virus disease (MVD) is caused by the same family of viruses (Filoviridae) that causes Ebola virus disease. MVD is an epidemic-prone disease associated with high CFR (24-88%). In the early course of the disease, MVD is challenging to distinguish from other infectious diseases such as malaria, typhoid fever, shigellosis, meningitis and other viral haemorrhagic fevers. Epidemiologic features can help differentiate between viral hemorrhagic fevers (including history of exposure to bats, caves, or mining) and laboratory testing is important to confirm the diagnosis. </p><p>The notification of 58 confirmed cases, of which over 80% are healthcare workers from two different health facilities in the country is of great concern. Healthcare-associated infections (also known as nosocomial infections) of this disease can lead to further spread if not controlled early. The importance of screening all persons entering health facilities as well as inpatient surveillance for prompt
    identification, isolation, and notification cannot be overemphasized. This is in addition to the importance of contact identification and monitoring of all probable and confirmed cases. The source of the outbreak, the likely date of onset of the first case and additional epidemiological information on cases are still pending further outbreak investigation.&nbsp;</p><p>On 30 September WHO assessed the risk of this outbreak as very high at the national level, high at the regional level, and low at the global level. However, based on the evolution of the outbreak and ongoing investigations, this risk assessment may be revised. MVD is not&nbsp;easily transmissible (i.e. in most instances it requires contact with the body fluids of a sick patient presenting with symptoms or with surfaces contaminated with these fluids). In addition, there are ongoing public health measures in place, including active surveillance in facilities and communities, testing suspected cases, contact tracing, isolation
    and treatment of cases.</p>
  Overview: '<p>Since the first <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON537">Disease Outbreak News</a>&nbsp;on this event was&nbsp;published on 30 September 2024, 32 additional laboratory-confirmed cases of Marburg virus disease (MVD)have been reported in Rwanda. As of 10 October 2024, a total of 58 cases, including 13 deaths (CFR: 22%), have been reported. The vast majority of the cases have been reported from the three districts within Kigali. </p><p>Since the declaration of the outbreak on 27 September and as of 10 October, 15 confirmed cases have recovered, the remaining 30 cases are under care at the designated Marburg treatment center. Health workers from two health facilities in Kigali account for over 80% of confirmed cases. All new confirmed cases reported within the past week, have been associated with the two hospital clusters in Kigali. As of 10 October 2024, a total of 2949 tests for Marburg virus have been conducted, with approximately 200-300
    samples being tested daily at the Rwanda Biomedical Center from suspected MVD cases. </p><p>Contact tracing is underway, with over 700 contacts under follow-up as of 9 October 2024. A contact is known to have travelled internationally, to Germany, and is currently being monitored by the local health authorities for the recommended 21 days follow-up period. A contact who travelled to Belgium has completed the 21 days follow-up period and no longer poses a public health risk. </p><p>The source of the outbreak is still under investigation and additional information will be provided when available.&nbsp;</p>'
