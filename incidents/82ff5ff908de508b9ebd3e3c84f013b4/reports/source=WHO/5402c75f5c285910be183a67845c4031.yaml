  Summary: "On 27 September 2024, the Rwanda Ministry of Health announced the confirmation of Marburg virus disease (MVD). Blood samples taken from people showing symptoms were tested by real-time reverse transcription polymerase chain reaction (RT-PCR) at the National Reference Laboratory of the Rwanda Biomedical Center and were positive for Marburg virus.\r\nAs of 29 September 2024, a total of 26 confirmed cases, including eight deaths have been reported. The cases are reported from seven of the 30 districts in the country. Among the confirmed cases, over 70% are healthcare workers from two health facilities in Kigali. The patients are being cared for in hospitals. Contact tracing is underway, with 300 contacts under follow-up. \r\n\r\nThis is the first time MVD has been reported in Rwanda. The Government of Rwanda is coordinating the response with support from WHO and partners.\r\n\r\nThere is currently no available treatment or vaccine for MVD. This is why it is important for people\
    \ showing Marburg-like symptoms to seek care early for supportive treatment which can improve patient survival. \r\n\r\nWHO assesses the risk of this outbreak as very high at the national level, high at the regional level, and low at the global level."
