  Advice: '<p>MVD outbreak control relies on using a range of interventions, including prompt isolation and case management; surveillance including active case search, case investigation and contact tracing; an optimal laboratory service; infection prevention and control, including prompt safe and dignified burial; and social mobilization &ndash; community engagement is key to successfully controlling MVD outbreaks. Raising awareness of risk factors for Marburg virus infection and protective measures that individuals can take is an effective way to reduce human transmission. WHO advises the following risk reduction measures as an effective way to reduce MVD transmission in healthcare facilities and in communities:</p><ul type="disc"><li data-list="0" data-level="1">To reduce human infections and deaths, it is      essential to raise community awareness about the risk factors for Marburg      virus infection and the protective measures individuals can take to      minimize exposure to the
    virus.&nbsp; This includes encouraging anyone      with symptoms to seek immediate care at a health facility or designated      treatment centre to lower the risk of community transmission and improve their      chances for recovery.</li><li data-list="0" data-level="1">Surveillance activities including the wider      dissemination of MVD case detection should be strengthened in all affected      provinces, including contact tracing and active case finding.</li><li data-list="0" data-level="1">Critical infection prevention and control      measures in health facilities should be strengthened or implemented      including: </li><ul type="circle"><li data-list="0" data-level="2">Establish a system       for screening, referral and isolation of suspect MVD cases. Health       facilities should ensure active screening of all persons entering the       facility according to suspect MVD case definition and prompt isolation       for suspect and confirmed cases.</li><li data-list="0" data-level="2">Health
    facilities       should ensure IPC programmes and Water, Sanitation and Hygiene (WASH)       services are in place, establish/activate their IPC committees for       coordination purposes and ensure IPC guidelines, protocol, standard       operating procedures for MVD are available (e.g. environmental cleaning,       and disinfection, risk assessment for exposed health workers) and       sufficient IPC/ personal protective       equipment (PPE) supplies.</li><li data-list="0" data-level="2">Health workers caring       for patients with confirmed or suspected MVD should apply <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2">Transmission-based precautions</a> in addition to: <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1">Standard precautions</a>, including appropriate use of PPE and hand       hygiene according to the&nbsp;<a href="https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21">WHO
    5 moments</a>&nbsp;to avoid contact with patient&rsquo;s blood       and other body fluids and with contaminated surfaces and objects.</li><li data-list="0" data-level="2">Health facilities should ensure the availability       of PPE for health workers, cleaning and disinfection of the environment       is conducted, processes for appropriate decontamination of medical devices,       safe linen and waste management are in place. This includes training/refresher       training of health workers on IPC and WASH.</li><li data-list="0" data-level="2">Rapid health facility       IPC &amp; WASH assessments should be undertaken to identify and address       gaps.</li></ul><li data-list="0" data-level="1">Equally important, the      identification of deceased patients should be implemented in communities and      safe and dignified burials, which requires strong engagement with      communities.</li><li data-list="0" data-level="1">Timely laboratory      confirmation of all suspected patients
    needs to be in place and supported with      a sample transportation system in place. </li></ul><p>WHO encourages all countries to send samples (positive or negative) to a WHO Collaborating Centre or a regional reference laboratory for confirmation. WHO recommends that clinical data from suspected and confirmed cases of Marburg disease are systematically collected to improve the limited understanding of the clinical course and direct causes and risk factors for poor outcomes. This can be done by contributing anonymized data to the&nbsp;<a href="https://www.who.int/tools/global-clinical-platform/viral-haemorrhagic-fever">WHO Global Clinical Platform</a>&nbsp;for viral haemorrhagic fevers.</p><p>Based on the current risk assessment, WHO advises against any travel and trade restrictions with Rwanda.</p>'
  Assessment: <p>Marburg virus disease (MVD) is caused by the same family of viruses (Filoviridae) that causes Ebola disease. MVD is an epidemic-prone disease associated with high CFR (24-88%). In the early course of the disease clinical diagnosis of MVD is challenging to distinguish from other infectious diseases such as malaria, typhoid fever, shigellosis, meningitis and other viral haemorrhagic fevers. Epidemiologic features can help differentiate between viral hemorrhagic fevers (including history of exposure to bats, caves, or mining) and laboratory testing is important to confirm the diagnosis.&nbsp;</p><p>The notification of 26 confirmed cases, of which over 70% are healthcare workers from two different health facilities in the country is of great concern. Healthcare-associated infections (also known as nosocomial infections) of this disease can lead to further spread if not controlled early. The importance of screening all persons entering health facilities as well as inpatient surveillance
    for prompt identification, isolation, and notification cannot be overemphasized. This is in addition to the importance of contact identification and monitoring of all probable and confirmed cases. The source of the outbreak, geographical extent, the likely date of onset, and additional epidemiological information on cases are still pending further outbreak investigation.&nbsp;</p><p>There is a risk of this outbreak spreading to neighbouring countries since cases have been reported in districts located at the borders with the Democratic Republic of the Congo, the United Republic of Tanzania, and Uganda. Further risk of international spread is also high as confirmed cases have been reported in the capital city with an international airport and road networks to several cities in East Africa. A contact is known to have travelled internationally, to Belgium, and appropriate response measures have been implemented. &nbsp;Optimized supportive care for patients, which includes careful monitoring,
    intravenous fluid, and early treatment of complications, can improve patient survival. There are promising vaccines and therapeutic candidates for MVD, but these must be proven in clinical trials. &nbsp;WHO has provided guidance to the Ministry of Health on how to manage cases. </p><p>WHO assesses the risk of this outbreak as very high at the national level, high at the regional level, and low at the global level.&nbsp; Investigations are ongoing to determine the full extent of the outbreak and this risk assessment will be updated as more information is received.&nbsp;&nbsp;</p>
  Overview: '<p><a name="_Hlk178508665"></a>On 27 September 2024, the Rwanda Ministry of Health announced the confirmation of MVD in patients in health facilities in the country. Blood samples collected from suspected cases were sent to the National Reference Laboratory of the Rwanda Biomedical Center for testing and were positive for Marburg virus by RT-PCR on 26 September 2024. Samples are being sent to a regional reference laboratory for further confirmation.&nbsp;Samples are being sent to a regional reference laboratory for further confirmation. </p><p>As of 29 September 2024, a total of 26 confirmed cases, including eight deaths (CFR: 31%), have been reported. The cases are reported from seven of the 30 districts in the county namely: Gasabo, Gatsibo, Kamonyi, Kicukiro, Nyagatare, Nyarugenge and Rubavu districts. Healthcare workers from two health facilities in Kigali account for over 70% of confirmed cases. The patients are being cared for in hospitals. </p><p>Contact tracing is underway,
    with about 300 contacts under follow-up as of 29 September 2024. One contact travelled to Belgium from Rwanda. WHO was made aware of this by the public health authorities in Belgium. They shared detailed information on the contact''s situation, that they remained healthy, completed the 21-day monitoring period, did not present with any symptoms, and are not a risk to public health.</p><p>The source of the infection is still under investigation and additional information will be provided when available.&nbsp; </p><p>This is the first report of MVD in Rwanda.&nbsp;<strong></strong></p><p><strong></strong></p><p><strong></strong><strong></strong></p>'
