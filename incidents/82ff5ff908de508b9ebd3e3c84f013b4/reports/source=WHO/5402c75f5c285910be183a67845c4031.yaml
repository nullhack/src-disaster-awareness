  Response: <ul type="disc"><li data-list="0" data-level="1">The Government of      Rwanda is coordinating the response with support from WHO and partners. </li><li data-list="0" data-level="1">To support the early detection of cases, the      Ministry of Health has shared the Rwanda Biomedical Center hotline number      with the public to report symptoms. </li><li data-list="0" data-level="1">In-depth epidemiological investigation,      contact tracing and follow-up is underway and suspected cases are being      isolated for testing and treatment. </li><li data-list="0" data-level="1">Infection prevention and control (IPC) and      Water, Sanitation and Hygiene (WASH) measures are being implemented in all      health facilities. </li><li data-list="0" data-level="1">Risk communication and community engagement      strategies (RCCE) to inform and mobilize communities, including strategies      to manage rumours and misinformation are being strengthened.&nbsp; </li><li data-list="0" data-level="1">Following
    the initial confirmation in the      country, WHO is supporting the transportation of samples to a regional      reference laboratory for confirmation. </li><li data-list="0" data-level="1">WHO is working on delivering supplies      including the shipment and prepositioning of laboratory testing kits and      personal protective equipment.&nbsp; </li><li data-list="0" data-level="1">WHO and partners are working closely with the      government to provide information and access to available candidate MVD      vaccines and therapeutics for a possible clinical trial. The Ministry of      Health has identified two experienced principal investigators to lead the trials.      </li><li data-list="0" data-level="1">WHO is working with neighbouring countries Democratic Republic of Congo, Burundi, Kenya, Tanzania and Uganda to review its operational readiness capabilities to respond to Marburg. WHO is conducting an assessment of the risk for South Sudan due to trade routes between countries. The
    readiness of unaffected districts in Rwanda is also being ensured to mitigate the spread and quickly identify any spillover.&nbsp;</li></ul>
