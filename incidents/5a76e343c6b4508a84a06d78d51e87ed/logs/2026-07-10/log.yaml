log_date: '2026-07-10'
summary: The wildfire in southern France has intensified, forcing the evacuation of over 10,000 people and scorching more than 11,000 acres (over 1,600 hectares). A 22-year-old volunteer firefighter died while battling the blaze. The third stage of the Tour de France proceeded with an adapted format, closed to the public due to the fire risk.
