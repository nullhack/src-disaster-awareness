log_date: '2026-07-10'
summary: The death toll from Venezuela's twin earthquakes has risen to between 3,811 and 3,889, with a survivor rescued after 183 hours. Health workers report surges in chronic illness and diarrhea due to crowded shelters and lack of clean water. International aid continues, including Guyana shipping 88 containers of supplies, India's Operation Amistad, and the USS San Antonio arriving at La Guaira port.
