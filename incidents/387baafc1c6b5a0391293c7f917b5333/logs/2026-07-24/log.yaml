log_date: '2026-07-24'
summary: |-
  Spanish insurer Mapfre estimated losses from the June 24 earthquakes at €25 million, as reported in a new financial update. Meanwhile, a local story highlights false hope from fake news about survivors, and a grandfather continues searching for his missing grandson.
  As of July 24, one month after the twin earthquakes, the death toll tops 5,300 with tens of thousands still missing and residents conducting their own searches as government clearance threatens to proceed before families recover loved ones. Reports highlight how poverty divides even in death, with the poor disproportionately affected, and Venezuela's inability to access $4 billion in gold reserves hampers recovery efforts.
