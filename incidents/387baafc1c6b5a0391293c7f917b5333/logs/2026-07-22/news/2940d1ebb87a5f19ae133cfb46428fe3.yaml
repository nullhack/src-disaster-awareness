title: '''Beautiful game'' provides Venezuelans with welcome distraction in wake of tragedy'
body: '"Today more than ever, we remain united" reads the banner brandished by the players of Venezuelan club UCV prior to the first major sporting event hosted by the country since the twin earthquakes that killed over 5,000 last month."What is wonderful about Venezuelans is we are united," she said.'
