title: 'EXPLAINER: How a ‘one-two punch’ of twin quakes struck Venezuela | The Asahi Shimbun: Breaking News, Japan News and Analysis'
body: SAN JUAN, Puerto Rico—The two powerful earthquakes that struck Venezuela’s northern coast, killing more than 180 people, were an event known as a “doublet.”
