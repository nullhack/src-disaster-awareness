log_date: '2026-07-18'
summary: The death toll from the June 24 twin earthquakes in Venezuela has risen to 5,069, with most casualties in the coastal state of La Guaira. The UN launched a $98 million appeal for earthquake response, while the IMF released funds for reconstruction. NASA's NISAR satellite revealed 60 cm ground shifts along the San Felipe fault, and reports highlight delayed military response and a child protection system unprepared for the disaster.
