title: Toll from Venezuela double earthquakes reaches 5,346 killed - Jamaica Observer
body: CARACAS, Venezuela (AFP) — The death toll from the double earthquakes that struck Venezuela nearly a month ago has reached 5,346, according to the latest official tally on Tuesday. The 7.2 and 7.5 magnitude quakes on June 24 hit the north of the country hardest, especially the coastal state of La Guaira, outside the capital Caracas. National Assembly President Jorge Rodriguez said on Telegram the death toll was at least...
