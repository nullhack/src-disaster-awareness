title: 'One month after the earthquakes in Venezuela: ‘People aren’t going to leave their dead there’'
body: With the death toll topping 5,300 and no official count of the missing, residents have taken the search for victims into their own hands as government machinery threatens to clear the ruins before many families have recovered their loved ones
