title: World Bank Estimates Quakes Cost Venezuela $20 Billion in Damage
body: The twin earthquakes that hit Venezuela last month may have caused $19.6 billion in physical damage to buildings and infrastructure, or about 18% of gross domestic product, according to a preliminary assessment by the World Bank.
