title: <b>Venezuela quake death toll tops 5K; IMF releases funds </b>
body: CARACAS — The twin earthquakes that struck Venezuela last month killed over 5,000 people, officials said, while announcing they drew hundreds of millions of dollars from the International Monetary Fund (IMF) for reconstruction.
