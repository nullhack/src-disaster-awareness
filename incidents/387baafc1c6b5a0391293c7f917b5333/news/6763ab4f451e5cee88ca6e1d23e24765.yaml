title: Nearly a month later, grandfather still searching for grandson missing after Venezuela earthquakes
body: Xavier Lovera Santander, 9, went out with his grandmother to take out the trash when two powerful earthquakes struck Venezuela, causing the building where he lived to collapse. Nearly a month later, his relatives continue searching for him. The boy was with his maternal grandmother, Trina Romelia Ávila Porra, 78,...
