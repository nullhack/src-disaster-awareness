title: World Bank estimates $19.6 billion in earthquake damage in Venezuela
body: The twin earthquakes that struck northern Venezuela on June 24 caused an estimated $19.6 billion in direct physical damage, according to a preliminary assessment published on Thursday by the World Bank. The figure is equivalent to about 18% of the country's gross domestic product, based on International Monetary Fund data.
