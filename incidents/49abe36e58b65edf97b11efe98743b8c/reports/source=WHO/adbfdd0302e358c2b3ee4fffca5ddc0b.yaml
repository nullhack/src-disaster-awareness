  Response: '<p>National and State authorities have implemented a range of coordinated response measures, including surveillance, case management, contact tracing, risk communication, and One Health investigations.</p><ul><li data-list="0" data-level="1">Immediate initiation of response measures upon preliminary positive laboratory      results prior to national confirmation. Ongoing monitoring and      coordination by State and Central health authorities, including the activation      of Rapid Response Teams and coordination meetings at district level.&nbsp;</li><li>Deployment of central expert teams: a National Centre for Disease Control (NCDC) team and an Indian Council of Medical Research (ICMR) expert team both visited Kozhikode on 13 June 2026 to evaluate the situation and provide technical support for ongoing response activities. </li><li>Establishment of a State High-Power Committee for      Epidemic Control: the Kerala State Health Department has constituted a      multi-sectoral
    expert committee to study recurrent seasonal outbreaks in      Kerala and develop evidence-based preventive recommendations. Membership      includes government and private-sector clinicians, One Health experts,      representatives from Animal Husbandry, Food Safety, Ayurveda, Yoga and      Naturopathy, Unani, Siddha, and Homoeopathy (AYUSH), and local government      bodies.</li><li data-list="0" data-level="1">Identification and monitoring of 104 contacts, with twice-daily follow-up.</li><li data-list="0" data-level="1">Establishment of isolation wards and dedicated quarantine facilities at Kozhikode      Government Medical College Hospital. Provision and stockpiling of personal      protective equipment (PPE) and essential medical supplies.</li><li>Establishment of a control room for risk communication and public queries.</li><li>Systematic community surveillance: door-to-door surveys      completed across all 320 households (1047 residents) in Ramanattukara      Municipality Division
    5. No Nipah-compatible symptoms were identified      among surveyed residents.</li><li>Psychosocial support: a district mental health programme is providing psychological support to contacts under quarantine, with 125 contacts reached by 18 June 2026.</li><li>One Health and environmental investigation: Animal      Husbandry Department conducted specimen collection within a 5 km radius of      the epicentre, including bat specimens (collected with Forest Department      assistance) and faecal samples from bat roosting sites along with samples      from other animals. All samples have been dispatched to the National      Institute of High Security Animal Diseases (NIHSAD), Bhopal, for Nipah      virus testing; results are pending.</li><p>WHO continues to monitor the evolving situation and support risk assessment and coordination efforts as needed.</p></ul>'
