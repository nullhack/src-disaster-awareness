title: Ebola death toll in DR Congo rises to 967, UN warns of spread in displacement camps
body: The number of confirmed Ebola cases in the Democratic Republic of Congo has increased to 2,423, including 967 deaths, government data showed on Monday.The country's public health institute said in its latest report that 79 new cases were detected on Sunday in the eastern provinces of Ituri ...
