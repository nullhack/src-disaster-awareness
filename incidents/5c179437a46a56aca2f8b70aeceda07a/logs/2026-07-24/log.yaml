log_date: '2026-07-24'
summary: |-
  The Ebola death toll in DR Congo has surpassed 1,000, with the outbreak now the fastest fatal surge in recorded history. New reports document over a dozen attacks on health facilities and workers, and highlight that a million displaced people in the epicenter face dangerous, crowded conditions that are fueling the virus's spread.
  As of July 24, 2026, a provincial data review has pushed confirmed Ebola cases in the DR Congo outbreak to nearly 3,000, with over 1,250 deaths. Other reports put the death toll at 1,033 and confirmed cases above 2,500, reflecting continued escalation of the fastest-growing Ebola outbreak on record.
