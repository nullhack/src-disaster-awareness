title: More health workers strike as Ebola cases in Congo exceed 2,000, including 754 deaths
body: Ebola cases in Congo have reached 2,011, with 754 deaths, according to government data. Health workers at Bunia General Hospital went on strike on Wednesday over unpaid wages.
