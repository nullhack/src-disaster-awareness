title: 'Urgent: Ebola caseload in DR Congo tops 2,000'
body: KINSHASA, July 14 (Xinhua) -- The number of confirmed Ebola cases in the Democratic Republic of the Congo has reached 2,011, including 754 deaths, according to a report released Tuesday by the country's health authorities.
