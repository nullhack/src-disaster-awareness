title: Ebola is spreading faster in eastern Congo than it can be tracked, as deaths pass 700
body: Eighty percent of new Ebola cases in eastern Congo are emerging from unknown chains of transmission, the World Health Organization said Tuesday, a sign the outbreak is spreading faster than health officials can track despite an expanding response.
