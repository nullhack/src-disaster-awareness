title: Congo's Ebola outbreak has killed nearly 1,000 people
body: At least 999 people have died from the Ebola outbreak in Congo, according to official data published overnight into Wednesday, a grim toll in what's already been declared the fastest Ebola outbreak in history, as conflict, community resistance and an uneven response fuel its spread.
