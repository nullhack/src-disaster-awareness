title: ‘Walking Ebola’ Helps Explain Why Congo’s Outbreak Is So Hard to Stop — and How to Treat It
body: Some doctors call it “walking Ebola” — symptoms of the rare Bundibugyo strain appear to worsen slowly, leaving patients sick enough to spread the virus but not so unwell to stop them moving through their communities.
