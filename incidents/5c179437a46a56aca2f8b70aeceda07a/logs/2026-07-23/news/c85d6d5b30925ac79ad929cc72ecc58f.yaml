title: Ebola death toll passes 1,000 in Congo | Arkansas Democrat Gazette
body: BUNIA, Congo -- More than 1,000 people have died in the Ebola outbreak in Congo, according to Africa's top health body, a grim toll in the fastest Ebola outbreak in history, as conflict, community resistance and an uneven response fuel its spread.
