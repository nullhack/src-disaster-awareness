log_date: '2026-07-10'
summary: The Ebola outbreak in the Democratic Republic of the Congo has become the fastest-growing ever, with cases surging above 1,000 and the death toll reaching 600. The outbreak has spread to new provinces including Tshopo and Haut-Uele, and the first case outside Africa has been confirmed in France. Response efforts are hampered by funding shortages, unpaid health workers, and the closure of USAID, while new diagnostic tests and treatment trials offer hope.
