title: Médecins Sans Frontières Launches 'Keep Life Breathing' Roving Exhibition to Spotlight Humanitarian Crises and Ebola Disease Outbreak in DRC
body: 'HONG KONG, July 6, 2026 /PRNewswire/ -- Médecins Sans Frontières (MSF) Hong Kong yesterday held an opening ceremony for its ''Keep Life Breathing'' Roving Exhibition. As a key part of its annual ''MSF Day'' campaign, the exhibition will tour three locations throughout July: The Wai, Festival Walk, and TKO Plaza. It showcases real-life stories of MSF providing emergency medical humanitarian assistance to people affected by protracted conflicts and crises. The event also features an Ebola disease-themed zone, which aims to deepen public awareness and understanding of the ongoing outbreak in the Democratic Republic of Congo (DRC).'
