title: 'Roundup: WHO said Ebola outbreak in DR Congo intensifies, regional risk persists'
body: KINSHASA, July 7 (Xinhua) -- The Ebola outbreak in the Democratic Republic of the Congo (DRC) has deteriorated further, with confirmed deaths rising above 520 and transmission continuing in eastern hotspot areas, according to a report released Tuesday by the World Health Organization (WHO) Regional Office for Africa.
