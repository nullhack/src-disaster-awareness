title: Ebola death toll in Congo reaches 600 as new cases suspected in previously unaffected provinces
body: According to the Congolese health ministry, suspected cases have now been recorded in the provinces of Tshopo and Haut-Uele, signaling the continued spread of the disease beyond the epicenter in Ituri.
