title: Africa Cdc Urges Congo Uganda To Fund Ebola Fight And Vaccine Push
body: Africa CDC has urged governments to step up funding for the Ebola outbreak in Congo and Uganda. The appeal underlines Africa's push to build its own vaccine and treatment capacity.
