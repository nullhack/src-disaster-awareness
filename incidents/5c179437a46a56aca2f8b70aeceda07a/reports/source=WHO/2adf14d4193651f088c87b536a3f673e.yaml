  Summary: "On 1 December 2025, the Ministry of Health (MoH) of the Democratic Republic of the Congo (DRC) declared the end of the Ebola virus disease (EVD) outbreak which had been declared on 4 September 2025. The end was declared after two consecutive incubation periods (a total of 42 days) since the last person confirmed with EVD tested negative for the virus and was discharged on 19 October 2025. A total of 64 cases (53 confirmed, 11 probable), including 45 deaths (CFR 70.3%), were reported from six health areas in Bulape Health Zone, Kasai Province.  WHO and partners provided technical, operational and financial support to the government to contain the outbreak. This is the country’s 16th outbreak of Ebola. \r\nAlthough the outbreak has been declared over, health authorities are maintaining surveillance to rapidly identify and respond to any re-emergence. Risk communication and community engagement activities will continue to provide accurate information, monitor and address community\
    \ feedback and rumours, and support efforts to reduce stigma toward individuals affected by the outbreak. "
