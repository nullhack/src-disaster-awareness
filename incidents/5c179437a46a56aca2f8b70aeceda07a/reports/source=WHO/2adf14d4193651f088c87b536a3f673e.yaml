  Response: '<p>Health authorities, with support from WHO and partners, implemented public health measures, including but not limited to the following: </p><p><strong>Coordination</strong></p><ul><li>The Ministry of Health (MoH) coordinated the outbreak response with WHO and partners, while the Incident Management Team in Bulape Health Zone oversaw field operations.</li><li>A high-level national delegation led by the Minister of Health visited Kasai Province to assess response activities, reaffirm government commitment, and inaugurate a newly constructed Ebola Treatment Centre.</li><li>WHO deployed 112 experts and frontline responders to support the national authorities to swiftly scale up and sustain the response. &nbsp;</li><li>A regional strategic preparedness and response plan was developed and disseminated to guide efforts in surveillance, case management, diagnostics, vaccination, IPC, community engagement, and operational readiness.</li><li>WHO launched a US$21 million appeal to scale
    up response operations, supported by contributions from partners.</li></ul><p><strong>Surveillance</strong><strong></strong></p><ul><li>Surveillance activities were scaled up in Bulape and nearby areas, and more than 100 alerts were investigated. </li><li>Community health workers were trained to support community-based surveillance using simplified case definitions. </li><li>Congolese Red Cross volunteers were engaged in reporting community deaths and supporting surveillance efforts, while mortality surveillance was initiated in health facilities</li><li>Surveillance, health screening and risk communication were reinforced at points of entry and points of control, including border crossings, with sensitization of staff at points of entry to detect and manage suspected cases. </li><li>Border communities were integrated into early warning systems and the national surveillance network.</li><li>WHO deployed epidemiologists in Bulape and supports the 90-day heightened surveillance period
    following the declaration of the end of the outbreak.</li></ul><p><strong>Laboratory</strong></p><ul><li>MoH and partners strengthened laboratory capacities and deployed a mobile laboratory to reduce turnaround time for laboratory results.</li><li>MoH performed full genome sequencing on the sample of the first confirmed case and findings indicate the outbreak was most likely the result of a spillover event from a zoonotic reservoir. </li></ul><p><strong>Case management</strong></p><ul><li>MoH, with support from WHO and partners, set up an Ebola treatment centre in Bulape</li><li>Case management strategy was scaled up to ensure sufficient capacities to provide care for all probable and confirmed cases in all hotspots.</li><li>Surge teams and partners supported clinical care. Patients received monoclonal antibody treatment. </li><li>WHO experts supported case management, essential health services, and survivor program implementation.</li></ul><p><strong>Vaccination</strong></p><ul><li>A
    total of 47 577 individuals were vaccinated with the rVSV&Delta;G-ZEBOV-GP (Ervebo) Ebola vaccine in Bulape, Bulambae, and Mweka Health Zones. </li><li>A ring vaccination strategy implemented, targeting contacts, potential contacts, and high-risk healthcare/frontline workers, complemented by geographic targeting in hotspots. </li><li>Ultra cold chain equipment installed in Kananga, Mweka and Tshikapa to support vaccine storage and distribution.</li></ul><p><strong>Infection prevention and control</strong></p><ul><li data-list="2" data-level="1">Infection prevention and control (IPC) response coordination mechanism activated,      including the IPC ring around cases, which included cleaning and      disinfection of sites where confirmed cases passed through.</li><li data-list="2" data-level="1">Recommendations provided to health workers, district leaders, and the public to strengthen      detection of suspected cases and implement appropriate IPC measures.</li><li data-list="2" data-level="1">Supervision
    and support provided to Bulape General Hospital, Ebola treatment centre ,      and four health centres.</li></ul><p><strong>Risk Communication and Community Engagement</strong></p><ul><li data-list="0" data-level="1">An integrated      community engagement approach was implemented, enabling the Risk      Communication and Community Engagement (RCCE) team to work alongside other      response pillars to facilitate safe access to affected communities and      strengthen acceptance of response activities such as community      surveillance, contact tracing and vaccination. </li><li data-list="0" data-level="1">Tailored risk      communication messages were developed and disseminated widely, promoting protective      behaviours and timely care- seeking, while sustained and evolving engagement      with religious leaders, teachers, traditional healers and other trusted      influencers helped build trust and community cooperation.</li><li data-list="0" data-level="1">WHO provided technical
    guidance and on the ground      expertise to conduct a rapid community assessment to better understand the      knowledge, perceptions, experiences, needs and bottom-up solutions of      local communities affected by the EVD outbreak. These findings are being      used to inform appropriate and localized public health measures for      community protection. Community health      volunteers were trained      and supported, expanding      local capacity for community outreach and engagement.</li></ul><p><strong>Operations Support and Logistics</strong></p><ul><ul><li>WHO and partners established a temporary airbridge to accelerate delivery of supplies and personnel to affected areas. </li><li>WHO delivered over 150 tonnes of medical supplies and equipment to protect health workers and communities. Additional logistics include an epi-shuttle, generator, motorbikes, mattresses, and food for patients. </li><li>The coordination with partners enabled rapid access to remote health zones.</li></ul></ul><p><strong
    style="background-color:transparent;color:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Preparedness and readiness</strong></p><ul><li>Eight of nine neighbouring countries completed readiness assessments</li><li>DRC&rsquo;s high-risk provinces were supported in planning. </li><li>Capacity building conducted on readiness in five health zones</li></ul><p><strong>Prevention of Sexual Exploitation, Abuse and Harassment</strong></p><ul><li>Prevention of sexual exploitation, abuse, and harassment (PRSEAH) integrated into response activities through responder briefings, community sensitization, and risk analysis. </li><li>Individuals from three churches and responders/community members were oriented on PRSEAH and reporting mechanisms. </li><li>PRSEAH focal points identified in collaboration with the Bulape Health Zone authorities. </li><li>Posters with PRSEAH principles and reporting information were displayed in health centres
    and offices.</li></ul>'
