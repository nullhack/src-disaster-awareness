  Advice: <p><strong>Coordination</strong></p><ul type="disc"><li>Outbreak control      requires a coordinated, multi-sectoral approach.</li><li>Key interventions      include clinical care, surveillance, laboratory services, IPC/WASH, safe      burials, and community engagement.</li><li>Collaboration with      neighbouring countries is essential for joint investigations, harmonized      reporting, and real-time data sharing.</li><li>Maintaining collaborative relationships with survivor associations while monitoring      survivors is a priority to mitigate any potential risks.</li></ul><p><strong>Surveillance and Laboratory</strong></p><ul type="disc"><li>Surveillance must be      strengthened at community level, health facilities, and points of      entry/points of crossing.</li><li>Suspected cases      should be promptly identified, tested, and isolated.</li><li>Laboratory capacity      must support timely diagnosis and confirmation of cases.</li><li>Contact tracing and      monitoring
    of survivors are essential to prevent further transmission.</li></ul><p><strong>Case Management</strong></p><ul type="disc"><li>To reduce EVD      mortality, early diagnosis and initiation of supportive care are      essential.</li><li>WHO-recommended treatments include Inmazeb&reg; (3-antibody combination) and Ebanga&reg; (single      antibody).</li><li>Ebola treatment      centres must ensure biosecurity, IPC, and allow direct patient observation      in red zones. WHO and partners&rsquo; innovative solutions should be utilized to      ensure safe and effective care delivery.<strong></strong></li></ul><p><strong>Vaccination</strong></p><ul type="disc"><li>The Ervebo vaccine      is recommended for ring vaccination during EVD outbreaks caused by EBOV.</li><li>Target groups      include contacts, potential contacts of confirmed/suspected cases, and frontline      workers.</li></ul><p><strong>Risk Communication and Community Engagement (RCCE)</strong></p><ul type="disc"><li>Enhanced RCCE
    interventions      should be maintained where possible to ensure communities know the signs      of Ebola, understand the importance of reporting symptoms quickly and      remain aware of available health services. &nbsp;Community engagement and feedback systems      should be maintained to quickly detect concerns, rumours or changes in      community perceptions that could signal any emerging risk or resurgence. </li><li>Work should continue to support      stigma-reduction and survivor reintegration, working with local leaders,      survivor groups, and health workers to promote positive narratives and      prevent discrimination against returning patients and their families. &nbsp;</li></ul><p><strong>Infection Prevention and Control / Water, Sanitation and Hygiene (IPC/WASH)</strong></p><ul type="disc"><li>Health workers caring for patients with confirmed      or suspected Ebola should apply&nbsp;<a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2">transmission-based
    precautions</a>&nbsp;in addition to&nbsp;<a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1">standard precautions,</a> including PPE as      per <a href="https://www.who.int/publications/i/item/WHO-WPE-CRS-HCR-2023.1">WHO's Infection prevention and control guideline      for Ebola and Marburg disease</a> and hand hygiene according to the&nbsp;<a href="https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21">WHO 5 moments</a><span style="text-decoration:underline;">.</span></li><li>National guidelines should be followed on rules      and regulations for safe waste disposal or&nbsp;<a href="https://iris.who.int/bitstream/handle/10665/85349/9789241548564_eng.pdf;sequence=1">WHO&rsquo;s guidelines on safe waste management</a></li><li>Healthcare facilities should maintain clean environments with safe water, sanitation,      and hygiene infrastructure as
    outlined      in&nbsp;<a href="https://www.who.int/publications/i/item/9789241547239">Essential environmental health standards in      health care</a>.</li><li>Safe water, adequate sanitation and hygiene      infrastructure and services should be provided in healthcare facilities.      For details on recommendations and improvement, follow the&nbsp;<a href="https://openwho.org/courses/wash-fit">WASH FIT implementation Package</a>.</li></ul><p><strong>Preparedness and readiness</strong></p><ul type="disc"><li>Bordering countries      should enhance readiness for early detection, isolation, and treatment.</li><li>Strengthen surveillance, laboratory capacity, and coordination mechanisms.</li><li>Ensure healthcare      facilities are equipped, and staff are trained in IPC/WASH and case      management.</li></ul><p>WHO advises against any restrictions on travel and/or trade to the Democratic Republic of the Congo based on available information for the outbreak.</p>
  Assessment: <p>The current outbreak constitutes the 16<sup>th</sup> Ebola disease occurrence in the DRC since 1976. The last outbreak was reported from North Kivu in 2022. &nbsp;<br /></p> <p>This outbreak occurred in difficult, hard to reach areas with limited existing infrastructure. A future outbreak is not unexpected given that EVD is endemic in the country. Ebola virus is enzootic and a resurgence from viral persistence in survivors has been described in recent epidemics. Re-emergence of EVD is a major public health concern in the Democratic Republic of the Congo; gaps remain in the country's capacity to recover, prepare for, and respond to outbreaks. The country is facing several outbreaks, including mpox, cholera, and measles. In addition, the country is experiencing a long-term economic and political crisis. The country's resources and capacity to effectively respond to the outbreak were therefore limited.&nbsp;<br /></p> <p>The epicentre of the outbreak was in proximity with the
    Angolan border (approximately 100 to 200 kilometres, depending on the nearest border crossing point). Although the affected district is a hard-to-reach rural area relatively far from the two main urban centres of Mbuji Mayi and Kananga, population movements between different parts of the province are frequent, especially between Bulape and Tshikapa. <br /></p> <p>The outbreak has most likely originated from a new zoonotic spillover and &nbsp;&nbsp;&nbsp;led to sustained human-to-human transmission. Infections and deaths among healthcare workers were reported, which raised the risk of nosocomial amplification and further spread within health facilities.<br /></p> <p>The outbreak is declared over, as of 30 November 2025, with no new cases reported for 42 consecutive days.</p>
  Overview: '<p>The EVD outbreak in the Democratic Republic of the Congo (DRC) was declared on 4 September 2025. As of 30 November 2025, a total of 64 cases (53 confirmed, 11 probable), including 45 deaths (CFR 70.3%), have been reported from six health areas (Bambalaie, Bulape, Bulape Com, Dikolo, Ingongo and Mpianga) in Bulape Health Zone, Kasai Province. Since the last confirmed case reported on 25 September 2025, no new confirmed EVD cases have been reported.</p><p>There have been five cases among health workers (four nurses and one laboratory technician), three of whom have died. The epicentres of the outbreak have been localised in Dikolo (26 cases, 15 deaths) and Bulape (24 cases, 22 deaths) health areas, which together account for 78.1% of the total cases reported and 82.2% of all deaths. The outbreak initially involved nosocomial transmission and a high-transmission funeral gathering, with high mortality among young children. As of 12 October 2025, a total of 572 contacts were followed
    up.</p><p>On 1 December 2025, the Ministry of Health declared the end of the outbreak. This declaration came after two consecutive incubation periods (42 days) since the last person confirmed with EVD tested negative for the virus and was discharged on 19 October 2025, as per WHO recommendations.</p><p><strong>Figure 1. Map of confirmed and probable cases and deaths of Ebola virus disease, Bulape Health Zone, Kasai province, Democratic Republic of the Congo, as of 30 November 2025</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/map-evd-drc.png?sfvrsn=ba19d8b0_3" height="693" style="max-width:100%;height:auto;" title="Map EVD-DRC" width="774" alt="Map EVD-DRC" sf-size="140430" /></p><p><strong>Figure 2: Epidemic curve of confirmed and probable Ebola virus disease cases in Bulape Health Zone, Kasai province, Democratic Republic of the Congo, as of 30 November 2025</strong></p><p><img sf-image-responsive="true"
