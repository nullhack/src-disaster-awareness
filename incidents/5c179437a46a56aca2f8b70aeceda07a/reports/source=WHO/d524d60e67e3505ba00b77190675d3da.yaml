  Title: Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo & Uganda
  Epidemiology: <p>Bundibugyo virus disease (BVD) is a severe and often fatal form of Ebola disease caused by the Bundibugyo virus, one of the <em>Orthoebolavirus </em>species. It is a zoonotic disease, with fruit bats suspected to be the natural reservoir. Human infection is thought to occur through close contact with the blood or secretions of infected wildlife, such as bats or non-human primates, and it subsequently spreads from person to person through direct contact with the blood, secretions, organs, or other bodily fluids of infected individuals or contaminated surfaces or items. Transmission is particularly amplified in health-care settings when infection prevention and control (IPC) measures are inadequate, and during unsafe burial practices involving direct contact with the deceased.</p><p>The incubation period for BVD ranges from two to 21 days, and individuals are not infectious until symptom onset. Early symptoms such as fever, fatigue, muscle pain, headache, and sore throat,
    are non-specific, which complicates clinical diagnosis and can delay detection. These symptoms then progress to gastrointestinal symptoms, organ dysfunction, and in some cases haemorrhagic manifestations. Case fatality rates in the past two BVD outbreaks, reported in Uganda and in the Democratic Republic of the Congo in 2007 and 2012 were 30% and 50% respectively.</p><p>Differentiating BVD from other endemic febrile illnesses such as malaria is challenging without laboratory confirmation using PCR or antigen/antibody-based assays. Control relies on rapid case identification, isolation and care, contact tracing, safe burials, and strong community engagement, as no approved vaccines or specific treatments currently exist for BVD.</p>
  Advice: '<p>WHO advises against any restriction of travel to, or trade with, the Democratic Republic of the Congo or Uganda based on the currently available information. WHO continues to closely monitor and, where necessary, verify travel and trade measures in relation to this event.</p><p>For further information on the considerations for implementing border health and international travel-related temporary recommendations, please see the relevant <a href="https://iris.who.int/items/b07def43-df30-41b8-83e0-deb33bcfd697">technical note issued on 26 May 2026</a></p><p>The <a href="https://www.who.int/news/item/22-05-2026-first-meeting-of-the-ihr-emergency-committee-regarding-the-epidemic-of-ebola-bundibugyo-virus-disease-in-the-democratic-republic-of-the-congo-and-uganda-2026-temporary-recommendations">temporary recommendations</a> issued to State Parties on 22 May 2026 underscore the importance of coordinated outbreak control, enhanced cross‑border collaboration, and sustained surveillance
    and preparedness to prevent further regional spread and ensure an effective public health response. </p><p>WHO has convened several technical advisory groups, including the Strategic Advisory group of Experts (SAGE) to assess candidate vaccines and therapeutics for BVD. Key recommendations made are available in the <a href="https://www.who.int/news/item/28-05-2026-experts-convened-by-who-advise-on-candidate-treatments-and-vaccines-for-ebola-disease-caused-by-bundibugyo-virus">news release published on 28 May 2026.</a></p><p><strong>Regular Information products on the outbreak of BVD in </strong>Democratic Republic of the Congo<strong></strong></p><ul><li><strong>Daily update: </strong><a href="https://www.who.int/emergencies/alert-and-response">Epidemiological update on BVD outbreak in Democratic Republic of the Congo and Uganda</a></li><li><strong>Published every Tuesday:</strong> <a href="https://www.afro.who.int/health-topics/ebola-disease/outbreak-drc-26">Weekly External Situation
    Report on Ebola Bundibugyo Virus Disease Outbreak, Democratic Republic of the Congo | Uganda</a></li><li><strong>Published every Thursday:</strong><a href="https://www.who.int/emergencies/disease-outbreak-news"><strong></strong>Disease Outbreak News | All Hazards Public Health Events, Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo</a><strong></strong><br /></li></ul>'
  Assessment: <p>On 6 June 2026, WHO reassessed the risk of the outbreak of BVD to incorporate newly available information and the WHO Temporary Recommendations. The risk for countries sharing land borders with countries with documented Bundibugyo virus (BVDV) detection, as of this report Democratic Republic of the Congo and Uganda, has been separated out from the risk for other countries in the African Region.</p><p>The risk in the Democratic Republic of the Congo remains assessed as very high due to ongoing transmission and the continued expansion of the outbreak into new health zones, increasing the potential for further national and regional spread.</p><p>The risk in Uganda is still assessed as high due to confirmed cross-border spread through imported cases and ongoing epidemiological links along the eastern Democratic Republic of the Congo&ndash;western Uganda corridor, historically affected by Ebola outbreaks, including Bundibugyo and Sudan virus disease outbreaks. </p><p>The risk
    for countries with land borders adjoining countries with documented BDBV detection, is assessed as high due to sustained population mobility linked to cross-border trade and mining activities, variation in capacities and experience of BVD response and variable levels of readiness. </p><p>The risk for the rest of the Africa region and at the global level is assessed as low.</p>
  Overview: '<p>Since the last <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON605">Disease Outbreak News</a>&nbsp;was published on 29 May 2026, the number of confirmed cases and deaths have increased rapidly in the Democratic Republic of the Congo and Uganda. In total, 534 confirmed cases including 93 deaths (case fatality rate [CFR] 17.4%) have been reported from both countries, while at least 17 people have recovered from the disease. </p><p><strong>Figure 1. Distribution of confirmed cases of Bundibugyo virus disease in the Democratic Republic of the Congo and Uganda, as of 6 June 2026&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/geographical-distribution.jpg?sfvrsn=41aad5ac_3" height="621" style="max-width:100%;height:auto;" title="Geographical distribution of confirmed cases" width="933" alt="Geographical distribution of confirmed cases" sf-size="120993" /></p><p><strong>Democratic
    Republic of the Congo </strong></p><p>Since 29 May, an additional 390 confirmed cases including 74 confirmed deaths have been reported from the Democratic Republic of the Congo. The increase is in part due to the scale up of testing and diagnostic capacities, enabling testing of the backlog of previously collected samples. As of 6 June 2026, a total of 515 confirmed cases including 91 deaths (CFR 17.7%) have been reported from the Democratic Republic of Congo. The reported CFR is likely an underestimation as many deaths that occurred before the outbreak declaration remain under investigation. So far, 12 patients have recovered. Cases have been reported from 25 health zones (HZ) from Ituri (17/36 HZ), North Kivu (7/35 HZ) and South Kivu Provinces (1/34 HZ)[1]. Sixteen confirmed cases have been reported among health and care workers to date. </p><p>The outbreak remains concentrated in Ituri Province, which accounts for 94% (487) of confirmed cases. The CFR in Ituri is 15% (74/487); significantly
    lower than the CFR in North Kivu which is 64% (16/25). The highest confirmed case numbers in Ituri Province are reported from Bunia (142 cases), Rwampara (98 cases), Mongbwalu (92 cases), and Nyankunde (24 cases) HZ. </p>As of 6 June, 5040 contacts had been identified and were under follow-up across Ituri (4118), North Kivu (699), and South Kivu (223) provinces. Of these, 2535 contacts were followed up in the last 24&nbsp;hours, corresponding to follow-up rates of 43.2% in Ituri, 82.5% in North Kivu, and 80.3% in South Kivu.<p>Increasing security-related incidents affecting health facilities have posed additional operational challenges in affected provinces. These conditions are constraining access for the response, disrupting surveillance and response activities, and increasing the risk of undetected transmission. Such incidents underline the challenges of the context and the importance of working closely with local leaders and communities.&nbsp;</p><div id="ftn1"><p><strong>Figure
    2: Number of confirmed cases (n = 515), including deaths, &nbsp;in the Democratic Republic of the Congo, by date of reporting and as of 6 June 2026</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/number-of-confirmed-cases-and-deaths-in-drc10c33307-6ce7-461d-a3ae-f2b6dcfc9d14.jpg?sfvrsn=99c7d188_3" height="582" style="max-width:100%;height:auto;" title="Number of confirmed cases and deaths in DRC" width="1044" alt="Number of confirmed cases and deaths in DRC" sf-size="67962" /></p><p><em>NB: Newly reported confirmed cases/deaths may be part of the back log of samples and therefore not necessarily newly acquired infections.&nbsp;</em></p><p><strong>Uganda</strong></p><p>Since the last update dated 29 May, an additional 10 confirmed cases and one death have been reported from Uganda. As of 6 June 2026, a total of 19 confirmed cases including two deaths in imported cases, and one probable case who has died,
    have been reported. Five recoveries have been reported. Of the total cases, 14 cases are imported and five are Ugandans. The cases were reported from two districts Kampala and Wakiso. To date, all cases in Uganda can be linked to travelers from the Democratic Republic of the Congo, or secondary infections linked to them; there has been no documented community transmission in Uganda. Exposure risks are associated with healthcare settings and cross-border movements.</p><p>About 70% of the cases are Congolese nationals who came to Uganda to seek medical care. This includes a Congolese national who travelled from the Democratic Republic of the Congo, via Uganda, to the United Arab Emirates and then back to Uganda. WHO is working with public health authorities in the United Arab Emirates and Uganda to gather additional information to assess the risk of exposure and facilitate contact tracing through the National International Health Regulations (IHR) Focal Point mechanism. Based on the information
    available to date, there is no evidence that the case exhibited clearly recognized symptoms consistent with BVD during travel to or from the United Arab Emirates. Following notification of the case, UAE authorities rapidly implemented risk assessment, contact tracing activities, follow-up of identified contacts, public health investigations, enhanced preparedness measures at points of entry, and coordination with relevant national and international partners. Epidemiological investigations to date have not identified any secondary cases, local transmission, or evidence of onward spread in the UAE. The findings support the conclusion that the risk of the transmission associated with this event in the United Arab Emirates is low. </p><p>As of 2 June, a total of 668 contacts linked to the cases have been identified and are under follow-up. These include close residential contacts and hospital contacts where the cases were hospitalized.&nbsp;</p><p><strong>Figure 3: Number of confirmed cases
    (n = 19), including deaths, in Uganda by date of reporting and as of 6 June 2026&nbsp;</strong> <img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/number-of-confirmed-cases-and-deaths-in-ugandaba30bf0a-07c0-4069-854e-42597cd8749b.jpg?sfvrsn=c562d063_3" height="543" style="max-width:100%;height:auto;" title="Number of confirmed cases and deaths in Uganda" width="965" alt="Number of confirmed cases and deaths in Uganda" sf-size="51810" /><br /></p></div>'
