  Response: '<p>Health authorities in the Democratic Republic of the Congo and Uganda, in collaboration with WHO and partners, are implementing comprehensive public health measures including implementing the continental response plan, engaging donors and mobilizing additional resources to address critical funding gaps and sustain response operations across affected and at-risk areas.</p><p>Key response activities also include interagency coordination and deployment of field teams, delivery of medical supplies, strengthening surveillance, increasing laboratory capacity, infection prevention and control, the set-up of safe and optimized treatment centers, risk communication and community engagement, and research on potential medical countermeasures.</p><p>For further information about public health response actions by the respective Ministry of Health, WHO, and partners, please refer to the latest situation reports published by the WHO Regional Office for Africa: &nbsp;<a href="https://www.afro.who.int/health-topics/ebola-disease/outbreak-drc-26">Ebola
    Bundibugyo Virus Disease Outbreak Democratic Republic of the Congo | Uganda Weekly External Situation Report 03, Data as of 31 May 2026 | WHO | Regional Office for Africa</a></p>'
