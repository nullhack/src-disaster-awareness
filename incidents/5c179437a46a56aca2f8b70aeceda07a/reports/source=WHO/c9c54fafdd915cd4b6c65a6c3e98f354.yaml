  Response: <p>Health authorities in the Democratic Republic of the Congo and Uganda, in collaboration with WHO and partners, are implementing comprehensive public health measures including implementing the continental response plan, engaging donors and mobilizing additional resources to address critical funding gaps and sustain response operations across affected and at-risk areas.</p><p>In the Democratic Republic of the Congo, a subnational risk-stratification analysis has been conducted to further inform the operational response priorities. According to the latest analysis dated 8 June, 159 health zones are categorized as affected or at risk. This underscores the massive geographic scale of response needed to control this outbreak</p><p>For further information about public health response actions by the respective Ministry of Health, WHO, and partners, please refer to the latest situation reports published by the WHO Regional Office for Africa<span style="text-decoration:underline;">&nbsp;</span><a
    href="https://iris.who.int/server/api/core/bitstreams/a296c3f1-0338-4a05-9ee8-6cf93ad7c292/content" target="_blank">Ebola Bundibugyo Virus Disease Outbreak Democratic Republic of the Congo | Uganda Weekly External Situation Report 04, Data as of 7 June 2026 | WHO | Regional Office for Africa</a>&nbsp;</p><p>Following the recommendations of WHO advisory groups on candidate therapeutics to be considered for a clinical trial, WHO, Africa CDC and other partners are supporting the Democratic Republic of the Congo and Uganda in implementing the clinical trial. This include using MBP134 and REGN3479 for treatment, and using obeldesivir for post-exposure prophylaxis, ensuring the highest ethical standards under the leadership of the national health authorities and in close consultation with affected communities.</p><p>The protocol for the trial has been submitted and is under review by ethics committees and regulatory authorities of the countries. More coordination, and research and development
    funding, are needed to ensure timely access to candidate therapeutics.</p>
