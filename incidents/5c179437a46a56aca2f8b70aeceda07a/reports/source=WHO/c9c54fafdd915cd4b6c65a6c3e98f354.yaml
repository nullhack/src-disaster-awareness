  Title: Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo & Uganda
  Epidemiology: <p>Bundibugyo virus disease (BVD) is a severe and often fatal form of Ebola disease caused by the Bundibugyo virus, one of the <em>Orthoebolavirus </em>species. It is a zoonotic disease, with fruit bats suspected to be the natural reservoir. Human infection is thought to occur through close contact with the blood or secretions of infected wildlife, such as bats or non-human primates, and it subsequently spreads from person to person through direct contact with the blood, secretions, organs, or other bodily fluids of infected individuals or contaminated surfaces or items. Transmission is particularly amplified in health-care settings when infection prevention and control (IPC) measures are inadequate, and during unsafe burial practices involving direct contact with the deceased.</p><p>The incubation period for BVD ranges from two to 21 days, and individuals are not infectious until symptom onset. Early symptoms such as fever, fatigue, muscle pain, headache, and sore throat,
    are non-specific, which complicates clinical diagnosis and can delay detection. These symptoms then progress to gastrointestinal symptoms, organ dysfunction, and in some cases haemorrhagic manifestations. Case fatality rates in the past two BVD outbreaks, reported in Uganda and in the Democratic Republic of the Congo in 2007 and 2012 were 30% and 50% respectively.</p><p>Differentiating BVD from other endemic febrile illnesses such as malaria is challenging without laboratory confirmation using PCR or antigen/antibody-based assays. Control relies on rapid case identification, isolation and care, contact tracing, safe burials, and strong community engagement, as no approved vaccines or specific treatments currently exist for BVD.</p>
  Advice: '<p>WHO advises against any restriction of travel to, or trade with, the Democratic Republic of the Congo or Uganda based on the currently available information. WHO continues to closely monitor and, where necessary, verify travel and trade measures in relation to this event.</p><p>For further information on the considerations for implementing border health and international travel-related temporary recommendations, please see the relevant <a href="https://iris.who.int/items/b07def43-df30-41b8-83e0-deb33bcfd697">technical note issued on 26 May 2026</a>.</p><p>The <a href="https://www.who.int/news/item/22-05-2026-first-meeting-of-the-ihr-emergency-committee-regarding-the-epidemic-of-ebola-bundibugyo-virus-disease-in-the-democratic-republic-of-the-congo-and-uganda-2026-temporary-recommendations">temporary recommendations</a> issued to State Parties on 22 May 2026 underscore the importance of coordinated outbreak control, enhanced cross‑border collaboration, and sustained surveillance
    and preparedness to prevent further regional spread and ensure an effective public health response. </p><p>WHO has convened several technical advisory groups, including the Strategic Advisory Group of Experts on Immunization (SAGE) to assess candidate vaccines and therapeutics for BVD. Key recommendations made are available in the <a href="https://www.who.int/news/item/28-05-2026-experts-convened-by-who-advise-on-candidate-treatments-and-vaccines-for-ebola-disease-caused-by-bundibugyo-virus">news release published on 28 May 2026.</a> </p><p><strong>Regular Information products on the outbreak of BVD in the Democratic Republic of the Congo and Uganda</strong></p><ul><li><strong>Daily update: </strong><a href="https://www.who.int/emergencies/alert-and-response">Epidemiological update on BVD outbreak in Democratic Republic of the Congo and Uganda</a></li><li><strong>Published every Tuesday:</strong> <a href="https://www.afro.who.int/health-topics/ebola-disease/outbreak-drc-26">Weekly External
    Situation Report on Ebola Bundibugyo Virus Disease Outbreak, Democratic Republic of the Congo | Uganda</a></li><li><strong>Published every Thursday:</strong><a href="https://www.who.int/emergencies/disease-outbreak-news"><strong></strong>Disease Outbreak News | All Hazards Public Health Events, Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo</a><strong></strong><br /></li></ul>'
  Assessment: <p>On 6 June 2026, WHO reassessed the risk of the outbreak of BVD to incorporate newly available information and align with the WHO Temporary Recommendations. The risk for countries sharing land borders with countries with documented Bundibugyo virus (BVDV) detection, currently the Democratic Republic of the Congo and Uganda, has been separated out from the risk for other countries in the African Region.</p><p>The risk in the Democratic Republic of the Congo remains assessed as very high due to ongoing transmission and the continued expansion of the outbreak into new health zones, increasing the potential for further national and regional spread.</p><p>The risk in Uganda is still assessed as high due to confirmed cross-border spread through imported cases and ongoing epidemiological links along the eastern Democratic Republic of the Congo&ndash;western Uganda corridor, historically affected by Ebola outbreaks, including Bundibugyo and Sudan virus disease outbreaks. </p><p>The
    risk for countries with land borders adjoining countries with documented BDBV detection, is assessed as high due to sustained population mobility linked to cross-border trade and mining activities, variation in capacities and experience of BVD response, and variable levels of readiness. </p><p>The risk for the rest of the Africa region and at the global level is assessed as low.</p><p>For further information, please see the <a href="https://www.who.int/publications/m/item/who-rapid-risk-assessment-ebola-disease-caused-by-bundibugyo-virus--democratic-republic-of-the-congo--uganda-and-countries-with-land-borders-adjoining-countries-with-documented-bdbv-detection-v3">WHO Rapid Risk Assessment &ndash; Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo, Uganda and countries with land borders adjoining countries with documented BDBV detection v3</a>.<br /></p>
  Overview: '<p>Since the last <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON606">Disease Outbreak News</a> was published on 8 June 2026, the number of confirmed cases and deaths have increased rapidly in the Democratic Republic of the Congo. In total, 695 confirmed cases; 676 from the Democratic Republic of the Congo and 19 from Uganda; and 138 deaths including &nbsp;two from Uganda, have been reported from both countries, while at least 37 people have recovered from the disease.&nbsp;</p><p><strong>Figure 1. Distribution of confirmed cases of Bundibugyo virus disease in the Democratic Republic of the Congo, as of 10 June; and Uganda, as of 11 June</strong> <img src="https://cdn-auth-cms.who.int/media-aut/images/default-source/products/disease-outbreak-news/distribution-of-suspected-and-confirmed-cases1977962894.jpg?sfvrsn=cc4a8c03_3" sf-image-responsive="true" sf-size="122675" width="935" height="622" alt="Distribution of suspected and confirmed cases" title="Distribution
    of suspected and confirmed cases" style="max-width:100%;height:auto;" /></p><p><strong>Democratic Republic of the Congo </strong></p><p>Since 8 June, an additional 161 confirmed cases, including 45 confirmed deaths, have been reported from the Democratic Republic of the Congo. The increase is in part due to the scale up of testing and diagnostic capacities, enabling testing of the backlog of previously collected samples. As of 10 June 2026, a total of 676 confirmed cases including 136 deaths (CFR 20.1%) have been reported from the Democratic Republic of Congo. The reported CFR is likely an underestimation, as many deaths that occurred before the outbreak declaration remain under investigation. So far, 32 patients have recovered. Cases have been reported from 29 health zones (HZ) from Ituri (19/36 HZ), North Kivu (9/35 HZ) and South Kivu provinces (1/34 HZ) [1]. Sixteen confirmed cases have been reported among health and care workers to date. </p><p>The outbreak remains concentrated in
    Ituri Province, which accounts for 93% (629) of the confirmed cases with a CFR of 17.3% (109/629). The highest number of confirmed cases in Ituri Province are reported from Bunia (185 cases), Rwampara (137 cases), Mongbwalu (132 cases), and Nyankunde (33 cases) health zones. While the epicentre remains Ituri, there has been significant geographic expansion of health zones with confirmed cases since 8 June, with confirmed cases in additional four health zone as of 10 June. Of the total confirmed cases, 94 are awaiting distribution by HZ. </p><p>As of 10 June, 5768 contacts have been identified and are under follow-up across Ituri (4703), North Kivu (841), and South Kivu (224) provinces. Of these, 4141 contacts have been followed up, corresponding to follow-up rates of 71.4% in Ituri, 71% in North Kivu, and 83.5% in South Kivu.</p><div><div id="ftn1"><p>The outbreak is unfolding in a complex humanitarian and conflict-affected environment, characterized by highly mobile and often displaced
    populations. These dynamics, combined with increasing security-related incidents affecting health facilities, have posed additional operational challenges in affected provinces, such as constrained access for response teams, disrupted surveillance and response activities, and heightened risk of undetected transmission. These conditions underscore the need for response efforts to be led by local leaders and anchored in communities.&nbsp;</p><p><strong>Figure 2: Number of confirmed cases (n = 676)&nbsp;</strong><strong>in the Democratic Republic of the Congo, by date of reporting as of 10 June 2026</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/confirmded-cases-and-deaths-in-drccdd4a714-2c27-4788-b06c-866977fe8a91.jpg?sfvrsn=2175c780_3" height="568" style="max-width:100%;height:auto;" title="Confirmed cases and deaths in DRC" width="1046" alt="Confirmed cases and deaths in DRC" sf-size="72852" /></p><p><em>NB:
    Newly reported confirmed cases/deaths may be part of the back log of samples and therefore not necessarily newly acquired infections.&nbsp;</em></p><p><strong>Uganda</strong></p><p>Since the last update dated 8 June, no additional confirmed cases or death have been reported from Uganda. As of 10 June 2026, a cumulative of 19 confirmed cases including two deaths in imported cases, and one probable case who has died, have been reported. Of the confirmed cases, 14 cases are imported and five are secondary transmission among contacts and health workers following cases imported from the Democratic Republic of the Congo. The cases have been reported from two districts, Kampala and Wakiso, both part of the Kampala Metropolitan Area. To date, there has been no documented community transmission in Uganda. Exposure risks are associated with healthcare settings and cross-border movements. Five recoveries have been reported to date.</p><p>Of the 820 contacts listed as of 11 June, a total of 409
    contacts are under active follow up and 394 contacts have completed their 21-day follow-up period.&nbsp;</p><p><strong>Figure 3: Number of confirmed cases (n = 19)&nbsp;</strong><strong>in Uganda by date of reporting&nbsp;</strong><strong>as of 11 June 2026&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/confirmed-cases-and-deaths-in-ugandace3ade2d-6c61-413b-87fb-ad94df3b6207.jpg?sfvrsn=6d0d41b3_3" height="602" style="max-width:100%;height:auto;" title="Confirmed cases and deaths in Uganda" width="1042" alt="Confirmed cases and deaths in Uganda" sf-size="59999" /><br /></p></div></div>'
