    compatible with BVD, and the identification of their contacts, according to established protocols. This entails the availability of trained personnel, referral mechanisms, application of IPC measures. </li><li>Coordinate with conveyance operators to facilitate timely communication, prior to arrival and to relevant authorities, of any suspected BVD cases on board conveyances, and to identify contacts associated with conveyances on an international voyage. The identification of such contacts entails, where applicable, the communication of personal details to the States Parties known as final destination of those contacts. </li><li>At the time these temporary recommendations are issued, neither the suspension of flights or waterways routes with States Parties with documented BDBV detection, nor denial of entry to travellers and conveyances arriving from those States Parties, are recommended. </li><li>Report to WHO, through the relevant WHO IHR Contact Point, the implementation of any international
