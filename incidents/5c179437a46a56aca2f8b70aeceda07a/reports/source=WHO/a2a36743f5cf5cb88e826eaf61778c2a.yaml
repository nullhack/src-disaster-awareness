  Summary: "On 15 May 2026, the Ministry of Public Health, Hygiene and Social Welfare, Democratic Republic of the Congo (DRC), and the Ministry of Health of Uganda declared an outbreak of Ebola Disease following the confirmation of Bundibugyo virus disease (BVD) in both countries.\r\nOn 17 May 2026, the World Health Organization (WHO) Director-General determined that the Ebola disease caused by Bundibugyo virus in DRC and Uganda constitutes a public health emergency of international concern (PHEIC), as defined in the provisions of IHR.\r\nOn 19 May 2026, the Director-General of WHO convened the first meeting of the IHR Emergency Committee, and temporary recommendations were issued to State Parties.\r\nAs of 21 May, 746 suspected cases and 176 deaths among suspected cases were reported in DRC. So far 85 confirmed cases, including two in Uganda, and ten deaths, with one in Uganda, among confirmed cases were reported across both countries. In DRC, transmission is concentrated in Ituri, North\
    \ Kivu and South Kivu provinces, with challenges in contact follow-up, insecure conditions, and inadequate isolation and referral systems complicating response efforts. Uganda has reported two imported cases with no confirmed local transmission. An American national who was working in DRC has also been confirmed positive and transferred to Germany for care.\r\nNational authorities, in collaboration with WHO and partners, are implementing response measures including deployment of rapid response teams, delivery of medical supplies, strengthened surveillance, laboratory confirmation, infection prevention and control assessments, the set-up of safe and optimized treatment centers, and community engagement."
