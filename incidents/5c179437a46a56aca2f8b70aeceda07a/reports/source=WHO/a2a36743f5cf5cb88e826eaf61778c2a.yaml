  Advice: '<p>On 19 May 2026, the Director-General of WHO convened the first meeting of the IHR Emergency Committee who issued the following temporary recommendations on 22 May 2026 to State Parties: </p><p><strong>For countries with documented detection of Bundibugyo virus (the Democratic Republic of the Congo and Uganda)</strong></p><p><strong>Coordination and high-level engagement</strong></p><ul><li>Declare the Bundibugyo virus disease (BVD) epidemic a health emergency, at national or sub-national level, in accordance with domestic laws, and as appropriate.</li><li>Activate national disaster or health emergency management mechanisms and activate or establish an emergency operation centre, under the authority of the Head of State or relevant government authority, to coordinate response activities across Government sectors, administrative levels, and partners to ensure efficient and effective implementation and monitoring of comprehensive BVD control measures. These measures must include
    enhanced surveillance, including case identification; contact tracing; infection prevention and control (IPC), risk communication and community engagement; laboratory diagnostic testing, case management, and safe and dignified burials. Coordination and response mechanisms should be established at national level, as well as at subnational level in areas where BDBV has been detected and at-risk areas.</li><li>Establish and maintain up to date a register of signals consistent with BVD (&ldquo;alerts&rdquo;), including status of their investigation.</li><li>Establish and maintain up to date a line list of suspected cases &ndash; including identified through syndromic surveillance, probable cases, and confirmed BVD cases.</li><li>Establish and maintain up to date the list of contacts of all confirmed and probable BVD cases; monitor each contact for 21 days after the date of last known exposure; Both the evolution of the epidemic and resources available may require the risk-based prioritization
    of contacts requiring identification and monitoring.</li><li>Negotiate, as applicable, and establish security corridors, including cross-border, to allow responders to safely reach affected communities, as well as to allow communities to seek appropriate health care.</li><li>Notify WHO, through the relevant WHO IHR Contact Point in the WHO Regional Office, the detection of suspected, probable and confirmed BVD cases daily, as per WHO case definitions available here.</li></ul><p><strong>Risk communication and community engagement</strong></p><ul><li>Implement large-scale trust building and community engagement interventions - using all trusted available communication channels, and working closely with local religious and traditional leaders, and traditional healers -, so that communities are fully aware of the risk and benefits of control measures, and pro-actively contribute and support the early detection and early isolation of cases; the identification and monitoring of contacts; and
    safe and dignified burial practices</li><li>Strengthen community awareness, engagement and participation, to establish and strengthen trust, including by identifying and addressing cultural norms and beliefs that may serve as barriers to their full participation in the response; and by integrating interventions and community feedback, within the wider response, to address the needs of the population, particularly in contexts of the protracted humanitarian crisis in the Eastern provinces of the Democratic Republic of the Congo.</li><li>Train community leaders on the rationale underpinning public health measures, including the isolation of cases, monitoring of contacts, and safe burials in a dignified, non-stigmatizing, and non-punitive manner.</li><li>Activate local networks, including community health workers, Red Cross volunteers, and other trusted community actors to promote protective behaviours; facilitate early detection and referral of suspected BVD cases; support contact tracing
    activities; and collect and relay community feedback to enhance the acceptance of public health measures.</li><li>Enable adherence to movement restrictions, associated with the application of control measures, by providing food, water, communication, financial and psychosocial support.</li></ul><p><strong>Surveillance and laboratory</strong></p><ul><li>Strengthen surveillance and laboratory capacity, decentralized across first sub-national administrative levels (e.g., provinces) with documented BDBV detection, as well as in their neighbouring first sub-national administrative levels, through:</li><li>Dedicated surveillance and response teams within each health zone and and in neighbouring health zones determined to be at high-risk for the introduction of BVD;</li><li>Active case finding and enhanced community surveillance for clusters of unexplained illness or deaths;</li><li>The investigation of &ldquo;alerts&rdquo; within 24 hours from detection;</li><li>The scale-up and strengthen
    RT-PCR laboratory capacities for timely testing for BDBV, including the establishment of protocols for safe sample collection, sample referral pathways, biosafety training for laboratory workers;</li><li>The decentralization of the laboratory capacities should be considered to allow for quick turn-around time and support patient care, as well as any clinical trials that may take place. Field laboratories should be set-up in accordance with biosecurity and biosafety standards. A near point of care assay might be considered provided that its performance is validated against current RT-PCR standards.</li><li>NB: The GeneXpert platform cannot detect Bundibugyo virus (BDBV).</li><li>Identify and monitor, for 21 days after the date of last known exposure, the health of contacts of suspected probable, and confirmed BVD cases. The health status of contacts being monitored should be assessed and recorded daily. Any contact developing symptoms compatible with BVD should be assessed, isolated,
    tested and cared for.</li><li>Establish a mechanism to monitor the evolution of indicators related to the performance of contact tracing activities.</li></ul><p><strong>Infection prevention and control in health facilities and in the context of care</strong></p><ul><li>Strengthen measures to prevent nosocomial infections, including systematic mapping of health facilities, the establishment and dissemination of protocols for triage, targeted IPC interventions and sustained monitoring and supervision.</li><li>Provide continuous IPC training to health care workers, including the proper use of personal protective equipment (PPE).</li><li>Provide health facilities with sufficient supplies of appropriate PPE equipment to ensure the safety and protection of their staff, resources for timely payment of their salaries and, as appropriate, hazard pay.</li><li>Establish channels for health workers to report and be assessed following exposures, and have access to psychosocial support and, when possible
    post-exposure prophylaxis under compassionate use or clinical trial. All health worker occupational exposure must be investigated to allow for immediate corrective actions.</li><li>Consider building community IPC capacity by training community leaders, and emphasizing that hand hygiene not only contributes to bringing the BVD epidemic under control, but also reduces the risk of transmission of other communicable diseases present in the same areas. Hand hygiene shall be facilitated at critical spots, such as schools, churches, bars, markets, local gatherings sites, points of entry, etc.</li></ul><p><strong>Patient referral pathway and access to safe and optimized intensive care</strong></p><ul><li>Establish dedicated BVD isolation and treatment centers or units for suspected, probable, and confirmed cases, located within, or close to, areas with documented BDBV detection, with sufficient staff who are specifically trained and equipped to implement optimized intensive supportive care.</li><li>Establish
    protocols for transferring suspected BVD patients safely to dedicated health care facilities for their isolation, assessment and treatment in a humane and patient-centred approach. This includes trained ambulance teams, mechanisms to notify the receiving health care facility, the application of appropriate IPC precautions during transfer, and decontamination protocols for vehicles and equipment.</li><li>Establish protocols for the handling and disposal of medical waste, in accordance with biosafety principles.</li><li>Establish survivor follow-up programmes, including clinical care, counselling, semen testing and sexual health advice and condoms where appropriate, along with psychosocial support and stigma-reduction programmes.</li><li>Maintain the package of essential health services, including providing IPC equipment for them to operate safely. This includes, at minimum, malaria diagnosis and treatment, and maternal and child health services. </li></ul><p><strong>Safe and dignified
    burials</strong></p><ul><li>Establish protocols ensuring funerals and burials are conducted by well-trained personnel, with provision made for the presence of the family and cultural practices, and in accordance with relevant national laws and regulations. </li></ul><p><strong>Operations, supplies and logistics</strong></p><ul><li>Establish logistics support to maintain a robust supply pipeline for PPE, diagnostics, therapeutics, and other medical commodities, IPC materials, including for safe burial.</li></ul><p><strong>Border health, international travel and mass-gathering events</strong></p><ul><li>Enhance, through arrangements between countries sharing borders, surveillance at ground crossings and border areas.</li><li>Implement measures, in accordance with national laws and regulations, to prevent suspected, probable, and confirmed BVD cases, as well as their contacts from undertaking international travel, unless the travel is part of an appropriate medical evacuation.</li><li>Prevent
    the cross-border movement of the human remains of deceased suspected, probable or confirmed BVD cases, unless authorized through bilateral arrangements.</li><li>Implement exit screening at all points of entry - airports, ports and ground crossings -, consisting of, at a minimum, a questionnaire encompassing history of potential exposure to BVD, a temperature measurement and, in case of fever, an in depth assessment of the risk of BVD, by personnel trained and equipped with PPE. Any traveller determined to present with an illness consistent with BVD should not be allowed to travel unless the travel is part of an appropriate medical evacuation.</li><li>Report to WHO, through the relevant WHO IHR Contact Point in the WHO Regional Office, the implementation of any international traffic related measure adopted.</li><li>Consider postponing mass gatherings until BVD transmission is interrupted.</li></ul><p><strong>Research and development of medical countermeasures</strong></p><ul><li>Engage,
    when feasible, with research partners and international institutions to:</li><li>Define a robust laboratory strategy, urgently implement head-to-head comparison studies of PCR diagnostics to validate or invalidate the PCR platform (Radione &reg;) currently used in the field.</li><li>Implement ethically approved, scientifically robust clinical trials to advance the development and use of candidate therapeutics for treatment and post-exposure prophylaxis and for vaccines.</li><li>Establish, with a view to support research, expedited and efficient national regulatory and ethics reviews, community engagement, pharmacovigilance (where applicable), data sharing and equitable access arrangements.</li></ul><p><strong>For countries with land borders adjoining countries with documented Bundibugyo virus disease </strong></p><ul><li>Establish a national coordination mechanism articulated with subnational levels.</li><li>Enhance rapidly the status of readiness to respond to BVD cases, including establishing
    active surveillance across health facilities, with zero reporting; enhancing community-based surveillance for clusters of unexplained deaths; establishing access to laboratories qualified to test for BVD; raising the awareness of health workers regarding BVD; training health workers on IPC precautions; establishing rapid response teams for the investigation and management of BVD patients and their contacts; establishing a mechanism for the identification and monitoring of contacts. </li><li>Establish the capacity at national reference laboratory(ies) to timely and safely perform testing for BDBV along with relevant differential testing. Considerations may be given to shipment to an international reference laboratory for inter-laboratory comparison as part of external quality assurance implementation. </li><li>Conduct international contact tracing operations as necessary, including obtaining information from airlines and other conveyances operations; identifying contacts associated with
    conveyances on an international voyage, and communicate with States Parties known as final destination of those contacts. </li><li>Intensify risk communication and community engagement activities, in communities residing in border areas and at points of entry, including airports and ports with direct connection with States Parties with documented BDBV detection, and provide the general public with accurate and up to date information regarding the BVD epidemic and measures to reduce the risk of exposure. </li><li>Exercise arrangements in place to respond to BVD through simulation exercises relating to management of BVD &rdquo;alerts&rdquo;, including cross-border; sample referral; activation of rapid response teams and mechanisms. </li><li>Establish, with a view to support research, expedited and efficient national regulatory and ethics reviews, community engagement, pharmacovigilance (where applicable), data sharing and equitable access arrangements. </li><li>Border health and international
