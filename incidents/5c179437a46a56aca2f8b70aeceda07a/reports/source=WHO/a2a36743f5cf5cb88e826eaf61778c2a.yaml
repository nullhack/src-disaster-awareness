  Assessment: <p>On 17 May 2026, WHO Director-General, after having consulted the States Parties where the event is known to be currently occurring, determined that the Ebola disease caused by Bundibugyo virus in the Democratic Republic of the Congo and Uganda constitutes a public health emergency of international concern (PHEIC), as per the provisions of the IHR. </p><p>This is the 17<sup>th</sup> Ebola disease outbreak in the DRC since 1976. The last Ebola disease outbreak in the country was an outbreak and Ebola virus disease which was declared on 4 September 2025 with total of 64 cases (53 confirmed, 11 probable), including 45 deaths (CFR 70.3%), reported from six health areas in Bulape Health Zone, Kasai Province. The end of outbreak was declared on 1 December 2025. The last BVD outbreak was reported on 17 August 2012 by the DRC Ministry of Health in Province Orientale.&nbsp; A total of 59 cases, 38 confirmed and 21 probable cases, including 34 deaths were reported. The outbreak was
    declared over on 26 November 2012 by the MOH. In Uganda, the last outbreak reported was an outbreak of Sudan ebolavirus in 2025. The last BVD outbreak was recorded in the country in 2007. <br /></p><p>This outbreak is occurring in a complex epidemiological and humanitarian context. A critical four-week detection gap between the onset of symptoms of the presumed index case (25 April 2026) and the laboratory confirmation of the outbreak (14 May 2025) suggests a low clinical index of suspicion among healthcare providers. This is compounded by the presence of co-circulating arboviruses and influenza-like illnesses, masking the initial index of suspicion for Ebola disease and exacerbating community transmission. Furthermore, the infection and death of four healthcare workers within a four-day span at Mongbwalu General Referral Hospital underscores critical breaches in IPC protocols. A large number of community deaths has been reported potentially associated with unsafe burial practices. <br
    /></p><p>Ongoing conflict in Ituri province restricts the movement of surveillance teams, limits the deployment of Rapid Response Teams, and hinders the secure transport of laboratory samples. Contact tracing is challenging due to difficult access and highly mobile populations, increasing the risk of high-risk contacts being lost to follow up or never identified<br /></p><p>Ituri&rsquo;s role as a commercial and migratory hub increases the risk of regional exportation. The proximity to Uganda and South Sudan increases the risk of cross-border transmission if PoE screening and cross border coordination and information sharing are not immediately reinforced. On 15 May 2026, the Ministry of Health of Uganda reported an imported case of BVD.<br /></p><p>Humanitarian needs in the area are dire. Ituri has 273 403 displaced people, with a total of 1.9 million people in need according to the Humanitarian Response Plan 2026 for DRC. From January to March 2026, 32 600 newly displaced and 30 200
    returnees were recorded. The province recorded 5800 protection incidents and 11 incidents against humanitarian actors.</p><p>Unlike Ebola virus disease, there is no licensed vaccine or specific therapeutics against BDBV. Research and development activities are activated to coordinate efforts to advance potential candidate medical countermeasures. Response and outbreak control relies entirely on a range of interventions and public health measures that will need to be thoroughly implemented, including supportive care, early detection, adequate IPC, rigorous contact tracing, safe burials, and community engagement.</p><p>WHO assessed the risk of the outbreak of BVD to be very high at the national level in DRC, high at the regional level, and low at the global level. </p>
  Overview: '<p>On 15 May 2026, the Ministry of Public Health, Hygiene and Social Welfare of Democratic Republic of the Congo (DRC) officially declared the 17<sup>th</sup> Ebola disease outbreak following the laboratory confirmation of Bundibugyo virus disease (BVD) in eight samples. Concurrently, on 15 May 2026, the Ministry of Health of Uganda confirmed an outbreak of BVD following the identification of an imported case from DRC.</p><p>On 17 May 2026, the WHO Director-General, after having consulted the States Parties where the event is known to be currently occurring, determined that the Ebola disease caused by Bundibugyo virus in DRC and Uganda constitutes a public health emergency of international concern (PHEIC), as defined in the provisions of International Health Regulation (IHR)</p><p>Since the last <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON602">Disease Outbreak News</a> was published on 16 May 2026, the number of suspected and confirmed cases has
    increased rapidly in DRC, with geographical expansion into North Kivu and South Kivu. In total, 746 suspected cases, including 176 deaths among suspected cases have been reported from DRC as of 21 May 2026; and 85 confirmed cases (two in Uganda), including ten deaths (one in Uganda) (CFR 12%) have been reported from both countries.</p><p><strong>Figure 1. Distribution of suspected and confirmed cases of Bundibugyo virus disease in Democratic Republic of Congo and Uganda, as of 21 May 2026</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/map1.jpg?sfvrsn=a47ecee3_3" height="958" style="max-width:100%;height:auto;" title="Figure 1. Distribution of suspected and confirmed cases of Bundibugyo virus disease in Democratic Republic of Congo and Uganda, as of 21 May 2026" width="1430" alt="" sf-size="201026" /></p><p><strong>Democratic Republic of the Congo </strong></p><p>As of 21 May 2026, a total of 83 confirmed
    cases including nine deaths (CFR 11%); and 746 suspected cases including 176 deaths have been reported from 15 health zones (HZ) in Ituri, North Kivu and South Kivu Provinces, DRC. Four health worker deaths have been reported to date. Epidemiological and laboratory investigations are ongoing to reclassify all suspected cases and deaths reported in DRC.</p><p>The most affected HZ are Mongbwalu, Rwampara and Bunia, which all account for 96% of suspected cases and 79% of confirmed cases. &nbsp;</p><p>As of 21 May, 1603 contacts have been listed in Ituri province and one contact became a suspected case. However, follow-up remains weak due to insecurity and movement restrictions. The follow-up rate as of 21 May is 21%. On 21 May, 84 new alerts were reported, and 77 alerts were investigated, all of which were validated. </p><p>An American national, who was working in DRC as a surgeon, has also been identified as a confirmed case. Exposure is thought to have occurred during a medical procedure
    on 11 May. Onset of symptoms was reported on 16 May and laboratory confirmation was received on 20 May. The case is currently at a High-Level isolation unit in Berlin, Germany undergoing treatment.<br /></p><p><strong>Figure 2 Risk mapping of Health Zones in DRC as of 21 May 2026</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/map2.jpg?sfvrsn=ac399fe9_3" height="966" style="max-width:100%;height:auto;" title="Figure 2 Risk mapping of Health Zones in DRC as of 21 May 2026" width="1423" alt="" sf-size="212544" /></p><p>Response efforts continue to face a number of challenges, including: </p><ul><li>absence of standardized isolation and treatment facilities and weak screening and referral pathways;</li><li>inconsistent implementation of safe and dignified burial measures further underscores the significant risk of healthcare-associated transmission;</li><li>cross-border transmission risks remain elevated
    due to insecurity, humanitarian crises, high population mobility, urban/semi-urban transmission hotspots, and porous borders, requiring intensified surveillance and information sharing;</li><li>deeply challenging situation for affected communities, with growing concerns over access to free and supportive healthcare services, the ability to ensure respectful and dignified burials, and the spread of misinformation and rumour;</li><li>ongoing conflict in Ituri province restricting the movement of surveillance teams, the deployment of Rapid Response Teams, and the transporting of laboratory samples.</li></ul><p>It is currently thought that the event originated in the Mongbwalu HZ, DRC, a high-traffic mining area, with cases subsequently migrating to Rwampara and Bunia to seek medical care. Ituri province borders South Sudan and Uganda with Bunia HZ being less than 40km from Uganda. A full epidemiological investigation and trace back exercise is ongoing.</p><p>Ituri&rsquo;s role as a commercial
    and migratory hub and proximity to Uganda and South Sudan increases the risk of regional exportation and cross-border transmission.</p><p><strong>Uganda</strong></p><p>As of 20 May 2026, a total of two confirmed cases including one death have been reported in Kampala, Uganda. Both cases were imported from the DRC. The first case was admitted to a private hospital on 11 May and died on 14 May. The transfer of the body to DRC was completed the same day. The second case was confirmed on 16 May in Kampala, in an individual returning from DRC with no apparent links to the first case. The case is currently admitted in Uganda at the Mulago Isolation Treatment Unit. At the time of reporting, no local transmission has been identified in Uganda.</p><p>As of 18 May, a total of 127 contacts, linked to both confirmed imported cases, have been identified and under follow-up. These include close household contacts and hospital contacts where the cases were hospitalized. </p><p>Exposure risks are associated
    with healthcare settings and cross-border movements. Eighteen alerts were reported on 18 May and investigated. Four active cross-border exposure clusters identified in Ntoroko District are under investigation.&nbsp;</p>'
