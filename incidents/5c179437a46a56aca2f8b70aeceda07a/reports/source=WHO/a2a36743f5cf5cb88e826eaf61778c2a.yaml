  Response: '<p>Health authorities in <strong>DRC</strong>, in collaboration with WHO and partners are implementing public health measures, including but not limited to the following: <br /></p><p><strong>Coordination</strong></p><ul><li>The Incident Management System has been activated to coordinate response to the outbreak, with technical support from WHO and health partners</li><li>Subnational coordination structures are being activated at the provincial and health zones level to coordinate operational activities. Daily provincial coordination meetings involving all response pillars and operational partners are ongoing.</li><li>Rapid response teams from MoH and WHO have been deployed to Bunia, Mongbwalu, and Rwampara HZ.<br /></li></ul><p><strong>Surveillance </strong></p><ul><li>Surveillance for suspected and probable cases is ongoing (including at relevant Points of Entry and borders).</li><li>Alert management and case investigations are being scaled up. Investigation teams have been
    deployed to Bunia and Rwampara, with alerts under investigation in Ituri, North Kivu, South Kivu, and Tshopo provinces.</li><li>Contact tracing has been initiated with 541 contacts identified, although major operational challenges persist due to insecurity.</li><li>Data managers have been trained on the DHIS2 tracker, and a surveillance and digital health coordination meeting is being implemented to improve harmonization across digital platforms.</li><li>The International Organization for Migration (IOM) is supporting points-of-entry (PoEs) surveillance; however, informal crossings and weak alert management at PoEs remain significant gaps.<br /></li></ul><p><strong>Case Management</strong></p><ul><li>WHO and partners are supporting the ongoing establishment and operationalization of isolation and treatment facilities in affected areas</li><li>WHO and partners are working to maintain access to essential health and other services.</li></ul><p><strong>Laboratory</strong></p><ul><li>Laboratory
    surge capacity is being scaled-up. The Institut National de la Recherche Biom&eacute;dicale (INRB) teams are deploying to Bunia to establish and scale-up testing. A decentralization strategy is being developed to add additional field laboratories to Mongbwalu and Mahagi (Ituri &ndash; Uganda border). Goma laboratory is activated and provide testing capacities for North Kivu.</li><li>PCR kits have been sourced, while WHO Regional Emergency Hub in Dakar is deploying reagents, Piccolo machines, and cold-chain modules to strengthen field laboratory operations.</li><li>Genomic and epidemiological analyses are underway, and sequences have been uploaded through a joint publication (by DRC and Uganda) on virological.org.</li></ul><p><strong>Risk Communication and Community Engagement (RCCE)</strong></p><ul><li>Community mobilization has started in Mongbwalu, while social listening activities and deployment of UNICEF digital platforms (U-Report and I-Hear-You) are underway to improve community
    feedback and information sharing.</li><li>WHO is supporting engagement interventions with community and religious leaders</li><li>WHO shared a multi-country infodemic management report providing an initial analysis of community perceptions, including key questions, concerns, rumours, misinformation, and disinformation, to guide targeted risk communication and community engagement interventions.</li></ul><p>WHO and partners have developed a shared RCCE message repository to harmonize risk communication content</p><p><strong>Infection Prevention and Control (IPC)</strong></p><ul><li><strong></strong><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Coordination mechanism for IPC response is being established under the leadership of the Division of Provincial Health&nbsp; and the Public Health Emergency Operations Centre.</span></li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span><span
    style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Local human resources are being scaled-up to enable required key intervention.</span></li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">More than 150 health workers have been trained on basic IPC and Ebola-specific measures, with an ongoing cascade training plan targeting an additional 500 health workers.</span></li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span><span
    style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Operational teams are being established and briefed for decontamination, safe and dignified burials and health facility assessments.</span></li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">IPC supplies including PPE are being donated to priority health facilities.</span></li></ul><p><strong>Operational support and Logistics</strong></p><ul><li>Over 17 tons of emergency supplies were shipped to DRC, including personal protective equipment (PPE), Viral Haemorrhagic
    Fever supplies, tents, body bags, infection prevention and control materials, stretchers, medicines and other case management supplies.</li><li>Deployment of EpiShuttle patient isolation transport systems, vehicles, telecommunications equipment, laboratory consumables, portable point-of-care diagnostic machines, reagents, cold-chain modules, and Ebola polymerase chain reaction (PCR) testing kits to strengthen clinical transport, laboratory diagnostics, and field response operations are ongoing.</li><li>Coordination is underway to mobilize one helicopter, three ambulances, and two armored vehicles to support cargo and personnel movement. Human resource deployment structures are being finalized and United Nations Humanitarian Air Service (UNHAS) is supporting staff movement to Bunia.</li><li>Global Logistics Cluster partners briefed on situation and work is under way for planning WFP/Logistics Cluster support for common partner services.</li><li>Efforts are ongoing with partners to provide
    subsidized air cargo into the region, and into Bunia</li><li>A four-week forecast of critical PPE requirements across case management, infection, prevention and control, and burial operations has been finalized to support sustained response activities.</li><li>A high priority items list has been finalized to facilitate collective monitoring. Item-needs calculator being finalized for sharing.</li></ul><p><strong>Border Health, Travel and Mass Gatherings</strong></p><ul><li>WHO travel and border health guidance has been disseminated across countries and transport sectors, emphasizing that suspected, probable and confirmed cases and their contacts should avoid travel unless medically evacuated, and advising against travel or trade restrictions and border closures.</li><li>Affected and neighbouring countries are strengthening their preparedness to detect, investigate, refer, isolate and care for any suspected cases, including activation of health emergency plans, enhanced screening at airports,
    seaports, land crossings and major internal transit routes.<br /></li></ul><p>Health authorities in <strong>Uganda</strong>, in collaboration with WHO and partners, are implementing public health measures, including but not limited to the following: </p><p><strong>Coordination</strong></p><ul><li>The Incident Management System has been activated to coordinate response to the outbreak, with technical support from WHO and health partners</li><li>The National Public Health Emergency Operations Centre and regional Emergency Operations Centres (EOCs) were activated in Fort Portal, Arua, Yumbe, Kampala Capital City Authority, Kabale, and Hoima, with the national response plan and rapid risk assessment finalized.</li></ul><p><strong>Surveillance and Laboratory</strong><strong></strong></p><ul><li>Field teams are utilizing Go.Data for contact tracing, benefiting from experience in implementing the tool during previous mpox, cholera and Sudan virus disease outbreaks.</li><li>Screening is being
    strengthened at official and informal border crossings, major transit routes, and pilgrimage corridors. </li></ul><p><strong>Case Management</strong></p><ul><li>Isolation facilities in high-risk districts have been activated and the Uganda National Emergency Medical Team deployed to support clinical management.</li></ul><p><strong>Laboratory</strong></p><ul><li>Sequencing and sample transport systems are being strengthened</li><li>A mobile laboratory is being deployed to Kasese near the DRC border, with a virtual diagnostics coordination meeting supporting cross-country laboratory operations.</li></ul><p><strong>Risk Communication and Community Engagement (RCCE)</strong></p><ul><li>Risk communication systems have been activated with community messaging and public awareness campaigns ongoing through District Health Officer networks, with health workers receiving guidance on standard precautions and public health messaging.</li></ul><p><strong>Infection Prevention and Control (IPC)</strong></p><ul><li><span
    style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Advising health workers to remain vigilant and adhere strictly to infection prevention measures.</span></li></ul>'
