    areas with documented BDBV detection. These include, but are not limited to, disseminating the definition of BVD cases to public and private health care facilities, including travel clinics, and general practitioners; identifying laboratories to conduct testing for BDBV; identifying isolation facilities allowing for safe assessment and clinical care.</li><li>Provide non-governmental organizations and other entities deploying personnel internationally to respond to the BVD epidemic with information on risk, measures to minimize the risk of exposure, and advice for managing a potential exposure.</li><li>Prepare to facilitate the evacuation and repatriation of nationals (e.g., health workers) who have been exposed to BVD cases.</li><li>Provide the general public with accurate and up to date information regarding the BVD epidemic and measures to reduce the risk of exposure, including discouraging travel to areas with documented BDBV detection.</li><li>Border health and international travel<ul><li>Provide
