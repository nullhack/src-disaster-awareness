  Title: Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo & Uganda
  Epidemiology: <p>Bundibugyo virus disease (BVD) is a severe Ebola disease caused by the Bundibugyo virus, one of the <em>Orthoebolavirus </em>species. It is a zoonotic disease, with fruit bats suspected to be the natural reservoir. Human infection is thought to occur through close contact with the blood or secretions of infected wildlife, such as bats or non-human primates, and it subsequently spreads from person to person through direct contact with the blood, secretions, organs, or other bodily fluids of infected individuals or contaminated surfaces or items. Transmission is particularly amplified in health-care settings when infection prevention and control (IPC) measures are inadequate, and during unsafe burial practices involving direct contact with the deceased.</p><p>The incubation period for BVD ranges from two to 21 days, and individuals are not infectious until symptom onset. Early symptoms such as fever, fatigue, muscle pain, headache, and sore throat, are non-specific, which
    complicates clinical diagnosis and can delay detection. These symptoms then progress to gastrointestinal symptoms, organ dysfunction, and in some cases haemorrhagic manifestations. CFRs in the past two BVD outbreaks, reported in Uganda and in the Democratic Republic of the Congo in 2007 and 2012 were 30% and 50%, respectively.</p><p>Differentiating BVD from other endemic febrile illnesses such as malaria is challenging without laboratory confirmation using PCR or antigen/antibody-based assays. Outbreak control relies on rapid case identification, isolation and care, contact tracing, safe burials, and strong community engagement, as no approved vaccines or specific treatments currently exist for BVD.</p>
  Advice: '<p>WHO advises against any restriction of travel to, or trade with, the Democratic Republic of the Congo or Uganda based on the currently available information. WHO continues to closely monitor and, where necessary, verify travel and trade measures in relation to this event.</p><p>For further information on the considerations for implementing border health and international travel-related temporary recommendations, please see the relevant <a href="https://iris.who.int/items/b07def43-df30-41b8-83e0-deb33bcfd697">technical note issued on 26 May 2026</a>.</p><p>The <a href="https://www.who.int/news/item/22-05-2026-first-meeting-of-the-ihr-emergency-committee-regarding-the-epidemic-of-ebola-bundibugyo-virus-disease-in-the-democratic-republic-of-the-congo-and-uganda-2026-temporary-recommendations">Temporary Recommendations</a> issued to State Parties on 22 May 2026 underscore the importance of coordinated outbreak control, enhanced cross‑border collaboration, and sustained surveillance
    and preparedness to prevent further regional spread and ensure an effective public health response. </p><p>WHO has convened several technical advisory groups, including the Strategic Advisory Group of Experts on Immunization (SAGE) to assess candidate vaccines and therapeutics for BVD. Key recommendations made are available in the <a href="https://www.who.int/news/item/28-05-2026-experts-convened-by-who-advise-on-candidate-treatments-and-vaccines-for-ebola-disease-caused-by-bundibugyo-virus">news release published on 28 May 2026.</a> </p><p><strong>Regular Information products on the outbreak of BVD in the Democratic Republic of the Congo and Uganda</strong></p><ul><li><strong>Daily update: </strong><a href="https://www.who.int/emergencies/alert-and-response">Epidemiological update on BVD outbreak in Democratic Republic of the Congo and Uganda</a></li><li><strong>Published Weekly:</strong> <a href="https://www.afro.who.int/health-topics/ebola-disease/outbreak-drc-26">Weekly External
    Situation Report on Ebola Bundibugyo Virus Disease Outbreak, Democratic Republic of the Congo | Uganda</a></li><li><strong>Published Fortnightly:&nbsp;</strong><a href="https://www.who.int/emergencies/disease-outbreak-news"><strong></strong>Disease Outbreak News | All Hazards Public Health Events, Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo</a><strong></strong><br /></li></ul>'
  Assessment: <p>On 6 June 2026, WHO reassessed the risk of the outbreak of BVD to incorporate newly available information and align with the WHO <a href="https://www.who.int/news/item/22-05-2026-first-meeting-of-the-ihr-emergency-committee-regarding-the-epidemic-of-ebola-bundibugyo-virus-disease-in-the-democratic-republic-of-the-congo-and-uganda-2026-temporary-recommendations">Temporary Recommendations</a>. The risk for countries sharing land borders with countries with documented Bundibugyo virus (BVDV) detection, currently the Democratic Republic of the Congo and Uganda, has been separated out from the risk for other countries in the African Region.</p><p>The risk in the Democratic Republic of the Congo remains assessed as very high due to ongoing transmission and the continued expansion of the outbreak into new health zones, increasing the potential for further national and regional spread.</p><p>The risk in Uganda is assessed as high due to confirmed cross-border spread through imported
    cases and ongoing epidemiological links along the eastern Democratic Republic of the Congo&ndash;western Uganda corridor, historically affected by Ebola outbreaks, including Bundibugyo and Sudan virus disease outbreaks. </p><p>The risk for countries with land borders adjoining countries with documented BDBV detection is assessed as high due to sustained population mobility linked to cross-border trade and mining activities, variation in capacities and experience of BVD response, and variable levels of readiness. </p><p>The risk for the rest of the Africa region and at the global level is assessed as low.</p><p>For further information, please see the <a href="https://www.who.int/publications/m/item/who-rapid-risk-assessment-ebola-disease-caused-by-bundibugyo-virus--democratic-republic-of-the-congo--uganda-and-countries-with-land-borders-adjoining-countries-with-documented-bdbv-detection-v3">WHO Rapid Risk Assessment &ndash; Ebola disease caused by Bundibugyo virus, Democratic Republic
    of the Congo, Uganda and countries with land borders adjoining countries with documented BDBV detection v3</a>.</p>
  Overview: '<p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Since the last </span><a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON608" style="text-align:inherit;text-transform:inherit;word-spacing:normal;white-space:inherit;">Disease Outbreak News</a><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"> was published on 19 June 2026, the number of confirmed cases and deaths have increased rapidly in the Democratic Republic of the Congo. In total, 1481 confirmed cases; 1460 from the Democratic Republic of the Congo, 20 from Uganda and one from France (linked to DRC); and 454 deaths including two from Uganda, have been reported. &nbsp;At least 229 patients have recovered from the disease; 213 patients from the Democratic Republic of the Congo and 16 patients from Uganda.</span></p><p><strong>Figure
    1. Distribution of confirmed cases of Bundibugyo virus disease in the Democratic Republic of the Congo as of 1 July and Uganda as of 2 July</strong> <img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/geographic-distribution-of-confirmed-bvd-cases-in-drc-and-uganda.jpg?sfvrsn=c0e1f7c_3" height="611" style="max-width:100%;height:auto;" title="Geographic distribution of confirmed BVD cases in DRC and Uganda" width="907" alt="Geographic distribution of confirmed BVD cases in DRC and Uganda" sf-size="118224" /></p><p><strong>Democratic Republic of the Congo </strong></p><p>Since 19 June when the last Disease Outbreak News was published, an additional 564 confirmed cases, including 220 confirmed deaths, have been reported from the Democratic Republic of the Congo. The increase is in part due to the scale up of surveillance activities, testing and diagnostic capacities. </p><p>As of 1 July 2026, a total of 1460 confirmed cases
    including 452 deaths (crude case fatality ratio [CFR] 30.9%) have been reported from the Democratic Republic of Congo. So far, 213 patients have recovered. Cases have been reported from 36 health zones (HZ) from Ituri (24/36 HZ), North Kivu (11/35 HZ) and South Kivu provinces (1/34 HZ).[1] To date, 102 confirmed cases including 25 deaths have been reported among health and care workers.</p><p>Of the 36 affected health zones, the outbreak remains active in 21 health zones from where cases have been reported in the past 21 days. The remaining health zones have not reported any new cases during this period. In the past 21 days, 838 confirmed cases, including 314 confirmed deaths, have been reported. </p>Ituri Province remains the most affected, accounting for 91.3% (1333/1460) of all confirmed cases and 84% (380/452) of all reported deaths nationwide. Within the province, the highest number of confirmed cases have been reported from Bunia (416 cases), Rwampara (308 cases), Mongbwalu (270
    cases), Nyankunde (95 cases), and Nizi (65 cases) health zones. As of 1 July, the outbreak has&nbsp;<span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">spread to three additional health zones in the province. Following epidemiological investigations, three confirmed cases with travel history from Nia Nia health zone in Ituri province have been reported on 30 June in Wamba health zone in Haut Uele Province and Kisangani in Tshopo province. These cases have been reported under Nia Nia health zone. Response activities, including contact tracing and follow-up, are ongoing in both provinces. Of the total confirmed cases, 17 are yet to be assigned to a specific health zone.</span><p>As of 1 July, 10 821 contacts have been identified and are under follow-up across Ituri (8376), and North Kivu (2445). Of these, 8954 contacts have been followed up, corresponding to follow-up rates of 83.2% in Ituri, and
    81% in North Kivu. Previously listed contacts from South Kivu province have completed 21 days of follow up.&nbsp;&nbsp;In addition, 107 contacts of the case reported in France have been listed and are under follow up in Kinshasa.</p><p>The outbreak is unfolding in a complex humanitarian and conflict-affected environment, characterized by highly mobile and often displaced populations, often lacking access to basic services, including food, clean water, shelter, healthcare and protection which poses an increased risk of transmission to the populations living in overcrowded internally displaced camps. These dynamics, combined with increasing security-related incidents affecting health facilities, have posed additional operational challenges in affected provinces, such as constrained access for response teams, disrupted surveillance and response activities, and heightened risk of undetected transmission. These conditions underscore the need for response efforts to be led by local leaders
    and anchored in communities. </p><p><strong>Figure 2: Number of confirmed cases (n = 1460), in the Democratic Republic of the Congo, by date of reporting, as of 1 July 2026&nbsp;</strong> <img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/confirmed-cases-in-drc2b94d220-3349-44bc-a4d2-d7131b41f0c0.jpg?sfvrsn=ce3dc584_4" height="621" style="max-width:100%;height:auto;" title="Confirmed cases in DRC" width="1085" alt="Confirmed cases in DRC" sf-size="114496" /></p><p><strong>Figure 3: Number of deaths among confirmed cases (n = 452), in the Democratic Republic of the Congo, by date of reporting, as of 1 July 2026.</strong> <img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/deaths-in-drc.jpg?sfvrsn=b7b74e71_3" height="619" style="max-width:100%;height:auto;" title="Deaths in DRC" width="1084" alt="Deaths in DRC" sf-size="97157" /></p><p><em style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">NB:
    Newly reported confirmed cases/deaths may be part of the backlog of samples and therefore not necessarily newly acquired infections.&nbsp;</em></p><div><div id="ftn1"><p><strong>Uganda</strong></p><p>The last confirmed case was reported to be identified on 21 June 2026. &nbsp;As of 2 July 2026, a cumulative of 20 confirmed cases including two deaths in imported cases (reported on 15 May and 5 June), and one probable case who has died, have been reported. Of the confirmed cases, 15 are imported cases, while five are secondary cases among contacts and health workers with links to imported cases from the Democratic Republic of the Congo. The cases have been reported in two districts, Kampala and Wakiso, both part of the Kampala Metropolitan Area. To date, there has been no documented community transmission in Uganda. Exposure risks are associated with healthcare settings and cross-border movements. Following case reclassification, the number of affected healthcare workers was revised from
    five to four. In total, 16 recoveries have been reported to date.</p><p>Of the 831 contacts listed as of 28 June, 821 contacts have completed their 21-day follow-up period as of 2 July. </p><p><strong>Figure 4: Number of confirmed cases (n = 20), in Uganda by date of reporting, as of 2 July 2026&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/confirmed-cases-in-uganda7dfa7c9c-22bb-4166-97e5-1a96861acec3.jpg?sfvrsn=13e44a9e_3" height="620" style="max-width:100%;height:auto;" title="Confirmed cases in Uganda" width="1086" alt="Confirmed cases in Uganda" sf-size="81082" /><br /></p></div></div><p><strong>France: </strong></p><p>On 24 June 2026, French authorities notified WHO of a laboratory-confirmed case of Ebola disease caused by Bundibugyo virus in a middle-aged male medical doctor returning from the Democratic Republic of the Congo. The patient had been deployed for five weeks in Ituri Province,
    where he was involved in the care of patients with BVD. Upon arrival at Charles de Gaulle Airport on 23 June 2026, the patient self-reported symptoms to airport health authorities, prompting immediate isolation and referral to a designated high-containment healthcare facility. </p><p>At the time of reporting, the patient was clinically stable and had no fever, with no reported vomiting, diarrhoea, or haemorrhagic manifestations during travel. PCR testing detected Bundibugyo virus. Comprehensive contact tracing has been initiated in the Democratic Republic of the Congo and in France.<br /></p>'
