  Response: '<p>Health authorities are implementing public health measures, including but not limited to the following: </p><ul type="disc"><li data-list="1" data-level="1">A crisis      committee was activated at both the local and provincial levels. </li><li data-list="1" data-level="1">Risk communication and active surveillance activities are ongoing.</li><li data-list="1" data-level="1">All cases are      isolated, and Infection Prevention and Control (IPC) measures have been      implemented. </li><li data-list="1" data-level="1">Patients are      receiving intravenous medication.</li><li data-list="1" data-level="1">Contact isolation and tracing are continuing.</li><li data-list="1" data-level="1">Investigations are      ongoing.&nbsp; <br /></li></ul> <p>WHO is supporting the national authorities, including through:</p><ul type="disc"><li data-list="0" data-level="1">Risk assessment      and investigation.</li><li data-list="0" data-level="1">Providing operational, financial and technical
    support to the Ministry of Health to      ensure swift response.</li><li data-list="0" data-level="1">Provision of      essential supplies (Personal Protective Equipment (PPE), medical supplies      and infrastructures support) </li><li data-list="0" data-level="1">The approved      Ervebo vaccine is available with a stock of 2000 doses located in      Kinshasa expected to be shipped shortly to the affected area, to vaccinate      contacts of confirmed or suspected cases, &nbsp;frontline and health workers.</li></ul>'
