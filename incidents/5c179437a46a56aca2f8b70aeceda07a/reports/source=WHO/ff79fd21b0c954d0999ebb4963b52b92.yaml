  Advice: <p></p><p>Effective outbreak control relies on the application of a set of interventions, namely clinical management, IPC &amp; Water, sanitation and hygiene (WASH), surveillance and contact tracing, good laboratory service, safe and dignified burials, community engagement, and social mobilization. The Ebola virus can persist in some body fluids of people who have recovered from EVD. In a limited number of cases, secondary transmissions resulting from exposure to the body fluids of people who have recovered from EVD have been documented. Therefore, maintaining collaborative relationships with survivor associations while monitoring survivors is a priority to mitigate any potential risks.</p><p>Early diagnosis and initiation of optimized supportive clinical care can reduce mortality from EVD. In addition, monoclonal antibodies active against a 3-antibody combination of atoltivimab, maftivimab and odesivimab [Inmazeb&reg;] or a single antibody ansuvimab [Ebanga&reg;]. &nbsp;Ebola
    treatment centres should be designed and managed to ensure safe care is provided with appropriate biosecurity and infection prevention and control intervention, and allow optimized care, allowing direct visualization of patients in the red zone as much as possible. WHO and partners have worked to develop these innovative solutions.&nbsp; </p><p>There is a need to strengthen surveillance and other response activities, including at relevant points of entry and borders, to contain the possibility of exponential spread. Cases, contacts and individuals in affected areas who present signs and symptoms compatible with case definitions should be considered suspects and cared for and treated in designated treatment facilities with appropriate biosecurity, infection prevention and control and be offered testing in a timely fashion and advised not to travel. Collaboration with neighbouring countries should be enhanced to harmonize reporting mechanisms, conduct joint investigations, and share critical
    data in real time. Surrounding countries should enhance readiness activities to enable early case detection, isolation and treatment. Critical infection prevention and control measures should be implemented and/or strengthened in all health care facilities, per&nbsp;<a href="https://www.who.int/publications/i/item/WHO-WPE-CRS-HCR-2023.1">WHO's Infection prevention and control guideline for Ebola and Marburg disease</a>. &nbsp;&nbsp;Health workers caring for patients with confirmed or suspected Ebola should apply&nbsp;<a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2">transmission-based precautions</a>&nbsp;in addition to&nbsp;<a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1">standard precautions</a>, including appropriate use of PPE and hand hygiene according to the&nbsp;<a href="https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21">WHO
    5 moments</a>&nbsp;to avoid contact with patients&rsquo; blood and other body fluids, and with contaminated surfaces and objects. Waste generated in health-care facilities must be safely segregated, safely collected, transported, stored, treated and finally disposed. National guidelines should be followed on rules and regulations for safe waste disposal or&nbsp;<a href="https://iris.who.int/bitstream/handle/10665/85349/9789241548564_eng.pdf;sequence=1">WHO&rsquo;s guidelines on safe waste management</a><span style="text-decoration:underline;">.</span></p><p>Patient-care activities should be undertaken in a clean and hygienic environment that facilitates practices related to the prevention and control of health-care-associated infections, as outlined in&nbsp;<a href="https://www.who.int/publications/i/item/9789241547239">Essential environmental health standards in health care</a>. Safe water, adequate sanitation and hygiene infrastructure and services should be provided in healthcare
    facilities. For details on recommendations and improvement, follow the&nbsp;<a href="https://openwho.org/courses/wash-fit">WASH FIT implementation Package</a>.<br /></p><p>In accordance with the recommendations of the Strategic Advisory Group of Experts on immunization, the Ervebo vaccine is recommended during an EVD outbreak due to EBOV for ring vaccination, for contacts and potential contacts of confirmed/suspected EVD cases, as well as for frontline workers. A global stockpile has been established and is being coordinated by the International Coordination Group for vaccine procurement.</p><p>WHO advises against any restrictions on travel and/or trade to the Democratic Republic of the Congo based on available information for the current outbreak.</p>
  Assessment: <p>This is the 16<sup>th</sup> EVD outbreak in the DRC since 1976. The current outbreak occurs after almost three years without a confirmed EVD outbreak in the country. The last EVD outbreak in the country was declared on 15 August 2022 in Beni city, North Kivu province, with one single case reported who later died, and the MoH declared the end of the outbreak on 27 September 2022. In the Bulape district, the epicentre of the current outbreak, the last EVD outbreak was recorded in 2007.&nbsp;&nbsp;<br /></p> <p>This outbreak is occurring in a complex epidemiological and humanitarian context. The country is facing several outbreaks, including mpox, cholera, and measles. In addition, the country is experiencing a long-term economic and political crisis. The country's resources and capacity to effectively respond to the current outbreak are therefore limited.&nbsp;<br /></p> <p>The epicentre of this outbreak is in<strong> </strong>the proximity of the Tshikapa city, the capital
    city of the Kasai province, and the Angolan border (approximately 100 to 200 kilometres, depending on the nearest border crossing point). Although the affected district is a hard-to-reach rural area relatively far from the two main urban centres of Mbuji Mayi and Kananga, population movements between different parts of the province are frequent, especially between Bulape and Tshikapa. <br /></p> <p>In addition, epidemiological investigations are ongoing with transmission chains, and the source of the outbreak has not yet been identified; therefore, additional infected people cannot be ruled out. &nbsp;The date of symptom onset for the first case is not yet known, as well as the therapeutic itinerary prior to health facility consultation, which further increases the likelihood of an ongoing community transmission with further risk of spread to other health districts.<br /></p> <p>WHO assesses the overall public health risk posed by the current EVD outbreak as high at the national level,
    moderate at the regional level and low at the global level.&nbsp;</p>
  Overview: '<p>On 1 September 2025, WHO received an alert from the Ministry of Health of the Democratic Republic of the Congo (DRC) regarding suspected cases of EVD in the Bulape Health Zone, Kasai Province, DRC. The first known suspected index case was admitted to the Bulape General Reference Hospital on 20 August 2025. The patient was a pregnant woman at 34-weeks of gestation who presented with symptoms of fever, bloody diarrhoea,&nbsp; haemorrhage, vomiting, asthenia, followed by multiple organ failure. She died on 25 August 2025. Two of the health-care workers that had initially been in contact with this first case also developed similar symptoms and died.</p><p>As of 4 September 2025, a total of 28 suspected cases, including 15 deaths, of which four are health-care workers (case fatality ratio (CFR): 54%) have been reported from three areas of the Bulape health zone (Bulape, Bulape Com and Dikolo) and Mweka health zone. About 80% of the suspected cases are aged 15 years and older.
    Five blood samples from five suspected cases and a &nbsp;naso-pharyngeal swab from a probable death were collected from the three health areas and shipped to the National Public Health Laboratory (INRB) in Kinshasa for testing. </p><p>On 3 September 2025, the laboratory testing conducted at INRB confirmed Ebola virus (EBOV)<sup><sup>[1] </sup></sup>through GeneXpert and Polymerase Chain Reaction (PCR) assays.</p><p>The results obtained from whole genome sequencing&nbsp;suggest that the outbreak is a new zoonotic spillover event and is not directly linked to the 2007 Luebo or 2008/2009 Mweka EVD outbreaks.<sup>[2]</sup></p><p><strong>Figure 1. Map of suspected cases and deaths of Ebola virus disease by health zone, as of 4 September 2025</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/default-album/evd-drcpng.png?sfvrsn=5baaf04b_3" height="760" style="max-width:100%;height:auto;" title="Map for EVD in DRC" width="853" alt="Map for EVD
    in DRC" sf-size="173284" /><br /></p>'
