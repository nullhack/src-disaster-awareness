  Epidemiology: <p>Ebola virus disease is a severe disease caused by the Ebola virus (EBOV). The virus belongs to the species <em>Orthoebolavirus Zairense</em>. The virus is transmitted to humans through close contact with the blood or secretions of infected wildlife and then spreads through human-to-human transmission by direct contact with bodily fluids, organs, or contaminated surfaces and materials. </p><p>The incubation period, the time between infection with the virus and the onset of symptoms, ranges from 2 to 21 days, but typically is 7&ndash;11 days. People are not infectious during the incubation period; they become contagious with early symptoms, therefore, transmission risk begins at the onset of clinical signs and increases with disease severity.</p><p>The average case fatality ratio is 50%; case fatality ratios ranging from 25% to 90% have been reported in previous outbreaks. The disease is characterised by an acute onset of fever with non-specific symptoms/signs (e.g., abdominal
    pain, anorexia, fatigue, malaise, myalgia, sore throat) usually followed several days later by nausea, vomiting, diarrhoea, and occasionally a variable rash. Severe illness may include haemorrhagic manifestations (e.g., bleeding), encephalopathy, shock/hypotension, multi-organ failure, and spontaneous abortion in infected pregnant women. Individuals who recover may experience prolonged sequelae (e.g., arthralgia, neurocognitive dysfunction, uveitis, sometimes followed by cataract formation), and clinical and subclinical persistent infection may occur in immune-privileged compartments (e.g., central nervous system, eyes, testes). Family members, health and care providers, and participants in burial ceremonies with direct contact with the deceased are at particular risk.&nbsp;<strong></strong></p>
