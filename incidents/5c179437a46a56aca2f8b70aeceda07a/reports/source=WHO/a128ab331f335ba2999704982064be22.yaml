  Title: Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo & Uganda
  Epidemiology: <p>Bundibugyo virus disease (BVD) is a severe and often fatal form of Ebola disease caused by the Bundibugyo virus, one of the <em>Orthoebolavirus </em>species. It is a zoonotic disease, with fruit bats suspected to be the natural reservoir. Human infection is thought to occur through close contact with the blood or secretions of infected wildlife, such as bats or non-human primates, and it subsequently spreads from person to person through direct contact with the blood, secretions, organs, or other bodily fluids of infected individuals or contaminated surfaces or items. Transmission is particularly amplified in health-care settings when infection prevention and control (IPC) measures are inadequate, and during unsafe burial practices involving direct contact with the deceased.</p><p>The incubation period for BVD ranges from 2 to 21 days, and individuals are not infectious until symptom onset. Early symptoms such as fever, fatigue, muscle pain, headache, and sore throat,
    are non-specific, which complicates clinical diagnosis and can delay detection. These symptoms then progress to gastrointestinal symptoms, organ dysfunction, and in some cases haemorrhagic manifestations. Case fatality rates in the past two BVD outbreaks, reported in Uganda and in the Democratic Republic of the Congo in 2007 and 2012, have ranged from approximately 30% to 50%.</p><p>Differentiating BVD from other endemic febrile illnesses such as malaria is challenging without laboratory confirmation using PCR or antigen/antibody-based assays. Control relies on rapid case identification, isolation and care, contact tracing, safe burials, and strong community engagement, as no approved vaccines or specific treatments currently exist for BVD.</p>
  Advice: '<p>On 19 May 2026, the Director-General of WHO convened the first meeting of the IHR Emergency Committee, which issued the <a href="https://www.who.int/news/item/22-05-2026-first-meeting-of-the-ihr-emergency-committee-regarding-the-epidemic-of-ebola-bundibugyo-virus-disease-in-the-democratic-republic-of-the-congo-and-uganda-2026-temporary-recommendations">temporary recommendations</a> on 22 May 2026 to States Parties. These recommendations underscore the importance of coordinated outbreak control, enhanced cross‑border collaboration, and sustained surveillance and preparedness to prevent further regional spread and ensure an effective public health response</p><p>WHO advises against any restriction of travel to, or trade with, the Democratic Republic of the Congo or Uganda based on the currently available information. WHO continues to closely monitor and, where necessary, verify travel and trade measures in relation to this event. </p><p>For further information on the considerations
    for implementing border health and international travel-related temporary recommendations, please see the relevant <a href="https://iris.who.int/items/b07def43-df30-41b8-83e0-deb33bcfd697">technical note issued on 26 May 2026</a></p><p><strong>Regular Information products on the outbreak of BVD in </strong>Democratic Republic of the Congo<strong></strong></p><ul><li><strong>Daily update: </strong><a href="https://www.who.int/emergencies/alert-and-response">Epidemiological update on BVD outbreak in Democratic Republic of the Congo and Uganda</a></li><li><strong>Published every Tuesday:</strong> <a href="https://www.afro.who.int/health-topics/ebola-disease/outbreak-drc-26">Weekly External Situation Report on Ebola Bundibugyo Virus Disease Outbreak, Democratic Republic of the Congo | Uganda</a></li><li><strong>Published every Thursday:</strong><a href="https://www.who.int/emergencies/disease-outbreak-news"><strong></strong>Disease Outbreak News | All Hazards Public Health Events, Ebola
    disease caused by Bundibugyo virus, Democratic Republic of the Congo</a><strong></strong></li><li><a href="https://health.go.ug/press-statements/">Press Statements - Ministry of Health - Uganda</a></li></ul>'
  Assessment: <p>On 22 May 2026, WHO assessed the risk of the outbreak of BVD to be very high at the national level in the Democratic Republic of the Congo, high at the regional level, and low at the global level. The risk assessment will be continuously reassessed in the coming days based on available and shared information.</p><p>For further information, please see the <a href="https://www.who.int/publications/m/item/who-rapid-risk-assessment-ebola-disease-caused-by-bundibugyo-virus--democratic-republic-of-the-congo-and-uganda-v2">WHO Rapid Risk Assessment-Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo and Uganda v2</a>.<br /></p>
  Overview: '<p>Since the last <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON603">Disease Outbreak News</a> was published on 21 May 2026, the number of suspected and confirmed cases has increased rapidly in the Democratic Republic of the Congo. In total, 906 suspected cases, including 223 deaths among suspected cases have been reported from Democratic Republic of the Congo; and 134 confirmed cases (nine in Uganda), including 18 deaths (one in Uganda) (CFR 14%) have been reported from the two countries as of 29 May. Additionally, a medical doctor from the United States of America who was exposed as part of their work caring for patients in the Democratic Republic of the Congo tested positive on 17 May and was transported to Germany for treatment and care.</p><p><strong>Figure 1. Distribution of suspected and confirmed cases of Bundibugyo virus disease in Democratic Republic of the Congo and Uganda, as of 29 May 2026&nbsp;</strong></p><p><img sf-image-responsive="true"
    src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/distribution-of-suspected-and-confirmed-cases.jpg?sfvrsn=f0c35f5d_3" height="621" style="max-width:100%;height:auto;" title="Distribution of suspected and confirmed cases in DRC and Uganda" width="921" alt="Distribution of suspected and confirmed cases in DRC and Uganda" sf-size="110698" /></p><p><strong>Democratic Republic of the Congo </strong></p><p>Since the last update dated 21 May, an additional 42 confirmed cases including eight deaths and 160 suspected cases including 47 deaths have been reported from the Democratic Republic of the Congo. As of 27 May 2026, a total of 125 confirmed cases including 17 deaths (CFR 14%); and 906 suspected cases including 223 deaths have been reported from 13 health zones (HZ) in Ituri (7/36 HZ), North Kivu (5/35 HZ) and South Kivu Provinces (1/34 HZ)&nbsp;<sup>[1]</sup>. Sixteen confirmed cases have been reported among health and care workers to date. Epidemiological
    and laboratory investigations are ongoing to reclassify all suspected cases and deaths reported in the Democratic Republic of the Congo.</p><p>The outbreak remains concentrated in Ituri Province, which accounts for 88% (110) of confirmed cases. The highest confirmed case numbers in Ituri Province are reported from Bunia (37 cases), Rwampara (33 cases), Mongbwalu (20 cases), and Nyankunde (10 cases) HZ. Of the 17 deaths among confirmed cases in the Democratic Republic of the Congo, 10 were male (nine were over 15 years old and one under 15) and seven were female (five over 15 years old and two under 15).</p><div><div id="ftn1"><p>A total of 774 samples have been collected as of 27 May. Of these, 648 samples (84%) have been analyzed, with 125 testing positive, representing a test positivity rate (TPR) of 19.2%. This is likely an underestimation of the actual positivity rate as over 100 samples are still awaiting testing and have been sent to Kinshasa for further analysis.</p><p>As of 27
    May, 2635 contacts have been listed in Ituri and North Kivu provinces. </p><p>Security incidents against health facilities, and community resistance, have recently emerged as major operational challenges in Ituri Province, with three recent incidents reported in Mongbwalu and Rwampara HZ. These create additional risks for undetected transmission, disrupt outbreak response efforts, and reinforce the need to strengthen community protection and engagement activities</p><p><strong>Figure 2: Number of confirmed cases (n=125) and deaths (n=17) by date of reporting in the Democratic Republic of the Congo as of 27 May 2026&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/number-of-confirmed-cases-in-drc.png?sfvrsn=24369b5d_3" height="342" style="max-width:100%;height:auto;" title="Number of confirmed cases and deaths in DRC" width="634" alt="Number of confirmed cases and deaths in DRC" sf-size="32276" /></p><p>Source:
    Ministry of Health, Democratic Republic of the Congo</p><p><em>NB: Newly reported confirmed cases/deaths may be part of the back log of samples waiting to be tested and therefore not necessarily newly acquired infections.&nbsp;</em></p><p><strong>Uganda</strong></p><p>Since the last update dated 21 May, an additional seven confirmed cases have been reported from Uganda. As of 29 May 2026, a total of nine confirmed cases including one death have been reported in Kampala (n=8) and Wakiso (n=1), Uganda. Recent cases include a Ugandan driver who transported the first reported case, a Congolese health worker with linkage to the index case, a Congolese woman who travelled to Uganda for medical care, and two Ugandan health workers linked to earlier confirmed case. </p><p>As of 26 May, a total of 436 contacts linked to the cases have been identified and are under follow-up. These include close household contacts and hospital contacts where the cases were hospitalized. </p><p>Exposure risks are
    associated with healthcare settings and cross-border movements. </p><p><strong>Figure 3: Number of confirmed cases (n=9) and deaths (n=1) by date of reporting in Uganda as of 29 May 2026&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/image-(28).png?sfvrsn=3d8d755e_3" height="544" style="max-width:100%;height:auto;" title="Number of confirmed cases and deaths" width="1041" alt="Number of confirmed cases and deaths" sf-size="10166" />Source: Ministry of Health, Uganda<br /></p></div></div>'
