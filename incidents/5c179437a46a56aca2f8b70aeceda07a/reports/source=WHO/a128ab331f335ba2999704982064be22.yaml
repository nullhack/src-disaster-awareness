  Response: '<p>Health authorities in the Democratic Republic of the Congo and Uganda, in collaboration with WHO and partners, are implementing comprehensive public health measures. WHO Director-General, Dr Tedros Adhanom Ghebreyesus, traveled to the Democratic Republic of the Congo on 28 May to support the ongoing response.</p><p>For further information about public health response actions by the respective Ministry of Health, WHO, and partners, please refer to the latest situation reports published by the WHO Regional Office for Africa: &nbsp;<a href="https://iris.who.int/server/api/core/bitstreams/4a06bc4f-6c0b-4c0d-925a-8a7b5a13299f/content" target="_blank">Weekly External Situation Report 02, Data as of 24 May 2026 - DRC and Uganda</a>&nbsp;<br /></p>'
