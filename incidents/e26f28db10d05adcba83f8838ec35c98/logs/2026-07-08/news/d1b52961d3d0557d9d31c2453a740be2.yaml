title: Warning huge 8.0-magnitude mega-earthquake could hit Japan after tremors sparked tsunami
body: Japan issued a special advisory on Monday warning of an increased risk of earthquakes at magnitude 8.0 or stronger, after a powerful jolt rattled the country's north and prompted a tsunami warning.
