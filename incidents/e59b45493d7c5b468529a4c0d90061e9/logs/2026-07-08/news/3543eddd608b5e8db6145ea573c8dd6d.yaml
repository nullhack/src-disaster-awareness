title: ‘Once-in-300-years’ rain leaves Thai city flooded and maternity ward stranded
body: A “once in 300 year” storm has battered southern Thailand, bringing floodwaters more than eight feet high that in one city cut off access to a maternity ward holding 30 newborn babies, staff and officials said.
