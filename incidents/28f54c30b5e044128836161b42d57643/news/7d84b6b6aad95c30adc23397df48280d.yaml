title: 20,000 evacuated from French tourist town as wildfires spread | Arkansas Democrat Gazette
body: PARIS -- About 20,000 people were evacuated from towns and vacation resorts along the French Atlantic coast Thursday as the latest in a series of wildfires raged and hundreds of firefighters were dispatched to tackle it.
