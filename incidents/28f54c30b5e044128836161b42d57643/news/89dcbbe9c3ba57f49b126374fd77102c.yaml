title: Firefighters battle one of Spain's biggest-ever wildfires during a heat wave across the Mediterranean
body: Firefighters in central Spain battled a wildfire on Wednesday that has burned over 32,000 hectares (79,000 acres) in one of the country's largest blazes on record.
