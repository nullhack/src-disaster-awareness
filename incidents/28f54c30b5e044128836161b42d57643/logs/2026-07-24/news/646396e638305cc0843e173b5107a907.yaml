title: Tens of thousands of people flee raging wildfires in France and Spain, some escaping by boat
body: Major wildfires have forced tens of thousands to flee their homes in southwestern France and Spain. On Friday, the touristic Cap Ferret peninsula in France was evacuated, with over 60,000 residents escaping the area. In Spain, a national emergency was declared as 20,000 people were evacuated from villages near Madrid. Both countries have requested help from fellow European Union members. The fires have burned over 100 square kilometers in France and are believed to be accidental. Southern Europe has faced multiple large fires this summer, with climate change exacerbating heat and dryness, making the region more vulnerable.
