log_date: '2026-07-24'
summary: |-
  A massive wildfire in central Spain has burned over 32,000 hectares (79,000 acres), becoming one of the country's largest on record, forcing thousands to evacuate. The Spanish government declared a national emergency on July 24 as the blaze continued to rage. Three firefighters died in associated wildfires across Europe, with two in France and one in Italy, while Spain's annual wildfire average was crossed before August.
  Spain declared its first-ever national emergency as wildfires near Madrid and Avila forced 20,000 evacuations, while in southwestern France over 60,000 people, including tourists, were evacuated from the Cap Ferret peninsula by boat. Both countries requested assistance from the European Union as the fires, fueled by a marine heatwave and extreme temperatures, burned over 100 square kilometers in France.
