log_date: '2026-07-24'
summary: A massive wildfire in central Spain has burned over 32,000 hectares (79,000 acres), becoming one of the country's largest on record, forcing thousands to evacuate. The Spanish government declared a national emergency on July 24 as the blaze continued to rage. Three firefighters died in associated wildfires across Europe, with two in France and one in Italy, while Spain's annual wildfire average was crossed before August.
