title: DOST urges continued vigilance amid Kanlaon unrest
body: Department of Science and Technology (DOST) Secretary Renato Solidum Jr. urged the public, particularly residents of Cebu, to remain vigilant amidst Kanlaon Volcano unrest, warning that volcanic ash could still reach the province depending on prevailing weather conditions.
