title: Weather expected to be calm in weekend as some Doddridge, Pleasants residents remain without power
body: PARKERSBURG – Pleasant and Doddridge counties are expected to receive a break from severe weather over the next several days following storms that brought tornadoes and heavy rainfall to the region earlier this week. Joe Curtis, a meteorologist with the National Weather Service in Charleston, said sunny and quiet conditions are expected through at least […]
