name: Ingest records

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - name: Configure git identity
        run: |
          git config --global user.name "eol"
          git config --global user.email "nullhack@users.noreply.github.com"
      - name: Attach data worktree
        run: git worktree add data origin/data
      - name: Create env
        run: echo "API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env
      - name: Count before
        id: before
        run: |
          echo "count=$(find data/reports -name '*.yaml' | wc -l)" >> "$GITHUB_OUTPUT"
      - name: Run ingest-records
        run: uv run python -m disaster_report ingest-records --secrets .env -v
      - name: Count after
        id: after
        run: |
          echo "count=$(find data/reports -name '*.yaml' | wc -l)" >> "$GITHUB_OUTPUT"
      - name: Commit + push data
        working-directory: data
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          added=$(($(echo "${{ steps.after.outputs.count }}" - ${{ steps.before.outputs.count }})))
          git commit -m "chore(data): ingest records — ${added} new reports (${{ steps.after.outputs.count }} total)"
          git push origin HEAD:data
