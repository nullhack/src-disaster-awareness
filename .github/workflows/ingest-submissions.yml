name: Ingest submissions

on:
  schedule:
    - cron: "0 1,9,17 * * *"
  workflow_dispatch:

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  ingest-submissions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Configure git identity
        run: |
          git config --global user.name "eol"
          git config --global user.email "nullhack@users.noreply.github.com"
      - name: Attach data worktree
        run: git worktree add data origin/data
      - name: Run ingest_submissions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          uv run python scripts/ingest_submissions.py \
            --tree-root data \
            --model "openrouter/deepseek/deepseek-v4-flash" \
            --api-key "$OPENROUTER_API_KEY" \
            -v
      - name: Count after
        id: after
        run: |
          echo "reports=$(find data/reports -name '*.yaml' | wc -l)" >> "$GITHUB_OUTPUT"
          echo "incidents=$(find data/incidents -mindepth 1 -maxdepth 1 -type d | wc -l)" >> "$GITHUB_OUTPUT"
      - name: Commit + push data
        working-directory: data
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore(data): ingest submissions — reports=${{ steps.after.outputs.reports }} incidents=${{ steps.after.outputs.incidents }}"
          git push origin HEAD:data
