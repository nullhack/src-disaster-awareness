name: Search news

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

concurrency:
  group: db-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  search-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - name: Extract DB
        run: git show origin/db:disaster_report.db > disaster_report.db
      - name: Create env
        run: echo "API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env
      - name: Run search-news (per-report)
        run: uv run python -m disaster_report search-news --secrets .env -v
      - name: Run search-news (repoll)
        run: uv run python -m disaster_report search-news --repoll --secrets .env -v
      - name: Push DB
        run: |
          git worktree add /tmp/db-wt db
          cp disaster_report.db /tmp/db-wt/disaster_report.db
          cd /tmp/db-wt
          git add disaster_report.db
          git commit --amend --no-edit --reset-author
          git push --force origin db