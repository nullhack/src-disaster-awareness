name: Search news

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  search-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Configure git identity
        run: |
          git config --global user.name "eol"
          git config --global user.email "nullhack@users.noreply.github.com"
      - name: Attach data worktree
        run: git worktree add data origin/data
      - name: Create env
        run: echo "API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env
      - name: Count before
        id: before
        run: |
          echo "news=$(find data/news data/incidents -path '*/news/*.yaml' -not -path '*/logs/*' | wc -l)" >> "$GITHUB_OUTPUT"
          echo "incidents=$(find data/incidents -maxdepth 1 -mindepth 1 -type d | wc -l)" >> "$GITHUB_OUTPUT"
      - name: Run search-news (per-report)
        run: uv run python -m disaster_report search-news --secrets .env -v
      - name: Run search-news (repoll)
        run: uv run python -m disaster_report search-news --repoll --secrets .env -v
      - name: Count after
        id: after
        run: |
          echo "news=$(find data/news data/incidents -path '*/news/*.yaml' -not -path '*/logs/*' | wc -l)" >> "$GITHUB_OUTPUT"
      - name: Commit + push data
        working-directory: data
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          added=$(($(echo "${{ steps.after.outputs.news }}" - ${{ steps.before.outputs.news }})))
          git commit -m "chore(data): search news — ${added} new items (${{ steps.after.outputs.news }} pending total)"
          git push origin HEAD:data
