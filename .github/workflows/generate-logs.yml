name: Generate logs

on:
  schedule:
    - cron: "0 1-23/6 * * *"
  workflow_dispatch:

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Configure git identity
        run: |
          git config --global user.name "eol"
          git config --global user.email "nullhack@users.noreply.github.com"
      - name: Attach data worktree
        run: git worktree add data origin/data
      - name: Create env
        run: echo "API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > .env
      - name: Count before
        id: before
        run: |
          echo "logs=$(find data/incidents -name 'log.yaml' | wc -l)" >> "$GITHUB_OUTPUT"
      - name: Run generate-logs
        run: uv run python -m disaster_report generate-logs --secrets .env -v
      - name: Count after
        id: after
        run: |
          echo "logs=$(find data/incidents -name 'log.yaml' | wc -l)" >> "$GITHUB_OUTPUT"
      - name: Commit + push data
        working-directory: data
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          added=$(($(echo "${{ steps.after.outputs.logs }}" - ${{ steps.before.outputs.logs }})))
          git commit -m "chore(data): generate logs — ${added} new (${{ steps.after.outputs.logs }} total)"
          git push origin HEAD:data
