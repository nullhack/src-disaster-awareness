name: Disaster Awareness Monitoring

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  monitor-and-store:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/anomalyco/opencode:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Run monitoring and storage
        run: |
          opencode run "Execute the complete disaster monitoring and storage cycle in ONE flow. First, use @disaster-incident-reporter to check these 5 data sources: GDACS (https://www.gdacs.org/), ProMED (https://www.promedmail.org/), ReliefWeb (https://reliefweb.int/), HealthMap (https://www.healthmap.org/), WHO (https://www.who.int/emergencies/). Second, use @skill incident-classifier to classify all incidents by country group (A/B/C), severity level (1-4), and priority (HIGH/MEDIUM/LOW). Third, use @skill disaster-monitor and @skill media-monitor to format all reports. Fourth, use @incident-summarizer to compile all incidents. Fifth, use @data-engineer to validate, transform, and store all incidents in JSONL format in incidents/by-date/ directory, update indices and metadata. IMPORTANT: Store ALL data in this single flow. Report: number of incidents found, number stored, storage locations, any escalations."

      - name: Check for changes
        id: git-status
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            git add -A
            git commit -m "Auto-update: Incidents from $(date -u +%Y-%m-%dT%H:%M:%SZ) monitoring cycle"
            git push
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "## Disaster Monitoring Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- Changes detected: ${{ steps.git-status.outputs.changes }}" >> $GITHUB_STEP_SUMMARY
