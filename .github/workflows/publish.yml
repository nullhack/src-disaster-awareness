name: Publish dashboard

on:
  schedule:
    - cron: "30 1-23/6 * * *"
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - run: uv pip install -e .
      - name: Configure git identity
        run: |
          git config --global user.name "eol"
          git config --global user.email "nullhack@users.noreply.github.com"
      - name: Extract DB
        run: git show origin/db:disaster_report.db > disaster_report.db
      - name: Publish to gh-pages
        run: uv run python scripts/publish_dashboard_data.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}