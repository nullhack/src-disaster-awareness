  Summary: "On 23 May 2024, the Mexico International Health Regulations (IHR) National Focal Point (NFP) reported to PAHO/WHO a confirmed fatal case of human infection with avian influenza A(H5N2) virus detected in a resident of the State of Mexico who was hospitalized in Mexico City. This is the first laboratory-confirmed human case of infection with an influenza A(H5N2) virus reported globally and the first avian H5 virus infection in a person reported in Mexico. Although the source of exposure to the virus in this case is currently unknown, A(H5N2) viruses have been reported in poultry in Mexico.\r\nAccording to the IHR (2005), a human infection caused by a novel influenza A virus subtype is an event that has the potential for high public health impact and must be notified to the WHO. Based on available information, WHO assesses the current risk to the general population posed by this virus as low."
