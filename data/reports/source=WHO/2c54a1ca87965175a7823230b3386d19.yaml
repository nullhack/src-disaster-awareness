  Response: <p>Apart from the two cases linked to healthcare settings, the Ministry of Health did not detect any additional secondary infections. Triage for respiratory diseases has been implemented in the concerned hospital to enable early detection of patients with respiratory symptoms. In addition, comprehensive refresher training on the case definition has commenced for all health and care workers to ensure early detection of cases.</p>
