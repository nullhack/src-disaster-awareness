  Summary: "This is the bi-annual update on the Middle East respiratory syndrome coronavirus (MERS-CoV) infections reported to the World Health Organization (WHO) from the Kingdom of Saudi Arabia (KSA). From 6 September 2024 to 28 February 2025, four laboratory-confirmed cases of MERS-CoV infection, including two deaths, were reported to WHO by the Ministry of Health of the KSA. One of the four cases was a secondary case exposed to the virus in a healthcare facility (nosocomial transmission). Close contacts of the four cases were followed up by the Ministry of Health. No additional secondary cases have been detected.\r\nThe notification of these four cases does not alter the overall risk assessment, which remains moderate at both the global and regional levels.\r\nThe reporting of these cases shows that the virus continues to pose a threat in countries where it is circulating in dromedary camels, particularly those in the Middle East."
