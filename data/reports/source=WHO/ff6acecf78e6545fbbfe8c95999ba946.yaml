  Response: <p>The Ministry of Health's national and sub-national rapid response teams have been deployed to conduct further investigations and respond to this avian influenza outbreak. Response measures are being implemented in coordination with the local authorities, the Ministry of Environment, and the Ministry of Agriculture, Forestry, and Fisheries.&nbsp;</p><ul><li>Investigations are ongoing to identify the presence of the disease in animals and sources of transmission, detect suspected animal and human cases, and prevent community transmission. </li><li>Close contacts are being monitored and provided with oseltamivir treatment as prophylaxis.</li><li>Health education campaigns are being conducted in affected villages.</li><li>Stamping-out measures are being implemented, including culling of poultry, safe disposal of carcasses and potentially contaminated materials, and cleaning and disinfection.&nbsp;&nbsp;</li></ul><p>WHO has provided technical assistance to the investigation and
    response, including efforts to increase public awareness and adoption of preventive behaviours, and raise clinical suspicion of avian influenza amongst healthcare providers to support early detection and strengthen clinical management of cases. WHO continues to collaborate with partners to ensure coordinated actions for a One Health response.&nbsp;</p>
