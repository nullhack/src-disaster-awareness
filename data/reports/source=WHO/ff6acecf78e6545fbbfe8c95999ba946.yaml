  Advice: "<p>This\r\nevent does not change WHO recommendations on public health measures and\r\ninfluenza surveillance.&nbsp;<o:p></o:p></p><p>The\r\npublic should avoid contact with high-risk environments, such as live animal\r\nmarkets/farms and live poultry or surfaces that might be contaminated by\r\npoultry droppings. Additionally, maintaining good hand hygiene through frequent\r\nhand washing with soap or using alcohol-based hand sanitizer is recommended.&nbsp;<o:p></o:p></p>\r\n\r\n<p>The\r\ngeneral public and at-risk individuals should immediately report instances of illness\r\nor unexpected deaths in animals to veterinary authorities. Handling sick or\r\nunexpectedly dead poultry including slaughtering, butchering, and preparing such\r\npoultry for consumption, should be avoided. &nbsp;<o:p></o:p></p>\r\n\r\n<p>Any\r\nperson exposed to potentially infected animals or contaminated environments who\r\nfeels unwell should seek healthcare promptly and inform their healthcare\r\nprovider\
    \ of their possible exposure.&nbsp;<o:p></o:p></p>\r\n\r\n<p>WHO\r\ndoes not recommend special traveler screening at points of entry or other\r\nrestrictions due to the current situation of influenza viruses at the\r\nhuman-animal interface.&nbsp;<o:p></o:p></p>\r\n\r\n<p>States\r\nParties to the International Health Regulations (2005) are required to\r\nimmediately notify WHO of any laboratory-confirmed case of a human infection\r\ncaused by a new subtype of influenza virus. Evidence of illness is not required\r\nfor this notification.<o:p></o:p></p>"
  Assessment: "<p>From\r\n2003 to 20 August 2024, a total of 903 human cases of infection of influenza\r\nA(H5N1) have been reported globally to WHO from 24 countries, including this\r\ncase. Almost all cases of human infection with avian influenza A(H5N1) have\r\nbeen linked to close contact with A(H5N1)-infected live or dead birds or\r\nmammals, or contaminated environments. <o:p></o:p></p><p>Available\r\nepidemiological and virological evidence suggests that A(H5N1) viruses have not\r\nacquired the capacity for sustained transmission among humans. Therefore, the\r\nlikelihood of sustained human-to-human spread is low at present. Since the\r\nvirus continues to circulate in poultry, particularly in rural areas in\r\nCambodia, further sporadic human cases can be expected. <o:p></o:p></p><p>Currently,\r\nbased on available information, WHO assesses the overall public health risk\r\nposed by this virus to be low. The risk assessment will be reviewed as needed\r\nif additional information\
    \ becomes available.&nbsp;<o:p></o:p></p><p>Close\r\nanalysis of the epidemiological situation, further characterization of the most\r\nrecent influenza A(H5N1) viruses in both human and poultry populations, and\r\nserological investigations are critical to assess associated risks to public\r\nhealth and promptly adjust risk management measures.&nbsp;<o:p></o:p></p><p>Vaccines\r\nagainst seasonal influenza viruses will not protect humans against infections\r\nwith influenza A(H5N1) viruses. Candidate vaccines to prevent influenza A(H5)\r\ninfection in humans have been developed for pandemic preparedness in some\r\ncountries. WHO continues to update the <a href=\"https://www.who.int/teams/global-influenza-programme/vaccines/who-recommendations/zoonotic-influenza-viruses-and-candidate-vaccine-viruses\" target=\"_blank\">list</a> of zoonotic\r\ninfluenza candidate vaccine viruses (CVV), which are selected twice a year at\r\nthe WHO consultation on influenza virus vaccine composition. The\
    \ list of such\r\nCVVs is available on the WHO website, at the reference below. In addition, the\r\ngenetic and antigenic characterization of contemporary zoonotic influenza\r\nviruses is published <a href=\"https://www.who.int/teams/global-influenza-programme/vaccines/who-recommendations\" target=\"_blank\">here</a>.&nbsp;<o:p></o:p></p>"
  Overview: <p>On 20 August 2024, the IHR NFP of the Kingdom of Cambodia notified WHO of one case of human infection with influenza A(H5N1) in a 15-year-old with no underlying medical conditions, from Prey Veng Province. The child had an onset of fever on 11 August 2024. On 17 August, the patient was hospitalized in Phnom Penh at a severe acute respiratory infection (SARI) sentinel site. On admission, the patient presented with a fever, cough, sore throat, and difficulty breathing, and on the same day, treatment with oseltamivir was initiated. Nasopharyngeal and oropharyngeal swab specimens were collected on 17 August, and the patient died on 20 August.</p><p>Swab specimens collected on 17 August arrived at the National Institute of Public Health of Cambodia on 19 August and tested positive for influenza A(H5N1) by quantitative reverse transcription polymerase chain reaction (RT-qPCR) on 20 August. The results were confirmed by the Institut Pasteur du Cambodge (IPC) the same day. The sample
    was successfully sequenced, and phylogenetic analysis of the haemagglutinin (HA) gene showed the virus to be H5 clade 2.3.2.1c, similar to the viruses circulating in Cambodia and Southeast Asia since 2013-2014. However, its internal genes belong to H5 clade 2.3.4.4b viruses. This novel reassortant influenza A(H5N1) virus has been detected in human cases reported in Cambodia since late 2023.</p> <p>According to early investigations, there were reports of dead poultry in the village about five days before the patient&rsquo;s onset of illness. The patient's family was given some of these chickens for consumption and the girl was exposed to the chicken while preparing food.&nbsp;&nbsp;</p> <p>The Cambodian Communicable Disease and Control Department (CDC), Ministry of Health, and local Rapid Response Team conducted further investigations. Six close contacts were identified, and oseltamivir was provided to them. All close contacts are being monitored and are asymptomatic. Further investigations
    and response measures are ongoing for public and animal health and the environment. Test results for samples collected from chickens and ducks from the village are pending.&nbsp;</p> <p>Avian influenza A(H5N1) was detected for the first time in Cambodia in December 2003, initially affecting wild birds. From then until 2014, sporadic human cases were reported due to transmission from poultry to humans, either directly or indirectly through contaminated environments. Between 2014 and 2022, there were no reports of human infection with A(H5N1) viruses. However, the re-emergence of human infections with A(H5N1) viruses in Cambodia was reported in February 2023; six cases were reported that year. This case is one of 10 human cases of influenza A(H5N1) infection reported in Cambodia in 2024. Two of the 10 cases were fatal, and nine involved persons under 18 years of age. From 2003 to the present, 72 cases of human infection with influenza A(H5N1), including 43 deaths (CFR 59.7%), have been
    reported in the country.&nbsp;</p>
