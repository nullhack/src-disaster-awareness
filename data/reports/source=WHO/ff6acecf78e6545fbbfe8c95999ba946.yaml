  Epidemiology: <p>Animal influenza viruses normally circulate in animals but can also infect humans. Infections in humans have primarily been acquired through direct contact with infected animals or contaminated environments. Depending on the original host, influenza A viruses can be classified as avian influenza, swine influenza, or other types of animal influenza viruses.</p><p>Avian influenza virus infections in humans may cause disease ranging from mild upper respiratory tract infection to severe disease and death. Conjunctivitis, gastrointestinal symptoms, encephalitis and encephalopathy have all been reported. There have also been several detections of A(H5N1) virus in asymptomatic persons who had exposure to infected birds.</p><p>Laboratory tests are required to diagnose human infection with avian influenza. WHO periodically updates technical guidance protocols for the detection of zoonotic influenza using molecular methods, e.g., RT-PCR. Evidence suggests that some antiviral drugs,
    notably neuraminidase inhibitors (oseltamivir, zanamivir), can reduce the duration of viral replication and improve prospects of survival in some cases.</p><p>From 2003 to 20 August 2024, 903 cases of human infections with avian influenza A(H5N1), including 464 deaths (CFR 51.4%), have been reported to WHO from 24 countries. Almost all of these cases have been linked to close contact with infected live or dead birds, or contaminated environments.</p>
