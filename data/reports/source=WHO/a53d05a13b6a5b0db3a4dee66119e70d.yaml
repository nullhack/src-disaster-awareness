  Epidemiology: <p>Sudan virus disease is a viral hemorrhagic fever disease, belonging to the same family as Ebola virus disease. It is caused by Sudan virus (SUDV). It is a severe disease with high case fatality. It is typically characterized by acute onset of fever with non-specific symptoms/signs (e.g., abdominal pain, anorexia, fatigue, malaise, myalgia, sore throat) usually followed several days later by nausea, vomiting, diarrhoea, and occasionally a variable rash. Hiccups may occur. Severe illness may include hemorrhagic manifestations (e.g., bleeding from puncture sites, ecchymoses, petechiae, visceral effusions), encephalopathy, shock/hypotension, multi-organ failure, spontaneous abortion in infected pregnant women. Individuals who recover may experience prolonged sequelae (e.g., arthralgia, neurocognitive dysfunction, uveitis sometimes followed by cataract formation), and clinical and subclinical persistent infection may occur in immune-privileged compartments (e.g., CNS, eyes,
    testes). Person-to-person transmission occurs by direct contact with blood, other bodily fluids, organs, or contaminated surfaces and materials with risk beginning at the onset of clinical signs and increasing with disease severity. Family members, healthcare providers, and participants in burial ceremonies with direct contact with the deceased are at particular risk. The incubation period ranges from 2 to 21 days, but typically is 7&ndash;11 days.&nbsp;</p>
