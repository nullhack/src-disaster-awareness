  Response: '<p>Health authorities are implementing public health measures, including but not limited to the following: </p><ul type="disc"><li data-list="1" data-level="1">The Ministry of Health (MoH) has activated the Incident Management Team and      dispatched Rapid Response Teams to the affected district. The MoH team has      also listed contacts at the National Reference Hospital.</li><li data-list="1" data-level="1">Regional Emergency Operation Centers are being activated in Kampala and the      affected district.</li><li data-list="1" data-level="1">Facilities have been identified for quarantine of all listed contacts. </li><li data-list="1" data-level="1">MoH is organizing to carry out a safe and dignified burial of the      patient.&nbsp; </li><li data-list="1" data-level="1">In their official press statement, the MoH provided recommendations to health      workers, district leaders, and the public to strengthen detection of      suspected cases and implement appropriate infection,
    prevention and      control measures. </li><li data-list="1" data-level="1">MoH set up a hotline for notification of suspected cases.<br /></li></ul> <p>WHO is supporting the national authorities, including through:</p><ul type="disc"><li data-list="0" data-level="1">Risk assessment and investigation.</li><li data-list="0" data-level="1">Providing operational, financial and technical support to the Ministry of Health to      ensure swift response. &nbsp;</li><li data-list="0" data-level="1">Facilitating access to candidate vaccines and therapeutics</li></ul>'
