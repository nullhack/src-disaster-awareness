  Advice: <p>Effective Ebola disease outbreak, including SVD, control relies on applying a package of interventions, including case management, surveillance and contact tracing, a good laboratory service, implementation of infection prevention and control measures in health care and community settings, safe and dignified burials and community engagement and social mobilization. Community engagement is key to successfully controlling outbreaks. Raising awareness of risk factors for infection and prevention measures that individuals can take is an effective way to reduce human transmission.</p><p>Early initiation of intensive supportive treatment increases the chances of survival. All above-mentioned interventions need to be thoroughly implemented in affected areas to stop chains of transmission and decrease disease mortality. Cases, contacts and individuals in affected areas who present signs and symptoms compatible with case definitions should be advised not to travel and seek early care
    at designated facilities to improve their chances of survival and limit transmission. </p><p>Collaboration with neighbouring countries should be enhanced to harmonize reporting mechanisms, conduct joint investigations, and share critical data in real-time. Surrounding countries should enhance readiness activities to enable early case detection, isolation and treatment.</p><p>A range of candidate vaccines and therapeutics are under different stage of development. In 2022, WHO convened expert deliberations to review candidate products prioritization and trial designs. One candidate vaccine and two candidate therapeutics (a monoclonal antibody and an antiviral) are available in country and will be made available through clinical trial protocol. </p><p>The two vaccines licensed against Ebola virus disease will not provide cross protection against SVD and cannot be used in this outbreak. </p><p>WHO advises against any restrictions on travel and/or trade to Uganda based on available information
    for the current outbreak.&nbsp;</p>
  Assessment: <p>Sudan virus disease (SVD) is a severe, often fatal illness affecting humans. Sudan virus (SUDV) was first identified in southern Sudan in June 1976. Since then, the virus has emerged periodically and up to now and prior to this current one, eight outbreaks caused by SUDV have been reported, five in Uganda and three in Sudan. The case fatality rates of SVD have varied from 41% to 70% in past outbreaks. </p><p>SUDV is enzootic and present in animal reservoirs in the region. Uganda reported five SVD outbreaks (one in 2000, one in 2011, two in 2012, and one in 2022).&nbsp; The current outbreak is the sixth SVD outbreak in Uganda. Uganda also reported a Bundibugyo virus disease outbreak in 2007 and an Ebola virus disease outbreak exported from the Democratic Republic of the Congo in 2019. The latest SVD outbreak in Uganda was declared over on 11 January 2023. A total of 164 cases with 77 deaths were reported in nine districts.</p> <p>Uganda has experience in Ebola disease outbreaks
    including SVD, and necessary action has been initiated quickly. </p> <p>In the absence of licensed vaccines and therapeutics for the prevention and treatment of SVD, the risk of potential serious public health impact is high. Community deaths, care of patients in private facilities and hospitals and other community health services as well as at traditional healers with limited protection and infection prevention and control measures entail a high risk of many transmission chains. An investigation is ongoing to determine the scope of the outbreak and the possibility of spread to other districts and potential exportation of cases to neighbouring countries cannot be ruled out at this stage.</p>
  Overview: <p>On 30 January 2025, the Ministry of Health of Uganda declared an outbreak of Sudan virus disease (SVD) following confirmation from three national reference laboratories.</p><p>The confirmed case was an adult male nurse who initially developed fever-like symptoms and sought treatment from a traditional healer as well as at multiple health facilities.</p><p>The patient presented with a history of high fever, chest pain, and difficulty in breathing with symptoms onset between 20 and 21 January, which later progressed to unexplained bleeding from multiple body sites. The patient experienced multi-organ failure and died at the National Referral Hospital on 29 January. </p><p>Samples taken post-mortem were confirmed for Sudan virus (SUDV).</p><p>Forty-five contacts have so far been identified, including 34 healthcare workers and 11 family members. </p>
