  Title: Diphtheria - African Region (AFRO)
  Epidemiology: <p>Diphtheria is a severe infectious disease caused by the gram-positive bacterium <em>Corynebacterium diphtheriae</em> or, less commonly, toxigenic strains of other <em>Corynebacterium</em> species. Infection may lead to respiratory disease, cutaneous disease, or an asymptomatic carrier state. The primary mode of transmission rests on close contact with infectious material from respiratory secretions or from skin lesions. The only known reservoir for <em>C. diphtheriae</em> are humans. As a result, asymptomatic carriers play a critical role in infection transmission. Immunity (either via natural infection or vaccine induced) provides protective immunity against the disease but does not prevent carriage. The disease can affect all age groups; however, unvaccinated or partially vaccinated individuals, including children, are most at risk.<br /></p><p>Respiratory diphtheria typically presents two to five days after exposure with sore throat, malaise, cervical lymphadenopathy,
    and low-grade fever. Oropharyngeal involvement is most common, but infection may extend to the nasopharynx, larynx, and tracheobronchial tree. Characteristic findings include adherent gray pseudomembranes on the respiratory tract mucosa that often bleed when removed. Severe cases can result in airway obstruction with neck swelling, hoarseness, stridor, or palatal paralysis. Toxin-mediated complications from toxigenic strains may include myocarditis, neurologic deficits, and kidney injury. Cutaneous diphtheria presents as chronic, nonhealing sores or shallow ulcers covered by a dirty gray membrane, though the appearance is non-specific.&nbsp;</p><p>In addition to supportive care, treatment is based on the appropriate administration of DAT and antibiotics (azithromycin or penicillin).&nbsp;</p><p>Full primary series and required booster doses. DAT administration against diphtheria has been effective in reducing the deaths and illness from diphtheria dramatically. Diphtheria is fatal in
    5 to 10% of cases, with a higher mortality rate in young children. However, in settings with poor access to DAT, the CFR can be as high as 40%.</p>
  Advice: <p>Diphtheria is a vaccine-preventable bacterial disease caused by&nbsp;<em>Corynebacterium diphtheriae</em>. It primarily affects the upper respiratory tract and can produce a toxin that leads to severe systemic complications, including myocarditis, kidney failure, and neurological damage. The disease spreads via close contact with respiratory secretions or skin lesions. Areas with low immunization coverage, overcrowding and limited access to healthcare services are at higher risk of increased transmission and may experience outbreaks&nbsp;<o:p></o:p></p><p>Considering&nbsp;the ongoing diphtheria outbreaks in the WHO African Region, WHO encourages Member States to strengthen preparedness and response capacities. This includes enhancing surveillance systems to improve case detection and reporting, expanding laboratory capacity for&nbsp;timely&nbsp;confirmation of cases, and improving clinical management and infection prevention and control. Supplementary immunization activities
    should be prioritized to close immunity gaps, particularly among children/adolescents&nbsp;and displaced populations. Community engagement and risk communication efforts must be intensified to raise awareness, promote health-seeking behavior, and ensure adherence to control measures.&nbsp;<o:p></o:p></p><p>WHO also recommends the establishment of contingency stockpiles of diphtheria antitoxin, antibiotics, and laboratory supplies at regional hubs in Dakar and Nairobi. These stockpiles will enable rapid deployment of essential materials to&nbsp;the&nbsp;affected countries when needed.&nbsp;<o:p></o:p></p><p>Regional and global advocacy efforts should be strengthened to mobilize funding and political support for outbreak response. WHO will continue to support Member States through technical&nbsp;assistance, resource mobilization, and coordination with partners.&nbsp;<o:p></o:p></p><p>WHO&nbsp;will continue to work across all levels of the organization to&nbsp;identify&nbsp;and implement
    appropriate mechanisms&nbsp;to support affected countries and mitigate the impact of the outbreaks.&nbsp;<o:p></o:p></p><p>WHO does not recommend any restriction on travel to or trade with the countries named in this report, based on the information available on the current event. &nbsp;<o:p></o:p></p>
  Assessment: <p>Diphtheria is a major public health problem in the African region despite substantial efforts on immunization activities over the past three decades. Between 2000 and 2024, 75 789&nbsp;diphtheria suspected&nbsp;cases were reported in the Region with the majority being reported from 2023 to 2024. &nbsp;In 2023-2024, Algeria, Chad, Gabon, Guinea, Mali, Mauritania, Niger, Nigeria and South Africa reported resurgence of diphtheria outbreaks with approximately 57 000 suspected cases and 2000 deaths (CFR of 3.5%) recorded. The countries most affected were Guinea, Niger and Nigeria. Most cases reported were children under fifteen years and female. Over 50% of suspected cases were non-vaccinated or with unknown vaccination status.&nbsp;<o:p></o:p></p><p>Since the beginning of 2025 and as of 2 November 2025, eight countries in the Region have reported a total of 20 412 suspected diphtheria cases, including 1 252 deaths (with an average case fatality ratio [CFR] of 6%).&nbsp;Most
    cases are among children and young adults, with women slightly more affected than men. Laboratory confirmation&nbsp;remains&nbsp;low due to shortages of diagnostic supplies and limited testing capacity. The global shortage of DAT, and a variable clinical capacity to provide this essential treatment, poses an&nbsp;additional&nbsp;challenge to effective case management.&nbsp;<o:p></o:p></p><p>Many of the affected countries are fragile, conflict-affected or have system vulnerabilities where health systems are overstretched, routine services are disrupted and access to essential services is limited. These settings are characterized by low routine immunization coverage, high population mobility, and crowded living conditions, especially among displaced populations. The resurgence of diphtheria in these countries is further compounded by disruptions caused by the COVID-19 pandemic, which led to significant declines in vaccine uptake and widened immunity gaps.&nbsp;<o:p></o:p></p><p>At the
    regional level, the public health risk is assessed as high due to the potential for further geographic expansion of outbreaks, high fatality rates, insufficient resources for outbreak control, and weak surveillance and laboratory systems. The humanitarian context in several affected countries, including Chad, Mali, Niger, and Nigeria, increases the likelihood of sustained transmission and complicates response efforts.&nbsp;<o:p></o:p></p><p>At the global level, the public health risk is considered low. Most countries outside the African Region have&nbsp;established&nbsp;immunization programs and adequate surveillance systems. However, the possibility of international&nbsp;spread through travel&nbsp;cannot be ruled out, particularly if susceptible individuals are exposed. Strengthened global surveillance and risk communication are therefore essential to mitigate this risk.&nbsp;<o:p></o:p></p><p>The confidence in the available information is assessed as moderate. While data collection
    and reporting have improved in some countries, gaps&nbsp;remain&nbsp;in laboratory confirmation, case classification, and&nbsp;timely&nbsp;sharing of epidemiological updates.&nbsp;<o:p></o:p></p>
  Overview: <p><p>&nbsp;</p><p>In 2025, from 1 January to 2 November, a total of 20 412 suspected diphtheria cases, including 1 252 deaths (an average case fatality ratio [CFR] &ndash; 6.1 %) have been reported across eight Member States in the WHO African Region (Algeria, Chad, Guinea, Mali, Mauritania, Niger, Nigeria, and South Africa). Of these suspected cases, 9 864 (48.3%) cases have been confirmed through laboratory testing, epidemiological linkage, or clinical diagnosis. Laboratory confirmation was conducted for 5.7% (n = 1 177) of the suspected cases.</p><p>Women, children aged 5&ndash;18 years, and young adults under 30 years are the most affected, confirming that the immunity gap extends well beyond early childhood. The situation has further deteriorated in Mali, Mauritania, and Niger, in recent weeks, with increasing case numbers and geographic spread of the outbreaks reported in these countries.<br /></p><p>The resurgence of diphtheria across multiple countries in the WHO African
    Region constitutes a serious public health concern which led to its grading as a grade 2 emergency under the Emergency Response Framework of WHO. Timely case detection, coordinated response, and clinical management remain critical to limiting transmission and reducing the high fatality rates observed in recent outbreaks. However, response efforts are being hampered by a global shortage of DAT and limited laboratory diagnostic capacity.&nbsp;</p><p>Effective outbreak control requires comprehensive, multi-sectoral action across all response pillars including emergency coordination, laboratory confirmation, enhanced surveillance and case finding, clinical management with life-saving DAT and appropriate antibiotics (in accordance with WHO guidelines), infection prevention and control (IPC). Sustained vaccination efforts, coupled with risk communication and community engagement (RCCE) are essential to interrupt transmission and protect high-risk populations. In addition, preventing the recurrence
    of diphtheria outbreaks in the African Region will require strengthened health systems, particularly through robust routine immunization coverage.</p><p><strong>&nbsp;</strong></p><p><strong>Summary of individual country situations&nbsp;from 1 January to 2 November&nbsp;2025</strong>&nbsp;<strong></strong></p><p><strong>Algeria</strong>&nbsp;</p><p>Algeria reported a diphtheria outbreak in October 2025 in&nbsp;Skikda&nbsp;province, with 13 suspected cases and two deaths&nbsp;(CFR&nbsp;15%). Eight&nbsp;of the suspected cases&nbsp;were laboratory-confirmed, and none of the confirmed cases had received diphtheria vaccination. The outbreak affected both children and adults, with males accounting for 62.5% of confirmed cases.&nbsp;A previous&nbsp;outbreak in southern Algeria, reported in 2024, involved over 900 suspected cases and 119 deaths&nbsp;(CFR 13%). According to WHO/UNICEF estimates of national immunization coverage (WUENIC)&nbsp;for 2024,&nbsp;Algeria has high national immunization
    coverage&nbsp;(98% for the first Diphtheria-Tetanus&nbsp;toxoid-Pertussis [DTP] dose and 92% for the third),&nbsp;however&nbsp;geopolitical instability in neighboring countries has led to mass displacement into southern Algeria, where vaccination coverage among refugees is low. The lack of data since May 2025 and limited information sharing are key challenges to assessing the full scope of the outbreak.&nbsp;<strong></strong></p><p><strong>Chad</strong>&nbsp;</p><p>From 1 January&nbsp;to 2 November 2025,&nbsp;Chad reported 4&nbsp;462&nbsp;suspected diphtheria cases and 47&nbsp;deaths&nbsp;(CFR 1.1%), with only four laboratory-confirmed cases. The significant amount of suspected diphtheria cases compared to the limited number of laboratory-confirmed cases highlights the challenge in the country to obtain a laboratory-confirmed diagnosis. The outbreak&nbsp;affects&nbsp;27&nbsp;out of 215&nbsp;health districts across&nbsp;7&nbsp;of 23&nbsp;provincial health delegations, with active transmission
    ongoing in&nbsp;three&nbsp;regions. Most cases are among children aged 3&ndash;13 years, and vaccination status is unknown for the vast majority. Chad faces a complex humanitarian crisis marked by conflict, displacement, and food insecurity. The country hosts over&nbsp;1.4 million refugees, including more&nbsp;than 870&nbsp;000 Sudanese refugees and 300&nbsp;000 Chadian returnees. The health system is overwhelmed, and multiple infectious disease outbreaks,&nbsp;including yellow fever, measles, cholera, and hepatitis E,&nbsp;are occurring simultaneously. WHO, UNICEF, and MSF are supporting response efforts, but challenges include delayed reporting, insufficient case management kits, and logistical constraints. A request has been&nbsp;submitted&nbsp;to Gavi for vaccine supply and operational funding for mass immunization campaigns.&nbsp;According to WUENIC, the DTP coverage in 2024 was 84% for the first dose and 68% for the third dose.&nbsp;<strong></strong></p><p><strong>Guinea</strong>&nbsp;</p><p>Guinea
    has experienced a resurgence of diphtheria since June 2025, with&nbsp;476&nbsp;suspected cases and 123&nbsp;deaths. The CFR&nbsp;among the suspected cases&nbsp;is 25.8%, the highest among affected countries. The outbreak&nbsp;has affected&nbsp;four&nbsp;of 38 prefectures (11%), with&nbsp;human-to-human&nbsp;transmission&nbsp;concentrated in the Kankan region, particularly in&nbsp;Siguiri&nbsp;district, which accounts for over 80% of reported cases and fatalities. Laboratory confirmation&nbsp;remains&nbsp;limited, with only 70&nbsp;cases confirmed. The outbreak follows a major event in 2023 that affected multiple regions and led to over 4&nbsp;500 suspected cases. Guinea&rsquo;s response is hampered&nbsp;by&nbsp;delayed presentation to health facilities, and insufficient resources for clinical management and community engagement. The outbreak is occurring in gold mining areas with high population mobility, increasing transmission risk.&nbsp;According to WUENIC in Guinea&nbsp;for 2024,&nbsp;the
    immunization coverage&nbsp;remains&nbsp;low (77% for the first DTP dose and 63% for the third), and urgent needs include DAT supply, improved clinical pathways, and expanded vaccination efforts.&nbsp;</p><p><strong>Mali</strong>&nbsp;</p><p>From 1 January&nbsp;to 2 November 2025,&nbsp;Mali has reported&nbsp;430&nbsp;suspected diphtheria cases and 29 deaths&nbsp;(CFR&nbsp;6.7%), with&nbsp;46&nbsp;laboratory-confirmed&nbsp;cases.&nbsp;The&nbsp;outbreak has&nbsp;affected&nbsp;seven out&nbsp;of&nbsp;11&nbsp;regions (64%),&nbsp;including&nbsp;the capital city Bamako,&nbsp;with the number of affected districts increasing from&nbsp;three&nbsp;to&nbsp;30&nbsp;out of&nbsp;75&nbsp;in less than&nbsp;six weeks,&nbsp;representing&nbsp;a&nbsp;rapid&nbsp;geographic expansion. Mali is experiencing a complex humanitarian crisis driven by conflict, climate&nbsp;related&nbsp;disruptions,&nbsp;and limited access to basic services. In 2025,&nbsp;6.4 million people&nbsp;required&nbsp;humanitarian&nbsp;assistance.
    Displacement and restricted access to healthcare have contributed to low immunization coverage among vulnerable populations.&nbsp;According to WUENIC in 2024,&nbsp;estimates show 91% coverage for the first DTP dose and 82% for the third. Challenges include underreporting, limited availability of DAT, and logistical constraints. The outbreak response is&nbsp;hindered&nbsp;by concurrent emergencies and overstretched health services.&nbsp;</p><p><strong>Mauritania</strong>&nbsp;</p><p>From 1 January&nbsp;to 2 November 2025,&nbsp;Mauritania has reported&nbsp;849&nbsp;suspected cases of diphtheria and 33&nbsp;deaths&nbsp;(CFR&nbsp;4%), with&nbsp;318&nbsp;confirmed cases.&nbsp;After&nbsp;an initial&nbsp;delay, the&nbsp;outbreak was officially declared on 25 September 2025 and has rapidly expanded across 11&nbsp;out of 53 departments&nbsp;(21%). An upsurge of cases has been&nbsp;observed&nbsp;since late September. The most affected age groups are children and adolescents aged 5&ndash;19 years,
    and women account for 60% of suspected cases. Only 10% of cases have documented vaccination history. Mauritania hosts the largest refugee camp for Malians, with over 118&nbsp;000 refugees, mostly women and children. The outbreak coincides with a Rift Valley&nbsp;fever outbreak in some of the same regions. Response efforts are challenged by limited resource mobilization, weak active case finding, and insufficient community sensitization. Reactive vaccination campaigns have been&nbsp;initiated, but gaps&nbsp;remain&nbsp;in funding,&nbsp;logistics, and healthcare worker training.&nbsp;According to WUENIC in 2024, the immunization coverage is&nbsp;relatively high&nbsp;(95% for the first DTP dose and 86% for the third), but subnational disparities persist.&nbsp;</p><p><strong>Niger</strong>&nbsp;</p><p>From 1 January&nbsp;to 2 November 2025,&nbsp;Niger has reported 1&nbsp;926&nbsp;suspected diphtheria cases and 122&nbsp;deaths&nbsp;CFR (6.3%), with 765 laboratory-confirmed cases. The outbreak
    has affected 34 out of&nbsp;72 health&nbsp;districts (47%)&nbsp;across eight regions, with most cases concentrated in Agadez, Diffa and Zinder. Compared to 2024, there&nbsp;have&nbsp;been fewer reported&nbsp;cases and deaths, but transmission&nbsp;remains&nbsp;active. Niger is facing a protracted humanitarian crisis driven by insecurity,&nbsp;climate related&nbsp;disruptions,&nbsp;economic pressures, and displacement. An estimated&nbsp;2.6 million people&nbsp;require&nbsp;humanitarian&nbsp;assistance.&nbsp;According&nbsp;to WUENIC&nbsp;in 2024, the immunization coverage is&nbsp;relatively high&nbsp;(95% for the first DTP dose&nbsp;and 86% for the third), but recent outbreaks highlight gaps in vaccine access and delivery. A vaccination campaign in September 2025 achieved high coverage, and a second round is planned. Challenges include limited diagnostic and treatment capacity, insufficient vaccine quantities, low public awareness, and funding constraints.&nbsp;</p><p><strong>Nigeria</strong>&nbsp;</p><p>Nigeria
    continues to report the highest number of diphtheria cases in the African Region.&nbsp;From 1 January to 2 November 2025,&nbsp;12 150&nbsp;suspected cases have been reported, with&nbsp;8 587&nbsp;confirmed and&nbsp;884&nbsp;deaths&nbsp;(CFR&nbsp;7.2%).&nbsp;Confirmed cases&nbsp;have been&nbsp;reported&nbsp;from 240 Local Government Areas across 30 states.&nbsp;Most cases are clinically compatible, with only 3% confirmed by laboratory testing. The outbreak has disproportionately affected children and adolescents, with low vaccination coverage contributing to the spread.&nbsp;&nbsp;In&nbsp;Nigeria&nbsp;more than&nbsp;2 million children&nbsp;are&nbsp;under-immunized, including those with zero-doses,&nbsp;highlighting the&nbsp;high risk&nbsp;of further spread.&nbsp;&nbsp;Reactive campaigns have been conducted in Imo, Kaduna and Lagos, targeting health workers and priority populations. The outbreak overlaps with areas targeted by the Big Catch-up initiative. Challenges include delayed laboratory
    confirmation, poor IPC practices, limited information, education and communication materials, and vaccine shortages. Discussions with Gavi are ongoing to secure&nbsp;additional&nbsp;support.&nbsp;According to WUENIC in 2024, the&nbsp;estimates show 71% coverage for the first DTP dose and&nbsp;67% for the third.&nbsp;</p><p><strong>South Africa</strong>&nbsp;</p><p>From 1 January to&nbsp;26 October&nbsp;2025,&nbsp;South&nbsp;Africa has reported 106 diphtheria cases, including 66 laboratory-confirmed respiratory cases, two laboratory-confirmed cutaneous cases, one probable respiratory case, and 37 asymptomatic carriers. The outbreak has affected 5 of 9 provinces (55%), highlighting&nbsp;the&nbsp;involvement of multiple provinces.&nbsp;&nbsp;Most cases and carriers are from the Western Cape, with&nbsp;additional&nbsp;clusters in Limpopo, Gauteng, KwaZulu-Natal, and Mpumalanga.&nbsp;&nbsp;CFR among probable and confirmed respiratory diphtheria cases was 18% (12/67). Most respiratory cases&nbsp;occurred&nbsp;in
    adults aged 18 years and older. Clusters have been documented among vulnerable populations, including individuals in&nbsp;correctional facilities.&nbsp;According to WUENIC in 2024, the&nbsp;immunization coverage&nbsp;remains&nbsp;below 80% in most provinces (76% for the first DTP dose and 74% for the third), and immunity gaps are widening. The outbreak response is challenged by competing priorities, limited human resources, and limited global supply of diphtheria antitoxin. Detailed case investigations and in-depth risk assessments are needed to guide targeted interventions.&nbsp;<strong></strong></p><p><strong>Geographical&nbsp;distribution&nbsp;of diphtheria&nbsp;outbreaks&nbsp;in&nbsp;the WHO African Region,&nbsp;January&nbsp;2025&nbsp;until&nbsp;2 November&nbsp;2025</strong>&nbsp;</p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies-and-disasters/map---diphtheria.jpg?sfvrsn=57f5364e_1" height="420" style="max-width:100%;height:auto;"
