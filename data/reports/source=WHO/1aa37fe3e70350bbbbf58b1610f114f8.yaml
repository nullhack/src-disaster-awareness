  Response: <p>WHO, together with its partners, continues to support national authorities in responding to ongoing diphtheria outbreaks across affected countries. Assistance focuses on both technical and operational needs.</p><p>At the country level, the scope of response operations varies according to available capacities, but core interventions remain consistent. These include enhanced surveillance through active case finding and timely reporting; adequate clinical management, including the appropriate use of antitoxin and antibiotics; risk communication and community engagement to improve public awareness and encourage care-seeking; and capacity-building efforts such as training and dissemination of evidence-based guidelines. Country-specific actions and priority needs differ, ranging from strengthening surveillance and coordination to scaling up vaccination, laboratory capacity, and medical supplies.</p><p>Despite these efforts, multiple challenges continue to hinder the effectiveness
    of outbreak control. Competing health priorities have contributed to long-standing immunity gaps, reflected in persistently low vaccination coverage, especially in fragile settings. Similarly, case management capacity is also limited due to scarcity of diphtheria antitoxin and late presentation of patients, resulting in high case fatality rates, especially in vulnerable, marginalized and hard-to-reach populations. In some settings, surveillance systems remain fragile, resulting in delayed detection and incomplete reporting. Limited laboratory capacity further complicates the response, with shortages of diagnostic supplies, weak specimen transport systems, and restricted technical expertise leading to delayed confirmation and underestimation of outbreak magnitude.<strong></strong></p>
