  Title: Hepatitis E - Chad
  Epidemiology: <p>Hepatitis E is a liver disease caused by the hepatitis E virus (HEV). Hepatitis E is found worldwide and is common in countries of Sub-Saharan Africa and Asia with limited access to adequate safe drinking water, poor sanitation and personal hygiene, limited health services or in areas of humanitarian emergencies. </p><p>HEV is transmitted by the fecal-oral route, mainly through contaminated water. The risk factors for hepatitis E are related to poor sanitation conditions, which allow the virus excreted in the feces of infected subjects to reach water intended for human consumption. The infection resolves spontaneously in 2-6 weeks with a 0.5-4% lethality. Fulminant hepatitis, a severe liver function impairment caused by HEV, is more common in pregnancy. Pregnant women, especially in their second and third trimesters, are at increased risk of acute liver failure, fetal loss, and mortality. The case-fatality rate can be as high as 10%-50% in women in their last trimester
    of pregnancy.&nbsp;</p>
  Advice: '<p>Hepatitis E is a liver disease caused by the hepatitis E virus (HEV). Hepatitis E is found worldwide and is common in countries with limited access to adequate and clean drinking water, good sanitation and hygiene (hand washing with soap, environmental and domestic hygiene), and adequate health services, or in areas affected by humanitarian emergencies.</p><p>Prevention is the most effective approach against this disease. At the population level, the most important interventions to reduce the transmission of HEV and the number of hepatitis E cases are provision of safe drinking water, quality standards for public water supplies and provision of safely managed sanitation services.<sup>2</sup>&nbsp;At the individual level, &nbsp;risks can be reduced by maintaining hygienic practices such as washing hands with clean water and soap - especially before handling food, avoiding consumption of water and/or ice of unknown purity, and following WHO hygiene practices for food safety.
    </p><p>To prevent the spread of hepatitis E, WHO recommends improving access to safe drinking water through water treatment and adequate sanitation. The quality of drinking water should be regularly monitored in areas affected by the epidemic. Coverage of improved latrines and safe drinking water sources should be increased to prevent open defecation and to ensure proper hand hygiene. Health promotion and prevention activities, as well as ensuring early, appropriate, and equitable healthcare services to combat hepatitis E epidemics, can help improve public health outcomes, especially in resource-limited settings. Since the incubation period for hepatitis E ranges from 2-10 weeks, cases may continue to occur up to the tenth week (maximum incubation period) even after measures to ensure safe water, sanitation and hygiene promotion have been adopted.</p><p>Interventions must target vulnerable populations by establishing or strengthening antenatal diagnosis for pregnant women with symptoms,
    improving the population''s hygiene conditions, strengthening national capacities for diagnosis and clinical case management, and cross-border collaboration with neighbouring countries.</p><p>Although there is no specific treatment for HEV infection, there are some important general principles for triage of persons with features of acute liver failure in need of hospital care and treatment of complications. These are addressed in WHO guidance (Waterborne outbreaks of hepatitis E: chapter on diagnosis and case management of hepatitis E in outbreak settings). There may be special situations such as outbreaks where the risk of hepatitis E or of its complications or mortality is particularly high.&nbsp;&nbsp; </p><p>To date, the only hepatitis vaccine available is the HEV 239 recombinant vaccine (Hecolin&reg;), licensed in China and Pakistan. WHO does not make a recommendation on the introduction of the vaccine for routine use in national programmes in populations where epidemic and sporadic
    hepatitis E disease is common. However, WHO recommends that national authorities should consider using the vaccine to mitigate or prevent outbreaks of hepatitis E and mitigate consequences in high-risk groups, such as pregnant women. &nbsp;</p><p>WHO advises against applying any travel or trade restrictions based on the current information available on this event.</p>'
  Assessment: <p>The outbreak is occurring in the Ouaddai province which has been heavily affected by an influx of refugees and returnees fleeing armed conflict in neighbouring Sudan since April 2023. The majority of hepatitis E cases have been reported from the Adr&eacute; health district hosting three refugee camps with an average of 50&nbsp;000 refugees per camp and a temporary refugee site housing approximately 170&nbsp;000 refugees (UNHCR estimate).</p><p>The risk at the national level is assessed as high due to the continuous population movements between different refugee camps and host communities; poor hygiene conditions, low access to safe drinking water and improved sanitation facilities including wastewater management as well as limited access to essential medical services in the affected camps; challenges in the management of cases among pregnant women. In addition, the limited financial capacity to effectively contain the outbreak also contributes to increasing the risk of spreading
    the disease in the Ouaddai province and across the rest of the country.</p><p>Although no ongoing outbreak of hepatitis E has been reported officially in countries bordering Chad, the overall risk at the regional level is considered moderate because of the continued population movements between Chad and Sudan or the Central African Republic that raise fears of the spread of the epidemic in the sub-region. At the global level, the risk is considered low.</p>
  Overview: <p>On 5 March 2024, WHO was notified by the Chad IHR NFP of an outbreak of hepatitis E in the eastern Ouaddai province of Chad. The initial&nbsp;alert of two cases of Acute Jaundice Syndrome (AJS) was raised on 2 January 2024, by a mobile clinic team supported by M&eacute;decins Sans Fronti&egrave;res (MSF) - Switzerland operating at the temporary high school refugee site in the Adr&eacute; health district of Ouaddai province. </p><p>From 2 January to 15 February 2024, 113 AJS cases were notified from the Adr&eacute; health district. Of the 113 cases, 28 (24.7%) were tested using a rapid diagnostic test (RDT) for hepatitis E by MSF - Switzerland, eleven (39.2%) of which were positive. On 19 February 2024, the Hadjer-Hadid health district, bordering the Adr&eacute; district, also notified its first suspected case of hepatitis E in the Allasha refugee camp.</p><p>Between 1 and 19 March 2024, a total of 40 samples were tested by PCR at the Institute Pasteur of Dakar, S&eacute;n&eacute;gal,
    for hepatitis E, yellow fever, dengue, West Nile fever, Zika, chikungunya, Rift Valley fever and Crimean-Congo haemorrhagic fever<a name="_Hlk165885828" data-sf-ec-immutable="">. </a>Of the 40 samples, 36 (90%) were positive for hepatitis E. The median age among the confirmed cases is 36 years (range from 2 to 55 years). The male-to-female ratio among confirmed cases is 0.9 and three confirmed cases were in pregnant women.</p><p>From 2 January to 28 April 2024, a total of 2092 suspected hepatitis E cases including seven deaths (CFR 0.3%) were reported from two health districts of the Ouaddai province, namely, Adr&eacute; and Hadjer-Hadid. Among the 2092 suspected cases, 103 (4.9%) were from the host community and 1989 (95%) were reported from seven refugee camps and transit sites located in five health areas of the Adr&eacute; health district (Aboutengu&eacute;site, Ambelia site, Hilouta camp, Lyc&eacute;e d'Adr&eacute; site and Metch&eacute; camp) and Hadjer-Hadid health district (Allasha
    camp and Arkoum camp).&nbsp; Most cases have been reported from the Adr&eacute; health district in Lyc&eacute;e d'Adr&eacute; site (966; 46.2%), Aboutengu&eacute; camp (531 cases;25.4%) and Metch&eacute; camp (347 cases; 16.6%). Males (1160 cases; 55.4%) are the most affected. A total of 27 pregnant women (1.3%) have been reported among the suspected cases. The most affected age groups are 6-17 years (1113 cases) and 18-59 years (500 cases), representing 53.2% and 23.9% of the suspected cases respectively. &nbsp;</p><p>Hepatitis E often occurs in humanitarian settings such as in areas affected by conflict and in displacement sites. &nbsp;Since January 2024, suspected cases of hepatitis E have been reported from camps hosting Sudanese refugees and Chadian returnees in the Ouaddai province of eastern Chad. Limited access to safe drinking water and inadequate sanitation and hygiene increases the risk of hepatitis E virus outbreaks in humanitarian settings such as war zones and camps for
    refugees and internally displaced people. The last hepatitis E outbreaks reported in Chad affected the Southeastern province of Salamat in 2017, with more than 1800 cases and 23 deaths recorded, and the southwestern province of Tandjile in 2021 with over 380 cases and two deaths reported.</p>
