  Response: <p><ul><li>The Public Health Emergency Operations Centre in Chad has been activated and an Incident Manager has been nominated by the national health authorities. </li><li>A response plan has been developed to guide response activities and help with resource mobilization.</li><li>Response activities are ongoing in the affected districts with partners support (WHO, MSF Spain, MSF Switzerland, UNICEF, WFP, UNHCR), including strengthened epidemiological surveillance, laboratory confirmation of cases, case management, infection prevention and control (IPC), water, sanitation and hygiene (WASH), risk communication and community engagement (RCCE).</li><li>WHO deployed a multidisciplinary team in Adr&eacute; to support setting up the response (coordination of health partners, harmonization of line lists, sample collection and shipment to Institute Pasteur of Dakar, etc).</li><li>Community health workers have been trained by WHO and MSF Switzerland to support case detection, active case
    search and community sensitization in refugee and returnee camps.</li><li>Borehole construction, pit latrine construction and faecal sludge emptying are being conducted with the support of WASH partners including MSF Spain and UNICEF.</li><li>Sanitary inspections have been conducted of the water sources used by the affected populations.<sup style="background-color:transparent;color:inherit;font-family:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">1&nbsp;</sup></li><li><sup style="background-color:transparent;color:inherit;font-family:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></sup>The need to conduct vaccination is being assessed by the Ministry of Public Health and Prevention.</li></ul><div><div id="ftn1"><p><br /></p></div></div></p>
