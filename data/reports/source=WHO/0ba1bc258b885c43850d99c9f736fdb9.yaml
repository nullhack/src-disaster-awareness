  Advice: '<p>Human-to-human transmission of Marburg virus is primarily associated with direct contact with the blood and/or other bodily fluids of infected people. WHO advises the following risk reduction measures be taken as an effective way to reduce MVD transmission and control an outbreak.</p><p><strong>Prevention</strong>: Protective measures individuals should take to reduce human exposure to the virus include: </p><ul><li>Reduce the risk of human-to-human transmission in the community arising from direct or close contact with infected patients, particularly with their body fluids. Close physical contact with MVD patients should be avoided. </li><li>People suspected or confirmed for MVD should immediately seek care in health facilities and be isolated in a designated treatment centre for early care and to avoid transmission at home.</li><li>Community and family members should avoid caring for symptomatic individuals at home, and avoid touching bodies of people deceased with MVD symptoms.
    They should avoid touching other potentially contaminated items and surfaces. They should be encouraged to go to a health facility for assessment and treatment if they have symptoms.</li><li>Reduce the risk of bat-to-human transmission arising from prolonged exposure to mines or caves inhabited by fruit bat colonies. During work or research activities or tourist visits in mines or caves inhabited by fruit bat colonies, people should wear gloves and other appropriate protective clothing (including masks). During outbreaks, all animal products (blood and meat) should be thoroughly cooked before consumption.</li></ul><p><strong>Coordination:</strong> Multisectoral coordination and pillar meetings at all levels and sharing of detailed situation reports is encouraged. Involvement of different stakeholders and partners in preparedness and response activities is also encouraged. To ensure an effective and sustained response, resource mobilization efforts within the government and with partners
    are recommended.</p><p><strong>Risk communication and community engagement</strong>: Raising public awareness and engaging with communities are important for successfully controlling MVD outbreaks. This includes raising awareness of symptoms, risk factors for infection, protective measures and the importance of seeking immediate care at a health facility. Sensitive and supportive information about safe and dignified burials is also crucial. This awareness should be increased through targeted campaigns and direct work with communities. Special attention should be given to high-risk groups, such as traditional healers, clergy, and community leaders, who may inadvertently facilitate disease spread, and who are important sources of information for the community. Misinformation and rumours should be addressed to foster trust and promote early symptom reporting.</p><p><strong>Surveillance:</strong> Active case detection, contact tracing, and alert management across affected and neighbouring
    regions should be intensified. Community-based surveillance systems should be strengthened to promptly identify and report new cases, particularly in high-risk areas. Close monitoring of healthcare workers, family members and individuals who have had contact with suspected cases or other high-exposure settings should be ensured. Surveillance capacities should also be intensified at relevant points of entry and borders to reduce the risk of further spread, including internationally.</p><ul type="disc"><li data-list="1" data-level="1"><strong>Infection prevention and      control (</strong><strong>IPC) measures</strong>: critical infection      prevention and control measures should be implemented and/or strengthened      in all health care facilities, per <a href="https://www.who.int/publications/i/item/WHO-WPE-CRS-HCR-2023.1" target="_blank">WHO&rsquo;s Infection prevention and control guideline      for Ebola and Marburg disease</a>, which highlighted the importance of the      rapid
    implementation of the IPC ring approach including but not limited to      IPC rapid assessment, decontamination of the health facilities and      household and early detection and identification of the cases through the      screening and isolation of the suspected cases to minimize the      transmission risk.<strong></strong></li></ul><ul type="disc"><li data-list="0" data-level="1">Health workers caring for      patients with confirmed or suspected MVD should apply <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2%22%20%EF%B7%9FHYPERLINK%20%22https:/www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2" target="_blank">transmission-based precautions</a> in addition to: <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1%22%20%EF%B7%9FHYPERLINK%20%22https:/www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1" target="_blank">standard precautions</a>, including appropriate      use of personal protective equipment (PPE) and hand hygiene according
    to      the <a href="https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21%22%20%EF%B7%9FHYPERLINK%20%22https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21" target="_blank">WHO 5 moments</a> to avoid contact with      patient&rsquo;s blood and other body fluids and with contaminated surfaces and      objects. Waste generated in healthcare facilities must be safely      segregated, safely collected, transported, stored, treated and finally      disposed. Follow the national guidelines, rules and regulations for safe      waste disposal or follow the <a href="https://iris.who.int/bitstream/handle/10665/85349/9789241548564_eng.pdf;sequence=1%22%20%EF%B7%9FHYPERLINK%20%22https:/iris.who.int/bitstream/handle/10665/85349/9789241548564_eng.pdf;sequence=1"
    target="_blank">WHO&rsquo;s guidelines on safe waste management</a>&nbsp;</li></ul><ul type="disc"><li data-list="2" data-level="1">Patient-care activities      should be undertaken in a clean and hygienic environment that facilitates      practices related to the prevention and control of health-care-associated      infections (HAIs) as outlined in <a href="https://www.who.int/publications/i/item/9789241547239" target="_blank">Essential environmental health standards in      health care.</a> Safe water, adequate sanitation and hygiene      infrastructure and services should be provided in healthcare facilities.      For details on recommendations and improvement, follow the <a href="" target="_blank">WASH FIT      implementation Package</a></li></ul><p><strong>Laboratory testing:</strong> The processing and analysis of samples should be expedited, with results promptly shared with responders and clinicians to guide patient management, containment strategies and broader response efforts.
    This includes genomic sequencing on positive samples. International referral of samples to a regional reference laboratory should be considered for inter-laboratory comparison. </p><p><strong>Evaluation of candidate medical countermeasures</strong>: There are no licensed vaccines or therapeutics against MVD. Several candidate vaccines are in the pipeline and outbreaks offer an opportunity to assess their efficacy and safety. There are <a href="https://www.who.int/teams/blueprint/ebolavirus">protocols available</a> and a network of experts in filovirus ready to support national researchers. &nbsp;&nbsp;</p><p><strong>Safe and dignified burials</strong>: Safe and dignified burial protocols should be implemented for people who have died to minimize community exposure. Additional training and equipment for healthcare workers and burial teams should be provided to ensure safe management of MVD-related fatalities. Thorough community engagement is required to ensure that affected communities
    are empowered to adhere to the protocol.</p><p><strong>Case management and mental health and psychosocial support:</strong> Isolation and treatment facilities should be adequately equipped to ensure the safety and efficacy of patient care, while simultaneously preventing the spread of the disease. Supportive care such as rehydration, symptom management, and psychological support for patients and their families is essential to improving survival rates and mitigating the outbreak''s impact.</p><p><strong>Border health and c</strong><strong>ross-border coordination:</strong> Surveillance and response capacities should be strengthened at relevant points of entry, onboard conveyances, and in border regions to prevent further spread, including internationally. Cases, contacts and individuals in affected areas who present signs and symptoms compatible with case definitions should be advised not to travel in line with WHO&rsquo;s border health and points of entry technical guidance for filovirus
    disease outbreaks. Collaboration with neighbouring countries should be enhanced to harmonize reporting mechanisms, conduct joint investigations, and share critical data in real-time. Surrounding countries should enhance readiness activities to enable early case detection, isolation and treatment. </p><p><strong>Preparedness and Readiness:</strong> Readiness assessments in high-risk regions should be conducted to ensure response mechanisms, such as mobile labs and isolation units, are adequately equipped to manage new cases.</p><p>Based on the current risk assessment, WHO advises against any travel and trade restrictions with the United Republic of Tanzania.</p>'
  Assessment: <p>The risk of this suspected MVD outbreak is assessed as <strong>high</strong> at the national level due to several concerning factors. The suspected outbreak thus far involves at least nine suspected cases, including eight deaths, resulting in a high CFR of 89%. Healthcare workers are included among the suspected cases affected, highlighting the risk of nosocomial transmission. The source of the outbreak is currently unknown.</p><p>The reporting of suspected MVD cases from two districts suggests geographic spread. The delayed detection and isolation of cases, coupled with ongoing contact tracing, indicates lack of a full information of the current outbreak. More cases are expected to be identified. </p><p>The regional risk is considered <strong>high</strong> due to Kagera region's strategic location as a transit hub, with significant cross-border movement of the population to Rwanda, Uganda, Burundi and the Democratic Republic of the Congo. Reportedly, some of the suspected
    cases are in districts near international borders, highlighting the potential for spread into neighbouring countries. &nbsp;MVD is not easily transmissible (i.e. in most instances, it requires contact with the body fluids of a sick patient presenting with symptoms or with surfaces contaminated with these fluids). However, it cannot be excluded that a person exposed to the virus may be travelling.</p><p>The global risk is currently assessed as <strong>low</strong>. There is no confirmed international spread at this stage, although there are concerns about potential risks. Kagera region, while not close to Tanzania's capital or major international airports, is well-connected through transportation networks, and has an airport that connects to Dar es Salaam for onward travel outside Tanzania by air. This highlights the need for enhanced surveillance and case management capacities at relevant points of entry and borders, and close coordination with neighbouring countries to strengthen readiness
    capacities.</p><p></p>
  Overview: <p><strong><em>An addendum was added to this Disease Outbreak News on 21 January 2025 to include the declaration of the outbreak by national authorities of the United Republic of Tanzania.&nbsp;</em></strong></p><p><strong>Introduction</strong></p><p>On 13 January 2025, WHO informed its Member States and IHR State Parties of an outbreak of suspected Marburg Virus Disease (MVD) in the Kagera region of the United Republic of Tanzania using our secure web-based platform&mdash;the Event Information Site (EIS). Under the International Health Regulations, the EIS is used to issue rapid alerts to Member States of acute and rapidly developing public health risks and events with possible international implications.</p><p><strong>Summary of the situation</strong></p><p>On 10 January 2025, WHO received reliable reports from in-country sources regarding suspected cases of MVD in the Kagera region of the United Republic of Tanzania. Six people were reported to have been affected, five of
    whom had died. The cases presented with similar symptoms of headache, high fever, back pain, diarrhoea, haematemesis (vomiting with blood), malaise (body weakness) and, at a later stage of disease, external haemorrhage (bleeding from orifices).</p><p>As of 11 January 2025, nine suspected cases were reported including eight deaths (case fatality ratio (CFR) of 89%) across two districts &ndash; Biharamulo and Muleba.&nbsp; Samples from two patients have been collected and tested by the National Public Health Laboratory. Results are pending official confirmation. Contacts, including healthcare workers, are reported to have been identified and under follow-up in both districts.</p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">The Bukoba district in Kagera region experienced </span>its <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2023-DON471" style="text-align:inherit;text-transform:inherit;word-spacing:normal;white-space:inherit;">first
    MVD outbreak</a><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"> in March 2023, and zoonotic reservoirs, such as fruit bats, remain endemic to the area. The outbreak in March 2023 lasted for nearly two months with nine cases including six deaths.&nbsp;</span></p><p>&nbsp;</p>
