  Response: <p>National rapid response teams have been deployed to support outbreak investigation and response; surveillance activities have been intensified with contact tracing ongoing; laboratory samples from recent cases have been sent for confirmation at the National Public Health Laboratory. A mobile laboratory is located in Kagera region and treatment units have reportedly been established.</p>
