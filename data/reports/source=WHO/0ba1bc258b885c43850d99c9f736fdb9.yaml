    to DON on suspected MVD outbreak in </strong><strong>the United Republic of&nbsp;</strong><strong>Tanzania published on 14 January 2025 </strong></p><p>On 20 January 2025, the President of the United Republic of Tanzania officially declared an outbreak of Marburg Virus Disease (MVD) following the detection of one confirmed case from Biharamulo district, Kagera region, located in the northwestern part of the country. &nbsp;The case was confirmed positive at the Kabaile mobile laboratory in the Kagera region and the National Reference Laboratory in Dar es Salaam. In addition, 25 suspected cases tested negative for MVD. Additional epidemiological information on the cases including the health status is not currently available. Epidemiological investigations are ongoing related to additional probable and suspected cases reported previously and a field mission, comprising of experts from the Ministry of Health, WHO and partners is being deployed. </p><p>WHO is supporting Tanzanian health authorities
    to enhance key outbreak control measures including disease surveillance, testing, treatment, infection prevention and control, case management, and increasing risk communication and public awareness among communities to prevent further virus spread.&nbsp;</p>'
