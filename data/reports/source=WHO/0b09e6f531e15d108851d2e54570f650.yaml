  Epidemiology: <p>Animal influenza viruses typically circulate within animal populations but some have the potential to infect humans. Human infections are predominantly acquired through direct contact with infected animals or exposure to contaminated environments. Based on the original host species, influenza A viruses can be categorized into subtypes such as avian influenza, swine influenza, and other animal-origin influenza subtypes.</p><p>Human infection with avian influenza viruses may result in a spectrum of illness, ranging from mild upper respiratory tract symptoms to severe, life-threatening conditions. Clinical manifestations include conjunctivitis, respiratory, gastrointestinal symptoms, encephalitis, and encephalopathy. In some cases, asymptomatic infections with the A(H5N1) virus have been detected in individuals with known exposure to infected animals and environments. </p><p>A definitive diagnosis of human avian influenza infection requires laboratory confirmation. WHO regularly
    updates its technical guidance on the detection of zoonotic influenza, utilizing molecular diagnostic methods such as RT-PCR. Clinical evidence indicates that certain antiviral agents, particularly neuraminidase inhibitors (e.g., oseltamivir, zanamivir), have been shown to shorten the duration of viral replication and improve patient outcomes in some cases.</p><p>From 2003 to 10 April 2025, 972 cases of human infections with avian influenza A(H5N1), including 470 deaths (CFR 48.4%), have been reported to WHO from 24 countries. Almost all of these cases have been linked to close contact with infected live or dead birds, or contaminated environments.</p>
