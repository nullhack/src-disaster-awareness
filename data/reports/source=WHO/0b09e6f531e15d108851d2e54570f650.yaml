  Response: <p>In response to this detection, additional investigation and surveillance activities are underway, coordinated by local and national health authorities, with involvement from both the animal and environmental sectors. These activities include:</p><ul><li>Conducting a comprehensive epidemiological investigation of the case and contacts, including the collection of respiratory samples from symptomatic household contacts and healthcare workers, alongside ongoing follow-up and monitoring of close contacts.</li><li>Strengthening surveillance of respiratory viruses (including influenza-like illness [ILI] and severe acute respiratory infection [SARI]), with a particular focus on influenza viruses, in order to identify and analyze any atypical respiratory patterns or trends in the region.</li><li>Activating the One Health approach, involving SENASICA and national environmental agencies (SEMARNAT and CONANP), to ensure inter-institutional coordination, assess potential animal health
    risks, evaluate possible exposures within the community and animal populations, and notify the National Epidemiological Surveillance Committee (CONAVE). </li><li>Undertaking regular reporting of HPAI incidence in poultry and wild birds to the World Organisation for Animal Health (WOAH). The latest update on 5 March 2025 reported active surveillance and timely outbreak notifications, with a recent detection in the State of Durango. Consequently, local poultry farmers have been urged to reinforce biosecurity measures on their farms and backyard operations, and to immediately report any observed anomalies in animal health to the relevant authorities. Ongoing epidemiological surveillance is being maintained in poultry production units, backyards, federally inspected slaughterhouses, municipal slaughterhouses, and through national-level monitoring of wild bird populations.</li></ul>
