  Response: '<p>Regional and National Public Health Authorities in the Americas Region are implementing public health measures to control the outbreak, and WHO is providing support by: </p><ul><li>Issuing epidemiological alerts and updates due to the increase in measles cases in several countries in the WHO Region of the Americas that started in 2024. </li><li>Issuing the Public Health Risk Assessment related to measles in the region of the Americas, classified the risk as "High", especially in countries with low vaccination coverage.</li><li>Continuing to monitor the situation and work closely with countries in the Region of the Americas to support their vaccination, surveillance and rapid outbreak response efforts to prevent the spread and reintroduction of measles and to protect the health of the entire population.</li><li>Providing technical assistance and follow-up with laboratories in<br />countries that have had cases/outbreaks.</li><li>Strengthening countries&rsquo; rapid response
    capacities by 1) training healthcare workers in rapid response to outbreaks, using hybrid workshops and virtual courses; 2) providing financial funds for international consultants&rsquo; deployment in the most affected areas in LAC; 3) having virtual follow-up meetings with countries.</li><li>Promoting mass follow-up vaccination campaigns in<br />countries with highly susceptible populations to rapidly reduce the risk of the reintroduction of endemic measles and rubella in the countries of the Region.</li><li>Enhancing risk communication and community engagement in countries where outbreaks have occurred, to reinforce their commitment to immunization and recommended actions.</li></ul>'
