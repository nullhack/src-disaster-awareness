  Response: <p>WHO is providing continued support to the Government of India through technical advice, updates on risk assessment and updating contingency plans- both in the human and animal sectors in line with the global guidance.</p><p>The Government of India has implemented the following coordination activities in response to the incident:</p><ul type="disc"><li>A team      composed of a public health specialist, a paediatrician, and veterinary officials      from the Animal Husbandry Department and Veterinary College, and the      Government of West Bengal was constituted to investigate the occurrence of      influenza-like illness (ILI) in local poultry.</li><li>Surveillance of ILI in humans was enhanced in the reporting      district and in neighbouring areas.</li><li>The District Veterinary Department enhanced surveillance of      animals.</li><li>The Animal Husbandry Department will share information regarding      surveillance of avian influenza viruses (all subtypes under surveillance)      in
    poultry, wild birds, etc., in the affected and adjoining areas with      State Health authorities and at the central level with the Ministry of      Health and Family Welfare, Government of India.</li></ul><ul><li>WHO continues to support the strengthening of country IHR core capacities, ensuring that Ministry of Health and Department of Animal Husbandry colleagues, along with partners, are kept informed about emerging global risks of avian influenza at the animal-human interface.</li><li>In accordance with the One Health Joint Plan of Action (OH JPA), WHO is actively working to enhance the One Health approach by building capacity for joint risk assessments.</li></ul><ul type="disc"><li>WHO is providing      technical support to update country-specific avian/pandemic influenza      contingency plans, as requested.</li></ul>
