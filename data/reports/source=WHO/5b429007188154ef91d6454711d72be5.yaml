  Response: <p>The Ministry of Health of KSA implemented the following response measures-<br /></p><p><strong>Infection prevention and control (IPC) measures in healthcare settings:</strong></p><ul><li>Regular training of health and care workers on IPC measures.</li><li>Implementation of stringent IPC measures, including triage protocols, use of personal protective equipment (PPE), and isolation procedures for suspected cases.</li><li>Prompt isolation of cases and quarantine of contacts.</li></ul><p><strong>Surveillance and testing:</strong></p><ul><li>Rigorous contact tracing and testing of high-risk contacts, including healthcare workers.</li><li>Inclusion of MERS-CoV in sentinel surveillance testing algorithms since 2023.</li></ul><p><strong>Public health awareness and hygiene practices:</strong></p><ul><li>Public health awareness campaigns to prevent human-to-human transmission.</li><li>Advising people with underlying chronic medical conditions to avoid close contact with animals, particularly
    dromedaries.<br /></li></ul>
