  Summary: 'On 27 May 2024, the Ministry of Public Health of Cuba reported outbreaks of Oropouche virus disease from two provinces, Santiago de Cuba and Cienfuegos. Oropouche virus disease is an arboviral disease caused by the Oropouche virus (OROV). It is transmitted to humans through midge (small fly) or mosquito bites. To date, there is no evidence of human-to-human Oropouche virus transmission. This is the first detection of the disease in the country, therefore, the population is likely highly susceptible and there is significant risk of additional cases being detected.  '
