  Response: '<p>Local and national health authorities are implementing the following public health measures:&nbsp;&nbsp;<br /></p><p>The country has established a plan to address arboviruses, which includes integrated and comprehensive actions by various entities, namely: Organization and Control of Contingency Actions; Vector Control and Entomological Surveillance; Epidemiological Surveillance; Medical Assistance; Environment and Community Participation; Research and Development; and Logistics. </p><p>The actions in the plan include:&nbsp;<br /></p><ul><li>Temporary working groups activated to analyze the epidemiological situation and conduct field operations.</li><li>Definition of criteria for suspected and confirmed cases of the disease.</li><li>Training all personnel of the National Public Health System on arboviruses, including OROV.</li><li>Strengthening human resources for medical care in health areas with transmission.</li><li>Reinforcement of vector control actions including focal
    treatment in transmission and very high-risk blocks, adulticidal treatment and increased entomological surveillance in transmission areas.</li><li>Intensified environmental sanitation actions.</li><li>An informative note was issued on the situation.<br /></li></ul>'
