  Advice: <p>The proximity of midge vector breeding sites to human habitations is a significant risk factor for OROV infection. Prevention strategies are based on control or eradication measures against the arthropod vectors and personal protection measures. Vector control measures rely on reducing midge populations through the eradication of breeding sites, achieved by reducing the number of natural and artificial water-filled habitats that support midge larvae, thereby reducing the adult midge populations around at-risk communities. Personal protection measures rely on prevention of midge bites using mechanical barriers (mosquito nets), insect repellant devices, repellent-treated clothing and anti-mosquito repellents. Chemical insecticides such as deltamethrin and N,N-Diethyl-meta-toluamide (DEET) have been demonstrated to be effective in controlling <em>Culicoides</em> and <em>Culex</em> species.&nbsp;<br /></p> <p>Given its clinical presentation and considering that this is the beginning
    of the dengue season in the Caribbean and other vector-borne diseases in the Region of the Americas, laboratory diagnosis is essential to confirm cases, characterize an outbreak, and monitor disease trends.&nbsp;&nbsp;<br /></p> <p>Since it is an emerging and poorly identified arbovirus in the Americas, the detection of a positive sample and confirmation of a case requires the use of Annex 2 of the IHR and its consequent notification through the established channels of the International Health Regulations (IHR).<br /></p> <p>WHO advises against applying any travel or trade restrictions based on the current information available on this event.<br /></p>
  Assessment: <p>This is the first detection of the disease in the country, therefore, the population is likely highly susceptible and there is a significant risk of additional case detection. &nbsp;To date, there is no evidence of human-to-human Oropouche virus transmission. <br /></p> <p>In the Region of the Americas, outbreaks of Oropouche virus disease have occurred mainly in the Amazon region over the past 10 years. The virus is endemic in many South American countries, in both rural and urban communities. Outbreaks are periodically reported in Brazil, Bolivia, Colombia, Ecuador, French Guiana, Panama, Peru, and Trinidad and Tobago.&nbsp;&nbsp;<br /></p> <p>There is a risk of the disease spreading internationally as Cuba is an international tourist destination and the putative vector is widely distributed in the Americas region. Additionally, there are currently other countries with active OROV circulation.<br /></p>
  Overview: '<p><p>On 27 May 2024, the Ministry of Public Health of Cuba reported the first ever outbreak of Oropouche virus disease. A total of 74 confirmed cases were reported from Province of Santiago de Cuba (n=54), and from Province of Cienfuegos (n=20). These cases were detected through strengthened monitoring and surveillance actions following an increase in cases with non-specific febrile illness in the provinces of Santiago de Cuba, with the municipalities of Santiago de Cuba and Songo La Maya reporting 29 and 25 cases each; and in the province of Cienfuegos where eight cases were reported from Cienfuegos, five from Rodas, five from Abreu, and one each from Aguada de Pasajeros and Cumanayagua municipalities. OROV was identified in 74 samples of the 89 samples tested at the national reference laboratory of the Pedro Kour&iacute; Institute (IPK per its acronym in Spanish).&nbsp;&nbsp;<br /></p><p>The onset of the symptoms of the confirmed cases was reported between 2 May to 23 May
    with a peak of cases observed in epidemic week 21 (week ending 24 May). The most frequently reported symptoms were fever, lower back pain, headache, loss of appetite, vomiting, weakness, joint pain, and eye pain. Of the 74 confirmed cases, 36 are male, and 38 are female, and the median age is 34 years (range 6-72 years). The most represented age range is 15 to 19-years-old (12 cases). <br /></p><p>All cases showed signs of recovery between the third and fourth day after the onset of symptoms. No severe or fatal cases have been reported as of 5 June.&nbsp;</p><p><strong>Figure 1: Number of cases of Oropouche virus disease in Cuba by province</strong></p><p><img alt="" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/picture169f9e4d126524f21b93ae0a8bb358b80.jpg?sfvrsn=c27958a1_4" sf-size="34319" /></p></p>'
