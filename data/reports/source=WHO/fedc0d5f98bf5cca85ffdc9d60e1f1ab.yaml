  Epidemiology: <p>Oropouche virus disease is an arboviral disease caused by the Oropouche virus (OROV), a segmented single-stranded RNA virus that is part of the genus <em>Orthobunyavirus</em> of the <em>Peribunyaviridae </em>family. &nbsp;The virus has been found to circulate in Central and South America and the Caribbean. OROV can be transmitted to humans primarily through the bite of the&nbsp;<em>Culicoides paraensis&nbsp;</em>midge, found in forested areas and around water bodies, or certain <em>Culex quinquefasciatus </em>mosquitos<em>.</em> It is suspected that viral circulation includes both epidemic and sylvatic cycles. In the sylvatic cycle, primates, sloths, and perhaps birds are the vertebrate hosts, although a definitive arthropod vector has not been identified. In the epidemic cycle, humans are the amplifying host and OROV is transmitted primarily through the bite of the&nbsp;<em>Culicoides paraensis</em>&nbsp;midge. To date, there is no evidence of human-to-human OROV transmission.&nbsp;<br
    /></p> <p>The disease symptoms are similar to dengue and start between four to eight days (range between three-12 days) after the infective bite. The onset is sudden, usually with fever, headache, joint stiffness, pain, chills, and sometimes persistent nausea and vomiting, for up to five to seven days. Severe clinical presentation is rare, but it may result in aseptic meningitis. Most cases recover within seven days, however, in some patients, convalescence can take weeks. There is no specific antiviral treatment or vaccine for Oropouche virus disease.&nbsp;</p>
