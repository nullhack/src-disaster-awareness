  Advice: '<p>On 21 August 2024, WHO published the Extension by the <a href="https://www.who.int/publications/m/item/extension-of-the-standing-recommendations-for-mpox-issued-by-the-DG-of-the-WHO-in-accordance-with-the-IHR-2005-21082024">Director-General of the Standing Recommendations for Mpox</a>, following the declaration of a Public Health Emergency of International Concern for the upsurge of mpox and in accordance with the International Health Regulations (2005).&nbsp;&nbsp;</p><p>In addition, WHO has issued temporary recommendations to States Parties experiencing the upsurge of mpox, including but not limited to the Democratic Republic of the Congo, Burundi, Kenya, Rwanda, and Uganda. All these have been shared on the&nbsp;<a href="https://www.who.int/news/item/19-08-2024-first-meeting-of-the-international-health-regulations-(2005)-emergency-committee-regarding-the-upsurge-of-mpox-2024">WHO website</a>.</p><p>WHO strongly advises that countries continue to follow the WHO Director-General''s
    Standing Recommendations issued in August 2023, particularly concerning epidemiological surveillance of mpox and the strengthening of laboratory diagnostic capacities. Additionally, countries must ensure diagnostic capability to detect both MPXV clades and subclades.</p><p>There must be sustained implementation of risk communication, community engagement and infodemic management (RCCE-IM) appropriate to each context, maintenance or initiation of vaccination (where available) for persons at risk of exposure, optimal case management, adherence to infection prevention and control measures, strengthening research to better appreciate modes of transmission in different contexts, and sustained support for the development of rapid diagnostic methods and treatments adapted to the needs of patients.</p><p>Where virus circulation remains low, health authorities should strive to eliminate human-to-human transmission of mpox and ensure that capacity for outbreak response is maintained. Health facilities
    should ensure health workers maintain high vigilance to rapidly identify and isolate suspected or confirmed cases of mpox.</p><p>Anyone with a clinical or laboratory-confirmed diagnosis of mpox should follow the instructions of health authorities according to the local context, including isolation, either in a health facility or at home (as outlined in the WHO Clinical management and infection prevention and control for monkeypox: interim rapid response guidance, 10 June 2022), until they do not present any mpox symptoms and the scabs have fallen off and a fresh layer of skin has formed underneath, which usually takes from 2 to 4 weeks.</p><p>Persons with mpox should avoid travel, including international travel, until the infectious period is over, unless travel is necessary for urgent medical care or humanitarian reasons. Contacts of a confirmed case are asked to be under health monitoring and to limit their movements including non-essential travel (and, if relevant, to abstain from
    sexual relations) for 21 days, the maximum incubation and monitoring period for appearance of possible symptoms.</p><p>In terms of risk communication and community engagement, countries are encouraged to</p><ul><li>continue to engage closely with affected communities, including men who have sex with men and sex workers, to promote the uptake of protective measures.&nbsp;</li><li>provide information to all travelers, and particularly to travelers to or from countries where mpox is currently being reported, including public health advice at points of entry; also provide information for diaspora populations from affected countries. </li><li>ensure that all communication and interventions are conducted in a stigma-free manner, with messaging that is respectful, inclusive, and avoid reinforcing negative stereotypes or discrimination.</li></ul><p>WHO&nbsp;<a href="https://iris.who.int/bitstream/handle/10665/364527/WHO-MPX-Immunization-2022.3-eng.pdf?sequence=1">recommends</a>&nbsp;vaccination
    against mpox for people most at risk of contracting the disease, taking into account recommendations of the WHO Strategic Advisory Group of Experts on Immunization (SAGE).</p><p>For specific antiviral treatments currently being assessed for effectiveness against mpox, such as tecovirimat, access is possible through national request to WHO under the&nbsp;<a href="https://iris.who.int/handle/10665/352902">WHO&nbsp;</a>Monitored Emergency Use of Unregistered and Investigational Interventions (MEURI) protocol or for compassionate use, or by direct purchase from the manufacturer.</p><p>States Parties are recommended to encourage authorities, health and care workers and community groups to provide travelers with relevant information to protect themselves and others before, during and after travel to events or gatherings where mpox may present a risk.</p><p>WHO does not recommend any restrictions for travel or trade.<br /></p>'
  Assessment: <p>Regardless of geographic area, epidemiological context, gender identity or sexual behaviour, individual-level risk is largely dependent on individual factors such as potential exposures and immunity status.</p><p>This case represents the first ever report of mpox due to clade I MPXV outside of the African region. Further sporadic cases may be expected, whether among travelers from endemic areas / countries or appearing through community transmission without any travel link.&nbsp;Further spread of the disease within Sweden from this first case was assessed by Swedish authorities as very low due to the appropriate public health measures that have been put in place. However, the travel history of this case is still under investigation, and the case was experiencing symptoms (and was therefore likely to be infectious) during international travel. To date, this appears to be an isolated case for which one close contact is under monitoring.<strong></strong></p>
  Overview: <p>On 15 August 2024, the Swedish authorities notified WHO of a confirmed case of mpox due to clade Ib MPXV in an individual aged between 30-40 years.&nbsp;</p><p>On 12 August, the individual travelled to Sweden from an outbreak-affected country in the African region with mild clinical symptoms of mpox. The travel itinerary included more than one transit and some longer stopovers.&nbsp;On 13 August, the traveller sought medical care in Sweden and samples were collected for laboratory confirmation and virus characterization. On 14 August, mpox was confirmed by polymerase chain reaction (PCR). On 15 August, findings from whole genome sequencing by the Public Health Agency of Sweden revealed clade Ib MPXV infection. The patient is currently isolated and receiving care in Sweden.</p><p>In Sweden, the patient reported one close contact (a travel companion) who is being monitored and is in contact with health authorities in the country. The contact had a sore throat but tested negative
    for mpox on 16 August 2024.&nbsp;</p>
