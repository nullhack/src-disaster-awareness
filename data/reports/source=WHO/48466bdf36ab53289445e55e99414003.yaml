  Response: <ul><li>Sweden has maintained its testing and sequencing capacity for MPXV.&nbsp;Sweden continues to monitor reports of mpox and conduct both epidemiologic and microbiologic analyses. Mpox is classified as a notifiable disease in Sweden which mandates reporting of cases to the Public Health Agency of Sweden.</li><li>Authorities in the relevant countries where the case transited have been notified by Sweden to facilitate public health measures where indicated.</li><li>A&nbsp;<a href="https://www.folkhalsomyndigheten.se/nyheter-och-press/nyhetsarkiv/2024/augusti/ett-fall-av-mpox-klad-i-rapporterat-i-sverige/">press release</a>&nbsp;was issued by the Public Health Agency of Sweden on 15 August 2024.&nbsp;</li><li>A joint WHO/ECDC information session on mpox for Member States in the WHO European Region was conducted on 16 August 2024; Member States were reminded about the WHO Director-General's <a href="https://www.who.int/publications/m/item/standing-recommendations-for-mpox-issued-by-the-director-general-of-the-world-health-organization-(who)-in-accordance-with-the-international-health-regulations-(2005)-(ihr)">Standing
    Recommendations</a><span style="text-decoration:underline;"> </span>on mpox (which have been <a href="https://www.who.int/news/item/19-08-2024-first-meeting-of-the-international-health-regulations-(2005)-emergency-committee-regarding-the-upsurge-of-mpox-2024">extended until 20 August 2025</a>) and reporting obligations through the European Surveillance System (TESSy) and IHR channels.</li></ul>
