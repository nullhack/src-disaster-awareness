  Summary: "On 15 August 2024, the World Health Organization was notified of a laboratory-confirmed case of mpox with clade Ib monkeypox virus (MPXV) by the International Health Regulations (IHR) National Focal Point (NFP) of Sweden. The patient reported travel to an outbreak-affected country in the African Region. While there has been recent international spread of clade Ib MPXV from the Democratic Republic of the Congo to its neighbouring countries, this is the first case of clade Ib reported outside of the African Region. Swedish authorities have implemented response measures. The only identified close contact is being monitored and the risk of within-country spread has been assessed by Swedish authorities as very low. \r\n\r\nOn 14 August 2024, the WHO Director-General, on the advice of an IHR Emergency Committee, determined that the upsurge of mpox in the Democratic Republic of the Congo (DRC) and a growing number of countries in Africa constituted a public health emergency of international\
    \ concern (PHEIC) under the International Health Regulations (2005) (IHR). WHO strongly advises that countries continue to follow the WHO Director-General's Standing Recommendations issued in August 2023, particularly concerning epidemiological surveillance of mpox and the strengthening of laboratory diagnostic capacities."
