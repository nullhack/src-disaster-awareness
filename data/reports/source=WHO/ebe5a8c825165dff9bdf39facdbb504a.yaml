  Epidemiology: <p>Malaria is a life-threatening disease caused by parasites that are transmitted to people through the bites of infected female <em>Anopheles</em> mosquitoes. Malaria transmission is also possible through blood transfusion, organ transplantation, or the sharing of needles or syringes contaminated with infected blood. Malaria can also be transmitted from mother to child before or during delivery.</p><p>There are five parasite species that cause malaria in humans, of which two of these species pose the greatest public health threat, namely <em>Plasmodium falciparum</em> and <em>Plasmodium vivax.</em> Both parasite species are reported in Ethiopia. </p><p>The first symptoms, fever, headache, and chills &ndash; usually appear within 10&ndash;15 days after the infective mosquito bite and may be mild and difficult to recognize as malaria. Left untreated, malaria can progress to severe illness and death within a period of 24 hours.</p><p>Since the early 2000s, Ethiopia witnessed
    significant reductions in malaria-related cases and deaths. No major epidemics were reported apart from smaller-scale outbreaks and seasonal case fluctuations. In 2019, Ethiopia recorded its lowest-ever malaria case count, with approximately 900 000 cases reported, in the context of strong program implementation, improved surveillance, roll-out of malaria interventions, and community health extension program. However, towards the end of 2021, the country began experiencing a resurgence of the disease. Starting in 2022, malaria epidemics have been reported across most regions, accompanied by a notable upward trend in cases year-over-year (Figure 2). Approximately 3.3 million confirmed malaria cases were&nbsp;reported in 2022, compared to 1.3 million in 2021. In 2023, 4.1 million malaria cases including 527 deaths were reported, of which <em>Plasmodium falciparum</em> accounted for 70% approximately of all reported cases. Additionally, there has been a shift in malaria stratification,
    with an increase in the number of areas classified as endemic in 2022 compared to 2020.&nbsp;</p>
