  Advice: <p>WHO recommends malaria prevention tools and strategies, including effective vector control and the use of preventive antimalarial drugs, which have a major impact on reducing the global burden of the disease. Preventative measures to reduce malaria transmission include the use of long-lasting insecticidal net (LLINs) and indoor residual spraying (IRS).</p><p>Early diagnosis and treatment of malaria reduces disease severity, prevents deaths, and contributes to reducing onward malaria transmission. WHO recommends that all suspected cases of malaria are confirmed using parasite-based <a href="https://www.who.int/teams/global-malaria-programme/case-management/diagnosis">diagnostic testing</a> (either microscopy or a rapid diagnostic test). Diagnostic testing enables health providers to swiftly distinguish between malarial and non-malarial fevers, facilitating appropriate treatment.</p><p>Strengthening malaria surveillance also helps to identify high-risk areas or populations prone
    to infection, enables the monitoring of changing disease patterns, and assists in designing effective public health interventions. Continued delivery of key public health messages on reducing the risk of malaria transmission among the population is expected.</p><p>Based on the information available for this event, WHO does not recommend any general travel or trade restrictions to Ethiopia.</p>
  Assessment: '<p><p>Malaria poses a significant public health challenge in Ethiopia, with approximately 75% of the country''s landmass considered malaria-endemic, and around 69% of the population residing in these areas facing the risk of infection. Ethiopia''s susceptibility to malaria epidemics stems from its pronounced climatic, topographic, and demographic disparities, influencing the risk of malaria across different regions. Typically, malaria peaks occur between September and December following the primary rainy season (which occurs from June to September), and April to May after the secondary rainy season (which occurs from February to May).</p><p>Historical data reveal significant malaria outbreaks, such as the devastating 1958 epidemic, which affected approximately three million individuals with 150 000 deaths reported, covering a substantial portion of the highland area. Subsequent major epidemics have occurred at intervals of about five to eight years, including widespread outbreaks
    in 1998 and localized yet severe outbreaks in 2002/2003. While strides were made in reducing malaria-related fatalities and cases post-2003, a resurgence of the disease occurred towards the end of 2021, with epidemics reported across various regions since 2022. Alarmingly, the annual malaria caseload and related admissions and deaths have surged, even with suboptimal reporting completeness in conflict-affected regions suggesting likely substantial underestimation in the numbers affected between 2022-2024. </p>The increasing trend in the number of annual cases and endemic areas are likely influenced by reduced vector control efforts, exacerbated by acute and protracted conflicts affecting some Regional States. Ethiopia currently has a significant number of internally displaced persons (IDPs), many of whom reside in the host community. As of May 2024, Ethiopia recorded 3.3 million IDPs across 2739 sites, with 68.7% displaced by conflict and 16.5% by drought. The Somali region hosts the
    largest drought-affected IDP population, with 397 913 individuals (73.1% of the national drought figure).<sup>[1]</sup> These conflicts, particularly in Oromia and Amhara, are protracted, posing a risk of&nbsp;reversing decades of progress against malaria. The majority of the population, previously protected by effective malaria control measures, has lost partial immunity due to the discontinuation of these measures.&nbsp;<p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;color:#333333;font-family:inherit;font-size:inherit;">These populations face additional risks due to poor housing structures and inadequate long-lasting insecticidal net (LLIN) coverage. There are also large populations of returnees without adequate vector protection. Refugees from neighboring countries annually contribute to the situation. Ethiopia currently hosts over one million refugees, with about 50% residing in the highly
    malaria-endemic Western Lowlands. The surveillance system is suboptimal in conflict-affected areas, hindering a full understanding of transmission dynamics. Delayed testing and treatment, particularly in conflict-affected areas, have resulted in avoidable mortality.&nbsp; Insufficient funding support further complicates efforts to address the malaria situation adequately. This vulnerability increases the risk of severe malaria outbreaks, especially in remote and hard-to-reach communities.</span></p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">The national risk level for malaria in Ethiopia is high due to multiple factors: the spread of </span><em style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Anopheles stephensi</em><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">,
    which thrives in urban and man-made areas, weather anomalies from El Ni&ntilde;o/La Ni&ntilde;a, drought and food insecurity, ongoing conflict, and poor security. Large numbers of IDPs and returnees with inadequate housing and LLIN coverage, as well as over one million refugees (50% in malaria-endemic Western Lowlands), add to the risk. Suboptimal surveillance, especially in conflict zones, delays testing and treatment, increasing mortality.&nbsp; &nbsp;&nbsp;</span><br /></p><p>The regional risk is&nbsp;moderate&nbsp;due to concurrent malaria and other vector-borne disease outbreaks in six neighboring countries: Djibouti, Eritrea, Kenya, Somalia, South Sudan, Sudan. These nations face challenges with limited resources and response capacities to effectively manage these outbreaks'' burden.&nbsp;</p></p>'
  Overview: '<p>Between 1 January and 20 October 2024, over 7.3 million malaria cases and 1157 deaths (CFR 0.02%)&nbsp;were reported in Ethiopia, the highest number of annual cases recorded in the last seven years. Of the total cases reported in 2024, majority (95%) were laboratory-confirmed, with <em>Plasmodium falciparum</em>&nbsp;accounting for more than two-thirds of the cases. By contrast, in 2023, 4.1 million malaria cases including 527 deaths were reported, of which <em>Plasmodium falciparum</em> accounted for approximately 70% of all reported cases. &nbsp;Four regions accounted for 81% of the reported cases and 89% of health facility malaria deaths in 2024: Oromia (44% cases; 667 deaths), Amhara (18% cases; 56 deaths), Southwest (12% cases; 250 deaths) and South Ethiopia Regional State (7% cases; 45 deaths). &nbsp;Due to favourable geo-ecological conditions, the Western part of the country is experiencing a high malaria burden and is highly affected by the current unprecedented surge
    as shown in the incidence map for week 42. (Figure 1)</p><p><strong>Figure 1: Geographical distribution of Malaria cases as of 20 October, 2024</strong> <img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/geographical-distribution-of-cases.jpg?sfvrsn=da19e255_3" alt="Geographical distribution of Malaria cases in Ethiopia" sf-size="38463" /></p><p>Nationally, a total of 222 high-burden districts (woredas) were identified for targeted intervention. Although these districts represent only 20% of the country&rsquo;s total districts (woredas), they accounted for more than 75% of the national malaria burden in 2023. Among these districts, 50 are reported to be partially accessible due to protracted conflicts in these areas.</p><p>Males account for 56% of outpatient cases and 52% of inpatient admissions. Children under five years old account for 16% of outpatient cases and 25% of inpatient admissions. The high movement of seasonal migrant workers, (the
    majority of whom are adult males) to the high malaria endemic areas and the highly seasonal pattern of malaria in the country may have contributed to the observed age and sex distribution. </p><p>From 2020 to 2024, there has been an increase in the number of annual cases reported, as well as the persistence of outbreaks beyond the expected transmission season. Typically, malaria peaks occur between September and December following the primary rainy season (which occurs from June to September), and April to May after the secondary rainy season (which occurs from February to May). Despite the 2023 major malaria transmission season ending in December, outbreaks have persisted in numerous regions, characterized by surges in the number of cases observed during the secondary transmission season of 2024.</p><p><strong>Figure 2. Weekly trend of malaria cases in Ethiopia, 01 January 2021 to 13 October 2024&nbsp;</strong></p><p><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/cases-by-epi-week.jpg?sfvrsn=f92b266e_3"
    alt="Malaria cases by Epi week Ethiopia" sf-size="23973" /></p><p>Source: Weekly PHEM/IDSR data, EPHI</p>'
