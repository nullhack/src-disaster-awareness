  Response: <p>WHO is providing support to the Ministry of Health (MOH) in coordinating malaria response efforts through integrated platforms alongside a multi-emergency incident management structure. The key interventions include:</p><ol><li><strong>Coordination and leadership:</strong> MOH, with support from WHO and other partners, is coordinating malaria response efforts through the activated Incident Management System (IMS). Technical assistance has been provided to establish the national and regional malaria Emergency Operations Centres (EOCs). A national coordination meeting is held weekly with updates from the Regional Health Bureaus (RHBs).</li><li><strong>Supplies and last mile deliveries:</strong> The health sector and WHO provided the required logistics to deliver health supplies. WHO has allocated substantial quantities of malaria kits and supplies to RHBs and partners. Between 2022 and 2023, WHO procured and distributed over 636 metric tons of malaria medicines and rapid test
    kits, worth US$ 2.26 million. Since the beginning of this year, WHO has dispatched 256 metric tons of Inter-Agency Emergency Health Kits (IEHK) of malaria drugs and medical supplies, valued at over US$1.4 million, to the most affected areas. Additional supplies are being prepared for donation to the government.</li><li><strong>Deployment of technical experts:</strong> The government of Ethiopia deployed and supported the response at sub-national levels for the affected regions. In addition, since January 2024, eight technical experts from WHO have travelled to the Oromia, Amhara, and Southwest regions. Two experts are currently responding to the malaria outbreak in the Oromia region.</li><li><strong>Partner mobilization:</strong> WHO, as the Health Cluster lead agency, works closely with Health Cluster partners to ensure that supplies effectively reach their final destinations.</li><li><strong>Advocacy and resource mobilization:</strong> There are ongoing efforts to engage with international
    agencies and identify relevant funding opportunities. Despite these efforts, there remains a significant funding gap that limits the ability to scale up the response rapidly and effectively as needed. The health system is under pressure from multiple concurrent emergencies, straining resources. Major challenges include the displacement of healthcare workers, damaged and dysfunctional health facilities, and limited road access to hotspot areas due to conflict, leading to shortages of malaria diagnostic tools and medications in affected areas.</li></ol>
