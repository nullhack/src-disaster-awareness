  Title: Chikungunya - La Réunion and Mayotte
  Epidemiology: <p>Chikungunya is a mosquito-borne viral disease that causes fever and severe joint pain. It is caused by a ribonucleic acid (RNA) virus that belongs to the <em>alphavirus</em> genus of the family <em>Togaviridae</em>. Chikungunya virus (CHIKV) is transmitted to humans via the bites of infected female mosquitoes, most commonly&nbsp;<em>Aedes aegypti</em>&nbsp;and&nbsp;<em>Aedes albopictus</em>&nbsp;mosquitoes. These two species can also transmit other viruses, including dengue and Zika viruses. They bite primarily during daylight hours, and there may be peaks of activity in the early morning and late afternoon.</p><p>Symptoms of chikungunya appear between 4 and 8 days (range 2&ndash;12 days) after the bite of the infected mosquito. Most symptoms are generally self-limiting and last for 2-7 days. The disease is characterized by an abrupt onset of fever, which is frequently accompanied by severe joint pain. Other common signs and symptoms include stiffness, arthritis, headache,
    fatigue and rash. The joint pain is often debilitating and usually lasts for a few days but may be prolonged, lasting for weeks, months or even years. Because symptoms in infected individuals are similar to those seen in other arbovirus infections, chikungunya may be misdiagnosed in areas where dengue and other arboviruses also occur.</p><p>Although most patients recover fully from the infection, occasional cases of eye, heart and neurological complications have been reported with CHIKV infections. Patients at extremes of the age spectrum are at higher risk for severe disease, including newborns infected during delivery to infected mothers or bitten by infected mosquitoes in the weeks after birth, and older people with underlying medical conditions. Patients with severe disease require hospitalization because of the risk of organ damage that can be fatal. </p><p>Once an individual has recovered, available evidence suggests they are likely to be immune from future chikungunya infections.
    Treatment is directed primarily at relieving the symptoms, including analgesics for joint pain and anti-pyretic drugs to reduce fever. Aspirin and other non-steroidal anti-inflammatory drugs should not be administered until dengue can be ruled out to reduce the risk of bleeding.&nbsp;There is no specific antiviral drug treatment for chikungunya.</p>
  Advice: '<p>WHO reiterates to all countries the importance of strengthening: 1) their <strong>healthcare capacity</strong> to rapidly detect and manage cases, 2) their <strong>laboratory capacity</strong> for timely recognition and confirmation of cases; and 3) their <strong>surveillance capacity</strong> to rapidly detect trends in the incidence and implement control measures. It is relevant to maintain close monitoring of the situation in the region with active cross-border coordination and information sharing because of the possibility of cases in neighbouring countries.&nbsp; </p><p>WHO encourages countries to develop and maintain the capacity to detect and confirm cases, manage patients, and implement social communication strategies to gain community support to reduce the presence of the mosquito vectors. This includes training and alerting healthcare workers on case detection and potential complications, identifying risk groups for severe disease, ensuring appropriate clinical management,
    and following up on cases to prevent deaths. Targeted integrated vector surveillance and control measures are essential to reduce transmission rates.&nbsp; </p><p>Chikungunya can cause large outbreaks with high attack rates, affecting one-third to three-quarters of naive populations with the potential to cause heavy burdens on healthcare systems. Early detection of severe disease progression and access to proper medical attention are key to addressing clinical complications and reducing mortality. </p><p>Prevention efforts are highly focused on surveillance and control of predominantly day biting&nbsp;<em>Aedes</em>&nbsp;spp. mosquitoes. For protection against mosquito bites, clothing that minimizes skin exposure to mosquitoes indoors and outdoors is advised. Repellents can be applied to exposed skin or clothing in strict accordance with product label instructions. </p><p>There are currently two chikungunya vaccines that have received regulatory approvals and/or have been recommended
    for use in populations at risk in several countries, but the vaccines are not yet widely available nor in widespread use. WHO and external expert advisors are reviewing vaccine trial and post-marketing effectiveness and safety data in the context of global chikungunya epidemiology to inform possible recommendations for use.&nbsp; </p><p>National blood services/authorities should monitor epidemiological information and strengthen haemovigilance to identify any potential transfusion transmission of chikungunya virus. Appropriate safety precautions to prevent transfusion-transmission of chikungunya virus should be taken based on the epidemiological situation and risk assessment. </p><p>No measures related to international traffic and trade are warranted at this time.&nbsp;</p>'
  Assessment: <p>Chikungunya virus is primarily transmitted by <em>Aedes</em> species mosquitoes and disease is characterized by an abrupt onset of fever frequently accompanied by severe joint pain and inflammation which is often very debilitating and may last for several months, or even years. Fatalities associated with infection can occur but are typically rare and occur in patients with severe chikungunya that is reported mostly in older adults with underlying medical conditions or infants infected during birth. Chikungunya virus can cause large epidemics, particularly when introduced in immunologically naive (not previously infected) human populations. These outbreaks have a high attack rate, placing a substantial demand on the public health system to conduct surveillance, case management, and differential laboratory diagnostic testing to differentiate chikungunya from illness due to co-circulating mosquito-borne viruses like dengue. Chikungunya virus can also be transmitted from viremic
    mothers to newborns during delivery, to laboratory workers handling chikungunya virus isolates or infected specimens, and possibly through transfusion of blood and blood products or through organ transplantation. </p><p>Chikungunya outbreaks have been documented on islands within and countries bordering the Indian and Pacific Oceans, with large populations of <em>Aedes&nbsp;</em>spp. mosquitoes, mainly,&nbsp;<em>Aedes aegypti. </em>The large outbreaks in the Indian Ocean islands in 2005-2007, however, were characterized by increased transmission by <em>Aedes albopictus</em> mosquitoes, which were more abundant on La R&eacute;union and Mauritius at that time and facilitated by a viral mutation that increased transmissibility in this vector.&nbsp; La R&eacute;union is once again experiencing a large chikungunya outbreak, and Mayotte has reported locally transmitted cases for the first time in almost 20 years, indicating reintroduction of the virus.</p><p>Chikungunya can be introduced to
    new areas by infected travelers and may establish local transmission in the presence of vectors and a susceptible population. </p><p>The impact of the current outbreaks depends on several factors, including the current capacities for a coordinated public health response and clinical management, and the proportion of susceptible population for arboviruses. This susceptible population includes people who do not have immunity due to no previous exposure to the virus as in this situation there has been the absence of transmission for the past 20 years. Young children, elderly individuals, and those with pre-existing health conditions such as diabetes, hypertension, and cardiovascular diseases are at higher risk of developing severe disease. Additionally, people living in areas with high mosquito populations and inadequate vector control measures are at greater risk of being infected. Effective public health strategies, including vaccination, vector control, and community education, are crucial
    in reducing the proportion of susceptible individuals and preventing outbreaks.&nbsp; </p><p>In some areas, there is a lack of medical facilities with limited geographical access, making it difficult for people to access basic health care. Other challenges can be stockouts of several essential supplies for prevention and control, lack of reagents and consumables for laboratory diagnosis, and need for re-training field teams and health workers.&nbsp; </p><p>La R&eacute;union has reported the first large-scale outbreak in nearly two decades, and the onset of autochthonous transmission in Mayotte suggest that further outbreak activity in the Indian Ocean islands can be expected, with sufficient immunologically na&iuml;ve humans and <em>Aedes</em> vector populations to sustain human-to-mosquito-to human transmission. &nbsp;&nbsp;</p>
  Overview: '<p><strong>La R&eacute;union, France</strong></p><p>In August 2024, the regional health authority (Agence r&eacute;gionale de sant&eacute;,&nbsp;ARS) of La R&eacute;union, France, reported three locally transmitted chikungunya cases. Cumulatively, from the start of the outbreak in August 2024 through 4 May 2025, over 47 500 confirmed cases of chikungunya and more than 170 000 consultations for suspected chikungunya have been reported on the island. The surge in cases was observed from early 2025 with weekly case counts increasing from 30 at the end of 2024 to 4000 during the week of 10-16 March 2025 (epidemiological week 11), indicating more than a 100-fold increase. </p><p>The overall clinical presentation of the illness was generally mild; however, from 1 January to 4 May, 340 hospitalizations have been reported. Almost half (43%) of hospitalized patients were adults over 65 years old and approximately 25% were children under six months old. Over 95% of hospitalized patients
    had at least one risk factor for severe disease including comorbidity, age-group (over 65 years and infants) or pregnancy. Additionally, 74 pregnant women and 48 infants under six months were hospitalized for short-term monitoring (2-3 days). </p><p>To date, 66 severe cases (defined as those with at least one organ failure) have been reported. These included 36 adults over 65 years of age with comorbidities, 7 people under 65 years of age with comorbidities and 23 infants under 3 months of age. &nbsp;Over the course of the outbreak, 12 deaths that occurred between 9 March and 27 April (Epi weeks 11-17) in people over 70 years of age with comorbidities were classified as linked to chikungunya, and additional twenty-eight deaths are currently under investigation for chikungunya, including one neonatal death. </p><p>The cumulative number of cases continues to increase, with the southern municipalities being the most affected by the virus, particularly Le Tampon. To date, all the municipalities
    have reported cases. </p><p>The previous large outbreak in La Reunion occurred in 2005-2006 with estimated total cases ranging between from 244 000 to over 300 000.&nbsp;</p><p>In March 2025, imported cases as a result of travelers who had visited La R&eacute;union were reported in Mayotte (2), Wallis and Futuna (1) and Martinique (1).&nbsp;</p><p><strong>Figure 1: Epidemiological curve of the number of confirmed chikungunya cases in La Reunion between 1 January and 27 April 2025 by week of symptom onset</strong> <img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/epi-curve-chikungunya-cases.jpg?sfvrsn=c6f8143a_3" height="387" style="max-width:100%;height:auto;" title="Epi curve Chikungunya cases La Réunion" width="662" alt="Epi curve Chikungunya La Réunion" sf-size="23464" /></p><p><strong>Mayotte, France</strong><strong></strong></p><p>As of 4 May 2025, a total of 116 chikungunya cases have been reported by ARS Mayotte,
    France, including 29 imported cases, 57 locally acquired cases, and 30 cases under investigation. The first imported case was identified on 5 March in the Northeast of the Island, followed by further cases reported across multiple communes. This marks the first locally transmitted chikungunya cases since the 2005&ndash;2006 outbreak, which had resulted in approximately 7300 cases. One hospitalization has been reported, with no deaths to date.<strong></strong></p>'
