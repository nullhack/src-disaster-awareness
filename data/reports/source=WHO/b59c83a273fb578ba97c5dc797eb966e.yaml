  Response: '<p><strong>La R&eacute;union, France</strong></p><p>On 13 January 2025, the prefecture of La R&eacute;union activated level 3 of the&nbsp;<em>Organisation de la R&eacute;ponse de S&eacute;curit&eacute; Civile (ORSEC)&nbsp;</em>arboviruses plan, indicating a low-intensity epidemic. This escalated to Level 4 on 14 March, signifying a medium-intensity epidemic.&nbsp;The ORSEC arboviruses plan is a specific subset of the departmental ORSEC plan, which is a comprehensive emergency response framework used in France. It is designed to combat mosquito-borne diseases such as dengue, chikungunya, and Zika. Its objectives include ensuring prevention and surveillance of arboviruses, coordinating stakeholders, and defining intervention methods. Since activating Level 4 of the ORSEC arboviruses plan, the regional public health authority of La R&eacute;union has implemented various measures:&nbsp;</p><ol><li><strong>Management of serious cases of chikungunya in newborns and infants: </strong>The
    neonatology, intensive care and pediatric intensive care units at the University Hospital Center South R&eacute;union (<em>Centre Hospitalier Universitaire Sud R&eacute;union</em>) have set up a protocol for the management of severe cases of childhood chikungunya. This includes follow-up by a specialized neonatologist or neuropediatrician at 1 month, with additional follow-up visits scheduled in the event of encephalitis or neurological abnormalities.&nbsp;&nbsp;</li><li><strong>Vector control measures:</strong>&nbsp;Additional vector control specialists have been hired to reinforce the capabilities of the regional health authority of La R&eacute;union. Moreover, local vector control teams have increased the number of intervention sites on the island.&nbsp;&nbsp;Mosquito net acquisitions are underway, including the purchase of long-lasting insecticidal mosquito nets for children and pregnant women.&nbsp;</li><li><strong>Mobilization of France&rsquo;s national health reserve to support
    HR capabilities for vector control and critical care in hospitals: </strong>Through its national health reserve, France has mobilized environmental engineers and vector control specialists to bolster La R&eacute;union&rsquo;s vector control capabilities. Further mobilization of health workers to support the island&rsquo;s hospitals is expected.&nbsp;</li><li><strong>Vaccination</strong>: Adults under 65 years of age with co-morbidities and professional groups at higher risk of exposure, such as vector control professionals, are vaccinated. At this stage, the vaccine is not recommended for pregnant women and individuals aged 65 years and above. The vaccination campaign began on 7 April. &nbsp;</li><li><strong>Mitigation strategies at the hospital level:</strong> To mitigate the impact of a surge in chikungunya cases in hospitals, different strategies have been implemented to increase admission capacity and streamline patient flow.&nbsp;&nbsp;<ul><li>A triage tent has been set up in front
    of the University Hospital Center to identify Chikungunya patients as they arrive and redirect them towards a chikungunya-specific care pathway.</li><li>Additional beds have been made available.</li><li>Public recommendations have been issued to avoid going to emergency departments for non-critical situations, and to consult their general practitioner or contact emergency services before visiting emergency departments.&nbsp;</li></ul></li></ol><p><strong>Mayotte</strong></p><ul><li>On 26 March, the prefecture of Mayotte activated Level 2A of the ORSEC arboviruses plan following confirmation of an autochthonous chikungunya case.</li><li>Vector control efforts were intensified, including targeted distribution of mosquito nets and repellents, as well as insecticide and larvicide treatments around identified cases.</li><li>Health authorities reinforced hospital capabilities by enhancing diagnostic and laboratory capacities, strengthening in-hospital surveillance, and implementing infection
    prevention measures to protect staff and patients.</li><li>Public awareness campaigns were scaled up to inform communities about prevention measures and symptoms, and to encourage early medical consultation in suspected cases.</li></ul><p><strong>WHO&rsquo;s response:</strong></p><p>As part of the implementation of the Global Arbovirus Initiative, WHO is actively working with the countries to strengthen their healthcare and surveillance capacity.&nbsp;WHO has been supporting countries in; </p><ul><li>preparedness and response to possible outbreaks, including the organization of health services&nbsp;</li><li data-list="0" data-level="1">implementation of effective integrated vector surveillance and control by affected      countries through publishing guidelines and the provision of      epidemiological surveillance materials and technical assistance to      national authorities   &nbsp;</li><li data-list="0" data-level="1">increasing the      laboratory capacity, to enable timely and
    accurate diagnosis and case      detection throughout the region&nbsp;</li><li data-list="0" data-level="1">delivering clinical      training to health and care workers, through webinars and refresher      sessions -&nbsp;a dedicated WHO&rsquo;s Information Network for Epidemics (EPI-WIN) webinar on chikungunya was held on 7 May 2025 </li><li data-list="0" data-level="1">deploying experts      to countries that are experiencing high magnitude outbreaks &nbsp;</li><li data-list="0" data-level="1">providing advice on risk assessment and risk communication.&nbsp;</li></ul><p></p>'
