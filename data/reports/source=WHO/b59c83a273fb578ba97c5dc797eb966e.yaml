  Summary: Since August 2024, widespread transmission of chikungunya virus disease has been documented in La Réunion as well as increasing locally transmitted cases in Mayotte. Although chikungunya outbreaks and endemic transmission occur annually in several countries and territories around the world, the Indian Ocean islands have not experienced major outbreaks for nearly two decades. In La Réunion, over 47 500 cases and twelve associated deaths have been reported as of 4 May 2025, with sustained high transmission across the island. In Mayotte, the first locally transmitted cases since 2005–2006 have been detected, raising concern about similar large outbreaks. Public health response measures, including enhanced surveillance, vector control activities, and novel targeted vaccination efforts, have been implemented to contain the outbreaks, however further outbreak activity in the islands of the Indian Ocean can be expected.
