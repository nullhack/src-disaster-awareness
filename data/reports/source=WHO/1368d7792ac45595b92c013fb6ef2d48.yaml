  Title: Avian Influenza A(H9N2)- Viet Nam
  Epidemiology: <p>Influenza viruses natural reservoir is wild water birds, but some influenza viruses may infect poultry and mammals, including humans. Infections in humans have primarily been acquired through direct contact with infected animals or contaminated environments. Avian influenza virus infections in humans may cause diseases ranging from mild upper respiratory tract infection to more severe diseases and can be fatal. Conjunctivitis, gastrointestinal symptoms, encephalitis and encephalopathy have also been reported.</p><p>Laboratory tests are required to diagnose human infection with influenza. WHO periodically updates technical guidance protocols for the detection of zoonotic influenza using molecular methods, e.g. RT-PCR. Evidence suggests that some antiviral drugs, notably neuraminidase inhibitors (oseltamivir, zanamivir), can reduce the duration of viral replication and improve prognosis in some cases.</p><p>To date, globally there have been 99 cases of human avian influenza
    A(H9N2) infections, including two deaths, reported to WHO since 2015.</p>
  Advice: <p>This case does not change the current WHO recommendations on public health measures and influenza surveillance. A thorough investigation of every human infection is essential.</p><p>The public should avoid contact with high-risk environments such as live animal markets/farms and live poultry or surfaces that might be contaminated by poultry droppings. Hand hygiene, with frequent washing or the use of alcohol hand sanitizer, is recommended. WHO does not recommend any specific different measures for travelers.</p><p>All human infections caused by a new subtype of influenza virus are notifiable under the IHR (2005). State Parties to the IHR (2005) are required to immediately notify WHO of any laboratory-confirmed case of a recent human infection caused by an influenza A virus with the potential to cause a pandemic.</p><p>WHO advises against applying any travel or trade restrictions based on the current information available on this event.</p>
  Assessment: <p>Most human cases of infection with avian influenza A(H9N2) viruses are exposed to the virus through contact with infected poultry or contaminated environments. Human infection tends to result in mild clinical illness. Further human cases can be expected since the virus continues to be detected in poultry populations. No clusters of cases have been reported.</p><p>Currently available epidemiological and virological evidence suggests that this virus has not acquired the ability to be sustained in transmission among humans. Thus, the likelihood of human-to-human spread is low. Should infected individuals from affected areas travel internationally, their infection may be detected in another country during travel or after arrival. If this were to occur, further community-level spread is considered unlikely as this virus has not acquired the ability to transmit easily among humans.</p>
  Overview: <p>On 9 April 2024, the IHR NFP of Viet Nam notified WHO of one human infection with an avian influenza A(H9N2) virus.</p><p>The patient is a 37-year-old male from Tien Giang Province, Viet Nam, who had underlying conditions. The patient developed a fever on 10 March 2024 and was admitted to the hospital on 16 March. Following a diagnosis of severe pneumonia with bilateral pleural effusions, he was transferred to the intensive care unit (ICU) on 21 March and received treatment with oseltamivir and antibiotics. As of 15 April, the patient was still in severe condition and under intensive care.</p><p>The patient was detected through severe viral pneumonia surveillance (SVP). A nasopharyngeal swab was collected on 21 March, and the test result revealed positive avian influenza A with similar H9-strain gene segments on 22 March. On 1 April, Pasteur Institute in Ho Chi Minh City (PI HCMC) performed PCR testing, which confirmed the presence of avian influenza A(H9) virus. Subsequently,
    virus subtyping confirmed avian influenza A(H9N2) on 8 April. </p><p>Case investigation identified that the patient lives near a poultry market, where poultry trade occurs daily in front of his house. There have been no reports of dead or sick poultry near the patient&rsquo;s residence or of consumption of sick, dead, or uncooked poultry products from his household or neighbouring households. However, influenza A(H9N2) is not highly pathogenic in poultry. On 2 April, seven poultry samples were collected from two live bird trading points within the same commune. One sample was positive A(H5N1); the remaining were negative for avian influenza A(H5N1), A(H5N6), A(H5N8), A(H7N9), and A(H9). On 4 April, samples were taken from two geese at the patient's house, which tested negative for A(H5) and A(H9).</p><p>Fifteen close contacts of the case have been requested to self-monitor their health at home. As of 15 April, there have been no reports of new cases with respiratory symptoms among contacts
    of the case or outbreaks in the community where the case resides.</p><p>This is the first human infection with avian influenza A(H9N2) reported in Viet Nam.&nbsp;</p>
