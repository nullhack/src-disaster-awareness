  Response: <p>The government of Viet Nam has taken the following public health response actions:</p><ul type="disc"><li data-list="0" data-level="1">PI HCMC      and Ho Chi Minh City Center for Disease Control (HCDC), in cooperation      with the Tien Giang Provincial CDC, have conducted investigations, contact      tracing, and disinfection of the patient&rsquo;s residence and suspected      exposure areas.</li><li data-list="0" data-level="1">Local public health and animal health sectors cooperated for further      investigation, contact tracing and testing for possible detection of potential      additional cases and/or outbreaks of avian influenza A(H9N2) or other      strains in humans and poultry.</li><li data-list="0" data-level="1">On 5      April, the Ministry of Health issued a press release containing detailed      information about the case and provided public health messages on      proactive disease prevention and control measures.</li></ul><p></p>
