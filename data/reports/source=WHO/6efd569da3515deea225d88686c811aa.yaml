  Response: <ul type="disc"><li data-list="1" data-level="1">The Government of      Rwanda coordinated the response with support from WHO and partners.</li><li data-list="1" data-level="1">A surge team from WHO deployed to support the in-country response across the functions of incident      management, epidemiology, health operations, case management, infection      prevention and control, laboratory, health logistics, therapeutics and vaccines      research, and partner coordination. </li><li data-list="1" data-level="1">WHO and partners      supported the Ministry of Health (MoH) in conducting training of trainers      and follow-up cascade training to district hospitals and health centers in the country for surveillance, IPC, case      management, points of entry and border health, WASH, risk communication      and community engagement and other response areas. </li><li data-list="1" data-level="1">WHO and partners (US CDC)      supported MOH in revising the MVD case definition.</li><li
    data-list="1" data-level="1">WHO supported the MVD treatment center with direct support from clinical experts in infectious disease, critical care and nursing as well as health logistics and WASH expertise.</li><li data-list="1" data-level="1">WHO supported the national case management pillar to collect standardized patient level data based on WHO electronic case report form from the WHO Global Clinical Platform and making descriptive reports of case management responses to outbreak.</li><li data-list="1" data-level="1">WHO and partners (USAID, US CDC, and Africa CDC) supported      diagnostic testing for MVD in Rwanda through the provision of laboratory      supplies and technical support. WHO was      continuously engaged with its viral hemorrhagic fever collaborating centers      and other reference laboratories and partners to support the assessment of      diagnostics test performance and ensuring technical support continues regarding MVD testing.</li><li data-list="1" data-level="1">WHO
    supported the&nbsp;Government      in establishing a programme for recovered patients, by sharing technical      guidance and protocols for establishing a national programme and supporting      the&nbsp;Rwanda MOH) implementation effort. </li><li data-list="1" data-level="1">WHO and partners supported the MoH in updating and validating key national guidance      and SOPs, including for IPC and surveillance activities (including      mortality surveillance) &nbsp;</li><li data-list="1" data-level="1">WHO and partners (IOM, Africa CDC) supported in      building capacity at the points of entry (POE) through the national surveillance      training program and needs assessment visit at 11 priority POEs across the      country bordering DRC, Uganda, Tanzania and Burundi.</li><li data-list="1" data-level="1">WHO provided technical advice to public health authorities in Rwanda and at-risk countries on the implementation of evidence-informed and risk-based health measures; the strengthening
    of detection, reporting and management capacities at points of entry and across borders; and travel advice. </li><li data-list="1" data-level="1">WHO published interim guidance on the <a href="https://www.who.int/publications/m/item/considerations-for-border-health-and-points-of-entry-for-filovirus-disease-outbreaks">Considerations for border health and points of entry for filovirus disease outbreaks</a>, which applies to but is not limited to the recently ended MVD outbreak in Rwanda. </li><li data-list="1" data-level="1">WHO also published a statement <a href="https://www.who.int/news-room/articles-detail/who-advises-against-any-travel-and-trade-restrictions-with-rwanda-in-the-context-of-the-ongoing-marburg-virus-disease-(mvd)-outbreak">advising against any travel restrictions and against any trade restrictions with Rwanda</a> in the context of the recently ended MVD outbreak.&nbsp; </li><li data-list="1" data-level="1">WHO continues to provide support in surrounding countries to assess
    the readiness of healthcare facilities, points of entry and border communities within surrounding countries and specifically risk mapping for areas bordering Rwanda.</li><li data-list="1" data-level="1">WHO published the      interim guidance on <a href="https://www.who.int/publications/i/item/B09185">risk communication and community engagement for Marburg      virus disease outbreaks</a> on 10 December 2024.&nbsp;</li></ul>
