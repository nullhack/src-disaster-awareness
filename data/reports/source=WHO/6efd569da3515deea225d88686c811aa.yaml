  Summary: "On 20 December 2024, after two consecutive incubation periods (total of 42 days) since the second negative PCR test was conducted on 7 November for the last confirmed Marburg case,   and without a new confirmed case reported, the Ministry of Health of Rwanda declared the end of the Marburg virus disease (MVD) outbreak, as per the WHO recommendations. The outbreak had been declared on 27 September 2024. \r\nAs of 19 December 2024, 66 confirmed cases,15 deaths with a case fatality ratio (CFR) of 23%, and 51 recovered cases have been reported. The last confirmed case was reported on 30 October 2024. \r\nWHO through its country office and development partners provided technical and financial support to the government to contain this outbreak. The risk of re-emergence of MVD still remains even after the official declaration of the end of the outbreak, linked to viral persistence in body fluids (mostly semen) of recovered patients and the animal reservoir in the country. WHO encourages\
    \ maintaining early case detection and care capacities in addition to sustaining the ability to quickly respond, also underscoring the importance of the recovered patient program, psychosocial support, and continued risk communication and community engagement."
