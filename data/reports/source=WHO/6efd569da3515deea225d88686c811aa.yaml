  Advice: '<p>WHO encourages maintaining early detection and care capacities in addition to sustaining the ability to quickly respond after the outbreak ends. This is to make sure that if the disease re-emerges, health authorities are able to detect it immediately, prevent the disease from spreading again, and ultimately save lives.</p><p>Raising awareness of risk factors for Marburg virus infection and protective measures that individuals can take is an effective way to reduce human transmission. WHO advises the following risk reduction measures as an effective way to reduce MVD transmission in healthcare facilities and in communities:</p><ul type="disc"><li data-list="0" data-level="1">Reducing the risk of bat-to-human transmission      arising from prolonged exposure to mines or caves inhabited by fruit bat      colonies. People visiting or working in mines or caves inhabited by fruit      bat colonies should wear gloves and other appropriate protective clothing      (including masks).</li><li
    data-list="0" data-level="1">WHO encourages countries to implement a      comprehensive care programme to support people who recovered from MVD with      any subsequent sequelae and to enable them to access body fluid testing      and to mitigate the risk of transmission through infected body fluids by      adequate practices.</li><li data-list="0" data-level="1">Capabilities for early detection of MVD      patients should be maintained over time in settings at risk of the      disease. </li><li data-list="0" data-level="1">Reducing the risk of human-to-human      transmission in the community arising from direct or close contact with      infected patients, particularly with their body fluids. Close physical      contact with MVD patients should be avoided. Patients suspected or      confirmed for MVD should be isolated in a designated treatment centre for      early care and to avoid transmission at home.</li><li data-list="0" data-level="1">Communities affected by MVD, along with
    health authorities, should ensure that the      population is well informed, both about the nature of the disease itself      and about necessary outbreak containment measures.</li><li data-list="0" data-level="1">Outbreak containment measures include safe and dignified burial of the deceased,      identifying people who may have been in contact with someone infected with      MVD and monitoring their health for 21 days, separating the healthy from      the sick to prevent further spread and providing care to the confirmed      patient and maintaining good hygiene and a clean environment need to be      observed.</li><li data-list="0" data-level="1">Critical infection prevention and control measures should be implemented and/or strengthened      in all health care facilities, per <a href="https://www.who.int/publications/i/item/WHO-WPE-CRS-HCR-2023.1">WHO&rsquo;s Infection prevention and control      guideline for Ebola and Marburg disease</a>. &nbsp;&nbsp;Health workers caring for patients
    with      confirmed or suspected MVD should apply <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2">transmission-based precautions</a> in addition to: <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1">standard precautions</a>, including appropriate use      of PPE and hand hygiene according to the <a href="https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21">WHO 5 moments</a> to avoid contact with      patient&rsquo;s blood and other body fluids and with contaminated surfaces and      objects. Waste generated in healthcare facilities must be safely      segregated, safely collected, transported, stored, treated and finally      disposed. Follow the national guidelines, rules and      regulations for safe waste disposal or follow the <a href="https://iris.who.int/bitstream/handle/10665/85349/9789241548564_eng.pdf;sequence=1">WHO&rsquo;s
    guidelines on safe waste management</a> </li><li data-list="0" data-level="1">Patient-care activities should be undertaken in a clean and hygienic environment that      facilitates practices related to the prevention and control of      health-care-associated infections (HAIs) as outlined in <a href="https://www.who.int/publications/i/item/9789241547239">Essential environmental health standards in health care</a>. Safe water, adequate sanitation and hygiene      infrastructure and services should be provided in healthcare facilities. For      details on recommendations and improvement, follow the <a href="https://openwho.org/courses/wash-fit">WASH FIT implementation Package</a></li></ul><p>Based on the current risk assessment, WHO advises against any travel restrictions or any trade restrictions with Rwanda at this time. For further information, please see <a href="https://www.who.int/news-room/articles-detail/who-advises-against-any-travel-and-trade-restrictions-with-rwanda-in-the-context-of-the-ongoing-marburg-virus-disease-(mvd)-outbreak">WHO
    advice for international traffic in relation to the Marburg virus disease outbreak in Rwanda</a>.&nbsp;</p>'
  Assessment: <p>With 66 confirmed cases reported, this is the third largest MVD outbreak reported to date, with almost 80% of confirmed cases reported among health workers. Healthcare-associated infections (also known as nosocomial infections) of this disease can lead to further spread if not controlled early. In compliance with WHO recommendations, the criteria to declare the end of an outbreak after two maximum incubation periods (42 days) was observed with no new confirmed or probable case of MVD detected.</p><p>Based on the outbreak investigation which included record review in health facilities, review of epidemiological data, serology and genomic sequencing, as well as environmental and animal testing, the source of the outbreak is reported to be of zoonotic origin, linked to exposure in a cave inhabited by fruit bats.<sup>[1] </sup>Surveillance in miners working in the caves was put in place to detect any new cases. </p><p>There remains a risk of re-emergence of MVD even following
    the declaration of the end of the outbreak linked to a new spillover from interactions with the animal reservoir. The virus may also persist for an extended period in the body fluids (mostly semen) of people who recovered from the disease, underlying the importance of their participation in the recovery care program, and the support the program provides.</p><p>Based on the available information at the end of MVD outbreak in Rwanda, the risk is considered as&nbsp;<em>low</em><em>&nbsp;</em>at the national, regional and global levels.<span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span></p>
  Overview: <p>Since the last <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON544">Disease Outbreak News</a> on this event was&nbsp;published on 13 November 2024, no new confirmed cases of Marburg virus disease (MVD) have been reported in Rwanda. As of 19 December 2024, 66 confirmed cases, including 15 deaths (CFR 23%), and 51 recovered cases have been reported. Among the confirmed cases, 68% are males, and 46% are adults between 30 and 39 years of age. Health workers from two health facilities in Kigali account for almost 78% of all confirmed cases. Most cases are reported from the three districts of Kigali city, namely Gasabo, Kicukiro and Nyarugenge. </p><p>The highest number of confirmed cases (61) were reported in the first three epidemiological weeks (week 39-41, from 23 September to 13 October) of the outbreak. This was followed by a sharp decline, with three or less cases reported between epidemiological week 42 (14 to 20 October) and 44 (28 October to
    3 November). The last confirmed case was reported on 30 October and the last death on 14 October 2024.</p><p>As of 6 December 2024, 7874 Marburg virus tests had been conducted at the Rwanda Biomedical Center. &nbsp;&nbsp;</p><p>On 8 November 2024, the recommended 42-day countdown to declare the end of the outbreak commenced, following two consecutive PCR negative tests from the last confirmed MVD case on 7 November. The 42-day countdown period is twice the maximum incubation period for Marburg virus infections, since the last potential exposure to the last reported case. The last confirmed case was reported on 30 October and the last death on 14 October 2024.</p><p>On 20 December 2024, after completion of two consecutive incubation periods (total of 42 days) without a new confirmed case being reported, the Ministry of Health of Rwanda declared the end of the outbreak.</p><p><strong>Figure 1. Marburg virus disease cases by week of reporting in Rwanda, as of 19 December 2024, (n=66)</strong></p><p
