  Summary: 'The World Health Organization (WHO) was notified of three human cases, including one death, of Middle East respiratory syndrome coronavirus (MERS-CoV) between 10 and 17 April 2024, by the Ministry of Health of the Kingdom of Saudi Arabia (KSA). All three cases were males from Riyadh aged between 56 and 60 years with underlying health conditions and were not health care workers. The three cases are epidemiologically linked to exposures in a health-care facility in Riyadh, although investigations are ongoing to verify this and understand the route of transmission. Since the beginning of the year, a total of four cases and two deaths have been reported from the Kingdom of Saudi Arabia. The notification of these cases does not change WHO’s overall risk assessment, which remains moderate at both the global and regional levels. '
