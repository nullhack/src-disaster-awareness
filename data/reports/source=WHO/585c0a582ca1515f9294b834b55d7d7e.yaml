  Summary: "On 14 June 2024, the Ministry of Health and Medical Education (MoHME) of Iran reported the first two locally acquired cases of dengue recorded in the country. Local transmission of dengue within the community was confirmed in Bandar-Lengheh, Hormozgan Province, southern Iran. \r\nAs of 17 July 2024, the total number of locally acquired (autochthonous) dengue cases in the country has risen to 12, all reported in Bandar-Lengheh.\r\n\r\nDengue is a mosquito-borne viral disease caused by the dengue virus, with the potential to cause a serious public health impact. The primary vectors that transmit the disease are mosquitos of the Aedes genus, primarily Aedes aegypti and, to a lesser extent, Aedes albopictus.\r\n\r\nIran's MoHME has enacted measures to strengthen hospital readiness. The World Health Organization (WHO) is supporting the MoHME to enhance surveillance, distributing medical and rapid diagnostic supplies, providing training, and organizing risk communication and community\
    \ engagement (RCCE) activities.\r\n\r\nOn 16 May 2024, WHO reassessed the global risk of dengue as high, reiterating that dengue remains a global public health threat. The risk for Iran is also high due to the presence of the vector in the country, favourable climate conditions for the vector and the movement of people from countries with ongoing dengue outbreaks and endemic areas to Iran."
