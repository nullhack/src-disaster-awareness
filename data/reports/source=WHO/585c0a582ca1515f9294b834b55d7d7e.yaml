  Advice: <p>The proximity of mosquito vector breeding sites to human habitation is a significant risk factor for dengue virus infection. <em>Aedes</em> species mosquitoes can become infected with the virus after biting individuals infected with DENV and then transmit the virus to others in the vicinity. This cycle, therefore, makes the infective mosquito capable of spreading the dengue virus within households and in the neighborhoods of cases, leading to clusters. An integrated approach including all the components for preparedness, prevention and control of dengue is needed as outlined in the <a href="https://www.who.int/initiatives/global-arbovirus-initiative">Global Arbovirus Initiative</a>.&nbsp; </p><p>Effective vector control interventions are key to the prevention and control of dengue. Vector control activities should target all areas where there is a risk of human-vector contact, such as residences, workplaces, schools, and hospitals. WHO promotes Integrated Vector Management to
    control <em>Aedes</em> species, including removing potential mosquito breeding sites, reducing their populations, and minimizing individual exposure. This should involve vector control strategies for larvae and adults (i.e., environmental management and source reduction), especially monitoring water storage practices, draining and cleaning household water storage containers weekly, larvicide in non-potable water using WHO-prequalified larvicides at correct dosages, distribution of insecticide-treated nets for fever/dengue inpatients to contain the spread of the virus from health facilities. Indoor space spraying for rapidly containing dengue-infected mosquitoes may be challenging to deliver in densely populated urban areas. </p><p>Personal protective measures are recommended from dawn to dusk due to the diurnal <em>Aedes</em> aegypti. During outdoor activities, personal protective measures recommended include topical repellents to exposed skin or the treatment of clothing and using long-sleeved
    shirts and pants. Indoor protection can include the use of household insecticide aerosol products, or mosquito coils during the day; window and door screens can reduce the chances of mosquitoes entering the house and insecticide-treated nets offer good protection to people against mosquito bites while sleeping during the day. These measures and mosquito control should also cover workplaces and schools since the vectors are day-biting mosquitoes. Entomological surveillance should be undertaken to assess the breeding potential of <em>Aedes</em> mosquitoes in containers to target vector control activities and monitor insecticide resistance to help select the most effective insecticide-based interventions. </p><p>There is no specific treatment for dengue infection. However, early detection and access to appropriate healthcare for case management reduces mortality, as can rapid detection of dengue cases with warning signs and timely referrals of severe cases to tertiary healthcare facilities.
    Case surveillance should continue to be enhanced in all affected countries and globally. Where feasible, resources should be allocated for the strengthening of case referral mechanisms and for the confirmation and serotyping of the dengue viruses.</p><p>TAK-003 is a licensed dengue vaccine, and WHO currently recommends its use in children aged 6&ndash;16 years in settings with high dengue transmission intensity. WHO recommends that countries consider introducing TAK-003 into their routine immunization programmes in geographical locations where high transmission intensity of dengue poses a significant public health problem.</p><p>WHO does not currently recommend the programmatic use of TAK-003 in children aged &lt;6 years because of the lower efficacy of the vaccine in this age group.</p><p>WHO, recommends that vaccination against dengue must be part of an integrated strategy to control the disease, including vector control, proper case management, community education, and community engagement.</p><p>Countries
    are encouraged to adopt effective case management, prevention and control of dengue and other arboviruses, and share their experience through heightened research projects, particularly given the recent <a href="https://apps.who.int/gb/ebwha/pdf_files/WHA75/A75_R8-en.pdf">WHO recommendations on clinical trials</a>. Implementing clinical surveillance and case and death report forms for dengue could be particularly useful in understanding the disease better and also form a basis for developing clinical trials for new therapies or quality improvement initiatives.</p><p>In light of recent outbreaks of dengue virus infection and ongoing transmission in multiple regions where <em>Aedes aegypti</em> and <em>Aedes albopictus</em> mosquitoes are present, WHO has compiled <a href="https://www.who.int/publications/m/item/dengue-information-for-travelers">information for travellers</a> to be aware of the risk of transmission and take steps to protect themselves from infection.</p><p>WHO does not
    recommend any general travel or trade restrictions based on the available information.</p>
  Assessment: <p>This represents the first report of autochthonous dengue cases ever documented in Iran. The confirmation of local dengue transmission in 2024 is thus an atypical yet foreseeable event due to the presence of the vector in the country and the movement of people from endemic areas to Iran.</p><p>Based on entomological surveillance, to date, <em>Aedes aegypti</em> and <em>Aedes albopictus</em> are present in the provinces of Baluchistan, Bushehr, Fars, Gilan, Golestan, Hormozgan, Khuzestan, Mazandaran and Sistan.</p><p>On 16 May 2024, WHO reassessed the global risk of dengue, confirming it to be high and emphasizing that dengue continues to pose a significant public health threat worldwide.</p><p>The national risk for Iran is also high due to the presence of the vector in the country, favorable climate conditions for the competent vector and the movement of people from countries experiencing ongoing outbreaks and endemic areas to Iran. There is heightened awareness of the potential
    increase in importations and subsequent transmission of the disease during the upcoming Arbaeen pilgrimage in August, when millions of people from different countries, including countries reporting dengue cases travel to Iran.</p>
  Overview: <p>On 14 June 2024, the Ministry of Health and Medical Education (MoHME) of Iran reported local transmission of dengue in Bandar-Lengheh, Hormozgan Province, within southern Iran.</p><p>Two cases of dengue, without any history of travel outside Iran, were confirmed through Polymerase Chain Reaction (PCR) testing conducted by the Arbovirus laboratories of the Pasteur Institute in Bandar Abbas.</p><p>By 17 July 2024, a total of 12 autochthonous cases of dengue have been documented in Iran, all of which were reported in Bandar-Lengheh, Hormozgan Province.&nbsp;</p><p>Iran had been reporting an average of 20 imported dengue cases annually between 2017 and 2023. However, there was a significant increase in imported dengue cases in 2024, with 137 reported between 15 May and 10 July.&nbsp;</p><p>This represents the first report of autochthonous dengue cases in Iran. The confirmation of local dengue virus transmission in 2024 is therefore an unusual although expected event due to the
    presence of the vector in the country and movement of people from endemic areas to Iran. </p><p>Based on entomological surveillance, to date, <em>Aedes</em><em> aegypti</em> and some <em>Aedes</em><em> albopictus</em> mosquitoes are established in the provinces of Sistan and Balouchistan, Hormozgan, Bushehr, Khuzastan, and Gilan.&nbsp;</p><p>In the WHO Eastern Mediterranean Region, dengue outbreaks continue to be reported in both fragile, conflict-affected, and/or vulnerable countries in the region that have weakened healthcare systems as well as countries with stronger healthcare systems that have been affected by unusual rains due to climate change.&nbsp;<em>Ae. aegypti</em> and some <em>Ae. albopictus</em> mosquitoes have been identified in most of the countries in the region.</p>
