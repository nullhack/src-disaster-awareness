  Epidemiology: <p>Dengue is a mosquito-borne viral disease caused by the dengue virus (DENV), with the potential to cause a serious public health impact. Dengue infections are the most common vector-borne viral infections worldwide, particularly impacting tropical and subtropical countries. The virus is primarily transmitted through the bite of infected <em>Aedes</em> mosquitoes, most commonly <em>Aedes&nbsp;</em><em>aegypti</em> and <em>Aedes albopictus</em>. The proliferation and propagation of mosquitoes depend on climatic factors such as temperature, humidity and rainfall. The virus can be carried by infected travelers (imported cases) and may establish new areas of local transmission where there is a susceptible population and the local presence of vectors.</p><p>DENV has four serotypes (DENV-1, DENV-2, DENV-3, DENV-4). Infection with one serotype provides long-term immunity to the same serotype and short-term immunity to the other serotypes, after which secondary infections with a
    different serotype increase the risk for severe dengue. Dengue cases are most commonly asymptomatic or result in mild febrile illness. However, some cases will develop severe dengue, which may involve shock, severe bleeding or severe organ impairment. This stage often starts after the fever has gone away and it is preceded by warning signs such as intense abdominal pain, persistent vomiting, bleeding gums, fluid accumulation, lethargy or restlessness, and liver enlargement.</p><p>There is no specific treatment for dengue, but the timely diagnosis of dengue cases, identification of warning signs for severe dengue, and appropriate clinical management are key elements of care to prevent the progression to severe dengue and deaths.&nbsp;<span style="background-color:initial;color:#333333;font-family:inherit;font-size:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">WHO recommends the TAK-003 dengue licensed vaccine in children aged
    6&ndash;16 years in settings with high dengue transmission intensity.</span></p>
