  Epidemiology: '<p>Mpox is an infectious disease caused by the monkeypox virus (MPXV). There are two known clades of MPXV: clade I, previously called the Congo Basin clade; and clade II, previously called the West African clade, which includes subclades IIa and IIb. MPXV transmits between humans through close contact with lesions, body fluids, respiratory droplets or contaminated materials, or from animals to humans through contact with live animals or consumption of contaminated bushmeat. Mpox causes signs and symptoms which usually begin within a week of exposure but can start 1&ndash;21 days later. Symptoms typically last 2&ndash;4 weeks but may last longer in someone with a weakened immune system. Fever, muscle aches and sore throat appear first, followed by skin and mucosal rash. Lymphadenopathy (swollen lymph nodes) is also a typical feature of mpox, present in most cases. Children, pregnant women and people with weak immune systems are at risk of developing complications and death
    from mpox.</p><p>It is important to distinguish mpox from chickenpox, measles, bacterial skin infections, scabies, herpes, syphilis, other sexually transmissible infections, and medication-associated allergies. Someone with mpox may also concurrently have another sexually transmissible infection such as herpes. Alternatively, a child or adult with suspected mpox may have chickenpox. For these reasons, laboratory testing of skin specimens obtained by swabbing is important for confirmation of mpox, particularly for the first cases in an outbreak or new geographic area, and implementation of public health and social measures to curb transmission.</p><p>Treatment is based primarily on managing clinical symptoms, ensuring skin care, reducing pain, and preventing and managing complications. Where available through emergency or compassionate use programmes, specific antiviral medications such as tecovirimat can also be used in the treatment of mpox, particularly for severe cases or individuals
    at higher risk of complications.</p>'
