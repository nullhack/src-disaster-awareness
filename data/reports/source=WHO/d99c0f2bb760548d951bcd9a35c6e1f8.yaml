  Advice: <p><strong>General</strong>&nbsp;</p><p>Health authorities and clinicians/health and care workers of all countries should be aware that the global mpox outbreak linked to clade IIb MPXV is ongoing in all WHO regions and the risk of cross-border and international spread exists.&nbsp;National reporting to WHO is less complete and timely in recent months, and the number of cases continues to be underestimated globally.</p><p>WHO strongly advises that countries continue to follow the Standing Recommendations issued by the Director-General in August 2023, particularly concerning the epidemiological surveillance of mpox. </p><p>Countries should continue to strengthen the availability of and access to laboratory diagnostics in line with updated WHO interim guidance, including genomic sequencing of viruses.&nbsp;&nbsp;Detection of viral DNA by polymerase chain reaction (PCR) is the preferred laboratory test for mpox. The best diagnostic specimens are taken directly from the rash &ndash;
    skin, fluid or crusts &ndash; collected by vigorous swabbing. In the absence of skin lesions, testing can be done on oropharyngeal, anal or rectal swabs. However, while a positive result of oropharyngeal, anal or rectal sample confirms mpox, a negative result is not enough to rule out MPXV infection. Testing of blood is not recommended. Serology does not distinguish between different orthopoxviruses and is therefore restricted to reference laboratories where antibody detection methods may be applied for retrospective case classification or in special studies. </p><p>There must be sustained implementation of risk communication and community engagement appropriate to each context, maintenance or initiation of vaccination for persons at risk, optimal case management, adherence to infection control measures, strengthening research to better appreciate modes of transmission in different contexts, and sustained support for the development of rapid diagnostic methods and treatments adapted
    to the needs of patients.&nbsp;&nbsp;</p><p>Health authorities should strive to achieve the elimination of human-to-human transmission of mpox and ensure the maintenance of capacity for outbreak response.&nbsp;&nbsp;Anyone with a clinical or laboratory-confirmed diagnosis of mpox should follow the instructions of health authorities according to the local context, including isolation during the infectious period. Contacts of a confirmed case are asked to limit their movements (and advised to abstain from sexual relations) for 21 days, the monitoring period for the appearance of possible symptoms.&nbsp;</p><p>Vaccination against mpox is recommended for people possibly at risk of contracting the disease.&nbsp;Specific antiviral treatments are currently being assessed for efficacy against mpox, such as tecovirimat. Access to tecovirimat is possible through national application for use under the <a href="https://iris.who.int/handle/10665/352902">WHO MEURI protocol</a> or request to WHO for
    access to the reserve for compassionate use.&nbsp;</p><p>It is essential to deepen knowledge in different contexts on optimal case management in the event of mpox and HIV co-infection, especially for patients who must initiate antiretroviral treatment. <strong></strong></p><p><strong></strong><strong>In the community</strong>&nbsp;</p><p>Risk communication and community engagement activities are vital in motivating affected communities to become aware of the risks and protective behaviours, and to understand, prevent and combat stigma and discrimination. In this outbreak, there is continuing risk of exposure to mpox in the community through sexual activity in high-risk settings where multiple sexual contacts may occur.</p><p>Key audiences should be identified and advice provided to health professionals, community organizations, managers of events and <a href="https://www.who.int/publications/m/item/public-health-advice-on-mpox-(monkeypox)-and-sex-on-premises-venues-and-events">sex-on-premises
    venues</a>, key populations including commercial sex workers, men who have sex with men, trans and gender-diverse individuals, people working at or attending venues and events where sexual activity takes place, and people at risk of more serious illness (including persons living with untreated or poorly controlled HIV infection).&nbsp;To keep venues safe, a risk-based approach is recommended, including risk evaluation, risk mitigation and risk communication for personnel and clients, accompanied by rigorous environmental infection prevention and control practices. </p><p>Patients without severe disease who can isolate at home should be given advice on how to care for themselves. This includes advice for taking care of the rash (don't scratch, clean your hands before and after touching lesions, keep your rash clean with sterilized water/antiseptic etc.) and supporting the patient&rsquo;s mental health (keep hydrated, eat well, get enough sleep, use medication for pain and fever if needed,
    do things you find relaxing/enjoyable etc.) Mental health and psychosocial support are essential for patients with mpox in all settings regardless of context. The details on public health advice on recovering from mpox at home are accessible in this <a href="https://www.who.int/news-room/public-advice/recovering-from-monkeypox-at-home">link.</a> </p><p>Health and care workers who provide care to patients in the community and/or household settings should refer to WHO Interim Rapid Response Guidance on case management and infection prevention and control for mpox for guidance on the IPC measures recommended. It is vital that infection control measures be implemented to prevent and stop transmission of mpox in household and community settings that may amplify risk.</p><p><strong></strong><strong>In healthcare settings</strong>&nbsp;</p><p>Implementing IPC measures in health care settings is necessary to prevent and stop the transmission of mpox. It is important to train staff on mpox and
    the appropriate control measures, such as <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1">standard</a> and <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2">transmission-based</a> precautions. Staff should also have access to and appropriately wear personal protective equipment, adhere to the WHO 5 Moments for hand hygiene, ensure frequent cleaning and disinfection of the patient environment, and implement appropriate patient placement and isolation. For further guidance on IPC measures required when caring for patients with mpox, please refer to WHO interim guidance <a href="https://iris.who.int/bitstream/handle/10665/355798/WHO-MPX-Clinical_and_IPC-2022.1-eng.pdf?sequence=1">Clinical Management and Infection Prevention and Control for monkeypox.</a></p><p>While protecting themselves with recommended measures, health and care workers should also ensure that stigmatization of patients with mpox is avoided and that psychological support
    is provided to patients and their families.&nbsp;</p><p><strong></strong><strong>At points of entry</strong>&nbsp;</p><p>It is recommended to encourage authorities, health and care workers and community groups to provide travellers with relevant information to protect themselves and others before, during and after travel to events or gatherings where mpox may present a risk.&nbsp;WHO advises against any travel and trade restrictions based on available information on the current outbreak. </p><p>As not all viral genomes from these cases have yet been sequenced, and there is known extensive commercial and professional exchange between South Africa and central Africa, it is also critical to remain vigilant regarding the possibility of importation of clade I strains to South Africa.&nbsp;<br /></p>
  Assessment: '<p>The sudden appearance of unlinked cases of mpox in South Africa without a history of international travel, the high HIV prevalence among confirmed cases, and the high case fatality ratio suggest that community transmission is underway, and the cases detected to date represent a small proportion of all mpox cases that might be occurring in the community; it is unknown how long the virus may have been circulating. This may in part be due to the lack of early clinical recognition of an infection with which South Africa previously gained little experience during the ongoing global outbreak, potential pauci-symptomatic manifestation of the disease, or delays in care-seeking behaviour due to limited access to care or fear of stigma.&nbsp;&nbsp;</p><p>At present, most of the transmission in the initial cases is linked to recent sexual contacts among men, similar to the spread in newly affected countries during the 2022-2024 multi-country outbreak. For most confirmed cases, no
    epidemiological link has been established, possibly due in part to incomplete contact identification. This suggests that undetected community transmission is occurring and that further cases can be expected as surveillance is strengthened. The current risk to human health for the general public remains low in the country. The risk for gay men, bisexual men, other men who have sex with men, trans and gender diverse people, and sex workers is moderate, as currently assessed for the global outbreak. The higher risk assessment is consistent with ongoing transmission among recognized risk groups due mainly to exposure through sexual contact, and the higher prevalence of undetected or uncontrolled HIV infection in the country which also puts people at risk of severe disease. There is potential for increased health impact should wider dissemination continue in vulnerable groups in South Africa or neighbouring countries. Data from ongoing mpox outbreaks show that the risk of severe disease and
    death is higher among children, immunocompromised individuals including persons with poorly controlled HIV, and pregnant women.&nbsp;&nbsp;</p><p>The most recent Joint United Nations Programme on HIV/AIDS (UNAIDS) data estimate HIV prevalence among men who have sex with men in South Africa to be around 30%, only 44% of whom are on antiretroviral therapy. This makes this group extremely vulnerable to severe mpox disease and death. There is also a hazard to health workers if they are not appropriately using personal protective equipment (PPE) when caring for patients with mpox.&nbsp;&nbsp;</p><p>Prior to 2022, the CFR for clade II MPXV in West Africa was estimated to be 3.6% (95% CI: 1.7%, 6.8%). Case fatality in the ongoing multi-country outbreak (0.2%) is the lowest recorded for MPXV clade II. In contrast, the CFR among cases reported in South Africa in 2024 is extremely high (15%), as most detected cases are among persons who are immunocompromised with uncontrolled HIV and other co-morbidities.
    Persons with less severe mpox are less likely to recognize the condition or seek diagnosis and care; therefore, such cases may remain undetected and unreported.&nbsp;</p><p>Vaccination with mpox vaccines has been shown to be effective against mpox. The last case of smallpox in South Africa was reported in 1972, and smallpox vaccination stopped shortly after the global eradication of the disease in 1980. Thus, any immunity from prior smallpox vaccination (which is cross-protective for mpox) will at best now only be present in some persons over the age of 44 years. The median age of mpox cases in the current global outbreak is 34 years (IQR: 29 - 41) and within South Africa, reported cases are aged between 17-43 years.&nbsp;</p><p>The limited awareness of mpox and lack of knowledge about practices for prevention among health workers and among key populations such as sex workers or men who have sex with men in the country exacerbates their risk for mpox. Anyone suffering from disfiguring
    skin conditions, including mpox, may experience fear and stigma, which can be further compounded for key populations.&nbsp;</p><p>There is concern that the mpox outbreak in South Africa will continue to evolve given:&nbsp;&nbsp;</p><ul><li>The&nbsp;high likelihood of under-detection and under-reporting&nbsp;of local transmission, given that reported cases have to date almost exclusively affected the most vulnerable.</li><li>Currently, all detected cases have presented with severe&nbsp;disease and extensive skin lesions, which could lead to more viral transmission and risks poor outcomes for the patients.&nbsp;</li><li>While the government and partners are mobilized to introduce treatment for affected patients and vaccines for people at risk, these countermeasures are&nbsp;not yet widely available in the country.&nbsp;&nbsp;</li><li>Public awareness&nbsp;of mpox&nbsp;and information about modes of transmission or possible amplifying events or risk of exposure in sex-on-premises venues
    remains&nbsp;limited in South Africa. &nbsp;&nbsp;</li><li>Concurrent&nbsp;outbreaks of mpox are occurring in Africa and elsewhere, increasing the risk of further transmission.&nbsp;</li></ul>'
  Overview: '<p>The IHR NFP of the Republic of South Africa notified WHO of 20 confirmed mpox (monkeypox) cases between 8 May and 2 July 2024, including three deaths (CFR 15%). These cases were reported in three of nine provinces: Gauteng (10 cases; 1 death), Western Cape (1 case), and KwaZulu-Natal (9 cases; 2 deaths).&nbsp;</p><p>The cases are all male, aged between 17 and 43 years, and almost all self-identified as men who have sex with men (MSM). Most are persons living with HIV, with unmanaged or only recently diagnosed HIV infection and advanced HIV disease (AHD), and one has diabetes.&nbsp;All cases were symptomatic, with extensive skin lesions and 18 required hospitalization. None of the confirmed cases reported a history of international travel and none reported attending high-risk social gatherings. The type of exposure reported by cases is sexual contact.&nbsp;</p><p>For the first 16 cases overall, 44 contacts were identified in KwaZulu-Natal, 39 contacts in Western Cape, and
    55 in Gauteng province. While three of the four initial cases in KwaZulu-Natal were epidemiologically linked through contact tracing, at least the initial seven in Gauteng province were not found to be epidemiologically linked, suggesting community transmission is underway. &nbsp;Individual contact tracing for recent cases is ongoing.&nbsp;In addition, limited information suggests that some affected persons have attended and been exposed to mpox at parties or clubs where sexual activity occurs.</p><p>Genomic sequencing, available for five confirmed cases has identified sub-clade IIb MPXV, the clade linked to the multi-country mpox outbreak.&nbsp;&nbsp; </p><p>During the ongoing 2022-2024 multi-country outbreak, five mpox cases had previously been confirmed in South Africa, during the peak in June-August 2022, and all had reported travel abroad. None of the cases were severe. No cases were reported in 2023.&nbsp;</p><p><strong>Figure 1. </strong>Geographic distribution of reported mpox
    cases and deaths, South Africa, 8 May to 2 July 2024 (n=20) </p><p><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/mpox-map.png?sfvrsn=52d59096_3" style="display:block;margin-left:auto;margin-right:auto;" class="-align-center" alt="mpox map" sf-size="69534" /></p>'
