  Response: <p><strong>Coordination</strong>&nbsp;</p><ul><li>Establishment of a national mpox Incident Management Team (IMT), with biweekly multisectoral coordination meetings with provincial mpox response coordination.&nbsp;&nbsp;</li><li>Mapping of implementing partners and non-governmental organizations at national, provincial, district and sub-district levels for coordination of response activities.&nbsp;</li><li>Ministerial press briefing on mpox held on 12 June 2024.&nbsp;&nbsp;</li><li>The National Department of Health issues regular mpox media statements emphasizing prevention measures and addressing stigma. &nbsp;&nbsp;</li></ul><p>&nbsp;<strong>Surveillance</strong></p><ul><li>Outbreak response teams deployed and supporting outbreak investigations.&nbsp;</li><li>Ongoing contact tracing and active case search.&nbsp;&nbsp;</li><li>Generation of weekly national mpox situation reports.&nbsp;</li></ul><p><strong>Laboratory:</strong>&nbsp;</p><ul><li>Mpox clinical specimen collection
    and processing guidelines updated and disseminated to health facilities.&nbsp;&nbsp;</li><li>All public health facilities refer samples through the National Health Laboratory Service (NHLS) network to the National Institute for Communicable Disease (NICD) for testing.&nbsp;</li><li>Private health facilities can test for mpox and send specimens for sequencing to the NICD.&nbsp;</li><li>Target turnaround time for testing and reporting on results for suspected cases and symptomatic contacts is within 24 hours.&nbsp;</li><li>Increasing testing capacity through decentralizing testing to include private laboratories.&nbsp;&nbsp;</li><li>Preparations are underway to roll out mpox environmental surveillance leveraging established wastewater surveillance sites.&nbsp;&nbsp;&nbsp;</li></ul><p><strong>Case management:</strong>&nbsp;</p><ul><li>Implementation of immediate isolation of suspected and confirmed cases in a hospital or, for non-severe disease, at home, to prevent transmission.&nbsp;</li><li>Fast
    tracking approval of national clinical guidelines and circulation to all public and private healthcare facilities.&nbsp;</li><li>Ongoing capacity building for health and care workers, including a clinical management webinar attended by over 500 health professionals, to update clinicians on mpox case detection, clinical care, and infection prevention and control; provinces conducting training for healthcare workers.</li><li>Supplemental clinical care, including mental health and psychological support for health workers, patients and their relatives prioritized for inclusion in case management guidelines, plans, and trainings. </li><li>The Department of Health obtained authorization for use of tecovirimat from the South Africa Health Products Regulatory Authority (SAHPRA).&nbsp;</li><li>Tecovirimat application through Section 21 (SAHPRA) and 15 courses of tecovirimat provided to South Africa by WHO.&nbsp;</li></ul><p><strong>Risk Communication and Community Engagement (RCCE):</strong>&nbsp;</p><ul><li>Messages
    developed to support risk communication and community engagement, which integrates aspects of sexual transmission of mpox. </li><li>Risk communication messages translated into local languages and aligned with context.&nbsp;</li><li>Sensitization of affected communities initiated in KwaZulu-Natal and Gauteng provinces; training for Health Promoters and other stakeholders conducted in Gauteng.&nbsp;</li><li>Health promoters conducting health promotion talks at clinics and community settings on mpox as part of routine health promotion activities.&nbsp;</li><li>Public awareness event at Braamfontein, Johannesburg conducted mid-June 2024, in conjunction with non-governmental organizations (NGOs).&nbsp;</li><li>Engagement with relevant National Department of Health (NDoH) programmes to support RCCE activities (e.g., STI, HIV, TB etc.).&nbsp;</li><li>Identified and engaged NGOs working with key populations (e.g., MSM).&nbsp;</li><li>Partners engaged in awareness building during the Pride event
    in Durban.&nbsp;&nbsp;</li><li>Regular online updates through the NICD webpage. <a href="https://www.nicd.ac.za/mpox-updates/">Link</a></li></ul><p><strong>Vaccination strategies and research initiatives:</strong>&nbsp;</p><ul><li>National Advisory Group on Immunization (NAGI) Technical Working Group mpox vaccine recommendations for South Africa endorsed by the National Department of Health.&nbsp;&nbsp;</li><li>Risk groups for pre-exposure vaccination include men who have sex with men, health workers and laboratory personnel while sexual, household, and health facility contacts will be offered post-exposure vaccination.&nbsp;&nbsp;</li><li>Discussions are underway regarding options for vaccine procurement.&nbsp;</li><li>WHO and partners supporting the development of vaccination strategies for emergency response and discussions regarding clinical vaccine studies for vaccines and therapeutics.</li></ul><p><strong>Infection Prevention and Control (IPC)</strong>&nbsp;</p><ul><li>Reviewing
    IPC action plans for health facilities and the community.&nbsp;</li><li>Refresher training conducted for IPC staff.&nbsp;</li><li>Guidelines on the safe management of human remains and burial updated and distributed, including training for undertakers.&nbsp;</li></ul><p><strong>Continuity of essential health services (CEHS)</strong>&nbsp;</p><ul><li>The affected provinces are conducting health facility readiness assessment to identify gaps.&nbsp;</li><li>The mpox IMT is working to integrate prevention, screening and management of mpox into HIV and STI care in the Key Populations programme of the National Department of Health.</li></ul><p><strong>Equipment and resources:</strong>&nbsp;</p><ul><li>Logistics support was provided for the collection, transport, and examination of samples from suspected cases.&nbsp;</li><li>Equity Pharma working with NDoH- Affordable Medicine Directorate (AMD) regarding access to therapeutics.&nbsp;</li></ul>
