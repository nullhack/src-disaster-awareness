  Advice: '<p>To reduce the impact of the event in the Basankusu health zone, WHO advises the following measures:&nbsp;&nbsp; <br /></p><ul data-list="0" data-level="1"><li>Careful characterization of the clinical syndrome and outcomes as well as an improved case definition based on collected information to better understand the outbreak.</li><li>Enhanced surveillance focusing specifically on deaths, and severe febrile cases or severe cases of unexplained illness, with better clinical characterization to reinforce early case detection and reporting.</li><li>Continued laboratory testing and environmental assessments (including water sources) to evaluate the current hypotheses of meningitis and/or a toxin/poisoning event, particularly among severe cases and deaths.</li><li>Risk communication and community engagement to increase public awareness about the event, explaining symptoms and the importance of seeking immediate care. It is also critical to address any potential misinformation about
    the outbreak circulating in the community.<br /></li></ul> '
  Assessment: <p>Since the initial cluster of deaths was reported on 9 February 2025, there has been an overall downward trend in deaths. The most recent death was reported on 22 February 2025. Current epidemiological information suggests a localized event with a steady decline in incidence, not expanding in time and place. Given the clinical presentation of deaths and the speed from symptom onset to death in this unusual cluster, current differentials include a rapid onset bacterial meningitis cluster or a contamination by a chemical poisoning as key hypotheses in a context of high incidence of other common infectious diseases in the areas, particularly malaria. <br /></p> <p>Operational challenges related to this event involve the isolation of Basankusu and resulting logistical barriers, as it is located in a forested region, approximately 450 kilometers from the nearest major city of Mbandaka and has poor infrastructure. The remoteness of Basankusu has hindered the timeliness of the initial
    investigation and response activities and poses challenges to laboratory testing. Samples must be collected, stored, and shipped long distances to a larger city with laboratory testing capacity (either Mbandaka or Kinshasa), introducing delays in diagnosis. Access to care is another key challenge, as the region lacks robust healthcare services, and the region&rsquo;s poor infrastructure makes travel to neighboring health zones difficult, leading to delays in treatment. &nbsp;<br /></p> <p>The province faces a severe urban water crisis with only 5% of its urban population having access to drinking water. The water network suffers frequent leaks and has never been rehabilitated. Many households rely on unregulated private water sources such as wells, springs and streams which pose contamination risks. <br /></p> <p>With ongoing investigations and given that the causative agent of the cluster is not yet determined, there remains a level of risk attributed to the event. As such, the overall
    public health risk level to the affected communities is assessed as <strong>moderate. </strong><br /></p> <p>At the national level, however, the risk is considered <strong>low</strong> due to the localized nature of the event and apparent decreasing incidence. Similarly, at the regional and global levels, the risk is <strong>low</strong> at this time.&nbsp;</p>
  Overview: '<p>On 9 February 2025, an initial cluster of 24 community deaths of unknown origin were reported from a single village in Ekoto Health Area, Basankusu Health Zone, Equateur province, in the Democratic Republic of Congo. This triggered an investigation by the Ministry of Health, supported by WHO.<br /></p><p>Enhanced surveillance was implemented shortly after, using a broad working case definition given the limited details on the clinical presentation, disease progression, demographic and other characteristics of the initial cluster. As of 25 February, a total of 53 deaths were reported (Figure 1). Deaths occurred across all age groups, but compared to the age and sex distribution of the population, appeared to disproportionately affect adolescents and young adult males, particularly in the initial cluster (Figure 2). This further pointed to an unusual event, as mortality from common causes in the area is usually highest among the elderly, and among young children (under five
    years) in a context of a high burden from infectious diseases, including malaria. The majority of deaths (50) occurred in the same village (Figure 3). Furthermore, the incidence of death rapidly declined following the initial cluster (Figure 1), suggesting this is not an event spreading in time or place. <br /></p><p>The preliminary findings of the in-depth analysis revealed that the median time from symptom onset to death in the initial cluster was one day, with a mean time of two days. Symptoms reported include fever, chills, headaches, muscle aches, abdominal pains, diarrhea, sweating, dizziness, shortness of breath, agitation, and others. </p><p><strong>Figure 1: Epidemic curve showing deaths reported between 9 February and 25 February 2025, Basankusu health zone, Democratic Republic of the Congo. *&nbsp;</strong></p><p><img alt="Number of deaths" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/epi_deaths.jpg?sfvrsn=f449cb4e_3" sf-size="205557"
    /><strong>*Based on the line list available for deaths (n=53) as of 25 February 2025</strong></p><p><strong>Figure 2: Age-sex distribution of cases and deaths</strong><strong> reported between 9 February to 25 February 2025, Basankusu health zone, Democratic Republic of the Congo.&nbsp;</strong></p><p><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/age-sex-distribution.jpg?sfvrsn=f4f8685e_3" alt="Age sex distribution DRC" sf-size="144962" /></p><p><strong></strong><strong></strong><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Figure 3: Geographic distribution of all cases (left) and deaths (right) reported </strong><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">between 9 February and 25 February 2025, Basankusu health zone, Democratic Republic of
    the Congo*</strong></p><p><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/geographic-distribution-of-cases.jpg?sfvrsn=fffa2828_3" alt="Geographic distribution of cases and deaths" sf-size="157993" /><strong>*Based on the line list available for suspected cases (n=1198) as of 25 February 2025</strong></p><p>Since the initiation of enhanced surveillance,1318 people reported symptoms meeting the working suspected case definition. However, given the broad nature of the case definition (fever and one other symptom from a range of general respiratory, gastrointestinal, or neurological symptoms), the trends in cases are difficult to interpret, and most likely reflect the prevalence of a range of febrile illnesses in the community. This is further suggested by the age distribution broadly mirroring that of the population (Figure 2), and the high malaria positivity among cases that were tested (approximately 50% positive on rapid diagnostic tests),
    which is not deemed unusual in an area where malaria is hyperendemic. <br /></p><p><strong>Figure 4: Epidemic curve</strong><strong> showing suspected cases reported between 9 February to 25 February 2025, Basankusu health zone, Democratic Republic of the Congo. *</strong></p><p><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/epi_cases.jpg?sfvrsn=b0bb3d20_3" alt="Number of cases" sf-size="233114" /><strong>*Based on the line list available for suspected cases (n=1198/1318) as of 25 February 2025</strong></p><p>Although the cases were initially identified using a broad (i.e. non-specific) case definition, given the localized nature of the cluster of deaths, the steady decline in incidence of deaths, the demographic profile of deaths, and the rapid disease progression in the initial cluster, working hypotheses are that of a contamination by a chemical poisoning&ndash;be it accidental or deliberate&mdash;or possibly a rapid onset bacterial meningitis
    cluster.<br /></p><p>Initial laboratory test results released on 13 February 2025 were negative for both Marburg and Ebola. Additional samples (blood, urine, oral, nasal) have been collected for further testing and investigations are ongoing. In addition, environmental samples&ndash;including water and other samples&ndash;are being collected to explore chemical causes, such as contamination by organophosphates. <br /></p><p>The definitive cause of illness remains undetermined. Further testing and field investigations are ongoing to better characterize the cases and deaths. <br /></p><p>Of note, this event in Basankusu follows a recent cluster of community deaths in the Bolomba Health Zone, which occurred from 10 to 27 January 2025. The epidemiological investigation documented 12 cases with eight deaths. Laboratory testing excluded Ebola and Marburg virus diseases and suggested that severe malaria could be the cause. While both Bolomba and Basankusu are located within Equateur Province,
    these health zones are separated by approximately 175 kilometers of difficult terrain including dense forests and poor road infrastructure; epidemiological investigation has found no evidence linking these distinct events.<br /></p>'
