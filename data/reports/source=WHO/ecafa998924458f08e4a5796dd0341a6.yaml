  Response: <ul><li><strong>Coordination:</strong>&nbsp;A provincial rapid response team deployed to Basankusu and arrived on 16 February. The team was further supported by a WHO-MoH team from Kinshasa which arrived on 23 February.<br /></li><li><strong>Surveillance:</strong>&nbsp;WHO is supporting the MoH teams with field investigations, including the development of a structured epidemiological investigation protocol and the collection of additional samples for testing. As surveillance is being scaled up, the focus is on better understanding the characteristics of deaths. WHO is supporting health teams in their case investigations and active case search in the affected areas, including in communities, churches, and health facilities.&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;
    &nbsp; &nbsp;&nbsp;<strong></strong></li><li><strong>Laboratory:</strong>&nbsp;WHO is providing laboratory support to guide proper collection, storage, and transport of collected specimens to the National Institute of Biomedical Research (INRB) in Kinshasa, the biggest and most equipped laboratory in the country.<br /><strong></strong></li><li><strong>Logistics:</strong>&nbsp;WHO has provided essential medical supplies for management of usual infectious diseases and their symptoms, laboratory testing and infection prevention and control (IPC).<br /><strong></strong></li><li><strong>Risk communication and community engagement:&nbsp;</strong>Community engagement efforts are ongoing. Training sessions for community health workers are being conducted on how to identify people who meet the case definition and perform disease surveillance reporting. Awareness activities include community briefings and local radio broadcasts, as well as targeted discussion in villages on care-seeking behavior.&nbsp;<br
    /><strong></strong></li><li><strong>Infection prevention and control:</strong>&nbsp;Systematic decontamination of isolation rooms at the General Hospital in Basankusu and Ekoto Health Center have been performed. On-site training of IPC supervisors and hygienists on chlorine solution preparation for decontamination have been conducted.</li></ul>
