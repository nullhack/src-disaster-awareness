  Response: <p>The public health sector of Viet Nam has taken the following response actions:&nbsp;&nbsp;</p><ul><li>The national authorities have called for enhanced surveillance, human-animal health coordination, and outbreak investigation, particularly at the subnational level.&nbsp;</li><li>The Son La Provincial Center for Disease Control (PCDC) are collaborating with local public health and animal health officials for further investigation and contact tracing. &nbsp;</li><li>On 11 August, Son La PCDC submitted an official report on their retrospective case investigation, prevention, and control activities, along with recommendations to local health and animal health authorities.&nbsp;</li></ul>
