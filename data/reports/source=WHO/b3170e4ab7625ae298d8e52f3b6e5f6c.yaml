  Response: <div><p>Human psittacosis is a notifiable disease in the concerned countries. Epidemiological investigations were implemented to identify potential exposure and clusters of cases.</p><p><span style="background-color:initial;color:#333333;font-family:inherit;font-size:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">National surveillance systems are closely monitoring the situation, including laboratory analysis of samples from wild birds submitted for avian influenza testing to verify the prevalence of <em>C. psittaci</em> among wild birds.</span><br /></p></div>
