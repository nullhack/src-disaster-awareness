    report has been amended to correct the diagnostic procedures reported for Austria to reflect the use of serological tests for the confirmation of Psittacosis</em></p>'
  Summary: "In February 2024, Austria, Denmark, Germany, Sweden and The Netherlands reported an increase in psittacosis cases observed in 2023 and at the beginning of 2024, particularly marked since November-December 2023. Five deaths were also reported. Exposure to wild and/or domestic birds was reported in most of the cases.\r\n\r\nPsittacosis is a respiratory infection caused by Chlamydophila psittaci (C. psittaci), a bacteria that often infects birds. Human infections occur mainly through contact with secretions from infected birds and are mostly associated with those who work with pet birds, poultry workers, veterinarians, pet bird owners, and gardeners in areas where C. psittaci is epizootic in the native bird population.\r\n\r\nThe concerned countries have implemented epidemiological investigations to identify potential exposures and clusters of cases. Additionally, implemented measures include the analysis of samples from wild birds submitted for avian influenza testing to verify\
    \ the prevalence of C. psittaci among wild birds.\r\n\r\nThe World Health Organization continues to monitor the situation and, based on the available information, assesses the risk posed by this event as low."
