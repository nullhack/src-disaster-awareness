  Response: '<p>WHO collaborates closely with Ministries of Health and partners<strong> </strong>to coordinate cholera response efforts, strengthen surveillance systems, and support diagnostics, case management, and vaccination campaigns.<strong> </strong>This includes deploying rapid response teams, providing training and supplies for clinical and laboratory staff, supporting WASH and IPC measures in health facilities, and facilitating access to Oral Cholera Vaccines (OCV) through the International Coordinating Group (ICG) mechanism.<strong>&nbsp;</strong>WHO and partners also promote integrated risk communication and community engagement to support cholera-affected countries through information sharing, training, and development of integrated RCCE plans and tools. In addition, WHO<strong> </strong>encourages countries to use the Global Task Force on Cholera Control&nbsp;(GTFCC) tools to improve surveillance and guide targeted interventions.</p><p>On 26 August, the Africa CDC and WHO launched
    the Continental Cholera Emergency Preparedness and Response Plan for Africa 1.0, alongside a joint Incident Management Team. This initiative follows the commitment of African Heads of State and Government, who have elevated cholera to a continental priority through their recent high-level Call to Action, pledging to control and eliminate outbreaks by 2030.</p><p><strong>Overview of public health response in selected countries </strong></p><p><strong>Chad</strong></p><ul><li><strong>Coordination:&nbsp;</strong>WHO is working closely with the Ministry of Health and international partners to coordinate response efforts. Cross-border collaboration with Sudan is being supported to address shared challenges.<br /></li></ul><ul><li><strong>Epidemiological Surveillance and Laboratory: </strong><ul><li>Daily surveillance updates and sharing of epidemiological situation with all partners.</li><li>Active case finding in Dougi and Hadjer Hadid camps.</li><li>Donation of rapid diagnostic tests (RDTs)
    and reinforcement of the laboratory for culture confirmation of <em>V. cholerae</em> to reduce the need to transport samples to N&rsquo;Djamena.</li></ul></li><li><strong>Case Management: </strong>Patient care and prevention efforts continue in affected districts, with hospitalization, isolation, and set-up of initial five cholera treatment centres in Ouddai.<br /></li></ul><ul><li><strong>Supplies: &nbsp;</strong>Prepositioning of cholera kits for preparedness in yet to be affected districts, donation of treatment materials (peripheral, central and community kits) to affected districts.<br /></li></ul><ul><li data-list="0" data-level="1"><strong>Infection Prevention and Control /Water, Hygiene, and      Sanitation: </strong>Critical gaps remain, particularly in areas where water access is below emergency      standards and WASH funding is limited. Partners are urged to prioritize      WASH in future funding proposals to address waterborne disease risks      effectively.<br /></li></ul><ul><li
    data-list="0" data-level="1"><strong>Risk Communication and Community Engagement: </strong>Awareness campaigns are ongoing to promote hand hygiene, latrine use, early care seeking and food safety. RCCE partners are supporting integrated communication strategies.<br /></li></ul><ul><li data-list="0" data-level="1"><strong>Vaccination:</strong> The ICG approved a request from the Government of Chad for 870 000 doses for eastern Chad.&nbsp; An additional 250 000 doses were approved as prepositioning stock.&nbsp; Doses will arrive in the country on 29 August, and the campaign will be implemented shortly afterwards.<br /></li></ul><ul><li data-list="0" data-level="1"><strong>Preparedness and Readiness: &nbsp;</strong>Anticipating potential spread of the disease, the country is working with partners on preparedness in areas not yet affected.<strong> </strong>WHO prepositioned cholera kits in at-risk districts.</li></ul><p><strong>Democratic Republic of the Congo:</strong></p><ul><li><strong>Coordination:&nbsp;</strong>WHO
    has deployed multidisciplinary teams to Kinshasa to support technical response and coordination. A cross-border coordination meeting with the Republic of the Congo was held on 29 July, with another meeting in planning.<br /></li></ul><ul><li><strong>Epidemiological Surveillance and Laboratory: </strong>Technical support provided for cleaning and analysing surveillance data. Training sessions held on the use of cholera rapid diagnostic tests in selected health zones.<br /></li></ul><ul><li><strong>Case Management: </strong>Evaluations conducted in cholera treatment centres; medicines and supplies distributed to affected provinces. Hundreds of health technicians and community health workers were trained to support cholera response, including pre-referral care and household distribution of ORS and Aquatabs.</li><li data-list="0" data-level="1"><strong>Infection Prevention and Control /Water, Hygiene, and      Sanitation</strong><strong>: </strong>WASH efforts are ongoing, with      WHO
    providing logistical support and coordination to improve hygiene      infrastructure and water quality in affected areas.</li></ul><ul><li><strong>Risk Communication and Community Engagement: </strong>Mapping of vulnerable population and mass outreach activities reached over three million people across multiple provinces. Alerts received via call centre and interactive media broadcasts were conducted to promote cholera prevention. Briefings held for community teams and civil society members on communication, infodemic management, and cholera response strategies.<br /></li></ul><ul><li><strong>Vaccination:</strong> &nbsp;Since the beginning of the year, three vaccination campaigns have been implemented and targeted 8.6 million people living in 23 health districts of seven provinces. The most recent campaign started on 19 August and targeted 3.7 million people in the city of Kinshasa. A fourth request was approved by ICG to target an additional 2.2 million people in three Provinces of
    the country. The vaccines are planned to arrive in several lots between 22 and 29 August. &nbsp;</li></ul><p><strong>Republic of the Congo</strong></p><ul><li><strong>Coordination: </strong>WHO has deployed 33 experts, including epidemiologists, case management experts, RCCE and logisticians. Cross-border coordination with DRC is active.<br /></li></ul><ul><li><strong>Epidemiological Surveillance and Laboratory: </strong>Training of 80 community<strong> </strong>volunteers in Mossaka and Mbamou and provision of 200 cholera RDTs and Yoro and Brazzaville ports. Delivery of 9.5 tonnes of medicines and cholera kits.<strong></strong><br /></li></ul><ul><li><strong>Case Management: </strong>Briefing of 172 health workers on case management and IPC, installation of three treatment tents and construction of cholera treatment centres in Mbamou and Mossaka.<br /></li></ul><ul><li><strong>Infection Prevention and Control /Water, Hygiene, and Sanitation: </strong>Training on standard precautions      and
    biomedical waste management. Retraining of 22 health workers on      standard precautions and chlorination of water at Mossaka base hospital. Establishment      of a water supply circuit in Lissanga treatment unit.<br /></li></ul><ul><li><strong>Risk Communication and Community Engagement: </strong>Awareness raising conducted for 6023 people, including 318 households. Provision of support to community and religious leaders and distribution of 3000 posters to the Ministry of Health</li><li><strong>Vaccination:</strong>&nbsp; An OCV request targeting five health zones was approved by ICG members.<br /><strong></strong></li></ul><p><strong>South Sudan</strong></p><ul><li><strong>Coordination: </strong>WHO is coordinating with the Ministry of Health (MoH) and partners to manage the outbreak. <br /></li></ul><ul><li><strong>Epidemiological Surveillance and Laboratory: </strong><ul><li>WHO is supporting the MoH on routine analysis of reported cases to understand drivers of the outbreak and
    provision of feedback to the states and counties </li><li>WHO supported the government on the cholera testing algorithm, where sample collection and weekly testing from confirmed locations (3-5 samples) happen.</li></ul></li><li><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Case Management: </strong><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">WHO oversees the ongoing mapping of functional Oral Rehydration Points (ORPs), Cholera Treatment Centers (CTCs) and Cholera Treatment Units (CTUs), within the country. In addition, supported training of health-care providers on case management and community-based volunteers on community case management, provision of supplies to cholera treatment facilities, supported the set-up of oral rehydration points and improvements of cholera treatment facilities.</span></li></ul><ul
    type="disc"><li data-list="0" data-level="1"><strong>Infection Prevention and Control      /Water, Hygiene, and Sanitation: </strong>WASH interventions are being implemented with WHO      support, focusing on hygiene promotion, safe water access, and sanitation      improvements.</li></ul><ul><li><strong>Vaccination:</strong>&nbsp; Since the beginning of this outbreak, over 10 million OCV doses have been approved and delivered; campaigns have been completed across multiple regions with high uptake in several counties. &nbsp;Post-campaign evaluations are underway.&nbsp;</li></ul><p><strong>Sudan</strong></p><ul><li><strong>Coordination: </strong>WHO and<strong> </strong>partners are exploring ways to support cholera response efforts in Sudan and Chad, through technical assistance and potential deployments.</li></ul><ul type="disc"><li data-list="0" data-level="1"><strong>Infection Prevention and Control/Water,      Hygiene, and Sanitation: </strong>WASH interventions are being implemented
    with WHO support,      focusing on hygiene promotion, safe water access, and sanitation      improvements.</li></ul><ul><li><strong>Vaccination:</strong>&nbsp; Since the beginning of the outbreak, 17 requests have been approved through the ICG mechanisms, targeting 25 million people.</li></ul><ul type="disc"></ul>'
