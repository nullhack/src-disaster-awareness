  Title: Cholera – Multi-country with a focus on countries experiencing current surges
  Epidemiology: <p>Cholera is an acute diarrheal infection&nbsp;caused by consuming food or water contaminated with the bacterium <em>Vibrio cholerae</em>. It is primarily associated with poor sanitation and limited access to safe water. The disease can cause severe acute watery diarrhoea, resulting in significant morbidity and mortality. The speed of spread depends on exposure levels, population vulnerability, and environmental conditions. Cholera affects both children and adults and can be fatal if left untreated. &nbsp;&nbsp;However, cholera is easily treatable, with most cases successfully managed through prompt administration of Oral Rehydration Solution (ORS).</p><p>The incubation period ranges from 12 hours to five days after consuming contaminated food or water. While most infected individuals remain asymptomatic, they can still shed the bacteria in faeces for up to 10 days, potentially spreading the infection to others. Among symptomatic cases, most experience mild to moderate illness,
    while a smaller proportion develop severe diarrhoea and vomiting, which can lead to life-threatening dehydration.</p><p>Humanitarian crises and disasters from natural hazards, such as floods, heighten the risk of cholera transmission by disrupting water and sanitation systems and forcing populations into overcrowded, unsanitary conditions. Controlling cholera outbreaks requires a multisectoral approach, combining surveillance, WASH interventions, adequate case management, social mobilization, community engagement and risk communication and oral cholera vaccination.</p>
  Advice: <p><strong>Leadership and coordination</strong></p><p>Response to cholera outbreaks requires strong multi-sectoral, multi-partner coordination, ensuring epidemiological data is available to guide coordinated responses across case detection, RCCE, WASH, case management, OCV administration and prevention of further spread.&nbsp; Coordination mechanisms should build on existing mechanisms where available and should be implemented at both national and sub-national levels. </p><p><strong>Epidemiological Surveillance and Laboratory</strong></p><p>WHO supports the national surveillance systems with the deployment of rapid response teams and assistance for data reporting and analysis. WHO supports diagnostics through the provision of rapid diagnostic test kits, training of clinical staff on sample collection and the use of RDTs, training of laboratory diagnosticians, the development and dissemination of recommendations and tools and provision of materials for laboratory diagnostics. </p><p>To
    strengthen early detection of cases and the monitoring of cholera outbreaks, WHO recommends:</p><ul><li>Deployment of rapid response teams</li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Integrate health facility-based surveillance, community-based surveillance and event-based surveillance while also integrating epidemiological data with test results</span></li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Regularly evaluate surveillance systems and use results to strengthen</span></li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Use <a href="https://www.gtfcc.org/resources/public-health-surveillance-for-cholera/">standard recommended definitions</a> of suspected cholera cases and of
    acute watery diarrhoea</span></li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Use of rapid diagnostic tests for the early detection of suspected or probable cholera outbreaks</span></li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Systematically record standard case-based data on suspected cholera cases detected by health-facility-based surveillance</span></li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Perform routine analysis of key morbidity and mortality indicators (CFR -health facility-deaths and community deaths) at administrative or health zone levels to orient response activities to target the most affected populations.</span></li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Strengthening
    laboratory capacity to confirm cholera outbreaks and monitor antimicrobial resistance</span></li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Data sharing and joint intervention planning between neighbouring countries, especially in regions with high cross-border movement, is important to prevent further geographic spread and control importation of cases and or existing outbreaks. &nbsp;</span></li></ul><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"><strong>Case Management</strong></span></p><p>In order to improve cholera case management, it is advised to use treatment protocols and clinical materials, and to ensure staff at CTCs, CTUs, and ORPs receive proper training and supervision.</p><p>Multiple countries are reporting high CFR and a high proportion of deaths occurring in communities.
    To reduce cholera deaths, WHO recommends:</p><ul><li>Working with RCCE colleagues to promote awareness of cholera, including the importance of early initiation of ORS and rapidly seeking treatment if symptoms occur</li><li>Ensuring early access to treatment through implementation of community-based treatment strategies, including oral rehydration points and distribution of ORS via Community Health Workers</li><li>Reinforce or set up referral mechanisms, including transport from the community and outpatient community structures to inpatient facilities </li><li>Setting up dedicated cholera treatment structures &ndash; these may be integrated into existing health-care facilities or be set up as independent structures</li><li>Training staff to recognize and treat patients with suspected cholera</li><li>Ensure adequate supplies for patient treatment</li></ul><p><strong>Infection Prevention and Control (IPC)/Water, Hygiene, and Sanitation (WASH)</strong></p><p>WHO recommends strengthening
    WASH and IPC measures in health-care facilities through regular evaluations, staff training, provision of essential supplies, and proper implementation of protocols to reduce transmission. Priority WASH and IPC activities include:</p><ul><li>Improving WASH in healthcare facilities - adequate quantity and quality of water, availability of toilets</li><li>Ensuring at least minimum infection prevention and control measures are implemented in health-care facilities, and especially cholera treatment facilities</li><li>Provision of safe drinking water</li><li>Water quality monitoring</li><li>Safe excreta disposal</li><li>Distribution of WASH kits in affected communities</li><li>Promotion of protective hygiene practices</li></ul><p><strong>Risk Communication and Community Engagement</strong></p><p>Risk communication and Community Engagement colleagues work across all response pillars, supporting information exchange between affected populations and public health responders. WHO recommends:</p><ul><li>Community
    promotion of early care seeking,</li><li>Promotion of preventive hygiene measures &ndash; hand and food hygiene</li><li>Supporting implementation and OCV campaigns </li><li>Developing social listening to understand the concerns and any misinformation circulating in affected communities so they can be addressed</li><li>Engagement of communities on the protection of water sources</li></ul><p><strong>Vaccination</strong></p><p><a href="http://www.gtfcc.org/wp-content/uploads/2024/12/who-oral-cholera-vaccines-in-mass-immunization-campaigns.pdf">Oral Cholera Vaccine campaigns</a> are an important tool to control cholera outbreaks when used alongside improvements in water and sanitation. OCV protects affected communities and reduces the impact of the outbreak when timely implemented and reduces the risk and extent of outbreak spread. Single-dose strategies for reactive vaccination are currently in effect. Preventive vaccination campaigns have been suspended since late 2022, and the vaccine
    shortfall has now stalled reactive vaccination efforts as well. &nbsp;WHO recommends:</p><ul><li>Fostering the preparedness and the definition of vaccination strategies for outbreak response</li><li>Submission of a timely and targeted ICG request for reactive vaccination campaign</li><li>Strong risk communication to inform communities about campaigns, enhance demand, maximise uptake and build trust around vaccine safety and efficacy</li><li>Integration of RRCE into vaccination plans</li><li>Readiness and timely implementation of vaccination campaigns</li><li>Fostering sound evaluation and impact assessment of reactive vaccination campaigns</li></ul><p>WHO does not recommend travel or trade restrictions to and from the cholera outbreak-affected countries.</p>
  Assessment: <p>As of 17 August 2025, cholera outbreaks continue to escalate across multiple countries, with seven of the 31 countries now reporting case fatality rates above 1%, indicating serious gaps in case management and delayed access to care. Among these, four countries&mdash;Chad, the Democratic Republic of the Congo (DRC), South Sudan, and Sudan&mdash;are currently classified as being in a major outbreak due to the severity and scale of their outbreaks. </p><p>All countries highlighted in this report are facing multiple and similar challenges to control the ongoing outbreaks, underscoring the urgent need for public health interventions and international support.</p><p>Cholera outbreaks have been recurrent in several areas of the Democratic Republic of the Congo and South Sudan over the past years. In contrast, Chad and the Republic of the Congo have not reported large-scale outbreaks in recent years. This limited exposure has contributed to low levels of awareness regarding cholera
    prevention and treatment among both communities and health-care providers, which can contribute to late detection of cases and late care seeking. &nbsp;</p><p>Access to affected populations continues to be severely constrained by challenging geography, including outbreaks occurring in remote and hard-to-reach areas such as the Democratic Republic of the Congo and the Republic of the Congo. In Chad, South Sudan, and Sudan, access is further impeded by seasonal flooding and poor road infrastructure, limiting the mobility of both national and international health workers and the timely delivery of essential medical supplies.</p><p>These geographic and infrastructural barriers are also hindering the implementation of community programmes, including the decentralization of treatment services. As a result, delays in accessing care are contributing to elevated case fatality rates. The Republic of the Congo and Chad are currently reporting the highest CFRs at 7.7% and 6.8%, respectively. Nearly
    50% of reported deaths occur within communities before patients reach health facilities.</p><p>Insecurity, population displacement, and the ongoing refugee crisis&mdash;particularly in Chad, South Sudan, and Sudan&mdash;are compounding these challenges. In these settings, CFRs consistently exceed the 1% threshold, underscoring the impact of restricted access to care. In conflict-affected areas, including parts of Sudan and eastern DRC, insecurity and displacement continue to obstruct surveillance activities and limit the ability to accurately assess the scope of the outbreaks.</p><p>Cross-border population movement, particularly in areas with porous borders and high mobility, further exacerbates the risk of regional spread. Many of these countries share borders and experience frequent migration due to trade, displacement, and conflict, increasing the likelihood of cholera transmission across national boundaries. </p><p>Inadequate access to clean water and sanitation remains a common
    denominator across all affected countries, leaving communities highly vulnerable to cholera outbreaks. Seasonal factors such as heavy rains and flooding further amplify this risk by contaminating water sources and facilitating rapid transmission. </p><p>These systemic barriers, coupled with overstretched response capacities, are contributing to high case fatality. There is an urgent need to decentralize treatment services, strengthen surveillance systems, and improve access to lifesaving care to reduce preventable deaths and mitigate the impact of ongoing outbreaks.</p><p>Given the scale, severity, and interconnected nature of these outbreaks, the risk of further spread within and between countries is considered very high. Without urgent and coordinated public health measures, including improved case management, WASH interventions, vaccination campaigns, and cross-border collaboration, cholera transmission is likely to expand across countries.&nbsp;</p>
  Overview: '<p>In 2025, the global cholera situation continues to pose a significant public health challenge across multiple regions. </p><p>Between 1 January and 17 August 2025, a total of&nbsp;409 222 cholera/AWD cases&nbsp;and&nbsp;4738 deaths&nbsp;were reported globally, from 31 countries.<sup>[1] </sup>During the same period in 2024, 510 638 cases and 3248 deaths were reported from 28 countries, representing a 20% decrease in cases, but a 46% increase in deaths.</p><p>In 2025, the Eastern Mediterranean Region recorded the highest number of cholera/AWD cases (230 991 cases, six countries), followed by the African Region (172 750 cases, 23 countries), the South-East Asia Region (2985 cholera/AWD cases, five countries), and the Region of the Americas (2496 cases, one country). Cholera-related deaths were highest in the African Region (3763 deaths, CFR 2.2 %), followed by the Eastern Mediterranean Region (943 deaths, CFR 0.4%), the Region of the Americas (31 deaths, CFR 1.2%), and the
    South-East Asia Region (One death, CFR 0.03%). Meanwhile, the European and Western Pacific regions have not reported any outbreaks.&nbsp; </p><p>Cholera is resurging in a number of countries, with some that had not reported substantial case numbers in years, including Chad and the Republic of the Congo, while others, including the Democratic Republic of the Congo (DRC), South Sudan, and Sudan, are experiencing outbreaks that are continuing from 2024, with significant geographic expansion. The spread into previously unaffected areas is complicating containment efforts and straining fragile health systems. These trends reveal deep systemic weaknesses in health systems, Water, Hygiene, and Sanitation (WASH), and disease surveillance systems, especially in countries facing humanitarian crises. Cross-border transmission is occurring, underscoring the urgent need for stronger surveillance, timely reporting, and coordinated response across international borders.</p><p>The disease burden remains
    high, particularly in the following countries currently experiencing acute outbreaks: &nbsp;Chad, DRC, the Republic of the Congo, South Sudan,&nbsp;and Sudan. These countries continue to report high transmission rates, case fatality rates, and experience significant challenges in outbreak control and access to care. </p><p>However,&nbsp;differences in case definitions and reporting systems have been observed across countries and regions, which may affect the comparability of data and the interpretation of trends. Therefore, given these complexities, the data presented here likely underestimates the true burden of cholera and should be interpreted with caution.</p><div><div id="ftn1"><p><strong>Figure 1</strong>. The global cholera and acute watery diarrhoea (AWD) cases per 100 000 population, 1 January to 17 August 2025 * </p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/cholera-global-map.png?sfvrsn=8d364d26_4"
    height="464" style="max-width:100%;height:auto;" title="Cholera global map" width="805" alt="Cholera global map" sf-size="128937" /></p><p>* Afghanistan and Myanmar report AWD cases.</p><p><strong>Figure 2</strong>. Number of cholera cases by epidemiological week of reporting, as of 17 August 2025. Data source: WHO </p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/cholera-global-epi-curve.png?sfvrsn=5f72ef04_3" height="742" style="max-width:100%;height:auto;" title="Cholera global epi curve" width="1067" alt="Cholera global epi curve" sf-size="157175" /></p><p><strong>Figure 3.</strong> Cholera cases by epidemiological week of reporting (Chad, Republic of the Congo, DRC, South Sudan and Sudan) available as of 17 August 2025. Data source: WHO&nbsp;</p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/cholera-epi-curve.png?sfvrsn=d56c6b7d_3"
    height="747" style="max-width:100%;height:auto;" title="Cholera Epi curve" width="970" alt="Cholera Epi curve" sf-size="141511" /><br /></p><p><strong>Overview of selected countries </strong></p><p>Cholera is resurging in a number of countries, including some that have not reported cases in years; the countries highlighted in this report continue to report high transmission rates, case fatality rates, and experience significant challenges in outbreak control and access to care. For a more detailed overview of cholera globally, please refer to the regularly produced global <a href="https://www.who.int/publications/m/item/multi-country-outbreak-of-cholera--external-situation-report--29--28-august-2025">cholera situation report</a>. <br /></p><p><strong>Chad</strong></p><p>On 24 July 2025, Chad officially confirmed a cholera outbreak, following the report of the first suspected case on 13 July from Dougui Camp in Chokoyane health district, located in Ouadda&iuml; province along the border
    with Sudan.<br /></p><p>Between 13 July and 19 August, the country reported a total of 776 cholera cases, including 53 deaths, resulting in a case fatality rate (CFR) of 6.8%. Of these deaths, 27 occurred in the community, highlighting gaps in timely access to care. Laboratory confirmation has been obtained for 32 cases through culture testing.<br /></p><p>As of 19 August, suspected cholera cases have been reported from two provinces (Ouadda&iuml; and Sila) and six health districts: Abdi, Adr&eacute;, Amleyouna, Chokoyane, Farchana and Hadjer Hadid. Among these, Chokoyane is the most affected, accounting for 541 cases and 25 deaths, with a district-specific CFR of 4.6%.<br /></p><p><strong>Republic of the Congo</strong></p><p>Between 23 June and 17 August 2025, the Republic of the Congo reported a total of 457 suspected cholera cases and 35 deaths, resulting in a CFR of 7.7 %. &nbsp;The outbreak, which began in the Brazzaville district, has been spreading to districts along the Congo
    River. Brazzaville has recorded a CFR of 4.8 % (269 cases; 13 deaths), while Congo-Oubangui has experienced a significantly higher CFR of 11.7 % (188 cases; 22 deaths).&nbsp; The most affected age group is 15 to 24 years, accounting for 19% of all reported cases. <br /></p><p><strong>Democratic Republic of the Congo</strong></p><p>From&nbsp;1 January to 10 August 2025, the Democratic Republic of the Congo has reported a total of&nbsp;46 800 cholera cases&nbsp;and&nbsp;1362 deaths, resulting in a&nbsp;CFR of 2.9%. Cholera cases have been reported in&nbsp;16 out of the country&rsquo;s 26 provinces, with&nbsp;Kwango&nbsp;being the most recently affected as of week 31.<br /></p><p>During&nbsp;week 32, the country recorded&nbsp;1887 new cases and 84 deaths, representing a&nbsp;4.8% and 1.2 % decrease&nbsp;compared to the previous week, respectively. In the past four weeks,&nbsp;57.4% of all cases&nbsp;have been concentrated in Kinshasa, North-Kivu,&nbsp;South-Kivu and Tshopo provinces.&nbsp;Kinshasa&nbsp;alone
    has reported&nbsp;1781 cases and 136 deaths, with a notably high&nbsp;CFR of 8%. In week 31, Kinshasa recorded&nbsp;126 cases and five deaths, with a weekly CFR of&nbsp;4%. This shows a declining trend compared with the previous weeks. &nbsp;&nbsp;<strong></strong><br /></p><p><strong>South Sudan </strong></p><p>From 1 January to 17 August 2025, South Sudan has reported a total of 71 825 suspected cholera cases and 1194 deaths, resulting in a CFR of 1.7 %. The outbreak has affected 55 of 80 counties across eight states and three administrative areas, demonstrating widespread transmission throughout the country. &nbsp;During the most recent reporting month, from 21 July to 17 August 2025, 2472 cases and 36 deaths were recorded nationwide. Between 14 July to 13 August 2025, approximately 74% of the cases reported were concentrated in Unity State, the Abyei Administrative Area, and Central Equatoria. Unity State reported 1562 cases and 10 deaths, Abyei recorded 988 cases and two deaths,
    while Central Equatoria registered 244 cases and two deaths. <br /></p><p><strong>Sudan</strong></p><p>Between 1 January and 11 August 2025, Sudan has reported a total of 48 768 cholera and acute watery diarrhoea cases, along with 1094 deaths, resulting in a CFR of 2.2 %. The outbreak has affected all 18 states, with the majority of cases, 72 % reported from Khartoum (22 225 cases), North Kordofan (7394 cases), and White Nile (5622 cases).<br /></p><p>Cholera has also been confirmed in all five Darfur states, where both cases and deaths are rising. New areas, including border localities near Chad, have recently reported cases, indicating expanding transmission.<br /></p><p>The reported cholera burden varies significantly across the Darfur states. In the northern state, 3687 cases and 26 deaths have been reported, with a CFR of 0.7 %. The southern state has recorded 1589 cases and 66 deaths, resulting in a higher CFR of 4.2 %. The central state has reported 682 cases and nine deaths (CFR
    1.3 %), while the eastern state has seen 517 cases and 26 deaths, with a notably high CFR of 5%. The western state has reported 17 cases with no associated deaths.<br /></p><p>There are identified gaps in the surveillance system in Darfur, which may lead to delayed reporting from some areas and no reports in others.</p></div></div>'
