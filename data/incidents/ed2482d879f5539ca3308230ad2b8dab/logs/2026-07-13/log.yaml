log_date: '2026-07-13'
summary: Typhoon Bavi made landfall in eastern China’s Zhejiang province on July 12, 2026, weakening to a severe tropical storm as it moved inland. Authorities evacuated 1.7 to nearly 3 million people ahead of the storm, which brought heavy rainfall and widespread flight and railway cancellations across the Yangtze River Delta region. The storm triggered red rainstorm alerts in parts of China and continued to cause flooding and infrastructure damage.
