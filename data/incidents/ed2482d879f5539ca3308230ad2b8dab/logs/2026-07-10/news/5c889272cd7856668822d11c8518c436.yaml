title: Toll from flooding after storm in China increases to 39
body: Authorities in southern China yesterday said that 39 people have died in flooding from Tropical Storm Maysak, as Taiwan and China's east coast braced for another major storm. Most of the deaths were related to the breach of a dam in an area east of the city of Nanning,
