title: Earthquake of Magnitude 6.7 Strikes Near Indonesia's Palu on Sulawesi Island; No Tsunami Warning issued
body: 'Earthquake: An earthquake with a magnitude of 6.7 jolted 46 km ESE of Palu, Indonesia at 0327 GMT on Tuesday, the US Geological Survey said.'
