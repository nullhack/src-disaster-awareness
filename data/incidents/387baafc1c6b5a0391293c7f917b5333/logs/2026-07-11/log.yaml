log_date: '2026-07-11'
summary: The death toll from the June 24 earthquakes has surpassed 4,300, with crematoria and morgues operating around the clock. Rescuers detected possible signs of life from a 9-year-old boy under rubble after 16 days, while the disaster has worsened mental health crises and caused identification errors in overwhelmed morgues, particularly affecting victims of a deportation flight. Relief efforts continue, with organizations like ShelterBox distributing aid and debates emerging about the impact of sanctions on recovery.
