title: 5.9-magnitude quake hits 42 km NNW of Te Anau, New Zealand -- USGS
body: An earthquake with a magnitude of 5.9 jolted 42 km NNW of Te Anau, New Zealand at 0914 GMT on Thursday, the U.S. Geological Survey said. The epicenter, with a depth of 76.4 km, was initially determined to be at 45.
