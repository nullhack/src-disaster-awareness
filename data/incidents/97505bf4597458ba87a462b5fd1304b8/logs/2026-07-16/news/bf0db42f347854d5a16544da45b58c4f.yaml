title: Strong earthquake rattles New Zealand's South Island, tsunami alert lifted
body: July 16 (Reuters) - A magnitude 5.9 earthquake struck near the town of Te Anau in New Zealand's South Island, shaking buildings and prompting authorities to briefly issue a tsunami warning. The earthquake's epicentre was about 40 km (25 miles) north of Te Anau,
