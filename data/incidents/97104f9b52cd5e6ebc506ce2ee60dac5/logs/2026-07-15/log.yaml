log_date: '2026-07-15'
summary: On July 14, 2026, a magnitude 6.5 offshore earthquake struck Davao Occidental province, likely related to the ongoing seismic activity following the June 26 quake, with aftershocks expected. Separately, a magnitude 5.2 aftershock hit Masbate, and Philippine officials thanked UAE for humanitarian aid to Mindanao earthquake victims.
