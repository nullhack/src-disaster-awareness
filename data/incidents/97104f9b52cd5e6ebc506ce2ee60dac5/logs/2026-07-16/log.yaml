log_date: '2026-07-16'
summary: A magnitude 6.2–6.5 earthquake struck off the coast of Balut Island, Sarangani, Davao Occidental late Tuesday evening (July 14, 2026), causing a minor sea level disturbance reported by Phivolcs. The event follows the series of Ring of Fire quakes in the region, including the prior June 26 and July 14 events, and aftershocks remain possible.
