  Summary: "Multi-country recalls of infant formula and other products have been initiated after cereulide toxin, was detected in batches of multiple internationally distributed brands. Investigations have identified arachidonic acid (ARA) oil, used as an ingredient in the implicated products, as the source of contamination. However, the full root cause analysis and complete traceability of all affected batches remains under investigation. Contaminated formulae, nutritional products, and oil mixes have been distributed to 99 countries and territories across six WHO Regions, with the first product recalls initiated on 10 December 2025. Between 1 January and 25 February 2026, 144 suspected and confirmed cases were reported across ten countries in three WHO Regions, with investigations ongoing.\r\nBased on the available information, WHO assesses the overall public health risk as moderate due to the vulnerability of the affected population (infants), the ongoing uncertainty regarding the full\
    \ extent of distribution and exposure, and remaining gaps in case detection and root cause information."
