  Response: <div>WHO Response:&nbsp;</div><div>Since 7 January 2026, when distribution of the products was confirmed to extend beyond the European Union, WHO, through the INFOSAN Secretariat, has been contacting INFOSAN Emergency Contact Points in the countries and territories identified as affected to notify them of recalled products exported to their markets and to support information exchange and coordinated response. Communication within the European Union has been managed through the European Rapid Alert System for Food and Feed (RASFF), with close coordination between INFOSAN and RASFF.</div><div><br /></div><div>Response measures in affected countries and territories:&nbsp;</div><div>Recalls and communication campaigns have been carried out in many countries and territories where contaminated products were distributed, preventing further exposures despite variable implementation of recall and withdrawal measures. Active case-finding and laboratory confirmation efforts are ongoing
    in affected countries and territories, with most countries and territories reporting no linked illnesses to date.</div>
