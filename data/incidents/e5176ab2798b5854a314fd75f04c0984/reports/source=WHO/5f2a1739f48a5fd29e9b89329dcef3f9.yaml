  Title: 'International food safety event: Infant formula and products containing arachidonic acid oil contaminated with cereulide toxin - Multi-country'
  Epidemiology: '<p>Cereulide is a heat-stable toxin produced by certain strains of <em>Bacillus cereus</em>, a Gram-positive, spore-forming bacterium ubiquitous in soil, dust, and food production environments. The primary hazard in this event is suspected to have occurred during the production of ARA oils used in infant formula, although a root cause analysis has not yet been provided to WHO.&nbsp; </p><p>Cereulide is not contagious; illness occurs only when a person ingests the toxin, such as through consumption of contaminated products. The toxin withstands cooking temperatures (stable up to 121&deg;C) and common pasteurization, persisting in finished products. Symptoms manifest rapidly, typically within 0.5&ndash;6 hours post-ingestion, and usually present as acute gastrointestinal symptoms (nausea, vomiting, abdominal pain) with risk of rapid dehydration and electrolyte imbalance which can be particularly severe in infants due to their physiological vulnerability and limited reserves.
    The toxin has a very low symptomatic dose threshold and remains fully active despite gastric conditions, contributing to its clinical potency. For babies who rely entirely on formula, repeated feedings can increase the amount of toxin consumed, and using contaminated formula for rehydration can worsen illness. </p><p>The absence of specific antidotes or targeted therapies places greater emphasis on supportive clinical care, effective risk communication to caregivers and health workers, and robust coordination between food safety and public health authorities. Where there is limited access to health care and where there may be delays in care seeking, rapid dehydration and electrolyte imbalance in infants may be fatal.</p><p>As of 25 February 2026, the following countries have notified suspected cases: Austria (9), Brazil (5),&nbsp; China, Hong Kong SAR, (1), Czechia (4), France (11), Italy (1), Singapore (3), Spain (41), and the United Kingdom of Great Britain and Northern Ireland (61).
    &nbsp;In other countries, including Denmark (32) and the Netherlands (221) the number of suspected cases is based on self-reporting and is therefore not comparable with the INFOSAN case definition. &nbsp;To date, Belgium is the only country with laboratory‑confirmed cases, reporting eight confirmed intoxications linked to the implicated products.</p>'
  Advice: <p>Based on the information available, WHO recommends Member States to maintain epidemiological&nbsp;surveillance, enhance readiness of laboratory capacity for cereulide testing of suspected contaminated products and in clinical samples of suspected cases, and facilitate effective implementation of recalls and withdrawals, as needed. <br /></p> <p><strong>WHO advises Member States to:&nbsp;</strong>&nbsp;</p><ul><li>Identify, trace, and withdraw all affected products from the market.</li><li>Verify the effectiveness of recalls at retail and distribution levels and ensure that affected products are not available for sale, including online sales.</li><li>Conduct sampling and laboratory testing of suspect products and human specimens.</li><li>Strengthen requirements for traceability across the supply chain and food recalls.</li><li>Enhance inspection and oversight of facilities producing or handling ingredients used in infant nutrition.</li><li>Share relevant information through established
    international information-sharing mechanisms, including INFOSAN.</li><li>Issue targeted alerts to consumers, caregivers, health workers, and retailers, while providing clear guidance on identifying and disposing of affected products.</li><li>Promote breastfeeding and address barriers to accessing safe alternative nutrition. </li><li>Encourage early presentation to health facilities for infants with sudden vomiting.</li><li>Reinforce guidance on dehydration management and red-flag symptoms, while supporting availability of tools for safe clinical management of affected infants.<br /></li></ul> <p>WHO recommends that no restrictions be applied for travel to, or trade with, the countries named in this report, based on the information available on the event&nbsp;reported here.&nbsp;&nbsp;</p>
  Assessment: <p><p>WHO assesses the overall public health risk associated with this event to be Moderate. This assessment is based on the information currently available and reflects the wide international distribution of contaminated products, ongoing uncertainties regarding the full extent of contaminated product distribution, case detection, and root cause of contamination, and the vulnerability of infants and young children to dehydration and electrolyte imbalance from with vomiting illness associated with cereulide toxin ingestion. <br /></p><p>Several considerations contribute to this assessment:<br /></p><ul><li>Cereulide is a thermostable emetic toxin that can cause acute vomiting and rapid dehydration particularly in very young infants which can have severe consequences if untreated; mild or self-limiting cases are likely to go unreported, especially in settings with limited healthcare access or diagnostic capacities.<br /></li><li>The extent of the contaminated ARA oil distribution&nbsp;remains&nbsp;uncertain,
    as complete traceability from the original implicated manufacturer has not been provided to WHO.&nbsp;<br /></li><li>Secondary distribution through commercial supply chains has further complicated efforts to identify all affected products. Additional investigation is required to determine the source and extent of the cereulide contamination.&nbsp; <br /></li></ul><p>The international spread of contaminated products has already disrupted trade and supply chains across at least 99 countries and territories, with the possibility of further recalls if&nbsp;additional&nbsp;affected batches or product categories are&nbsp;identified. These recalls, while essential for public health protection, have created a&nbsp;risk of&nbsp;localized shortage of&nbsp;infant formula,&nbsp;particularly in settings where reliance on specific products is high, despite manufacturers&rsquo; efforts to increase production of unaffected products. A residual&nbsp;risk of exposure persists while investigations and
    traceability efforts continue,&nbsp;as competent authorities manage evolving distribution information and update risk communication measures.&nbsp; <br /></p><p>Mild clinical presentations can resemble common childhood illnesses, laboratory capacity for&nbsp;cereulide&nbsp;testing in contaminated products or human samples varies widely, and variations in case definitions across countries complicate consistent reporting and may delay detection.&nbsp; </p><p>Although limited numbers of suspected and confirmed cases have been reported to date, without continued investment in surveillance for toxin‑related events, strengthened laboratory networks, training of health‑care providers, and clear communication on recalls and safe alternatives, delays in detection and response could lead to preventable morbidity in infants.</p></p>
  Overview: '<p>Since 10 December 2025, and as of 25 February 2026, 99 countries and territories have been identified as having received batches of infant formula products subject to recall due to contamination with cereulide toxin. During this period, 144 suspected and confirmed cases were reported across 10 countries. The epidemiological investigations and product‑traceback activities remain ongoing in many countries. </p><p>The case definitions in use by the International Food Safety Authorities Network (INFOSAN) are currently:</p> <p>Suspect case: A person presenting symptoms of cereulide intoxication with a history of consumption of the recalled product, without laboratory confirmation in a clinical sample.</p><p>Confirmed case: A person presenting symptoms of cereulide intoxication with a history of consumption of recalled product, with laboratory confirmation in a clinical sample.</p><p>Health authorities are actively searching for cases and conducting laboratory testing of human
    specimens and infant formula products. However, case definitions used may differ from those established by INFOSAN, such as those established by the European Centre for Disease Prevention and Control, creating challenges with comparability of reported case numbers. </p><p>Since this is not a routinely tested contaminant or condition, diagnostic challenges and limited surveillance capacity are hindering Member States&rsquo; ability to identify confirmed cases. One country has laboratory confirmed cases linked to the contaminated products (Belgium). </p><p>The limited case numbers appearing in multiple, geographically separated areas is consistent with sporadic exposures to contaminated products that were widely distributed. </p><p>​Precautionary recalls have been issued across all countries and territories where products were distributed. These measures aim to prevent further exposures, although the speed and completeness of product recall and withdrawal vary by location according to
    various factors including inspection and enforcement capacities.&nbsp;</p>'
