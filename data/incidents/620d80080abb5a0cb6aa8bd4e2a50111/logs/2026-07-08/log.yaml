log_date: '2026-07-08'
summary: A magnitude 6.4 earthquake struck the Papua New Guinea region on Monday, 2025-10-10, according to the German Research Centre for Geosciences (GFZ). The quake occurred at a depth of 106 km (66 miles), with the epicenter located approximately 139 km southeast of Lorengau, Manus Province. No immediate reports of damage or casualties have been mentioned.
