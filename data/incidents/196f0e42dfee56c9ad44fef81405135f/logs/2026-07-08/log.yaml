log_date: '2026-07-08'
summary: A 6.0 magnitude earthquake struck eastern Afghanistan on September 4, 2025, destroying several villages and causing widespread devastation. Initial reports indicated hundreds killed, but the death toll quickly rose to over 1,400 and later to 2,205, with thousands injured. Rescuers raced to reach remote mountain villages, and the Taliban called for foreign help amid overwhelmed local health systems.
