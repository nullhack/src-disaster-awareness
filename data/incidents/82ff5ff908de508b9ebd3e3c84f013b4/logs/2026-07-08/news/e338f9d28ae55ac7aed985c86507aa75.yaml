title: Rwanda's Marburg outbreak is under control, Africa's health chief says
body: KAMPALA – An outbreak in Rwanda of the Ebola-like Marburg fever is under control and travel bans targeting the East African country are unnecessary, the head of Africa's top public health agency said ...
