  Title: Yellow fever - Global
  Epidemiology: '<p>Yellow fever is an acute viral disease transmitted by day biting infected mosquitoes, primarily <em>Aedes</em>, <em>Haemagogus</em> and Sabethes species, occurring in tropical regions of Africa and the Americas. A total of 27 countries in Africa and 13 in Central and South America are considered at high risk for yellow fever transmission, with the majority of the global burden reported from Africa. The disease remains a major public health concern due to its epidemic potential and risk of international spread, particularly to areas with competent vectors and low population immunity.</p><p>Globally, yellow fever is estimated to cause between 67 000 and 173 000 severe cases annually, resulting in approximately 31 000 to 82 000 deaths. Transmission occurs through mosquito bites in three epidemiological cycles: sylvatic (jungle), intermediate, and urban, with the latter posing the greatest risk for large outbreaks in densely populated settings.</p><p>The incubation period
    is typically 3&ndash;6 days. Most infections are asymptomatic or present with a mild febrile illness characterized by fever, headache, myalgia, nausea, and vomiting, which generally resolve within a few days. However, approximately 15% of cases progress to a severe form of disease, marked by recurrence of high fever, jaundice, haemorrhage, and multi-organ failure. Among those who develop severe disease, case fatality can reach around 50% within 7&ndash;10 days.</p><p>Outbreaks can be difficult to detect and quantify, as the clinical presentation overlaps with other endemic diseases such as malaria, dengue and viral hepatitis, and surveillance systems may underreport cases. During epidemics, the actual number of infections is estimated to be 10 to 250 times higher than reported figures. Rapid laboratory confirmation and timely response are therefore critical for outbreak control.</p><p>Vaccination remains the most effective preventive measure, providing lifelong immunity after a single
    dose, and is central to outbreak prevention and control strategies, alongside vector surveillance and control measures. The recommendations by the WHO Secretariat for vaccination against YF for international travellers are available <a href="https://cdn.who.int/media/docs/default-source/travel-and-health/vaccination-requirements-and-who-recommendations-ith-2022-country-list.pdf?sfvrsn=be429f2_4&amp;download=true">here</a>.</p>'
  Advice: <p>Although immunization remains one of the most effective public health interventions for preventing this disease, most cases of yellow fever in humans reported during 2025 and 2026 had no history of yellow fever vaccination. Adequate preparedness and response to yellow fever outbreaks requires the integration of several components in addition to vaccination; epizootic surveillance and entomological surveillance, vector control, and risk communication should be considered. </p><p>WHO encourages Member States to continue their surveillance and vaccination efforts in areas with history of yellow fever transmission (African Region &amp; Region of the Americas). It is essential that countries achieve high vaccination coverage (A&gt;80% in populations in risk areas, in a homogeneous manner, and that health authorities ensure that they have a strategic reserve inventory that allows them to maintain routine vaccination and, at the same time, respond effectively to possible outbreaks.
    The global stockpile of yellow fever vaccines, coordinated by the <a href="https://www.who.int/groups/icg/yellow-fever">International Coordinating Group (ICG</a>), is available to all countries to facilitate rapid outbreak response and preventive vaccination efforts.<strong></strong></p><p><strong>Surveillance&nbsp; </strong></p><p>Member states in the African Region and the Region of the Americas that have areas at risk for yellow fever are encouraged to maintain strong epidemiological surveillance to detect the virus early and protect communities. Health authorities should issue timely alerts outlining how to identify a suspected case and ensure immediate reporting, even prior to laboratory confirmation. Active case finding, particularly for individuals presenting with fever and jaundice, should be conducted not only in affected areas but also in neighboring locations and places visited by the patient before symptom onset. In addition, retrospective review of recent death records can
    help identify cases that may have been missed. WHO emphasizes active surveillance, cross-border coordination, and timely information sharing. It is advised to strengthen surveillance through systematic investigation and laboratory testing of all suspected cases. Investigations should include assessment of the probable site of infection, documentation of exposure to wildlife or other potential vectors, verification of vaccination status, contact tracing with identification of potential secondary cases, and characterization of the transmission context.</p><p><strong>Epizootic surveillance</strong> </p><p>For Member states in the Region of the Americas that have high-risk areas for yellow fever, epizootic surveillance of non human primates is a critical early warning component of yellow fever monitoring. Because these species develop and succumb to infection before humans, confirmed illness or mortality among primates provides one of the earliest indicators of viral circulation in the sylvatic
    cycle. Detecting these events promptly enables health authorities to initiate rapid response measures, including enhanced human surveillance, field investigations, vector control, and targeted preventive vaccination in populations at risk. When implemented systematically and coordinated across human, animal, and environmental health sectors, this One Health approach strengthens outbreak preparedness and reduces the likelihood of human transmission.</p><p><strong>Laboratory diagnosis</strong> </p><p>The diagnosis of yellow fever is mainly carried out using virological methods (detection of the virus or genetic material in serum or tissue), serological tests to detect antibodies. </p><p>Virological diagnosis of yellow fever relies primarily on RT‑PCR, which can detect viral RNA during the first 5&ndash;10 days of illness and provides definitive confirmation when positive. Post‑mortem diagnosis is best achieved through liver histopathology with immunohistochemistry, supported by molecular
    testing of tissue samples. Serology becomes useful after day 5, but results must be interpreted cautiously due to cross‑reactivity with other flaviviruses and the influence of recent vaccination. PRNT offers greater specificity but can still show cross‑reactions in areas with multiple circulating flaviviruses. Overall, confirmation requires integrating laboratory results with epidemiological context and ruling out other flavivirus infections.</p><p><strong>Post-vaccination immune response </strong></p><p>Vaccination induces a relatively low viremia that decreases after 4 to 7 days. Simultaneously, an IgM-type response develops that cannot be differentiated from the IgM response induced by natural infection. Approximately 10 days after vaccination, the person is considered protected against natural infection. Thus, the vaccine IgM response can be detected around day five onwards, with a peak generally occurring two weeks after vaccination. Subsequently, the levels of these antibodies
    tend to decrease. However, IgM antibodies can persist for years after vaccination. Neutralizing antibodies induced by vaccination can be detected for several decades. This makes the interpretation of serological results in vaccinated individuals particularly complex, requiring careful evaluation. </p><p><strong>Clinical management</strong></p><p>Yellow fever is a severe viral hemorrhagic disease with sudden onset and a high fatality rate in its severe forms. The illness progresses through infection, remission, and a toxemic phase marked by jaundice, hemorrhage, and acute liver failure. In the absence of specific antiviral treatment, clinical management relies on early detection, close monitoring, and supportive care. Timely recognition of severe complications, especially liver failure, is essential to improving patient outcomes. </p><p><strong>Vaccination as a Primary Prevention Tool:</strong> Vaccination is the most effective measure for preventing and controlling yellow fever. The
    yellow fever vaccine is safe, affordable, and provides lifelong protection with a single dose. The WHO's <a href="https://www.who.int/initiatives/eye-strategy">Eliminate Yellow Fever Epidemics (EYE) strategy</a> recommends protecting populations aged 9 months to 60 years in all high-risk countries through routine immunization complemented by preventive mass vaccination campaigns. Achieving and sustaining high immunization coverage among children is essential to maintain strong population immunity. Vaccination of travellers to endemic areas is essential to prevent infection and reduce the risk of international spread. Preventive and outbreak response campaigns should be guided by updated risk assessments, ensuring sufficient vaccine supply and high coverage in at-risk groups. Vaccination decisions must consider precautions such as young age, pregnancy, older adults, and certain immune conditions, while strictly avoiding use in individuals with contraindications. Maintaining robust vaccination
    strategies is essential to prevent transmission and mitigate outbreak impact.<strong></strong></p><p><strong>Vector Control and Risk Communication:</strong> Effective vector control in urban settings, along with general mosquito bite avoidance strategies, is recommended to prevent disease transmission. Effective risk communication is essential for yellow fever, enabling timely public awareness, promoting preventive behaviors and vaccine acceptance, and should target both travellers and resident populations in high-risk countries.&nbsp;<strong></strong></p><p><strong>International Travel and Trade:</strong> All international travellers aged 9 months and older who are travelling to areas at risk of yellow fever transmission, as defined by WHO, including areas with evidence of persistent or periodic yellow fever virus circulation, are advised to be vaccinated. The vaccine is safe, highly effective, and provides lifelong protection. However, recommendations for infants under 9 months of
    age, pregnant or breastfeeding women and severely immunocompromised people require careful consideration, with vaccination advised in high-risk settings after weighing potential benefits against risks.&nbsp;</p><p>Under the International Health Regulations (2005) (IHR), it is a country&rsquo;s prerogative to require proof of yellow fever vaccination from incoming and/or outgoing travellers. For international travel purposes, the administration of yellow fever vaccine shall be documented in the International Certificate of Vaccination or Prophylaxis (ICVP); and the documented administration of one single dose of WHO-approved yellow fever vaccine, conferring lifelong immunity, shall be accepted as valid.&nbsp;</p><p>Given the evolving nature of yellow fever transmission, WHO advises Member States to remain updated with the latest information and guidelines available on the WHO International Travel and Health website. Local health authorities are encouraged to collaborate closely with WHO
    and other relevant stakeholders to implement effective yellow fever prevention and control measures, ensuring the safety and well-being of populations at risk.&nbsp;</p><p>WHO does not recommend any restriction on travel to or trade with the countries named in this report, based on the information available on the current event. Continuous efforts to educate travellers on preventive measures, including vaccination, are encouraged.</p>
  Assessment: <p>Yellow fever remains a significant public health threat in regions with historical transmission, particularly in parts of Africa and South America. Although the virus is maintained primarily through mosquito&ndash;primate transmission cycles, periodic spillover into human populations continues to occur, especially in forested and rural environments. While competent vectors are widely present and ecological and peri‑urban habitats are expanding, the potential for spread into new areas, including urban centres, remains substantial, particularly where population immunity is low. Outbreak risk is further amplified by population movement, fragile health systems, and gaps in routine vaccination.</p><p>Although most affected countries have established surveillance systems, insecurity, limited healthcare access, and delayed clinical presentation frequently hinder outbreak investigations and timely treatment. While early symptoms resemble other endemic diseases and laboratory capacity
    is often constrained, delays in diagnosis contribute to under‑reporting, especially in remote areas. As a result, the true burden of yellow fever is likely underestimated.</p><p>Unvaccinated individuals living in rural or forest‑edge communities remain the most exposed, while urban and peri‑urban populations in newly affected areas may also be at risk when competent vectors are present and immunity gaps persist. Travellers who are not vaccinated and who move into high‑transmission regions similarly face increased risk.</p><p>Yellow fever introduction into regions where <em>Aedes aegypti</em> is established remains possible through viremic travellers arriving from high‑transmission settings. Although no urban transmission has been documented in 2025-2026 in high‑risk countries, limited vector‑ surveillance and control capacity could facilitate spread if the virus were introduced in an insufficiently immunized population. While a sylvatic cycle has not been established in regions without
    prior yellow fever circulation, ecological suitability, cross‑border movement, the presence of non‑human primates, and gaps in immunity and surveillance continue to create vulnerability in several African countries classified as moderate risk. In countries lacking competent vectors, imported cases may occur, although onward transmission is unlikely; in these settings, the primary challenge is timely clinical recognition.</p><p>Vaccination remains the strongest determinant of risk. While vaccinated populations are well protected, unvaccinated individuals in at‑risk areas face the highest likelihood of infection and severe disease. Even in areas without documented circulation, limited surveillance means that undetected transmission cannot be entirely excluded.</p><p>As of 17 June 2026, WHO assesses the risk of YF transmission to be <strong>low at the global level</strong> and <strong>moderate in regions with historical transmission, </strong>specifically the WHO African Region and the
