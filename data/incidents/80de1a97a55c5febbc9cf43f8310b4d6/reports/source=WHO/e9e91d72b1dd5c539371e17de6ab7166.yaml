  Response: '<p>WHO is strengthening capacities for YF preparedness and response at national, regional, and global levels, including:</p><ul><li>continuous global surveillance of yellow fever and disease activity, and support for surveillance and outbreak response efforts;</li><li>assisting countries in developing and implementing prevention and control strategies;</li><li>strengthening diagnostic capacity and laboratory networks;</li><li>promoting increased vaccine coverage;</li><li>enhancing risk communication.</li></ul><p>To respond effectively to yellow fever outbreaks, public health measures have been implemented in the African Region and the Region of the Americas. The countries have implemented coordination actions to respond to the identified yellow fever cases and outbreaks, focusing on strengthening preventive measures, improving surveillance and implementing vaccination actions. In non-endemic WHO regions, public health actions focus on preparedness to prevent importation and
    onward transmission of yellow fever. Efforts prioritize traveller vaccination, early detection, and readiness, particularly in areas where competent vectors are present.<strong></strong></p><p><strong><span style="text-decoration:underline;">Coordination</span></strong></p><p>The two Regions have implemented coordination actions to respond to the identified yellow fever cases and outbreaks.<strong></strong></p><p><strong>WHO&nbsp; African Region</strong><strong></strong></p><ul><li>Regional coordination mechanisms were strengthened through regular engagement with Member States, EYE partners, and technical networks to support preparedness and response activities.</li><li>Technical support was provided for outbreak verification, risk assessment, and case classification, including regional reviews of PRNT-positive cases from Burkina Faso, Cameroon, C&ocirc;te d&rsquo;Ivoire, Ghana, Nigeria, Uganda, and the Republic of the Congo.</li><li>Weekly updates on yellow fever events were shared
    through regional and global coordination platforms, including the Yellow Fever Partners Technical Forum, to facilitate information sharing and operational decision-making.<strong></strong></li></ul><p><strong>WHO&nbsp; Region of the Americas</strong></p><ul><li>Ongoing risk assessments were conducted to guide the regional response to the yellow fever outbreak. The response was managed operationally under a structure equivalent to a Level 2 emergency, with coordination mechanisms activated at PAHO Headquarters and in the affected countries. </li><li>A multidisciplinary Incident Command System (ICS) was established, composed of specialists from various technical units and departments.</li><li>A strategic regional action plan was developed, linked to the mobilization of financial and technical resources to support preparedness and response activities. </li><li>The Regional Emergency Response Team was activated and coordinated the deployment of specialists to the affected countries to strengthen
    national capacities in surveillance, laboratory testing, immunization, clinical management, vector control, and risk communication.</li><li>Regular coordination and follow-up mechanisms were established with Member States to monitor the epidemiological evolution of the outbreak, share technical information, and facilitate the implementation of harmonized response actions throughout the Region.<br /></li></ul><p><strong><span style="text-decoration:underline;">Surveillance</span></strong></p><p>The following activities were implemented in the Regions with reported cases: <strong></strong></p><p><strong>African Region</strong></p><ul><li>Surveillance activities were strengthened through support for case detection, investigation, verification, and classification of suspected yellow fever cases.</li><li>Weekly regional monitoring and analysis of yellow fever events were conducted to support risk assessment and guide response activities, including the production and dissemination of the AFRO
    Yellow Fever Weekly Update.</li><li>Technical support was provided for epidemiological investigations and the classification of laboratory-confirmed and PRNT-positive cases in affected countries.<strong></strong><strong></strong></li></ul><p><strong>Region of the Americas</strong></p><ul><li>Issuance of regional epidemiological alerts and continuous monitoring of the epidemiological situation in the Americas.</li><li>Technical support to countries to strengthen epizootic disease surveillance in nonhuman primates as an early warning system.</li><li>Development of regional guidelines for monitoring epizootics (in progress).</li><li>Development and updating of regional guidelines for the epidemiological surveillance of yellow fever, including case definitions, outbreak definitions, and outbreak closure criteria (in progress). </li><li>Organization of the Regional Meeting of Experts on Yellow Fever (Bogot&aacute;, 2026) to review and update regional technical guidelines and promote consensus
    among experts in the Region.</li><li>Regional analysis of ecological corridors and areas of transmission expansion.</li><li>Development of public health action matrices based on epidemiological context (enzootic/non-enzootic) (in progress) <strong></strong></li></ul><p><strong><span style="text-decoration:underline;">Laboratory</span></strong><span style="text-decoration:underline;">&nbsp;</span></p><p>At the Regional level, the following actions have been carried out:&nbsp; <strong></strong></p><p><strong>African Region</strong></p><ul><li>WHO supported laboratory confirmation and case classification of yellow fever cases.</li><li>Technical support was provided through the regional yellow fever laboratory network to support confirmatory testing, interpretation of laboratory findings, and quality-assured diagnosis.</li><li>Regional reviews of laboratory results, including PRNT-positive findings from Burkina Faso, Cameroon, C&ocirc;te d&rsquo;Ivoire, Ghana, Nigeria, Uganda, and the Republic
    of the Congo, were conducted to support case classification and public health decision-making.<strong></strong></li></ul><p><strong>Region of the Americas</strong></p><p>All enzootic countries currently have molecular diagnostic capacity to detect the virus in both serum and tissue samples (essential for confirming fatal cases). In addition, support has been provided to expand detection in non-human primates, enhancing epizootic surveillance as an early warning system. Efforts are also underway to implement virus detection in mosquito populations, further broadening surveillance strategies. At the same time, collaboration with selected countries is advancing the decentralization of testing, ensuring access to diagnostic capacity in remote and border areas where timely detection is critical.<strong></strong></p><p><strong><span style="text-decoration:underline;">Case Management</span></strong></p><p>Specific actions are taken at the regional level: <strong></strong><strong></strong></p><p><strong>Region
    of the Americas</strong></p><ul><li>Development and dissemination of the Regional Clinical Management Guidelines for Critical Patients with Suspected or Confirmed Yellow Fever (published in 2025).</li><li>Delivery of regional in-person training and technical assistance to strengthen early detection, severity assessment, patient referral, and management of severe cases.</li><li>Support to countries in the review and update of clinical protocols and in the preparedness of health services to respond to increased healthcare demand.</li><li>Development of a virtual course on the clinical management of yellow fever.</li><li>Training of countries on minimally invasive autopsy techniques for deaths associated with yellow fever.</li><li>Convening of expert consultations to define and strengthen patient care pathways and clinical management approaches.</li></ul><p><strong><span style="text-decoration:underline;">Immunization</span></strong><strong></strong></p><p><strong>African Region</strong></p><p>Vaccination
    activities were supported through preventive and reactive vaccination campaigns, strengthening routine immunization, and provision of technical assistance for campaign planning and implementation.</p><p>In 2025, preventive mass vaccination campaigns reached approximately 15.2 million people in Katanga Province, Democratic Republic of the Congo, 1.6 million people nationwide in Guinea-Bissau, 9.6 million people in Maradi, Agadez, and Tahoua regions of Niger and 4.2 million people in 13 districts of Uganda. By May 2026, an additional 2.4 million people had been vaccinated through a preventive campaign in Dosso District, Niger.</p><p>Reactive vaccination campaigns were conducted from January 2025 to May 2026 in response to outbreaks or situations with epidemic potential in Burkina Faso, Cameroon and &nbsp;C&ocirc;te d&rsquo;Ivoire. In 2025, these campaigns reached more than one &nbsp;million people in affected districts. By May 2026, additional reactive campaigns reached approximately 491
    000 people in C&ocirc;te d&rsquo;Ivoire, 162 000 in Mali,&nbsp; and more than 400 000 people in Cameroon.</p><p>Technical support was provided to Member States through the International Coordinating Group (ICG) mechanism, including support for vaccine requests, deployment, monitoring, and evaluation. This included support for outbreak response vaccination activities in Central African Republic and vaccine deployment planning in Angola, Liberia, and Mali.</p><p>Routine immunization strengthening efforts were also implemented, including periodic intensification of routine immunization activities. Gabon also reached 8 156 children in two rounds of Periodic Intensification of Routine Immunization.</p><p>Overall, preventive and reactive vaccination campaigns supported by WHO and partners reached more than 35 million people across high-risk and affected countries between 2025 and May 2026.<strong></strong><strong></strong></p><p><strong>Region of the Americas</strong></p><p>Technical support
    to countries has focused on the following lines of action: updating the regional yellow fever vaccination guideline, which incorporates the programmatic context for the use of fractional doses, the single‑dose schedule, recommendations for coadministration with measles, mumps, and rubella (MMR) first dose vaccine (MMR1), vaccination considerations for precaution groups, guidance for urban outbreak response, and parameters for safety stock management. The guideline was reviewed and validated by regional experts during the 2026 Yellow Fever Expert Meeting in Bogot&aacute;, ensuring consensus and alignment with the most recent evidence. </p><p>Technical meetings with countries have been conducted to strengthen Surveillance of Events Supposedly Attributable to Vaccination or Immunization (ESAVI) surveillance in the context of outbreak response and vaccination of precaution groups. A susceptible population estimation tool has been developed and made available to all countries in the Region
    to support planning for preventive and reactive vaccination campaigns. Immunization teams have also provided support for vaccination planning in preparedness contexts as well as during outbreak response operations, including microplanning for outbreak response campaigns.</p><p><strong><span style="text-decoration:underline;">Entomological Surveillance and Vector Control&nbsp;</span></strong></p><p>At the regional level, vector surveillance and control capacities that were developed as part of the arbovirus response:</p><p><strong>African Region</strong></p><ul><li>WHO promoted the incorporation of entomological investigations into yellow fever outbreak investigations to better characterize transmission risks and guide public health interventions.</li><li>Technical guidance supported Member States in considering vector surveillance and vector control measures as part of integrated yellow fever prevention and response strategies.<strong></strong><strong></strong></li></ul><p><strong>Region
    of the Americas</strong></p><ul><li>Development, and publication of <a href="https://iris.paho.org/items/a28127ee-d771-41a2-bb60-bc30991d1d95">regional technical guidelines for entomological surveillance and vector control for yellow fever (2025)</a>. <span style="text-decoration:underline;"></span></li><li>Strengthening national capacities in entomovirology for yellow fever, including detection and characterization of viruses in vectors, with emphasis on personnel training and laboratory capacity building.</li><li>Strengthening capacities for surveillance of sylvatic and urban vectors of yellow fever, including training in standardized collection methods, taxonomic identification, and safe transport of biological samples, as well as risk assessment for urban transmission and technical support for implementing vector control measures in high-risk areas.</li></ul><p><strong><span style="text-decoration:underline;">Risk Communication and Community Engagement</span></strong></p><p>Risk
    communication and community engagement have been enhanced.<strong></strong></p><p><strong>Region of the Americas</strong></p><ul><li>Development and dissemination of regional risk communication materials for communities, health workers, and travelers. </li><li>Technical support to countries in designing risk communication and community engagement strategies to promote vaccination, report animal disease outbreaks, and strengthen public confidence during outbreaks and vaccination campaigns. </li><li>Development of messages and guidance for managing rumors, misinformation, and concerns related to vaccine safety.</li><li>Development of the regional guide &ldquo;Risk Communication and Community Engagement for Yellow Fever Outbreaks in the Americas: Operational Guide for National, Subnational, and Community Teams&rdquo; (in progress)<strong></strong><strong></strong></li></ul>'
