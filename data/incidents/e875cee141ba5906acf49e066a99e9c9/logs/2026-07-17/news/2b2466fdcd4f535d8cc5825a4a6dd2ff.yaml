title: Mount Lewotobi Laki-laki Erupted Again This Morning (Monday, 13 July 2026)
body: On 13 July 2026, Mount Lewotobi Laki-laki (East Nusa Tenggara) erupted for the 3rd time in one week. It is at Level III Alert, with 5km exclusion zone. Indonesia recorded 3144 total eruptions in 2026 ...
