  Advice: '<p>Human-to-human transmission of Marburg virus is primarily associated with direct contact with the blood and/or other bodily fluids of infected people. Strengthening and reinforcing IPC measures is essential to prevent further transmission and reduce the likelihood of amplification.</p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">WHO advises the following risk reduction measures to be taken as an effective way to reduce MVD transmission to control the outbreak.</span></p><p><strong>Prevention:</strong> Protective measures individuals should take to reduce human exposure to the virus include:</p><ul type="disc"><li data-list="0" data-level="1">Reduce the risk of human-to-human transmission in the community arising from      direct or close contact with infected patients, particularly with their      body fluids including blood, feces and vomit. Close physical contact with      MVD
    patients should be avoided.</li><li data-list="0" data-level="1">Persons with symptoms compatible with MVD should immediately seek care in health      facilities, and patients suspected or confirmed to have MVD should be      isolated in a designated treatment centre for early care and to avoid      transmission at home.</li><li data-list="0" data-level="1">Community and family members should avoid caring for symptomatic individuals at home      and avoid touching bodies of people deceased with MVD symptoms. They      should avoid touching other potentially contaminated items and surfaces. &nbsp;</li><li data-list="0" data-level="1">Reduce the risk of bat-to-human transmission arising from prolonged exposure to      mines, caves or dwellings inhabited by fruit bat colonies. During work or      research activities or tourist visits in mines or caves inhabited by fruit      bat colonies, people should wear gloves and other appropriate protective      clothing (including masks). During
    outbreaks, all animal products (blood      and meat) should be thoroughly cooked before consumption.</li></ul><p><strong>Coordination:</strong>&nbsp;Multisectoral coordination and pillar meetings at all levels and sharing of detailed situation reports is encouraged. Involvement of different stakeholders and partners in preparedness and response activities is also encouraged. To ensure an effective and sustained response, resource mobilization efforts within the government and with partners are recommended.</p><p><strong>Risk communication and community engagement:</strong> Raising public awareness and engaging with communities are important for successfully controlling MVD outbreaks. This includes raising awareness of symptoms, risk factors for infection, protective measures and the importance of seeking immediate care at a health facility. Sensitive and supportive information about safe and dignified burials is also crucial. This awareness should be increased through targeted campaigns
    and direct work with communities. Special attention should be given to high-risk groups, such as traditional healers, clergy, and community leaders, who may inadvertently facilitate disease spread, and who are important sources of information for the community. Misinformation and rumours should be addressed to foster trust and promote early symptom reporting.</p><p><strong>Surveillance:</strong>&nbsp;Active case detection, contact tracing, and alert management across affected and neighbouring regions should be intensified. Community-based surveillance systems should be strengthened to promptly identify and report new cases, particularly in high-risk areas. Close monitoring of healthcare workers, family members and individuals who have had contact with suspected cases or other high-exposure settings should be ensured. Surveillance capacities should also be intensified at relevant points of entry and borders to reduce the risk of further spread, including internationally.</p><p><strong>Infection
    prevention and control (IPC) measures: </strong></p><ul><li>Critical infection prevention and control measures should be implemented and/or strengthened in all health care facilities, per&nbsp;<a href="https://www.who.int/publications/i/item/WHO-WPE-CRS-HCR-2023.1" target="_blank">WHO&rsquo;s Infection prevention and control guideline for Ebola and Marburg disease</a>, which highlighted the importance of the rapid implementation of the IPC ring approach, including but not limited to IPC rapid assessment, decontamination of health facilities and households and early detection and identification of the cases through the screening and isolation of the suspected cases to minimize the transmission risk. Patients meeting the case definition for suspected MVD should be treated with appropriate precautions for MVD, regardless of whether the clinical suspicion suggests a more common ailment with similar symptoms, such as malaria. </li></ul><ul type="disc"><li data-list="0" data-level="1">Health
    workers caring for patients with confirmed or suspected MVD should      apply&nbsp;<a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2" target="_blank">transmission-based precautions</a>&nbsp;in addition to&nbsp;<a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1" target="_blank">standard precautions</a>, including appropriate use of personal protective equipment (PPE) and hand      hygiene according to the&nbsp;<a href="https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21%22%20%EF%B7%9FHYPERLINK%20%22https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21" target="_blank">WHO 5      moments</a>,&nbsp;to avoid contact with patient&rsquo;s blood and other body fluids and with      contaminated surfaces and objects.
    Waste generated in healthcare      facilities must be safely segregated, safely collected, transported,      stored, treated and finally disposed. Follow the national guidelines,      rules and regulations for safe waste disposal or follow the&nbsp;<a href="https://iris.who.int/server/api/core/bitstreams/4daece5e-1220-47f5-903c-8c2a14fcd778/content" target="_blank">WHO&rsquo;s guidelines on safe waste management</a>. </li></ul><ul type="disc"><li data-list="1" data-level="1">Patient-care activities should be undertaken in a clean and hygienic environment that      facilitates practices related to the prevention and control of      health-care-associated infections (HAIs) as outlined in&nbsp;<a href="https://www.who.int/publications/i/item/9789241547239" target="_blank">Essential environmental health standards in health care.</a>&nbsp;Safe water, adequate      sanitation and hygiene infrastructure and services should be provided in      healthcare facilities. For details on recommendations
    and improvement,      follow the <a href="https://www.who.int/publications/i/item/9789240043237">WASH FIT implementation Package</a>.</li></ul><p><strong>Laboratory testing:</strong>&nbsp;The processing and analysis of samples should be expedited, with results promptly shared with responders and clinicians to guide patient management, containment strategies and broader response efforts. This includes genomic sequencing on positive samples. International referral of samples to a regional reference laboratory should be considered for inter-laboratory comparison. Laboratory workers handling specimens from patients suspected or confirmed to be infected with MARV should receive refresher training on laboratory biosafety; this includes taking appropriate precautions when drawing blood for a malaria rapid diagnostic test or other test not specific for MARV.<br /></p><p><strong>Evaluation of candidate medical countermeasures:</strong> There are no licensed vaccines or therapeutics against MVD.
    Several candidate vaccines are in the pipeline and outbreaks offer an opportunity to assess their efficacy and safety. There are&nbsp;<a href="https://www.who.int/teams/blueprint/ebolavirus">protocols available</a>&nbsp;and a network of experts in filoviruses ready to support national researchers. &nbsp;&nbsp;<br /></p><p><strong>Safe and dignified burials:</strong> Safe and dignified burial protocols should be implemented for persons who have died to minimize community exposure. Additional training and equipment for healthcare workers and burial teams should be provided to ensure safe management of MVD-related fatalities. Thorough community engagement is required to ensure that affected communities are empowered to adhere to the protocols.<br /></p><p><strong>Case management and mental health and psychosocial support:</strong>&nbsp;Designated treatment centers should ensure adequate level of care for confirmed patients to improve the chance of survival. Isolation and treatment facilities
    should be adequately equipped to ensure the safety and efficacy of patient care, while simultaneously preventing the spread of the disease. Supportive care such as rehydration, symptom management, and psychological support for patients and their families is essential to improving survival rates and mitigating the outbreak''s impact.<br /></p><p><strong>Border health and cross-border coordination:</strong>&nbsp;Surveillance capacities should be strengthened at relevant at-risk points of entry, onboard conveyances, and in border regions to prevent further spread, including internationally. Cases, contacts and individuals in affected areas who present signs and symptoms compatible with case definition should be advised not to travel, in line with WHO&rsquo;s border health and points of entry technical guidance for filovirus disease outbreaks. Collaboration with neighbouring countries should be enhanced to harmonize reporting mechanisms, conduct joint investigations, and share critical data
    in real-time. Countries at-risk of potential spread should enhance readiness activities to enable early case detection, isolation and treatment.</p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Based on the current risk assessment, WHO advises against any travel and trade restrictions with Ethiopia.</span></p>'
  Assessment: '<p>This is the first confirmed MVD outbreak in Ethiopia.&nbsp;&nbsp;The public health risk posed by the MVD outbreak is assessed&nbsp;as&nbsp;high&nbsp;at the national level due to several concerning factors: <br /></p> <ul><li>The outbreak involves six laboratory-confirmed cases; there have been a total of six deaths and there are three confirmed cases under treatment.</li><li>All deaths involved unsupervised burials, posing a risk of potential additional community transmission. </li><li>The presence of healthcare workers among the confirmed cases suggests potential occupational exposure risks within health facilities.</li><li>Although investigations are ongoing, information on the source of the outbreak, geographical extent and epidemiology is limited.<br /></li></ul> <p>Although no international transmission has been confirmed to date, the potential risk for spread remains. The affected area, Jinka, while distant from Ethiopia&rsquo;s capital or major international airports,
    is connected by road transportation networks, including to neighbouring Kenya and South Sudan. Therefore, the public health risk posed by this event is assessed as moderate at the regional level. It is considered low at the global level.<br /></p>'
  Overview: '<p>As of 20 November 2025, 33 laboratory tests have been conducted, of which six confirmed cases, including three deaths, have been reported. Of the six confirmed cases, three are currently alive and on treatment. In addition to the lab-confirmed cases, a further three epidemiologically linked cases could not be tested; all three are deceased and recorded as probable cases. A total of 206 contacts have been identified, and contacts are under active follow-up. The number of contacts will continue to change as the response evolves.</p><p>Clinically, patients have presented with high-grade fever, headache, vomiting, abdominal pain, and watery or bloody diarrhoea. Haemorrhagic manifestations, including nose bleeding and vomiting blood were observed in five cases, consistent with multi-organ failure. </p><p>As this is the first time Ethiopia is reporting MVD, WHO recommends that samples be shared with a reference laboratory for inter-laboratory comparison. </p><p><strong>Figure 1:
    Map of Ethiopia showing location of Jinka town</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/mvd-in-ethiopia.jpg?sfvrsn=e861d6ce_3" height="627" style="max-width:100%;height:auto;" title="MVD in Ethiopia" width="697" alt="MVD in Ethiopia" sf-size="52862" /></p>'
