  Epidemiology: <p>Marburg virus disease (MVD) is a severe hemorrhagic fever caused by either of two closely related viruses, Marburg virus and Ravn virus, which are closely related to the Ebola viruses. MVD has a high case fatality rate, ranging from 24% to 88% from previous outbreaks The case fatality rate can be lowered with good and early patient care. The virus is initially transmitted to humans from fruit bats (<em>Rousettus aegyptiacus</em>) and then spreads among people through direct contact with bodily fluids, contaminated surfaces, or infected materials. Healthcare workers, caregivers, and individuals involved in burial practices are particularly at risk when infection prevention and control measures are not in place. </p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">MVD symptoms typically begin abruptly after an incubation period of two to 21 days and include high fever, severe
    headache, malaise, muscle aches, and progressive gastrointestinal symptoms such as diarrhea and vomiting. In severe cases, patients may experience bleeding from multiple sites and die from shock and organ failure within a week of symptom onset.</span></p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">There are no approved treatment or vaccines for MVD, although supportive treatment and early supportive care improves survival. Some candidate vaccines and therapeutics are currently under investigation.</span></p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Nineteen outbreaks of MVD have previously been reported globally. The most&nbsp;</span><a href="https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON552">recent</a><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">&nbsp;outbreak
    was reported from the Republic of Tanzania between January and March 2025. Additional countries that have reported outbreaks of MVD in the African Region include Angola, the Democratic Republic of the Congo, Equatorial Guinea, Ghana, Guinea, Kenya, Rwanda, South Africa, and Uganda.&nbsp;</span></p>
