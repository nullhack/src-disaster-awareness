  Response: <p>Local and national health authorities in Ethiopia have implemented the following public health measures:&nbsp;&nbsp;</p><ul><li>A National Taskforce has been established at the Ministry of Health to provide strategic guidance, make decisions and mobilize resources. </li><li>A costed national three-month response plan has been developed and launched by the MoH/EPHI.</li><li>The MoH is regularly providing information on the MVD outbreak to the general public and partners.</li><li>Emergency Operational Centres (EOCs) have been activated at national and regional levels, with incident management structures established to coordinate the response. Daily coordination meetings are ongoing at the national and subnational EOCs. </li><li>The Ministry of Health, in collaboration with EPHI and regional health offices, is conducting integrated surveillance and response activities. </li><li>Community surveillance, contact tracing, house-to-house visits, and medical service delivery are being
    enhanced. </li><li>Two hospitals have been designated as treatment centres, with dedicated health workers deployed to manage cases. </li><li>Field assessments are being conducted by a rapid response team (RRT). One RRT was deployed to Jinka to conduct contact tracing and epidemiological investigation while a second team is strengthening infection prevention and control (IPC) in health facilities managing suspected cases.</li><li>Risk Communication and Community Engagement (RCCE) teams are disseminating MVD prevention messages, developing activity plans for targeted interventions, monitoring social media to address misinformation, and assessing trusted communication channels to enhance public awareness.</li></ul>
