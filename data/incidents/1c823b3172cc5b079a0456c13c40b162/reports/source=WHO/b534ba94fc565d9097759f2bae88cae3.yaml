  Advice: '<p>Prevention of anthrax in humans is primarily dependent on controlling the disease in animals. In the event of a suspected outbreak in livestock, key control measures include quarantining affected herds or flocks, proper disposal of carcasses, safe collection of specimens, decontamination of carcass sites and contaminated materials, vaccination of unexposed animal, and treatment of symptomatic animals. The general public and at-risk individuals should promptly report sick or unexpected deaths in animals to veterinary authorities.&nbsp;</p><p>In the community setting, individuals who handle potentially contaminated animal products should be educated about anthrax transmission and clinical manifestations, wound care and personal hygiene. In case of any illness or symptoms of disease, they should immediately seek medical advice. </p><p>Anthrax poses a significant occupational risk to individuals who work closely with animals or animal products, particularly in environments where
    the disease is endemic.&nbsp; Prevention through education, proper protective measures, and surveillance is key to reducing occupational exposure to anthrax. To reduce the risk of anthrax infection in these high-risk occupations, the following protective measures are recommended: use of Personal Protective Equipment (PPE), workplace hygiene and proper ventilation in workspaces, especially in industries where aerosols may be generated.&nbsp;&nbsp;</p><p>In health-care settings, patients with suspected or confirmed zoonotic anthrax exposure may be cared for using standard precautions for infection prevention and control except where there is draining discharge of pus/blood/fluid at the site of a cutaneous anthrax lesion. When a patient has a suspected or confirmed cutaneous anthrax lesion, use soap and water handwashing during <a href="https://www.who.int/publications/m/item/five-moments-for-hand-hygiene">WHO&rsquo;s 5 moments for hand hygiene</a> instead of using alcohol-based handrub
    as sanitizers and antiseptics which are ineffective against anthrax spores. </p><p>If a patient presents with discharge of blood/pus/fluid at the site of a cutaneous anthrax lesion, apply contact precautions for infection prevention and control, including placing the patient in a private room and the use of disposable PPE (examination gloves and fluid-resistant gown). Use disposable consumable products when performing manual cleaning of the room of patients on contact precautions, including placing cloths and gloves used during cleaning in a leak-proof bag and sending this bag for incineration as infectious waste. Used linens and contaminated clothing with pus/blood/fluid discharge from cutaneous anthrax lesions should be placed in a leak-proof bag and either a) sent for incineration as infectious waste or b) sent for autoclaving (ensuring the autoclave function is verified using a spore strip) prior to normal laundry/linen management. Dressings and bandages used on cutaneous anthrax
    lesions should be placed in a leak proof bag and sent for incineration as infectious waste after use. When a patient no longer has discharge of pus/blood/fluid at the site of a cutaneous anthrax lesion; perform a terminal clean of the patient&rsquo;s room and continue care on standard precautions with risk assessment for appropriate PPE unless otherwise indicated.</p><p>The cornerstone of treatment is timely initiation of antibiotic therapy, at the first clinical suspicion. The choice of antimicrobial regimens depends on the clinical form, severity, and resource availability. Individuals with documented or suspected gastrointestinal exposure may be offered a 10-day course of oral antibiotic prophylaxis. Post-exposure prophylaxis should be initiated as soon as possible, ideally within 48 hours. Recommended antibiotics include doxycycline or ciprofloxacin.&nbsp;</p><p>International travelers to countries where anthrax is endemic should be aware of regulations concerning the importation
    of prohibited animal products, trophies, and souvenirs.&nbsp;&nbsp;</p>'
  Assessment: <p>Between 1992 and 2000, the incidence rate in Thailand for anthrax in humans ranged from 0.02 to 0.17 per 100 000 population, with most cases reported in provinces bordering the Lao People's Democratic Republic and Myanmar.&nbsp;</p><p>While sporadic human cases have been reported over the past 25 years, Thailand has not experienced a large-scale outbreak since 1995, when 102 cases were recorded. In the current outbreak, human cases have been reported in Don Tan district, Mukdahan province, which borders the Lao People's Democratic Republic. &nbsp;However, Thailand has taken immediate response actions including the restriction of animal movement. As a result, the risk of international spread is low.&nbsp;&nbsp;</p><p>The risk for human health is low given the rapid and extensive public and animal health measures implemented. Although over 600 individuals linked to the first four cases, were identified as potentially exposed, all exposed individuals completed their monitoring
    period. Public awareness campaigns are ongoing at the national level.&nbsp;</p><p>Animal health measures have also been robust, including the quarantine and treatment of suspected cattle herds, livestock vaccination within a five-kilometer radius, movement control, and enhanced inspections. Additionally, neighboring countries, such as Malaysia and the Lao People's Democratic Republic, have heightened anthrax surveillance, particularly in the context of animal movement.&nbsp;</p><p>Although WHO does not recommend any restrictions on travel or trade, the current situation may lead to the imposition of animal trade measures. Some neighboring countries have already introduced restrictions on the importation of animals and animal products from Thailand. Any decisions regarding international travel and trade should be based on a thorough risk assessment and should be proportionate to the actual public health risks involved.</p>
  Overview: <p>Between 1 May and 4 May 2025, the Thailand IHR NFP notified WHO of four confirmed cases of cutaneous anthrax, including one death. The age range of the confirmed cases is 36 years to 58 years, comprising of three males and one female. The cases were identified in Mukdahan Province, located near the border with Lao People's Democratic Republic, separated by the Mekong River. All cases are epidemiologically linked to slaughtering of cows. The first cow was slaughtered on 12 April 2025, during a merit-making event, and its meat was distributed among villagers. A second cow was slaughtered on 28 April 2025. Exposure to meat or contact during the slaughtering process of these animals is believed to be the source of infection for all confirmed cases.&nbsp;</p><p>The first case, presented with a skin rash on his right hand, which progressed to a clearly visible lesion by 24 April. Initially hospitalized, he was transferred to a referral hospital on 27 April due to worsening clinical
    symptoms, including a darkening lesion on the hand, swollen right axillary lymph nodes, dizziness, and convulsions. He subsequently died on the same day as a result of disease complications. The other three cases presented with pustular and vesicular lesions and were hospitalized. As of 28 May 2025, the three cases have completed a 10-day course of levofloxacin and doxycycline and have been discharged from hospital.&nbsp;</p><p>Blood and wound samples from the four cases were collected between 28 April and 1 May and were sent to the Department of Medical Sciences (DMSC) and Bamrasnaradura Institute for laboratory testing. <em>B. anthracis </em>was confirmed<em> </em>by RT-PCR in all four patients. </p><p>Screening of at-risk individuals was conducted across three villages, identifying two additional suspected cases who presented with diarrhea and fever. However, the samples tested negative for <em>B. anthracis</em>.&nbsp;&nbsp;A total of 636 individuals were identified as at risk and
    monitored till 10 May 2025. Among them, 28 people were directly involved in the slaughter of cattle, while others consumed raw beef. Public health authorities initiated post-exposure prophylaxis for at-risk individuals by administering doxycycline for a duration of seven days. </p><p>On 28 May, the Ministry of Public Health announced the fifth confirmed case in Mukdahan province, associated with the slaughtering of cows. The clinical status of the most recent reported fifth case is unknown at the time of reporting. </p><p>This is the first reported anthrax-related death in Thailand since 1994. According to the Division of Epidemiology, the most recent anthrax cases prior to this event occurred in 2000 (15 cases and no deaths in Phichit and Phitsanulok provinces) and in 2017 (two cases and no deaths in Tak province linked to handling a goat carcass imported from Myanmar).&nbsp;&nbsp;</p>
