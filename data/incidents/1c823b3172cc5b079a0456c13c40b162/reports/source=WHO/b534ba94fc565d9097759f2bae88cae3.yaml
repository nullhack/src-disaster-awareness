  Summary: "In early May 2025, the International Health Regulations National Focal Point (IHR NFP) for Thailand notified WHO of four cases of cutaneous anthrax.  One of the affected individuals died as a result of disease complications, while the remaining three cases were hospitalized and received appropriate medical care. All reported cases had direct contact with cattle suspected to be infected with anthrax. A rapid field investigation and response was conducted by the national health authorities. All potentially exposed individuals were identified, and all high-risk contacts received post-exposure prophylaxis. On 28 May, an additional case was announced who was associated with the slaughtering of cattle. Disease control measures, including animal quarantine, and vaccination campaign targeting cattle withing five km radius, public awareness campaigns, and enhanced surveillance, were implemented in the affected area.  \r\nAnthrax is a life-threatening zoonotic disease caused by the spore-forming\
    \ bacterium Bacillus anthracis. Humans can get anthrax from infected animals or contaminated animal products. It generally does not spread between people. Currently, due to the robust public health measures implemented by Thailand, the risk of international disease spread through animal movement remains low. "
