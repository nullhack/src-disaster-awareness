  Response: <p>The Department of Disease Control, Ministry of Public Health and the Department of Livestock Development, Ministry of Agriculture and Cooperatives, have implemented measures to control potential disease spread as follows:&nbsp;</p><p><strong>&nbsp;Actions implemented for human health&nbsp;</strong></p><ul><li data-list="0" data-level="1">Environmental cleaning and disinfection      were carried out in 23 high-risk households, identified based on      consumption of potentially contaminated meat.&nbsp;</li><li data-list="0" data-level="1">Establishment of a drug distribution      center to improve accessibility and streamline the delivery of      post-exposure prophylaxis.&nbsp;</li><li data-list="0" data-level="1">Enhanced risk screening across three      affected villages.&nbsp;</li><li data-list="0" data-level="1">Exposed individuals were identified and      provided with post-exposure prophylaxis.&nbsp;</li><li data-list="0" data-level="1">The Department of Medical Sciences
    (DMSC)      in Thailand conducted genomic sequencing as a key component of their      testing strategy to better understand the transmission dynamics.&nbsp;</li><li data-list="0" data-level="1">Risk communication and community      engagement efforts were undertaken, including information dissemination to      villagers and public awareness campaigns conducted through various media      channels.&nbsp;</li></ul><p><strong>Actions taken for animal health&nbsp;</strong></p><ul><li>Farmers were      informed to report any sick or dead animals to officials and strictly      advised against slaughtering or consuming raw meat.&nbsp;</li><li>A total of 123 cattle herds from 21      farmers, suspected of being potential source of human infections, were      quarantined. The animals were treated with penicillin for seven days and      monitored for at least 20 days.&nbsp;</li><li>Grazing and access to water sources in      areas identified as contamination risks were restricted for livestock.
    A      vaccination campaign targeting cattle and buffalo within a five-kilometer      radius, was conducted, reaching a total of 1222 animals. In Thailand,      anthrax vaccinations for animals are administered in response to outbreak      situations.&nbsp;</li><li>Animal quarantine officers established      checkpoints to control the movement of animals in and out of the five-kilometer      risk zone. Coordination was strengthened with the administrative sectors,      police, military, and security agencies to increase the intensity of      inspection, patrol, and to prevent the smuggling of animals, meat, and      animal products from neighboring countries.&nbsp;</li><li>Samples were collected from knives and      cutting boards used by the first case, as well as from soil at the      slaughter site and beef from the slaughtered cows. All tested positive for      <em>B. anthracis.</em><br /></li></ul>
