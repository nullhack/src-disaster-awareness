  Epidemiology: '<p>Anthrax is a zoonosis caused by the Gram-positive, spore-forming rod <em>B. anthracis</em>, which affects predominantly grazing herbivores, both livestock and wildlife. </p><p>Spores of <em>B. anthracis</em> are the infectious forms and can remain viable in soil as well as animal tissues, parts, and products for years. They can also be dispersed by wind or floods, animal scavengers (feeding on infected carcasses), and transport of animal products. </p><p>In humans, anthrax spores can invade the body by four routes: transcutaneous inoculation, ingestion, inhalation, and direct injection. The disease clinical manifestations vary based upon the type of exposure: cutaneous, gastrointestinal, inhalation and injection-related anthrax, respectively. At the same time, all forms of anthrax can lead to disseminated disease, including sepsis and meningoencephalitis.</p><ul><li>Cutaneous anthrax is the most common form and occurs in approximately 95% of cases. Infection follows direct
    contact with infected animals, carcasses, animal tissues, parts (e.g., hides, wool, hair, bone) or products (e.g., drums, brushes, rugs). Invasion through the skin may occur via skin abrasions or hair follicles. Additionally, cutaneous anthrax may occur as a result of contact with contaminated soil or skin lesions of an infected individual. However, direct person-to-person transmission is very rare. Individuals with cutaneous disease present with an itchy, painless papule (most commonly on exposed areas), which evolves into a larger vesicle or blister and eventually progresses into a necrotic ulcer with a black, depressed central crust (eschar). Local oedema (swelling) and regional lymphadenopathy are usually prominent. Fever, headache and malaise may occur in a minority of cases.</li><li><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Gastrointestinal anthrax follows ingestion of contaminated,
    undercooked meat and is characterized by the presence of nausea, vomiting, abdominal pain, sometimes associated with diarrhea. Gastrointestinal hemorrhage and ascites may occur in severe cases. Some individuals present with oropharyngeal involvement.</span></li><li>Inhalation anthrax is the most severe clinical presentation and results from inhalation of spore-containing dusts or aerosols. Noticeably, airborne person-to-person transmission does not occur. Affected patients initially present with a flu-like illness, followed by severe respiratory distress and shock.&nbsp;</li><li>Injection anthrax has been associated with use of drugs by any route (transcutaneous and intravenous) and is associated with skin lesions and soft tissue involvement.&nbsp;</li></ul><p>The main risk factor for anthrax is occupational exposure. At-risk categories include workers involved in industrial processing of hides, wool, hair or bone products, veterinarians, agricultural and wildlife workers in areas with
    high incidence of anthrax in animals and laboratory personnel.</p><p>Anthrax is endemic in several countries across the South-East Asia region. In Thailand, however,&nbsp;human cases of anthrax are a very rare occurrence. This is the first human anthrax outbreak in 25 years to result in a fatality in the country.&nbsp;The most recent prior cases occurred in 2017 in Mae Sot district, Tak province, where two anthrax cases were reported, but no deaths.&nbsp;Anthrax was first reported in Thailand in 1947. Between 1992 and 2000, the incidence rate ranged from 0.02 to 0.17 per 100 000 population, with most cases occurring in provinces bordering the Lao People''s Democratic Republic and Myanmar.&nbsp;<br /></p>'
