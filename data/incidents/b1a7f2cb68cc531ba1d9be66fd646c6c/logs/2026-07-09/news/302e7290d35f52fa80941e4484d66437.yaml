title: What you need to know about hantavirus, cruise ship cases
body: READING, Pa. - A rare virus linked to a cruise ship off South America is drawing global attention, but health officials say the risk to the public remains low. The virus is called the Andes virus, a rare type of hantavirus found in South America.
