  Title: Hantavirus cluster linked to cruise ship travel, Multi-country
  Epidemiology: <p>Hantavirus cardiopulmonary syndrome (HCPS), also known as hantavirus pulmonary syndrome (HPS), is a zoonotic, viral respiratory disease caused by hantaviruses of the genus <em>Orthohantavirus</em>, family <em>Hantaviridae</em>, order <em>Bunyavirales</em>. More than 20 viral species have been identified within this genus. In the Americas, <em>Sin Nombre virus</em> is the predominant cause of HPS in North America, while <em>Orthohantavirus andesense</em> is responsible for most cases in South America.</p><p>Hantaviruses found in Europe and Asia are known to cause haemorrhagic fever with renal syndrome (HFRS), which primarily affects the kidneys and blood vessels. Human-to-human transmission has not been documented in this part of the world.</p><p>Human Hantavirus infection is primarily acquired through contact with the urine, faeces, or saliva of infected rodents or by touching contaminated surfaces. Exposure typically occurs during activities such as cleaning buildings
    with rodent infestations, though it may also occur during routine activities in heavily infested areas. Human cases are most commonly reported in rural settings, such as forests, fields, and farms, where rodents are present, and opportunities for exposure are greater. HPS is characterized by headache, dizziness, chills, fever, myalgia, and gastrointestinal symptoms, such as nausea, vomiting, diarrhoea, and abdominal pain, followed by sudden onset of respiratory distress and hypotension. Symptoms of HPS typically occur from 1-6 weeks after initial exposure to the virus. However, symptoms may appear as early as one week and as late as eight weeks following exposure. </p><p>Hantavirus infections are relatively uncommon globally.&nbsp; In 2025, in the Region of the Americas, eight countries reported 229 cases and 59 deaths with a CFR of 25.7%.<sup>[2]</sup> In the European Region, 1885 hantavirus infections were reported in 2023 (0.4 per 100 000), marking the lowest rate observed between
    2019 and 2023.<sup>[3]</sup> In East Asia, particularly China and the Republic of Korea, hantavirus haemorrhagic fever with renal syndrome (HFRS) continues to account for many thousands of cases annually, although incidence has declined in recent decades.</p><p>Hantavirus infections are associated with a case fatality rate of &lt;1&ndash;15% in Asia and Europe and up to 50% in the Americas. While there are no licensed treatment nor vaccines for hantavirus infections, early supportive care and immediate referral to a facility with a complete ICU can improve survival. </p><p>Environmental and ecological factors affecting rodent populations can influence disease trends seasonally. Since hantavirus reservoirs are sylvatic rodents, transmission can occur when people come into contact with rodent habitats. </p><p>Although uncommon, limited human‑to‑human transmission of HPS due to Andes virus has been reported in community settings involving close and prolonged contact. Secondary infections
    among healthcare workers have been previously documented in healthcare facilities, though remain rare. Secondary transmission appears most likely during the early phase of illness, when the virus is more transmissible.<sup>[4] </sup>Currently, little evidence is available due to the scarcity of hantavirus outbreak related to human-to-human transmission.</p>
  Advice: '<p>WHO advises that States Parties involved in this event continue public health coordination and management efforts on board conveyances and in countries where cases and/or contacts are present or will be returning to. </p><p>This includes contact tracing and monitoring detection, investigation, reporting of suspected cases, laboratory testing of suspected cases, case management, infection prevention and control measures, and clear and transparent communication to affected individuals and the general public.</p><p>In the context of the current outbreak, people on board the affected ship and flights should practice frequent hand hygiene, monitor any early symptoms, including headache, dizziness, chills, fever, myalgia, and gastrointestinal problems, such as nausea, vomiting, diarrhoea, and abdominal pain, for 42 days after last potential exposure. Should any early symptoms or sudden onset of respiratory distress occur, people should immediately inform health authorities and self-isolate
    until medical evaluation is conducted. If respiratory symptoms are present, people should practice respiratory etiquette and wear a respirator.</p><p>A precautionary approach should be applied to contact identification, classification, tracing and follow-up, particularly for persons exposed on board of the ship or during travel. Contacts should be classified according to exposure risk, considering the intensity and duration of exposure, proximity to the case, exposure to enclosed or shared spaces, and use of personal protective equipment. </p><p>High-risk contacts may include cabin mates, intimate partners, persons with prolonged close indoor exposure, healthcare workers with unprotected exposure, and individuals handling contaminated materials or body fluids without appropriate personal protective equipment.&nbsp; </p><p>Given the documented transmission of ADNV in past outbreaks &nbsp;stemmed from close, prolonged contact, that infectiousness peaks in the early phase of illness, and
    that pre-symptomatic transmission cannot be entirely ruled out, <em>as a</em> <em>precautionary principle</em>, WHO recommends for active monitoring and home or facility quarantine of high-risk contacts for 42 days following last exposure. Current evidence does not support routine laboratory testing of contacts for outbreak control (or public health response)&nbsp; or the quarantine of low-risk contacts; low-risk contacts should undertake passive self-monitoring and seek medical evaluation if symptoms occur. Recommendations are dynamic and will be adapted as more evidence emerges.<br /></p><p>Contact investigations should use available information sources, including interviews, passenger manifests, seating arrangements and activity logs, to improve completeness of contact identification.</p><p>Early recognition of suspected cases, prompt isolation, and consistent adherence to recommended infection prevention and control measures remain essential to protect healthcare personnel, other
    passengers and crew members. </p><p>In healthcare environments, standard precautions* should be applied for all patients, including hand hygiene, environmental cleaning and waste management. In addition to standard precautions, transmission-based precautions should be implemented for management of suspect or confirmed cases. For aerosol-generating procedures, airborne precautions should be used. <sup>[5]</sup></p><p>When HPS is suspected, patients should be promptly transferred to an emergency department or intensive care unit for close monitoring and supportive management. </p><p>Initial management should include supportive care with antipyretics and analgesics as needed. For confirmed hantavirus, antibiotics are not routinely indicated. However, before a definitive diagnosis is established (and bacterial infection is a diagnostic possibility), or if superadded bacterial infection is suspected, empiric broad-spectrum antibiotics may be appropriate. Clinical management relies primarily
    on careful fluid administration, hemodynamic monitoring, and respiratory support. Given the rapid progression of HCPS, close monitoring and early transfer to ICU are critical for more severe cases. Mechanical ventilation, meticulous volume control, and vasopressors may be required. For severe cardiopulmonary insufficiency, extracorporeal mechanical oxygenation may be lifesaving. In severe cases of renal dysfunction, dialysis may be required.</p><p>Although ribavirin has shown efficacy against hantavirus haemorrhagic fever with renal syndrome, it has not demonstrated effectiveness for HCPS and is not licensed for either treatment or prophylaxis of hantavirus pulmonary syndrome.&nbsp; At present, there is no specific antiviral treatment approved for HCPS; a number of existing drugs have antiviral activity in laboratory studies but not yet demonstrated in human disease.</p><p>Public health awareness efforts should focus on improving early detection, ensuring timely treatment, and reducing
    exposure risks. Preventive measures should address occupational and ecotourism-related exposures, emphasize infection prevention and control measures, and include rodent control strategies. Most routine tourism activities carry little or no risk of exposure to rodents or their excreta.</p><p>Risk communication and community engagement (RCCE) interventions should prioritize transparent, timely, and culturally appropriate communications to raise awareness of hantavirus transmission risks&mdash;particularly. RCCE strategies should support coordinated, timely and aligned evidence based information to ensure concerned people receive clear, consistent and actionable information and explanations of the public health measures. Operational measures should integrate RCCE activities through the whole event. The implementation of integrated environmental management strategies aimed at reducing rodent populations is also recommended.</p><p>*Standard precautions refer to a set of practices that are
    applied to the care of patients, regardless of the state of infection (suspicion or confirmation), in any place where health services are provided. These practices aim to protect both healthcare professionals and patients and include hand hygiene, use of personal protective equipment, respiratory hygiene and cough etiquette, safe handling of sharps materials, safe injection practices, use of sterile instruments and equipment and cleaning of hospital environments and the environment. Adapted from &ldquo;Standard precautions for the prevention and control of infections: aide-memoire&rdquo;- WHO, 2022.&nbsp; Available at <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1">https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1</a>&nbsp;&nbsp; </p><p>WHO advises against the application of any travel or trade restrictions based on the current information available on this event.&nbsp;</p>'
  Assessment: '<p>WHO currently assesses the public health risk related to the cruise ship as moderate, and at the Global level as low for the following reasons: </p><ul><li>The disease can have a high case fatality ratio, reaching 40-50%, particularly among elderly individuals and those with co-morbidities. The average age of passengers on board the ship is 65 years old. </li><li>Andes virus has demonstrated limited human-to-human transmission in previous outbreaks, typically occurring among close contacts and within household settings, generally requiring prolonged close exposure. Transmission can usually be contained through early detection, isolation of cases, clinical management, and contact tracing. However, the ship environment presents an increased risk due to close living quarters, shared indoor spaces, prolonged exposure, and frequent interpersonal interactions, all of which may facilitate transmission.</li><li>Investigations on the travel history and potential exposures of the
    first case in the Southern Cone subregion of the Americas are ongoing and suggest possible exposure to rodents during bird watching activities. Viral sequencing analyses are also ongoing and will compare the ANDV strain associated with this outbreak with strains circulating in Argentina, Chile and Uruguay, where the disease is enzootic.</li><li>Additional cases may occur among individuals exposed before implementation of containment measures. However, the current response, including rapid isolation of any new suspect cases and the monitoring of contacts, is expected to limit the risk of further spread. </li><li>As there is no specific antiviral treatment for HPS, suspected cases require prompt transfer to an adequately equipped emergency department or intensive care unit, where available, for close monitoring and supportive management to improve chances of recovery. Consequently, rapid transfer to a mainland healthcare facility is required, which may be challenging under the current
    conditions.</li></ul><p>More detailed epidemiological, clinical and laboratory investigations are required to inform further iterations of this risk assessment.&nbsp;</p>'
  Overview: '<p>On 2 May 2026, WHO received notification from the National IHR Focal Point of the United Kingdom of Great Britain and Northern Ireland (hereafter referred to as the United Kingdom) regarding a cluster of severe acute respiratory illness, including two deaths and one critically ill passenger, aboard a Dutch-flagged cruise ship. </p><p>Since the last <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON599">Disease Outbreak News</a> was published on 4 May, three of the suspected cases were confirmed, and one additional confirmed case was reported. As of 8 May, a total of eight cases (six confirmed and two probable cases), including three deaths (two confirmed and one probable), case fatality ratio 38%, have been reported. All six laboratory-confirmed cases were identified as Andes virus through virus specific polymerase chain reaction (PCR) or sequencing. </p><p>Two medical evacuation flights, from Cabo Verde, carrying two symptomatic confirmed patients
    and one previously suspected case landed in the Netherlands on 6 and 7 May. As of 8 May, four patients are currently hospitalised, one in intensive care in Johannesburg, South Africa, two in different hospitals in the Netherlands and the other in Zurich, Switzerland. The previously suspected case was transferred directly to Germany, where she was tested, and both PCR and serology tests were negative for Andes virus, she is therefore no longer considered to be a case.</p><p>Contact tracing of passengers who disembarked in St Helena is ongoing; passengers have been contacted and advised to self-monitor for symptoms. Additionally, passengers who travelled on the same flight from St Helena to South Africa with one of the cases who was subsequently confirmed, have been contacted. </p><p>On 6 May, the ship left Cabo Verde, heading to the Canary Islands, Spain where disembarkation is planned. </p><p>Further investigations into the potential exposure of the first case and the source of the outbreak
    are ongoing in collaboration with authorities in Argentina and Chile. The outbreak is being managed through a coordinated international response, including in-depth epidemiological investigations, case isolation and clinical management, medical evacuations, laboratory testing and international contact tracing and monitoring. </p><p><strong>Summary of confirmed and probable cases:</strong><span style="text-decoration:underline;"></span></p><p>Case 1: An adult male who boarded the ship on 1 April, after more than three months of travel in Argentina, Chile, and Uruguay. Developed symptoms on 6 April and died onboard on 11 April. No microbiological tests were performed. He is considered a probable case. </p><p>Case 2: An adult female, who was a close contact of case 1, who travelled and boarded the ship with him, went ashore at Saint Helena on 24 April with gastrointestinal symptoms. She subsequently deteriorated on a flight to Johannesburg, South Africa, on 25 April. She died on 26 April
    in a Johannesburg clinic. On 4 May, she was subsequently confirmed by PCR testing with hantavirus infection.</p><p>Case 3: An adult male who developed symptoms on 24 April. He was disembarked and medically evacuated from Ascension Island on 27 April and is currently hospitalised in an Intensive Care Unit (ICU) in Johannesburg, South Africa. PCR testing confirmed hantavirus infection on 2 May, and Andes virus was confirmed through sequencing. </p><p>Case 4: An adult female, with onset of symptoms (fever and general malaise) on 28 April, later presenting with pneumonia, died on 2 May. A post-mortem sample was collected and sent to the Netherlands with the evacuated patients, where it was confirmed to be Andes virus. </p><p>Case 5: An adult male, working as the ship doctor, reported onset of symptoms on 30 April, including fever, fatigue, muscle pain, and mild respiratory symptoms. His samples confirmed PCR positivity for Andes virus on 6 May. The case was medically evacuated to the Netherlands
    on 6 May and is currently stable in isolation.</p><p>Case 6: An adult male, working as a ship guide. Onset of symptoms was reported on 27 April with mild respiratory and gastrointestinal symptoms. Laboratory samples confirmed PCR positivity for Andes virus on 6 May. The case was medically evacuated to the Netherlands on 7 May and is currently stable in isolation.</p><p>Case 7: An adult male, who disembarked in St Helena on 22 April and flew back to Switzerland on 27-28 April, through South Africa and Qatar. He started experiencing symptoms on 1 May after arrival in Switzerland, where he immediately self-isolated and reported to local public health authorities. He is currently hospitalised and in isolation in Switzerland. His samples confirmed PCR positivity for Andes virus on 5 May.<sup>[1]</sup></p><div><div id="ftn1"><p>Case 8: An adult male, who disembarked in Tristan da Cunha on 14 April. Onset of symptoms was reported on 28 April with diarrhoea and two days later with fever. He
    is currently stable and in isolation. He is currently a probable case until laboratory confirmation. </p><p>One case previously reported as suspected has now been reclassified as a non-case after testing negative for Andes virus through PCR and serology. Nevetheless, monitoring continues until the end of their incubation period from last exposure.&nbsp;&nbsp;</p><p><strong>Table 1. Distribution of reported Andes hantavirus cases by case status and outcome, as of 8 May 2026</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/hantavirus_table.png?sfvrsn=18c15f9_3" height="181" style="max-width:100%;height:auto;" title="Hantavirus_table" width="820" alt="Hantavirus_table" sf-size="8738" /></p><p><strong>Operational outbreak case definitions</strong><br /></p><p><em>Suspected case</em>:&nbsp;anyone who shared or visited a conveyance where there has been a confirmed or probable ANDV case AND with acute (or history
    of) symptoms compatible with ANDV infection, including fever (38&deg;C or above),&nbsp; myalgia, chills, acute gastrointestinal (e.g. nausea, vomiting, diarrhoea, abdominal pain) or acute respiratory (e.g. cough, shortness of breath, chest pain, difficulty breathing) symptoms.<br /></p><p><em>Probable case</em>:&nbsp;a person with signs and symptoms of a suspected case that has been evaluated by a health professional AND a known epidemiological link with a confirmed or probable ANDV case AND for which laboratory tests have not been conducted.<br /></p><p><em>Confirmed case</em>:&nbsp;a person with laboratory confirmation of ANDV through RT-PCR or serology testing.<br /></p><p>Non-case*:&nbsp;a suspected or probable case who tests negative for ANDV by RT-PCR or serology.</p><p>*Non-cases who develop symptoms compatible with the suspected case definition after a negative test and within the maximum incubation period after last exposure to a probable or confirmed case should be retested
    and reclassified as appropriate.&nbsp;<br /></p><p><strong>&nbsp;Figure 1. Epidemiological curve of Andes hantavirus cases reported to WHO as of 8 May 2026, 17:00.&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/hantavirus_epi-curve-2026.png?sfvrsn=c7b50055_4" height="480" style="max-width:100%;height:auto;" title="Hantavirus_Epi curve 2026" width="850" alt="Hantavirus _Epi curve 2026" sf-size="412885" /></p></div></div><p>Based on currently available information, the working hypothesis is that case 1 most probably acquired the infection prior to boarding through environmental exposure during activities he conducted in Argentina. Investigations are ongoing to assess the full itinerary of his activities and possible exposure factors. Current evidence points to subsequent human-to-human transmission onboard (Figure 1), given documented epidemiological links of some of the subsequent cases with case
    1 during his illness, and the timing of their symptom onset, which clusters around the most likely incubation periods previously documented for ANDV. However, ongoing epidemiological and sequencing investigations will help better understand the epidemiological links between cases and their most likely exposure.</p>'
