  Response: '<p>Authorities from States Parties involved in the management of the event to date &ndash; &nbsp;Argentina, Cabo Verde, Chile, Germany, the Netherlands, South Africa, Spain, Switzerland, and the United Kingdom &ndash; &nbsp;WHO, and partners have initiated coordinated response measures including:<br /></p><ul><li>Ongoing engagement between WHO and the National IHR Focal Points of Argentina, Cabo Verde, Chile, Germany, the Netherlands, South Africa, Spain, Switzerland and the United Kingdom, to ensure timely information sharing and coordination of response actions. International contact tracing involving partners is ongoing. </li><li>Passengers onboard have been advised to practice physical distancing and remain in their cabins where possible, while on the cruise ship.</li><li>One expert from WHO and one from the European Centre for Disease Prevention and Control (ECDC) are on board the ship for the provision of public health advice to passengers during the journey.</li><li>Epidemiological
    investigations are underway to determine the source of exposure. </li><li>WHO shared information about the event,&nbsp; technical guidance on the management of hantavirus on board the ship, a technical note for the disembarkation and onward management of passengers and crew, information on the management of contacts of Andes virus cases, its rapid risk assessment of the associated public health risk, case investigation forms and details on primers and probes for Andes virus detection with National IHR Focal Points globally through its secure Event Information Site for IHR NFPs to support States Parties in responding to the event.</li><li>The National IHR Focal Points of countries with cases have shared passenger and crew lists with the National IHR Focal Points of the respective countries, according to each person&rsquo;s nationality. IHR NFP international contact tracing efforts are ongoing for conveyances. </li><li>The National IHR Focal Point of Argentina requested information, which
    has been provided, on the first two cases to reconstruct their travel itinerary in the Southern Cone subregion of the Americas and assess any potential exposure to hantavirus.&nbsp;They also shared the National Hantavirus Epidemiological Circular: Update epidemiological Surveillance and Management Standards on Hantavirus.&nbsp;</li><li>In line with the Working Arrangement between the WHO Emergency Medical Team (EMT) Secretariat and the EU Emergency Response Coordination Centre (ERCC), the EMT Secretariat has launched formal discussions to support the clinical management and medical evacuation of symptomatic passengers. EU Health Task Force (EUHTF) has also been activated for support.</li><li>Logistic support has been provided, including sample collection items. WHO supported the shipment of samples to the Institut Pasteur de Dakar, Senegal. </li><li>Laboratory testing and confirmation of hantavirus infection have been conducted at the National Institute for Communicable Diseases (NICD)
    of South Africa. Identification of Andes virus was performed through genomic sequencing at NICD and virus-specific PCR at Geneva University Hospitals, Switzerland. </li><li>&nbsp;WHO supported collaboration across laboratories to ensure further timely testing, involving laboratories in Senegal, the United Kingdom, the Netherlands and Argentina. Further testing is currently on-going including serology, sequencing and metagenomics.</li><li>WHO has developed guidance documents in support of countries affected by the event, including covering management of the event on the ship, investigation of cases, disembarkation and management of returning passengers and crew members. </li><li>Risk communication coordination and support are being provided to ensure sharing of regular, timely and evidence-based information. WHO has activated three-level coordination and is supporting national authorities in implementing risk-based, evidence-informed public health measures in accordance with the provisions
    of the IHR and related WHO technical guidance documents.</li></ul>'
