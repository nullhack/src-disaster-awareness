  Response: '<p>Authorities from States Parties managing cases and/or contacts, WHO, and partners have initiated coordinated response measures, including:</p><ul type="disc"><li data-list="0" data-level="1">Ongoing engagement between WHO and the IHR NFPs of      countries managing cases and/or contacts to ensure timely information sharing and      coordination of response actions. </li><li data-list="0" data-level="1">International contact tracing and follow up of      contacts is ongoing.</li><li data-list="0" data-level="1">WHO is requesting regular information sharing and periodic      updates from States Parties through IHR channels regarding contact      monitoring and the health status of high-risk contacts.</li><li data-list="0" data-level="1">Epidemiological investigations continue to better      define epidemiological links between cases and exposure factors on the      ship, as well as to try to understand the potential source of exposure.</li><li data-list="0" data-level="1">WHO
    has developed and published specific technical      guidance documents to support response to the event, including: </li><ul type="circle"><li data-list="0" data-level="2">Technical guidance on the management of       hantavirus onboard ships was shared with States Parties through IHR       channels</li><li data-list="0" data-level="2"><a href="https://www.who.int/publications/m/item/who-technical-note-for-the-disembarkation-and-onward-management-of-passengers-and-crew-in-the-context-of-an-andes-virus-associated-cluster-mv-hondius-cruise-ship">Technical note for the       disembarkation and onward management of passengers and crew</a> in the context of an Andes-virus-associated       cluster;</li><li data-list="0" data-level="2"><a href="https://www.who.int/publications/m/item/management-of-contacts-of-andes-virus-(andv)-cases-fromthe-mv-hondius-cruise-ship">Management of contacts of Andes       Virus (ANDV) cases</a> from the MV Hondius cruise ship</li></ul></ul> <ul type="disc"><li
    data-list="0" data-level="1">IHR NFPs of affected countries have been in      contact about passenger and crew information through established IHR      channels for those who were on the ship, as well as on planes where a      known case was on board. Nearly 1000 communications have occurred through      these established channels. </li><li data-list="0" data-level="1">Risk communication coordination and support are      being provided to ensure sharing of regular, timely and evidence-based      information. WHO has activated three-level coordination and is supporting      national authorities in implementing risk-based, evidence-informed public      health measures in accordance with the provisions of the IHR and related      WHO technical guidance documents. </li><li data-list="0" data-level="1">WHO regularly convenes expert calls across      laboratory, clinical management, epidemiology, infection prevention and      control (IPC), and border health and points of entry domains to
    facilitate      timely experience sharing and coordinated expert support.</li><li data-list="0" data-level="1">WHO has supported the streamlining and      development of research protocols on the natural clinical history in      collaboration with national partner institutions and planned a hantavirus scientific      consultation on medical countermeasures.</li></ul>'
