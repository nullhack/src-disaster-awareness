  Response: <p>Authorities from States Parties involved in the management of the event to date &ndash; Cabo Verde, the Netherlands, Spain, South Africa and the United Kingdom - have initiated coordinated response measures including:<br /></p><ul><li>Ongoing engagement between WHO and the National IHR Focal Points of Cabo Verde, the Netherlands, South Africa, Spain and the United Kingdom, to ensure timely information sharing and coordination of response actions.</li><li>WHO shared information about the events with National IHR Focal Points globally.</li><li>Passengers onboard have been advised to practice maximal physical distancing and remain in their cabins where possible.</li><li>Epidemiological investigations are underway to determine the source of exposure.</li><li>The National IHR Focal Point of Argentina shared the passenger and crew lists with the National IHR Focal Points of the respective countries, according to each person&rsquo;s nationality.</li><li>&nbsp;In line with the Working
    Arrangement between the WHO Emergency Medical Team (EMT) Secretariat and the EU Emergency Response Coordination Centre (ERCC<strong>)</strong>, the EMT Secretariat has launched formal discussions to support the clinical management and medical evacuation of symptomatic passengers.</li><li>Logistic support has been provided, including sample collection items.</li><li>Laboratory testing and confirmation of hantavirus infection have been conducted at the National Institute for Communicable Diseases (NICD) of South Africa. Serology, sequencing and metagenomics are ongoing.</li><li>Additional laboratory samples from symptomatic passengers are being sent, with WHO support, to the Institut Pasteur de Dakar, Senegal, for testing.</li><li>WHO has activated three-level coordination and is supporting national authorities in implementing risk-based, evidence-informed public health measures in accordance with the provisions of the IHR and related WHO technical guidance documents.</li></ul>
