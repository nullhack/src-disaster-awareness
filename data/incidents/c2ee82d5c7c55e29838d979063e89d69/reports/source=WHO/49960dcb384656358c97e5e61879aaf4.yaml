  Epidemiology: <p>Polio is a highly infectious disease that largely affects children under five years of age, causing permanent paralysis (approximately 1 in 200 infections) or death (2-10% of those paralyzed).</p><p>The virus is transmitted from person-to-person, mainly through the fecal-oral route or, less frequently, by contaminated water or food. The virus multiplies in the intestine, from where it can invade the nervous system and cause paralysis. The incubation period is usually 7-10 days but can range from 4-35 days. Up to 90% of those infected are either asymptomatic or experience mild symptoms and the disease usually goes unrecognized.</p><p>Vaccine-derived poliovirus is a well-documented strain of poliovirus mutated from the strain originally contained in OPV. OPV contains a live, weakened form of poliovirus that replicates in the intestine for a limited period, thereby developing immunity by building up antibodies. On rare occasions, when replicating in the gastrointestinal tract,
    OPV strains can genetically change and may spread in communities that are not fully vaccinated against polio, especially in areas where there is poor hygiene, poor sanitation, or overcrowding. The lower the population's immunity, the longer vaccine-derived poliovirus survives and the more genetic changes it undergoes.</p><p>In very rare instances, the vaccine-derived virus can genetically change into a form that can cause paralysis as does the wild poliovirus &ndash; this is what is known as a vaccine-derived poliovirus (VDPV). The detection of VDPV in at least two different sources and at least two months apart, that are genetically linked, showing evidence of transmission in the community, is classified as &lsquo;circulating&rsquo; vaccine-derived poliovirus (cVDPV). Similar to wild poliovirus, cVDPVs can be of three types (1,2 or 3), the current outbreak in Papua New Guinea is due to cVDPV type 2 (cVDPV2).</p><p>Poliovirus is a pathogen targeted for global eradication and Papua New
    Guinea was certified polio-free in 2000, along with the rest of the countries in the WHO Western Pacific Region, following the last reported case of wild poliovirus (WPV) in 1996.</p><p>However, in 2018, an outbreak of circulating vaccine-derived poliovirus type 1 (cVDPV1) was declared in Lae City, in Morobe province, the same city now considered to be experiencing a new poliovirus outbreak. The current detection of cVDPV2 in an environmental sample and in healthy children in Lae city is both unusual and unexpected, as it is not related to the previous cVDPV1 polio outbreak in 2018.&nbsp;</p>
