  Response: <p>WHO recommends that Member States progressively increase their laboratory diagnostic capacity to allow for the early and reliable identification of hvKp, as well as reinforcing laboratory capacities in molecular testing and detection and analyses of relevant virulence genes in addition to resistance genes. WHO will promote the strengthening of clinical and public health awareness for the detection of hvKp strains and will support the development of a consensus definition of hvKp as well as required detection and confirmation algorithms. WHO will continue to closely monitor reported cases and events.</p>
