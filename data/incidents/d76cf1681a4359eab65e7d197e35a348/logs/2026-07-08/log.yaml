log_date: '2026-07-08'
summary: A powerful earthquake with a magnitude between 7.4 and 7.7 struck off the northeast coast of Japan on April 20, 2026, prompting a short-lived tsunami warning for coastal areas. The Japan Meteorological Agency issued alerts, and local residents were advised to evacuate to higher ground. Additionally, misinformation about an "artificial earthquake" began spreading online following the event.
