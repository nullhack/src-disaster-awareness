  Epidemiology: ''
  Advice: <p>To reduce the impact of the ongoing event in the Panzi health zone, WHO advises the following measures:&nbsp;&nbsp;</p><p>Strengthening coordination mechanisms at all levels&mdash;national, provincial, zonal, and local&mdash;is critical for a unified response. Enhanced communication infrastructure, such as satellite phones, is required to overcome the limited network coverage in affected areas. </p> <p>Improving surveillance efforts is a priority to better understand disease trends and mortality. Active case searches should continue in both health facilities and communities, with a particular focus on areas reporting deaths and family clusters. Community-based surveillance must be strengthened to ensure early case detection and rapid response. </p> <p>Careful characterization of the clinical syndrome and outcomes and an improved case definition based on the information collected will be necessary to understand the situation. In particular, data which clarify possibility of coinfection
    and multiple pathologies, and uncertainties in outcomes among vulnerable groups should be collected. The WHO has established the Global Clinical Platform to provide rapid turnaround of structured data analysis using anonymized case records; its use is recommended in the detailed capture of patient syndromes and outcomes.&nbsp;</p> <p>Effective case management requires ensuring an adequate supply of essential medications, access to oxygen therapy, and training of healthcare workers including basic emergency and critical care to support treatment and prevent more deaths. RDTs for malaria should be distributed to facilitate early diagnosis and prompt treatment. Long-term laboratory capacity strengthening, and decentralization will be important in provision of diagnostic capability in the affected health zone and detect cause of deaths early.&nbsp;&nbsp;</p> <p>Infection prevention and control measures must be reinforced across all health facilities. Healthcare workers should receive training
    on best practices, including the proper use of personal protective equipment such as masks and gloves, as well as strict hand hygiene protocols. These measures will reduce transmission risks within health facilities and improve the safety of healthcare delivery.&nbsp;&nbsp;</p> <p>The role and added value of the health sector during food crises is crucial to prevent, reduce and reverse the causal relationship between poor nutrition, disease and death &ndash; before, during and after the onset of severe food shortages. As needs and vulnerabilities during food crises are complex, interlinked and multidimensional, intersectoral coordination and collaboration, especially between the health, nutrition, water, sanitation and hygiene (WASH) and food security clusters, should be stepped up as part of the overall humanitarian response. Data collection and analysis should be strengthened to inform the overall response. </p> <p>Risk communication and community engagement are essential to raising
    public awareness. Targeted messages should be disseminated to educate the public on respiratory illness symptoms, preventive measures, and the importance of seeking care early. Community leaders must be engaged to build trust and encourage adherence to public health guidance. Addressing misinformation and fears within the community is critical to ensuring effective collaboration in the response.&nbsp;&nbsp;</p> <p>Logistical and security challenges also require attention. Strengthening logistical support for the deployment of teams and supplies will ensure timely access to affected areas. Contingency plans should be developed to address potential insecurity posed by armed groups, safeguarding response personnel and maintaining continuity in response activities. &nbsp;</p>
  Assessment: '<p>Symptoms such as fever, cough, headache, and body aches have been observed since 24 October, primarily through health worker reports, and an uptick in deaths was observed in epi week 47, which triggered the signal. Since the alert was reported, there has not been any significant increase in reported deaths.</p><p>The epidemiological information together with the early laboratory result indicate an event triggered by an increase in acute respiratory virus cases associated with malaria, with a background of a worsening of the nutritional situation in Panzi, disproportionally affecting young children. The WHO African Region accounts for about 94% of all malaria cases and 95% of deaths globally (World Malaria Report 2024). Children under five account for about 76% of all malaria deaths in the Region. Over half of these deaths occurred in four countries: Nigeria (30.9%), the Democratic Republic of the Congo (11.3%), Niger (5.9%) and United Republic of Tanzania (4.3%).&nbsp;Support
    is being provided for laboratory diagnosis and strengthening case management including the treatment of malaria cases with appropriate medication.</p> <p>An increase in common respiratory viruses and malaria is expected at this time of year in Panzi with the rainy season, however it is the increase in deaths that triggered the initial signal. There has been an increase in influenza and SARS-CoV-2 activity reported from Kinshasa through sentinel sites since mid-October. WHO and UNICEF estimates of national immunization coverage for 2023 show DTP3 and PCV3 coverage at 60% and 59%, respectively, however, no data is currently available for the affected health zone, leading to uncertainties about vaccine-derived population immunity. </p><p>The Integrated Food Security Phase Classification (IPC) for acute food insecurity levels in Kwango province increased from IPC 1 (acceptable) in April 2024 to IPC 3 (Crisis Level) in September 2024. This suggests a significant phase of increase in food
    insecurity and risk of severe acute malnutrition. In Addition, the IPC acute malnutrition classification currently classifies Panzi health zone as IPC acute malnutrition phase 3 (serious), projected to move to phase 4 (critical) from January 2025. </p> <p>While mortality from common infectious diseases is expected to increase as transmission increases, this event highlights that mortality from known and expected infectious diseases can be high in a context of vulnerability and malnutrition, emphasizing the need to strengthen malaria control, clinical management, improve access to care and reduce the prevalence of malnutrition. </p> <p>Gaps in case management have also been identified. Stock-outs of medications for treating common diseases frequently occur, and care is not provided free of charge, which could limit access to treatment for vulnerable populations and increase severity and mortality of known and treatable infections.</p> <p>The affected area&rsquo;s remoteness and logistical
    barriers, including a two-day or longer road journey from Kinshasa due to the rainy season affecting the roads and limited telecommunication network coverage across the health areas, have hampered the rapid deployment of response teams and resources. Furthermore, there is no functional laboratory in the health zone or province, requiring the collection and shipment of samples to Kinshasa for analysis. This has delayed diagnosis and can continue to impact the ongoing response efforts.&nbsp;</p> <p>Insecurity in the region adds another layer of complexity to the response. The potential for attacks by armed groups poses a direct risk to response teams and communities, which could further disrupt the response.&nbsp;</p> <p>Based on the above rationale, the overall public health risk level to the affected communities is assessed as <strong>high</strong>, and requires an integrated public health approach to reduce mortality from infections, improve nutritional status and strengthen malaria
    control, among others. </p> <p>At the <strong>national level</strong>, the risk is considered <strong>low </strong>due to the localized nature of the event and that it is caused by a range of illnesses whose severity is compounded by the vulnerability of the population in the local context. However, many other areas of DRC are seeing increasing levels of malnutrition, and what has been witnessed in Panzi could also happen elsewhere in the country. </p> <p>As such, efforts need to continue to prevent similar situation in other vulnerable parts of the country. &nbsp;At the <strong>regional and global levels</strong>, the risk remains <strong>low </strong>at this time. &nbsp;<br /></p> <p></p>'
  Overview: "<p>Since the last <a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON546\">Disease Outbreak News</a> on this event was published on 8 December 2024, 485 additional suspected cases and 17 additional deaths have been reported from Panzi health zone in Kwango Province, Democratic Republic of the Congo, across 25 out of the 30 health areas in Panzi. These cases were identified as a result of enhanced surveillance put in place following the report of deaths in the context of febrile illness with acute respiratory symptoms and anaemia, first reported on 29 November. While the number of reported cases was not deemed particularly unusual in a context of high burden of pneumonia, malaria and acute respiratory infections, particularly at the start of the rainy season, it is the increase in the number of deaths that triggered the alert on 29 November.</p><p>In the absence of diagnosis, a broad surveillance case definition was used, with the resulting case numbers\
    \ reflecting the detection of any febrile illness occurring in Panzi and thus representing a range of diseases and clinical syndromes. The case definition includes: <em>a</em><em>ny person living in the Panzi</em><em> health zone from September 2024 to date, presenting with fever, cough, body weakness, runny nose, with or without one of the following symptoms and signs: chills, headache, difficulty breathing, malnutrition, body aches</em>. This was done to better understand the epidemiology and characteristics of deaths and to collect a range of clinical samples for laboratory testing.</p><p>Between 24 October and 16 December 2024, 48 deaths and a total of 891 cases across 25/30 health areas of Panzi health zone met the case definition. Children under five years of age are disproportionally affected, representing 47% of all cases and 54% of all deaths, while they represent around 18% of the population, likely reflecting the vulnerability of young children to severe disease and death\
    \ in this context. The main symptoms associated with death include difficulty in breathing, anaemia, and signs of acute malnutrition. </p><p>A total of 430 samples including blood samples, oropharyngeal and nasopharyngeal swabs, urine and breastmilk samples were collected from suspected cases in Panzi health zone and transported to the laboratory at the INRB. Out of 88 rapid diagnostics tests for malaria performed in the field, 55 (62%) samples tested positive. In addition, out of 26 samples analyzed by PCR BioFire Global Fever Panel test (which tests 18 different pathogens including some of the viral hemorrhagic fevers), 17 (65%) samples tested positive for Plasmodium falciparum. &nbsp;In addition, a total of 89 samples were tested at INRB Respiratory Disease Surveillance Laboratory. Of the 89 samples, 64 samples were positive for common respiratory viruses including Influenza A (H1N1, pdm09) (n=25), rhinoviruses (n=18), SARS-COV-2 (n=15), Human coronaviruses (n=3), parainfluenza viruses\
    \ (n=2), and Human adenovirus (n=1).</p><p>Other laboratory tests on the collected samples, including virological and bacterial analysis, are still ongoing. The ongoing investigations and preliminary laboratory findings suggest that a combination of common viral respiratory infections and falciparum malaria, compounded by acute malnutrition led to an increase in severe infections and deaths. </p><p>Enhanced surveillance will continue, alongside response activities. The number of weekly reported suspected cases has remained steady with the exception of an increase in epidemiological week 50 (week ending 15 December 2024, Figure 1). While this may partly reflect an increase in transmission of respiratory viruses and malaria with the rainy season, it is driven by an increase in surveillance and case finding following the deployment of the rapid response teams. Notably, the increase in cases is not matched with a comparable increase in deaths.</p><p><strong>Figure 1: Weekly epidemiological\
    \ curve showing suspected cases and deaths reported between 24 October to 16 December 2024, Panzi health zone in Kwango Province, Democratic Republic of the Congo</strong></p><p><img alt=\"DRC epi\" src=\"https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/drc-epi.jpg?sfvrsn=b1fb26cf_4\" sf-size=\"34856\" /></p><p>* Data\r\nfor the epidemiological week 51 is not complete at the time of publication.<o:p></o:p></p><p>There are proportionally more cases reported among females (58%, 514/889), particularly among adults (66% female, 173/262). While data is lacking to better understand this difference, it may stem from contact patterns of respiratory virus transmission within households, particularly a close interaction between mothers and children during acute respiratory illnesses.&nbsp;</p><p><strong>Figure 2: Geographic description of the affected health zone in Kwango Province, Democratic Republic of the Congo</strong></p><p style=\"text-align:center;\"><img\
    \ alt=\"DRC map\" src=\"https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/drc-map.png?sfvrsn=4a9617ab_4\" sf-size=\"79002\" /></p><p>The affected area experienced deterioration in food security in recent months, with increasing levels of acute malnutrition. Between July and December 2024, which coincides with a drop in acute malnutrition, Kwango province was in Integrated Food Security Phase Classification (IPC) Acute Malnutrition (AMN) Phase 3 (Serious). Between January and June 2025, an increase in cases of malnutrition is projected in the province with a significant deterioration in the nutritional situation expected, moving to IPC AMN Phase 4 (Critical). Between July 2024 and June 2025, nearly 4.5 million children aged 6 to 59 months in the DRC are facing or expected to face acute malnutrition, including approximately 1.4 million cases of severe acute malnutrition and 3.1 million cases of moderate acute malnutrition. It is also estimated that 3.7 million\
    \ pregnant and breastfeeding women are facing or expected to face acute malnutrition over the same period.<sup>[1]</sup></p><p>Severe acute malnutrition is a life-threatening condition that requires medical treatment. In addition, disease and malnutrition combine to worsen each other. The area has low routine vaccination coverage. There is also very limited access to diagnostics and quality case management, and a lack of supplies and transportation, shortage of health staff in the area, as well as financial and geographical barriers to access to health care. Increasing malaria trends are expected with the start of the rainy season, however, malaria control measures in the area are very limited. Together, these factors may increase the severity of malaria, and common respiratory infections. </p><p>Overall, this event highlights the severe burden from common infectious diseases (acute respiratory infections and malaria) in a context of vulnerable populations facing food insecurity and\
    \ emphasizes the need to strengthen access and quality of health care.</p>"
