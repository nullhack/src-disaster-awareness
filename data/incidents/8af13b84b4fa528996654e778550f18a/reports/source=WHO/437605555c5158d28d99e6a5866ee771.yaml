  Summary: "This is an update to the Disease Outbreak News on Undiagnosed disease in the Democratic Republic of the Congo published on 8 December 2024 (now named acute respiratory infections complicated by malaria). It includes updated epidemiological investigation information and preliminary laboratory results. \r\nOn 29 November, an alert was raised by local health zone authorities of Panzi health zone in Kwango province after an increase in deaths, particularly among children under five years of age, following febrile illness. Enhanced epidemiological surveillance was rapidly implemented, which in the absence of a clear diagnosis was based on the detection of syndromic cases of febrile illnesses with cough, body weakness, with one of a number of other symptoms compatible with acute respiratory and febrile illnesses. This resulted in a rapid increase in the number of cases meeting the definition, with a total of 891 cases reported as of 16 December. However, the weekly number of reported\
    \ deaths (48 deaths reported over the period) has remained relatively stable. \r\nAs of 16 December, laboratory results from a total of 430 samples indicated positive results for malaria, common respiratory viruses (Influenza A (H1N1, pdm09), rhinoviruses, SARS-COV-2, Human coronaviruses, parainfluenza viruses, and Human Adenovirus).\r\nWhile further laboratory tests are ongoing, together these findings suggest that a combination of common and seasonal viral respiratory infections and falciparum malaria, compounded by acute malnutrition led to an increase in severe infections and deaths, disproportionally affecting children under five years of age. \r\nMultidisciplinary rapid response teams have been deployed to investigate the event and strengthen the response. Efforts are ongoing to address the health needs in Panzi health zone. Enhanced surveillance in the community and within health facilities continues. The teams have also been providing support for diagnosis, the treatment of patients\
    \ as well as with risk communication and community engagement. \r\nThis event highlights the severe burden from common infectious diseases (acute respiratory infections and malaria) in a context of vulnerable populations facing food insecurity. It emphasizes the need to strengthen access to health care and address underlying causes of vulnerability, particularly malnutrition, given the worsening food insecurity."
