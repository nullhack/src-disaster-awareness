  Response: '<ol><li><strong>Leadership and coordination:</strong><ul><li>Daily coordination meetings are being held at the national level, with provincial teams actively participating in ongoing planning and response. </li><li>National rapid response team (RRT) composed of experts from Ministry of Health (MoH), INRB and WHO deployed from Kinshasa on 7 December and arrived in Panzi on 10 December. Following the departure of the national team, a joint MoH-Africa CDC rapid response team has been deployed with support from WHO. <br /></li></ul></li></ol><p><strong>2. Surveillance: </strong></p><ul style="margin-left:30px;"><li>A case definition has been developed based on clinical symptoms observed, guiding surveillance and reporting efforts.&nbsp;&nbsp;</li><li>Active case search is continuing in health facilities and the community.&nbsp;</li><li>Data collection is ongoing, focusing on preparing a line list and detailed epidemiological analysis.&nbsp;&nbsp;</li><li>Community deaths are being
    investigated to better understand the context of deaths and vulnerability factors.</li><li>WHO is deploying a senior epidemiologist and a data manager to support the ongoing surveillance activities and improve data collection.</li></ul><p>3.&nbsp;<strong>Case Management:</strong></p><ul style="margin-left:30px;"><li>Provincial and national RRTs, including WHO, UNICEF and M&eacute;decins Sans Fronti&egrave;res, have been deployed to the affected areas and are strengthening case management in health facilities as well as providing medical supplies including medication. The teams carried medication and medical equipment to support case management and prevent more deaths.</li><li>Efforts are underway to strengthen the capacity of healthcare providers to ensure the best possible care for patients.&nbsp;</li><li>Six oxygen concentrators are being installed at the Panzi General Referral Hospital and three hotspot health centers to support patient care.</li></ul><ul></ul><p>4.&nbsp;<strong>Laboratory:
    </strong><strong></strong></p><ul style="margin-left:30px;"><li>Laboratory equipment was transported to collect samples from cases and send samples for testing at the INRB in Kinshasa. Additionally, RDTs for malaria and COVID-19 have been provided to assist in diagnosis.&nbsp;</li><li>Laboratory reagents have been procured to continue facilitating the ongoing testing at INRB.</li></ul><p>5. <strong>Risk communication and community engagement:</strong></p><ul style="margin-left:30px;"><li>Key messages were developed to enhance public awareness and encourage general preventive behaviors. These messages are being disseminated through community engagement, with sensitization campaigns underway.&nbsp;</li></ul><p>6. <strong>Infection prevention and control:</strong></p><ul style="margin-left:30px;"><li>Infection prevention and control measures are being reinforced. Health workers have been briefed on key practices, including the proper use of masks, hand washing, and gloves, to reduce the
    risk of transmission of respiratory and other pathogens.&nbsp;</li></ul><p>7. <strong>Logistics</strong></p><ul style="margin-left:30px;"><li>Logistical support is being provided for effective case management, including the transportation of samples to INRB Kinshasa for laboratory testing. Health facilities and hospitals in the most affected health areas are being supplied with appropriate medications and sampling kits to support the response.&nbsp;</li><li>Medical kits for malaria, IPC kits, blood transfusion kits as well as additional medical supplies to support treatment efforts have been provided.</li><li>A mobile internet kit is being deployed to address some of the telecommunication challenges in the affected health zone.&nbsp;</li></ul>'
