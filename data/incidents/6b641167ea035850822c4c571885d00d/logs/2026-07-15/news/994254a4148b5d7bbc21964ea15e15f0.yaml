title: Earthquake of magnitude 6.05 strikes Philippines' Mindanao
body: A magnitude 6.05 earthquake struck Mindanao in the Philippines on Tuesday, according to a Institute of Volcanology and Seismology (Phivolcs) bulletin. The quake was at a depth of 10 km (6.21 miles), and it struck on July 14 at 11:49pm local time.
