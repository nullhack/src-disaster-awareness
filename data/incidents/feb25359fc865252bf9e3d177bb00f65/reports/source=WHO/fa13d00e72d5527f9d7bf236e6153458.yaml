  Response: <p>Local and national health authorities implemented the following public health measures&nbsp;<em>(1,10)</em>:<br /></p><ul><li>Public health officials are conducting surveillance activities in Texas in response to this detection.</li><li>US CDC is working with state health departments to monitor workers who may have been in contact with infected or potentially infected birds/animals and test those people who develop symptoms.</li><li>US CDC has issued recommendations for the public regarding avoiding unprotected contact with sick or dead animals, including wild birds, poultry, other domestic fowl, and other wild or domestic animals, as well as animal droppings, litter, or materials contaminated by birds or other animals with suspected or confirmed HPAI A (H5N1) virus infection.</li><li>US CDC has issues recommendations to avoid consumption of raw or undercooked food or related uncooked food products, such as unpasteurized (raw) milk or raw cheese, from animals with suspected
    or confirmed infection with HPAI A(H5N1) virus.&nbsp;</li></ul><p><span style="background-color:transparent;font-family:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;font-size:inherit;">The United States has a robust surveillance system that is designed to mitigate the spread of animal diseases, thereby protecting public health, and maintaining a safe food supply for domestic and international markets. The U.S. surveillance system includes a national network of border protection personnel at ports of entry </span><em style="background-color:transparent;font-family:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;font-size:inherit;">(1).</em><br /></p>
