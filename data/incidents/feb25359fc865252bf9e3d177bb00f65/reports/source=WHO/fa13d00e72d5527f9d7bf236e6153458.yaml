  Epidemiology: <p>Animal influenza A viruses normally circulate in animals but can also infect humans. Infections in humans have primarily been acquired through direct contact with infected animals or contaminated environments. Depending on the original host, influenza A viruses can be classified as avian influenza, swine influenza, or other types of animal influenza viruses.</p><p>Avian influenza virus infections in humans may cause diseases ranging from mild upper respiratory tract infection to more severe diseases and can be fatal. Conjunctivitis, gastrointestinal symptoms, encephalitis and encephalopathy have also been reported in previous human infections with A (H5N1) viruses. There have also been a few detections of A(H5N1) virus in asymptomatic persons who had exposure to infected birds.<br /></p> <p>Laboratory tests are required to diagnose human infection with influenza. WHO periodically updates technical guidance protocols for the detection of zoonotic influenza using molecular
    methods, e.g. RT-PCR. Evidence suggests that some antiviral drugs, notably neuraminidase inhibitors (oseltamivir, zanamivir), can reduce the duration of viral replication and improve prospects of survival in some cases.<br /></p> <p>Avian influenza A(H5N1) virus belonging to Gs/GD lineage, clade 2.3.4.4b Eurasian-origin infections have been reported in birds in the United States since 2022. In late March 2024, HPAI A(H5N1) was also detected in dairy herds in Texas and Kansas&nbsp;<em>(4,5)</em>. &nbsp;<span style="text-decoration:underline;"></span></p><p>This is the first human infection caused by avian influenza A(H5N1) virus in 2024 in the United States and the second confirmed detection in human in the country. This also appears to be the first human infection with A(H5N1) acquired from contact with an infected mammal although human infections with other influenza subtypes have been acquired from mammals. The first detection of influenza A(H5N1) in human in the United States was
    identified in April 2022, in a person involved in culling birds at a commercial poultry facility in Colorado&nbsp;<em>(9)</em>.&nbsp;</p><p>In the past, small clusters of A(H5) virus infections were reported, including some involving health care workers, where limited human-to-human transmission could not be excluded; however, sustained human-to-human transmission has not been detected. In this event, the case had direct contact with cows presumed to be infected with A(H5N1) viruses and no further human cases have been detected associated with this event.</p>
