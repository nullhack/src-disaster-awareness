  Advice: '<p>This case does not change the current WHO recommendations on public health measures and surveillance of influenza.&nbsp;Establishing and monitoring the extent of influenza A(H5N1) virus in dairy herds in the affected localities of the country should inform changes in the ongoing risk assessment.</p><p>Due to the constantly evolving nature of influenza viruses, WHO continues to stress the importance of global surveillance to detect and monitor virological, epidemiological and clinical changes associated with emerging or circulating influenza viruses that may affect human (or animal) health and timely virus sharing for risk assessment.&nbsp;</p><p>When there has been human exposure to a known outbreak of an influenza A virus in or when there has been an identified human case of infection with such a virus, enhanced surveillance in potentially exposed human populations becomes necessary. Enhanced surveillance should consider the health care seeking behaviour of the population,
    and could include a range of active and passive health care and/or community-based approaches, including: enhanced surveillance in local influenza-like illness (ILI)/severe acute respiratory infection (SARI) systems, active screening in hospitals and of groups that may be at higher occupational risk of exposure, and inclusion of other sources such as traditional healers, private practitioners and private diagnostic laboratories.</p><p>In the case of a confirmed or suspected human infection caused by a novel influenza A virus with pandemic potential, including avian influenza virus, a thorough epidemiologic investigation (even while awaiting the confirmatory laboratory results) of history of exposure to animals, of travel, and contact tracing should be conducted. The epidemiologic investigation should include early identification of unusual events that could signal person-to-person transmission of the novel virus and clinical samples collected from the time and place that the case occurred
    should be tested and sent to a WHO Collaboration Center for further characterization.&nbsp;</p><p>Travelers to countries with known outbreaks of animal influenza should avoid farms, contact with animals in live animal markets, entering areas where animals may be slaughtered, or contact with any surfaces that appear to be contaminated with animal feces. Travelers should also wash their hands often with soap and water. Travelers should follow good food safety and good food hygiene practices. Should infected individuals from affected areas travel internationally, their infection may be detected in another country during travel or after arrival. If this were to occur, further community-level spread is considered unlikely as this virus has not acquired the ability to transmit easily among humans.&nbsp;</p><p>All human infections caused by a novel influenza A virus subtype are notifiable under the International Health Regulations (IHR) and State Parties to the IHR (2005) are required to immediately
    notify WHO of any laboratory-confirmed case of a recent human infection caused by an influenza A virus with the potential to cause a pandemic. Evidence of illness is not required for this report.&nbsp;</p><p>WHO does not advise special traveler screening at points of entry or restrictions regarding the current situation of influenza viruses at the human-animal interface.&nbsp;</p>'
  Assessment: <p>This human case was reportedly exposed to dairy cattle in Texas, where HPAI A (H5N1) has recently been confirmed in dairy herds.</p><p>From 2003 to 1 April 2024, a total of 889 cases and 463 deaths (CFR 52%) caused by influenza A(H5N1) virus have been reported worldwide from 23 countries. The most recently reported case in humans prior to the current case, was in March 2024 in Viet Nam&nbsp;<em>(11)</em>.&nbsp;The human case in Texas is the fourth reported in the region of the Americas, the most recent prior case having been reported in Chile in March 2023&nbsp;<em>(12).</em></p><p>Whenever avian influenza viruses are circulating in birds, there is a risk for sporadic infections in mammals and humans due to exposure to infected animals (including livestock), or contaminated environments and thus, further human cases are not unexpected.&nbsp; Influenza A infection has been rarely reported in bovine species and spread among dairy cattle herds in four U.S. States is being assessed.
    Previously, there have been human infections with other avian influenza subtypes following exposure to infected mammals. </p><p>Since the virus has not acquired mutations that facilitate transmission among humans and based on available information, WHO assesses the public health risk to the general population posed by this virus to be low and for occupationally exposed persons the risk of infection is considered low-to-moderate.</p><p>There are no specific vaccines for preventing influenza A(H5N1) virus infection in humans. Candidate vaccines to prevent H5 infection in humans have been developed for pandemic preparedness purposes. Close analysis of the epidemiological situation, further characterization of the most recent viruses (from human cases and animal) and comprehensive investigations around human cases are critical to assess associated risk and to adjust risk management measures in a timely manner.&nbsp;</p><p>If needed, the risk assessment will be reviewed should further epidemiological
    or virological information become available.</p>
  Overview: '<p>On 1 April 2024, the IHR NFP of the United States of America notified WHO of a laboratory-confirmed human case of avian influenza A(H5N1) detected in the state of Texas.</p><p>The case is aged over 18 years. On 27 March, the case developed conjunctivitis, was reported to be while working at a commercial dairy cattle farm and had a history of exposure to dairy cattle (cows) presumed to be infected with influenza A(H5N1) virus&nbsp;<em>(1)</em>.&nbsp;&nbsp;</p><p>On 28 March, respiratory and conjunctival specimens were collected from the case and tested at the Texas Tech University Bioterrorism Response Laboratory. Reverse transcription-polymerase chain reaction (RT-PCR) analysis indicated that both specimens were presumptive positive for influenza A(H5) virus. The specimens were then sent to the United States Centers for Disease Control and Prevention (US CDC) for further testing. They were received and tested at the US CDC on 30 March and confirmed as high pathogenicity avian
    influenza (HPAI) A(H5N1) virus clade 2.3.4.4b by RT-PCR and sequencing&nbsp;<em>(1) (2)</em>.&nbsp;Genome sequencing of the virus didn&rsquo;t show new mutations possibly associated with increased transmission to humans. </p><p>On 28 March, the patient was advised to isolate and given antiviral treatment (oseltamivir) following US CDC guidance. The patient did not report symptoms other than conjunctivitis, was not hospitalized, and at the time of reporting, was recovering (<em>1)</em>.&nbsp;&nbsp;</p><p>Household contacts&nbsp;of the patient have not reported illness and have been provided influenza antiviral prophylaxis as per US CDC recommendations.&nbsp; No additional cases of human infection with&nbsp;influenza A(H5N1) associated with this case have been identified&nbsp;<em>(1)</em>.&nbsp;</p><p>In the United States, since January 2022, detections of HPAI A(H5N1) virus among wild birds have been reported in 50 states or territories. There have been reports of sporadic A-(H5) virus
    outbreaks among poultry and backyard flocks as well as sporadic detections in mammals and outdoor cats on the dairy facilities as reported by the United States Department of Agriculture (USDA) Animal Plant Health Inspection Service (APHIS). </p><p>Influenza A virus infection is exceptionally rare in bovine species&nbsp;<em>(3).</em>&nbsp;This human case had exposure to dairy cattle in Texas, presumed to be infected with HPAI A(H5N1) virus <em>(4)(5)</em>. On 25 March, the USDA reported the first detection of HPAI A(H5N1) virus in dairy cattle and unpasteurized milk samples from cattle in Texas and Kansas in four dairy herds. On 29 March, USDA announced confirmation of additional detections in dairy cattle in Michigan dairy cattle that recently received cows from Texas. USDA has also announced additional confirmed detections in dairy cattle in Idaho, New Mexico, and Ohio. To date, USDA has announced confirmed detections on 15 farms across six states: Idaho (n=1), Kansas (n=3), Michigan
    (n=1), New Mexico (n=2), Ohio (n=1), and Texas (n=7) (<em>5,6</em>,7). USDA is continuing to monitor and test samples collected from other farms where cattle are displaying decreased lactation, low appetite, and other signs<em> (1,5,6,7)</em>. </p><p>The USDA has <a href="https://www.aphis.usda.gov/livestock-poultry-disease/avian/avian-influenza/hpai-detections/livestock">publicly posted</a> the genetic sequences of several recently detected HPAI A(H5N1) viruses found in US wild birds, poultry, wild mammals and cattle in Texas <em>(8)</em>. The viruses are from clade 2.3.4.4b, which is the most common HPAI A(H5N1) virus circulating among birds worldwide currently.&nbsp; CDC has <a href="https://www.cdc.gov/flu/avianflu/spotlights/2023-2024/h5n1-analysis-texas.htm">publicly posted</a> the genome of the virus identified from the patient in Texas and identified only minor changes when compared to the animal viruses <em>(2</em>).&nbsp; Between 9 February 2022 to 29 March 2024, more than
    8000 people were actively monitored in the United States following exposure to animals presumed to be infected with HPAI A(H5N1) viruses.</p>'
