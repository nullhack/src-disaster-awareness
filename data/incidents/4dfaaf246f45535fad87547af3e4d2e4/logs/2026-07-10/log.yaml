log_date: '2026-07-10'
summary: Reports indicate a slow start to the flu season in Queensland, with experts attributing partial immunity from a severe 2025 season and urging improved vaccination rates. Hong Kong has entered a summer flu season with rising COVID-19 infections, with most severe adult flu cases occurring in unvaccinated individuals. The UK's NHS has updated its flu jab eligibility criteria, expanding vaccination availability to new age groups.
