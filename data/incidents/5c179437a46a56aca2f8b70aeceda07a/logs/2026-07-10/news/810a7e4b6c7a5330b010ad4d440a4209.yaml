title: Suspected Ebola patient placed in Equatorial Guinea hotel with deportees from the US, lawyers say
body: Migrants deported from the U.S. and detained in a hotel in Equatorial Guinea say that authorities there also have used the facility to quarantine at least one suspected Ebola patient, deportees and lawyers representing them said Thursday.
