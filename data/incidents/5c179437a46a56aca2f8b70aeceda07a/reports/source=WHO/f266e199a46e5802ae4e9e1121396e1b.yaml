  Response: <p>Health authorities in the Democratic Republic of the Congo and Uganda, in collaboration with WHO and partners, are implementing extensive public health measures including implementing the continental response plan, engaging donors and mobilizing additional resources to address critical funding gaps and sustain response operations across affected and at-risk areas.</p>For further information about public health response actions by the respective Ministry of Health, WHO, and partners, please refer to the latest situation reports published by the WHO Regional Office for Africa <a href="https://www.afro.who.int/health-topics/ebola-disease/outbreak-drc-26">Ebola Bundibugyo Virus Disease Outbreak Democratic Republic of the Congo | Uganda Weekly External Situation Report 5, Data as of 14 June 2026 | WHO | Regional Office for Africa&nbsp;</a>
