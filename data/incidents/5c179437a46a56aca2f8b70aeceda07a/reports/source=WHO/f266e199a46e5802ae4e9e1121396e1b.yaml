  Title: Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo & Uganda
  Epidemiology: <p>Bundibugyo virus disease (BVD) is a severe and often fatal form of Ebola disease caused by the Bundibugyo virus, one of the <em>Orthoebolavirus </em>species. It is a zoonotic disease, with fruit bats suspected to be the natural reservoir. Human infection is thought to occur through close contact with the blood or secretions of infected wildlife, such as bats or non-human primates, and it subsequently spreads from person to person through direct contact with the blood, secretions, organs, or other bodily fluids of infected individuals or contaminated surfaces or items. Transmission is particularly amplified in health-care settings when infection prevention and control (IPC) measures are inadequate, and during unsafe burial practices involving direct contact with the deceased.</p><p>The incubation period for BVD ranges from two to 21 days, and individuals are not infectious until symptom onset. Early symptoms such as fever, fatigue, muscle pain, headache, and sore throat,
    are non-specific, which complicates clinical diagnosis and can delay detection. These symptoms then progress to gastrointestinal symptoms, organ dysfunction, and in some cases haemorrhagic manifestations. CFRs in the past two BVD outbreaks, reported in Uganda and in the Democratic Republic of the Congo in 2007 and 2012 were 30% and 50%, respectively.</p><p>Differentiating BVD from other endemic febrile illnesses such as malaria is challenging without laboratory confirmation using PCR or antigen/antibody-based assays. Outbreak control relies on rapid case identification, isolation and care, contact tracing, safe burials, and strong community engagement, as no approved vaccines or specific treatments currently exist for BVD.</p>
  Advice: '<p>WHO advises against any restriction of travel to, or trade with, the Democratic Republic of the Congo or Uganda based on the currently available information. WHO continues to closely monitor and, where necessary, verify travel and trade measures in relation to this event.</p><p>For further information on the considerations for implementing border health and international travel-related temporary recommendations, please see the relevant <a href="https://iris.who.int/items/b07def43-df30-41b8-83e0-deb33bcfd697">technical note issued on 26 May 2026</a>.</p><p>The <a href="https://www.who.int/news/item/22-05-2026-first-meeting-of-the-ihr-emergency-committee-regarding-the-epidemic-of-ebola-bundibugyo-virus-disease-in-the-democratic-republic-of-the-congo-and-uganda-2026-temporary-recommendations">Temporary Recommendations</a> issued to State Parties on 22 May 2026 underscore the importance of coordinated outbreak control, enhanced cross‑border collaboration, and sustained surveillance
    and preparedness to prevent further regional spread and ensure an effective public health response. </p><p>WHO has convened several technical advisory groups, including the Strategic Advisory Group of Experts on Immunization (SAGE) to assess candidate vaccines and therapeutics for BVD. Key recommendations made are available in the <a href="https://www.who.int/news/item/28-05-2026-experts-convened-by-who-advise-on-candidate-treatments-and-vaccines-for-ebola-disease-caused-by-bundibugyo-virus">news release published on 28 May 2026.</a> </p><p><strong>Regular Information products on the outbreak of BVD in the Democratic Republic of the Congo and Uganda</strong></p><ul><li><strong>Daily update: </strong><a href="https://www.who.int/emergencies/alert-and-response">Epidemiological update on BVD outbreak in Democratic Republic of the Congo and Uganda</a></li><li><strong>Published every Tuesday:</strong> <a href="https://www.afro.who.int/health-topics/ebola-disease/outbreak-drc-26">Weekly External
    Situation Report on Ebola Bundibugyo Virus Disease Outbreak, Democratic Republic of the Congo | Uganda</a></li><li><strong>Published every Thursday:</strong><a href="https://www.who.int/emergencies/disease-outbreak-news"><strong></strong>Disease Outbreak News | All Hazards Public Health Events, Ebola disease caused by Bundibugyo virus, Democratic Republic of the Congo</a><strong></strong></li></ul>'
  Assessment: <p>On 6 June 2026, WHO reassessed the risk of the outbreak of BVD to incorporate newly available information and align with the WHO <a href="https://www.who.int/news/item/22-05-2026-first-meeting-of-the-ihr-emergency-committee-regarding-the-epidemic-of-ebola-bundibugyo-virus-disease-in-the-democratic-republic-of-the-congo-and-uganda-2026-temporary-recommendations">Temporary Recommendations</a>. The risk for countries sharing land borders with countries with documented Bundibugyo virus (BVDV) detection, currently the Democratic Republic of the Congo and Uganda, has been separated out from the risk for other countries in the African Region.</p><p>The risk in the Democratic Republic of the Congo remains assessed as very high due to ongoing transmission and the continued expansion of the outbreak into new health zones, increasing the potential for further national and regional spread.</p><p>The risk in Uganda is still assessed as high due to confirmed cross-border spread through
    imported cases and ongoing epidemiological links along the eastern Democratic Republic of the Congo&ndash;western Uganda corridor, historically affected by Ebola outbreaks, including Bundibugyo and Sudan virus disease outbreaks. </p><p>The risk for countries with land borders adjoining countries with documented BDBV detection is assessed as high due to sustained population mobility linked to cross-border trade and mining activities, variation in capacities and experience of BVD response, and variable levels of readiness. </p><p>The risk for the rest of the Africa region and at the global level is assessed as low.</p><p>For further information, please see the&nbsp;<a href="https://www.who.int/publications/m/item/who-rapid-risk-assessment-ebola-disease-caused-by-bundibugyo-virus--democratic-republic-of-the-congo--uganda-and-countries-with-land-borders-adjoining-countries-with-documented-bdbv-detection-v3">WHO Rapid Risk Assessment &ndash; Ebola disease caused by Bundibugyo virus, Democratic
    Republic of the Congo, Uganda and countries with land borders adjoining countries with documented BDBV detection v3</a>.</p>
  Overview: '<p>Since the last <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON607">Disease Outbreak News</a> was published on 13 June 2026, the number of confirmed cases and deaths have increased rapidly in the Democratic Republic of the Congo. In total, 915 confirmed cases; 896 from the Democratic Republic of the Congo and 19 from Uganda; and 234 deaths including two from Uganda, have been reported. &nbsp;At least 88 patients have recovered from the disease; 78 patients from the Democratic Republic of the Congo and 10 patients from Uganda.&nbsp;</p><p><strong>Figure 1. Distribution of confirmed cases of Bundibugyo virus disease in the Democratic Republic of the Congo, as of 17 June; and Uganda, as of 18 June</strong> <img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/geographic-distribution-of-confirmed-cases-in-drc-and-uganda.jpg?sfvrsn=468900bf_3" height="623" style="max-width:100%;height:auto;"
    title="Geographic distribution of confirmed cases in DRC and Uganda" width="986" alt="Geographic distribution of confirmed cases in DRC and Uganda" sf-size="125304" /></p><p><strong>Democratic Republic of the Congo </strong></p><p>Since 13 June when the last Disease Outbreak News was published, an additional 220 confirmed cases, including 96 confirmed deaths, have been reported from the Democratic Republic of the Congo. The increase is in part due to the scale up of testing and diagnostic capacities, enabling testing of the backlog of previously collected samples. As of 17 June 2026, a total of 896 confirmed cases including 232 deaths (case fatality ratio [CFR] 26%) have been reported from the Democratic Republic of Congo. The reported CFR is likely an underestimation, as many deaths that occurred before the outbreak declaration remain under investigation. So far, 78 patients have recovered. Cases have been reported from 33 health zones (HZ) from Ituri (21/36 HZ), North Kivu (11/35 HZ)
    and South Kivu provinces (1/34 HZ)[1]. </p><p>The outbreak remains concentrated in Ituri Province, which accounts for 91.1% (817) of the confirmed cases with a CFR of 22.7% (186/817). The highest number of confirmed cases in Ituri Province are reported from Bunia (247 cases), Rwampara (195 cases), Mongbwalu (189 cases), and Nyankunde (68 cases) health zones. So far, the epicentre of the outbreak remains Ituri, with new confirmed cases reported from an additional four health zones as of 17 June. However, the identification of cases in some of these newly reporting health zones may reflect previously undetected transmission rather than recent introduction of the virus. Epidemiological investigations indicate that transmission had likely been occurring in some of these areas for several weeks before the first cases were confirmed and reported. Of the total confirmed cases, 17 are awaiting distribution by health zone.</p><p>As of 17 June, 6367 contacts have been identified and are under
    follow-up across Ituri (4659), North Kivu (1628), and South Kivu (80) provinces. Of these, 4525 contacts have been followed up, corresponding to follow-up rates of 70.8% in Ituri, 70.5% in North Kivu, and 100% in South Kivu.</p><p>The outbreak is unfolding in a complex humanitarian and conflict-affected environment, characterized by highly mobile and often displaced populations, often lacking access to basic services, including food, clean water, shelter, healthcare and protection which poses an increased risk to the populations living in overcrowded internally displaced camps. These dynamics, combined with increasing security-related incidents affecting health facilities, have posed additional operational challenges in affected provinces, such as constrained access for response teams, disrupted surveillance and response activities, and heightened risk of undetected transmission. These conditions underscore the need for response efforts to be led by local leaders and anchored in communities.
    </p><p><strong>Figure 2: Number of confirmed cases (n = 896), in the Democratic Republic of the Congo, by date of reporting as of 17 June 2026&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/confirmed-cases-in-drc.jpg?sfvrsn=16e66a22_3" height="598" style="max-width:100%;height:auto;" title="Confirmed cases in DRC" width="1046" alt="Confirmed cases in DRC" sf-size="84982" /></p><p><strong>Figure 3: Number of deaths among confirmed cases (n = 232), in the Democratic Republic of the Congo, by date of reporting as of 17 June 2026</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/number-of-deaths-in-drc.jpg?sfvrsn=3b28172c_3" height="597" style="max-width:100%;height:auto;" title="Number of deaths in DRC" width="1044" alt="Number of deaths in DRC" sf-size="77574" /></p><div><div id="ftn1"><p><em>NB: Newly reported confirmed
    cases/deaths may be part of the backlog of samples and therefore not necessarily newly acquired infections.&nbsp;</em></p><p><strong>Uganda</strong></p><p>The last confirmed case was reportedly identified on 5 June 2026. &nbsp;As of 18 June 2026, a cumulative of 19 confirmed cases including two deaths in imported cases (reported on 15 May and 5 June), and one probable case who has died, have been reported. Of the confirmed cases, 14 cases are imported and five are secondary transmission among contacts and health workers following cases imported from the Democratic Republic of the Congo. The cases have been reported from two districts, Kampala and Wakiso, both part of the Kampala Metropolitan Area. To date, there has been no documented community transmission in Uganda. Exposure risks are associated with healthcare settings and cross-border movements. Following case reclassification, the number of affected healthcare workers was revised from five to four. In total 10 recoveries have been
    reported to date.</p><p>Of the 826 contacts listed as of 18 June, a total of 122 contacts are under active follow up and 694 contacts have completed their 21-day follow-up period. </p><p><strong>Figure 4: Number of confirmed cases (n = 19), in Uganda by date of reporting as of 18 June 2026&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/confirmed-cases-in-uganda.jpg?sfvrsn=92e54829_3" height="601" style="max-width:100%;height:auto;" title="Confirmed cases in Uganda" width="1045" alt="Confirmed cases in Uganda" sf-size="67785" /><br /></p></div></div>'
