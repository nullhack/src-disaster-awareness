  Response: '<p><strong>Health authorities in DRC are implementing public health measures, including but not limited to the following:</strong> <br /></p><p><strong>Coordination</strong></p><ul><li>Rapid response teams have been deployed to Rwampara and Mongbwalu HZ.</li><li>Provincial coordination and<strong> </strong>emergency meetings by le centre d&rsquo;operation des urgences en sante publique (COUSP) have been held.</li></ul><p><strong>Surveillance and Laboratory</strong></p><ul><li>Surveillance for suspected and probable cases is ongoing (including at relevant Points of Entry and borders).</li><li>Operational case definitions have been elaborated in Ituri.</li><li>Sequencing confirmed Bundibugyo virus in positive RT-PCR samples. </li></ul><p><strong>Risk Communication and Community Engagement (RCCE)</strong></p><ul><li>Social mobilization meeting was held with community leaders in the Rural commune of Mongbwalu under the leadership of the Mayor.</li></ul><p><strong>Infection Prevention
    and Control (IPC)</strong></p><ul><li>IPC assessment in key health facilities is ongoing: Bunia Hospital Centre of the Evangelical Medical Centre (CME), Mongbwalu General Referral Hospital and Abelkozo Health Centre. </li><li>CME Bunia is maintaining isolation protocols. Healthcare workers have been briefed on the specific diagnostic profile of this strain.</li></ul><p><strong>Logistics</strong></p><ul><li>Logistical support has been provided for investigations in Mongbwalu and Rwampara Health Zones.</li><li>Support has been provided for the transportation of samples to INRB Kinshasa.<br /></li></ul><p><strong>Health authorities in Uganda are implementing public health measures, including but not limited to the following:</strong> </p><ul><li>Activating national and district-level emergency measures, including enhanced surveillance, screening at borders, deployment of rapid response teams, isolation of a high-risk contact, and quarantine of all identified contacts. </li><li>Strengthening
    of preparedness activities such as mobile laboratory deployment, infection prevention, and risk communication.</li><li>Rapid response readiness teams have been deployed at all official and informal points of entry along the western border, major transit routes, and pilgrimage corridors.</li><li>Advising health workers to remain vigilant and adhere strictly to infection prevention measures. <br /></li></ul><p><strong>WHO is supporting the national authorities, including through:</strong></p><ul><li>Deployment of technical expertise and rapid response teams to support response efforts.</li><li>Deployment of IPC, clinical management and sample collection kits.</li><li>Identification of isolation facilities for case management in Bunia, Rwampara, and Mongbwalu HZ .</li><li>Dissemination of WHO case management protocol. </li><li>In-depth investigations and listing of contacts of suspected/probable cases.</li><li>Strengthening epidemiological surveillance, IPC and RCCE at all points of entry.</li><li>Strengthening
    Point of Entry (PoE) screening and cross border coordination, including mass gatherings. </li><li>Supporting the Ministry of Health in implementation of the Response Plan and WHO internal Response Plan.</li><li>Following up with the IHR National Focal Points (IHR NFP) in DRC and Uganda on the official IHR notification while concurrently managing communication across the IHR NFP network to ensure timely coordination.</li><li>Coordinating the delivery of key supplies. </li><li>Engaging experts on research and development priorities.&nbsp;</li></ul>'
