  Response: <p>Several public health measures have been implemented by local authorities, including:</p><ul><li>On 30 January 2026, the Ministry of Health and Family Welfare (MoHFW), in collaboration with relevant sectors, initiated an outbreak investigation using a coordinated One Health approach.</li><li>Active contact tracing was implemented to identify and monitor exposed individuals.</li><li>Preparations were undertaken to conduct an advocacy meeting involving Civil Surgeons, Upazila Health Officers, Hospital Directors, and Superintendents from Nipah-endemic districts.</li><li>Community awareness programmes are being planned with the involvement of field-level health workers.</li><li>Audio-visual health education materials on NiV infection are being developed for point-of-entry staff and travellers.</li></ul><p>The support provided by WHO&nbsp;includes:&nbsp;</p><ul><li>WHO is monitoring the situation closely, in coordination with the national and sub-national health authorities. </li><li>WHO
    facilitated IHR event communication to notify the case.&nbsp;&nbsp;</li></ul>
