  Epidemiology: <p>NiV&nbsp;infection is a zoonotic disease transmitted to humans through infected animals (such as bats), or food contaminated with saliva, urine, and excreta of infected animals. It can also be transmitted directly from person to person through close contact with an infected person. Fruit bats, also known as flying foxes, (<em>Pteropus</em>&nbsp;species) are the natural hosts for the virus.&nbsp;</p><p>The incubation period ranges from&nbsp;3&nbsp;to&nbsp;14 days.&nbsp;In some rare&nbsp;cases,&nbsp;incubation of up to&nbsp;45 days&nbsp;has been reported.&nbsp;Laboratory diagnosis of a patient with a clinical history of&nbsp;NiV&nbsp;infection can be made during the acute and convalescent phases of the disease by using a combination of tests. The main tests used are RT-PCR from bodily fluids and antibody detection via ELISA.&nbsp;</p><p>Human infections range from asymptomatic infection to acute respiratory infection (mild, severe), and fatal encephalitis (brain swelling).&nbsp;</p><p>Infected
    people initially develop symptoms including fever, headaches, myalgia (muscle pain),&nbsp;vomiting&nbsp;and sore throat. This can be followed by dizziness, drowsiness, altered consciousness, and neurological signs that&nbsp;indicate&nbsp;acute encephalitis. Some people can experience atypical pneumonia and severe respiratory problems, including acute respiratory distress. Encephalitis and seizures occur in severe cases, progressing to coma within 24 to&nbsp;48 hours.&nbsp;</p><p>Further information about&nbsp;NiV&nbsp;infection can be found <a href="https://www.who.int/news-room/fact-sheets/detail/nipah-virus" target="_blank">here</a>.&nbsp;</p><p>The&nbsp;CFR&nbsp;in previous outbreaks across Bangladesh, India, Malaysia, Philippines and Singapore ranged from 40% to 75%, depending on local capabilities for early detection and clinical management. There are currently no&nbsp;licensed&nbsp;medicines&nbsp;or vaccines specific for&nbsp;NiV&nbsp;infection. Early intensive supportive care
    is recommended to treat severe respiratory and neurologic complications.&nbsp;<em>Henipavirus&nbsp;nipahense</em>&nbsp;(or Nipah virus) is considered a priority pathogen for the acceleration of medical countermeasures to respond to epidemics and pandemics as part of the WHO R&amp;D Blueprint for Epidemics.<br /></p>
