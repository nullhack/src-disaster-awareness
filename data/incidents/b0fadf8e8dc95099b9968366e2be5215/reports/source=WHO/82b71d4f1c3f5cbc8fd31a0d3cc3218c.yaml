  Advice: <p>In the absence of a licensed vaccine or specific therapeutic treatment for Nipah virus disease,&nbsp;reducing&nbsp;or preventing&nbsp;infection in people&nbsp;relies&nbsp;on raising&nbsp;awareness of the risk factors. This includes providing guidance on&nbsp;and reinforcing risk communication messages about the&nbsp;measures that people can take to reduce exposure to the Nipah virus. Case management should focus on delivering&nbsp;timely&nbsp;supportive care, supported by an effective laboratory system&nbsp;and adequate infection prevention and control measures in health facilities. Intensive supportive care is recommended for&nbsp;treatment&nbsp;of severe respiratory and neurologic complications.&nbsp;&nbsp;<br /></p><p>Public health educational messages should focus on:&nbsp;<br /><strong></strong></p><p><strong>Reducing the risk of bat-to-human transmission&nbsp;</strong></p><ul><li>Efforts to prevent transmission should first focus on decreasing bat access to date palm sap
    and other fresh food products. Freshly collected date palm juice should be boiled, and fruits should be thoroughly washed and peeled before consumption. Fruits with signs of bat bites should be discarded. Areas where bats are known to roost should be avoided.</li></ul><p><strong>Reducing the risk of human-to-human transmission</strong></p><ul><li>Close unprotected physical contact with&nbsp;NiV-infected people should be avoided. Regular hand washing&nbsp;should be carried out after caring for or visiting sick people&nbsp;along&nbsp;other&nbsp;preventive measures.&nbsp;</li><li>People experiencing Nipah-like symptoms should be referred to a health facility, as early supportive care is key in the absence of treatment.&nbsp;Contact tracing and monitoring&nbsp;are&nbsp;also key to mitigate human-to-human&nbsp;transmission.&nbsp;&nbsp;<br /></li></ul><p><strong>Controlling infection in health care settings&nbsp;</strong></p><ul><li>Health and care workers caring for patients with suspected
    or confirmed infection, or handling specimens from them, should&nbsp;always&nbsp;implement standard precautions for infection prevention and control&nbsp;at all times, for all patients.&nbsp;</li><li>When caring for patients with suspected or confirmed&nbsp;NiV, WHO&nbsp;advises&nbsp;the use of contact and droplet precautions including a well-fitting medical mask, eye protection, a fluid-resistant gown, and examination gloves.&nbsp;Airborne&nbsp;precautions should be implemented during aerosol-generating procedures, including placing the patient in an airborne-infection isolation room and the use of a fit-tested filtering facepiece respirator instead of a medical mask. Suspected or confirmed cases of&nbsp;NiV&nbsp;should be placed in a single-patient room.&nbsp;&nbsp;&nbsp;For family members and caregivers visiting patients with suspected or confirmed Nipah virus, similar precautions should be applied.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</li><li>Samples taken from people and animals with suspected&nbsp;NiV&nbsp;infection
    should be handled by trained staff working in suitably equipped laboratories.&nbsp;<br /></li></ul><p>Based on the currently available information, WHO does not recommend any travel and/or trade restrictions.</p>
  Assessment: '<p>Nipah virus is a&nbsp;zoonotic&nbsp;pathogen with a high death rate and no licensed vaccine or treatment, though early supportive treatment can save lives. Its reservoirs are fruit bats or flying foxes (bats of the <em>Pteropus</em> genus), which are distributed in the coastal regions and on several islands in the Indian ocean, India, south-east&nbsp;Asia&nbsp;and Oceania. The virus can be transmitted to humans from wild and domestic animals. Secondary human-to-human transmissions are also possible.&nbsp;Cases of Nipah virus infection were first reported in 1998 and since then have been reported in Bangladesh, India, Malaysia,&nbsp;Philippines&nbsp;and Singapore.&nbsp;The&nbsp;virus is present&nbsp;in&nbsp;Bangladesh, while&nbsp;NiV&nbsp;cases are reported throughout the year,&nbsp;outbreaks&nbsp;tend to occur&nbsp;between December and April corresponding with the harvesting and consumption of date palm sap. Clusters of cases are&nbsp;mainly reported&nbsp;in the country&rsquo;s
    central and northwest districts.&nbsp;</p><p>To date, since 2001 Bangladesh has documented 348 NiV disease cases, including 250 deaths, corresponding to an overall case fatality rate of 72%. Nearly half of these cases (n=162) were primary cases with a confirmed history of consuming raw date palm sap or tari (fermented date palm sap), while 29% resulted from direct person-to-person transmission. Most cases detected in Bangladesh were reported through December to April, suggesting a seasonal pattern. &nbsp;Based on the current available information,&nbsp;WHO assesses the overall public health risk posed by NiV at the national level to be low due to the following reasons: <br /></p><ul><li>The case fatality rate from&nbsp;NiV&nbsp;infection is high. There are currently no specific drugs or vaccines available for&nbsp;NiV&nbsp;infection, although WHO has identified Nipah as a priority disease for research under WHO Research and Development Blueprint. Intensive supportive care is recommended
    for&nbsp;the treatment&nbsp;of severe respiratory and neurologic complications.&nbsp;</li><li>The&nbsp;initial&nbsp;signs and symptoms of&nbsp;NiV&nbsp;infection are non-specific, and the diagnosis is often not suspected at the time of presentation. This can delay&nbsp;timely&nbsp;diagnosis and create challenges in outbreak detection, effective and&nbsp;timely&nbsp;infection control measures, and outbreak response activities.&nbsp;</li><li>Fruit bats (<em>Pteropus spp</em>.), as a natural reservoir of the Nipah virus, are present in Bangladesh and repeated spillover of the virus from its reservoir to the human population has been&nbsp;demonstrated.&nbsp;</li><li>Despite ongoing efforts at&nbsp;risk&nbsp;communication and community engagement to address awareness, there is continued consumption of raw date palm sap by the community.&nbsp;</li><li>However,&nbsp;the yearly number of&nbsp;NiV&nbsp;cases reported in Bangladesh&nbsp;remains&nbsp;under 10 since 2016, with exception in 2023
    when 14 cases were reported. Although human-to-human transmission has been reported in&nbsp;previous&nbsp;outbreaks, it has been less frequent in recent years.&nbsp;</li><li>In addition, strong public health measures are in place to detect and control outbreaks, including a hospital-based systematic human&nbsp;NiV&nbsp;infection surveillance system which has been established since 2006, the utilization of the National Rapid Response Team (NRRT) at the central level and the Rapid Response Team (RRT) at the district level and the capacity to rapidly test samples.&nbsp;</li></ul><p>Bangladesh borders India and Myanmar, and WHO assesses the risk at the regional level to be&nbsp;low. While there have not been any instances of cross-border transmission by humans previously, the risk&nbsp;remains,&nbsp;given shared ecological corridor for the virus''s natural host&nbsp;<em>Pteropus</em>&nbsp;bats in Bangladesh and India. However, Bangladesh has strong capacities and experience of controlling&nbsp;previous&nbsp;NiV&nbsp;outbreaks.&nbsp;</p><p>WHO
    assesses the risk at the global level to be low, as there have been no&nbsp;previous&nbsp;confirmed cases outside Bangladesh, India, Malaysia, Philippines and Singapore.&nbsp;</p>'
  Overview: '<p>On 3 February 2026, the Bangladesh IHR NFP notified WHO of one confirmed case of NiV infection that occurred in Rajshahi Division, northwestern Bangladesh. The case was confirmed by Polymerase Chain Reaction (PCR) and Enzyme-Linked Immunosorbent Assay (ELISA) testing on 29 January 2026.</p><p>The patient is female, aged between 40-50 years, residing in Naogaon District, Rajshahi Division. She developed symptoms consistent with NiV infection on 21 January, including fever, headache, muscle cramps, loss of appetite (anorexia), weakness, and vomiting, followed by hypersalivation, disorientation, and convulsion. On 27 January, she became unconscious and was referred by a local physician to a tertiary hospital. She was admitted on 28 January, and the Nipah surveillance team collected throat swabs and blood samples. The patient died the same day.</p><p>The patient reported repeated consumption of raw date palm sap between 5 and 20 January 2026. Following the confirmed diagnosis,
    an outbreak investigation team, including One Health stakeholders, started investigations on 30 January.</p><p>A total of 35 contact persons has been identified, including three household contact persons 14 community contact persons and 18 hospital contact persons. Samples were collected from six symptomatic contact persons, including three from household, two from communities and one from hospital. All six samples tested negative for NiV infection by PCR and anti-Nipah IgM antibody detection by ELISA. As of 3 February, no additional cases have been identified. Contact persons are under monitoring. </p><p>Bangladesh reported its first case of NiV infection in 2001. Since then, human infections have been reported almost every year. In 2025, four laboratory-confirmed fatal cases were reported from Bangladesh.</p>        '
