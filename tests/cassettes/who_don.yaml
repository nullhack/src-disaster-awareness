        officially declares the 17<sup>th</sup> Ebola      Disease outbreak. <a href=\"https://administration.sante.gouv.cd/wp-content/uploads/2026/05/Declaration-de-la-17e-Epidemie-de-la-maladie-a-virus-Ebola-dans-les-zones-de-sante-de-Rwampara-Mongwalu-et-Bunia-dans-la-province-dIturi.pdf\">https://administration.sante.gouv.cd/wp-content/uploads/2026/05/Declaration-de-la-17e-Epidemie-de-la-maladie-a-virus-Ebola-dans-les-zones-de-sante-de-Rwampara-Mongwalu-et-Bunia-dans-la-province-dIturi.pdf</a>
