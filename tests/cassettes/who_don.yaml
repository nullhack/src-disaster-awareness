        &nbsp;</li></ul><p>Citable reference: World Health Organization (14 February
        2026). Disease Outbreak News;&nbsp; Mpox: recombinant virus with genomic elements
        of clades Ib and IIb &ndash; Global. Available at:&nbsp; <a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON595\">https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON595</a>
        </p>","Summary":"Recombination of monkeypox virus (MPXV) strains has been
        documented in recent months, with two cases of a recombinant strain comprising
        clade Ib and IIb MPXV reported.   Recombination is a known natural process
        that can occur when two related viruses infecting the same individual exchange
        genetic material, producing a new virus.   \r\nThe first case was detected
        in the United Kingdom of Great Britain and Northern Ireland (hereafter \u201cUnited
        Kingdom\u201d), with travel history to a country in South-East Asia, and the
        second in India, with travel history to a country in the Arabian Peninsula.
        Detailed analysis of the virus genomes shows that the two individuals fell
        ill several weeks apart with the same recombinant strain, suggesting that
        there may be further cases than are currently reported.\r\n\r\nBoth cases
        had similar clinical presentation to that observed for other clades. Neither
        patient experienced severe outcomes. Contact tracing for both cases in the
        reporting countries has been completed; no secondary cases were detected.
        \r\nBased on available information, the overall WHO public health risk assessment
        for mpox remains unchanged: the risk is assessed as moderate for men who have
        sex with men with new and/or multiple partners and for sex workers or others
        with multiple casual sexual partners, and low for the general population without
        specific risk factors.","PublicationDateAndTime":"2026-02-14T19:00:00Z","TitleSuffix":"","UseOverrideTitle":false,"Title":"Mpox:
        recombinant virus with genomic elements of clades Ib and IIb \u2013 Global
        situation","Epidemiology":"<p>Mpox is an infectious disease caused by the
        MPXV, which is part of the genus&nbsp;<em>Orthopoxvirus</em>, that includes
        the variola virus, the causative agent for smallpox. There are two known clades
        of MPXV: clade I (previously called the Congo Basin clade), which includes
        subclades Ia and&nbsp;Ib; and clade II (previously called the West Africa
        clade), which includes subclades&nbsp;IIa&nbsp;and clade IIb. Subclades Ia
        and&nbsp;Ib&nbsp;were defined after the emergence of subclade&nbsp;Ib&nbsp;in
        the South Kivu province of&nbsp;the Democratic Republic of the Congo&nbsp;in
        2023, and subclade Ia encompasses all other strains of clade I that are not&nbsp;Ib.\u200b
        As reported here, there have also been two cases of the clade&nbsp;Ib/IIb&nbsp;recombinant
        strain, detected in the UK and in India.</p><p>Mpox spreads&nbsp;among humans
        through direct close physical contact with an infected person, including sexual
        contact. Transmission can also occur through indirect contact (with contaminated
        materials),&nbsp;through infectious respiratory particles in limited cases,&nbsp;and
        from mother to child&nbsp;(vertical transmission).\u200b Historically&nbsp;mpox
        was primarily&nbsp;characterized by zoonotic transmission,&nbsp;with outbreaks&nbsp;occurring&nbsp;in
        tropical rainforest regions of East, Central and West Africa, and occasional
        exportation&nbsp;of cases&nbsp;to other areas.&nbsp;In the context of zoonotic
        transmission, which continues to occur in historically endemic areas,&nbsp;MPXV&nbsp;is&nbsp;transmitted&nbsp;to
        humans&nbsp;through direct contact with infected wild animals (e.g.,&nbsp;through
        hunting, trapping, or petting), and possibly through processing and consuming
        infected wild game or their body parts and fluids.&nbsp;To date, animal-to-human
        transmission has always been documented in or linked to known endemic regions
        of Africa. All other outbreaks in Africa or in other parts of the world are
        to date presumed to be due to human-to-human transmission, until proven otherwise.
        Symptoms of mpox in humans include swollen lymph nodes, fever, and a skin
        rash and/or mucosal lesions that may initially resemble those of other illnesses
        such as chickenpox (caused by the varicella virus), or sexually transmitted
        infections such as herpes or syphilis if the rash or lesions appear in the
        genital or anal region. The ongoing &nbsp;global outbreak has shown that mpox
        can also present with few lesions, and asymptomatic infection can occur.\u200b
        The contribution of pre- and asymptomatic infection to transmission&nbsp;remains&nbsp;poorly
        understood.&nbsp;</p>","OverrideTitle":"","Advice":"<p>Based on the information
        available, WHO recommends maintaining epidemiological&nbsp;surveillance,&nbsp;laboratory&nbsp;and
        genomic sequencing&nbsp;capacity&nbsp;for mpox, case management,&nbsp;infection
        prevention and control (IPC) measures,&nbsp;vaccination&nbsp;for people at
        risk, locally relevant risk communication and community engagement,&nbsp;and&nbsp;public
        health guidance for&nbsp;mpox.&nbsp;&nbsp;&nbsp;</p><p>All recommendations
        are&nbsp;made&nbsp;in the context of ongoing&nbsp;transmission of clades Ib
        and IIb MPXV in key populations at risk in all WHO regions, including undetected
        or pre- and asymptomatic infections, as well as unreported cases. They additionally
        apply to settings where clades Ia and IIa MPXV continue to spread through
        a mix of zoonotic and human-to-human contact. There is likely to be wider
        circulation of this emerging recombinant strain of MPXV since at least September
        2025 than reflected by the two cases documented and linked to four countries
        in three WHO regions.&nbsp;<strong></strong></p><p><strong>WHO advises Member
        States to:&nbsp;</strong>&nbsp;</p><ul><li>maintain mpox surveillance and
        rapid reporting, including prompt IHR notification of any unusual events and
        imported cases in line with the WHO Standing Recommendations issued under
        the IHR (2005) and extended to August 2026;&nbsp;</li><li>continue to carry
        out genomic sequencing of all laboratory specimens from confirmed cases in
        early outbreak settings, and a representative sample of at least 10% of laboratory
        specimens from confirmed cases in settings experiencing community transmission,
        as per <a href=\"https://www.who.int/publications/i/item/B09166\">WHO guidance;</a>
        &nbsp;</li><li>carry out targeted sample characterization for specific situations
        of interest, especially for cases who report recent travel to locations with
        clade I MPXV circulation or to&nbsp;locations&nbsp;which provide opportunities
        for sex tourism,&nbsp;prioritizing sequencing&nbsp;for cases in key populations
        at risk and&nbsp;for&nbsp;imported, unusual, or severe cases, and sharing
        sequences rapidly in public databases;&nbsp;&nbsp;</li><li>ensure quality
        case management and robust IPC practices and strengthen vaccination strategies,
        including ensuring access to mpox vaccines for key populations at risk;&nbsp;&nbsp;</li><li>continue
        to&nbsp;advance&nbsp;integration of&nbsp;HIV/STI and mpox health services&nbsp;to
        ensure early HIV testing and care&nbsp;for any person with suspected or confirmed
        mpox and rapid initiation or resumption of antiretroviral therapy in&nbsp;people
        living with HIV&nbsp;as needed for any person with&nbsp;mpox;&nbsp;</li><li>strive
        to eliminate human-to-human transmission of mpox where MPXV circulation&nbsp;remains&nbsp;low
        and ensure the maintenance of capacity for prompt outbreak response;&nbsp;&nbsp;</li><li>continue
        to provide information to travelers who may be at risk.</li></ul><p>WHO recommends
        that no restrictions be applied for travel to, or trade with, the countries
        named in this report, based on the information available on the event&nbsp;reported
        here.&nbsp;&nbsp;</p>","Assessment":"<p>Mpox outbreaks must be considered
        in their local context, with meaningful involvement of affected communities,
        to ensure an in-depth understanding of the epidemiology, modes of transmission,
        risk factors for severe disease, viral reservoir and evolution, and relevance
        of strategic approaches and countermeasures for prevention and control.&nbsp;&nbsp;&nbsp;<br
        /></p> <p>Multiple strains of MPXV are circulating through interconnected
        sexual networks across many countries and settings. Co-infection with different
        strains, that could lead to emergence of recombinant virus strains, while
        rare, can be expected. The case in India was infected with the same recombinant
        Ib/IIb MPXV strain detected in the United Kingdom. Symptom onset in the case
        reported in India occurred more than two months earlier than the case in the
        United Kingdom, and the great degree of similarity between their sequences
        suggests a common evolutionary history. This information has two important
        implications: i) the origin of the recombinant strain remains unknown; and
        ii) transmission of this recombinant virus already involves at least four
        countries in three WHO regions, and is therefore likely to be more widespread
        than currently documented. </p><p>For the cases in the United Kingdom and
        India, the initial clade differentiation PCR results indicated clade Ib and
        IIb MPXV, respectively. Thus, clade differentiation PCR assays alone may not
        reliably identify recombinant MPXV strains, and genomic sequencing is likely
        to be required for their detection.&nbsp;&nbsp;&nbsp; <br /></p>  <p>Due to
        the small number of cases found to date, conclusions about transmissibility
        or clinical characterization of mpox due to recombinant strains would be premature,
        and it remains essential to maintain vigilance regarding this development.
        <br /></p> <p>In light of the limited information available on this recombinant
        MPXV strain, the overall WHO public health risk assessment for mpox remains
        unchanged: the risk is assessed as moderate for men who have sex with men
        with new and/or multiple partners and for sex workers or others with multiple
        casual sexual partners, and low for the general population without specific
        risk factors. </p><p>&nbsp;All countries should remain alert to the possibility
        of MPXV genetic recombination. The public health risk posed by any newly detected
        recombinant strain should be assessed on a case-by-case basis, considering
        available epidemiological, clinical and genomic information.</p> ","Overview":"<p>In
        December 2025, the&nbsp;United Kingdom detected the first reported case of
        a clade&nbsp;Ib/IIb&nbsp;MPXV recombinant strain.\u200b<sup>5</sup>\u200b
        After classification of this case and posting in a public database as a novel&nbsp;MPXV&nbsp;recombinant&nbsp;strain,
        a case of mpox detected in India in September&nbsp;2025 was retrospectively&nbsp;reclassified
        as a closely-related recombinant strain based on sequencing data. To date,
        these are the only&nbsp;known&nbsp;cases of this&nbsp;recombinant virus.&nbsp;&nbsp;</p><p><em><strong>Case
        detected&nbsp;in&nbsp;the United Kingdom of Great Britain and Northern Ireland</strong></em><em><strong>&nbsp;</strong></em></p><p>The
        case was identified following testing of a vesicular swab from a traveler
        who had returned from a country in the Asia Pacific region in October 2025.
        During laboratory confirmation, the virus was initially typed as clade&nbsp;Ib&nbsp;MPXV
        by qPCR.&nbsp;Subsequent&nbsp;whole genome sequencing revealed&nbsp;that the
        MPXV strain&nbsp;identified&nbsp;was distinct from other known clade&nbsp;Ib&nbsp;MPXV
        strains with phylogenetic analysis&nbsp;indicating&nbsp;that the genome had
        regions&nbsp;similar to&nbsp;both clade&nbsp;Ib&nbsp;and clade IIb MPXV reference
        sequences, suggesting that it is an inter-clade&nbsp;recombinant. To confirm
        this unusual finding, sequencing was repeated on the original extract from
        the primary sample, a fresh extract from the same primary sample, a second
        swab collected from the patient at the same time, and a cultured isolate derived
        from the&nbsp;initial&nbsp;swab. This repeat sequencing yielded identical
        viral genome sequences from the two clinical swabs and the cultured&nbsp;isolate,
        supporting the&nbsp;initial&nbsp;findings of a new&nbsp;recombinant strain,
        and showing that it can replicate and presents potential for onward transmission.
        This strain is a&nbsp;recombinant MPXV,&nbsp;containing&nbsp;genetic elements
        from both clade&nbsp;Ib&nbsp;and clade IIb MPXV. A small number of contacts
        were&nbsp;identified&nbsp;and followed up in the United Kingdom; none developed
        any clinical features of mpox. Health worker contacts had worn full personal
        protective equipment (PPE) during provision of medical care to the patient.
        The authorities of the United Kingdom continue to investigate the significance
        of this&nbsp;recombinant MPXV strain through phenotypic characterization studies.&nbsp;</p><p><em><strong>Case
        detected&nbsp;in&nbsp;India</strong></em></p><p>On 13 January 2026, the National
        IHR Focal Point (NFP) of India notified WHO of a mpox case with an inter\u2011clade
        recombinant MPXV which was, upon whole-genome sequencing, found to have genomic
        elements of clades Ib and IIb MPXV.</p><p>The recombinant virus was found
        in samples from a man with mpox who had presented for care in September 2025.
        The patient had reported recent travel from a country in the Arabian Peninsula,
        where he resides as an overseas worker.</p><p>He developed symptoms on 1 September
        2025, while still abroad. After his return to India, real\u2011time PCR confirmed
        MPXV infection on 11 September 2025. Clade differentiation PCR performed on
        15 September 2025 initially identified this virus as clade II MPXV. Initial
        genomic sequencing analysis suggested features consistent with clade IIb MPXV.
        However, following the update of the global Nextclade database on 16 December
        2025, which included the recombinant clade Ib/IIb MPXV strain reported by
        the United Kingdom, the virus from the patient in India was reclassified as
        belonging to the recombinant strain. Recombination analysis demonstrated mosaic
        patterns containing genomic regions derived from both parent clades.</p><p>Following
        the initial diagnosis, the patient was hospitalized, did not experience any
        medical complications, and fully recovered, testing negative for MPXV on 29
        September 2025. The case reported no close contacts in India, and no known
        secondary cases were identified following this introduction of the recombinant
        clade Ib/IIb MPXV in India.</p><p>Full or near\u2011full genome retrieval
        (&gt;99%) from both the sample and a sample-derived virus isolate enabled
        phylogenetic analysis showing &gt;99.9% similarity to the recombinant strain
        detected in the United Kingdom. A total of 34 recombinant tracts were observed
        in the sequence reported by India, while 28 recombinant tracts were observed
        in the sequence reported by the United Kingdom; 16 recombinant tracts were
        common to both strains.&nbsp; This case in India therefore represents the
        earliest known detection of this recombinant strain globally, having preceded
        the event reported in the United Kingdom.</p><p>Consistent with the case reported
        in the United Kingdom, clinical presentation was consistent with cases due
        to clade I or clade II MPXV (non-recombinant MPXV) infection.</p>","DonId":"2026-DON595","Provider":"dynamicProvider372"},{"Id":"d6231257-b960-4355-b365-e527415c41e3","LastModified":"2026-02-10T16:05:50Z","PublicationDate":"2026-02-06T21:43:10Z","DateCreated":"2026-02-06T21:43:10Z","IncludeInSitemap":true,"SystemSourceKey":null,"UrlName":"2026-DON594","ItemDefaultUrl":"/2026-DON594","Response":"<p>Several
        public health measures have been implemented by local authorities, including:</p><ul><li>On
        30 January 2026, the Ministry of Health and Family Welfare (MoHFW), in collaboration
        with relevant sectors, initiated an outbreak investigation using a coordinated
        One Health approach.</li><li>Active contact tracing was implemented to identify
        and monitor exposed individuals.</li><li>Preparations were undertaken to conduct
        an advocacy meeting involving Civil Surgeons, Upazila Health Officers, Hospital
        Directors, and Superintendents from Nipah-endemic districts.</li><li>Community
        awareness programmes are being planned with the involvement of field-level
        health workers.</li><li>Audio-visual health education materials on NiV infection
        are being developed for point-of-entry staff and travellers.</li></ul><p>The
        support provided by WHO&nbsp;includes:&nbsp;</p><ul><li>WHO is monitoring
        the situation closely, in coordination with the national and sub-national
        health authorities. </li><li>WHO facilitated IHR event communication to notify
        the case.&nbsp;&nbsp;</li></ul>","FurtherInformation":"<p><strong>&nbsp;</strong></p><ol><li>World
