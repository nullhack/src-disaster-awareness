        </li><li>Transmission-based precautions for the prevention and control of
        infections: aide memoire. Geneva: WHO; 2022. Available from: <a href=\"https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2\">https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2</a>&nbsp;<br
        /></li></ul><p><strong>Citable reference:&nbsp;</strong>World Health Organization
        (30 January 2026). Disease Outbreak News: Nipah virus infection in India.
        Available at:&nbsp;&nbsp;<a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON593\">https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON593</a></p><p><em><strong>Erratum:
        The Disease Outbreak News was revised on 31 January 2026. The total number
        of outbreaks reported in India and in Kerala was removed while discussions
        are ongoing with national authorities to align the number of outbreaks reported
        to WHO.</strong></em></p>","Summary":"On 26 January 2026, the National IHR
        Focal Point for India notified WHO of two laboratory\u2011confirmed cases
        of Nipah virus (NiV) infection in West Bengal State. Both are healthcare workers
        at the same private hospital in Barasat (North 24 Parganas district). NiV
        infection was confirmed at the National Institute of Virology in Pune on 13
        January. One case remains on mechanical ventilation as of 21 January, the
        other case experienced severe neurological illness but has since improved.
        \r\n\r\nAuthorities have identified and tested over 190 contacts, who all
        tested negative for NiV with support from a mobile BSL\u20113 laboratory deployed
        by the National Institute of Virology, Pune. No further cases have been detected
        to date.\r\n\r\nThis event represents the third NiV infection outbreak reported
        in West Bengal (previous outbreaks reported in Siliguri in 2001 and Nadia
        in 2007). Enhanced surveillance and infection prevention and control (IPC)
        measures are in place while investigations into the source of exposure are
        ongoing. \r\n\r\nNiV infection is a serious but rare zoonotic disease transmitted
        to humans through infected animals (such as bats), or food contaminated with
        saliva, urine, and excreta of infected animals. It can also be transmitted
        directly from person to person through close contact with an infected person.
        There are currently no licensed medicines or vaccines for NiV infection, however
        early supportive care can improve survival. \r\n\r\nWHO assesses the risk
        posed by Nipah to be moderate at the sub-national level, and low at the national,
        the regional and global levels. ","PublicationDateAndTime":"2026-01-30T19:00:00Z","TitleSuffix":"","UseOverrideTitle":false,"Title":"Nipah
        virus disease - India","Epidemiology":"<p>NiV infection is a zoonotic disease
        transmitted to humans through infected animals (such as bats), or food contaminated
        with saliva, urine, and excreta of infected animals. It can also be transmitted
        directly from person to person through close contact with an infected person.
        Fruit bats or flying foxes (<em>Pteropus</em>&nbsp;species) are the natural
        hosts for the virus.</p><p>The incubation period ranges from 3 to 14 days.
        In some rare cases incubation of up to 45 days has been reported. Laboratory
        diagnosis of a patient with a clinical history of NiV infection can be made
        during the acute and convalescent phases of the disease by using a combination
        of tests. The main tests used are RT-PCR from bodily fluids and antibody detection
        via ELISA.</p><p>Human infections range from asymptomatic infection to acute
        respiratory infection (mild, severe), and fatal encephalitis (brain swelling).</p><p>Infected
        people initially develop symptoms including fever, headaches, myalgia (muscle
        pain), vomiting and sore throat. This can be followed by dizziness, drowsiness,
        altered consciousness, and neurological signs that indicate acute encephalitis.
        Some people can also experience atypical pneumonia and severe respiratory
        problems, including acute respiratory distress. Encephalitis and seizures
        occur in severe cases, progressing to coma within 24 to 48 hours.</p><p>Further
        information about NiV infection can be found&nbsp;<a href=\"https://www.who.int/news-room/fact-sheets/detail/nipah-virus\">here</a>.</p><p>The
        case fatality ratio (CFR) in outbreaks across Bangladesh, India, Malaysia,
        and Singapore range from 40% to 75%, depending on local capabilities for early
        detection and clinical management. There are currently no licensed medicines
        or vaccines specific for NiV infection. Intensive supportive care is recommended
        to treat severe respiratory and neurologic complications. <em>Henipavirus
        nipahense </em>(Nipah virus) is considered a priority pathogen for the acceleration
        of medical countermeasures (MCMs) to respond to epidemics and pandemics as
        part of the WHO R&amp;D Blueprint for Epidemics.&nbsp;</p>","OverrideTitle":"","Advice":"<p>In
        the absence of a licensed vaccine or specific therapeutic treatment for Nipah
        virus disease, reducing or preventing infection in people relies on raising
        awareness of the risk factors. This includes providing guidance on and reinforcing
        risk communication messages about the measures that people can take to reduce
        exposure to the Nipah virus. This is also important in the context of mass
        gatherings, where attendees come from different countries and may be unfamiliar
        with disease and its mode of transmission, as well as actions they can take
        to protect themselves. and case management should focus on delivering timely
        supportive care, supported by an effective laboratory system and adequate
        infection prevention and control measures in health facilities. Intensive
        supportive care is recommended for treatment of severe respiratory and neurologic
        complications.&nbsp;<br /></p><p>Public health educational messages should
        focus on:<br /></p><p><strong>Reducing the risk of bat-to-human transmission</strong></p><ul><li>Efforts
        to prevent transmission should first focus on decreasing bat access to date
        palm sap and other fresh food products. Freshly collected date palm juice
        should be boiled, and fruits should be thoroughly washed and peeled before
        consumption. Fruits with signs of bat bites should be discarded. Areas where
        bats are known to roost should be avoided.</li></ul><p><strong>Reducing the
        risk of human-to-human transmission.</strong></p><ul><li>Close unprotected
        physical contact with NiV-infected people should be avoided. Regular hand
        washing should be carried out after caring for or visiting sick people along
        other preventive measures.</li></ul><ul><li>People experiencing Nipah-like
        symptoms should be referred to a health facility, as early supportive care
        is key in the absence of treatment. Contact tracing and monitoring are also
        key to mitigate human-to-human transmission. </li></ul><p><strong>Controlling
        infection in health care settings</strong></p><ul><li>Health and care workers
        caring for patients with suspected or confirmed infection, or handling specimens
        from them, should always implement standard precautions for infection prevention
        and control at all times, for all patients.</li><li>When caring for patients
        with suspected or confirmed NiV, WHO advises the use of contact and droplet
        precautions including a well-fitting medical mask, eye protection, a fluid-resistant
        gown, and examination gloves. Airborne precautions should be implemented during
        aerosol-generating procedures, including placing the patient in an airborne-infection
        isolation room and the use of a fit-tested filtering facepiece respirator
        instead of a medical mask. Suspected or confirmed cases of NiV should be placed
        in a single-patient room.&nbsp;&nbsp; For family members and caregivers visiting
        patients with suspected or confirmed Nipah virus, similar precautions should
        be applied.&nbsp;&nbsp;&nbsp; </li><li>Samples taken from people and animals
        with suspected NiV infection should be handled by trained staff working in
        suitably equipped laboratories.<br /></li></ul> <p>Based on the currently
        available information,&nbsp;WHO does not recommend any travel and/or trade
        restrictions.</p>","Assessment":"<p>Nipah virus (<em>Henipavirus nipahense</em>)
        is a rare zoonotic pathogen with a high CFR (40-75%) and no licensed vaccine
        or treatment. Its reservoirs are fruit bats or flying foxes (bats in the Pteropus
        genus), which are distributed in the coastal regions and on several islands
        in the Indian ocean, India, south-east Asia and Oceania. The virus can be
        transmitted to humans from wild and domestic animals, however, as the disease
        can be transmitted by domesticated animals, secondary human-to-human transmissions
        are also possible. Cases of Nipah virus infection were first reported in 1998
        and since then have been reported in Bangladesh, India, Malaysia, Philippines
        and Singapore.&nbsp;The virus is present in India, with seasonal outbreaks
        linked to bat activities and cultural practices such as the consumption of
        raw date palm sap. Seasonal outbreaks occur between December and May, coinciding
        with the harvesting of date palm sap.<br /></p><p>This event represents the
        third Nipah outbreak reported in West Bengal, while multiple Nipah outbreaks
        were also documented in Kerala since 2018. In West Bengal, previous outbreaks
        occurred in 2001 (Siliguri) and 2007 (Nadia district). Based on the current
        available information, WHO assesses the overall public health risk posed by
        NiV at the sub-national level to be moderate, taking into consideration no
        availability of specific drugs or vaccines for NiV infection and the difficulty
        of early diagnosis. Although sensitive and specific laboratory methods exist,
        the symptoms during the first phase are not specific and could potentially
        delay a timely diagnosis, outbreak detection and response. In addition, fruit
        bats (<em>Pteropus spp</em>.) are the natural reservoir of NiV, and they are
        present in India and repeated spillover of the virus from its reservoir to
        the human population has been demonstrated.<br /></p><p>Human-to-human transmission
        has been documented in previous outbreaks, mostly reported in health-care
        settings and among family and caregivers of sick people through close contact
        with bodily fluids. Implementation of adequate infection prevention and control
        measures in health care facilities is critical to mitigate health care associated
        infection. <br /></p><p>The yearly number of NiV infection cases reported
        in India has remained relatively low since 2001, except for 2001, when 66
        cases were reported and 2018 when 18 cases were reported. Over the past 5
        years, a dozen confirmed cases were reported in India, all in Kerala State.
        Strong public health measures are implemented in India to detect and control
        outbreaks, including established NiV surveillance, and the availability of
        Rapid Response Teams (RRT) at both the Central and State levels, along with
        the capacity to rapidly test samples.<br /></p><p>For neighbouring countries,
        WHO assesses the public health risk posed by NiV at the regional level to
        be low. There have been no reports of cross\u2011border transmission, and
        the current outbreak remains geographically limited. Nevertheless, the risk
        of disease occurrence persists due to the shared ecological corridor of fruit
        bats and the history of human cases previously reported in the region. India
        has demonstrated strong capacity and experience in managing past NiV outbreaks.<br
        /></p><p>WHO assesses the public health risk posed by NiV at the global level
        to be low, as there has been no confirmed spread of cases outside India.</p>","Overview":"<p>On
        26 January 2026, the India IHR NFP notified WHO of two confirmed NiV infection
        cases that occurred in West Bengal State. Preliminary laboratory testing suggested
        NiV infection, and confirmation was received from the National Institute of
        Virology, Pune on 13 January 2026.<br /></p> <p>The cases were confirmed through
        Reverse Transcription Polymerase Chain Reaction (RT-PCR) and Enzyme-Linked
        Immunosorbent Assay (ELISA) testing.<br /></p> <p>The first case is a female
        nurse and the second case is a male nurse. Both cases were between 20 &ndash;
        30 years old, from Barasat, North 24 Parganas district. Both cases developed
        symptoms typical of severe NiV infection in late December 2025 and were admitted
        to hospital in early January 2026. As of 21 January 2026, the second case
        showed clinical improvement, while the first case remained under critical
        care. <br /></p> <p>Following the two confirmed cases, Indian health authorities
        identified and tested over 190 contact persons, including health and care
        workers and community contacts. All samples from contact persons tested negative
        for NiV.<br /></p> <p>The Indian National Centre for Disease Control, announced
        on 27 January that no further confirmed cases have been detected in West Bengal
        from December 2025 to date.</p>","DonId":"2026-DON593","Provider":"dynamicProvider372"},{"Id":"555e13f3-7aa5-445b-83eb-36e2f050a55c","LastModified":"2026-01-26T17:03:04Z","PublicationDate":"2026-01-26T17:02:50Z","DateCreated":"2026-01-26T17:03:04Z","IncludeInSitemap":true,"SystemSourceKey":null,"UrlName":"2026-DON592","ItemDefaultUrl":"/2026-DON592","Response":"<p>Local
        and national health authorities in Ethiopia implemented the following public
        health measures:&nbsp;&nbsp;</p><ul><li>A National Taskforce established at
        the Ministry of Health to provide strategic guidance, make decisions and mobilize
        resources. </li><li>A costed national three-month response plan developed
        and launched by the MoH/EPHI</li><li>The MoH regularly disseminated information
        on the MVD outbreak to the public and key partners.</li><li>Public Health
        Emergency Operational Centres were activated at national and regional levels,
        with incident management structures established to coordinate the response.
        </li><li>The Ministry of Health, in collaboration with EPHI and regional health
        offices, conducted integrated surveillance and response activities, including
        at priority points of entry (PoEs) and points of control (PoCs). </li><li>Community
        surveillance, contact tracing, house-to-house visits, and medical service
        delivery were enhanced. </li><li>Two hospitals designated as treatment centres,
        with dedicated health workers deployed to manage cases. </li><li>Laboratory
        capacities were strengthened both at national level and through the deployment
        of a mobile laboratory in Jinka for timely confirmation. </li><li>Field assessments
        conducted by a rapid response team (RRT). </li><li>Risk Communication and
        Community Engagement (RCCE) teams disseminated MVD prevention messages, conducted
        community dialogues, developed activity plans for targeted community interventions,
        monitored social media to address misinformation, and assessed trusted communication
        channels to enhance public awareness and engage local networks and influencers.</li></ul><p>WHO,
        through its country office and partners, provided technical, operational and
        financial support to the government to contain this outbreak. These include:</p><ul><li>WHO
        provided policy, technical and operational support across all response pillars,
        including on PoE surveillance, laboratory, case management, IPC, safe and
        dignified burial, RCCE, logistics and cross-border coordination. </li><li>Provided
        emergency supplies including testing kits, VHF kits, treatment centre modules.
        </li><li>Deployed technical experts to provide operational support across
        all response pillars. </li><li>Provided technical support for capacity building
        and supervision on surveillance, integrated case management and IPC activities.
        </li><li>Continued providing technical and strategic support for the transition
        plan, including the integration of the MVD response into essential health
        services. <strong></strong></li><li>Supported the Regional Health Bureau (RHB)
        with community-based active case searching and mortality surveillance across
        various clusters. <strong></strong></li><li>Provided technical and programmatic
        support to the RHB for the development and implementation of the Survivors
        Program.&nbsp;<strong></strong></li></ul>","FurtherInformation":"<p><ul><li>World
        Health Organization. Ethiopia declares end of first-ever Marburg virus disease
        outbreak. Available from: <a href=\"https://www.afro.who.int/countries/ethiopia/news/ethiopia-declares-end-first-ever-marburg-virus-disease-outbreak\">https://www.afro.who.int/countries/ethiopia/news/ethiopia-declares-end-first-ever-marburg-virus-disease-outbreak</a>
        </li><li>&nbsp;World Health Organization (21 November 2025). Disease Outbreak
        News; Marburg virus disease in Ethiopia. Available at:&nbsp;<a href=\"https://www/who.int/emergencies/disease-outbreak-news/item/2025-DON585\">https://www/who.int/emergencies/disease-outbreak-news/item/2025-DON585</a>
        </li><li>An introduction to the Marburg virus vaccine consortium, MARVAC |
