        height=\"526\" style=\"max-width:100%;height:auto;\" title=\"MERS-CoV cases
        reported in the KSA and France\" width=\"1336\" alt=\"MERS-CoV cases reported
        by KSA and France\" sf-size=\"190737\" /></p>","DonId":"2025-DON591","Provider":"dynamicProvider372"},{"Id":"ab2dc9ee-d61e-4f41-999d-5b1a48151352","LastModified":"2025-12-10T19:55:04Z","PublicationDate":"2025-12-10T19:54:36Z","DateCreated":"2025-12-10T19:55:04Z","IncludeInSitemap":true,"SystemSourceKey":null,"UrlName":"2025-DON586","ItemDefaultUrl":"/2025-DON586","Response":"<p><p>WHO
        is enhancing national, regional, and global capacities for influenza preparedness
        and response, including: </p><ul><li>continuous global monitoring of influenza
        viruses and disease activity;<ul type=\"disc\"></ul></li><li data-list=\"1\"
        data-level=\"1\">issuing seasonal influenza vaccine composition      recommendations
        for both hemispheres;</li><li data-list=\"1\" data-level=\"1\">providing technical
        guidance to Member States on      vaccine selection and campaign timing;</li><li
        data-list=\"1\" data-level=\"1\">supporting countries in developing prevention
        and      control strategies;</li><ul type=\"disc\"></ul><li data-list=\"0\"
        data-level=\"1\">enhancing diagnostic capabilities and laboratory      networks;</li><li
        data-list=\"0\" data-level=\"1\">monitoring vaccine effectiveness and susceptibility      to
        approved antivirals;</li><li data-list=\"0\" data-level=\"1\">supporting disease
        surveillance and outbreak      response activities;</li><li data-list=\"0\"
        data-level=\"1\">promoting increased vaccine coverage among      high-risk
        groups;</li><li data-list=\"0\" data-level=\"1\">facilitating research and
        development of new      therapeutics and countermeasures; and</li><li data-list=\"0\"
        data-level=\"1\">enhancing risk communication for the onset of the      influenza
        season.</li></ul></p>","FurtherInformation":"<ul><li>World Health Organization.
