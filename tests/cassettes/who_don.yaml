        on Vaccine Provision: yellow fever. Available from: <a href=\"https://www.who.int/groups/icg/yellow-fever.%20Accessed%2019%20Jun%202026\">https://www.who.int/groups/icg/yellow-fever.
        Accessed 19 Jun 2026</a>.</li><li><strong>World Health Organization.</strong>
        Yellow fever outbreak toolbox [Internet]. Geneva: WHO; 2026 [cited 2026 Jun
