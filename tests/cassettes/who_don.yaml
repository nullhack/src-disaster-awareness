        id=\"ftn2\"><p><a href=\"https://worldhealthorg-my.sharepoint.com/personal/temrey_who_int/Documents/Desktop/20260504_Hanata%20virus_multicountry_CLEARED.docx#_ftnref2\"
        name=\"_ftn2\">[2]</a>&nbsp;Hantavirus infection - Annual Epidemiological
        Report for 2023.&nbsp;<a href=\"https://www.ecdc.europa.eu/en/publications-data/hantavirus-infection-annual-epidemiological-report-2023\">https://www.ecdc.europa.eu/en/publications-data/hantavirus-infection-annual-epidemiological-report-2023</a></p><p><a
        href=\"https://worldhealthorg-my.sharepoint.com/personal/temrey_who_int/Documents/Desktop/20260504_Hanata%20virus_multicountry_CLEARED.docx#_ftnref1\"
        name=\"_ftn1\">[3]</a>&nbsp;Standard precautions for the prevention and control
        of infections: aide-memoire.&nbsp;<a href=\"https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1\">https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1</a>&nbsp;</p><p>&nbsp;</p></div><p><strong>Citable
        reference:&nbsp;</strong>World Health Organization (4 May 2026). Disease Outbreak
        News. Hantavirus cluster linked to cruise ship travel- Multi-country. Available
        at:&nbsp;<a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON599\">https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON599</a></p><p><strong>Corrigendum:
        </strong>The Disease Outbreak News was updated on 5 May 2026 to include an
        additional statement to enhance clarity on infection prevention and control
        (IPC) measures.</p></div>","Summary":"On 2 May 2026, a cluster of passengers
        with severe respiratory illness aboard a cruise ship was reported to the World
        Health Organization. The ship is carrying 147 passengers and crew. As of 4
        May 2026, seven cases (two laboratory confirmed cases of hantavirus and five
        suspected cases) have been identified, including three deaths, one critically
        ill patient and three individuals reporting mild symptoms. Illness onset occurred
        between 6 and 28 April 2026 and was characterized by fever, gastrointestinal
        symptoms, rapid progression to pneumonia, acute respiratory distress syndrome
        and shock.  Further investigations are ongoing. The outbreak is being managed
        through coordinated international response, and includes in-depth investigations,
        case isolation and care, medical evacuation and laboratory investigations.
        \r\n\r\nHuman hantavirus infection is primarily acquired through contact with
        the urine, faeces, or saliva of infected rodents. It is a rare but severe
        disease that can be deadly. Although uncommon, limited human to human transmission
        has been reported in previous outbreaks of Andes virus (a specific species
        of hantavirus). \r\n\r\nWHO currently assesses the risk to the global population
        from this event as low and will continue to monitor the epidemiological situation
        and update the risk assessment. \r\n","PublicationDateAndTime":"2026-05-04T18:00:00Z","TitleSuffix":"","UseOverrideTitle":true,"Title":"Hantavirus
        cluster linked to cruise ship travel, Multi-country","Epidemiology":"","OverrideTitle":"Hantavirus
        cluster linked to cruise ship travel, Multi-country","Advice":"<p></p><p>WHO
        advises that States Parties involved in this event continue efforts in detection,
        investigation, reporting, case management, infection control, and public health
        management on board, including ship sanitation measures, in close coordination
        with the conveyance operator, to prevent and control infections caused by
        hantaviruses. <br /></p> <p>In the context of the current outbreak, passengers
        and crew members should practice frequent hand hygiene, remain vigilant of
        Hantavirus symptoms and undertake active symptom monitoring for 45 days. &nbsp;Crew
        must ensure adequate environmental cleaning (avoiding dry sweeping) and ventilation
        in the ship. Passengers and crew members experiencing symptoms should inform
        medical professionals on board and self-isolate. If respiratory symptoms are
        present to practice respiratory etiquette and wear a medical mask.<br /></p>
        <p>Vigilance among travellers, crew, including those involved in implementing
        ship sanitation measures, or other personnel returning from areas where hantavirus
        is known to be present, as well as on conveyances engaged in eco-tourism on
        a journey from and through those areas, is essential.<br /></p> <p>Early recognition
        of suspected cases, prompt isolation, and consistent adherence to recommended
        infection prevention and control measures remain essential to protect healthcare
        personnel. </p><p>Diagnosis of HPS is with serologic testing for IgM or rising
        titres of IgG antibodies using enzyme-linked immunoassay (ELISA) or with reverse
        transcriptase polymerase chain reaction (RT&ndash;PCR) to detect viral RNA.
        </p><p>In healthcare environments, standard precautions* should be applied
        for all patients, including hand hygiene, environmental cleaning and safe
        handling of blood and body fluids. In addition to standard precautions, transmission-based
        precautions should be implemented for management of suspect or confirmed cases.
        Standard precautions combined with transmission-based precautions during close
        contact are considered sufficient. For aerosol-generating procedures, airborne
        precautions should be used. <sup>[3]</sup><br /></p>  <p>When HPS is suspected,
        patients should be promptly transferred to an emergency department or intensive
        care unit for close monitoring and supportive management. </p><p>Initial management
        should include supportive care with antipyretics and analgesics as needed.
        For confirmed hantavirus, antibiotics are not routinely indicated. However,
        before a definitive diagnosis is established (and bacterial infection is a
        diagnostic possibility), or if superadded bacterial infection is suspected,
        empiric broad-spectrum antibiotics may be appropriate. Clinical management
        relies primarily on careful fluid administration, hemodynamic monitoring,
        and respiratory support. Given the rapid progression of HCPS, close monitoring
        and early transfer to ICU are critical for more severe cases. Mechanical ventilation,
        meticulous volume control, and vasopressors may be required. For severe cardiopulmonary
        insufficiency, extracorporeal mechanical oxygenation may be lifesaving. In
        severe cases of renal dysfunction, dialysis may be required.<br /></p> <p>Although
        ribavirin has shown efficacy against hantavirus haemorrhagic fever with renal
        syndrome, it has not demonstrated effectiveness for HCPS and is not licensed
        for either treatment or prophylaxis of hantavirus pulmonary syndrome. At present,
        there is no specific antiviral treatment approved for HCPS.<br /></p> <p>Public
        health awareness efforts should focus on improving early detection, ensuring
        timely treatment, and reducing exposure risks. Preventive measures should
        address occupational and ecotourism-related exposures, emphasize standard
        and transmission-based infection prevention and control practices, and include
        rodent control strategies. Most routine tourism activities carry little or
        no risk of exposure to rodents or their excreta.<br /></p> <p>The potential
        for human-to-human transmission should be considered in areas where Andes
        and potentially other South American hantaviruses are endemic. <br /></p>
        <p>Individuals engaging in outdoor activities where endemic transmission is
        known, such as visiting rural areas, camping or hiking, should take precautions
        to minimise potential exposure to infectious materials.<br /></p> <p>Risk
        communication and community engagement interventions should prioritize transparent,
        timely, and culturally appropriate communication to raise awareness of hantavirus
        transmission risks&mdash;particularly exposure to rodent excreta in endemic
        areas&mdash;and promote practical preventive behaviours such as safe food
        storage, avoiding contact with rodents, wet-cleaning methods (no dry sweeping),
        and proper ventilation. Community engagement strategies should involve local
        leaders and workers in high-risk occupations to co-develop and disseminate
        tailored messages, address misinformation, and reinforce early care seeking.</p><p>Surveillance
        for HPS should be integrated into a comprehensive national surveillance system
        and include clinical, laboratory, and environmental components. The implementation
        of integrated environmental management strategies aimed at reducing rodent
        populations is also recommended.<br /></p>  <p>*Standard precautions refer
        to a set of practices that are applied to the care of patients, regardless
        of the state of infection (suspicion or confirmation), in any place where
        health services are provided. These practices aim to protect both healthcare
        professionals and patients and include hand hygiene, use of personal protective
        equipment, respiratory hygiene and cough etiquette, safe handling of sharps
        materials, safe injection practices, use of sterile instruments and equipment
        and cleaning of hospital environments and the environment. Adapted from &ldquo;Standard
        precautions for the prevention and control of infections: aide-memoire&rdquo;-
        WHO, 2022.&nbsp; Available at <a href=\"https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1\">https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1</a>&nbsp;&nbsp;
        <br /></p> <p>WHO advises against the application of any travel or trade restrictions
        based on the current information available on this event.&nbsp;<span style=\"background-color:initial;color:#333333;font-family:''Segoe
        UI'', -apple-system, BlinkMacSystemFont, Roboto, ''Helvetica Neue'', sans-serif;font-size:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\"></span></p>","Assessment":"<p>Hantavirus
        cardiopulmonary syndrome (HCPS), also known as hantavirus pulmonary syndrome
        (HPS), is a zoonotic, viral respiratory disease caused by hantaviruses of
        the genus <em>Orthohantavirus</em>, family <em>Hantaviridae</em>, order <em>Bunyavirales</em>.
        More than 20 viral species have been identified within this genus. In the
        Americas, <em>Sin Nombre virus</em> is the predominant cause of HPS in North
        America, while <em>Orthohantavirus andesense</em> is responsible for most
        cases in South America.</p><p>Human Hantavirus infection is primarily acquired
        through contact with the urine, faeces, or saliva of infected rodents or by
        touching contaminated surfaces. Exposure typically occurs during activities
        such as cleaning buildings with rodent infestations, though it may also occur
        during routine activities in heavily infested areas. Human cases are most
        commonly reported in rural settings, such as forests, fields, and farms, where
        rodents are present, and opportunities for exposure are greater. HPS is characterized
        by headache, dizziness, chills, fever, myalgia, and gastrointestinal problems,
        such as nausea, vomiting, diarrhoea, and abdominal pain, followed by sudden
        onset of respiratory distress and hypotension. Symptoms of HPS typically occur
        from 2-4 weeks after initial exposure to the virus. However, symptoms may
        appear as early as one week and as late as eight weeks following exposure.
        </p><p>Hantavirus infections are relatively uncommon globally.&nbsp; In 2025
        (as of epidemiological week 47), in the Region of the Americas, eight countries
        reported 229 cases and 59 deaths with a CFR of 25.7%. <sup>[1] </sup>In the
        European Region, 1885 hantavirus infection reported in 2023 (0.4 per 100,000),
        marking the lowest rate observed between 2019 and 2023.<sup>[2]</sup> In East
        Asia, particularly China and the Republic of Korea, Hantavirus haemorrhagic
        fever with renal syndrome (HFRS) continues to account for many thousands of
        cases annually, although incidence has declined in recent decades.</p><p>Hantavirus
        infections are associated with a case fatality rate of &lt;1&ndash;15% in
        Asia and Europe and up to 50% in the Americas. While there are no specific
        treatment nor vaccines for hantavirus infections, early supportive care and
        immediate referral to a facility with a complete ICU can improve survival.
        </p><p>Environmental and ecological factors affecting rodent populations can
        influence disease trends seasonally. Since hantavirus reservoirs are sylvatic
        rodents, transmission can occur when people come into contact with rodent
        habitats. </p><p>Although uncommon, limited human\u2011to\u2011human transmission
        of HPS due to <em>Andes</em> virus has been reported in community settings
        involving close and prolonged contact. Secondary infections among healthcare
        workers have been previously documented in healthcare facilities, though remain
        rare.</p><p>WHO currently assesses the risk to the global population from
        this event as low and will continue to monitor the epidemiological situation
        and update the risk assessment as more information becomes available.</p>","Overview":"<p><p>On
        2 May 2026, WHO received notification from the National International Health
        Regulations (2005) (IHR) Focal Point of the United Kingdom of Great Britain
        and Northern Ireland (hereafter referred to as the United Kingdom) regarding
        a cluster of severe acute respiratory illness, including two deaths and one
        critically ill passenger, aboard a Dutch-flagged cruise ship. On 2 May 2026,
        laboratory testing conducted in South Africa confirmed hantavirus infection
        in one patient who is critically ill and in intensive care. On 3 May, one
        additional death was reported. A further three suspected cases remain on board.
        As of 4 May, a total of seven (two confirmed and five suspected) cases, including
        three deaths, have been reported.<br /></p><p>The vessel departed Ushuaia,
        Argentina, on 1 April 2026 and followed an itinerary across the South Atlantic,
        with multiple stops in remote and ecologically diverse regions, including
        mainland Antarctica, South Georgia, Nightingale Island, Tristan da Cunha,
        Saint Helena, and Ascension Island. The extent of passenger contact with local
        wildlife during the voyage, or prior to boarding in Ushuaia remains undetermined.
        The vessel carries a total of 147 individuals, including 88 passengers and
        59 crew members. Onboard passengers and crew represent 23 nationalities.&nbsp;
        As of 4 May 2026, the vessel is moored off the coast of Cabo Verde.<br /></p><p><span
        style=\"text-decoration:underline;\"><strong>Summary of cases:</strong></span><br
        /></p><p>Case 1: An adult male developed symptoms of fever, headache, and
        mild diarrhoea on 6 April 2026 while on board the ship. By 11 April, the case
        developed respiratory distress and died on board on the same day. No microbiological
        tests were performed. The body of the passenger was removed from the vessel
        to Saint Helena (a British Overseas Territory) on 24 April. <br /></p><p>Case
        2: An adult female, who was a close contact of case 1, went ashore at Saint
        Helena on 24 April 2026 with gastrointestinal symptoms. She subsequently deteriorated
        during a flight to Johannesburg, South Africa, on 25 April. She later died
        upon arrival at the emergency department on 26 April. On 4 May, the case was
        subsequently confirmed by PCR with hantavirus infection. Contact tracing for
        passengers on the flight has been initiated. <br /></p><p>Cases 1 and 2, had
        travelled in South America, including Argentina, before they boarded the cruise
        ship on 1 April 2026. <br /></p><p>Case 3: An adult male presented to the
        ship''s doctor on 24 April 2026 with febrile illness, shortness of breath
        and signs of pneumonia. On 26 April, his condition worsened. He was medically
        evacuated from Ascension to South Africa on 27 April, where he is currently
        hospitalised in an Intensive Care Unit (ICU). Laboratory testing on an extensive
        respiratory pathogen panel was negative; however, polymerase chain reaction
        (PCR) testing confirmed hantavirus infection on 2 May 2026. Serology, sequencing
        and metagenomics are ongoing.<br /></p><p>Case 4: An adult female, with presentation
        of pneumonia, died on 2 May 2026. The onset of symptoms was on 28 April, with
        fever and a general feeling of being unwell.</p>Three suspected cases have
        reported high fever and/or gastrointestinal symptoms and remain on board.
        Medical teams in Cabo Verde are evaluating the patients and collecting additional
        specimens for testing.</p>","DonId":"2026-DON599","Provider":"dynamicProvider372"},{"Id":"a0884e79-da88-4907-ae66-c73b4b4a7636","LastModified":"2026-04-23T13:14:43Z","PublicationDate":"2026-04-23T13:14:13Z","DateCreated":"2026-04-23T13:14:43Z","IncludeInSitemap":true,"SystemSourceKey":null,"UrlName":"2026-DON598","ItemDefaultUrl":"/2026-DON598","Response":"<p>A
        nationwide&nbsp;measles-rubella (MR)&nbsp;vaccination campaign was approved
        by&nbsp;the National Immunization Technical Advisory Group (NITAG)&nbsp;on
        30 March 2026, targeting children aged 6&ndash;59 months (with expanded coverage
        for 6&ndash;8 months), and started&nbsp;on&nbsp;5 April in 30 upazilas (sub-districts)
        of 18 priority districts. A&nbsp;nationwide campaign commenced on&nbsp;20
        April.&nbsp;</p><p>Vitamin A&nbsp;campaign was held throughout the country&nbsp;on
        15&nbsp;March&nbsp;2025.&nbsp;&nbsp;During this outbreak response,&nbsp;Vitamin
        A supplementation&nbsp;is&nbsp;provided&nbsp;to all suspected and confirmed
        measles cases as an essential&nbsp;component&nbsp;of standard treatment and
        case management.&nbsp;</p><p>District Rapid Response Teams (RRTs) have been&nbsp;activated,&nbsp;and
        vaccine procurement fast-tracked by the Ministry of Health.&nbsp;Other outbreak
        response actions include strengthening routine immunization to prevent further
        spread of the outbreak, enhancing hospital preparedness, ensuring availability
        of vitamin A, strengthening isolation capacity, and reinforcing infection
        prevention and control measures.&nbsp;</p><p>Strengthening nationwide surveillance
        and epidemiological analysis, is also ongoing including measures to improve
        case detection and reporting. <a name=\"_Int_QFu5Vy9H\" data-sf-ec-immutable=\"\">Trainings&nbsp;are</a>
        being conducted at health facilities to improve case detection and reporting,
        and weekly situation reports <a name=\"_Int_bZMZpTwC\" data-sf-ec-immutable=\"\">produced</a>
        to support evidence-based decision-making.&nbsp;</p><p>National and divisional
        guidelines have been issued to guide response activities, including vaccination,
        clinical management, infection prevention and control, patient care pathways,
        and procurement.&nbsp;</p>","FurtherInformation":"<ol><li>World Health Organization.
        Measles [Internet]. Geneva: World Health Organization; [cited 2026 Apr 6].
        Available from:&nbsp;<a href=\"https://www.who.int/health-topics/measles\">https://www.who.int/health-topics/measles</a>&nbsp;</li><li>World
