        2007&nbsp;<br /><a href=\"https://pubmed.ncbi.nlm.nih.gov/20380769/\" target=\"_blank\">https://pubmed.ncbi.nlm.nih.gov/20380769/</a>&nbsp;&nbsp;</li><li>Foodborne
        Transmission of Nipah Virus, Bangladesh&nbsp;<a href=\"https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3291367\"
        target=\"_blank\">https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3291367</a>&nbsp;\u202f&nbsp;&nbsp;</li><li>Nipah
        virus outbreak trends in Bangladesh during the period 2001 to 2024: a brief
        review&nbsp;<br /><a href=\"https://pmc.ncbi.nlm.nih.gov/articles/PMC11872451/\"
        target=\"_blank\">https://pmc.ncbi.nlm.nih.gov/articles/PMC11872451/</a>&nbsp;&nbsp;</li><li>Nipah
        Virus Disease: Epidemiological, Clinical, Diagnostic and Legislative Aspects
        of This Unpredictable Emerging Zoonosis&nbsp;<a href=\"https://www.mdpi.com/2076-2615/13/1/159%20-%20B66-animals-13-00159\"
        target=\"_blank\">https://www.mdpi.com/2076-2615/13/1/159 - B66-animals-13-00159</a>&nbsp;\u202f\u202f&nbsp;&nbsp;</li><li>The
        Ecology of Nipah Virus in Bangladesh: A Nexus of Land-Use Change and Opportunistic
        Feeding Behavior in Bats&nbsp;<a href=\"https://pmc.ncbi.nlm.nih.gov/articles/PMC7910977/\"
        target=\"_blank\">https://pmc.ncbi.nlm.nih.gov/articles/PMC7910977/</a>&nbsp;</li><li>World
        Health Organization (30 January&nbsp;2026). Disease Outbreak News; Nipah virus
        infection &ndash;&nbsp;India. Available at:&nbsp;<a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON593\">https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON593</a></li></ol><p><strong>Citable
        reference:&nbsp;</strong>World Health Organization (6 February 2026). Disease
        Outbreak News: Nipah virus infection in Bangladesh. Available at:&nbsp;<a
        href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON594\">https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON594</a>&nbsp;</p><div><em><strong>Erratum:&nbsp;</strong></em><span
        style=\"background-color:initial;font-size:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\"><em><strong>This
        Disease Outbreak News was revised on 10 February 2026 to clarify the rationale
        for the risk assessment on cross border transmission.</strong></em></span></div><p></p>","Summary":"On
        3 February 2026, the International Health Regulations National Focal Point
        (IHR NFP) for Bangladesh notified WHO of one confirmed case of Nipah virus
        (NiV) infection in Rajshahi Division. The patient developed fever and neurological
        symptoms on 21 January. Nipah virus infection was laboratory-confirmed on
        29 January. The patient reported no travel history but had a history of consuming
        raw date palm sap. All 35 contact-persons are being monitored and have tested
        negative for NiV and no further cases have been detected to date.\r\n\r\nBangladesh
        regularly has small NiV outbreaks, with cases reported at different times
        of the year, though outbreaks tend to occur between December and April corresponding
        with the harvesting and consumption of date palm sap.\r\n\r\nThe Ministry
        of Health and Family Welfare in Bangladesh has implemented several public
        health measures. WHO assesses the overall public health risk posed by NiV
        to be low at the national, the regional and global level. The risk of international
        disease spread is considered low. ","PublicationDateAndTime":"2026-02-06T19:00:00Z","TitleSuffix":"","UseOverrideTitle":false,"Title":"Nipah
        virus infection - Bangladesh","Epidemiology":"<p>NiV&nbsp;infection is a zoonotic
        disease transmitted to humans through infected animals (such as bats), or
        food contaminated with saliva, urine, and excreta of infected animals. It
        can also be transmitted directly from person to person through close contact
        with an infected person. Fruit bats, also known as flying foxes, (<em>Pteropus</em>&nbsp;species)
        are the natural hosts for the virus.&nbsp;</p><p>The incubation period ranges
        from&nbsp;3&nbsp;to&nbsp;14 days.&nbsp;In some rare&nbsp;cases,&nbsp;incubation
        of up to&nbsp;45 days&nbsp;has been reported.&nbsp;Laboratory diagnosis of
        a patient with a clinical history of&nbsp;NiV&nbsp;infection can be made during
        the acute and convalescent phases of the disease by using a combination of
        tests. The main tests used are RT-PCR from bodily fluids and antibody detection
        via ELISA.&nbsp;</p><p>Human infections range from asymptomatic infection
        to acute respiratory infection (mild, severe), and fatal encephalitis (brain
        swelling).&nbsp;</p><p>Infected people initially develop symptoms including
        fever, headaches, myalgia (muscle pain),&nbsp;vomiting&nbsp;and sore throat.
        This can be followed by dizziness, drowsiness, altered consciousness, and
        neurological signs that&nbsp;indicate&nbsp;acute encephalitis. Some people
        can experience atypical pneumonia and severe respiratory problems, including
        acute respiratory distress. Encephalitis and seizures occur in severe cases,
        progressing to coma within 24 to&nbsp;48 hours.&nbsp;</p><p>Further information
        about&nbsp;NiV&nbsp;infection can be found\u202f<a href=\"https://www.who.int/news-room/fact-sheets/detail/nipah-virus\"
        target=\"_blank\">here</a>.&nbsp;</p><p>The&nbsp;CFR&nbsp;in previous outbreaks
        across Bangladesh, India, Malaysia, Philippines and Singapore ranged from
        40% to 75%, depending on local capabilities for early detection and clinical
        management. There are currently no&nbsp;licensed&nbsp;medicines&nbsp;or vaccines
        specific for&nbsp;NiV&nbsp;infection. Early intensive supportive care is recommended
        to treat severe respiratory and neurologic complications.&nbsp;<em>Henipavirus&nbsp;nipahense</em>&nbsp;(or
        Nipah virus) is considered a priority pathogen for the acceleration of medical
        countermeasures to respond to epidemics and pandemics as part of the WHO R&amp;D
        Blueprint for Epidemics.<br /></p>","OverrideTitle":"","Advice":"<p>In the
        absence of a licensed vaccine or specific therapeutic treatment for Nipah
        virus disease,&nbsp;reducing&nbsp;or preventing&nbsp;infection in people&nbsp;relies&nbsp;on
        raising&nbsp;awareness of the risk factors. This includes providing guidance
        on&nbsp;and reinforcing risk communication messages about the&nbsp;measures
        that people can take to reduce exposure to the Nipah virus. Case management
        should focus on delivering&nbsp;timely&nbsp;supportive care, supported by
        an effective laboratory system&nbsp;and adequate infection prevention and
        control measures in health facilities. Intensive supportive care is recommended
        for&nbsp;treatment&nbsp;of severe respiratory and neurologic complications.&nbsp;&nbsp;<br
        /></p><p>Public health educational messages should focus on:&nbsp;<br /><strong></strong></p><p><strong>Reducing
        the risk of bat-to-human transmission&nbsp;</strong></p><ul><li>Efforts to
        prevent transmission should first focus on decreasing bat access to date palm
        sap and other fresh food products. Freshly collected date palm juice should
        be boiled, and fruits should be thoroughly washed and peeled before consumption.
        Fruits with signs of bat bites should be discarded. Areas where bats are known
        to roost should be avoided.</li></ul><p><strong>Reducing the risk of human-to-human
        transmission</strong></p><ul><li>Close unprotected physical contact with&nbsp;NiV-infected
        people should be avoided. Regular hand washing&nbsp;should be carried out
        after caring for or visiting sick people&nbsp;along&nbsp;other&nbsp;preventive
        measures.&nbsp;</li><li>People experiencing Nipah-like symptoms should be
        referred to a health facility, as early supportive care is key in the absence
        of treatment.&nbsp;Contact tracing and monitoring&nbsp;are&nbsp;also key to
        mitigate human-to-human&nbsp;transmission.&nbsp;&nbsp;<br /></li></ul><p><strong>Controlling
        infection in health care settings&nbsp;</strong></p><ul><li>Health and care
        workers caring for patients with suspected or confirmed infection, or handling
        specimens from them, should&nbsp;always&nbsp;implement standard precautions
        for infection prevention and control&nbsp;at all times, for all patients.&nbsp;</li><li>When
        caring for patients with suspected or confirmed&nbsp;NiV, WHO&nbsp;advises&nbsp;the
        use of contact and droplet precautions including a well-fitting medical mask,
        eye protection, a fluid-resistant gown, and examination gloves.&nbsp;Airborne&nbsp;precautions
        should be implemented during aerosol-generating procedures, including placing
        the patient in an airborne-infection isolation room and the use of a fit-tested
        filtering facepiece respirator instead of a medical mask. Suspected or confirmed
        cases of&nbsp;NiV&nbsp;should be placed in a single-patient room.&nbsp;&nbsp;&nbsp;For
        family members and caregivers visiting patients with suspected or confirmed
        Nipah virus, similar precautions should be applied.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</li><li>Samples
        taken from people and animals with suspected&nbsp;NiV&nbsp;infection should
        be handled by trained staff working in suitably equipped laboratories.&nbsp;<br
        /></li></ul><p>Based on the currently available information,\u202fWHO does
        not recommend any travel and/or trade restrictions.</p>","Assessment":"<p>Nipah
        virus is a&nbsp;zoonotic&nbsp;pathogen with a high death rate and no licensed
        vaccine or treatment, though early supportive treatment can save lives. Its
        reservoirs are fruit bats or flying foxes (bats of the <em>Pteropus</em> genus),
        which are distributed in the coastal regions and on several islands in the
        Indian ocean, India, south-east&nbsp;Asia&nbsp;and Oceania. The virus can
        be transmitted to humans from wild and domestic animals. Secondary human-to-human
        transmissions are also possible.&nbsp;Cases of Nipah virus infection were
        first reported in 1998 and since then have been reported in Bangladesh, India,
        Malaysia,&nbsp;Philippines&nbsp;and Singapore.&nbsp;The&nbsp;virus is present&nbsp;in&nbsp;Bangladesh,
        while&nbsp;NiV&nbsp;cases are reported throughout the year,&nbsp;outbreaks&nbsp;tend
        to occur&nbsp;between December and April corresponding with the harvesting
        and consumption of date palm sap. Clusters of cases are&nbsp;mainly reported&nbsp;in
        the country&rsquo;s central and northwest districts.&nbsp;</p><p>To date,
        since 2001 Bangladesh has documented 348 NiV disease cases, including 250
        deaths, corresponding to an overall case fatality rate of 72%. Nearly half
        of these cases (n=162) were primary cases with a confirmed history of consuming
        raw date palm sap or tari (fermented date palm sap), while 29% resulted from
        direct person-to-person transmission. Most cases detected in Bangladesh were
        reported through December to April, suggesting a seasonal pattern. &nbsp;Based
        on the current available information,&nbsp;WHO assesses the overall public
        health risk posed by NiV at the national level to be low due to the following
        reasons: <br /></p><ul><li>The case fatality rate from&nbsp;NiV&nbsp;infection
        is high. There are currently no specific drugs or vaccines available for&nbsp;NiV&nbsp;infection,
        although WHO has identified Nipah as a priority disease for research under
        WHO Research and Development Blueprint. Intensive supportive care is recommended
        for&nbsp;the treatment&nbsp;of severe respiratory and neurologic complications.&nbsp;</li><li>The&nbsp;initial&nbsp;signs
        and symptoms of&nbsp;NiV&nbsp;infection are non-specific, and the diagnosis
        is often not suspected at the time of presentation. This can delay&nbsp;timely&nbsp;diagnosis
        and create challenges in outbreak detection, effective and&nbsp;timely&nbsp;infection
        control measures, and outbreak response activities.&nbsp;</li><li>Fruit bats
        (<em>Pteropus spp</em>.), as a natural reservoir of the Nipah virus, are present
        in Bangladesh and repeated spillover of the virus from its reservoir to the
        human population has been&nbsp;demonstrated.&nbsp;</li><li>Despite ongoing
        efforts at&nbsp;risk&nbsp;communication and community engagement to address
        awareness, there is continued consumption of raw date palm sap by the community.&nbsp;</li><li>However,&nbsp;the
        yearly number of&nbsp;NiV&nbsp;cases reported in Bangladesh&nbsp;remains&nbsp;under
        10 since 2016, with exception in 2023 when 14 cases were reported. Although
        human-to-human transmission has been reported in&nbsp;previous&nbsp;outbreaks,
        it has been less frequent in recent years.&nbsp;</li><li>In addition, strong
        public health measures are in place to detect and control outbreaks, including
        a hospital-based systematic human&nbsp;NiV&nbsp;infection surveillance system
        which has been established since 2006, the utilization of the National Rapid
        Response Team (NRRT) at the central level and the Rapid Response Team (RRT)
        at the district level and the capacity to rapidly test samples.&nbsp;</li></ul><p>Bangladesh
        borders India and Myanmar, and WHO assesses the risk at the regional level
        to be&nbsp;low. While there have not been any instances of cross-border transmission
        by humans previously, the risk&nbsp;remains,&nbsp;given shared ecological
        corridor for the virus''s natural host&nbsp;<em>Pteropus</em>&nbsp;bats in
        Bangladesh and India. However, Bangladesh has strong capacities and experience
        of controlling&nbsp;previous&nbsp;NiV&nbsp;outbreaks.&nbsp;</p><p>WHO assesses
        the risk at the global level to be low, as there have been no&nbsp;previous&nbsp;confirmed
        cases outside Bangladesh, India, Malaysia, Philippines and Singapore.&nbsp;</p>","Overview":"<p>On
        3 February 2026, the Bangladesh IHR NFP notified WHO of one confirmed case
        of NiV infection that occurred in Rajshahi Division, northwestern Bangladesh.
        The case was confirmed by Polymerase Chain Reaction (PCR) and Enzyme-Linked
        Immunosorbent Assay (ELISA) testing on 29 January 2026.</p><p>The patient
        is female, aged between 40-50 years, residing in Naogaon District, Rajshahi
        Division. She developed symptoms consistent with NiV infection on 21 January,
        including fever, headache, muscle cramps, loss of appetite (anorexia), weakness,
        and vomiting, followed by hypersalivation, disorientation, and convulsion.
        On 27 January, she became unconscious and was referred by a local physician
        to a tertiary hospital. She was admitted on 28 January, and the Nipah surveillance
        team collected throat swabs and blood samples. The patient died the same day.</p><p>The
        patient reported repeated consumption of raw date palm sap between 5 and 20
        January 2026. Following the confirmed diagnosis, an outbreak investigation
        team, including One Health stakeholders, started investigations on 30 January.</p><p>A
        total of 35 contact persons has been identified, including three household
        contact persons 14 community contact persons and 18 hospital contact persons.
        Samples were collected from six symptomatic contact persons, including three
        from household, two from communities and one from hospital. All six samples
        tested negative for NiV infection by PCR and anti-Nipah IgM antibody detection
        by ELISA. As of 3 February, no additional cases have been identified. Contact
        persons are under monitoring. </p><p>Bangladesh reported its first case of
        NiV infection in 2001. Since then, human infections have been reported almost
        every year. In 2025, four laboratory-confirmed fatal cases were reported from
        Bangladesh.</p>        ","DonId":"2026-DON594","Provider":"dynamicProvider372"},{"Id":"d010ef65-ce68-4180-a614-c67d6f2fcbbb","LastModified":"2026-02-11T08:14:47Z","PublicationDate":"2026-01-30T16:32:57Z","DateCreated":"2026-01-30T16:32:57Z","IncludeInSitemap":true,"SystemSourceKey":null,"UrlName":"2026-DON593","ItemDefaultUrl":"/2026-DON593","Response":"<p>Several
        public health measures have been implemented by local authorities, including:<br
        /></p><ul><li data-list=\"1\" data-level=\"1\">The Government of India, in
        close coordination with the      Government of West Bengal, initiated prompt
        and comprehensive public      health measures in accordance with established
        protocols.</li><li data-list=\"1\" data-level=\"1\">Investigations were conducted
        in collaboration with      other sectors through a One Health coordinated
        approach.</li><li data-list=\"1\" data-level=\"1\">Contact tracing has been
        carried out around the      identified cases, with continuous follow-up.</li><li
        data-list=\"1\" data-level=\"1\">Surveillance efforts have been strengthened
        and enhanced      to ensure early case detection.</li><li data-list=\"1\"
        data-level=\"1\">Health education and awareness campaigns, including      community
        engagement and advocacy, are ongoing.</li><li data-list=\"1\" data-level=\"1\">Clinicians
        have been sensitized and alerted to NiV. Infection prevention and control
        has been strengthened at health-care settings. </li><li data-list=\"1\" data-level=\"1\">Prompt
        sample collection, transportation, and testing      were conducted at the
        reference laboratory teams.</li></ul><p>The support provided by WHO includes:</p><ul><li
        data-list=\"0\" data-level=\"1\">Providing event communication support at
        national and      international levels, including the submission of an official
        IHR      notification.</li><li data-list=\"0\" data-level=\"1\">Monitoring
        of the evolving outbreak situation,      especially during the ongoing Nipah
        season, including support for      assessment of epidemiological patterns,
        risk factors, and geographic      spread.</li></ul>","FurtherInformation":"<ul><li>World
