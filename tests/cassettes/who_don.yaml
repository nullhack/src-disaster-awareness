        /></div><p>&nbsp;</p>","Summary":"On 11 June 2026, the Kerala State Health
        Department confirmed one laboratory confirmed case of Nipah virus (NiV) infection
        in Kozhikode district, Kerala State, India. \r\nThe case is an adult male
        who developed symptoms on 30 May 2026 and was hospitalized on 10 June 2026.
        He presented with neurological manifestations and at the time of reporting
        is on ventilatory support in an intensive care unit (ICU).\r\nAs of 18 June
        2026, a total of 104 contacts had been identified and were under monitoring,
        including health and care workers, with no reported secondary cases to date.\r\nNiV
        is a zoonotic disease transmitted to humans through infected animals, or through
        consumption of fruits or fruit products, such as raw date palm juice contaminated
        with the saliva, urine, or excreta of infected bats, as well as close contact
        with infected individuals. \r\n\r\nThe current event involves a single confirmed
        case, with no secondary transmission identified to date. Public health measures
        are in place, including isolation, contact tracing, and enhanced surveillance.
        However, as the source of infection has not yet been identified and given
        the known presence of animal reservoirs, additional cases cannot be excluded.","PublicationDateAndTime":"2026-06-25T18:00:00Z","TitleSuffix":"","UseOverrideTitle":true,"Title":"Nipah
        virus disease - India","Epidemiology":"<p>NiV infection is a zoonotic disease
        transmitted to humans through infected animals (such as bats), or fruit or
        fruit products contaminated with saliva, urine, and excreta of infected bats.
        &nbsp;Fruit bats or flying foxes (<em>Pteropus</em> species) are the natural
        hosts for the virus.&nbsp; It can also be transmitted directly from person
        to person through close contact with an infected person. </p><p>The incubation
        period ranges from 3 to 14 days. In some rare cases, an incubation period
        of up to 45 days has been reported. Laboratory diagnosis of a patient with
        a clinical history of NiV infection can be made during the acute and convalescent
        phases of the disease by using a combination of tests. The main tests used
        are RT-PCR from bodily fluids and antibody detection via ELISA.&nbsp;</p><p>Human
        infections range from asymptomatic infection to acute respiratory infection
        (mild, severe), neurological symptoms, and fatal encephalitis (brain swelling).&nbsp;</p><p>Infected
        people initially develop symptoms including fever, headaches, myalgia (muscle
        pain), vomiting and sore throat. This can be followed by dizziness, drowsiness,
        altered consciousness, and neurological signs that indicate acute encephalitis
        (brain swelling). Some people can also experience atypical pneumonia and severe
        respiratory complications, including acute respiratory distress. Encephalitis
        and seizures occur in severe cases, progressing to coma within 24 to 48 hours.&nbsp;</p><p>The
        case fatality ratio (CFR) in outbreaks across Bangladesh, India, Malaysia,
        and Singapore range from 40% to 75%, depending on local capabilities for early
        detection and clinical management.&nbsp; Intensive supportive care is recommended
        to treat severe respiratory and neurologic complications.&nbsp; There are
        currently no licensed medicines or vaccines specific for NiV infection.<em>&nbsp;
        Henipavirus nipahense </em>(Nipah virus) is considered a priority pathogen
        for the accelerated development of medical countermeasures (MCMs) to respond
        to epidemics and pandemics as part of the WHO R&amp;D Blueprint for Epidemics.&nbsp;&nbsp;</p><p>Further
        information about NiV infection can be found\u202f<a href=\"https://www.who.int/news-room/fact-sheets/detail/nipah-virus\"
        target=\"_blank\">here</a>.&nbsp;</p>","OverrideTitle":"Nipah virus disease
        - India","Advice":"<p>In the absence of a licensed vaccine or specific therapeutic
        treatment for Nipah virus disease, reducing or preventing infection in people
        relies on raising awareness of the risk factors. This includes providing guidance
        on and reinforcing risk communication messages about the measures that people
        can take to reduce exposure to the Nipah virus. Patient management should
        focus on delivering timely supportive care, supported by an effective laboratory
        system and adequate infection prevention and control measures in health facilities.
        Intensive supportive care is recommended for treatment of severe respiratory
        and neurologic complications.&nbsp;&nbsp;</p><p>Public health educational
        messages should focus on:&nbsp;</p><p><strong>Reducing the risk of bat-to-human
        transmission</strong>&nbsp;</p><ul type=\"disc\"><li data-list=\"2\" data-level=\"1\">Efforts
        to prevent transmission should first focus on decreasing bat      access to
        date palm sap and other fresh food products. Freshly collected      date palm
        juice should be boiled, and fruits should be thoroughly washed      and peeled
        before consumption. Fruits with signs of bat bites should be      discarded.
        Areas where bats are known to roost should be avoided.&nbsp;</li></ul><p><strong>Reducing
        the risk of human-to-human transmission.</strong>&nbsp;</p><ul type=\"disc\"><li
        data-list=\"5\" data-level=\"1\">Close unprotected physical contact with NiV-infected
        people      should be avoided. Regular hand washing should be carried out
        after      caring for or visiting sick people along other preventive      measures.&nbsp;</li></ul><ul
        type=\"disc\"><li data-list=\"0\" data-level=\"1\">People experiencing Nipah-like
        symptoms should be referred to a      health facility, as early supportive
        care is key in the absence of      treatment. Contact tracing and monitoring
        are also key to      mitigate human-to-human transmission.&nbsp;&nbsp;</li></ul><p><strong>Controlling
        infection in health care settings</strong>&nbsp;</p><ul type=\"disc\"><li
        data-list=\"3\" data-level=\"1\">Health and care workers caring for patients
        with suspected or      confirmed infection, or handling specimens from them,      should
        always implement standard precautions for infection      prevention and control
        at all times, for all patients.&nbsp;</li></ul><ul type=\"disc\"><li data-list=\"4\"
        data-level=\"1\">When caring for      patients with suspected or confirmed
        NiV, WHO advises the      use of contact and droplet precautions including
        a well-fitting medical      mask, eye protection, a fluid-resistant gown,
        and examination      gloves. Airborne precautions should be implemented during      aerosol-generating
        procedures, including placing the patient in an      airborne-infection isolation
        room and the use of a fit-tested filtering      facepiece respirator instead
        of a medical mask. Suspected or confirmed      cases of NiV should be placed
        in a single-patient room.&nbsp;</li></ul><ul type=\"disc\"><li data-list=\"1\"
        data-level=\"1\">Samples taken      from people and animals with suspected
        NiV infection should be      handled by trained staff working in suitably
        equipped laboratories.&nbsp;</li></ul><p>Based on the currently available
        information,\u202fWHO does not recommend any travel and/or trade restrictions.&nbsp;</p>","Assessment":"<p>Nipah
        virus (NiV) (<em>Henipavirus nipahense</em>) is a rare zoonotic pathogen with
        a high case fatality rate (40&ndash;75%) and no licensed vaccine or specific
        antiviral treatment. Its natural reservoirs are fruit bats (Pteropus spp.),
        which are widely distributed across India, South and Southeast Asia, and parts
        of Oceania. Transmission to humans can occur through direct contact with infected
        animals, including bats and domestic animals, via contaminated food products
        such as raw date palm sap, or through close and prolonged contact with infected
        individuals, particularly in healthcare settings.</p><p>Since its first identification
        in 1998, NiV outbreaks have been reported in Bangladesh, India, Malaysia,
        the Philippines, and Singapore. In India, outbreaks have been recurrent but
        relatively limited in scale, with the highest numbers reported in 2001 (66
        cases) and 2018 (18 cases). Over the past five years, approximately a dozen
        confirmed cases have been reported, all in Kerala State. Kerala has experienced
        NiV events since 2018 and has established surveillance systems, laboratory
        capacity, and rapid response mechanisms, including Rapid Response Teams at
        central and state levels. Ecological conditions, including those in districts
        such as Kozhikode, support fruit bat populations, facilitating repeated spillover
        events. Seasonal patterns are observed and locally, April to September is
        recognized as a Nipah high\u2011alert period.<br /></p><p>The current event
        involves a single confirmed case with no evidence of secondary transmission
        as of 23 June 2026. The case has been isolated, and public health measures,
        including contact tracing, enhanced surveillance, and strengthened infection
        prevention and control in healthcare settings, have been rapidly implemented.
        The event appears to be geographically limited, with no evidence of international
        spread reported.<br /></p><p>However, as the source of infection has not yet
        been identified and given the presence of known animal reservoirs and ongoing
        seasonal risk, additional cases, including sporadic zoonotic spillover, cannot
        be excluded.</p><p>This event represents the second notification of NiV infection
        in India in 2026, following the earlier two epidemiologically linked cases
        reported in West Bengal state in January 2026. There is an ongoing moderate
        sub-national risk, driven by recurrent zoonotic spillover, limited clinical
        specificity during the early stages of disease, and the absence of licensed
        vaccines or specific therapeutics, with potential for transmission among close
        contacts and in healthcare settings. At the regional and global levels, the
        risk remains low, given the absence of cross-border or international spread
        and the geographically contained nature of the outbreak.</p><p>&nbsp;</p>","Overview":"<p>On
        11 June 2026, WHO was informed of a laboratory-confirmed case of Nipah virus
        infection reported in Kozhikode district, Kerala State. Initial positive results
        were obtained through PCR testing at local laboratories and were subsequently
        confirmed by RT\u2011PCR at the National Institute of Virology, Pune.</p><p>The
        case is an adult male resident of Kozhikode district. He developed symptoms
        on 30 May 2026 and was admitted to hospital on 10 June 2026. The clinical
        presentation was primarily neurological, without reported respiratory symptoms
        prior to intubation. The patient is on ventilatory support in the ICU.</p><p>Following
        confirmation of the case, extensive contact tracing was initiated. As of 18
        June 2026, a total of 104 contacts had been identified, including four very
        high-risk, 14 high-risk, and 86 low-risk contacts. Among these, 45 are health
        and care workers. All contacts are under active monitoring with regular follow-up,
        and no secondary cases have been reported to date.</p><p>This event follows
        a pattern of recurrent Nipah virus outbreaks in Kerala, including in Kozhikode
        district, since the first outbreak was reported in 2018. Additional outbreaks
        occurred in 2019, 2021, 2023, 2025, and 2026 according to the NCDC Communicable
        Disease Alert.</p>","DonId":"2026-DON609","Provider":"dynamicProvider372"},{"Id":"10a3727f-44e6-48dd-9655-1ecd02e8e6fd","LastModified":"2026-06-24T16:28:45Z","PublicationDate":"2026-06-24T15:23:22Z","DateCreated":"2026-06-24T16:28:45Z","IncludeInSitemap":true,"SystemSourceKey":null,"UrlName":"2026-DON610","ItemDefaultUrl":"/2026-DON610","Response":"<p>WHO
        is strengthening capacities for YF preparedness and response at national,
        regional, and global levels, including:</p><ul><li>continuous global surveillance
        of yellow fever and disease activity, and support for surveillance and outbreak
        response efforts;</li><li>assisting countries in developing and implementing
        prevention and control strategies;</li><li>strengthening diagnostic capacity
        and laboratory networks;</li><li>promoting increased vaccine coverage;</li><li>enhancing
        risk communication.</li></ul><p>To respond effectively to yellow fever outbreaks,
        public health measures have been implemented in the African Region and the
        Region of the Americas. The countries have implemented coordination actions
        to respond to the identified yellow fever cases and outbreaks, focusing on
        strengthening preventive measures, improving surveillance and implementing
        vaccination actions. In non-endemic WHO regions, public health actions focus
        on preparedness to prevent importation and onward transmission of yellow fever.
        Efforts prioritize traveller vaccination, early detection, and readiness,
        particularly in areas where competent vectors are present.<strong></strong></p><p><strong><span
        style=\"text-decoration:underline;\">Coordination</span></strong></p><p>The
        two Regions have implemented coordination actions to respond to the identified
        yellow fever cases and outbreaks.<strong></strong></p><p><strong>WHO&nbsp;
        African Region</strong><strong></strong></p><ul><li>Regional coordination
        mechanisms were strengthened through regular engagement with Member States,
        EYE partners, and technical networks to support preparedness and response
        activities.</li><li>Technical support was provided for outbreak verification,
        risk assessment, and case classification, including regional reviews of PRNT-positive
        cases from Burkina Faso, Cameroon, C&ocirc;te d&rsquo;Ivoire, Ghana, Nigeria,
        Uganda, and the Republic of the Congo.</li><li>Weekly updates on yellow fever
        events were shared through regional and global coordination platforms, including
        the Yellow Fever Partners Technical Forum, to facilitate information sharing
        and operational decision-making.<strong></strong></li></ul><p><strong>WHO&nbsp;
        Region of the Americas</strong></p><ul><li>Ongoing risk assessments were conducted
        to guide the regional response to the yellow fever outbreak. The response
        was managed operationally under a structure equivalent to a Level 2 emergency,
        with coordination mechanisms activated at PAHO Headquarters and in the affected
        countries. </li><li>A multidisciplinary Incident Command System (ICS) was
        established, composed of specialists from various technical units and departments.</li><li>A
        strategic regional action plan was developed, linked to the mobilization of
        financial and technical resources to support preparedness and response activities.
        </li><li>The Regional Emergency Response Team was activated and coordinated
        the deployment of specialists to the affected countries to strengthen national
        capacities in surveillance, laboratory testing, immunization, clinical management,
        vector control, and risk communication.</li><li>Regular coordination and follow-up
        mechanisms were established with Member States to monitor the epidemiological
        evolution of the outbreak, share technical information, and facilitate the
        implementation of harmonized response actions throughout the Region.<br /></li></ul><p><strong><span
        style=\"text-decoration:underline;\">Surveillance</span></strong></p><p>The
        following activities were implemented in the Regions with reported cases:
        <strong></strong></p><p><strong>African Region</strong></p><ul><li>Surveillance
        activities were strengthened through support for case detection, investigation,
        verification, and classification of suspected yellow fever cases.</li><li>Weekly
        regional monitoring and analysis of yellow fever events were conducted to
        support risk assessment and guide response activities, including the production
        and dissemination of the AFRO Yellow Fever Weekly Update.</li><li>Technical
        support was provided for epidemiological investigations and the classification
        of laboratory-confirmed and PRNT-positive cases in affected countries.<strong></strong><strong></strong></li></ul><p><strong>Region
        of the Americas</strong></p><ul><li>Issuance of regional epidemiological alerts
        and continuous monitoring of the epidemiological situation in the Americas.</li><li>Technical
        support to countries to strengthen epizootic disease surveillance in nonhuman
        primates as an early warning system.</li><li>Development of regional guidelines
        for monitoring epizootics (in progress).</li><li>Development and updating
        of regional guidelines for the epidemiological surveillance of yellow fever,
        including case definitions, outbreak definitions, and outbreak closure criteria
        (in progress). </li><li>Organization of the Regional Meeting of Experts on
        Yellow Fever (Bogot&aacute;, 2026) to review and update regional technical
        guidelines and promote consensus among experts in the Region.</li><li>Regional
        analysis of ecological corridors and areas of transmission expansion.</li><li>Development
        of public health action matrices based on epidemiological context (enzootic/non-enzootic)
        (in progress) <strong></strong></li></ul><p><strong><span style=\"text-decoration:underline;\">Laboratory</span></strong><span
        style=\"text-decoration:underline;\">&nbsp;</span></p><p>At the Regional level,
        the following actions have been carried out:&nbsp; <strong></strong></p><p><strong>African
        Region</strong></p><ul><li>WHO supported laboratory confirmation and case
        classification of yellow fever cases.</li><li>Technical support was provided
        through the regional yellow fever laboratory network to support confirmatory
        testing, interpretation of laboratory findings, and quality-assured diagnosis.</li><li>Regional
        reviews of laboratory results, including PRNT-positive findings from Burkina
        Faso, Cameroon, C&ocirc;te d&rsquo;Ivoire, Ghana, Nigeria, Uganda, and the
        Republic of the Congo, were conducted to support case classification and public
        health decision-making.<strong></strong></li></ul><p><strong>Region of the
        Americas</strong></p><p>All enzootic countries currently have molecular diagnostic
        capacity to detect the virus in both serum and tissue samples (essential for
        confirming fatal cases). In addition, support has been provided to expand
        detection in non-human primates, enhancing epizootic surveillance as an early
        warning system. Efforts are also underway to implement virus detection in
        mosquito populations, further broadening surveillance strategies. At the same
        time, collaboration with selected countries is advancing the decentralization
        of testing, ensuring access to diagnostic capacity in remote and border areas
        where timely detection is critical.<strong></strong></p><p><strong><span style=\"text-decoration:underline;\">Case
        Management</span></strong></p><p>Specific actions are taken at the regional
        level: <strong></strong><strong></strong></p><p><strong>Region of the Americas</strong></p><ul><li>Development
        and dissemination of the Regional Clinical Management Guidelines for Critical
        Patients with Suspected or Confirmed Yellow Fever (published in 2025).</li><li>Delivery
        of regional in-person training and technical assistance to strengthen early
        detection, severity assessment, patient referral, and management of severe
        cases.</li><li>Support to countries in the review and update of clinical protocols
        and in the preparedness of health services to respond to increased healthcare
        demand.</li><li>Development of a virtual course on the clinical management
        of yellow fever.</li><li>Training of countries on minimally invasive autopsy
        techniques for deaths associated with yellow fever.</li><li>Convening of expert
        consultations to define and strengthen patient care pathways and clinical
        management approaches.</li></ul><p><strong><span style=\"text-decoration:underline;\">Immunization</span></strong><strong></strong></p><p><strong>African
        Region</strong></p><p>Vaccination activities were supported through preventive
        and reactive vaccination campaigns, strengthening routine immunization, and
        provision of technical assistance for campaign planning and implementation.</p><p>In
        2025, preventive mass vaccination campaigns reached approximately 15.2 million
        people in Katanga Province, Democratic Republic of the Congo, 1.6 million
        people nationwide in Guinea-Bissau, 9.6 million people in Maradi, Agadez,
        and Tahoua regions of Niger and 4.2 million people in 13 districts of Uganda.
        By May 2026, an additional 2.4 million people had been vaccinated through
        a preventive campaign in Dosso District, Niger.</p><p>Reactive vaccination
        campaigns were conducted from January 2025 to May 2026 in response to outbreaks
        or situations with epidemic potential in Burkina Faso, Cameroon and &nbsp;C&ocirc;te
        d&rsquo;Ivoire. In 2025, these campaigns reached more than one &nbsp;million
        people in affected districts. By May 2026, additional reactive campaigns reached
        approximately 491 000 people in C&ocirc;te d&rsquo;Ivoire, 162 000 in Mali,&nbsp;
        and more than 400 000 people in Cameroon.</p><p>Technical support was provided
        to Member States through the International Coordinating Group (ICG) mechanism,
        including support for vaccine requests, deployment, monitoring, and evaluation.
        This included support for outbreak response vaccination activities in Central
        African Republic and vaccine deployment planning in Angola, Liberia, and Mali.</p><p>Routine
        immunization strengthening efforts were also implemented, including periodic
        intensification of routine immunization activities. Gabon also reached 8 156
        children in two rounds of Periodic Intensification of Routine Immunization.</p><p>Overall,
        preventive and reactive vaccination campaigns supported by WHO and partners
        reached more than 35 million people across high-risk and affected countries
        between 2025 and May 2026.<strong></strong><strong></strong></p><p><strong>Region
        of the Americas</strong></p><p>Technical support to countries has focused
        on the following lines of action: updating the regional yellow fever vaccination
        guideline, which incorporates the programmatic context for the use of fractional
        doses, the single\u2011dose schedule, recommendations for coadministration
        with measles, mumps, and rubella (MMR) first dose vaccine (MMR1), vaccination
        considerations for precaution groups, guidance for urban outbreak response,
        and parameters for safety stock management. The guideline was reviewed and
        validated by regional experts during the 2026 Yellow Fever Expert Meeting
        in Bogot&aacute;, ensuring consensus and alignment with the most recent evidence.
        </p><p>Technical meetings with countries have been conducted to strengthen
        Surveillance of Events Supposedly Attributable to Vaccination or Immunization
        (ESAVI) surveillance in the context of outbreak response and vaccination of
        precaution groups. A susceptible population estimation tool has been developed
        and made available to all countries in the Region to support planning for
        preventive and reactive vaccination campaigns. Immunization teams have also
        provided support for vaccination planning in preparedness contexts as well
        as during outbreak response operations, including microplanning for outbreak
        response campaigns.</p><p><strong><span style=\"text-decoration:underline;\">Entomological
        Surveillance and Vector Control&nbsp;</span></strong></p><p>At the regional
        level, vector surveillance and control capacities that were developed as part
        of the arbovirus response:</p><p><strong>African Region</strong></p><ul><li>WHO
        promoted the incorporation of entomological investigations into yellow fever
        outbreak investigations to better characterize transmission risks and guide
        public health interventions.</li><li>Technical guidance supported Member States
        in considering vector surveillance and vector control measures as part of
        integrated yellow fever prevention and response strategies.<strong></strong><strong></strong></li></ul><p><strong>Region
        of the Americas</strong></p><ul><li>Development, and publication of <a href=\"https://iris.paho.org/items/a28127ee-d771-41a2-bb60-bc30991d1d95\">regional
        technical guidelines for entomological surveillance and vector control for
        yellow fever (2025)</a>. <span style=\"text-decoration:underline;\"></span></li><li>Strengthening
        national capacities in entomovirology for yellow fever, including detection
        and characterization of viruses in vectors, with emphasis on personnel training
        and laboratory capacity building.</li><li>Strengthening capacities for surveillance
        of sylvatic and urban vectors of yellow fever, including training in standardized
        collection methods, taxonomic identification, and safe transport of biological
        samples, as well as risk assessment for urban transmission and technical support
        for implementing vector control measures in high-risk areas.</li></ul><p><strong><span
        style=\"text-decoration:underline;\">Risk Communication and Community Engagement</span></strong></p><p>Risk
        communication and community engagement have been enhanced.<strong></strong></p><p><strong>Region
        of the Americas</strong></p><ul><li>Development and dissemination of regional
        risk communication materials for communities, health workers, and travelers.
        </li><li>Technical support to countries in designing risk communication and
        community engagement strategies to promote vaccination, report animal disease
        outbreaks, and strengthen public confidence during outbreaks and vaccination
        campaigns. </li><li>Development of messages and guidance for managing rumors,
        misinformation, and concerns related to vaccine safety.</li><li>Development
        of the regional guide &ldquo;Risk Communication and Community Engagement for
        Yellow Fever Outbreaks in the Americas: Operational Guide for National, Subnational,
        and Community Teams&rdquo; (in progress)<strong></strong><strong></strong></li></ul>","FurtherInformation":"<ol><li><strong>World
        Health Organization.</strong> Yellow fever: fact sheet [Internet]. Geneva:
        World Health Organization; Available from: <a href=\"https://www.who.int/news-room/fact-sheets/detail/yellow-fever\">https://www.who.int/news-room/fact-sheets/detail/yellow-fever</a>
