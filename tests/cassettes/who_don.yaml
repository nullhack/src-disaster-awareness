        all circumstances under the International Health Regulations (2005): <a href=\"https://www.who.int/publications/m/item/case-definitions-for-the-four-diseases-requiring-notification-to-who-in-all-circumstances-under-the-ihr-(2005)\">https://www.who.int/publications/m/item/case-definitions-for-the-four-diseases-requiring-notification-to-who-in-all-circumstances-under-the-ihr-(2005)</a></li><li>Mosaic
        Respiratory Surveillance Framework: <a href=\"https://www.who.int/initiatives/mosaic-respiratory-surveillance-framework/\">https://www.who.int/initiatives/mosaic-respiratory-surveillance-framework/</a>
        </li><li>Practical interim guidance to reduce the risk of infection in people
        exposed to avian influenza viruses: <a href=\"https://www.who.int/publications/i/item/B09116\">https://www.who.int/publications/i/item/B09116</a>
        </li><li>Antigenic and molecular characterization of low pathogenic avian
        influenza A(H9N2) viruses in sub-Saharan Africa from 2017 through 2019: <a
        href=\"https://hal.inrae.fr/hal-03213105v1\">https://hal.inrae.fr/hal-03213105v1</a>
        </li><li>Genetic and Molecular Characterization of Avian Influenza A(H9N2)
        Viruses from Live Bird Markets (LBM) in Senegal: <a href=\"https://doi.org/10.3390/v17010073\">https://doi.org/10.3390/v17010073</a>
        </li><li>Genetic characterization of the first detected human case of low
        pathogenic avian influenza A/H9N2 in sub-Saharan Africa, Senegal: <a href=\"https://doi.org/10.1080/22221751.2020.1763858\">https://doi.org/10.1080/22221751.2020.1763858</a></li><li>ECDC.
        First human case of influenza A(H9N2) infection imported in the EU: <a href=\"https://www.ecdc.europa.eu/en/news-events/first-human-case-influenza-ah9n2-infection-imported-eu\">https://www.ecdc.europa.eu/en/news-events/first-human-case-influenza-ah9n2-infection-imported-eu</a>
        </li><li>Ministry of Health, Italy. Influenza A (H9N2) virus case identified
        in Lombardy. Routine surveillance and prevention procedures activated: <a
        href=\"https://www.salute.gov.it/new/it/comunicato-stampa/virus-influenzale-h9n2-identificato-caso-lombardia-attivate-le-ordinarie/\">https://www.salute.gov.it/new/it/comunicato-stampa/virus-influenzale-h9n2-identificato-caso-lombardia-attivate-le-ordinarie/</a></li></ul><strong>Citable
        reference:&nbsp;</strong>World Health Organization (10 April 2026). Disease
        Outbreak News: Avian Influenza A(H9N2) in Italy. Available at: <a href=\"https://www/who.int/emergencies/disease-outbreak-news/item/2026-DON597\">https://www/who.int/emergencies/disease-outbreak-news/item/2026-DON597</a><span
        style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\"></span></p>","Summary":"On
        21 March 2026, the National International Health Regulations (IHR) Focal Point
        for Italy notified the World Health Organization (WHO) of the identification
        of a human case of avian influenza A(H9) in an adult male returning from Senegal.
        Next generation sequencing confirmed Influenza A(H9N2). According to epidemiological
        investigations, the patient had no known history of exposure to poultry or
        any person with similar symptoms prior to the onset of symptoms. Authorities
        in Italy have implemented a series of measures aimed at monitoring, preventing
        and controlling the situation. According to the IHR (2005), a human infection
        caused by a novel influenza A virus subtype is an event that has the potential
        for high public health impact and must be notified to the WHO. This is the
        first imported human case of avian Influenza A(H9N2) reported in the European
        Region. Based on currently available information, WHO assesses the current
        risk to the general population posed by A(H9N2) viruses as low but continues
        to monitor these viruses and the situation globally.","PublicationDateAndTime":"2026-04-10T13:51:44Z","TitleSuffix":"","UseOverrideTitle":false,"Title":"Avian
        Influenza A(H9N2) - Italy","Epidemiology":"<p>Animal influenza viruses normally
        circulate in animals but can also infect people. Infections in humans have
        primarily been acquired through direct contact with infected animals or through
        indirect contact with contaminated environments. Depending on the original
        host, influenza A viruses can be classified as avian influenza, swine influenza,
        or other types of animal influenza viruses.<br /></p> <p>Avian influenza virus
        infections in humans may cause diseases ranging from mild upper respiratory
        tract infection to more severe diseases and can be fatal. Conjunctivitis,
        gastrointestinal symptoms, encephalitis and encephalopathy have also been
        reported.<br /></p> <p>Laboratory tests are required to diagnose human infection
        with influenza. WHO periodically updates technical guidance protocols for
        the detection of zoonotic influenza using molecular methods.&nbsp;<br /></p>
        <p>Human&nbsp;infections with influenza A(H9) viruses have been reported from
        countries in Africa and Asia, where these viruses are also detected in poultry.
        The majority of cases&nbsp;of human avian influenza A(H9N2) infection have
        been reported&nbsp;from&nbsp;China.&nbsp;This is the first&nbsp;imported&nbsp;human
        case of avian Influenza A(H9N2) virus infection reported in the&nbsp;European
        Region.&nbsp;<br /></p>","OverrideTitle":"","Advice":"<p>This case does not
        change the current WHO recommendations on public health measures and surveillance
        of influenza. </p><p>The public should avoid contact with high-risk environments
        such as live animal markets/farms or surfaces that might be contaminated by
        poultry feces. Respiratory protection is highly recommended for those handling
        live or dead (including slaughtering) poultry in occupational or backyard-farming
        settings. Good hand hygiene, i.e. frequent washing of hands or the use of
        alcohol-based hand sanitizer is recommended. WHO does not recommend any specific
        additional measures for travelers.</p><p>Under Article 6 of the IHR, all human
        infections caused by a new subtype of influenza virus are notifiable. The
        case definition for notification of human influenza infection caused by a
        new subtype under the IHR is provided <a href=\"https://cdn.who.int/media/docs/default-source/documents/emergencies/case-definitions-ihr-four-diseases7f1ee707-3d13-4581-a1af-d5f44f86423a.pdf?sfvrsn=9c68df20_1&amp;download=true\">here</a>.
        State Parties to the IHR are required to immediately notify WHO of any laboratory-confirmed
        case of a human infection caused by such an influenza A virus.</p><p>WHO advises
        against the application of any travel or trade restrictions based on the current
        information available on this event.&nbsp;</p>","Assessment":"<p>Most reported
        human cases of A(H9N2) virus infection have been linked to exposure to infected
        poultry or contaminated environments, with the majority of cases experiencing
        mild clinical illness. Sporadic human cases following exposure to infected
        birds or contaminated environments can be expected since the virus remains
        enzootic in poultry populations. Avian influenza A(H9N2) viruses have been
        detected in poultry and environmental samples collected at live bird markets
        in Senegal and authorities in the country&nbsp;<span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">reported
        a human case of infection with an A(H9N2) virus in 2020.</span></p><p><p>Current
        epidemiological and virological evidence indicates that none of the characterized
        influenza A(H9N2) viruses thus far have acquired the ability for sustained
        transmission among humans. Thus, the likelihood of sustained human-to-human
        spread is low at this time. Infected individuals traveling internationally
        from affected areas may be identified in another country during or after arrival.
        However, if this were to occur, further community-level spread is considered
        unlikely. The risk assessment would be revisited if and when further epidemiological
        and virological information becomes available.</p></p>","Overview":"<p>On
        21 March 2026, the National IHR Focal Point for Italy notified WHO of&nbsp;the
        identification of a&nbsp;human&nbsp;case of avian influenza&nbsp;A(H9) in
        an adult male.<br /></p> <p>The patient had been in Senegal for more than
        six months and traveled to Italy in mid-March. Upon arrival, he visited the
        emergency department with a fever and a persistent cough.<br /></p> <p>On
        16 March, a bronchoalveolar lavage specimen was collected, which showed a
        positive&nbsp;<em>Mycobacterium tuberculosis</em>&nbsp;result, as well as
        detection of&nbsp;un-subtypeable&nbsp;influenza&nbsp;A virus.&nbsp;The patient
        was placed in a negative-pressure isolation room with airborne precautions.
        He was treated with antitubercular medication and antiviral oseltamivir. By
        9 April, his condition was stable and improving. <br /></p> <p>On 20 March,
        a regional reference laboratory identified the A(H9) subtype, and on 21 March,
        next-generation sequencing confirmed influenza A(H9N2). Initial genetic findings
        suggest the infection was likely acquired from an avian source linked to Senegal.
        Additional samples have been sent to Italy&rsquo;s National Influenza Center,
        where further characterization confirmed virus subtype Influenza A(H9N2),
        with close genetic similarity to strains previously identified in poultry
        in Senegal. <br /></p> <p>No direct exposure to animals, wildlife or rural
        environments was identified. There was also no reported contact with symptomatic
        or confirmed human cases. Further epidemiological investigations on the source
        of exposure are ongoing.<br /></p> <p>Contacts identified in Senegal were
        asymptomatic. All identified and traced contacts in Italy have tested negative
        for influenza and completed the period of active monitoring for the onset
        of symptoms and the quarantine required by national guidelines. They also
        received oseltamivir as a preventive measure.&nbsp;</p>","DonId":"2026-DON597","Provider":"dynamicProvider372"},{"Id":"f76a3c74-7987-43d9-9072-cc1d9230a4cf","LastModified":"2026-03-13T16:05:23Z","PublicationDate":"2026-03-13T16:05:10Z","DateCreated":"2026-03-13T16:05:23Z","IncludeInSitemap":true,"SystemSourceKey":null,"UrlName":"2026-DON596","ItemDefaultUrl":"/2026-DON596","Response":"<div>WHO
        Response:&nbsp;</div><div>Since 7 January 2026, when distribution of the products
        was confirmed to extend beyond the European Union, WHO, through the INFOSAN
        Secretariat, has been contacting INFOSAN Emergency Contact Points in the countries
        and territories identified as affected to notify them of recalled products
        exported to their markets and to support information exchange and coordinated
        response. Communication within the European Union has been managed through
        the European Rapid Alert System for Food and Feed (RASFF), with close coordination
        between INFOSAN and RASFF.</div><div><br /></div><div>Response measures in
        affected countries and territories:&nbsp;</div><div>Recalls and communication
        campaigns have been carried out in many countries and territories where contaminated
        products were distributed, preventing further exposures despite variable implementation
        of recall and withdrawal measures. Active case-finding and laboratory confirmation
        efforts are ongoing in affected countries and territories, with most countries
        and territories reporting no linked illnesses to date.</div>","FurtherInformation":"<p>European
