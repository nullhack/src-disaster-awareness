        <br /></p><p>&nbsp;</p>","Summary":"This is the third Disease Outbreak News
        report on the hantavirus cluster, following the notification to the World
        Health Organization (WHO) on 2 May 2026 of severe respiratory illness cases
        aboard MV Hondius, a cruise ship. Since the last DON was published on 8 May,
        two additional confirmed cases were reported from France and Spain. In addition,
        there is one inconclusive result for a case in the United States of America.
        All were passengers on the ship.   As of 13 May, a total of 11 cases, including
        three deaths, have been reported (case fatality ratio 27%). Eight cases were
        laboratory-confirmed for Andes virus (ANDV) infection, two are probable, and
        one case remains inconclusive and undergoing further testing. Through the
        International Health Regulations (2005) (IHR) channels, National IHR Focal
        Points (NFPs) have all been informed and are supporting international contact
        tracing efforts. WHO has assessed the risk posed by this event to the global
        population as low and will continue to monitor the epidemiological situation
        and update the risk assessment as needed. ","PublicationDateAndTime":"2026-05-13T18:00:00Z","TitleSuffix":"","UseOverrideTitle":true,"Title":"Hantavirus
        cluster linked to cruise ship travel, Multi-country","Epidemiology":"<p>Hantavirus
        cardiopulmonary syndrome (HCPS), also known as hantavirus pulmonary syndrome
        (HPS), is a zoonotic, viral respiratory disease caused by hantaviruses of
        the genus <em>Orthohantavirus</em>, family <em>Hantaviridae</em>, order <em>Bunyavirales</em>.
        More than 20 viral species have been identified within this genus. &nbsp;</p><p>Hantaviruses
        are associated with two major distinct clinical syndromes in humans: HPS predominantly
        reported in the Americas, and hemorrhagic fever with renal syndrome (HFRS),
        mainly reported in Europe and Asia. However, human-to-human transmission has
        only been reported for HPS associated with Andes virus infection. Andes virus
        is endemic in South America, with confirmed circulation and human cases reported
        primarily in Argentina and Chile, and additional cases and related strains
        identified in Uruguay, southern Brazil, and Paraguay.</p><p>Human Hantavirus
        infection is primarily acquired through contact with the urine, faeces, or
        saliva of infected rodents or by touching contaminated surfaces. Exposure
        typically occurs during activities such as cleaning buildings with rodent
        infestations, though it may also occur during routine activities in heavily
        infested areas. Human cases are most commonly reported in rural settings,
        such as forests, fields, and farms, where rodents are present, and opportunities
        for exposure are greater. </p><p>HPS is characterized by headache, dizziness,
        chills, fever, myalgia, and gastrointestinal symptoms, such as nausea, vomiting,
        diarrhoea, and abdominal pain, followed by sudden onset of respiratory distress
        and hypotension. Symptoms of HPS typically occur from 1-6 weeks after initial
        exposure to the virus. However, symptoms may appear as early as one week and
        as late as eight weeks following exposure.</p><p>Hantavirus infections are
        relatively uncommon globally.&nbsp; In 2025, in the Region of the Americas,
        eight countries reported HPS, 229 cases and 59 deaths with a CFR of 25.7%.<sup>[2]</sup>
        HPS is not reported in other parts of the world. In the European Region, 1885
        hantavirus infections causing HFRS were reported in 2023 (0.4 per 100 000),
        marking the lowest rate observed between 2019 and 2023.<sup>[3]</sup> In East
        Asia, particularly China and the Republic of Korea, HFRS continues to record
        thousands of cases annually, although incidence has declined in recent decades.
        </p><p>The overall CFR for HPS can be as high as 50%. While there are no licensed
        treatment nor vaccines for hantavirus infections, early supportive care and
        immediate referral to a facility with a complete ICU can improve survival.</p><p>Environmental
        and ecological factors affecting rodent populations can influence disease
        trends seasonally. Since hantavirus reservoirs are sylvatic rodents, transmission
        can occur when people come into contact with rodent habitats.</p><p>Although
        uncommon, limited human\u2011to\u2011human transmission of HPS due to Andes
        virus has been reported in community settings involving close and prolonged
        contact. Secondary infections among healthcare workers have been previously
        documented in healthcare facilities, though remain rare. Secondary transmission
        appears most likely during the early phase of illness, when the virus is more
        transmissible.&nbsp;Currently, little evidence is available due to the scarcity
        of hantavirus outbreak related to human-to-human transmission.</p><div><div
        id=\"ftn2\"></div></div>","OverrideTitle":"Hantavirus cluster linked to cruise
        ship travel, Multi-country","Advice":"<p>WHO advises that States Parties involved
        in this event continue public health coordination and management efforts related
        to the ship and relevant flights, and in countries where cases and/or contacts
        are present or will be returning to. Based on information available and ongoing
        epidemiological, clinical and environmental investigations, and applying the
        precautionary principle, this includes contact tracing and monitoring, detection,
        investigation, reporting of suspected cases, laboratory testing of suspected
        cases, case management, infection prevention and control measures, and clear
        and transparent communication to affected individuals and the general public.
        </p><p>Outside the context of the ship, high-risk contacts may include intimate
        partners, household members and persons with prolonged close indoor exposure,
        healthcare workers with unprotected exposure, and individuals handling contaminated
        materials or body fluids without appropriate personal protective equipment,
        outlined in the <a href=\"https://www.who.int/publications/m/item/management-of-contacts-of-andes-virus-(andv)-cases-fromthe-mv-hondius-cruise-ship\">interim
        guidance</a> published on 8 May.&nbsp;</p><p>Given that infectiousness peaks
        in the early phase of illness, and that pre-symptomatic transmission cannot
        be entirely ruled out, <em>as a</em> <em>precautionary principle</em>, WHO
        recommends active monitoring and home or facility quarantine of high-risk
        contacts for 42 days following last exposure. Current evidence does not support
        routine laboratory testing of contacts for outbreak control nor the quarantine
        of low-risk contacts; low-risk contacts should undertake passive self-monitoring
        and seek medical evaluation if symptoms occur. Recommendations are dynamic
        and will be adapted as more evidence emerges.</p><p>Contact investigations
        should use available information sources, including interviews, passenger
        manifests, seating arrangements and activity logs, to improve completeness
        of contact identification.</p><p>Early recognition of suspected cases, prompt
        isolation, and consistent adherence to recommended infection prevention and
        control measures remain essential to protect healthcare personnel, other passengers
        and crew members.</p><p>In healthcare settings: </p><ul><li>Apply standard
        precautions* at all times for all patients, including hand hygiene, environmental
        cleaning, and waste management. </li><li>Isolate any suspected or confirmed
        case in a single, well\u2011ventilated room with doors closed. </li><li>Implement
        transmission\u2011based precautions in addition to standard precautions for
        suspected or confirmed cases. </li><li>Ensure health and care workers wear
        appropriate personal protective equipment (respirators, eye protection, gowns,
        and gloves). </li><li>Perform hand hygiene before and after the use of personal
        protective equipment. </li></ul><ul><li>Manage waste generated from suspected
        or confirmed cases as infectious waste. </li><li>Apply airborne precautions
        during aerosol\u2011generating procedures.</li></ul><p>When HPS is suspected,
        patients should be promptly transferred to an emergency department or intensive
        care unit for close monitoring and supportive management. Initial management
        should include supportive care with antipyretics and analgesics as needed.
        For confirmed hantavirus, antibiotics are not routinely indicated. However,
        before a definitive diagnosis is established (and bacterial infection is a
        diagnostic possibility), or if secondary bacterial infection is suspected,
        empiric broad-spectrum antibiotics may be appropriate. Clinical management
        relies primarily on careful fluid administration, hemodynamic monitoring,
        and respiratory support. Given the rapid progression of HPS, close monitoring
        and early transfer to ICU are critical for more severe cases. Mechanical ventilation,
        judicious fluid management, and vasopressors may be required. For severe cardiopulmonary
        insufficiency, extracorporeal membrane oxygenation&nbsp;may be lifesaving.<sup>[5]</sup>
        In severe cases of renal dysfunction, dialysis may be required.</p><p>Although
        ribavirin has shown efficacy against hantavirus haemorrhagic fever with renal
        syndrome, it has not demonstrated effectiveness for HPS and is not licensed
        for either treatment or prophylaxis of hantavirus pulmonary syndrome.&nbsp;
        At present, there is no specific antiviral treatment approved for HPS; a number
        of existing drugs have antiviral activity in laboratory studies but not yet
        demonstrated in human disease.</p><p>Public health awareness efforts should
        focus on improving early detection, ensuring timely treatment, and reducing
        exposure risks. Preventive measures should address occupational and ecotourism-related
        exposures, emphasize infection prevention and control measures, and include
        rodent control strategies. Most routine tourism activities carry little or
        no risk of exposure to rodents or their excreta.</p><p>Risk communication
        and community engagement (RCCE) interventions should prioritize transparent,
        timely, and culturally appropriate communication to raise awareness of hantavirus
        transmission risks. RCCE strategies should support coordinated, timely and
        aligned evidence-based information to ensure concerned people receive clear,
        consistent and actionable information, including explanations of the public
        health measures being implemented. RCCE activities should explicitly address
        public concerns regarding transmissibility, severity, and international travel,
        and clarify what actions are and are not necessary for different population
        groups. Operational measures should integrate RCCE activities throughout all
        phases of the event. The implementation of integrated environmental management
        strategies aimed at reducing rodent populations is also recommended.</p><p>At
        this time, WHO does not recommend any changes to routine activities for the
        general public. People who were on board the affected ship, or who have had
        close contact with a confirmed case, should follow the specific monitoring
        and public health advice outlined above. Guidance may be updated as further
        evidence becomes available.</p><p>Based on the current information available
        on this event, WHO advises against the application of any travel or trade
        restrictions beyond the restriction of movement of identified high-risk contacts.</p><p>*Standard
        precautions refer to a set of practices that are applied to the care of patients,
        regardless of the state of infection (suspicion or confirmation), in any place
        where health services are provided. These practices aim to protect both healthcare
        professionals and patients and include hand hygiene, use of personal protective
        equipment, respiratory hygiene and cough etiquette, safe handling of sharps
        materials, safe injection practices, use of sterile instruments and equipment
        and cleaning of hospital environments and the environment. Adapted from &ldquo;Standard
        precautions for the prevention and control of infections: aide-memoire&rdquo;-
        WHO, 2022.&nbsp; Available at <a href=\"https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1\">https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1</a>&nbsp;&nbsp;</p>","Assessment":"<p><p>WHO
        currently assesses the public health risk for those who were onboard the cruise
        ship as moderate, and at the Global level as low for the following reasons:</p><ul
        type=\"disc\"><li data-list=\"0\" data-level=\"1\">Andes virus has demonstrated
        limited human-to-human transmission in previous      outbreaks, typically
        occurring among close contacts and within household      settings, generally
        requiring prolonged close exposure. Transmission can      be contained through
        early detection, isolation of cases, clinical      management, and contact
        management. However, the ship environment presented      an increased risk
        due to close living quarters, shared indoor spaces,      prolonged exposure,
        and frequent interpersonal interactions, all of which likely      facilitated
        transmission.</li><li data-list=\"0\" data-level=\"1\">The HCPS with hantaviruses
        in the Americas, including Andes can have a high      case fatality ratio,
        reaching 40-50%, particularly among elderly      individuals and those with
        co-morbidities. The average age of passengers      on board the ship was 65
        years old.</li><li data-list=\"0\" data-level=\"1\">Investigations on the
        travel history and potential exposures of the first case in the      Southern
        Cone subregion of the Americas are ongoing and suggest possible      exposure
        to rodents during bird watching activities. Viral sequencing      analyses
        are also ongoing and will compare the ANDV strain associated with      this
        outbreak with strains circulating in Argentina and Chile, where the      disease
        is enzootic. The preliminary sequencing analysis      for the cases indicates
        a high      degree of genetic similarity&mdash;showing no more than one single
        nucleotide      polymorphisms (SNP) difference per individual&mdash;strongly
        indicates that the      outbreak likely arose from a single zoonotic spillover
        event, or from a      very small number of closely related spillover events.<sup>[1]</sup></li><li
        data-list=\"0\" data-level=\"1\">Additional cases may occur among individuals
        exposed before implementation of      containment measures. However, the current
        response, including quarantine      for those who have left the ship and rapid
        isolation of any new suspect      cases and the monitoring of contacts, is
        expected to limit the risk of      further spread.</li><li data-list=\"0\"
        data-level=\"1\">As there      is no specific antiviral treatment for HPS,
        suspected cases require prompt      transfer to an adequately equipped emergency
        department or intensive care      unit, where available, for close monitoring
        and supportive management to      improve chances of recovery. Consequently,
        for remote areas, rapid      transfer to a mainland healthcare facility is
        required, which may be      challenging under the current conditions.</li></ul><p>For
        the general public, including people not exposed on board the ship or through
        close contact with a confirmed case, the overall probability of infection
        remains low. Current evidence indicates that transmission occurs through close
        and prolonged contact, and can be effectively limited through early detection,
        isolation of cases, and contact tracing. </p>More detailed epidemiological,
        clinical and laboratory investigations are required to inform further iterations
        of this risk assessment.&nbsp;</p>","Overview":"<p><p>On 2 May 2026, WHO received
        notification from the IHR NFP of the United Kingdom of Great Britain and Northern
        Ireland (hereafter referred to as the United Kingdom) regarding a cluster
        of severe acute respiratory illness, including two deaths and one critically
        ill passenger, aboard the Dutch-flagged cruise ship MV Hondius. </p><p>As
        of 13 May, a total of 11 cases (eight confirmed, one inconclusive and two
        probable cases), including three deaths (two confirmed and one probable),
        have been reported. Since the last <a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON600\">Disease
        Outbreak News</a> was published on 8 May, two additional confirmed cases and
        one inconclusive case have been reported among passengers. These are one confirmed
        case from France, who became symptomatic during repatriation, one confirmed
        case from Spain, tested upon arrival following repatriation but currently
        well and asymptomatic, and one case considered inconclusive. The latter was
        repatriated to the United States of America, is currently asymptomatic with
        inconclusive laboratory results (one positive and one negative result from
        two different laboratories), and is being retested. The individual was sampled
        due to high-risk exposure to confirmed cases on board. &nbsp;All laboratory-confirmed
        cases are confirmed for ANDV infection. All were passengers onboard the MV
        Hondius.&nbsp;</p><p><strong>Figure 1. Epidemiological curve of Andes hantavirus
        cases (n = 11) reported to WHO as of 13 May 2026, 17:00.&nbsp;</strong></p><p><img
        sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/hantavirus-outbreak-epi-curve.png?sfvrsn=1153a701_3\"
        height=\"810\" style=\"max-width:100%;height:auto;\" title=\"Hantavirus outbreak
        Epi curve\" width=\"1399\" alt=\"Hantavirus outbreak Epi curve\" sf-size=\"118701\"
        /></p><p>Based on currently available information, the working hypothesis
        is that the first case acquired the infection prior to boarding the cruise,
        through exposure on land. Investigations are ongoing to elucidate the potential
        circumstances of exposure and the source of the outbreak, in collaboration
        with authorities in Argentina and Chile. Current evidence suggests subsequent
        human-to-human transmission onboard the ship. This is also supported by a
        preliminary analysis of the sequences, which show a close, near-identical
        sequenced from different cases.<sup>[1]</sup><br /></p><p>The outbreak is
        being managed through a coordinated international response, including in-depth
        epidemiological investigations, case isolation and clinical management, medical
        evacuations, laboratory testing and international contact tracing, quarantining
        and monitoring. Recommendations may be updated as additional epidemiological
        and laboratory evidence, including genetic sequencing data, becomes available.
        <br /></p><p>Follow-up and contact tracing for all contacts of hantavirus
        cases linked to the cruise ship is ongoing. This includes passengers who disembarked
        in Saint Helena, United Kingdom, on 24 April; Praia, Cabo Verde, on 6 May;
        and Tenerife, Spain, on 10 and 11 May. Passengers who travelled on flights
        who may have had exposure to subsequently confirmed cases have been identified
        and contacted. Contacts are being monitored by local health authorities in
        their respective countries.&nbsp;&nbsp;</p>On 10 May, the ship arrived in
        the Canary Islands, Spain, where disembarkation began.&nbsp; Passengers and
        most of the crew were repatriated from the Canary Islands to their respective
        residence countries or transit points via specially arranged non-commercial
        flights, with WHO and partners supporting the disembarkation process. The
        ship left the Canary Islands on 11 May and is sailing to the Netherlands,
        with 25 crew members remaining on board, along with two Dutch health and care
        workers to conduct their health monitoring and provide any healthcare that
        may be necessary.&nbsp;</p>","DonId":"2026-DON601","Provider":"dynamicProvider372"},{"Id":"f6d5a10e-d6a4-4156-a203-4845ea2f878a","LastModified":"2026-05-10T10:26:21Z","PublicationDate":"2026-05-08T21:31:10Z","DateCreated":"2026-05-08T21:31:11Z","IncludeInSitemap":true,"SystemSourceKey":null,"UrlName":"2026-DON600","ItemDefaultUrl":"/2026-DON600","Response":"<p>Authorities
        from States Parties involved in the management of the event to date &ndash;
        &nbsp;Argentina, Cabo Verde, Chile, Germany, the Netherlands, South Africa,
        Spain, Switzerland, and the United Kingdom &ndash; &nbsp;WHO, and partners
        have initiated coordinated response measures including:<br /></p><ul><li>Ongoing
        engagement between WHO and the National IHR Focal Points of Argentina, Cabo
        Verde, Chile, Germany, the Netherlands, South Africa, Spain, Switzerland and
        the United Kingdom, to ensure timely information sharing and coordination
        of response actions. International contact tracing involving partners is ongoing.
        </li><li>Passengers onboard have been advised to practice physical distancing
        and remain in their cabins where possible, while on the cruise ship.</li><li>One
        expert from WHO and one from the European Centre for Disease Prevention and
        Control (ECDC) are on board the ship for the provision of public health advice
        to passengers during the journey.</li><li>Epidemiological investigations are
        underway to determine the source of exposure. </li><li>WHO shared information
        about the event,&nbsp; technical guidance on the management of hantavirus
        on board the ship, a technical note for the disembarkation and onward management
        of passengers and crew, information on the management of contacts of Andes
        virus cases, its rapid risk assessment of the associated public health risk,
        case investigation forms and details on primers and probes for Andes virus
        detection with National IHR Focal Points globally through its secure Event
        Information Site for IHR NFPs to support States Parties in responding to the
        event.</li><li>The National IHR Focal Points of countries with cases have
        shared passenger and crew lists with the National IHR Focal Points of the
        respective countries, according to each person&rsquo;s nationality. IHR NFP
        international contact tracing efforts are ongoing for conveyances. </li><li>The
        National IHR Focal Point of Argentina requested information, which has been
        provided, on the first two cases to reconstruct their travel itinerary in
        the Southern Cone subregion of the Americas and assess any potential exposure
        to hantavirus.&nbsp;They also shared the National Hantavirus Epidemiological
        Circular: Update epidemiological Surveillance and Management Standards on
        Hantavirus.&nbsp;</li><li>In line with the Working Arrangement between the
        WHO Emergency Medical Team (EMT) Secretariat and the EU Emergency Response
        Coordination Centre (ERCC), the EMT Secretariat has launched formal discussions
        to support the clinical management and medical evacuation of symptomatic passengers.
        EU Health Task Force (EUHTF) has also been activated for support.</li><li>Logistic
        support has been provided, including sample collection items. WHO supported
        the shipment of samples to the Institut Pasteur de Dakar, Senegal. </li><li>Laboratory
        testing and confirmation of hantavirus infection have been conducted at the
        National Institute for Communicable Diseases (NICD) of South Africa. Identification
        of Andes virus was performed through genomic sequencing at NICD and virus-specific
        PCR at Geneva University Hospitals, Switzerland. </li><li>&nbsp;WHO supported
        collaboration across laboratories to ensure further timely testing, involving
        laboratories in Senegal, the United Kingdom, the Netherlands and Argentina.
        Further testing is currently on-going including serology, sequencing and metagenomics.</li><li>WHO
        has developed guidance documents in support of countries affected by the event,
        including covering management of the event on the ship, investigation of cases,
        disembarkation and management of returning passengers and crew members. </li><li>Risk
        communication coordination and support are being provided to ensure sharing
        of regular, timely and evidence-based information. WHO has activated three-level
        coordination and is supporting national authorities in implementing risk-based,
        evidence-informed public health measures in accordance with the provisions
        of the IHR and related WHO technical guidance documents.</li></ul>","FurtherInformation":"<ul><li>World
        Health Organization. Hantavirus fact sheet.&nbsp;<a href=\"https://www.who.int/news-room/fact-sheets/detail/hantavirus\">https://www.who.int/news-room/fact-sheets/detail/hantavirus</a>&nbsp;</li><li>World
