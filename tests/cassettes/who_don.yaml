        target=\"_blank\">Strengthening the intersectoral work for Influenza at      the
        Human Animal Interface in the Region of the Americas: Technical      Questions
        and Answers - PAHO/WHO | Pan American Health Organization</a>&nbsp;</li></ol><p><sup>[1]</sup>Lam
        TT, Davis CT, WHO/WOAH/FAO H5 Evolution Working Group. Nomenclature updates
        to the hemagglutinin gene clade designations resulting from the continued
        evolution of high pathogenicity avian influenza A(H5) virus clades 2.3.2.1c
        and 2.3.4.4. bioRxiv. 2025 Nov 23;2025.11.23.690055. doi:10.1101/2025.11.23.690055.</p><p><sup>[2]</sup>Erdelyan
        CNG, Kandeil A, Signore AV, et al. Multiple transatlantic incursions of highly
        pathogenic avian influenza clade 2.3.4.4b A(H5N5) virus into North America
        and spillover to mammals. Cell Rep. 2024 Jul 23;43(7):114479. doi:10.1016/j.celrep.2024.114479.
        Epub 2024 Jul 13. PMID:39003741; PMCID:PMC11305400</p><p><sup>[3]</sup> World
        Health Organization. WHO Collaborating Centres and Essential Regulatory Laboratories
        in the Global Influenza Surveillance and Response System (GISRS) [Internet].
        Geneva: WHO; 2025. Available from: https://www.who.int/initiatives/global-influenza-surveillance-and-response-system/who-collaboration-center-erl</p><p><strong>Citable
        reference:</strong> World Health Organization (5 December 2025). Disease Outbreak
        News; Avian Influenza A(H5N5)- United States of America. Available at: <a
        href=\"https://www/who.int/emergencies/disease-outbreak-news/item/2025-DON590\">https://www/who.int/emergencies/disease-outbreak-news/item/2025-DON590</a><br
        /></p>","Summary":"On 15 November 2025, WHO was notified of the 71st confirmed
        human case with influenza A(H5) since early 2024 in the United States of America\u2014
        the first human case reported in the United States of America since February
        2025. On 20 November, U.S. Centers for Disease Control and Prevention (CDC)
        laboratory sequencing verified the virus as influenza A(H5N5), representing
        the first globally reported human case caused by an influenza A(H5N5) virus.
        The investigation by health authorities in the United States of America is
        ongoing. Contact tracing identified no further cases amongst contacts, and
        there is currently no evidence of human-to-human transmission.  \r\nDue to
        the constantly evolving nature of influenza viruses, WHO continues to stress
        the importance of global surveillance to detect and monitor virological (including
        genomics), epidemiological and clinical changes associated with emerging or
        circulating influenza viruses that may affect human health and timely virus
        sharing for risk assessment. Based on available information, the WHO currently
        assesses the overall public health risk posed by A(H5) viruses as low. However,
        for individuals with occupational risk of exposure, the risk of infection
        is considered low to moderate. ","PublicationDateAndTime":"2025-12-05T16:36:27Z","TitleSuffix":"","UseOverrideTitle":false,"Title":"Avian
        Influenza A(H5N5)- United States of America","Epidemiology":"<p>Animal influenza
        viruses typically circulate within animal populations, but some have the potential
        to infect humans. Human infections are predominantly acquired through direct
        contact with infected animals or&nbsp;<span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">exposure
        to contaminated environments. Based on the original host species, influenza
        A viruses can be categorized such as avian influenza, swine influenza, and
        other animal-origin influenza subtypes.</span></p><p>Human infection with
        avian influenza viruses may result in a spectrum of illness, ranging from
        mild upper respiratory tract symptoms to severe, life-threatening conditions.
        Clinical manifestations may include conjunctivitis, respiratory, gastrointestinal
        symptoms, encephalitis (brain swelling), and encephalopathy (brain damage).
        In some cases, asymptomatic infections with the virus have been reported in
        individuals with known exposure to infected animals and environments.</p><p>A
        definitive diagnosis of human avian influenza infection requires laboratory
        confirmation. WHO regularly updates its technical guidance on the detection
        of zoonotic influenza, utilizing molecular diagnostic methods such as RT-PCR.
        Clinical evidence indicates that certain antiviral agents, particularly neuraminidase
        inhibitors (e.g., oseltamivir, zanamivir), have been shown to shorten the
        duration of viral replication and improve patient outcomes in some cases.
        This antiviral agent should be administered within 48 hours of symptom onset.
        </p><p>High pathogenicity avian influenza A(H5) clade 2.3.4.4b A(H5N5) viruses
        have been detected in North America in wild birds and wild mammals since at
        least 2023.<sup>[2]</sup>&nbsp;This is the first laboratory-confirmed human
        infection with an influenza A(H5N5) virus in the United States of America
        and reported globally.</p>","OverrideTitle":"","Advice":"<p>This event does
        not change the current WHO recommendations on public health measures and <a
        href=\"https://www.who.int/teams/global-influenza-programme\" target=\"_blank\">surveillance
        of influenza. </a></p><p>Given the current situation of influenza viruses
        at the human-animal-environmental interface, WHO does not recommend special
        traveler screening at points of entry or any restrictions. </p><p>Due to the
        constantly evolving nature of influenza viruses, WHO continues to stress the
        importance of global surveillance to detect and monitor virological (including
        genomics), epidemiological and clinical changes associated with emerging or
        circulating influenza viruses that may affect human health and timely virus
        sharing for risk assessment. </p><p>When humans have been exposed to an influenza
        A virus outbreak in domestic poultry, wild birds, or other animals or when
        a human case of infection is identified, enhanced surveillance of potentially
        exposed human populations becomes necessary. This surveillance should consider
        the healthcare-seeking behaviour of the population and may include a range
        of active and passive approaches, such as enhanced surveillance in influenza-like
        illness (ILI)/severe acute respiratory infection (SARI) systems, active screening
        in hospitals, and among groups at higher occupational risk of exposure. It
        should also consider other sources, such as traditional healers, private practitioners,
        and private diagnostic laboratories. </p><p>Given the observed widespread
        occurrence of avian influenza in poultry, wild birds and some wild and domestic
        mammals, the public should avoid contact with any sick or dead animals. Individuals
        should report deceased birds and mammals or request their removal by contacting
        local wildlife or veterinary authorities. Eggs, poultry meat, and other poultry
        products should be properly cooked and handled during food preparation. Due
        to potential health risks, consumption of raw milk should be avoided. WHO
        advises consuming pasteurized milk and if pasteurized milk is not available,
        heating raw milk until it boils makes it safer for consumption. </p><p>In
        the case of a confirmed or suspected human infection caused by a novel influenza
        A virus with pandemic potential, including avian influenza viruses, early
        clinical management, a thorough epidemiologic investigation of animal exposure
        history, travel, and contact tracing should be conducted even while awaiting
        the confirmatory laboratory results. The epidemiologic investigation should
        also include early identification of unusual events that could signal person-to-person
        transmission of the novel virus. Clinical samples collected from confirmed
        or suspected cases should be tested and sent to a WHO Collaborating Center<sup>[3]</sup>
        for further characterization. Additional samples should be collected from
        animals, the environment or any foods suspected to be sources of infection.
        </p><p>WHO advises travelers to countries with known animal influenza outbreaks
        to avoid farms, live animal markets, areas where animals may be slaughtered
        and contact with any surfaces potentially contaminated by animal feces. Travelers
        should also wash their hands frequently with soap and water and should follow
        good food safety and good food hygiene practices. If infected individuals
        from affected areas travel internationally, their infection may be detected
        either during travel or upon arrival. However, further community level spread
        is considered unlikely, as this virus has not yet acquired the ability to
        transmit easily among humans. </p><p>Poultry workers should take additional
        health precautions as they are at higher risk of exposure to avian influenza
        and other zoonotic diseases due to their close contact with birds and potentially
        contaminated environments. Farm workers who have direct or close contact with
        animals or materials infected or contaminated with avian influenza A(H5) virus,
        should wear appropriate personal protective equipment (PPE) to minimize their
        risk of exposure. </p><p>All human infections caused by a novel influenza
        A virus subtype are notifiable under the International Health Regulations
        (IHR,2005) and State Parties to the IHR are required to immediately notify
        WHO within 24 hours of any laboratory-confirmed case of a recent human infection
        caused by an influenza A virus due to the potential to cause a pandemic. Evidence
        of illness is not required for this report. WHO has updated the influenza
        A(H5) confirmed case definition on the <a href=\"https://www.who.int/teams/global-influenza-programme/avian-influenza/case-definitions\"
        target=\"_blank\">WHO website</a>.&nbsp;</p><p>Currently, there are no readily
        available vaccines against influenza A(H5) virus for humans. Candidate vaccine
        viruses for pandemic preparedness have been selected against several A(H5)
        clades. Existing seasonal influenza vaccines are unlikely to provide protection
        to against avian influenza A(H5) viruses, based on currently available data.
        Close monitoring of the epidemiological situation and serological investigations
        are essential for assessing risk and adjusting risk management measures as
        needed.. </p><p>WHO does not recommend any restriction on travel to or trade
        with the United States of America, based on the information available on the
        current event.&nbsp;&nbsp;</p>","Assessment":"<p>Human infections with avian
        influenza A(H5) viruses are considered unusual, as A(H5) viruses remain primarily
        avian influenza viruses. However, in rare cases, individuals exposed to infected
        animals or contaminated environments can become infected with A(H5) viruses.&nbsp;
        Influenza A(H5N5) viruses are detected in birds, including wild birds and
        domestic poultry, and sometimes in non-human mammals. When avian influenza
        viruses circulate in poultry populations, there is an inherent risk of human
        infection through exposure to infected birds or contaminated environments.
        As such, sporadic human cases are expected. The case had underlying conditions
        and subsequently died. The investigation by health authorities in the United
        States of America is ongoing and included contact tracing which identified
        no further cases amongst contacts, and there is currently no evidence of human-to-human
        transmission.&nbsp; </p><p>This is the 71<sup>st</sup> confirmed human case
        of A(H5) in the United States of America since early 2024, and the first since
        February 2025. To date, no human-to-human transmission has been identified
        in any of the A(H5) cases reported in the United States of America. From a
        global perspective, while a few events with limited human-to-human transmission
        of zoonotic influenza A(H5) have been described between 1997 and 2007, sustained
        human-to-human transmission has not been detected to date.&nbsp; </p><p>Based
        on available information, the WHO currently assesses the overall public health
        risk posed by A(H5) viruses as low. However, for individuals with occupational
        risk of exposure, the risk of infection is considered low to moderate. </p><p>The
        risk assessment will be updated as needed, based on any new epidemiological
        or virological information related to this event.&nbsp;&nbsp;</p>","Overview":"<p>On
        15 November 2025, WHO was notified of a confirmed human infection with influenza
        A(H5) in the United States of America&mdash;the first reported in the country
        since February 2025 and the 71st since early 2024. On 20 November, CDC laboratory
        sequencing verified the virus as influenza A(H5N5), representing the first
        human case of this subtype reported globally. The patient was an adult with
        underlying medical conditions residing in Washington State. The patient developed
        symptoms including fever during the week ending 25 October 2025. During the
        week ending 8 November 2025, the patient was hospitalized with a serious illness
        and subsequently died on 21 November.</p><p>Respiratory specimens collected
        at the healthcare facility tested positive for influenza A virus by RT-PCR
        and were presumptive positive for influenza A(H5) at the University of Washington.
        The specimens were sent to the Washington State Public Health Laboratory,
        where influenza A(H5) was confirmed using the CDC influenza A(H5) assay. The
        sample was received at the CDC on 19 November. Sequencing conducted at the
        University of Washington and at the CDC indicated this was an influenza A(H5N5)
        virus belonging to the H5 haemagglutinin (HA) clade 2.3.4.4b<sup>[1]</sup>.&nbsp;
        </p><p>Public health investigation revealed that the patient kept backyard
        poultry and domestic birds. Additional epidemiological investigations are
        under way and include active monitoring of anyone who was in close contact
        with the patient.</p>","DonId":"2025-DON590","Provider":"dynamicProvider372"}]}'
