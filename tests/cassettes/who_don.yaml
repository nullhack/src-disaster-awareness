        communication and community engagement for Marburg virus disease outbreaks:
        interim guidance, November 2024. [cited 2026 Jan 26]. Available from: <a href=\"https://www.who.int/publications/i/item/B09185\">https://www.who.int/publications/i/item/B09185</a>
        <br /></li></ul><strong>Citable reference:</strong>&nbsp;World Health Organization
        (26 January 2026). Disease Outbreak News; Marburg virus disease in Ethiopia.
        Available at: <a href=\"https://www/who.int/emergencies/disease-outbreak-news/item/2025-DON592\">https://www/who.int/emergencies/disease-outbreak-news/item/2026-DON592</a></p>","Summary":"On
        26 January 2026, the Ministry of Health of Ethiopia declared the end of the
        Marburg virus disease (MVD) outbreak. This declaration came after two consecutive
        incubation periods (a total of 42 days) since the last person confirmed with
        MVD died and was given a safe and dignified burial, in accordance with WHO
        recommendations on 14 December 2025. As of 25 January 2026, a cumulative total
        of 19 cases, including 14 confirmed (including nine deaths) and five probable
        cases (all deaths), were reported. \r\nA total of 857 contacts listed for
        monitoring all had completed their 21-day follow-up as of 25 January 2026.\r\n\r\nWHO,
        through its country office and partners, provided technical, operational and
        financial support to the government to contain this outbreak. ","PublicationDateAndTime":"2026-01-26T19:00:00Z","TitleSuffix":"","UseOverrideTitle":false,"Title":"Marburg
        virus disease- Ethiopia","Epidemiology":"<p>Marburg virus disease (MVD) is
        a severe disease caused by either of two closely related viruses, Marburg
        virus and Ravn virus. &nbsp;MVD has a high case fatality rate, ranging from
        24% to 88% from previous outbreaks. The CFR can be lowered with early supportive
        patient care. The virus is initially transmitted to humans from fruit bats
        (<em>Rousettus aegyptiacus</em>) and then spreads among people through direct
        contact with bodily fluids, contaminated surfaces, or infected materials.
        Healthcare workers, caregivers, and individuals involved in burial practices
        are particularly at risk when appropriate infection, prevention and control
        measures are not in place. </p><p>MVD symptoms typically begin abruptly after
        an incubation period of two to 21 days and include high fever, severe headache,
        malaise, muscle aches, and progressive gastrointestinal symptoms such as diarrhea
        and vomiting. In severe cases, patients may experience bleeding from multiple
        sites and die from shock and organ failure within a week of symptom onset.</p><p>There
        are no approved treatment or vaccines for MVD, although early supportive care
        improves survival. Some candidate vaccines and therapeutics are currently
        under investigation.</p><p>Nineteen outbreaks of MVD have previously been
        reported globally. The most&nbsp;<a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON552\">recent</a>&nbsp;outbreak
        was reported from the Republic of Tanzania between January and March 2025.
        Additional countries that have reported outbreaks of MVD in the African Region
        include Angola, the Democratic Republic of the Congo, Equatorial Guinea, Ghana,
        Guinea, Kenya, Rwanda, South Africa, and Uganda.&nbsp;</p>","OverrideTitle":"","Advice":"<p>WHO
        encourages maintaining early detection and care capacities in addition to
        sustaining the ability to quickly respond after the outbreak ends. This is
        to make sure that if the disease re-emerges, health authorities can detect
        it immediately, prevent the disease from spreading again, and ultimately save
        lives.</p><p>Raising awareness of risk factors for MVD and protective measures
        that individuals can take is an effective way to reduce human transmission.
        WHO advises the following risk reduction measures as an effective way to reduce
        MVD transmission in healthcare facilities and in communities:</p><ul type=\"disc\"><li
        data-list=\"0\" data-level=\"1\">Reducing the risk      of bat-to-human transmission
        arising from prolonged exposure to mines or      caves inhabited by fruit
        bat colonies. People visiting or working in mines      or caves inhabited
        by fruit bat colonies should wear gloves and other      appropriate protective
        clothing (including masks).</li><li data-list=\"0\" data-level=\"1\">Capabilities
        for      early detection of MVD patients should be maintained over time in
        settings      at risk of the disease.</li><li data-list=\"0\" data-level=\"1\">Reducing
        the risk      of human-to-human transmission in the community arising from
        direct or      close contact with infected patients, particularly with their
        body fluids.      Close physical contact with MVD patients should be avoided.
        Patients      suspected or confirmed for MVD should be isolated in a designated      treatment
        centre for early care and to avoid transmission at home.</li><li data-list=\"0\"
        data-level=\"1\">Communities affected by MVD, along with health authorities,
        should ensure that the      population is well informed, both about the nature
        of the disease itself      and about necessary outbreak containment measures.</li><li
        data-list=\"0\" data-level=\"1\">Outbreak containment measures include safe
        and dignified burial of the deceased,      identifying people who may have
        been in contact with someone infected with      MVD and monitoring their health
        for 21 days and providing care to the      confirmed patient. Any sick people
        with symptoms matching MVD should be      referred to a health facility with
        adequate capacity.</li><li data-list=\"0\" data-level=\"1\">Critical infection      prevention
        and control measures should be implemented and/or strengthened      in all
        health care facilities, per&nbsp;<a href=\"https://www.who.int/publications/i/item/WHO-WPE-CRS-HCR-2023.1\">WHO&rsquo;s
        Infection prevention and control guideline      for Ebola and Marburg disease</a>.&nbsp;Health
        workers caring for patients with confirmed or      suspected MVD should apply&nbsp;<a
        href=\"https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2\">transmission-based
        precautions</a>&nbsp;in addition to:&nbsp;<a href=\"https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1\">standard
        precautions</a>, including appropriate use of PPE and hand      hygiene according
        to the&nbsp;<a href=\"https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21\">WHO
        5 moments</a>&nbsp;to avoid contact with patient&rsquo;s blood and      other
        body fluids and with contaminated surfaces and objects. Waste      generated
        in healthcare facilities must be safely segregated, collected,      transported,
        stored, treated and finally disposed. Follow the national      guidelines,
        rules and regulations for safe waste disposal or follow      the&nbsp;<a href=\"https://iris.who.int/bitstream/handle/10665/85349/9789241548564_eng.pdf;sequence=1\">WHO&rsquo;s
        guidelines on safe waste management</a>.</li><li data-list=\"0\" data-level=\"1\">Patient-care
        activities should be undertaken in a clean and hygienic environment that      facilitates
        practices related to the prevention and control of      health-care-associated
        infections (HAIs) as outlined in&nbsp;<a href=\"https://www.who.int/publications/i/item/9789241547239\">Essential
        environmental health standards in      health care</a>. Safe water,      adequate
        sanitation and hygiene infrastructure and services should be      provided
        in healthcare facilities. For details on recommendations and      improvement,
        follow the&nbsp;<a href=\"https://openwho.org/courses/wash-fit\">WASH FIT
        implementation Package</a></li><li data-list=\"0\" data-level=\"1\">WHO encourages      countries
        to implement a comprehensive care programme to support people      who have
        recovered from MVD with any subsequent sequelae and to enable      them to
        access body fluid testing and to mitigate the risk of transmission      through
        infected body fluids by adequate practices.</li></ul><p>Based on the current
        risk assessment, WHO advises against any travel and trade restrictions with
        Ethiopia.&nbsp;</p>","Assessment":"<p>This was the first-ever confirmed MVD
        outbreak reported in Ethiopia. &nbsp;Based on the outbreak investigation and
        surveillance activities during the response, which included contact tracing,
        alert management, active case search, and mortality surveillance, no additional
        cases have been reported during the 42-day countdown period, as per WHO recommendations.
        However, there remains a risk of re-emergence of MVD following the declaration
        of the end of the outbreak, with potential spillovers from interactions with
        the animal reservoir.</p><p>Risk communication and community engagement activities
        will continue to provide timely and accurate information, monitor and address
        community feedback and rumours, while supporting efforts to reduce stigma
        toward individuals affected by the outbreak.&nbsp;</p>","Overview":"<p>On
        14 November 2025, after the laboratory confirmation of suspected viral hemorrhagic
        fever (VHF) cases in Jinka town, South Ethiopia Regional State, Ethiopia,
        the Ministry of Health of Ethiopia declared an outbreak of Marburg Virus Disease
        (MVD). Molecular testing conducted by the National Reference Laboratory at
        the Ethiopian Public Health Institute (EPHI) identified Marburg virus (MARV)
        in patient samples. This was the first time Ethiopia was reporting a <a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON585\">MVD
        outbreak</a>. </p><p>The first known case was an adult from Jinka town who
        developed symptoms on 23 October. The patient presented to the General Hospital
        the following day with vomiting, loss of appetite, and abdominal cramps. As
        of 25 January 2026, a cumulative total of 14 confirmed cases, including nine
        deaths (Case Fatality Rate (CFR) 64.3%) and five probable cases, all of whom
        had died, were reported by the Ministry of Health from Jinka, Malle and Dasench
        woredas in South Ethiopia Region and Hawassa in Sidama Region. </p><p>As of
        25 January 2026, a total of 857 contacts were listed who completed 21 days
        of follow-up, 760 from the South Ethiopia Region and 97 from the Sidama Region.
        As of 5 January 2026, 3800 samples were tested for the virus.</p><p>On 26
        January 2026, after two consecutive incubation periods (a total of 42 days),
        without a new confirmed case reported, after the last confirmed case died
        and was given a safe and dignified burial, on 14 December 2025, the Ministry
        of Health of Ethiopia declared the end of the MVD outbreak, as per WHO recommendations.<strong></strong></p><p><strong>Figure
        1: Map of districts reporting confirmed and probable Marburg virus disease
        cases in Ethiopia, as of 25 January 2026</strong></p><p><img sf-image-responsive=\"true\"
        src=\"https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/map-for-marburg-virus-disease-in-ethiopia.png?sfvrsn=15b744e9_3\"
        height=\"773\" style=\"max-width:100%;height:auto;\" title=\"Map for Marburg
        virus disease in Ethiopia\" width=\"850\" alt=\"Map for Marburg virus disease
        in Ethiopia\" sf-size=\"118205\" /></p><p>&nbsp;</p><p>&nbsp;</p>","DonId":"2026-DON592","Provider":"dynamicProvider372"},{"Id":"0fc174d2-cdc3-4d5d-afed-4df595977a02","LastModified":"2026-01-06T10:00:01Z","PublicationDate":"2025-12-24T09:19:23Z","DateCreated":"2025-12-24T09:19:23Z","IncludeInSitemap":true,"SystemSourceKey":null,"UrlName":"2025-DON591","ItemDefaultUrl":"/2025-DON591","Response":"<p>WHO
        is supporting Member States in strengthening preparedness and response.</p><p><strong>Activities
        in the Kingdom of Saudi Arabia include;</strong></p><ul><li>Strengthened surveillance
        with immediate notification of all suspected and confirmed cases.</li><li>Strict
        implementation of infection prevention and control transmission-based precautions
        (Contact and Droplet precautions) in healthcare facilities for suspect or
        confirmed patients, and airborne precautions for patients undergoing aerosol-generating
        procedures.</li><li>Identification of health and care worker contacts and
        perform risk assessment of their exposure, considering the timely identification
        of symptomatic patients, implementation of IPC measures, and correct utilization
        of PPE while treating patients,</li><li>Exposed health and care workers are
        followed up for 14 days to monitor symptoms. If they develop symptoms, they
        are to be removed from working with patients until tested and symptoms are
        fully resolved.</li><li>Patients exposed to MERS-CoV in the healthcare setting
        must be tested to determine their ability to continue working with patients
        without further transmission, which could potentially lead to outbreaks in
        the healthcare facility.&nbsp;</li><li>Identification of all potential community
        contacts and active follow-up to monitor symptoms for 14 days.</li><li>All
        community acquired cases are investigated for having direct or indirect contact
        with camels or their products.</li><li>Cases linked to camel exposures are
        notified to the National Center for Prevention and Control of Plants, Pests,
        and Animal Diseases (Weqaa) to investigate potential camel sources.</li><li>Camels
        identified as a presumed source are quarantined and tested for MERS-CoV, and
        if live virus is detected, the quarantine period will be extended until live
        virus is no longer detected in camel.</li></ul><p><strong>Activities in France
        include; </strong></p><ul><li>On 4 December 2025, MoH France published information
        regarding the two imported cases of MERS-CoV in the country (<a href=\"https://sante.gouv.fr/actualites-presse/presse/communiques-de-presse/article/deux-cas-de-mers-cov-de-retour-de-l-etranger-identifies-sur-le-territoire\">link</a>).</li><li>Genomic
        sequencing was conducted from the first case and reported as being the same
        lineage that is circulating in the Arabian Peninsula. Further laboratory analyses
        are ongoing. </li><li>Contact tracing was&nbsp;initiated&nbsp;as soon as the
        first case was detected&nbsp;for the monitoring and surveillance of fellow&nbsp;travellers&nbsp;and
        co-exposed individuals, high-risk contacts, and hospital contacts. It&nbsp;was
        completed in week 51&nbsp;and no additional cases among&nbsp;the travellers&nbsp;have
        been reported, nor any secondary cases&nbsp;as of 19 December 2025.&nbsp;</li><li>Asymptomatic
        co-exposed individuals and at-risk contacts&nbsp;located&nbsp;in France&nbsp;were
        offered a full testing protocol (nasopharyngeal swab,&nbsp;sputum,&nbsp;rectal&nbsp;swab&nbsp;and
        serology)&nbsp;on a voluntary basis up to&nbsp;29 days&nbsp;after their last
        exposure,&nbsp;even if they did not exhibit any&nbsp;symptoms.</li></ul>","FurtherInformation":"<div
