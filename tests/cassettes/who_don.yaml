        </p>","Summary":"This is the fourth Disease Outbreak News report on the Andes
        hantavirus outbreak linked to cruise ship travel, following the notification
        to the World Health Organization (WHO) on 2 May 2026 of severe respiratory
        illness cases aboard M/V Hondius, a cruise ship. Since the last DON was published
        on 13 May, three additional confirmed cases were reported, from Canada, the
        Netherlands, and Spain. The previously reported inconclusive case from the
        United States of America was subsequently determined to be negative following
        further laboratory testing and has been removed from the total case count.
        All cases to date have been passengers or crew members on the ship. As of
        27 May, a total of 13 cases, including three deaths, have been reported (case
        fatality ratio 23%). Eleven cases have been laboratory-confirmed for Andes
        virus (ANDV) infection, and two are probable cases. Given the long incubation
        period of up to six weeks, it is not unexpected that cases continue to be
        reported until the end of the six weeks since last exposure. \r\n\r\nThrough
        the International Health Regulations (2005) (IHR) channels, National IHR Focal
        Points (NFPs) have all been informed and are supporting international contact
        tracing and monitoring efforts. WHO has assessed the risk posed by this event
        to the global population as low and will continue to monitor the epidemiological
        situation and update the risk assessment as needed. ","PublicationDateAndTime":"2026-05-28T18:00:00Z","TitleSuffix":"","UseOverrideTitle":true,"Title":"Hantavirus
        outbreak linked to cruise ship travel, Multi-locations","Epidemiology":"<p>Hantavirus
        disease is a zoonotic viral disease caused by hantaviruses of the genus <em>Orthohantavirus</em>,
        family <em>Hantaviridae</em>, order <em>Bunyavirales</em>. More than 20 viral
        species have been identified within this genus. &nbsp;<br /></p><p>Human hantavirus
        infection is primarily acquired through contact with the urine, faeces, or
        saliva of certain species of (specific) infected rodents, or by touching contaminated
        surfaces. Exposure typically occurs during activities such as cleaning buildings
        with rodent infestations, though it may also occur during routine activities
        in heavily infested areas. Human cases are most commonly reported in rural
        settings, such as forests, fields, and farms, where rodents are present, and
        opportunities for exposure are greater. <br /></p><p>Human-to-human transmission
        has currently only been reported for hantavirus pulmonary syndrome (HPS) associated
        with Andes virus infection. Andes virus (ANDV) is endemic in South America,
        with confirmed circulation and human cases reported primarily in Argentina
        and Chile, and additional cases and related strains identified in Uruguay,
        southern Brazil, and Paraguay.<br /></p><p><strong>Andes virus transmission
        between humans</strong><br /></p><p>Based on the available information and
        the existing observations of the current outbreak, limited human-to-human
        transmission of ANDV is known to occur. However, no large-scale human-to-human
        outbreaks have been observed historically,<sup>[2]</sup> suggesting a low
        probability of transmission per contact. ANDV circulates in specific species
        of rodents in the Americas, and there have been many sporadic cases reported
        in Argentina and Chile that have not led to onward transmission.<sup>[3]</sup>&nbsp;Clusters
        of human cases have been reported in multiple past outbreaks and have been
        typically associated with close and prolonged interactions, often in shared
        indoor environments such as households.&nbsp; The largest reported outbreak
        of ANDV was reported in Argentina in 2018-2019,<sup>[</sup><sup>2]</sup> where
        high viral titres in combination with attendance at large social gatherings
        or extensive contacts among people were associated with higher transmission.
        &nbsp;While the available evidence suggests that there are multiple modes
        of transmission that occur with ANDV, the probability of onward transmission
        between humans remains low.</p><p>In this recent outbreak of ANDV infection
        reported on a cruise ship, human-to-human transmission has also occurred.
        Considering the ongoing epidemiological studies and environmental sampling
        after the disembarkation of all passengers from MV Hondius, the exact mode(s)
        through which human-to-human transmission occurred and their relative contributions
        are yet to be fully understood.&nbsp; </p><p>Therefore, at present, WHO is
        operating under the assumption that ANDV transmission:</p><ul data-list=\"0\"
        data-level=\"1\"><li>may include contact with an infected individual or contaminated
        surfaces, </li><li>&nbsp;and/or through-the-air transmission (via direct deposition
        of infectious respiratory particles onto exposed facial mucosal surfaces--mouth,
        nose or eyes)</li><li>and/or airborne transmission (via inhalation of infectious
        respiratory particles). </li></ul>  <p>The virus does not exhibit transmission
        dynamics consistent with highly transmissible airborne pathogens (such as
        measles). </p><p>This information is up to date as of 27 May 2026. It will
        be updated as new evidence becomes available and the understanding of transmission
        evolves.<br /></p> <p>Using data from the previously documented human-to-human
        outbreaks in Argentina <sup>[2]</sup> and the 13 cases so far recorded from
        the cruise ship outbreak, WHO estimates that the mean incubation period is
        22 days, corresponding to a probability of safe release from quarantine of
        96% at 42 days, reducing to 91% at 35 days. This reaffirms WHO&rsquo;s recommendation
        of 42 days of quarantine for high-risk contacts and self-monitoring for low-risk
        contacts. </p><p>Using case incidence data from the ANDV outbreak associated
        with the cruise ship, the effective reproduction number (Rt) for this outbreak
        as of 22 May is estimated to be 0.7, where anything less than 1.0 indicates
        that the spread of disease is declining.&nbsp;</p>","OverrideTitle":"Hantavirus
        outbreak linked to cruise ship travel, Multi-locations","Advice":"<p>WHO advises
        States Parties involved in this event to continue coordinated public health
        management efforts related to the management of cases and contacts associated
        with the affected ship and flights, as well as in countries where cases and/or
        contacts have been identified. WHO has advised and continues to advise a precautionary
        approach for management of the outbreak related to the ship, with focus on
        total containment to minimize the onward risk of transmission to other persons.
        This strategic decision is guided by:</p><ul><li>To date, most of the evidence
        of human-to-human transmission shows it has required prolonged close exposure,
        although it is possible that some highly infectious individuals could infect
        others through a lower degree of exposure. </li><li>Mode(s) of transmission
        and which mode is dominant if multiple routes of transmission exist are still
        uncertain.</li><li>Infection is a result of not only exposure, but the setting
        and duration where exposure has taken place, how infectious the infected person
        is, and whether personal protective equipment is used.</li><li>Although the
        probability of infection is uncertain, if infection occurs, it can be severe.
        Currently, there is no specific treatment available and severe disease requires
        advanced critical care.</li><li>There is a relatively low burden of additional
        infection prevention and control measures.<br /></li></ul> <p>At this time,
        WHO does not recommend any changes to routine activities for the general public.
        People who were on board the affected ship, or who have had close contact
        with a confirmed case, should follow national health advice. Guidance may
        be updated as further evidence becomes available.<br /></p> <p>Recommendations
        remain dynamic and will be updated as additional epidemiological and laboratory
        evidence, including genetic sequencing data, becomes available.<br /></p>
        <p><strong>Coordination</strong></p><ul type=\"disc\"><li data-list=\"4\"
        data-level=\"1\">WHO advises States Parties involved in this      event to
        continue public health coordination related to the management of      cases
        and contacts in countries where they are present or expected to      return,
        as well as of affected conveyances, as applicable and in close      coordination
        with travel and transport authorities, conveyance operators,      and other
        relevant stakeholders at points of entry.</li><li data-list=\"4\" data-level=\"1\">Coordination
        should ensure the implementation      of risk-based, evidence-informed public
        health measures.</li></ul><p><strong>Surveillance</strong></p><ul type=\"disc\"><li
        data-list=\"1\" data-level=\"1\">Ongoing epidemiological investigations include      detection,
        investigation, and reporting of suspected cases, as well as      contact tracing
        and monitoring.</li><li data-list=\"1\" data-level=\"1\">As a precautionary
        measure, high-risk contacts      should undergo active monitoring and home
        or facility quarantine for 42      days following their last exposure.</li><li
        data-list=\"1\" data-level=\"1\">Current evidence does not support routine      laboratory
        testing or quarantine of low-risk contacts; instead, they      should undertake
        passive self-monitoring and seek medical evaluation if      symptoms develop.</li><li
        data-list=\"1\" data-level=\"1\">Contact tracing and listing should utilize
        all      available information sources, including interviews and relevant
        conveyance-related      documentation (passenger manifests, passenger locator
        forms, and other      relevant activity logs), to ensure completeness.</li><li
        data-list=\"1\" data-level=\"1\">Early recognition and prompt isolation of      suspected
        cases remain critical to reduce further transmission.</li></ul><p><strong>Laboratory</strong></p><ul
        type=\"disc\"><li data-list=\"2\" data-level=\"1\">Laboratory testing of suspected
        cases should      be conducted as part of the outbreak response.</li><li data-list=\"2\"
        data-level=\"1\">Laboratory investigations may include      molecular detection,
        serology, and sequencing to support case confirmation      and better understand
        the outbreak.</li><li data-list=\"2\" data-level=\"1\">Recommendations on
        laboratory approaches will      continue to evolve as new evidence becomes
        available.</li></ul><p><strong>Case management</strong></p><ul type=\"disc\"><li
        data-list=\"5\" data-level=\"1\">Early identification, prompt isolation, and      clinical
        evaluation of suspected cases are essential.</li><li data-list=\"5\" data-level=\"1\">When
        HPS is suspected, patients should be      promptly referred for close monitoring
        and supportive care, including      admission to emergency or intensive care
        settings when needed.</li><li data-list=\"5\" data-level=\"1\">Clinical management
        is primarily supportive      and may include antipyretics, careful fluid management,
        hemodynamic      monitoring, respiratory support, and escalation to advanced
        interventions      for severe cases.</li><li data-list=\"5\" data-level=\"1\">Mechanical
        ventilation, vasopressors,      extracorporeal membrane oxygenation<sup>[4]
        </sup> (ECMO), or dialysis may be required for severe disease.</li><li data-list=\"5\"
        data-level=\"1\">Antibiotics are not routinely indicated for      confirmed
        hantavirus infection, but may be used empirically if bacterial      infection
        cannot be ruled out or is suspected.</li><li data-list=\"5\" data-level=\"1\">Currently,
        there is no approved specific      antiviral treatment for HPS.</li></ul><p><strong>Infection
        Prevention and Control</strong></p><ul type=\"disc\"><li data-list=\"6\" data-level=\"1\">Suspected
        or confirmed cases should be      isolated in a single, well-ventilated room.</li><li
        data-list=\"6\" data-level=\"1\">Standard precautions* should be applied at
        all      times for all patients, including hand hygiene, environmental cleaning,      and
        appropriate waste management, outlined      in the <a href=\"https://www.who.int/publications/m/item/management-of-contacts-of-andes-virus-(andv)-cases-fromthe-mv-hondius-cruise-ship\">interim
        guidance</a> published on 8 May</li><li data-list=\"6\" data-level=\"1\">Transmission-based
        precautions should be      implemented in addition to standard precautions.
        Health and care workers      should use appropriate personal protective equipment,
        including      respirators, eye protection, gowns, and gloves.</li><li data-list=\"6\"
        data-level=\"1\">&nbsp;Suspected or confirmed cases should be isolated in
        a single, well-ventilated room.</li><li data-list=\"6\" data-level=\"1\">Transmission-based
        precautions should be      implemented in addition to standard precautions.</li><li
        data-list=\"6\" data-level=\"1\">Hand hygiene should be performed before and      after
        the use of PPE.</li><li data-list=\"6\" data-level=\"1\">Waste from suspected
        or confirmed cases should      be managed as infectious waste.</li><li data-list=\"6\"
        data-level=\"1\">Airborne precautions should be applied during      aerosol-generating
        procedures.</li><li data-list=\"6\" data-level=\"1\">The duration of standard
        and transmission-based precautions should      be determined on a case-by-case
        basis. </li></ul><p><strong>Risk Communication and Community Engagement (RCCE)</strong></p><ul
        type=\"disc\"><li data-list=\"0\" data-level=\"1\">Communication strategies
        should prioritize      transparent, timely, and culturally appropriate information
        to affected      individuals and the general public.</li><li data-list=\"0\"
        data-level=\"1\">Risk Communication and Community Engagement      (RCCE) efforts
        should provide clear, consistent, and actionable      information, including
        explanations of the public health measures being      implemented.</li><li
        data-list=\"0\" data-level=\"1\">Messaging should address public concerns      regarding
        transmissibility, severity, and international travel, and      clarify recommended
        actions for different population groups.</li><li data-list=\"0\" data-level=\"1\">Public
        health awareness should focus on early      detection, timely healthcare seeking,
        and reducing exposure risks,      including occupational and environmental
        exposures.</li><li data-list=\"0\" data-level=\"1\">RCCE activities should
        be integrated      throughout all phases of the response and align with broader
        public health      measures.</li><li data-list=\"0\" data-level=\"1\">Environmental
        management strategies, including      rodent control, should be included as
        part of prevention efforts.</li></ul><p>Based on the current information available
        on this event, WHO advises against the application of any travel or trade
        restrictions beyond the restriction of movement of identified high-risk contacts.<br
        /></p> <p>*Standard precautions refer to a set of practices that are applied
        to the care of patients, regardless of the state of infection (suspicion or
        confirmation), in any place where health services are provided. These practices
        aim to protect both healthcare professionals and patients and include hand
        hygiene, use of personal protective equipment, respiratory hygiene and cough
        etiquette, safe handling of sharps materials, safe injection practices, use
        of sterile instruments and equipment and cleaning of hospital environments
        and the environment. Adapted from &ldquo;Standard precautions for the prevention
        and control of infections: aide-memoire&rdquo;- WHO, 2022.&nbsp; Available
        at <a href=\"https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1\">https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1</a>&nbsp;&nbsp;</p>","Assessment":"<p>WHO
        continues to assess the risk for passengers and crew who were onboard the
        cruise ship as moderate, as individuals exposed prior to the implementation
        of control measures may still develop illness during the incubation period
        and should therefore be closely monitored.</p><p>The risk at the global level
        is assessed as low for the following reasons:</p><ul type=\"disc\"><li data-list=\"0\"
        data-level=\"1\">Andes virus has demonstrated limited human-to-human transmission
        in previous      outbreaks, typically occurring among close contacts and within
        household      settings, generally requiring prolonged close exposure. Transmission
        can      be contained through early detection, isolation of cases, clinical      management,
        and contact management. However, the ship environment presented      an increased
        risk due to close living quarters, shared indoor spaces,      prolonged exposure,
        and frequent interpersonal interactions, all of which likely      facilitated
        transmission.</li><li data-list=\"0\" data-level=\"1\">Human Pulmonary Syndrome
        caused by hantaviruses in the Americas, including Andes      virus, can have
        a high case fatality ratio, reaching 40-50%, particularly      among elderly
        individuals and those with co-morbidities. The average age      of passengers
        on board the ship was 65 years old.</li><li data-list=\"0\" data-level=\"1\">Investigations
        on the travel history and potential exposures of the first case in the      Southern
        Cone subregion of the Americas are ongoing and suggest possible      exposure
        to rodents during recreational activities. Viral sequencing      analyses
        are also ongoing and are comparing the ANDV strain associated      with this
        outbreak with strains circulating in Argentina and Chile, where      the disease
        is enzootic. The preliminary sequencing analysis      for the cases indicates
        a high      degree of genetic similarity amongst sequenced cases &mdash;showing
        no more than      one single nucleotide polymorphisms difference per individual
        &ndash; which strongly      indicates that the outbreak likely arose from
        a single zoonotic spillover      event, or from a very small number of closely
        related spillover events.<sup>[</sup><sup>1]</sup></li><li data-list=\"0\"
        data-level=\"1\">Additional cases may occur among individuals exposed before
        implementation of      containment measures. However, the current response,
        including quarantine      for those who have left the ship and rapid isolation
        of any new suspect      cases and the monitoring of contacts, is expected
        to limit the risk of      further spread.</li><li data-list=\"0\" data-level=\"1\">As
        there      is no specific antiviral treatment for HPS, suspected cases require
        prompt      transfer to an adequately equipped emergency department or intensive
        care      unit, where available, for close monitoring and supportive management
        to      improve chances of recovery. Consequently, for remote areas, rapid      transfer
        to a well-resourced healthcare facility is required, which may be      challenging
        under the current conditions.</li></ul><p>For the general public, including
        people not exposed on board the ship or through close contact with a confirmed
        case, the overall probability of infection remains low. Current evidence indicates
        that human-to-human transmission occurs through close and prolonged contact,
        and can be effectively limited through early detection, isolation of cases,
        and contact tracing.&nbsp;</p>","Overview":"<p>On 2 May 2026, WHO received
        notification from the IHR NFP of the United Kingdom of Great Britain and Northern
        Ireland (hereafter referred to as the United Kingdom) regarding a cluster
        of severe acute respiratory illness, including two deaths and one critically
        ill passenger, aboard the Netherlands-flagged cruise ship M/V Hondius. </p><p>As
        of 27 May, a total of 13 cases (eleven confirmed and two probable cases),
        including three deaths (two confirmed and one probable), have been reported.
        Since the last <a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON601\">Disease
        Outbreak News</a> was published on 13 May, three additional confirmed cases
        have been reported among passengers or crew members, one each from Canada,
        the Netherlands, and Spain. The case in Canada developed symptoms during contact
        follow-up, whereas the cases in the Netherlands and Spain were identified
        through routine weekly testing of high-risk contacts during follow-up. The
        previously reported inconclusive case from the United States of America was
        subsequently determined to be negative following further laboratory testing
        and has been removed from the total count on 15 May. All confirmed cases are
        among people who travelled onboard the M/V Hondius. <strong></strong><strong></strong></p><p><strong>Figure
        1. Epidemiological curve of Andes hantavirus cases (n = 13) reported to WHO
        as of 27 May 2026, 17:00.&nbsp;</strong></p><p><img sf-image-responsive=\"true\"
        src=\"https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/hantavirus-outbreak-epi-curvef3430263-0740-4ff3-95eb-5a3e950a0092.png?sfvrsn=80f4e86b_3\"
        height=\"902\" style=\"max-width:100%;height:auto;\" title=\"Hantavirus outbreak
        Epi curve\" width=\"1804\" alt=\"Hantavirus outbreak Epi curve\" sf-size=\"96380\"
        /></p><p>Based on currently available information, the working hypothesis
        is that the first case acquired the infection prior to boarding the cruise,
        through exposure on land. Investigations are ongoing to elucidate the potential
        circumstances of exposure and the source of the outbreak, in collaboration
        with authorities in Argentina and Chile, however, the time between the individual&rsquo;s
        visit to Chile and the onset of symptoms exceeds the maximum incubation period.
        Therefore, based on the information currently available, exposure in Chile
        can be ruled out. Current evidence suggests subsequent human-to-human transmission
        onboard the ship. This is also supported by a preliminary analysis of the
        sequences, which show a near-identical sequence from different cases.<sup>[1]</sup><br
        /></p><p>This outbreak is being managed through a coordinated international
        response. This includes comprehensive epidemiological investigations, case
        isolation and clinical management, medical evacuations, laboratory testing,
        and international contact tracing, as well as quarantine and monitoring measures.
        Recommendations are subject to change as new epidemiological and laboratory
        evidence becomes available, including findings from genetic sequencing.<br
        /></p><p>Follow-up and contact tracing for all contacts of hantavirus cases
        linked to the cruise ship is ongoing. This includes passengers who disembarked
        in Saint Helena, United Kingdom, on 24 April; Ascension, United Kingdom, on
        27 April; Praia, Cabo Verde, on 6 May; and Tenerife, Spain, on 10 and 11 May,
        the remaining 25 crew members and the two healthcare workers from the Netherlands
        who disembarked in the Netherlands on 18 May and 23 May. Passengers who travelled
        on flights who may have had exposure to subsequently confirmed cases have
        been identified and contacted.<br /></p><p>High-risk contacts are being quarantined
        and monitored by local health authorities either in their respective countries
        or in the ship&rsquo;s flag country, the Netherlands, or third countries (Table
        1). As of 22 May 2026, more than 600 contacts, including 53% high-risk and
        47% low-risk contacts, have been identified across 32 countries, territories
        and areas, and are either under close monitoring or self-monitoring in line
        with the updated guidance on <a href=\"https://www.who.int/publications/m/item/management-of-contacts-of-andes-virus-(andv)-cases-fromthe-mv-hondius-cruise-ship\">management
        of contacts of Andes virus (ANDV) cases from the MV Hondius cruise ship</a>
        &nbsp; published on 17 May.</p><p><strong>Table 1. Contacts being traced for
        the Andes hantavirus outbreak on a cruise ship reported to WHO as of 25 May
        2026, 17:00.</strong><br /></p><p><img sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/hantavirus_contacts-by-location.png?sfvrsn=6bdd5f04_3\"
        height=\"574\" style=\"max-width:100%;height:auto;\" title=\"Hantavirus_contacts
        by location_\" width=\"1035\" alt=\"Hantavirus_contacts by location_\" sf-size=\"87814\"
        /></p>","DonId":"2026-DON604","Provider":"dynamicProvider372"},{"Id":"f2a48407-d580-4988-94d7-ccc683f54cb0","LastModified":"2026-05-26T16:42:14Z","PublicationDate":"2026-05-22T21:06:24Z","DateCreated":"2026-05-22T21:06:25Z","IncludeInSitemap":true,"SystemSourceKey":null,"UrlName":"2026-DON603","ItemDefaultUrl":"/2026-DON603","Response":"<p>Health
        authorities in <strong>DRC</strong>, in collaboration with WHO and partners
        are implementing public health measures, including but not limited to the
        following: <br /></p><p><strong>Coordination</strong></p><ul><li>The Incident
        Management System has been activated to coordinate response to the outbreak,
        with technical support from WHO and health partners</li><li>Subnational coordination
        structures are being activated at the provincial and health zones level to
        coordinate operational activities. Daily provincial coordination meetings
        involving all response pillars and operational partners are ongoing.</li><li>Rapid
        response teams from MoH and WHO have been deployed to Bunia, Mongbwalu, and
        Rwampara HZ.<br /></li></ul><p><strong>Surveillance </strong></p><ul><li>Surveillance
        for suspected and probable cases is ongoing (including at relevant Points
        of Entry and borders).</li><li>Alert management and case investigations are
        being scaled up. Investigation teams have been deployed to Bunia and Rwampara,
        with alerts under investigation in Ituri, North Kivu, South Kivu, and Tshopo
        provinces.</li><li>Contact tracing has been initiated with 541 contacts identified,
        although major operational challenges persist due to insecurity.</li><li>Data
        managers have been trained on the DHIS2 tracker, and a surveillance and digital
        health coordination meeting is being implemented to improve harmonization
        across digital platforms.</li><li>The International Organization for Migration
        (IOM) is supporting points-of-entry (PoEs) surveillance; however, informal
        crossings and weak alert management at PoEs remain significant gaps.<br /></li></ul><p><strong>Case
        Management</strong></p><ul><li>WHO and partners are supporting the ongoing
        establishment and operationalization of isolation and treatment facilities
        in affected areas</li><li>WHO and partners are working to maintain access
        to essential health and other services.</li></ul><p><strong>Laboratory</strong></p><ul><li>Laboratory
        surge capacity is being scaled-up. The Institut National de la Recherche Biom&eacute;dicale
        (INRB) teams are deploying to Bunia to establish and scale-up testing. A decentralization
        strategy is being developed to add additional field laboratories to Mongbwalu
        and Mahagi (Ituri &ndash; Uganda border). Goma laboratory is activated and
        provide testing capacities for North Kivu.</li><li>PCR kits have been sourced,
        while WHO Regional Emergency Hub in Dakar is deploying reagents, Piccolo machines,
        and cold-chain modules to strengthen field laboratory operations.</li><li>Genomic
        and epidemiological analyses are underway, and sequences have been uploaded
        through a joint publication (by DRC and Uganda) on virological.org.</li></ul><p><strong>Risk
        Communication and Community Engagement (RCCE)</strong></p><ul><li>Community
        mobilization has started in Mongbwalu, while social listening activities and
        deployment of UNICEF digital platforms (U-Report and I-Hear-You) are underway
        to improve community feedback and information sharing.</li><li>WHO is supporting
        engagement interventions with community and religious leaders</li><li>WHO
        shared a multi-country infodemic management report providing an initial analysis
        of community perceptions, including key questions, concerns, rumours, misinformation,
        and disinformation, to guide targeted risk communication and community engagement
        interventions.</li></ul><p>WHO and partners have developed a shared RCCE message
        repository to harmonize risk communication content</p><p><strong>Infection
        Prevention and Control (IPC)</strong></p><ul><li><strong></strong><span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Coordination
        mechanism for IPC response is being established under the leadership of the
        Division of Provincial Health&nbsp; and the Public Health Emergency Operations
        Centre.</span></li><li><span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\"></span><span
        style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\"></span><span
        style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Local
        human resources are being scaled-up to enable required key intervention.</span></li><li><span
        style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\"></span><span
        style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">More
        than 150 health workers have been trained on basic IPC and Ebola-specific
        measures, with an ongoing cascade training plan targeting an additional 500
        health workers.</span></li><li><span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\"></span><span
        style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\"></span><span
        style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Operational
        teams are being established and briefed for decontamination, safe and dignified
        burials and health facility assessments.</span></li><li><span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\"></span><span
        style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">IPC
        supplies including PPE are being donated to priority health facilities.</span></li></ul><p><strong>Operational
        support and Logistics</strong></p><ul><li>Over 17 tons of emergency supplies
        were shipped to DRC, including personal protective equipment (PPE), Viral
        Haemorrhagic Fever supplies, tents, body bags, infection prevention and control
        materials, stretchers, medicines and other case management supplies.</li><li>Deployment
        of EpiShuttle patient isolation transport systems, vehicles, telecommunications
        equipment, laboratory consumables, portable point-of-care diagnostic machines,
        reagents, cold-chain modules, and Ebola polymerase chain reaction (PCR) testing
        kits to strengthen clinical transport, laboratory diagnostics, and field response
        operations are ongoing.</li><li>Coordination is underway to mobilize one helicopter,
        three ambulances, and two armored vehicles to support cargo and personnel
        movement. Human resource deployment structures are being finalized and United
        Nations Humanitarian Air Service (UNHAS) is supporting staff movement to Bunia.</li><li>Global
        Logistics Cluster partners briefed on situation and work is under way for
        planning WFP/Logistics Cluster support for common partner services.</li><li>Efforts
        are ongoing with partners to provide subsidized air cargo into the region,
        and into Bunia</li><li>A four-week forecast of critical PPE requirements across
        case management, infection, prevention and control, and burial operations
        has been finalized to support sustained response activities.</li><li>A high
        priority items list has been finalized to facilitate collective monitoring.
        Item-needs calculator being finalized for sharing.</li></ul><p><strong>Border
        Health, Travel and Mass Gatherings</strong></p><ul><li>WHO travel and border
        health guidance has been disseminated across countries and transport sectors,
        emphasizing that suspected, probable and confirmed cases and their contacts
        should avoid travel unless medically evacuated, and advising against travel
        or trade restrictions and border closures.</li><li>Affected and neighbouring
        countries are strengthening their preparedness to detect, investigate, refer,
        isolate and care for any suspected cases, including activation of health emergency
        plans, enhanced screening at airports, seaports, land crossings and major
        internal transit routes.<br /></li></ul><p>Health authorities in <strong>Uganda</strong>,
        in collaboration with WHO and partners, are implementing public health measures,
        including but not limited to the following: </p><p><strong>Coordination</strong></p><ul><li>The
        Incident Management System has been activated to coordinate response to the
        outbreak, with technical support from WHO and health partners</li><li>The
        National Public Health Emergency Operations Centre and regional Emergency
        Operations Centres (EOCs) were activated in Fort Portal, Arua, Yumbe, Kampala
        Capital City Authority, Kabale, and Hoima, with the national response plan
        and rapid risk assessment finalized.</li></ul><p><strong>Surveillance and
        Laboratory</strong><strong></strong></p><ul><li>Field teams are utilizing
        Go.Data for contact tracing, benefiting from experience in implementing the
        tool during previous mpox, cholera and Sudan virus disease outbreaks.</li><li>Screening
        is being strengthened at official and informal border crossings, major transit
        routes, and pilgrimage corridors. </li></ul><p><strong>Case Management</strong></p><ul><li>Isolation
        facilities in high-risk districts have been activated and the Uganda National
        Emergency Medical Team deployed to support clinical management.</li></ul><p><strong>Laboratory</strong></p><ul><li>Sequencing
        and sample transport systems are being strengthened</li><li>A mobile laboratory
        is being deployed to Kasese near the DRC border, with a virtual diagnostics
        coordination meeting supporting cross-country laboratory operations.</li></ul><p><strong>Risk
        Communication and Community Engagement (RCCE)</strong></p><ul><li>Risk communication
        systems have been activated with community messaging and public awareness
        campaigns ongoing through District Health Officer networks, with health workers
        receiving guidance on standard precautions and public health messaging.</li></ul><p><strong>Infection
        Prevention and Control (IPC)</strong></p><ul><li><span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Advising
        health workers to remain vigilant and adhere strictly to infection prevention
        measures.</span></li></ul>","FurtherInformation":"<p></p><ul type=\"disc\"><li><a
