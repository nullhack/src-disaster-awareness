        </p><p>World Health Organization. Strengthening surveillance of and response
        to foodborne diseases. WHO; 11 December 2025.&nbsp;&nbsp;</p><p><a href=\"https://www.who.int/publications/i/item/9789240118188\"
        target=\"_blank\">https://www.who.int/publications/i/item/9789240118188</a>&nbsp;&nbsp;<br
        /></p><p>Austrian Agency for Health and Food Safety (AGES). Update: Information
        on cereulide in infant formula. AGES; 1 February 2026.&nbsp;&nbsp;</p><p><a
        href=\"https://www.ages.at/en/news/detail/update-information-zu-cereulid-in-saeuglingsnahrung\"
        target=\"_blank\">https://www.ages.at/en/news/detail/update-information-zu-cereulid-in-saeuglingsnahrung</a>&nbsp;&nbsp;<br
        /></p><p><a href=\"https://www.who.int/news-room/articles-detail/call-for-experts-and-data-on-microbiological-risk-assessment-on-powdered-formulae-for-infants-and-young-children\"
        target=\"_blank\">Call for experts and data on microbiological risk assessment
        on powdered formulae for infants and young children</a>&nbsp;</p><p>Citable
        reference: World Health Organization (13 March 2026). Disease Outbreak News;&nbsp;
        Recall of internationally distributed infant formula and products containing
        ARA oil due to contamination with cereulide toxin. Available at:&nbsp;<a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON596\">https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON596</a>&nbsp;<a
        href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2026-DON595\"></a><br
        /></p>","Summary":"Multi-country recalls of infant formula and other products
        have been initiated after cereulide toxin, was detected in batches of multiple
        internationally distributed brands. Investigations have identified arachidonic
        acid (ARA) oil, used as an ingredient in the implicated products, as the source
        of contamination. However, the full root cause analysis and complete traceability
        of all affected batches remains under investigation. Contaminated formulae,
        nutritional products, and oil mixes have been distributed to 99 countries
        and territories across six WHO Regions, with the first product recalls initiated
        on 10 December 2025. Between 1 January and 25 February 2026, 144 suspected
        and confirmed cases were reported across ten countries in three WHO Regions,
        with investigations ongoing.\r\nBased on the available information, WHO assesses
        the overall public health risk as moderate due to the vulnerability of the
        affected population (infants), the ongoing uncertainty regarding the full
        extent of distribution and exposure, and remaining gaps in case detection
        and root cause information.","PublicationDateAndTime":"2026-03-13T19:00:00Z","TitleSuffix":"","UseOverrideTitle":true,"Title":"International
        food safety event: Infant formula and products containing arachidonic acid
        oil contaminated with cereulide toxin - Multi-country","Epidemiology":"<p>Cereulide
        is a heat-stable toxin produced by certain strains of <em>Bacillus cereus</em>,
        a Gram-positive, spore-forming bacterium ubiquitous in soil, dust, and food
        production environments. The primary hazard in this event is suspected to
        have occurred during the production of ARA oils used in infant formula, although
        a root cause analysis has not yet been provided to WHO.&nbsp; </p><p>Cereulide
        is not contagious; illness occurs only when a person ingests the toxin, such
        as through consumption of contaminated products. The toxin withstands cooking
        temperatures (stable up to 121&deg;C) and common pasteurization, persisting
        in finished products. Symptoms manifest rapidly, typically within 0.5&ndash;6
        hours post-ingestion, and usually present as acute gastrointestinal symptoms
        (nausea, vomiting, abdominal pain) with risk of rapid dehydration and electrolyte
        imbalance which can be particularly severe in infants due to their physiological
        vulnerability and limited reserves. The toxin has a very low symptomatic dose
        threshold and remains fully active despite gastric conditions, contributing
        to its clinical potency. For babies who rely entirely on formula, repeated
        feedings can increase the amount of toxin consumed, and using contaminated
        formula for rehydration can worsen illness. </p><p>The absence of specific
        antidotes or targeted therapies places greater emphasis on supportive clinical
        care, effective risk communication to caregivers and health workers, and robust
        coordination between food safety and public health authorities. Where there
        is limited access to health care and where there may be delays in care seeking,
        rapid dehydration and electrolyte imbalance in infants may be fatal.</p><p>As
        of 25 February 2026, the following countries have notified suspected cases:
        Austria (9), Brazil (5),&nbsp; China, Hong Kong SAR, (1), Czechia (4), France
        (11), Italy (1), Singapore (3), Spain (41), and the United Kingdom of Great
        Britain and Northern Ireland (61). &nbsp;In other countries, including Denmark
        (32) and the Netherlands (221) the number of suspected cases is based on self-reporting
        and is therefore not comparable with the INFOSAN case definition. &nbsp;To
        date, Belgium is the only country with laboratory\u2011confirmed cases, reporting
        eight confirmed intoxications linked to the implicated products.</p>","OverrideTitle":"International
        food safety event: Infant formula and products containing arachidonic acid
        oil contaminated with cereulide toxin - Multi-country","Advice":"<p>Based
        on the information available, WHO recommends Member States to maintain epidemiological&nbsp;surveillance,
        enhance readiness of laboratory capacity for cereulide testing of suspected
        contaminated products and in clinical samples of suspected cases, and facilitate
        effective implementation of recalls and withdrawals, as needed. <br /></p>
        <p><strong>WHO advises Member States to:&nbsp;</strong>&nbsp;</p><ul><li>Identify,
        trace, and withdraw all affected products from the market.</li><li>Verify
        the effectiveness of recalls at retail and distribution levels and ensure
        that affected products are not available for sale, including online sales.</li><li>Conduct
        sampling and laboratory testing of suspect products and human specimens.</li><li>Strengthen
        requirements for traceability across the supply chain and food recalls.</li><li>Enhance
        inspection and oversight of facilities producing or handling ingredients used
        in infant nutrition.</li><li>Share relevant information through established
        international information-sharing mechanisms, including INFOSAN.</li><li>Issue
        targeted alerts to consumers, caregivers, health workers, and retailers, while
        providing clear guidance on identifying and disposing of affected products.</li><li>Promote
        breastfeeding and address barriers to accessing safe alternative nutrition.
        </li><li>Encourage early presentation to health facilities for infants with
        sudden vomiting.</li><li>Reinforce guidance on dehydration management and
        red-flag symptoms, while supporting availability of tools for safe clinical
        management of affected infants.<br /></li></ul> <p>WHO recommends that no
        restrictions be applied for travel to, or trade with, the countries named
        in this report, based on the information available on the event&nbsp;reported
        here.&nbsp;&nbsp;</p>","Assessment":"<p><p>WHO assesses the overall public
        health risk associated with this event to be Moderate. This assessment is
        based on the information currently available and reflects the wide international
        distribution of contaminated products, ongoing uncertainties regarding the
        full extent of contaminated product distribution, case detection, and root
        cause of contamination, and the vulnerability of infants and young children
        to dehydration and electrolyte imbalance from with vomiting illness associated
        with cereulide toxin ingestion. <br /></p><p>Several considerations contribute
        to this assessment:<br /></p><ul><li>Cereulide is a thermostable emetic toxin
        that can cause acute vomiting and rapid dehydration particularly in very young
        infants which can have severe consequences if untreated; mild or self-limiting
        cases are likely to go unreported, especially in settings with limited healthcare
        access or diagnostic capacities.<br /></li><li>The extent of the contaminated
        ARA oil distribution&nbsp;remains&nbsp;uncertain, as complete traceability
        from the original implicated manufacturer has not been provided to WHO.&nbsp;<br
        /></li><li>Secondary distribution through commercial supply chains has further
        complicated efforts to identify all affected products. Additional investigation
        is required to determine the source and extent of the cereulide contamination.&nbsp;
        <br /></li></ul><p>The international spread of contaminated products has already
        disrupted trade and supply chains across at least 99 countries and territories,
        with the possibility of further recalls if&nbsp;additional&nbsp;affected batches
        or product categories are&nbsp;identified. These recalls, while essential
        for public health protection, have created a&nbsp;risk of&nbsp;localized shortage
        of&nbsp;infant formula,&nbsp;particularly in settings where reliance on specific
        products is high, despite manufacturers&rsquo; efforts to increase production
        of unaffected products. A residual&nbsp;risk of exposure persists while investigations
        and traceability efforts continue,&nbsp;as competent authorities manage evolving
        distribution information and update risk communication measures.&nbsp; <br
        /></p><p>Mild clinical presentations can resemble common childhood illnesses,
        laboratory capacity for&nbsp;cereulide&nbsp;testing in contaminated products
        or human samples varies widely, and variations in case definitions across
        countries complicate consistent reporting and may delay detection.&nbsp; </p><p>Although
        limited numbers of suspected and confirmed cases have been reported to date,
        without continued investment in surveillance for toxin\u2011related events,
        strengthened laboratory networks, training of health\u2011care providers,
        and clear communication on recalls and safe alternatives, delays in detection
        and response could lead to preventable morbidity in infants.</p></p>","Overview":"<p>Since
        10 December 2025, and as of 25 February 2026, 99 countries and territories
        have been identified as having received batches of infant formula products
        subject to recall due to contamination with cereulide toxin. During this period,
        144 suspected and confirmed cases were reported across 10 countries. The epidemiological
        investigations and product\u2011traceback activities remain ongoing in many
        countries. </p><p>The case definitions in use by the International Food Safety
        Authorities Network (INFOSAN) are currently:</p> <p>Suspect case: A person
        presenting symptoms of cereulide intoxication with a history of consumption
        of the recalled product, without laboratory confirmation in a clinical sample.</p><p>Confirmed
        case: A person presenting symptoms of cereulide intoxication with a history
        of consumption of recalled product, with laboratory confirmation in a clinical
        sample.</p><p>Health authorities are actively searching for cases and conducting
        laboratory testing of human specimens and infant formula products. However,
        case definitions used may differ from those established by INFOSAN, such as
        those established by the European Centre for Disease Prevention and Control,
        creating challenges with comparability of reported case numbers. </p><p>Since
        this is not a routinely tested contaminant or condition, diagnostic challenges
        and limited surveillance capacity are hindering Member States&rsquo; ability
        to identify confirmed cases. One country has laboratory confirmed cases linked
        to the contaminated products (Belgium). </p><p>The limited case numbers appearing
        in multiple, geographically separated areas is consistent with sporadic exposures
        to contaminated products that were widely distributed. </p><p>\u200bPrecautionary
        recalls have been issued across all countries and territories where products
        were distributed. These measures aim to prevent further exposures, although
        the speed and completeness of product recall and withdrawal vary by location
        according to various factors including inspection and enforcement capacities.&nbsp;</p>","DonId":"2026-DON596","Provider":"dynamicProvider372"},{"Id":"52a263de-c5a6-4ba1-b710-dfb5fe46e025","LastModified":"2026-02-14T17:54:34Z","PublicationDate":"2026-02-14T14:07:30Z","DateCreated":"2026-02-14T14:07:30Z","IncludeInSitemap":true,"SystemSourceKey":null,"UrlName":"2026-DON595","ItemDefaultUrl":"/2026-DON595","Response":"<p><strong><em>WHO
        Response: </em></strong></p><p>WHO maintains global mpox surveillance and
        continues to provide response guidance and support for all countries, including
        access to diagnostics and vaccines through multi-partner coordination including
        through the Access and Allocation Mechanism for mpox. WHO and partners are
        establishing the longer-term International Coordinating Group for mpox vaccine
        provision (ICG) to further accelerate timely outbreak response and ensure
        sustainable support for the future. Furthermore, WHO continues to evaluate
        available rapid diagnostic tests for field use. </p><p><strong><em>Response
        measures in the United Kingdom: </em></strong></p><p>The United Kingdom Health
        Security Agency (UKHSA) continues to work closely with the National Health
        Service England, public health agencies in Scotland, Wales and Northern Ireland,
        and is monitoring the situation in the United Kingdom and undertaking public
        health actions in accordance with the <a href=\"https://www.gov.uk/government/publications/mpox-control-and-elimination-uk-strategy-2025-to-2026/mpox-control-uk-strategy-2025-to-2026\">Mpox
        control: UK strategy 2025 to 2026 </a>.</p><p>Public health information was
        made available to health care providers and the public. Contact tracing was
        completed in line with national guidance. Contacts were given appropriate
        health advice, offered vaccination, and monitored for symptoms. </p><p>All
        suspected mpox cases in the UK are tested using Orthopoxvirus-generic, MPXV-generic,
        and MPXV-specific PCR as primary testing, with clade differentiation assays
        performed on any positive samples. All samples identified as clade Ib, and
        selected samples identified as clade IIb cases undergo whole genome sequencing
        through Illumina-based workflows.<br /></p><p><strong><em>Response measures
        in India: </em></strong></p><p>Public health measures, including contact tracing
        and monitoring, were implemented to prevent onward transmission. No secondary
        case was detected.</p><p>All suspected mpox cases in India are tested using
        Orthopoxvirus\u2011generic and MPXV\u2011specific PCR with clade differentiation
        assays. Positive cases undergo whole genome sequencing through Illumina\u2011based
        workflows.</p>","FurtherInformation":"<ul type=\"disc\"><li>World Health Organization.
