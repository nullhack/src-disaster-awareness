        id=\"ftn1\"><p>[7]&nbsp;<span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Transmission-based
        precautions for the prevention and control of infections: aide-memoire. Available
        at:&nbsp;</span><a href=\"https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2\"
        style=\"text-align:inherit;text-transform:inherit;word-spacing:normal;white-space:inherit;\">https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2</a></p></div><p><strong>Citable
        reference</strong>: World Health Organization (24 December 2025). Disease
        Outbreak News; Middle East respiratory syndrome coronavirus - Global update.
        Available at: <a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON591\">https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON591</a></p>","Summary":"Since
        the beginning of 2025 and as of 21 December 2025, a total of 19 cases of Middle
        East respiratory syndrome coronavirus (MERS- CoV), including four deaths have
        been reported to WHO globally. Of the 19 cases, 17 were reported by the Kingdom
        of Saudi Arabia (KSA), and two were reported from France.\r\nBetween 4 June
        and 21 December 2025, the Ministry of Health (MoH) of KSA reported a total
        of seven cases of MERS-CoV infection, including two deaths. In addition, at
        the beginning of December 2025, the National IHR Focal Point (IHR NFP) for
        France also reported two MERS-CoV travel \u2013 associated cases; involving
        individuals with recent travel to countries in the Arabian Peninsula.\r\nThe
        notification of these latest cases does not change the overall risk assessment,
        which remains moderate at both the global and regional levels. These cases
        show that the virus continues to pose a threat in countries where it is circulating
        in dromedary camels, with regular spillover into the human population. WHO
        recommends implementation of targeted infection, prevention and control (IPC)
        measures to prevent the spread of health care-associated infections of MERS-CoV
        and onward human transmission.","PublicationDateAndTime":"2025-12-24T05:38:07Z","TitleSuffix":"","UseOverrideTitle":true,"Title":"Middle
        East respiratory syndrome coronavirus - Global update","Epidemiology":"<p>Middle
        East respiratory syndrome (MERS) is a respiratory illness caused by a coronavirus
        (MERS-CoV). The case fatality ratio (CFR) among confirmed cases is around
        37%. The CFR is calculated based solely on laboratory-confirmed infections
        and may overestimate the actual mortality rate since milder cases often go
        undetected or unreported.</p><p>Humans can contract MERS-CoV through multiple
        transmission pathways; the primary route being through direct or indirect
        contact with dromedary camels, which serve as the virus&rsquo;s natural host
        and primary zoonotic reservoir. Additionally, human-to-human transmission
        can occur via infectious respiratory particles primarily in close-contact
        situations and can also occur through direct or indirect contact; this is
        especially prominent in health-care settings. Human-to-human transmission
        of the virus has occurred in health care facilities in several countries,
        including transmission from patients to health care providers and transmission
        between patients before MERS-CoV was diagnosed. It is not always possible
        to identify patients with&nbsp;MERS\u2010CoV early or without testing because
        symptoms and other clinical features may be non\u2010specific. Outside these
        environments, there has been limited documented human-to-human transmission.&nbsp;</p><p>MERS
        can present with no symptoms (asymptomatic), mild symptoms (including mild
        respiratory issues), or severe illness leading to acute respiratory distress
        and death. Common symptoms include fever, cough, and breathing difficulties,
        with pneumonia frequently observed, though not always present. Some patients
        also experience gastrointestinal symptoms such as diarrhoea. Severe cases
        may require intensive care, including mechanical ventilation. Those at higher
        risk of severe outcomes include older adults, individuals with weakened immune
        systems, and those with chronic conditions like diabetes, kidney disease,
        cancer, or lung disorders.</p><p>The number of MERS-CoV infections reported
        to WHO substantially declined since the beginning of the COVID-19 pandemic.
        Initially, this was likely the result of epidemiological surveillance for
        SARS-CoV-2 being prioritized. Similar clinical pictures of both diseases may
        have resulted in reduced testing and detection of MERS-CoV infections. However,
        the MoH of the KSA has been working to improve testing capacities for better
        detection of MERS-CoV since the easing of the COVID-19 pandemic, with MERS-CoV
        included into sentinel surveillance testing algorithms since the second quarter
        of 2023, for samples that test negative for both influenza and SARS-CoV-2.
        In addition, recommended IPC measures (e.g., mask-wearing, hand hygiene, physical
        distancing, improving ventilation) and public health and social measures in
        the community to reduce SARS-CoV-2 transmission, (stay-at-home orders, reduced
        mobility) also likely reduced onward human-to-human transmission of respiratory
        infections including MERS-CoV. Potential cross-protection conferred from infection
        with or vaccination against SARS-CoV-2 and any reduction in MERS-CoV infection
        or disease severity and vice versa has been hypothesized but requires further
        investigation. <sup>[1,2]</sup>&nbsp;&nbsp;</p>","OverrideTitle":"Middle East
        respiratory syndrome coronavirus - Global update","Advice":"<p></p><p><strong>Surveillance:
        </strong></p><p>Based on the current situation and available information,
        WHO re-emphasizes the importance of strong surveillance by all Member States
        for acute respiratory infections, with the inclusion of MERS-CoV&nbsp;into
        the testing algorithm where warranted, and to carefully review any unusual
        patterns.&nbsp;&nbsp;</p><p><strong>Clinical Management</strong></p><p>The
        incubation period is typically 2-15 days (median 5 days), although prolonged
        incubation periods have been reported in the immunocompromised. Although mild
        disease does occur, clinicians should be aware that symptoms may frequently
        progress rapidly non-specific signs of upper respiratory tract infection,
        cough and breathlessness, to respiratory failure and cardiovascular collapse.<sup>[3]</sup><sup></sup>MERS-CoV
        infection should be managed supportively with respiratory support titrated
        to the needs of the patient; there is a wide spectrum of severity, with many
        patients requiring mechanical ventilation.</p>The largest clinical trial in
        MERS compared a combination of lopinavir&ndash;ritonavir and interferon &beta;-1b
        with placebo (95 patients).<sup>[4]</sup>&nbsp;Active treatment caused lower
        90-day mortality in hospitalized patients with laboratory-confirmed MERS (90-day
        mortality of 48% and 29% respectively). Further analysis suggested a positive
        effect only in patients treated within 7 days of symptom onset. Although there
        is increasing use of corticosteroids for some respiratory conditions (specifically
        in COVID-19 and some other forms of pneumonia), their use in MERS-CoV is of
        uncertain benefit, and harms relating to their immunomodulatory effects may
        be significant; more data are needed. The use of convalescent plasma has not
        been proven, although has been used in a limited number of patients in a non-trial
        setting. While antibiotics have been used in severe disease to presumptively
        treat concurrent bacterial infection, there are no controlled data on efficacy.
        A retrospective analysis of 349 MERS patients examined macrolide&nbsp;antibiotic
        therapy. No difference in 90-day mortality was found in the 136 patients receiving
        macrolides compated with those who did not<sup></sup>.<sup>[5]</sup><p><strong>Infection
        prevention and control:</strong></p><p>Human-to-human transmission of MERS-CoV
        in healthcare settings has been associated with delays in recognizing the
        early symptoms of MERS-CoV infection, slow triage of suspected cases and delays
        in implementing timely IPC measures. IPC measures are therefore critical to
        prevent the spread of MERS-CoV in healthcare facilities and onwards in the
        community. Healthcare workers should always apply standard precautions consistently
        with all patients and perform risk assessments at every interaction in healthcare
        settings to determine the necessary protection measures. For patients with
        suspected MERS-CoV infection that require hospitalization, place patient in
        an adequately ventilated single room away from other patient care areas. In
        addition to standard precautions. Droplet and contact precautions should be
        implemented when providing care to patients with symptoms of acute respiratory
        infection who are suspects of any respiratory disease, including probable
        or confirmed cases of MERS-CoV infection.<sup>[6,7]</sup></p><p><span style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Droplet
        and contact precautions should be maintained until the patient is no longer
        symptomatic (for at least 24 hours) and has two upper respiratory (URT) swabs
        (taken 24hrs apart) test negative in RT-PCR or according to local guidance.
        Additionally, airborne precautions should be applied when performing aerosol
        generating procedures or in settings where aerosol generating procedures are
        conducted. Early identification, case management and prompt isolation of suspected
        respiratory infected patients and cases, quarantine of contacts, together
        with appropriate IPC measures in health care settings, including improving
        ventilation in enclosed spaces and public health awareness can prevent the
        spread of human-to-human transmission of MERS-CoV.&nbsp;</span></p><p><strong
        style=\"background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;\">Public
        health and social measures:</strong></p><p>MERS-CoV appears to cause more
        severe disease in people with underlying chronic medical conditions such as
        diabetes, renal failure, chronic lung disease, and immunosuppression. Therefore,
        people with these underlying medical conditions should avoid close contact
        with animals, particularly dromedaries, when visiting farms, markets, or barn
        areas where the virus may be circulating.<br /></p><p>General hygiene measures,
        such as regular hand hygiene before and after touching animals or animal products
        and avoiding contact with sick animals, should be adhered to.&nbsp;</p><p>In
        addition, hygiene practices should be observed including the five keys to
        safer food should be followed when dealing with food items of camels; people
        should avoid drinking raw camel milk or camel urine or eating meat that has
        not been properly cooked.&nbsp;</p><p>WHO does not advise special screening
        at points of entry with regard to this event, nor does it currently recommend
        the application of any travel or trade restrictions.&nbsp;</p>","Assessment":"<p>As
        of 21 December 2025, a total of 2635 laboratory-confirmed cases of MERS-CoV
        infection have been reported globally to WHO, with 964 associated deaths.
        The majority of these cases have occurred in countries on the Arabian Peninsula,
        including 2224 cases with 868 related deaths (CFR 39%) reported from the KSA.</p><p>A
        notable outbreak outside the Middle East occurred in the Republic of Korea,
        in May 2015, during which 186 laboratory-confirmed cases (185 in the Republic
        of Korea and 1 in China) and 38 deaths were reported. However, the index case
        in that outbreak had a history of travel to the Middle East. </p><p>Three
        limited healthcare-related clusters have recently been reported from the KSA,
        two in 2024 comprised of three and two cases each, and one in 2025 comprised
        of 7 cases; the previous cluster before that had been observed in May 2020,
        also in the KSA. Extensive contact tracing was applied in the 2025 cluster,
        which lead to detection of four asymptomatic and two mild cases, who fully
        recovered. Despite these recent clusters, zoonotic spillover remains an important
        mode of human infection, leading to isolated cases and limited onwards transmission
        between humans.</p><p>Global total cases reflect laboratory-confirmed cases
        reported to WHO under IHR (2005) or directly by Ministries of Health from
        Member States. These figures may underestimate the true number of cases if
        some were not reported to WHO, as they may be missed by current surveillance
        systems and not be tested for MERS-CoV &ndash; either due to similar clinical
        presentation as other circulating respiratory diseases or because infected
        individuals remained asymptomatic or had only mild disease. The total number
        of deaths includes those officially reported to WHO through follow-up with
        affected Member States.&nbsp;</p><p>The notification of these new cases does
        not change the overall risk assessment. WHO expects that additional cases
        of MERS-CoV infection will be reported from the Middle East and/or other countries
        where MERS CoV is circulating in dromedaries, and that cases will continue
        to be exported to other countries by individuals who were exposed to the virus
        through contact with&nbsp;dromedaries&nbsp;or their products (for example,
        consumption of raw camel milk, &nbsp;camel urine, or eating meat that has
        not been properly cooked), or in a healthcare setting. Due to the similarity
        of symptoms with other respiratory diseases that are widely circulating, like
        influenza or COVID-19, detection and diagnosis of MERS cases may be delayed,
        especially in unaffected countries, and provide an opportunity for onward
        human-to-human transmission to go undetected. WHO continues to monitor the
        epidemiological situation and conducts risk assessments based on the latest
        available information.&nbsp;&nbsp;</p><p>No vaccine or specific treatment
        is currently available, although several MERS-CoV-specific vaccines and therapeutics
        are in development. Treatment remains supportive, focusing on managing symptoms
        based on the severity of the illness.</p>","Overview":"<p>Since the first
        report of MERS-CoV in the KSA and Jordan in 2012, a total 2635 laboratory-confirmed
        cases of MERS-CoV infection, with 964 associated deaths (Case Fatality Ratio
        (CFR) of 37%), have been reported to WHO from 27 countries, across all six
        WHO regions (Figure 1). The majority of cases (84%; n=2224), have been reported
        from the KSA (Figure 2). Since the beginning of 2025 and as of 21 December,
        a total of 19 cases have been reported to WHO. Overall, 17 cases were reported
        in the KSA from five regions named: Riyadh (n=10), Taif (n=3), Najran (n=2),
        Hail (n=1), and Hafr&nbsp;Al-Batin&nbsp;City (n=1) (Figure 3). In addition,
        two travel associated cases of MERS-CoV infection have been reported in France,
        with likely exposure occurring during recent travel in the Arabian Peninsula
        (Figure 3).&nbsp; </p><p>This disease outbreak news report focuses on the
        recent nine cases of MERS-CoV infection reported between 4 June - 21 December
        2025: seven cases from the KSA and the two imported cases to France. The details
        of cases reported earlier in 2025 can be referred to in the previously published
        disease outbreak news on <a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON560\">13
        March 2025</a> and <a href=\"https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON569\">12
        May 2025</a>. </p><p>Between 4 June and 21 December 2025, the MoH of the KSA
        reported a total of seven cases of MERS CoV infection. The cases were reported
        from three regions: Najran (2), Riyadh (3), and Taif (2). No epidemiological
        links were identified between the seven cases. In addition, between 2 and
        3 of December 2025, the IHR NFP for France reported two cases of MERS &ndash;
        CoV with recent travel to the Arabian Peninsula during the month of November.
        </p><p>Follow-up has been completed for all contacts and no secondary infections
        have been identified or reported. From September 2012, France has recorded
        a total of four laboratory-confirmed cases of MERS-CoV infection, including
        one death: two cases were reported in 2013, and the latest two cases in December
        2025. All cases had been travelers exposed in the Arabian Peninsula and returning
        back to France. </p><p>For additional details please see Table 1.</p><p><strong>Figure
        1:&nbsp;&nbsp;Epidemic curve of MERS-CoV infections (2635) and deaths (964)
        reported globally between 2012-2025</strong></p><p><img sf-image-responsive=\"true\"
