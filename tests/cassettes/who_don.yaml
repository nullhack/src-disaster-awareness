        of cases and deaths Global\" width=\"859\" alt=\"MERS-CoV number of cases
        and deaths Global\" sf-size=\"53988\" /></p><p><strong>Figure 2:&nbsp;Epidemic
        curve of MERS-CoV infections (2224) and deaths (868) reported in KSA between
        2012-2025</strong></p><p><img sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/products/disease-outbreak-news/mers-cov-number-of-cases-and-deaths-ksa.jpg?sfvrsn=bf2f9eb7_4\"
