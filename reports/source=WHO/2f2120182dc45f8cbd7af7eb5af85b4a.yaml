  Response: <p>Several public health measures have been implemented by local authorities, including:<br /></p><ul><li data-list="1" data-level="1">The Government of India, in close coordination with the      Government of West Bengal, initiated prompt and comprehensive public      health measures in accordance with established protocols.</li><li data-list="1" data-level="1">Investigations were conducted in collaboration with      other sectors through a One Health coordinated approach.</li><li data-list="1" data-level="1">Contact tracing has been carried out around the      identified cases, with continuous follow-up.</li><li data-list="1" data-level="1">Surveillance efforts have been strengthened and enhanced      to ensure early case detection.</li><li data-list="1" data-level="1">Health education and awareness campaigns, including      community engagement and advocacy, are ongoing.</li><li data-list="1" data-level="1">Clinicians have been sensitized and alerted to NiV. Infection prevention
    and control has been strengthened at health-care settings. </li><li data-list="1" data-level="1">Prompt sample collection, transportation, and testing      were conducted at the reference laboratory teams.</li></ul><p>The support provided by WHO includes:</p><ul><li data-list="0" data-level="1">Providing event communication support at national and      international levels, including the submission of an official IHR      notification.</li><li data-list="0" data-level="1">Monitoring of the evolving outbreak situation,      especially during the ongoing Nipah season, including support for      assessment of epidemiological patterns, risk factors, and geographic      spread.</li></ul>
