  Advice: <p>In the absence of a licensed vaccine or specific therapeutic treatment for Nipah virus disease, reducing or preventing infection in people relies on raising awareness of the risk factors. This includes providing guidance on and reinforcing risk communication messages about the measures that people can take to reduce exposure to the Nipah virus. This is also important in the context of mass gatherings, where attendees come from different countries and may be unfamiliar with disease and its mode of transmission, as well as actions they can take to protect themselves. and case management should focus on delivering timely supportive care, supported by an effective laboratory system and adequate infection prevention and control measures in health facilities. Intensive supportive care is recommended for treatment of severe respiratory and neurologic complications.&nbsp;<br /></p><p>Public health educational messages should focus on:<br /></p><p><strong>Reducing the risk of bat-to-human
    transmission</strong></p><ul><li>Efforts to prevent transmission should first focus on decreasing bat access to date palm sap and other fresh food products. Freshly collected date palm juice should be boiled, and fruits should be thoroughly washed and peeled before consumption. Fruits with signs of bat bites should be discarded. Areas where bats are known to roost should be avoided.</li></ul><p><strong>Reducing the risk of human-to-human transmission.</strong></p><ul><li>Close unprotected physical contact with NiV-infected people should be avoided. Regular hand washing should be carried out after caring for or visiting sick people along other preventive measures.</li></ul><ul><li>People experiencing Nipah-like symptoms should be referred to a health facility, as early supportive care is key in the absence of treatment. Contact tracing and monitoring are also key to mitigate human-to-human transmission. </li></ul><p><strong>Controlling infection in health care settings</strong></p><ul><li>Health
    and care workers caring for patients with suspected or confirmed infection, or handling specimens from them, should always implement standard precautions for infection prevention and control at all times, for all patients.</li><li>When caring for patients with suspected or confirmed NiV, WHO advises the use of contact and droplet precautions including a well-fitting medical mask, eye protection, a fluid-resistant gown, and examination gloves. Airborne precautions should be implemented during aerosol-generating procedures, including placing the patient in an airborne-infection isolation room and the use of a fit-tested filtering facepiece respirator instead of a medical mask. Suspected or confirmed cases of NiV should be placed in a single-patient room.&nbsp;&nbsp; For family members and caregivers visiting patients with suspected or confirmed Nipah virus, similar precautions should be applied.&nbsp;&nbsp;&nbsp; </li><li>Samples taken from people and animals with suspected NiV infection
    should be handled by trained staff working in suitably equipped laboratories.<br /></li></ul> <p>Based on the currently available information,&nbsp;WHO does not recommend any travel and/or trade restrictions.</p>
  Assessment: <p>Nipah virus (<em>Henipavirus nipahense</em>) is a rare zoonotic pathogen with a high CFR (40-75%) and no licensed vaccine or treatment. Its reservoirs are fruit bats or flying foxes (bats in the Pteropus genus), which are distributed in the coastal regions and on several islands in the Indian ocean, India, south-east Asia and Oceania. The virus can be transmitted to humans from wild and domestic animals, however, as the disease can be transmitted by domesticated animals, secondary human-to-human transmissions are also possible. Cases of Nipah virus infection were first reported in 1998 and since then have been reported in Bangladesh, India, Malaysia, Philippines and Singapore.&nbsp;The virus is present in India, with seasonal outbreaks linked to bat activities and cultural practices such as the consumption of raw date palm sap. Seasonal outbreaks occur between December and May, coinciding with the harvesting of date palm sap.<br /></p><p>This event represents the third Nipah
    outbreak reported in West Bengal, while multiple Nipah outbreaks were also documented in Kerala since 2018. In West Bengal, previous outbreaks occurred in 2001 (Siliguri) and 2007 (Nadia district). Based on the current available information, WHO assesses the overall public health risk posed by NiV at the sub-national level to be moderate, taking into consideration no availability of specific drugs or vaccines for NiV infection and the difficulty of early diagnosis. Although sensitive and specific laboratory methods exist, the symptoms during the first phase are not specific and could potentially delay a timely diagnosis, outbreak detection and response. In addition, fruit bats (<em>Pteropus spp</em>.) are the natural reservoir of NiV, and they are present in India and repeated spillover of the virus from its reservoir to the human population has been demonstrated.<br /></p><p>Human-to-human transmission has been documented in previous outbreaks, mostly reported in health-care settings
    and among family and caregivers of sick people through close contact with bodily fluids. Implementation of adequate infection prevention and control measures in health care facilities is critical to mitigate health care associated infection. <br /></p><p>The yearly number of NiV infection cases reported in India has remained relatively low since 2001, except for 2001, when 66 cases were reported and 2018 when 18 cases were reported. Over the past 5 years, a dozen confirmed cases were reported in India, all in Kerala State. Strong public health measures are implemented in India to detect and control outbreaks, including established NiV surveillance, and the availability of Rapid Response Teams (RRT) at both the Central and State levels, along with the capacity to rapidly test samples.<br /></p><p>For neighbouring countries, WHO assesses the public health risk posed by NiV at the regional level to be low. There have been no reports of cross‑border transmission, and the current outbreak
    remains geographically limited. Nevertheless, the risk of disease occurrence persists due to the shared ecological corridor of fruit bats and the history of human cases previously reported in the region. India has demonstrated strong capacity and experience in managing past NiV outbreaks.<br /></p><p>WHO assesses the public health risk posed by NiV at the global level to be low, as there has been no confirmed spread of cases outside India.</p>
  Overview: <p>On 26 January 2026, the India IHR NFP notified WHO of two confirmed NiV infection cases that occurred in West Bengal State. Preliminary laboratory testing suggested NiV infection, and confirmation was received from the National Institute of Virology, Pune on 13 January 2026.<br /></p> <p>The cases were confirmed through Reverse Transcription Polymerase Chain Reaction (RT-PCR) and Enzyme-Linked Immunosorbent Assay (ELISA) testing.<br /></p> <p>The first case is a female nurse and the second case is a male nurse. Both cases were between 20 &ndash; 30 years old, from Barasat, North 24 Parganas district. Both cases developed symptoms typical of severe NiV infection in late December 2025 and were admitted to hospital in early January 2026. As of 21 January 2026, the second case showed clinical improvement, while the first case remained under critical care. <br /></p> <p>Following the two confirmed cases, Indian health authorities identified and tested over 190 contact persons,
    including health and care workers and community contacts. All samples from contact persons tested negative for NiV.<br /></p> <p>The Indian National Centre for Disease Control, announced on 27 January that no further confirmed cases have been detected in West Bengal from December 2025 to date.</p>
