  Response: '<p>To respond to yellow fever outbreaks, public health measures have been implemented at the regional, national and various sub-national levels, including:&nbsp;</p><p><strong>Coordination</strong>&nbsp;</p><p>The countries have implemented coordination actions to respond to the identified yellow fever cases and outbreaks, focusing on strengthening preventive measures, improving surveillance and implementing vaccination actions.</p><ul type="disc"><li data-list="30" data-level="1"><strong>Bolivia</strong> has conducted interprogrammatic and      intersectoral coordination, including coordination with the Autonomous      Municipal Governments, through the Emergency Operating Committees (COEM by      its acronym in Spanish), involving the Departmental Immunization Committees      (CDI by its acronym in Spanish), the technical teams of the Expanded      Program on Immunization (PAI by its acronym in Spanish) and epidemiology      of the Departmental Health Services, Social Organizations,
    SENASAG,      Ministry of Education, among others to respond to the identification of      Cases.&nbsp;</li></ul><ul type="disc"><li data-list="21" data-level="1"><strong>Brazil</strong> has installed the Emergency Operational      Committee for Dengue and other Arboviruses, and a meeting of the Technical      Advisory Committee on Arboviruses (CTA-Arbovirus) has been held, with the      participation of the Minister of Health, members of the CTA, and ad hoc      experts.&nbsp;The Emergency Operational Committee has convened meetings      with the states of Amap&aacute;, Minas Gerais, Par&aacute;, S&atilde;o Paulo and Tocantins to      align actions in response to yellow fever.&nbsp;</li></ul><ul type="disc"><li data-list="22" data-level="1"><strong>Colombia </strong>has issued regulations that organise      and update guidelines for preparedness, organization, and response to alert      and emergency situations in municipalities with yellow fever cases.      Additionally, it declared
    a health emergency throughout the national      territory due to the active circulation of the yellow fever virus. It has      also carried out national risk assessments to define the level of risk for      the country. The last assessment conducted in epidemiological week 16      (ending date 19 April 2025) escalated the general risk level of the      country from high risk to very high risk.&nbsp;</li></ul><ul type="disc"><li data-list="3" data-level="1">In <strong>Ecuador</strong>, following the confirmation of      the first case of yellow fever in 2025, the Ministry of Public Health      (MSP), in coordination with the National Institute for Public Health      Research (INSPI) and the WHO, undertook actions to assess the existence of      risks and take the necessary measures to protect the population.&nbsp;</li></ul><ul type="disc"><li data-list="29" data-level="1">In <strong>Peru</strong>, multisectoral actions have been      carried out under the One Health approach between the
    Ministry of Health,      the National Agrarian Health Service, the National Forest and Wildlife      Service, and the National Service of Natural Areas Protected by the State,      mainly to promote integrated surveillance of yellow fever.&nbsp;</li></ul><p>At the regional level, in February 2025, the WHO conducted a rapid risk assessment to assess the risk to public health associated with the increase in yellow fever cases in the last quarter of 2024 and early 2025 in endemic countries of the Americas Region. The assessment concluded that the overall risk of this event in the Region of the Americas, especially in endemic countries, was classified as &ldquo;High" with a "High" confidence level based on the available information. &nbsp;<strong></strong></p><p><strong>Surveillance</strong></p><p>Regarding epidemiological surveillance actions in the countries that have reported cases during 2025, the following actions are implemented:&nbsp;</p><ul type="disc"><li data-list="13" data-level="1"><strong>Bolivia</strong>,
    in accordance with national protocols for the      immediate notification of suspected cases, Bolivia has implemented response      measures including, sample collection from suspected cases, activation of      rapid response teams, active case-finding in communities and health      facilities, rapid vaccination monitoring, risk analysis related to the potential      urbanization of the jungle mosquito vectors. Active search for      unvaccinated febrile patients in affected areas and neighbouring      communities, as well as monitoring and follow-up of contingency actions.      In addition, active case detection is carried out in areas or communities      where cases or deaths in non-human primates have been reported. Investigations      and notifications of epizootics in non-human primates have also been      initiated to support early detection and control efforts.&nbsp;&nbsp;</li></ul><ul type="disc"><li data-list="1" data-level="1"><strong>Brazil</strong>&nbsp;has published informative
    notes that update      the epidemiological scenario of yellow fever and present the results of      the workshop of the Yellow Fever Modelling Group, highlighting the      priority municipalities to intensify surveillance and immunization during      the 2024/2025 seasonal monitoring period, in support of arbovirus      surveillance and control actions. Workshops have been held in municipalities      of Minas Gerais and S&atilde;o Paulo to strengthen surveillance strategies, update      and discuss yellow fever risk models and define priority areas for      surveillance and immunization actions. Technical support has been provided      to municipalities for the investigation of suspected and confirmed cases in      human and non-human primates. &nbsp;In      addition, technical visits are made to the states to support the      surveillance and control of arboviruses.&nbsp;</li></ul><ul type="disc"><li data-list="20" data-level="1">In&nbsp;<strong>Colombia</strong>,&nbsp;the departments      with
    active cases continue to deploy immediate response teams to carry out      public health actions. These actions include epidemiological field      investigations, rapid coverage monitoring, institutional active search,      active community search, entomological studies, contact tracing, and      actions related to the vector-borne disease program.&nbsp;</li></ul><ul type="disc"><li data-list="17" data-level="1">In&nbsp;<strong>Ecuador</strong>, health brigades are      actively intervening in the prioritized sectors, reinforcing preventive      and control actions.&nbsp;&nbsp;</li></ul><ul type="disc"><li data-list="24" data-level="1"><strong>Peru&nbsp;</strong>has implemented actions aimed      at strengthening surveillance and human resource skills for the detection      and notification of suspected cases and outbreak control with a community      approach. Active institutional search including febrile icterohemorrhagic (jaundice      and haemorrhage) syndrome as a differential diagnosis.o
    &nbsp;Additionally, it has issued a national      epidemiological alert and regional alerts and has implemented the      Situation Room for Vaccine-Preventable Diseases. In addition, surveillance      of yellow fever in non-human primates (epizootics) has been promoted      within the framework of the surveillance and integrated response of      zoonoses; in this regard, there is a multisectoral tool developed for the      integrated surveillance of yellow fever in non-human primates, with the      start of pilots in the San Mart&iacute;n and Ucayali regions during 2025.&nbsp;</li></ul><p>At the regional level, WHO has implemented the following actions:&nbsp;</p><ul type="disc"><li data-list="11" data-level="1">Publication of technical guidance documents for      use at the subnational and national levels, including case definitions,      instructions for sample collection and references to laboratories, as well      as guidelines for the management of control efforts.&nbsp;</li></ul><ul
    type="disc"><li data-list="5" data-level="1">Preparation and maintenance of a detailed map of      yellow fever risk areas in the Region of the Americas, based on associated      environmental conditions.&nbsp;</li></ul><ul type="disc"><li data-list="34" data-level="1">To facilitate access to historical and current      information on yellow fever cases in the region, the <a href="https://shiny.paho-phe.org/yellowfever/">Yellow Fever Dashboard in the Region of the Americas</a> was      published, allowing for the monitoring of the situation at both regional      and country levels.&nbsp;</li></ul><ul type="disc"><li data-list="0" data-level="1">Regional alerts, epidemiological updates and risk      assessments have been issued, including recommendations for Member      States.&nbsp;</li></ul><ul type="disc"><li data-list="33" data-level="1">Face-to-face trainings and webinars on      epidemiological surveillance, epizootic surveillance and entomology of      yellow fever have been conducted
    for endemic countries.&nbsp;</li></ul><ul type="disc"><li data-list="28" data-level="1">&nbsp;Support has been provided to member states      in implementing epizootic and entomological surveillance.&nbsp;</li></ul><p><strong>Laboratory</strong>&nbsp;</p><p>At the&nbsp;country level, the following actions have been carried out:&nbsp;&nbsp;</p><ul type="disc"><li data-list="8" data-level="1">Implementation of guidelines for sample      collection and processing.&nbsp;</li></ul><ul type="disc"><li data-list="14" data-level="1">Brazil maintains stocks of RT-PCR diagnostic      tests available in the country''s public health laboratory network. In      addition, it has advanced the sequencing of 13 complete genomes of the      virus from human samples of cases registered in the state of Par&aacute;.&nbsp;</li></ul><ul type="disc"><li data-list="19" data-level="1">In Colombia, samples of suspected cases of yellow      fever are sent to the departmental public health laboratory. This      laboratory
    sends samples for processing to the National Reference      Laboratory of the National Institutes of Health. Through the Arbovirus      Laboratory of the Virology Group at the National Institute of Health, the      detection of yellow fever is carried out through serological or      virological studies, making this the only centre in Colombia that performs      such detection.&nbsp;</li></ul><p>At the&nbsp;regional level, WHO has implemented the following actions:&nbsp;</p><ul type="disc"><li data-list="9" data-level="1">Strengthening of the laboratories within the      Network of Arbovirus Diagnostic Laboratories of the Americas, providing      guidelines, protocols, and reagents.&nbsp;</li></ul><ul type="disc"><li data-list="15" data-level="1">Publication of recommendations for laboratory      surveillance and diagnosis of yellow fever.&nbsp;</li></ul><ul type="disc"><li data-list="7" data-level="1">Providing technical assistance and monitoring laboratories      in endemic countries.&nbsp;</li></ul><ul
    type="disc"><li data-list="32" data-level="1">An external quality assessment for the molecular detection      of yellow fever was conducted in 18 laboratories from the 13 endemic      countries.&nbsp;</li></ul><p><strong>Case Management</strong>&nbsp;</p><p>At the regional level, an international technical group of experts on re-emerging diseases supports technical cooperation activities at the country level. In addition, the countries in the Region have implemented protocols and clinical guidelines for the management of yellow fever cases. Some of the specific actions taken by countries that have registered cases include:&nbsp;</p><ul type="disc"><li data-list="4" data-level="1">Improvement of health services in the areas of case      presentation and training on yellow fever for health personnel, including doctors      and nurses, to ensure timely care of yellow fever cases.&nbsp;</li></ul><ul type="disc"><li data-list="18" data-level="1">Close clinical monitoring of cases to identify
    warning      signs and progression to severe forms. Establishment of health centres for      the referral of severe cases and the timely referral of serious cases to      hospitals with greater resolution capacity.&nbsp;</li></ul><p><strong>Immunization</strong>&nbsp;</p><ul type="disc"><li data-list="12" data-level="1">In&nbsp;<strong>Bolivia</strong>, when cases are      identified, actions are taken to vaccinate individuals      around detected cases, tracing, and control vaccination cards. In      addition, vaccinations have been carried out at transit points, and      orientations have been conducted for people who regularly travel to areas      with a high incidence of yellow fever in the country.&nbsp;</li><li data-list="12" data-level="1">In&nbsp;<strong>Brazil,</strong>&nbsp;vaccination strategies have been constantly reinforced through technical notes.      Vaccine doses are distributed according to the standard schedule, and      additional doses are distributed according
    to state demand.&nbsp;&nbsp;</li></ul><ul type="disc"><li data-list="10" data-level="1"><strong>Colombia</strong>&nbsp;has issued circulars establishing transitional      measures for the implementation of vaccination against yellow fever from 9      months of age in the municipalities of the endemic corridor. These are the      criteria to extend vaccination to people over 59 years of age in the      endemic corridor of 54 prioritized villages in the municipalities of      Tolima, where human cases or epizootics have occurred. Within the      framework of the emergency declaration, a strategy of mobilization and      intensification of vaccination was implemented, which includes a risk      classification for municipalities. This classification, which is regularly      updated on the website of the <a href="https://www.minsalud.gov.co/sites/english/Pages/default.aspx">Ministry of Health and Social Protection</a> and includes: very high-risk      municipalities, where there is active
    circulation of the virus, human      cases, epizootics or presence in eco-epidemiological corridors; high-risk      municipalities, with environmental conditions that favour the possible      appearance of cases; and low-risk municipalities, where there are      currently no conditions for the appearance of outbreaks.&nbsp;&nbsp;</li></ul><ul type="disc"><li data-list="2" data-level="1">In&nbsp;<strong>Ecuador</strong>, priority has been given      to the groups at greatest risk: the population between 12 months and 59      years of age, people with high internal mobility, miners, farmers, poultry      workers and those who plan to travel to endemic areas, for vaccination      actions against yellow fever. Additionally, the country has implemented an      obligation to present the International Certificate of Vaccination upon      arrival in the country to travellers from Peru, Colombia, Bolivia and      Brazil, effective since 12 May 2025. &nbsp;</li></ul><p>At the regional level, WHO
    promotes mass vaccination campaigns. Guidelines for stock management have been published. In addition, countries in the Region have implemented the methodology of "Microplanning of high-quality vaccination activities" in routine programs or vaccination intensification campaigns. This methodology enabled a focus on detailed planning at the local level to optimize access and a timely response to vaccine-preventable disease outbreaks.&nbsp;</p><p><strong>Entomological Surveillance and Vector Control</strong>&nbsp;</p><p>At the regional level, vector surveillance and control capacities that were developed as part of the arbovirus response are being leveraged for surveillance in countries where yellow fever outbreaks have occurred. In addition, the countries that have registered cases have implemented the following actions:&nbsp;</p><ul><li><strong>Bolivia</strong> has implemented actions to eliminate breeding sites in peri-urban and rural areas, conducted focal fumigation in communities
    with active outbreaks and maintained entomological surveillance.</li></ul><ul type="disc"><li data-list="25" data-level="1"><strong>Brazil </strong>has published a technical note containing      guidelines on vector control actions of&nbsp;<em>Aedes aegypti</em>&nbsp;and&nbsp;<em>Aedes albopictus</em>&nbsp;in places with suspected or confirmed human and/or      non-human primate cases of yellow fever. In addition, it has conducted a collection      of fauna for entomological surveillance in the municipality of Breves,      state of Par&aacute;.&nbsp;</li></ul><ul type="disc"><li data-list="23" data-level="1"><strong>Ecuador</strong> has proposed the installation of various      entomological traps to facilitate early detection and an effective      response to possible outbreaks, with the support of the National Institute      for Public Health Research. &nbsp;Likewise, comprehensive healthcare teams      are carrying out investigations of larvae and pupae to control mosquito      breeding
    foci.&nbsp;</li></ul><p><strong>Risk Communication and Community Engagement</strong>&nbsp;</p><p>In countries where outbreaks have occurred, risk communication and community engagement have been enhanced to reinforce their commitment to immunization and recommended actions.&nbsp;</p><ul type="disc"><li data-list="16" data-level="1">The countries of the Region have Safe Vaccination      Committees, which play a fundamental role in risk communication and the      development of messages and technical information for the different target      audiences. They also assist in analyzing and responding to Events      Presumably Attributable to Vaccination or Immunization, ensuring an      evidence-based approach.&nbsp;</li></ul><ul type="disc"><li data-list="31" data-level="1">Countries with cases disseminate publications      regarding the health risk posed by yellow fever, as well as audiovisual      materials aimed at preventing and recognizing signs and symptoms and      seeking medical
    attention. To achieve this, they use various means and      communication channels, such as institutional website and social networks.</li></ul><ul type="disc"><li data-list="27" data-level="1">Publications have been issued to alert travellers      and people who go to areas at risk for yellow fever to take the necessary      protective measures, including the verification of the history of      vaccination or application of the vaccine against yellow fever at least 10      days before their trip.&nbsp;</li></ul><ul type="disc"><li data-list="6" data-level="1">&nbsp;Brazil has conducted training in the use of      SISS-Geo for participatory community policing. Additionally, it utilizes      other means to alert the population through the social networks of the      Ministry of Health and the State and Municipal Health Secretariats.&nbsp;</li></ul>'
