  Title: Yellow fever - Region of the Americas
  Epidemiology: <p>Yellow fever is an epidemic-prone, vaccine-preventable disease caused by an arbovirus transmitted to humans primarily through the bites of an infected&nbsp;<em>Aedes spp.</em>&nbsp;and&nbsp;<em>Haemagogus spp.</em>&nbsp;mosquitoes. The incubation period ranges from 3 to 6 days. Many infected people do not experience symptoms, but when they occur, the most common are fever, muscle pain with prominent back pain, headache, loss of appetite, and nausea or vomiting. In most cases, symptoms disappear after 3 to 4 days. However, a small percentage of cases progress to a more severe, toxic phase characterized by systemic infection affecting the liver and kidneys. These individuals may have high-grade fever, abdominal pain with vomiting, jaundice and dark urine caused by acute liver and kidney failure. Bleeding may also occur from the mouth, nose, eyes, or gastrointestinal tract.&nbsp; Among those who develop severe disease, approximately 50% may die within 7 to 10 days. Yellow
    fever is prevented by an effective vaccine, which is safe and affordable. A single dose of yellow fever vaccine is sufficient to confer sustained immunity and life-long protection against yellow fever disease. A booster dose of the vaccine is not needed. The vaccine induces effective immunity in 80&ndash;100% of recipients within 10 days, and in more than 99% of people within 30 days.</p>
  Advice: <p>Yellow fever is an epidemic-prone, mosquito-borne vaccine-preventable disease transmitted to humans by infected mosquitoes, primarily&nbsp;<em>Aedes sp</em>. and&nbsp;<em>Haemagogu</em>s species. The urban proliferation of&nbsp;<em>Aedes spp.</em>&nbsp;mosquitoes, particularly&nbsp;<em>Aedes aegypti,</em>&nbsp;which are active during the day, can significantly amplify transmission, especially in densely populated areas.&nbsp;</p><p><strong>Surveillance:</strong>&nbsp;WHO emphasizes the importance of active surveillance, cross-border coordination, and information sharing. Investigating and testing suspected cases is crucial for controlling and preventing outbreaks. It is recommended that surveillance be enhanced with investigations and laboratory tests of suspected cases.&nbsp;</p><p><strong>Vaccination as a Primary Prevention Tool:</strong>&nbsp;Vaccination is the primary means for preventing and controlling yellow fever. The WHO's <a href="https://www.who.int/initiatives/eye-strategy">Eliminate
    Yellow Fever Epidemics (EYE) strategy</a> prioritizes vaccination in countries reporting yellow fever, integrating it into routine immunization schedules for individuals aged 9 months and above. WHO supports the expansion of vaccination coverage through routine programs and mass vaccination campaigns to enhance communal immunity.&nbsp;</p><p><strong>Vector Control and Risk Communication:</strong>&nbsp;Effective vector control in urban settings, along with general mosquito bite avoidance strategies, is recommended to prevent disease transmission. WHO urges Member States to inform travellers about yellow fever risks, preventive measures, and to seek immediate medical attention if symptoms arise. This approach helps prevent the establishment of local transmission cycles through infected travellers.&nbsp;</p><p><strong>International Travel and Trade:</strong>&nbsp;All international travellers aged 9 months and above heading to areas at risk of yellow fever transmission (i.e. areas with evidence
    of persistent or periodic yellow fever virus transmission), as determined by WHO, are advised to get vaccinated. The vaccine is deemed safe and effective, offering lifelong protection. However, vaccination recommendations for infants under 9 months, as well as for pregnant or breastfeeding women, are nuanced, advocating for vaccination in high-risk scenarios after weighing the benefits against potential risks.&nbsp;</p><p>Under the IHR, it is a country&rsquo;s prerogative to require proof of yellow fever vaccination from incoming and/or outgoing travellers. For international travel purposes, the administration of yellow fever vaccine shall be documented in the International Certificate of Vaccination or Prophylaxis (ICVP); and the documented administration of one single dose of WHO-approved yellow fever vaccine, conferring lifelong immunity, shall be accepted as valid.&nbsp;</p><p>Given the evolving nature of yellow fever transmission, WHO advises Member States to remain updated with
    the latest information and guidelines available on the WHO International Travel and Health website. Local health authorities are encouraged to collaborate closely with WHO and other relevant stakeholders to implement effective yellow fever prevention and control measures, ensuring the safety and well-being of populations at risk.&nbsp;</p><p>WHO advises against imposing travel or trade restrictions related to the current yellow fever outbreak in the Region of the Americas. Continuous efforts to educate travellers on preventive measures, including vaccination, are encouraged.</p>
  Assessment: '<p>Yellow fever is an acute haemorrhagic disease endemic to, or with endemic regions in twelve countries and one territory in the Americas Region: Argentina, the Plurinational State of Bolivia, Brazil, Colombia, Ecuador, French Guiana, Guyana, Panama, Paraguay, Peru, Suriname, Trinidad and Tobago, and the Bolivarian Republic of Venezuela.&nbsp;&nbsp;</p><p>Clinically, yellow fever can be difficult to distinguish from other viral haemorrhagic fevers, such as arenavirus, hantavirus, or dengue. In context, where dengue outbreaks are ongoing, early diagnosis can be particularly challenging, especially in settings where healthcare workers may have limited experience in recognizing and managing yellow fever cases. The disease has historically caused numerous epidemics with high mortality rates.&nbsp;&nbsp;</p><p>From 1960 to 2022, a total of 9,397 confirmed cases of yellow fever, including 3,315 deaths, were reported in the Americas. The majority of these cases were reported by
    three countries: Bolivia 16% (1553 cases, including 516 deaths), Brazil 36% (3443 cases, including 1192 deaths), and Peru 35% (3281 cases, including 1343 deaths). In 2023, four countries in the Region of the Americas reported 41 confirmed cases of yellow fever, including 23 deaths: Bolivia (five cases, including two deaths), Brazil (six cases, including four deaths), Colombia (two cases including one death), and Peru (28 cases, including 16 deaths) (Figure 2).&nbsp;&nbsp;</p><p>In 2024, 61 human cases of yellow fever were confirmed in the Americas, resulting in 30 fatalities, distributed across five countries. Bolivia reported eight cases, including four deaths; Brazil reported eight cases, including four deaths; Colombia reported 23 cases, including 13 deaths; Guyana reported three cases; and Peru reported 19 cases, including nine deaths.&nbsp;&nbsp;</p><p>The public health risk in yellow fever-endemic countries in the Region of the Americas is considered "high" based on the WHO Rapid
    Risk Assessment conducted in February 2025, given the increase in yellow fever cases in the last quarter of 2024 and early 2025. Most cases reported during 2024 did not have a documented history of yellow fever vaccination. Even though regional yellow fever vaccine coverage levels were not optimal before the COVID-19 pandemic (61%), vaccination coverage declined significantly between 2020 and 2023, increasing the number of susceptible populations in all endemic countries. In 2023, Ecuador and Guyana achieved yellow fever vaccine coverage greater than or equal to 95%, and only two countries, Suriname and Trinidad and Tobago, had coverage between 90% and 94%. In addition, six countries had yellow fever vaccine coverage of less than 80%: Argentina, the Plurinational State of Bolivia, Brazil, Panama, Peru, and the Bolivarian Republic of Venezuela. </p><p>The occurrence of yellow fever cases outside of the Amazon basin in Colombia (Tolima) and Brazil (S&atilde;o Paulo) is concerning. In the
    newly affected areas of Colombia, populations are largely susceptible in the absence of prior large-scale preventive interventions.</p><p>The risk of introduction into urban settings exists in the Americas whenever sylvatic transmission cycles are increased, with potential for international spread if urban contingency measures are inadequate. </p><p>The increase in confirmed yellow fever cases in the Americas has highlighted the need to strengthen surveillance, vaccination of at-risk populations, and risk communication strategies for people moving to areas where vaccination is recommended. The systematic exposure of yellow fever cases to sylvatic-related activities, whether occupational or for leisure, stresses the need for approaches targeting individuals working in wild or forested areas, such as loggers, farmers, and ecotourism professionals. Best practices in clinical management, with an emphasis on early recognition and detection, timely referral, and treatment of severe cases,
    must be disseminated to healthcare workers in endemic areas. In addition, countries should have vaccine stockpiles, depending on vaccine availability, to ensure a rapid response to possible outbreaks. The overall risk of this event in the Region Americas, especially in endemic countries, is classified as high.</p><p>Although endemic countries in the Americas have strengthened surveillance, laboratory diagnostics, and vaccination capacities, the global supply of yellow fever vaccines has been fluctuating in recent years, which can reduce access to vaccination for susceptible people and lead to a lack of response to yellow fever outbreaks. As of early 2025, the available yellow fever vaccine supply for the region is also severely constrained and insufficient to cover the routine regional demand for the year.&nbsp;</p>'
  Overview: "<p>Between 29 December 2024 and 26 April 2025 (with data\r\nfor Ecuador as of 2 May 2025),\r\na total of 212 confirmed human cases of yellow fever, including 85 deaths (CFR 40%),\r\nhave been reported to WHO by five countries in the Region of the Americas. The\r\ncases were reported from the following countries: Plurinational State of\r\nBolivia (three cases, including one death (CFR 33%)); Brazil (110 cases,\r\nincluding 44 deaths (CFR 40%)); Colombia (60 cases, including 24 deaths (CFR\r\n40%)); Ecuador (four fatal cases (CFR 100%)) and Peru (35 cases, 12 deaths (CFR\r\n34%)) (Figure 1).&nbsp;\r\n<o:p></o:p></p><p>In\r\n2024, human cases of yellow fever were reported mainly across the Amazon region\r\nof Bolivia, Brazil, Colombia, Guyana, and Peru. In 2025, however, cases have\r\nbeen detected mainly in areas outside the Amazon region, including in the state\r\nof S&atilde;o Paulo, Brazil and the Tolima department, Colombia.&nbsp; The 212 confirmed\r\nyellow fever cases reported\
    \ so far in 2025 in the Americas represent a\r\nthreefold increase compared to the 61 confirmed cases reported in 2024.</p><p><strong>Figure\r\n1. Confirmed human cases of yellow fever by country and epidemiological week of\r\nonset of symptoms in the Region of the Americas, as of 26 April 2025 * (n= 212)</strong>&nbsp;<o:p></o:p></p><p><img sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/yf-epi-curve-for-paho.jpg?sfvrsn=885166fe_4\" height=\"577\" style=\"max-width:100%;height:auto;\" title=\"YF Epi curve for PAHO\" width=\"1828\" alt=\"Yellow fever Epi curve for PAHO\" sf-size=\"60034\" /></p><p>Note: *<em>Data on the number of confirmed cases of yellow fever in Ecuador are current as of 2 May 2025.&nbsp;</em></p><p>Source: Adapted from data provided by countries or published by national Ministries of Health.&nbsp;</p><p><strong>Figure\r\n2: Geographical distribution of confirmed human cases of yellow fever by year,\r\
    \nRegion of the Americas, 2023-2025, as of 26 April 2025</strong></p><p><img sf-image-responsive=\"true\" src=\"https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/yf-distribution-paho.jpg?sfvrsn=5a5d4c1f_4\" height=\"967\" style=\"max-width:100%;height:auto;\" title=\"YF distribution PAHO\" width=\"1369\" alt=\"Yellow fever distribution PAHO\" sf-size=\"304655\" /><o:p></o:p></p><p>Source: Adapted from data provided by countries or published by national Ministries of Health.&nbsp;<br /></p> <p><strong>Overview by countries&nbsp;</strong>&nbsp;<br /></p> <p><strong>Bolivia (Plurinational Stat</strong><strong>e of)</strong>&nbsp;</p><p>Since the beginning of 2025, Bolivia has reported three confirmed human cases of yellow fever, including one fatal case (CFR 33%), as of 26 April 2025. The cases were reported in the departments of Beni (one case), La Paz (one fatal case), and Tarija (one case). The fatal case had no history of yellow fever vaccination, whereas\
    \ the other two cases reported having been vaccinated. All three cases were confirmed by Reverse Transcriptase Polymerase Chain Reaction (RT-PCR) testing and had a history of entering forested areas. Additionally, an epizootic event (death of non-human primates) was confirmed in the municipality of San Buenaventura in the department of La Paz.&nbsp;<br /></p> <p><strong>Brazil</strong>&nbsp;</p><p>Since the beginning of 2025, Brazil reported 110 confirmed human cases of yellow fever, including 44 fatal cases (CFR 40%), as of 26 April 2025. Cases were reported in the states of Minas Gerais (10 cases, including five deaths), Par&aacute; (44 cases, including seven deaths), S&atilde;o Paulo (55 cases, including 31 deaths), and Tocantins (one fatal case). The majority of cases (95 cases; 89.6 %) were male, with ages ranging from 10 to 75 years. Symptom onset occurred between 2 January and 2 April 2025. Only one case had a documented history of yellow fever vaccination.&nbsp;</p><p>All cases\
    \ reported exposure to wild and/or forested areas, either through occupational or recreational activities.&nbsp;&nbsp;<br /></p> <p><strong>Colombia</strong>&nbsp;</p><p>Since the beginning of the yellow fever outbreak in early 2024 through 26 April 2025, a total of 83 confirmed yellow fever cases, including 37 deaths, have been reported in Colombia. </p><p>In 2025, a total of 60 confirmed cases of yellow fever were reported, including 24 deaths, as of 26 April 2025. The cases were residents of the following departments:&nbsp; Caldas (one fatal case), Cauca (one fatal case), Guaviare (one fatal case), Meta (two fatal cases), Putumayo (three cases, including one death), and Tolima (52 cases, including 18 deaths). The cases ranged in age from 2 to 83 years, with onset of symptoms between 6 January and 18 April 2025. All cases had a history of exposure to areas classified as at risk for yellow fever, defined by the country. Only two of the confirmed cases had a documented history of yellow\
    \ fever vaccination.&nbsp;<br /></p> <p>As of 29 April 2025, 29 yellow fever epizootics in non-human primates have been reported, including 27 in the department of Tolima and two in the department of Huila.&nbsp;<br /></p> <p><strong>Ecuador</strong>&nbsp;</p><p>Since the beginning of 2025 and as of 2 May, four confirmed fatal cases of yellow fever have been reported, from the provinces of Morona Santiago (one fatal case) and Zamora Chinchipe (three fatal cases). The cases ranged in age from 25 to 55 years, with onset of symptoms between 16 March and 2 May 2025. All four cases had a history of exposure in wild and/or forested areas, due to occupational activities, and were confirmed by RT-PCR.&nbsp;</p><p><strong>Peru</strong>&nbsp;</p>Since the beginning of 2025, 35 confirmed cases of yellow fever, including 12 deaths, were reported in the Departments of Amazonas (22 cases, including seven deaths), Hu&aacute;nuco (one fatal case), Jun&iacute;n&nbsp;(three cases), Loreto (two cases,\
    \ including one death) and San Martin (seven cases, including three deaths), as of 26 April 2025. Of the confirmed cases, 31 (88.6%) were male, with ages ranging from 6 to 57 years,&nbsp;and date of onset of symptoms between 15 January and 12 April 2025. All cases had a history of exposure in wild and/or forested areas, due to agricultural work activities, and 71.8% of the cases had no history of vaccination against yellow fever<em>.</em>&nbsp;"
