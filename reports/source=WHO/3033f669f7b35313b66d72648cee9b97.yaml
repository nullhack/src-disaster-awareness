  Response: <p>The Government of Viet Nam has taken the following public health response actions:</p> <ul type="disc"><li data-list="0" data-level="1">Conducting epidemiolocal investigation, and disinfection of the patient&rsquo;s residence      and suspected exposure areas. </li><li data-list="0" data-level="1">Contact tracing, isolation, testing and monitoring for close contacts of the      patient.</li><li data-list="0" data-level="1">Testing of samples from chickens and ornamental birds near the patient&rsquo;s residence.      All samples collected from these birds have tested negative for influenza      A(H5) viruses.</li><li data-list="0" data-level="1">Issuing an      official letter requesting the Provincial Department of Health of Khanh      Hoa province to prepare drugs (Oseltamivir), and other supplies, to timely      support the local hospitals and authorities in patient management and      containment of potential outbreaks.</li></ul>
