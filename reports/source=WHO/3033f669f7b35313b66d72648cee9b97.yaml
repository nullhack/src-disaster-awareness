  Summary: "The World Health Organization (WHO) was notified about a case of human infection with an influenza A(H5N1) virus on 25 March 2024 by the national authorities of Viet Nam.\r\n\r\nThe patient, who had no underlying medical conditions, developed symptoms on 11 March and died on 23 March. Exposure to birds was ascertained to have taken place in the third week of February. Samples collected from close contacts tested negative for influenza A(H5N1) virus.\r\n\r\nThis is the first human infection with an avian influenza A (H5N1) virus reported in Viet Nam since 2022.\r\n\r\nAccording to the International Health Regulations (IHR) 2005, a human infection caused by a novel influenza A virus subtype is an event that has the potential for high public health impact and must be notified to the WHO.\r\n\r\nBased on available information, WHO assesses the risk to the general population posed by this virus as low."
