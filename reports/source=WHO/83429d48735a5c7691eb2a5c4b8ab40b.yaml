  Title: Chapare haemorrhagic fever- the Plurinational State of Bolivia
  Epidemiology: '<p>CHHF is a rare zoonotic disease caused by the CHAPV, a group of viruses belonging to the&nbsp;<em>Mammarenavirus</em>&nbsp;genus of the&nbsp;<em>Arenaviridae</em>&nbsp;family. These viruses are primarily transmitted to humans through infected rodents that serve as their natural hosts. Human transmission of&nbsp;<em>Mammarenaviruses&nbsp;</em>occurs mainly by inhalation of fine aerosol particles contaminated with virus-infected rodent excreta, such as urine, feces, or saliva. &nbsp;Human-to-human transmission is uncommon but has been documented, particularly in healthcare settings where infection prevention and control (IPC) measures are inadequate. This mode of transmission occurs through contact with the blood or bodily fluids of infected individuals and can be amplified during aerosol-generating medical procedures.</p><p>The incubation period ranges from 4 to 21 days, after which individuals may develop symptoms including fever, headache, muscle aches, vomiting, diarrhea,
    and in severe cases, haemorrhagic manifestations. Due to the nonspecific nature of early symptoms, CHHF can be challenging to diagnose, often requiring laboratory confirmation through methods like real-time polymerase chain reaction.</p><p>Currently, there is no specific antiviral treatment for CHHF; management focuses on supportive care to alleviate symptoms and maintain vital organ function. Case fatality rates for CHAPV infections range from 15% to 30% in untreated patients, with rates as high as 67% reported during outbreaks. Preventive measures emphasize reducing human exposure to rodent populations and implementing stringent IPC practices in healthcare settings to mitigate the risk of transmission.</p><p>CHHF is currently known to only occur in Bolivia. In the last 20 years, four outbreaks have been documented in the country. The first was reported in 2003 in Chapare Province, Cochabamba Department, involving a single fatal case. In 2019, a second outbreak occurred in La Paz Department,
    resulting in nine cases, including four deaths (case fatality rate: 60%). This second outbreak was caused by a different CHAPV strain than the one identified in 2003. The third outbreak took place in 2021 in La Paz Department, with three confirmed cases (two fatal). The most recent outbreak occurred in 2024 with one laboratory-confirmed case, also within La Paz Department.</p>'
  Advice: '<p>WHO recommends remaining vigilant and raising awareness among healthcare workers to detect, diagnose, and manage cases of haemorrhagic fever while ensuring strict compliance with infection prevention and control measures. Surveillance should focus on detecting suspected cases of haemorrhagic fever based on the clinical manifestations, travel history, and exposure history, tailored to the epidemiological context of the country or territory. Any individual who has had contact with the blood or bodily fluids of a suspected, probable, or confirmed haemorrhagic fever case during their illness is considered a contact. Contact monitoring should be performed for a maximum incubation period of 21 days following the last known exposure. </p><p>Laboratory confirmation of<em> Mammarenavirus</em> infection can be performed using various methods, including virological and serological techniques. However, the dynamics of <em>Mammarenavirus</em> infections (e.g., the duration of viraemia versus
    the appearance of antibodies) are not yet fully understood, and no serological assays have yet been validated for CHAPV. All biological samples should be treated as potentially infectious, handled only by trained personnel, and processed in suitably equipped laboratories.</p><p>Patients with suspected or confirmed CHHF should be isolated in a single room with a dedicated sink and toilet. Movement of patients with suspected or confirmed CHHF should be limited, however if patient ambulation outside of the room is necessary the patient should wear a medical mask during ambulation. All health and care workers in close contact with a patient with suspected or confirmed CHHF or who enter the isolation room should apply contact and droplet precautions, including the use of the following personal protective equipment: gown, examination gloves, medical mask, and eye protection (goggles or face shield). If an aerosol-generating procedure is performed on a patient with suspected or confirmed CHHF,
    the procedure should take place in a negative pressure airborne infection isolation room with the door closed. All health and care workers present in a room where an aerosol generating procedure is taking place should use airborne precautions in addition to contact and droplet precautions, including use of a fit-tested filtering facepiece respirator (e.g. N95).&nbsp;</p><p>Routine cleaning and disinfection of the isolation room of a patient with suspected or confirmed CHHF should occur three times daily, and spot cleaning should occur immediately whenever there is a spill or material contamination of blood or body fluids. Cleaning may be performed with soap and water applied by cloth, followed by disinfection with a 0.5% sodium hypochlorite solution; allowing the disinfectant to remain wet and untouched on the surface for a contact time of at least five minutes. All disposable waste that is generated in the patient room should be managed as infectious waste. Linens from isolation rooms
    are advised to be bagged and handled using contact precautions during transport to laundry areas and washed separately from other patient linens. Reusable medical equipment used on a patient with suspected or confirmed CHHF should be labelled as biohazardous and managed appropriately during transport and reprocessing in a medical device reprocessing department. Patients should be advised to place the lid down when flushing their dedicated toilet to avoid generating bioaerosols.</p><p>Ribavirin has been described as a treatment option for haemorrhagic fevers caused by some <em>Mammarenaviruses</em>; however, its efficacy and safety have not been demonstrated in randomized clinical trials. Supportive care, including hydration, rest, and treatment of complications, is recommended. Evaluation and management of co-infections such as malaria, dengue, yellow fever, or bacterial infections should also be considered.<br /></p>'
  Assessment: <p>One of the main challenges in detecting and responding to CHHF and other South American haemorrhagic fevers due&nbsp;<em>to Mammarenavirus</em>&nbsp;is the difficulty of making an early differential diagnosis due to the non-specificity of the initial clinical presentation. CHHF and other South American haemorrhagic fevers due&nbsp;<em>to Mammarenavirus</em>&nbsp;(e.g., Argentinian haemorrhagic fever, Bolivian haemorrhagic fever, and Sabia virus disease) should be considered for any patient presenting with suggestive symptoms originating from areas where&nbsp;<em>Mammarenaviruses </em>are known to circulate. These diseases should also be part of the differential diagnosis along with other endemic diseases such as malaria, dengue, yellow fever, and bacterial infections. Environmental exposures, such as evidence of rodent activity in or around the home, contact with rodent excreta, or visiting or working in areas where rodents are prevalent, should be carefully considered as
    key epidemiological risk factors. Case ascertainment should involve asking about exposure to rodents or contact with patients suspected of having haemorrhagic fevers due to&nbsp;<em>Mammarenavirus</em>. For biosafety reasons, all samples from suspected cases in regions where CHHF has previously been reported should be managed as&nbsp;<em>Mammarenavirus</em>&nbsp;samples, even for differential diagnosis.</p><p>In Bolivia, the geographical at-risk area is limited to rural areas in the northern part of the La Paz department, particularly along a jungle corridor from Caranavi to Teoponte municipalities, passing through the town of Palos Blancos, where the reservoir is found.&nbsp;Currently, CHHF is reported only in Bolivia. There is no significant risk of international spread of the disease, as person-to-person transmission of the Chapare virus is possible but remains rare in the general population. Continued surveillance, public awareness, and adherence to infection prevention and control
    measures are critical to preventing further spread and mitigating future outbreaks.</p>
  Overview: <p>On 7 January 2025, the International Health Regulations (IHR) National Focal Point (NFP) for the Plurinational State of Bolivia notified the World Health Organization (WHO) of one laboratory-confirmed human infection with Chapare virus (CHAPV) from one of the municipalities of La Paz Department. The patient is an adult male farmer in the age group of 50-60 years.</p><p>The patient developed symptoms including fever, headache, muscle pain, joint pain, and bleeding gums on 19 December 2024 and sought medical attention on 24 December. On 30 December, he was transferred to the local Health Center of the municipality due to worsening symptoms, where he died the same day. Blood samples were collected on 30 December before his death and sent to the National Center of Tropical Diseases (CENETROP), which confirmed CHAPV detection through real-time polymerase chain reaction (RT-PCR specific for CHAPV) testing on 2 January 2025.</p><p>An epidemiological investigation revealed significant
    risk factors for zoonotic disease transmission, including severe rodent infestation in and around the patient&rsquo;s home. Environmental conditions such as wooden and corrugated metal housing, dirt floors, and peri-domestic coconut plantings created a conducive environment for rodent activity. The patient&rsquo;s occupation as a farmer likely involved exposure to rodent burrows, further increasing the risk of infection.<br /><br />Blood samples were collected from two close contacts of the case, which were negative. As of 13 January 2025, no secondary cases have been reported, and all identified contacts remain asymptomatic. Public health measures, including disinfection and rodent control, have been implemented, and investigations are ongoing. This is the fifth documented outbreak of Chapare haemorrhagic fever (CHHF) in Bolivia and globally since the virus was first identified in 2003.</p>
