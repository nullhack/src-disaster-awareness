  Summary: "On 7 January 2025, the International Health Regulations National Focal Point for the Plurinational State of Bolivia notified WHO of a laboratory-confirmed case of Chapare virus infection in an adult male from La Paz Department. \r\n\r\nChapare haemorrhagic fever is an acute viral illness caused by Chapare virus. The virus was first identified in 2003 in Bolivia and has been associated with five documented outbreaks to date, all occurring within the country. These outbreaks have primarily affected rural areas in the La Paz Department, with the most recent case. \r\n\r\n\r\nThere is no significant risk of international spread of the disease, as person-to-person transmission of the Chapare virus is possible but remains rare in the general population. As of 13 January 2025, no secondary cases have been reported, and all contacts remain without symptoms. Public health measures, such as disinfection and rodent control, have been implemented."
