  Response: <p>On 3 July 2024, the Government of India issued an advisory for all States following the detection of ZIKV disease cases in Maharashtra state and the following public health measures:</p><ul><li>The IDSP at the National Centre for Disease Control is mandated with surveillance and response to 40 plus outbreak-prone communicable diseases, including the ZIKV. Every State has designated laboratories, such as District Public Health Laboratories and State Referral Laboratories, under the IDSP for investigation and surveillance of these diseases.</li><li>Technical Guidelines for Integrated Vector Management, and effective community participation disseminated to the States for implementation.</li><li>Under the National Health Mission, budgetary support is provided to States/Union Territories for preventive activities such as provision of domestic breeding checkers (workers who inspect homes for mosquito breeding sites and eliminate them), involvement of accredited Social Health activists,
    insecticide, fogging machines, training support, awareness activities.<br /></li></ul> <p>In Maharashtra, the State authority conducted active surveillance following the detection of the initial ZIKV disease cases, particularly targeting pregnant women. Close monitoring of ZIKV- positive pregnant women has been conducted. Vector control measures have been intensified in affected areas.</p>
