  Summary: "Between 1 January and 31 December 2024, a cumulative total of 151 Zika virus disease (ZVD) cases were reported from three states in India (Gujarat, Karnataka, and Maharashtra states).  \r\nMaharashtra State reported a cumulative total of 140 ZVD cases through the Integrated Disease Surveillance Programme (IDSP). Additionally, Karnataka and Gujarat states reported ten and one cases, respectively, in 2024. \r\nAs of 31 December 2024, no cases of microcephaly and/or Guillain-Barre syndrome (GBS) associated with this outbreak have been reported.\r\nZika virus (ZIKV) is transmitted to humans by the bite of an infected Aedes mosquito. Zika virus is also transmitted from mother to fetus during pregnancy, as well as through sexual contact, transfusion of blood and blood products, and possibly through organ transplantation.\r\nThere is no specific treatment available for Zika virus infection or disease."
