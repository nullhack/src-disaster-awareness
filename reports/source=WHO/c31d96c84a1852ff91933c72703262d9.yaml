  Advice: <p>Protection against mosquito bites during the day and early evening is a key measure to prevent ZIKV infection. Special attention should be given to preventing mosquito bites among pregnant women, women of reproductive age, and young children.</p><p><em>Aedes</em> mosquitoes breed in small water collections inside and around homes, schools, and workplaces. It is important to eliminate these mosquito breeding sites by appropriate methods, including covering water storage containers, removing standing water in water-holding containers such as vases and flowerpots, and cleaning up trash, unused containers, and used tyres. Community initiatives are essential to support local health authorities and national public health programmes to reduce mosquito breeding sites. Health authorities may also advise the use of larvicides and insecticides to reduce mosquito populations and disease spread. Semi-urban areas should prevent the breeding of <em>Aedes</em> spp., in rubber plantations and
    other stagnant pools of water.</p><p>Basic precautions for protection from mosquito bites should be taken by people travelling to high-risk areas, especially pregnant women. These include wearing light-colored, long-sleeved shirts and pants, ensuring rooms are fitted with screens to prevent mosquitoes from entering, and using of insect repellents that contains N,N-Diethyl-meta-toluamide (DEET), IR3535 or Icaridin according to the product label instructions.</p><p>For regions with active transmission of ZIKV, all persons with suspected ZIKV infection and their sexual partners (particularly pregnant women) should receive information about the risks of sexual transmission of ZIKV.</p><p>WHO recommends that sexually active men and women be correctly counselled about ZIKV infection and offered a full range of contraceptive methods to be able to make an informed choice about whether and when to become pregnant to prevent CZS and other possible adverse pregnancy and foetal outcomes. Men and
    women should be informed about the possible risk of sexual transmission of Zika virus during the three months and two months, respectively, after known or presumptive infection, and should be informed about the correct and consistent use of condoms or abstinence during that time period to prevent Zika virus infection through sexual transmission.</p><p>Women who have had unprotected sex and do not wish to become pregnant due to concerns about ZIKV infection should have ready access to emergency contraceptive services and counselling. Pregnant women should practice safer sex (including correct and consistent use of condoms) or abstain from sexual activity for the entire duration of pregnancy. Pregnant women should be encouraged to attend scheduled appointments and enhanced antenatal care and follow-up, including ultrasound imaging to detect microcephaly and other developmental anomalies associated with ZIKV infection in pregnancy, in accordance with the state/national response plan.</p><p>For
    regions with no active transmission of ZIKV, WHO recommends practicing safer sex, including postponing sexual debut, nonpenetrative sex, correct and consistent use of male or female condoms, and reducing the number of sexual partners, or abstinence for a period of three months for men and two months for women who are returning from areas of active ZIKV transmission to prevent infection of their sex partners. Sexual partners of pregnant women, living in or returning from areas where local transmission of ZIKV occurs, should practice safer sex or abstain from sexual activity throughout pregnancy.</p><p>WHO does not recommend any travel or trade restriction to India based on the current information available.</p>
  Assessment: <p>Zika virus can cause large epidemics, particularly when introduced in immunologically naive populations, with a substantial demand on the public health system, including surveillance, case management, and differential laboratory diagnostic testing to differentiate ZVD from illness due to co-circulating mosquito-borne viruses like dengue and chikungunya. ZIKV is primarily transmitted by <em>Aedes</em> species mosquitoes, it can also be transmitted from mother to fetus during pregnancy, through sexual contact, transfusion of blood and blood products, and organ transplantation. Although 60-80% of Zika virus infections are asymptomatic or only have mild symptoms, ZIKV infection can cause GBS and microcephaly and congenital Zika syndrome (CZS) during pregnancy.</p><p>India reported its first Zika case from Gujarat State in 2016. Since then, many other States namely Tamil Nadu, Madhya Pradesh, Rajasthan, Kerala, Maharashtra, Uttar Pradesh, Delhi, and Karnataka have reported cases
    subsequently, but no ZIKV-associated microcephaly has been reported. Although Zika virus is not unexpected in Maharashtra state, given the wide distribution of the vectors, <em>Aedes aegypti,</em> and <em>Aedes albopictus</em>, across India, the number of ZVD cases reported in Maharashtra state in 2024 is much higher than the numbers reported in previous years and is thus unusual. The actual incidence of ZVD could be higher due to the asymptomatic or mild clinical presentation in most of the ZIKV infections, combined with varied level of awareness among clinicians. Aedes mosquito density in India varies by season and location, with the highest densities occurring during the monsoon and post-monsoon seasons.&nbsp;</p>
  Overview: <p>Between 1 January and 31 December 2024, a cumulative total of 151 ZVD cases were reported from three states in India (Gujarat, Karnataka, and Maharashtra states). Maharashtra State reported a cumulative total of 140 ZVD cases through the Integrated Disease Surveillance Programme (IDSP). Among the 140 cases, the majority (125 cases) were reported from Pune district, 11 from Ahmednagar district, and one case from each of Kolhapur, Sangli and Solapur districts and Mumbai suburban area. Additionally, Karnataka state reported ten cases in 2024, with seven reported from Bengaluru urban district and three from Shivamogga district. Gujarat state reported one Zika case in Gandhinagar Corporation in 2024.</p><p>The number of ZVD cases reported in 2024 in Maharashtra state is the highest since 2021 compared with respectively one, three and 18 ZIKV disease cases reported in 2021, 2022 and 2023. The number of cases reported in Karnataka state in 2024 is also the highest number reported
    since the first case reported in 2022. </p><p>The State IDSP Unit does not routinely disaggregate the number of ZVD cases (e.g. pregnancy status), therefore the number of ZIKV infection among pregnant women is unknown.</p><p>As of 31 December 2024, no cases of microcephaly and/or Guillain-Barre syndrome (GBS) associated with this outbreak have been reported.</p>
