  Epidemiology: <p>Zika virus is a mosquito-borne virus first identified in Uganda in 1947 in a Rhesus macaque monkey and &nbsp;evidence of infection and disease in humans was reported in other African countries in the 1950s. Zika virus is transmitted to humans by the bite of an infected&nbsp;<em>Aedes&nbsp;</em>mosquito. Zika virus is also transmitted from mother to fetus during pregnancy, as well as through sexual contact, transfusion of blood and blood products, and possibly through organ transplantation.</p><p>Zika virus (ZIKV) can cause large epidemics, particularly when introduced in immunologically naive populations, resulting in a substantial demand on the public health system including surveillance, case management, and differential laboratory diagnostic testing especially in case of co-circulation of other mosquito-borne diseases like dengue and chikungunya.&nbsp; In most cases, infection with ZIKV is asymptomatic or mildly symptomatic and of short duration. However, infection
    during pregnancy is associated with a risk of microcephaly and other congenital malformation in infants (congenital Zika syndrome (CZS)) as well as preterm birth and miscarriage. Some ZIKV-infected adults and children may develop neurological complications including GBS, neuropathy and myelitis. &nbsp;</p><p>There is no specific treatment available for Zika virus infection or disease.</p>
