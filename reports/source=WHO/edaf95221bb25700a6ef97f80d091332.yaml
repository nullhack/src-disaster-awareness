  Advice: <p>In the absence of a vaccine or licensed treatment available for Nipah virus disease, the key to reducing or preventing infection is by strengthening early detection surveillance and contact tracing, raising awareness of the risk factors and supporting people with measures they can take to reduce exposure to the NiV. Case management should focus on the delivery of timely supportive care and be supported by a good laboratory system. Intensive supportive care is recommended to treat severe respiratory and neurologic complications.&nbsp;</p><p>Public health educational messages should focus on:&nbsp;</p><ul role="list"><li><strong>Reducing the risk of bat-to-human transmission</strong>&nbsp;<p>Efforts to prevent transmission should first focus on decreasing bat access to date palm sap and other fresh food products. Freshly collected date palm juice should be boiled, and fruits should be thoroughly washed and peeled before consumption. Fruits with signs of bat bites should be discarded.
    Areas where bats are known to roost should be avoided.&nbsp;</p></li><li><strong>Reducing the risk of animal-to-human transmission</strong><p>Natural infection in animals has been described in farming pigs, horses, and domestic and feral cats. Gloves and other protective clothing should be worn while handling sick animals or their tissues, and during slaughtering and culling procedures. As much as possible, people should avoid being in contact with infected pigs. In endemic areas, when establishing new pig farms, considerations should be given to presence of fruit bats in the area and in general, pig feed and pig sheds should be protected against bats when feasible.&nbsp;&nbsp;</p></li><li><strong>Reducing the risk of human-to-human transmission</strong><p>Close unprotected physical contact with NiV-infected people should be avoided. Regular hand washing should be carried out after caring for or visiting sick people.&nbsp;&nbsp;</p></li><li data-leveltext="" data-font="Symbol" data-listid="10"
    data-list-defn-props="{"335551500":0,"335552541":1,"335559684":-2,"335559685":1080,"335559991":360,"469769226":"Symbol","469769242":[8226],"469777803":"left","469777804":"","469777815":"hybridMultilevel"}" aria-setsize="-1" data-aria-posinset="6" data-aria-level="1" role="listitem"><p paraid="1200039610" paraeid="{abed4c37-8d17-47ae-a07c-d5682b983e33}{224}"><strong>Controlling infection in health care settings &nbsp;</strong></p><p paraid="1200039610" paraeid="{abed4c37-8d17-47ae-a07c-d5682b983e33}{224}"><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Health care workers caring for patients with suspected or confirmed infection, or handling their specimens, should implement standard infection control precautions at all times.&nbsp;&nbsp; As human-to-human transmission has been reported, particularly in health-care settings, contact and droplet precautions should be used along with standard
    precautions. Airborne precautions may be required in certain circumstances.  Samples taken from people and animals with suspected NiV infection should be handled by trained staff working in suitably equipped laboratories. &nbsp;</span></p></li></ul><p paraid="1200039610" paraeid="{abed4c37-8d17-47ae-a07c-d5682b983e33}{224}"><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span><span style="background-color:transparent;font-family:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;font-size:inherit;"></span><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">WHO does not recommend any travel and/or trade restrictions toward Bangladesh based on the currently available information.&nbsp;</span></p>
  Assessment: <p>WHO assesses the overall risk at the national level to be moderate due to following reasons:</p><ul><li>The case fatality rate from NiV infection is high. Initial signs and symptoms      of Nipah virus infection are non-specific, and the diagnosis is often not      suspected at the time of presentation.&nbsp;This can hinder accurate      diagnosis and creates challenges in outbreak detection, effective and      timely infection control measures, and outbreak response activities.</li><li>There are currently no specific drugs or vaccines available for NiV infection      although WHO has identified Nipah as a priority disease for the WHO      Research and Development Blueprint.&nbsp; Intensive supportive care is      recommended to treat severe respiratory and neurologic complications.</li><li>There is continued consumption of raw date palm sap by the community despite ongoing efforts for risk communication and community engagement to address food safety and risks to health.</li><li>Despite
    these risk criteria, strong public health measures are in place to detect and control outbreaks including through the use of hospital-based systematic human NiV infection surveillance system which has been in place since 2006, and the utilization of the National Rapid Response Team (NRRT) at the central level and the Rapid Response Team (RRT) at the district level.</li></ul><p>WHO assesses the risk at the regional level to be moderate. Although Bangladesh borders India and Myanmar, currently affected districts do not share an international land border. While there have not been any instances of cross-border transmission previously, this risk remains given the shared ecological corridor for the virus natural host (<em>Pteropus</em> bats) and occurrence among domestic animals and humans previously in both Bangladesh and India. India, however, has experience of controlling previous outbreaks of NiV infection.&nbsp;</p><p>WHO assesses the risk at the global level to be low, as there have
    been no previous confirmed cases outside Bangladesh, India, Malaysia, and Singapore.&nbsp; &nbsp;</p>
  Overview: <p>On 30 January and 7 February 2024, the Bangladesh National Focal Point (NFP) for the International Health Regulations (IHR) notified the World Health Organization (WHO)&nbsp;of two epidemiologically unlinked cases of NiV&nbsp;infection. </p><p><strong>First case confirmed on 21 January 2024</strong></p><p>The first patient is a 38-year-old male from Manikganj district, Dhaka division. The patient developed a fever followed by respiratory distress, restlessness, and insomnia on 11 January 2024 and was admitted to a local hospital on 16 January. He was transferred to the intensive care unit of a hospital in Dhaka City on 18 January where he was intubated due to worsening of&nbsp;symptoms. </p><p>On 21 January, blood and throat samples were collected and the patient tested positive by reverse transcription polymerase chain reaction (RT-PCR) for NiV RNA from the throat sample and by enzyme-linked immunosorbent assay (ELISA) for anti-NiV Immunoglobulin M (IgM) from serum. On 27
    January, the case was transferred to another hospital in Dhaka city, where he died on 28 January.&nbsp;</p><p>The case had a history of consuming raw date palm sap on 31 December 2023. As of 30 January 2024, a total of 91 contacts had been identified, including 11 family members, 20 from the community, and 60 healthcare personnel from different hospitals. However, none of the contacts tested positive for NiV by PCR or anti-NiV IgM by ELISA.&nbsp;</p><p><strong>Second case confirmed on 31 January 2024</strong><strong></strong></p><p>The second patient is a three-year-old female from Shariatpur district, Dhaka division. The patient visited a healthcare facility on 30 January 2024 with a two-day history of fever, altered consciousnesses, and seizures. The case was diagnosed with encephalitis and shock and was transferred to the isolation ward of another hospital in Dhaka city on the same day. Blood and throat samples were collected on 30 January and on 31 January, the case was laboratory-confirmed
    with NiV infection by RT-PCR for NiV RNA from the throat sample and by ELISA for anti-NiV IgM from serum and died on the same day. &nbsp;<strong> </strong></p><p>The case had a history of regularly consuming fresh raw date palm sap. As of 7 February 2024, 67 contacts were identified, including three family members, 21 from the community and 46 healthcare personnel from different hospitals. All identified contacts tested negative for NiV by PCR or anti-NiV IgM by ELISA.</p><p>Since the report of the first case in 2001, human infections have been reported almost every year, with case fatality rate varying between 25% (in 2009) and 92% (in 2005) (Figure 1). Clusters of cases are mainly reported in the country&rsquo;s central and northwest districts.&nbsp;</p><p><strong>Figure 1.</strong>&nbsp;Number of reported Nipah virus cases and deaths by year, 1 January 2001 &ndash; 9 February 2024, Bangladesh.</p><p><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/epicurve-1.jpg?sfvrsn=c2038b13_3"
    height="395" width="685" alt="" sf-size="42877" /></p>
