  Epidemiology: <p>NiV infection is a bat-borne zoonotic disease transmitted to humans through infected animals (such as bats or pigs) or food contaminated with saliva, urine and excreta of infected animals. It can also be transmitted directly from person to person through close contact with an infected person (although less common).&nbsp;Fruit bats or flying foxes (Pteropus species) are the natural hosts for Nipah virus. </p><p>The incubation period is believed to range from 4 to 14 days. However, an incubation period of up to 45 days has been reported. Laboratory diagnosis of a patient with a clinical history of NiV infection can be made during the acute and convalescent phases of the disease&nbsp;by using a combination of tests. The main tests used are RT-PCR from bodily fluids and antibody detection via ELISA.</p><p>NiV infection in humans causes a range of clinical presentations including acute respiratory infection and fatal encephalitis. Further information about NiV infection can
    be found <a href="https://www.who.int/news-room/fact-sheets/detail/nipah-virus">here</a>.</p><p>The case-fatality rates in outbreaks across Bangladesh, India, Malaysia, and Singapore typically range from 40% to 100%, depending on local capabilities for early detection and clinical management. Although antivirals are in development, there are no licensed vaccines or therapeutics available for the prevention or treatment of NiV infection.</p>
