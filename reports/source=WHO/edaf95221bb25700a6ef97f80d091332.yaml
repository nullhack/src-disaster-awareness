  Response: <p>The following public health response has been implemented by the government of Bangladesh and WHO:</p><ul><li>Nationwide awareness and health education activities are ongoing through print and electronic media, including distribution of posters and leaflets in the endemic districts.&nbsp;</li><li>Risk communication activities engaging government officials, physicians, preachers, and farmers are ongoing. As of 31 January, these have been completed in Rajshahi, Jashore, Madaripur and Rajbari districts.&nbsp;</li><li>WHO is working with the counterparts to strengthen surveillance, infection, prevention and control (IPC), risk communication, prompt diagnosis and management of infected patients. </li><li>One Health Partners (Department of Livestock, Bangladesh Livestock Research Institute, Department of Forest, icddr,b) have been sensitized and engaged. Printed leaflets with health education messages have been produced.&nbsp;</li></ul>
