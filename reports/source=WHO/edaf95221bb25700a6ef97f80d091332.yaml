    Virus Disease: Epidemiological,      Clinical, Diagnostic and Legislative Aspects of This Unpredictable      Emerging Zoonosis</a></li><li data-list="0" data-level="1"><a href="https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7910977/">The Ecology of Nipah      Virus in Bangladesh: A Nexus of Land-Use Change and Opportunistic Feeding      Behavior in Bats</a> </li><p><strong>Citable reference:</strong> World Health Organization (27 February 2024). Disease Outbreak News; Nipah virus infection &ndash; Bangladesh. Available at&nbsp;<a href="https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON508">https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON508</a></p><p>&nbsp;</p></ul><p>&nbsp;</p>'
  Summary: "Outbreaks of Nipah virus (NiV) infection are seasonal in Bangladesh, with cases usually occurring annually between December and April corresponding with the harvesting and consumption of date palm sap. Since 1 January and as of 9 February 2024, two laboratory-confirmed cases of NiV have been reported from the Dhaka division of Bangladesh. Both cases have died. \r\n\r\nWHO assesses the overall risk at the national levels to be moderate due to the severity of the disease, the limitation of treatment, the shared natural habitat of bats and zoonotic transmission partners, and the fact that there are no licensed vaccines to prevent NiV infection.  "
