  Response: <ul type="disc"><li data-list="1" data-level="1">The Government of      Rwanda is coordinating the response with support from WHO and partners.</li><li data-list="1" data-level="1">A surge team from WHO was deployed to support the      in-country      response across the functions of incident management, epidemiology, health      operations, case management, infection prevention and control, health      logistics, therapeutics and vaccines research, and partner coordination. </li><li data-list="1" data-level="1">On 19-20 October, WHO Director-General Dr Tedros Adhanom Ghebreyesus visited      Kigali, where he met with the national authorities and WHO staff taking      part in the national response.</li><li data-list="1" data-level="1">WHO is continuously engaged with its viral hemorrhagic fever collaborating centers      and other reference laboratories and partners to support Rwanda in      assessing laboratory test performance.</li><li data-list="1" data-level="1">&nbsp;WHO
    is supporting the&nbsp;Government in      the establishment of a programme for recovered patients, by sharing      technical guidance and protocols for the establishment of a national      programme and by supporting Rwanda Ministry of Health (MOH) implementation      effort. </li><li data-list="1" data-level="1">WHO, the&nbsp;Government of Rwanda, and      partners have launched Marburg therapeutics clinical trials, which is      currently enrolling patients. </li><li data-list="1" data-level="1">WHO and partners supported MOH in developing and finalising the national Infection      Prevention and Control (IPC) operational guidance for MVD adapted from WHO      IPC guideline. This operational guidance together with IPC standard      operating procedures is being rapidly disseminated to all health      facilities.</li><li data-list="1" data-level="1">WHO supported MOH in the enhancing of IPC measures in the isolation sites.</li></ul><ul><li>WHO has provided technical advice to public
    health authorities in Rwanda and at-risk countries on the implementation of evidence-informed and risk-based health measures; the strengthening of detection, reporting and management capacities at points of entry and across borders; and travel advice. <strong></strong></li><li>WHO has published interim guidance on the <a href="https://www.who.int/publications/m/item/considerations-for-border-health-and-points-of-entry-for-filovirus-disease-outbreaks">Considerations for border health and points of entry for filovirus disease outbreaks</a>, which applies to but is not limited to the current MVD outbreak in Rwanda. <strong></strong></li><li>WHO has also published a statement <a href="https://www.who.int/news-room/articles-detail/who-advises-against-any-travel-and-trade-restrictions-with-rwanda-in-the-context-of-the-ongoing-marburg-virus-disease-(mvd)-outbreak">advising against any travel restrictions and against any trade restrictions with Rwanda</a> in the context of the ongoing MVD outbreak.&nbsp;
    <strong></strong></li><li>WHO is providing support in surrounding countries to assess the readiness of healthcare facilities, points of entry and border communities within surrounding countries and specifically risk mapping for areas bordering Rwanda.<strong></strong></li><li>WHO is supporting the MVD treatment center with direct support from clinical experts in infectious disease, ICU and nursing as well as health logistics and WASH.</li></ul>
