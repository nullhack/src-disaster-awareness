  Summary: "As of 24 October 2024, a total of 64 Marburg virus disease cases, including 15 deaths (case fatality ratio (CFR) 23.4%), have been reported in Rwanda. Among the initial 62 confirmed cases with available data, 70% were males, and 48% were aged between 30 to 39 years. The highest number of new confirmed cases were reported in the first two epidemiological weeks of the outbreak with 26 cases reported in epidemiological week 39 (23 to 29 September 2024) and 23 cases in week 40 (30 September to 6 October). This was followed by a sharp decline in weeks 41 and 42, with 12 and one case reported respectively.  \r\nContact tracing is ongoing, with 1146 contacts under follow-up as of 20 October 2024.\r\nBased on available updates from the outbreak investigation, the index case was a male between 20 and 30 years old with a history of exposure to bats in a cave. "
