  Epidemiology: '<p>MVD is a highly virulent disease that can cause haemorrhagic fever and is clinically similar to Ebola virus disease. Marburg and Ebola viruses are both members of the Filoviridae family (filovirus). People are infected with Marburg virus when they come into close contact with <em>Rousettus</em> bats, a type of fruit bat, that can carry the Marburg virus and are often found in mines or caves. Marburg virus then spreads between people via direct contact (through broken skin or mucous membranes) with the blood, secretions, organs or other bodily fluids of infected people, and with surfaces and materials (e.g. bedding, clothing) contaminated with these fluids. Health workers have previously been infected while treating patients with suspected or confirmed MVD. Burial ceremonies that involve direct contact with the body of the deceased can also contribute to the transmission of Marburg virus.</p><p>The incubation period varies from two to 21 days. Illness caused by Marburg
    virus begins abruptly, with high fever, severe headache and severe malaise. Severe watery diarrhoea, abdominal pain and cramping, nausea and vomiting can begin on the third day. Although not all cases present with haemorrhagic signs, severe haemorrhagic manifestations may appear between five and seven days from symptoms onset, and fatal cases usually have some form of bleeding, often from multiple areas. In fatal cases, death occurs most often between eight and nine days after symptom onset, usually preceded by severe blood loss and shock. There is currently no approved treatment or vaccine for MVD. Some candidate vaccines and therapeutics are currently under investigation.</p><p>Seventeen outbreaks of MVD have previously been reported globally. The most recent outbreaks were reported in Equatorial Guinea and the United Republic of Tanzania between February and June 2023. Additional countries that previously reported outbreaks of MVD in the African Region include Angola, the Democratic
    Republic of the Congo, Ghana, Guinea, Kenya, South Africa, and Uganda.</p> '
  OverrideTitle: ''
  Advice: '<p>MVD outbreak control relies on using a range of interventions, including prompt isolation and case management; surveillance including active case search, case investigation and contact tracing; a laboratory service; infection prevention and control, including prompt safe and dignified burial; and social mobilization &ndash; community engagement is key to successfully controlling MVD outbreaks. Raising awareness of risk factors for Marburg virus infection and protective measures that individuals can take is an effective way to reduce human transmission. WHO advises the following risk reduction measures as an effective way to reduce MVD transmission in healthcare facilities and in communities:</p><ul type="disc"><li data-list="0" data-level="1">To reduce human infections and deaths, it is      essential to raise community awareness about the risk factors for Marburg      virus infection particularly of human-to-human transmission, and the      protective measures individuals
    can take to minimize exposure to the      virus.&nbsp; This includes encouraging anyone with symptoms to seek      immediate care at a health facility or designated treatment center to      lower the risk of community transmission and improve their chances for      recovery.</li><li data-list="0" data-level="1">Reducing the risk of bat-to-human transmission      arising from prolonged exposure to mines or caves inhabited by fruit bat      colonies. People visiting or working in mines or caves inhabited by fruit      bat colonies should wear gloves and other appropriate protective clothing      (including masks). </li><li data-list="0" data-level="1">Surveillance activities, including the wide      dissemination of the MVD case definition, should be strengthened in all      affected districts, including contact tracing and active case finding.</li></ul><ul type="disc"><li data-list="1" data-level="1">Critical infection prevention and control measures should be implemented and/or strengthened      in
    all health care facilities, per <a href="https://www.who.int/publications/i/item/WHO-WPE-CRS-HCR-2023.1">WHO&rsquo;s Infection prevention and control      guideline for Ebola and Marburg disease</a>. &nbsp;&nbsp;Health workers caring for patients with      confirmed or suspected MVD should apply <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2">Transmission-based precautions</a> in addition to: <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1">Standard precautions</a>, including appropriate use      of PPE and hand hygiene according to the <a href="https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21">WHO 5 moments</a> to avoid contact with      patient&rsquo;s blood and other body fluids and with contaminated surfaces and      objects. Waste generated in healthcare facilities must be safely      segregated, safely collected,
    transported, stored, treated and finally      disposed. Follow the national guidelines, rules and      regulations for safe waste disposal &nbsp;or follow the <a href="https://iris.who.int/bitstream/handle/10665/85349/9789241548564_eng.pdf;sequence=1">WHO&rsquo;s guidelines on safe waste management</a> </li></ul><ul type="disc"><li data-list="0" data-level="1">Patient-care activities should be undertaken in a clean and hygienic environment that      facilitates practices related to the prevention and control of      health-care-associated infections (HAIs) as outlined in <a href="https://www.who.int/publications/i/item/9789241547239">Essential environmental health standards in health care</a>. Safe water, adequate sanitation and hygiene      infrastructure and services should be provided in healthcare facilities. For      details on recommendations and improvement, follow the <a href="https://openwho.org/courses/wash-fit">WASH FIT implementation Package</a></li><li data-list="0" data-level="1">A&nbsp;comprehensive
    strategy to manage deceased individuals      in communities should be implemented in communities. Safe and      dignified burials should be carried out, with strong engagement communities.</li><li data-list="0" data-level="1">Rapid qualitative assessments should be      implemented to collect socio-behavioural data, which can then be utilized      to guide the response.</li><li data-list="0" data-level="1">Results of the phone Knowledge, Attitude and Practices (KAP) survey and other      surveys should be integrated into the response strategy and interventions.</li><li data-list="0" data-level="1">Timely laboratory testing      of all suspected cases needs to be maintained and supported with a reliable      sample transportation system. </li><li data-list="0" data-level="1">Border health readiness      and response capacities should be strengthened at points of entry and in      communities bordering areas reporting MVD cases and onboard conveyances,      and public health advice should
    be provided to travellers in line with <a href="https://www.who.int/publications/m/item/considerations-for-border-health-and-points-of-entry-for-filovirus-disease-outbreaks">WHO&rsquo;s interim guidance on considerations for border health and points of entry      for filovirus disease outbreaks</a>.</li><li data-list="0" data-level="1">WHO encourages all countries to send the first      samples that&nbsp;tested positive for Marburg virus and a subset of      negative samples to a WHO Collaborating Centre or a regional reference      laboratory for inter-laboratory comparison. </li><li data-list="0" data-level="1">WHO recommends that      clinical data from suspected and confirmed Marburg virus disease cases be systematically      collected to improve the limited understanding of the clinical course and      direct causes and risk factors for poor outcomes. This can be done by      contributing anonymized data to the&nbsp;<a href="https://www.who.int/tools/global-clinical-platform/viral-haemorrhagic-fever">WHO
    Global Clinical Platform</a>&nbsp;for viral      haemorrhagic fevers.</li><li data-list="0" data-level="1">WHO advises that all patients with MVD receive      holistic care including optimized supportive care including critical care      and mental health services in a treatment center designed for optimal      patient care and patient centered experience with biosecurity measures      such as unidirectional patient and staff flow and WASH services in place.</li></ul><p>Based on the current risk assessment, WHO advises against any travel restrictions or any trade restrictions with Rwanda. For further information, please see <a href="https://www.who.int/news-room/articles-detail/who-advises-against-any-travel-and-trade-restrictions-with-rwanda-in-the-context-of-the-ongoing-marburg-virus-disease-(mvd)-outbreak">WHO advice for international traffic in relation to the Marburg virus disease outbreak in Rwanda</a>.&nbsp;</p>'
  Assessment: <p>Marburg virus disease (MVD) is caused by the same family of viruses (Filoviridae) that causes Ebola virus disease. MVD is an epidemic-prone disease associated with high CFR (24-88%). In the early course of the disease, MVD is challenging to distinguish from other infectious diseases such as malaria, typhoid fever, shigellosis, meningitis and other viral haemorrhagic fevers. Epidemiologic features can help differentiate between viral hemorrhagic fevers (including history of exposure to bats, caves, or mining) and laboratory testing is important to confirm the diagnosis. </p><p>With 64 confirmed cases reported, this is the third largest MVD outbreak reported to date, with 82% of confirmed cases reported among healthcare workers. Healthcare-associated infections (also known as nosocomial infections) of this disease can lead to further spread if not controlled early. The importance of screening all persons entering health facilities as well as inpatient surveillance for prompt
    identification, isolation, and notification cannot be overemphasized. This is in addition to the importance of contact identification and listing and daily follow-up of all contacts. &nbsp;</p><p>Based on the outbreak investigation which included record review in health facilities, review of epidemiological data, serology and genomic sequencing, as well as environmental and animal testing, the source of the outbreak is reported to be of zoonotic origin, linked to exposure in a cave inhabited by fruit bats. However, the dates of symptom onset of cases is still unknown to WHO. </p><p>On 30 September, WHO assessed the risk of this outbreak as very high at the national level, high at the regional level, and low at the global level. However, based on the evolution of the outbreak and ongoing investigations, this risk assessment may be revised. MVD is not&nbsp;easily transmissible (i.e. in most instances it requires contact with the body fluids of a sick patient presenting with symptoms or
    with surfaces contaminated with these fluids). In addition, there are ongoing public health measures in place, including active surveillance in facilities and communities, testing suspected cases, isolation and treatment of cases and contact tracing.<br /></p>
  Overview: '<p><p>Since the last <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON540">Disease Outbreak News</a> on this event was&nbsp;published on 18 October 2024, two additional laboratory-confirmed cases of Marburg virus disease (MVD) were reported in Rwanda on 23 and 24 October. The new cases include a healthcare worker who had been treating MVD cases since the start of the outbreak and a case linked to the site where the index case was exposed. Both cases are&nbsp;currently in isolation and receiving treatment. As of 24 October 2024, a total of 64 confirmed cases, including 15 deaths (CFR: 23.4%), have been reported. Excluding the recently confirmed cases, 70% of the 62 initially confirmed cases were among males, and 48% were among adults between 30 and 39 years of age. Health workers from two health facilities in Kigali account for over 82% of confirmed cases. Most of the cases have been reported from the three districts in Kigali city. </p><p>The highest
    number of new confirmed cases were reported in the first two epidemiological weeks of the outbreak with 26 cases reported in the epidemiological week 39 (23 to 29 September 2024) and 23 cases in week 40 (30 September to 6 October). This was followed by a sharp decline in epi weeks 41 (7 to 13 October) and 42 (14 to 20 October), with 12 and one cases reported respectively.&nbsp; </p><p>Since the declaration of the outbreak by the Government of Rwanda on 27 September and as of 23 October, 46 confirmed cases have recovered, and&nbsp;three cases are under care at the designated Marburg treatment center. The 62 confirmed cases reported since the start of the outbreak have been part of one major cluster with three branches. As of 24 October 2024, a total of 5074 tests for Marburg virus have been conducted, with approximately 100-300 samples being tested daily at the Rwanda Biomedical Center. &nbsp;&nbsp;</p><p>Contact tracing is ongoing, with 1146 contacts under follow-up as of 20 October
    2024. </p><p>WHO continues to support the Government of Rwanda. Enhanced surveillance, contact tracing and infection prevention and control measures must be maintained until the outbreak is declared over.</p>Based on available updates from the outbreak investigation, the index case was a male between 20 and 30 years old with a history of exposure to bats in a cave. Preliminary phylogenetic analyses indicate a close evolutionary relationship to a viral sequence from <em>Orthomarburgvirus marburgense</em> (Marburg virus, MARV) that was observed in the&nbsp;MVD outbreak in East Africa in 2014.<sup>1</sup><p><strong>Figure 1. MVD cases by week of reporting in Rwanda, as of 24 October 2024, (n=64)<sup></sup></strong></p><p><img alt="MVD Epi curve" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/mvd-epi-curve9d1355f9-c581-4946-bb63-4dcec0df5165.png?sfvrsn=fd26cfec_3" sf-size="12620" /></p><p><sup>* </sup>The epidemiological week 43 is not complete as
    it will end on 27 October 2024.</p></p>'
