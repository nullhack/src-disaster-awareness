  Epidemiology: <p>MVD is a highly virulent disease that can cause severe disease and is clinically similar to Ebola virus disease. Marburg and Ebola viruses are both members of the Filoviridae family (filovirus). People are infected after prolonged exposure to mines or caves inhabited by Rousettus fruit bat colonies, a type of fruit bat, that can carry the Marburg virus. &nbsp;Marburg virus then spreads between people via direct contact (through broken skin or mucous membranes) with the blood, secretions, organs or other bodily fluids of infected people, and with surfaces and materials (e.g. bedding, clothing) contaminated with these fluids. Health workers have previously been infected while treating patients with suspected or confirmed MVD. Burial ceremonies that involve direct contact with the body of the deceased can also contribute to the transmission of Marburg virus.</p><p>The incubation period varies from two to 21 days. Illness caused by Marburg virus begins abruptly, with high
    fever, severe headache and severe malaise. Severe watery diarrhoea, abdominal pain and cramping, nausea and vomiting can begin on the third day. Although not all cases present with haemorrhagic signs, severe haemorrhagic manifestations may appear between five and seven days from symptoms onset, and fatal cases usually have some form of bleeding, often from multiple areas. In fatal cases, death occurs most often between eight and nine days after symptom onset, usually preceded by severe blood loss and shock. There is currently no approved treatment or vaccine for MVD. Some candidate vaccines and therapeutics are currently under investigation.</p><p>Seventeen outbreaks of MVD have previously been reported globally. The most recent outbreaks were reported in Equatorial Guinea and the United Republic of Tanzania between February and June 2023. Additional countries that previously reported outbreaks of MVD in the African Region include Angola, the Democratic Republic of the Congo, Ghana,
    Guinea, Kenya, South Africa, and Uganda.</p>
