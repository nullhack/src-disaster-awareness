  Advice: '<p>MVD outbreak control relies on using a range of interventions, including prompt isolation and case management; surveillance including active case search, case investigation and contact tracing; a laboratory service; infection prevention and control, including prompt safe and dignified burial; and social mobilization &ndash; community engagement is key to successfully controlling MVD outbreaks. Raising awareness of risk factors for Marburg virus infection and protective measures that individuals can take is an effective way to reduce human transmission. WHO advises the following risk reduction measures as an effective way to reduce MVD transmission in healthcare facilities and in communities:</p><ul type="disc"><li data-list="0" data-level="1">To reduce human infections and deaths, it is      essential to raise community awareness about the risk factors for Marburg      virus infection particularly of human-to-human transmission, and the      protective measures individuals
    can take to minimize exposure to the      virus.&nbsp; This includes encouraging anyone with symptoms to seek      immediate care at a health facility or designated treatment center to      lower the risk of community transmission and improve their chances for      recovery.</li><li data-list="0" data-level="1">Reducing the risk of bat-to-human transmission      arising from prolonged exposure to mines or caves inhabited by fruit bat      colonies. People visiting or working in mines or caves inhabited by fruit      bat colonies should wear gloves and other appropriate protective clothing      (including masks). </li><li data-list="0" data-level="1">Surveillance activities, including the wide      dissemination of the MVD case definition, should be strengthened in all      affected districts, including contact tracing and active case finding.</li></ul><ul type="disc"><li data-list="1" data-level="1">Critical infection prevention and control measures should be implemented and/or strengthened      in
    all health care facilities, per <a href="https://www.who.int/publications/i/item/WHO-WPE-CRS-HCR-2023.1">WHO&rsquo;s Infection prevention and control      guideline for Ebola and Marburg disease</a>. &nbsp;&nbsp;Health workers caring for patients with      confirmed or suspected MVD should apply <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.2">Transmission-based precautions</a> in addition to: <a href="https://www.who.int/publications/i/item/WHO-UHL-IHS-IPC-2022.1">Standard precautions</a>, including appropriate use      of PPE and hand hygiene according to the <a href="https://cdn.who.int/media/docs/default-source/integrated-health-services-(ihs)/infection-prevention-and-control/your-5-moments-for-hand-hygiene-poster.pdf?sfvrsn=83e2fb0e_21">WHO 5 moments</a> to avoid contact with      patient&rsquo;s blood and other body fluids and with contaminated surfaces and      objects. Waste generated in healthcare facilities must be safely      segregated, safely collected,
    transported, stored, treated and finally      disposed. Follow the national guidelines, rules and      regulations for safe waste disposal or follow the <a href="https://iris.who.int/bitstream/handle/10665/85349/9789241548564_eng.pdf;sequence=1">WHO&rsquo;s guidelines on safe waste management</a> </li></ul><ul type="disc"><li data-list="0" data-level="1">Patient-care activities should be undertaken in a clean and hygienic environment that      facilitates practices related to the prevention and control of      health-care-associated infections (HAIs) as outlined in <a href="https://www.who.int/publications/i/item/9789241547239">Essential environmental health standards in health care</a>. Safe water, adequate sanitation and hygiene      infrastructure and services should be provided in healthcare facilities. For      details on recommendations and improvement, follow the <a href="https://openwho.org/courses/wash-fit">WASH FIT implementation Package</a></li><li data-list="0" data-level="1">A&nbsp;comprehensive
    strategy to manage deceased individuals      in communities should be implemented. Safe and dignified      burials should be carried out, with strong engagement of communities.</li><li data-list="0" data-level="1">Rapid qualitative assessments should be      implemented to collect socio-behavioural data, which can then be utilized      to guide the response.</li><li data-list="0" data-level="1">Results of the phone Knowledge, Attitude and Practices (KAP) survey and other      surveys should be integrated into the response strategy and interventions.</li><li data-list="0" data-level="1">Timely laboratory testing      of all suspected cases needs to be maintained and supported with a reliable      sample transportation system. </li><li data-list="0" data-level="1">WHO encourages the sharing of genomic sequencing      data to inform the public health response. </li><li data-list="0" data-level="1">Border health readiness      and response capacities should be strengthened at points of entry
    and in      communities bordering areas reporting MVD cases and onboard conveyances,      and public health advice should be provided to travellers in line with <a href="https://www.who.int/publications/m/item/considerations-for-border-health-and-points-of-entry-for-filovirus-disease-outbreaks">WHO&rsquo;s interim guidance on considerations for border health and points of entry      for filovirus disease outbreaks</a>.</li><li data-list="0" data-level="1">WHO encourages all countries to send the first      samples that&nbsp;tested positive for Marburg virus and a subset of      negative samples to a WHO Collaborating Centre or a regional reference      laboratory for inter-laboratory comparison. </li><li data-list="0" data-level="1">WHO recommends that      clinical data from suspected and confirmed Marburg virus disease cases be systematically      collected to improve the limited understanding of the clinical course and      direct causes and risk factors for poor outcomes. This can
    be done by      contributing anonymized data to the&nbsp;<a href="https://www.who.int/tools/global-clinical-platform/viral-haemorrhagic-fever">WHO Global Clinical Platform</a>&nbsp;for viral      haemorrhagic fevers.</li><li data-list="0" data-level="1">Given the risk of      re-emergence of MVD through a reintroduction event or a new emergence, and      the possibility of a missed transmission chain, heightened surveillance      and response activities should be sustained during the initial 42-day      period and for at least six months beyond, <a href="https://www.who.int/publications/m/item/who-recommended-criteria-for-declaring-the-end-of-the-ebola-virus-disease-outbreak">WHO recommends</a> several activities during the 42-day period      including:<sup>2</sup> </li><ul type="circle"><li data-list="0" data-level="2">Ensure active case       finding around confirmed cases and transmission chains;</li><li data-list="0" data-level="2">Implement both active and passive       surveillance
    (e.g. through regular health facility visits and by maintaining       a nationwide system of alerts and signals); </li><li data-list="0" data-level="2">Conduct post-mortem       testing for MVD following suspected deaths in the community;</li><li data-list="0" data-level="2">Maintain and       strengthen rapid response team capacities.</li></ul><li data-list="0" data-level="1">WHO advises that all patients with MVD receive      holistic care including optimized supportive care including critical care      and mental health services in a treatment center designed for optimal      patient care and patient centered experience with biosecurity measures      such as unidirectional patient and staff flow and WASH services in place.</li><li data-list="0" data-level="1">WHO encourages countries to implement a      comprehensive care programme to support people who recovered from MVD with      any subsequent sequelae and to enable to them to mitigate the risk of transmission      through infected
    body fluids by adequate practices and through body fluid      testing. </li></ul><p>Based on the current risk assessment, WHO advises against any travel restrictions or any trade restrictions with Rwanda at this time. For further information, please see <a href="https://www.who.int/news-room/articles-detail/who-advises-against-any-travel-and-trade-restrictions-with-rwanda-in-the-context-of-the-ongoing-marburg-virus-disease-(mvd)-outbreak">WHO advice for international traffic in relation to the Marburg virus disease outbreak in Rwanda</a>.</p>'
  Assessment: <p>Marburg virus disease (MVD) is caused by the same family of viruses (Filoviridae) that causes Ebola virus disease. MVD is an epidemic-prone disease associated with high CFR (24-88%). In the early course of the disease, MVD is challenging to distinguish from other infectious diseases such as malaria, typhoid fever, shigellosis, meningitis and other viral haemorrhagic fevers. Epidemiologic features can help differentiate between viral hemorrhagic fevers (including history of exposure to bats, caves, or mining) and laboratory testing is essential to confirm the diagnosis. </p><p>With 66 confirmed cases reported, this is the third largest MVD outbreak reported to date, with almost 80% of confirmed cases reported among health workers. Healthcare-associated infections (also known as nosocomial infections) of this disease can lead to further spread if not controlled early. The importance of screening all persons entering health facilities as well as inpatient surveillance for prompt
    identification, isolation, provision of care and notification cannot be overemphasized. This is in addition to the importance of contact identification and listing and daily follow-up of all contacts. &nbsp;</p><p>Based on the outbreak investigation which included record review in health facilities, review of epidemiological data, serology and genomic sequencing, as well as environmental and animal testing, the source of the outbreak is reported to be of zoonotic origin, linked to exposure in a cave inhabited by fruit bats.<sup>1&nbsp;</sup>However, the dates of symptom onset of cases are still unknown to WHO. </p><p>MVD is not&nbsp;easily transmissible (i.e. in most instances it requires contact with the body fluids of a sick patient presenting with symptoms or with surfaces contaminated with these fluids). In addition, there are ongoing public health measures in place, including active surveillance in facilities and communities, testing suspected cases, isolation and treatment of cases
    and contact tracing.</p>
  Overview: <p>Since the last <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2024-DON543">Disease Outbreak News</a> on this event was&nbsp;published on 1 November 2024, no new confirmed cases of Marburg virus disease (MVD) were reported in Rwanda. As of 8 November 2024, 66 confirmed cases, including 15 deaths (CFR, 23%), have been reported and 51 people have now recovered. Among the confirmed cases, 68% are males, and 45% are adults between 30 and 39 years of age. Health workers from two health facilities in Kigali account for almost 80% of all confirmed cases. Most cases are reported from the three districts of Kigali city. </p><p>The highest number of confirmed cases (61) were reported in the first three epidemiological weeks (week 39-41) of the outbreak. This was followed by a sharp decline, with three or less cases reported between epidemiological week 42 (14 to 20 October), and 44 (28 October to 3 November).&nbsp; </p><p>As of 8 November 2024, 7408 Marburg virus
    tests have been conducted, with approximately 100-350 samples being tested daily at the Rwanda Biomedical Center. &nbsp;&nbsp;</p><p>Contact tracing is ongoing, with 470 contacts listed under follow-up as of 11 November 2024. </p><p>On 9 November 2024, the recommended 42-day countdown to declare the end of the outbreak commenced, the day after the last confirmed MVD patient tested negative by PCR. The 42-day countdown period is twice the maximum incubation period for Marburg virus infections, since the last potential exposure to the last reported case. &nbsp;The country has reported no new confirmed cases since 30 October 2024 and no new deaths since 14 October. All listed contacts will continue to be followed up until the end of their 21-day observation period. The outbreak will only be declared over if no new infections arise during the 42-day countdown.</p><p>WHO continues to support the Government of Rwanda to respond to the ongoing outbreak. Enhanced surveillance, and IPC measures
    must be maintained until the outbreak is declared over. </p><p>&nbsp;<strong>Figure 1. MVD cases by week of reporting in Rwanda, as of 8 November 2024, (n=66)</strong></p><p><img src="data:image/png;base64,"
    alt="" /></p><p>*Week 45 (4 to 10 November 2024) has incomplete data&nbsp;</p>
