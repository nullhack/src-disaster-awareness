  Response: <p><ul type="disc"><li data-list="1" data-level="1">The Government of      Rwanda is coordinating the response with support from WHO and partners.</li><li data-list="1" data-level="1">A surge team from WHO has been deployed to      support the in-country      response across the functions of incident management, epidemiology, health      operations, case management, infection prevention and control, laboratory,      health logistics, therapeutics and vaccines research, and partner      coordination. </li><li data-list="1" data-level="1">WHO and partners support MoH with surveillance training of trainers and follow-up      cascade training to district hospitals and health centers in      the country. </li><li data-list="1" data-level="1">WHO continues to support diagnostic testing for      MVD in Rwanda through provision of laboratory supplies and technical      support.&nbsp; WHO      is continuously engaged with its viral hemorrhagic fever collaborating centers      and other
    reference laboratories and partners to support assessment of      diagnostics test performance and ensuring technical support to continue regarding MVD testing.</li><li data-list="1" data-level="1">WHO is supporting the&nbsp;Government      in the establishment of a programme for recovered patients, by sharing      technical guidance and protocols for the establishment of a national      programme and by supporting the&nbsp;Rwanda Ministry of Health (MOH)      implementation effort. </li><li data-list="1" data-level="1">WHO is supporting the implementation of the nationally approved and launched Marburg      therapeutics clinical trial. The trial is enrolling patients as they are      admitted to the established MVD treatment center. </li><li data-list="1" data-level="1">WHO supported MOH in assessing the national IPC, Water, Sanitation and Hygiene      (WASH) readiness for response capabilities to MVD outbreak</li><li data-list="1" data-level="1">WHO and partners supported the MOH in
    conducting a validation workshop on the      developed national IPC operational guide and SOPs, which are being disseminated      to health facilities.</li><li data-list="1" data-level="1">WHO in collaboration with Africa CDC and partners are assisting in strengthening      capacity within the MOH through the national IPC Training of the Trainers      (ToT) program on MVD, being held from 11 to 16 November, targeting      national IPC focal points.</li><li data-list="1" data-level="1">WHO has supported the strengthening of IPC capacities by providing IPC      training to national veterinarians, who are being deployed to districts to      lead bat surveillance and sampling activities.</li><li data-list="1" data-level="1">WHO is collaborating      with MOH to enhance IPC capacities by continuing onsite training      activities for healthcare workers and providing mentorship and supervision in different priority health facilities.</li><li data-list="1" data-level="1">WHO supported MOH in
    the enhancing of IPC measures in the isolation and      treatment facility.</li><li data-list="1" data-level="1">WHO and partners (IOM, Africa CDC) are supporting      in building capacity at the points of entry (POE) through the national ToT      program, being held from 11- 16 November, targeting MVD/Mpox screeners at      the POEs.</li></ul><ul><li>WHO has provided technical advice to public health authorities in Rwanda and at-risk countries on the implementation of evidence-informed and risk-based health measures; the strengthening of detection, reporting and management capacities at points of entry and across borders; and travel advice. <strong></strong></li><li>WHO has published interim guidance on the <a href="https://www.who.int/publications/m/item/considerations-for-border-health-and-points-of-entry-for-filovirus-disease-outbreaks">Considerations for border health and points of entry for filovirus disease outbreaks</a>, which applies to but is not limited to the current MVD
    outbreak in Rwanda. <strong></strong></li><li>WHO has also published a statement <a href="https://www.who.int/news-room/articles-detail/who-advises-against-any-travel-and-trade-restrictions-with-rwanda-in-the-context-of-the-ongoing-marburg-virus-disease-(mvd)-outbreak">advising against any travel restrictions and against any trade restrictions with Rwanda</a> in the context of the ongoing MVD outbreak.&nbsp; <strong></strong></li><li>WHO is providing support in surrounding countries to assess the readiness of healthcare facilities, points of entry and border communities within surrounding countries and specifically risk mapping for areas bordering Rwanda.<strong></strong></li><li>WHO is supporting the MVD treatment center with direct support from clinical experts in infectious disease, critical care and nursing as well as health logistics and WASH expertise.</li><li>WHO is conducting training of clinical staff at MVD treatment on general aspects of MVD health operations, case management
    and optimized supportive care. MoH providing to trainees.&nbsp; </li><li>WHO is supporting the national case management pillar to collect standardized patient level data based on WHO electronic case report form from the WHO Global Clinical Platform and making descriptive reports of case management responses to outbreak.</li></ul></p>
