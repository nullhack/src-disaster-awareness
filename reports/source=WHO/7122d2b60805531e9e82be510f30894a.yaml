  Summary: "\r\nOn 9 November 2024, the recommended 42-day countdown to declare the end of the Marburg virus disease (MVD) outbreak in Rwanda commenced, the day after the last confirmed patient tested negative for MVD by polymerase chain reaction (PCR). As of 8 November 2024, 66 confirmed cases, including 15 deaths with a case fatality ratio (CFR) of 23% have been reported and 51 confirmed cases have recovered. The country has reported no new confirmed cases since 30 October 2024. \r\nThe outbreak will only be declared over if no new infections arise during the 42-day countdown.\r\nWHO continues to support the Government of Rwanda in responding to the outbreak. Enhanced surveillance, and infection prevention and control (IPC) measures must be maintained until the outbreak is declared over."
