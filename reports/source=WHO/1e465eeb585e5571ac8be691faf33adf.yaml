  Advice: <p>Effective Ebola disease outbreak, including SVD, control relies on applying a package of interventions, including case management, surveillance and contact tracing, a strong laboratory system, implementation of infection prevention and control measures in health care and community settings, safe and dignified burials and community engagement and social mobilization. </p><p>Risk communication and community engagement is crucial to successfully controlling SVD outbreaks. This includes raising awareness of symptoms, risk factors for infection, protective measures and the importance of seeking immediate care at a health facility. Sensitive and supportive information about safe and dignified burials is also crucial. Awareness should be built through targeted campaigns and direct work with affected and proximate communities, with special attention to engage with traditional healers, clergy, &lsquo;boda boda&rsquo; drivers and community leaders, who are important sources of information
    for the community. Findings from rapid qualitative assessments should continue to be implemented to collect socio-behavioural data, which can then be used to inform response pillars. Priority areas to strengthen, based on recent evidence are mortality surveillance, contact tracing and safe and dignified burials.&nbsp; Misinformation and rumours should be addressed to foster trust and promote early symptom reporting. </p><p>Early initiation of intensive supportive treatment increases the chances of survival. All above-mentioned interventions need to be thoroughly implemented in affected areas to stop chains of transmission and decrease disease mortality. Cases, contacts and individuals in affected areas who present signs and symptoms compatible with case definitions should be advised not to travel and seek early care at designated facilities to improve their chances of survival and limit transmission. </p><p>WHO encourages countries to implement a comprehensive care programme to support
    people who recovered from Ebola disease with any subsequent sequelae and to enable them to access body fluid testing and to mitigate the risk of transmission through infected body fluids by adequate practices.</p><p>Collaboration with neighbouring countries should be enhanced to harmonize reporting mechanisms, conduct joint investigations, and share critical data in real-time. Surrounding countries should enhance readiness activities to enable early case detection, isolation and treatment.</p><p>A range of candidate vaccines and therapeutics are under different stage of development. Since 2020, WHO has convened scientific deliberations and set up an independent process to review candidate medical countermeasures (MCMs) prioritization and clinical trial designs. One candidate vaccine and two candidate therapeutics (a monoclonal antibody and an antiviral) have been recommended and are available in country and are being assessed (clinical efficacy and safety) through randomized clinical
    trial protocols. </p><p>Thanks to preparedness measures that the government took after the previous outbreak in 2022, and a global research collaboration led by WHO (first MARVAC now FILOVIRUS CORC), a trial of a candidate vaccine was launched just four days after the outbreak was declared. A therapeutics trial will start as soon as national authorities provide approval.</p><p>The two vaccines licensed against Ebola virus disease (from the <em>Zaire</em> species) will not provide cross-protection against SVD and cannot be used in this outbreak. </p><p>WHO advises against any restrictions on travel and/or trade to Uganda based on available information for the current outbreak.&nbsp;</p>
  Assessment: <p>Sudan virus disease (SVD) is a severe, often fatal illness affecting humans. Sudan virus (SUDV) was first identified in southern Sudan in June 1976. Since then, the virus has emerged periodically and up to now and prior to this current one, eight outbreaks caused by SUDV have been reported, five in Uganda and three in Sudan. The case fatality rates of SVD have varied from 41% to 70% in past outbreaks. </p><p>SUDV is enzootic and present in animal reservoirs in the region. Uganda reported five SVD outbreaks (one in 2000, one in 2011, two in 2012, and one in 2022).&nbsp; The current outbreak is the sixth SVD outbreak in Uganda. Uganda also reported a Bundibugyo virus disease outbreak in 2007 and an Ebola virus disease outbreak exported from the Democratic Republic of the Congo in 2019. The latest SVD outbreak in Uganda was declared over on 11 January 2023. A total of 164 cases with 55 deaths were reported in nine districts. </p> <p>Uganda has experience in responding to Ebola
    disease outbreaks including SVD. In the ongoing outbreak, cases have been reported from several districts including the capital city, Kampala, with high population movement. Cases have sought care in several health facilities, including traditional healers, and some cases have been detected at a late stage of the disease or death. The government, with support from partners is implementing several public health actions for effective control. </p> <p>In the absence of licensed vaccines and therapeutics for the prevention and treatment of SVD, the risk of potential serious public health impact is high. Community deaths, care of patients in private facilities and hospitals and other community health services as well as at traditional healers with limited protection and infection prevention and control measures entail a high risk of many transmission chains. An investigation is ongoing to determine the source and the scope of the outbreak and the possibility of spread from the capital city,
    Kampala, to other districts. Exit screening has been set up at different points of entry to reduce the risk of potential exportation of cases to neighbouring countries.</p>
  Overview: '<p>Since the second <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON556">disease outbreak news</a> on this event published on 21 February 2025, three additional laboratory-confirmed cases and two probable deaths of SVD have been reported in Uganda. As of 5 March 2025, 12 confirmed and two probable cases, among these four deaths (two confirmed, two probable) have been reported with a case fatality ratio (CFR) of 29%. The latest confirmed cases are reported to be epidemiologically linked to the two probable cases. &nbsp;The age range of confirmed cases is 1.5 years to 55 years, with a mean age of 27 years and males accounted for 55% of the total cases. The cases were reported from six districts in the country which include Jinja, Kampala, Kyegegwe, Mbale, Ntoroko and Wakiso (Figure 1). </p><p>On 1 March 2025, the Ministry of Health released a press statement about the confirmation of a new case. The case was an under 5-year-old child identified at the
    Mulago Hospital where the patient presented with signs and symptoms meeting the suspect case definition. A laboratory sample was collected, and the child was confirmed with SVD on 26 February by PCR. Following investigations, two probable deaths linked to this case have been reported. This includes the child&rsquo;s mother who was pregnant at the time of symptom onset on 22<sup> </sup>January and died on 6 February. Her newborn child died on 12 February. The three deaths did not have a supervised burial. On 3 March, an 11<sup>th</sup> case was confirmed, an adult female, contact of case 10, and on 4 March, a 12<sup>th</sup> case was confirmed, an adult female, contact of the probable case (the mother of case 10). Both of these cases are currently admitted to treatment facilities. </p><p>Since the start of the outbreak, eight cases have recovered and been discharged.</p><p><strong></strong><strong>Figure 1: Distribution of Sudan virus disease confirmed, and probable cases reported from
    Uganda between 30 January and 5 March 2025</strong><br /></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/don-svd-uganda23a4fea8-b95f-4375-a7e9-09072f1e4f5d.png?sfvrsn=7f6439ec_3" height="435" style="max-width:100%;height:auto;display:block;margin-left:auto;margin-right:auto;" title="DON SVD Uganda" width="473" alt="DON SVD Uganda" class="-align-center" sf-size="64121" /><br /></p><p><strong>Figure 2: &nbsp;Epidemiological curve of reported confirmed SVD cases by symptom onset date, data as of 5 March 2025, (n=12)&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/don-svd-uganda-epi-curvefad9fc66-d72f-4a5b-a760-417fd42da3b7.png?sfvrsn=4034b5bd_3" height="1017" style="max-width:100%;height:auto;" title="DON SVD Uganda epi curve" width="2238" alt="DON SVD Uganda epi curve" sf-size="45896" /><br /></p><p>As of 5 March, there
    are 192 new contacts listed around the new cases and 299 previously listed contacts who had completed the 21-day follow-up period. &nbsp;</p><p>SVD alert levels reported from the community and the health facilities have been low and efforts are ongoing to improve this. Mortality surveillance has also been set up since the declaration of the outbreak and will continue in Jinja, Kampala, Mbale, Ntoroko and Wakiso districts. </p><p>Retrospective epidemiological and laboratory investigations are ongoing to find the source of the outbreak while active case search in and around the community and health facilities linked to the case movements have been intensified.&nbsp;</p>'
