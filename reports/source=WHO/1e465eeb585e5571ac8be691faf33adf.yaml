  Summary: "Since the outbreak of Sudan virus disease (SVD) was declared in Uganda on 30 January 2025, and as of 5 March 2025, a total of 14 cases (including 12 confirmed cases and two probable cases) including four deaths (two confirmed and two probable) have been reported.  On 1 March 2025, the Ministry of Health released a press statement confirming the tenth case. The patient was a child under 5 years old who presented and died in the Mulago hospital on 23 February 2025. As of 5 March, two additional confirmed cases and two probable deaths have been reported that are linked to this case. Both of these cases are currently admitted to treatment facilities. Eight confirmed cases received care at treatment centres in the capital Kampala and in Mbale and were discharged on 18 February 2025. As of 5 March 2025, 192 new contacts have been identified and are under follow-up in Kampala, Ntoroko and Wakiso.   \r\nIn the absence of licensed vaccines and therapeutics for the prevention and treatment\
    \ of SVD, the risk of potential serious public health impact is high. "
