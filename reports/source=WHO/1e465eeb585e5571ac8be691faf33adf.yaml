  Response: '<p>Health authorities are implementing public health measures, including but not limited to the following: </p><p><strong>Coordination: </strong></p><ul><li>The Ministry of Health (MoH) has activated the coordination structures at national and subnational levels, including the Incident Management Team and dispatched Rapid Response Teams to the affected districts. Regional Emergency Operation Centers have been activated in Fort Portal, Ntoroko, Kampala, and Mbale districts.</li><li>The country developed a National Response Plan (February-April 2025). The response plan has been updated to reflect current response priorities and builds on lessons learned from previous outbreaks. It deploys the basic minimum packages of activities across the districts according to risk.</li></ul><p><strong>Surveillance and contract tracing: </strong></p><ul><li>MoH with support from WHO and partners, is conducting alert management including the setup of an alert desk with toll-free numbers to detect
    and verify alerts from all over the country that meet the case definition. Since 30 January, over 1300 signals have been reported from all over the country and 112 alerts have been verified as suspected cases. </li><li>MoH with support from partners has allocated teams to conduct detailed case investigations around all confirmed and probable cases to identify and stop the chains of transmission. </li><li>MoH has allocated teams to conduct contact listing of cases and perform daily follow-up of contacts.</li><li>Following the declaration of the outbreak, MoH, with support from WHO, has established mortality surveillance. Over 770 non-trauma deaths were tested in communities and health facilities located in the affected districts, and one tested positive (case 10).</li><li>MoH set up a hotline for notification of suspected cases.</li><li>MoH is conducting exit screening of SVD signs and symptoms among travellers at Uganda&rsquo;s 13 high volume points of entry (POE) including Entebbe International
    Airport</li></ul><p><strong>Case Management: </strong></p><ul><li>MoH with support from WHO and partners has set up four designated isolation and treatment units in Jinja, Kampala, Mbale and now Fort Portal, where confirmed cases receive optimized supportive care. Plans are underway to conduct therapeutic clinical trials.&nbsp; </li><li>Patients who recovered from the disease are included in the survivor care programme for support and care.</li><li>MoH has scaled up its case management strategy to ensure sufficient capacities to provide care for all suspected and confirmed cases in all hot spots</li></ul><p><strong>Laboratory:</strong></p><ul><li>MoH and partners have strengthened laboratory capacities and deployed a mobile laboratory to Mbale to reduce turnaround time for laboratory results. </li><li>MoH has performed a <a href="https://virological.org/t/near-real-time-genomic-characterization-of-the-2025-sudan-ebolavirus-outbreak-in-uganda-s-index-case-insights-into-evolutionary-origins/990">full
    genome sequencing</a> on the sample of the first confirmed case and findings indicate the outbreak is most likely the result of a spillover event. Sequencing was also performed on samples of subsequent confirmed cases, </li></ul><p><strong>Infection prevention and control:</strong></p><ul><li>MoH has activated their IPC response coordination mechanism.</li><li>MoH has activated the IPC ring around cases, which includes cleaning and disinfection of sites where confirmed cases passed through. </li><li>In their official press statement, the MoH provided recommendations to health workers, district leaders, and the public to strengthen detection of suspected cases and implement appropriate infection, prevention and control measures. </li><li>MOH is surging and strengthening IPC activities, with the support of partners, notably to improve screening, isolation and notification at health facilities in order to better detect suspected cases. </li><li>MoH is orienting health workers on IPC measures
    in the context of Ebola disease outbreak response. </li></ul><p><strong>Risk communication and community engagement (RCCE) </strong></p><ul><li>An integrated community engagement approach has been adopted whereby the RCCE team facilitate access to communities for other response pillars. This helps to build trust and enhance contact tracing, case investigation, surveillance, referral to isolation units and provision of psychosocial support.<strong></strong></li><li>Anthropological investigation is used to identify community concerns, risk behaviours, reduce hesitancy from communities and to enhance evidence-informed decisions across pillars.<strong></strong></li><li>Development and dissemination of public health messages to promote protective and health seeking behaviours, community engagement to build trust and provide psychosocial support.<strong></strong><strong></strong></li></ul><p><strong>Research and development</strong></p><ul><li><strong>Research priorities:</strong><strong>
    </strong>The Collaborative Open Research Consortium (CORC) for the Filoviridae Family held two global consultations to deliberate and identify the research priorities for <em>Sudan ebolavirus</em> in general and this outbreak in particular. Over 200 scientists from around the world participated in each of the two consultations.<br /></li></ul><ul><li><strong>Ring vaccination trial: </strong>After the outbreak was confirmed on 30 January, researchers from the Uganda Makerere University and the Virus Research Institute (UVRI), with support from WHO, swiftly mobilised to launch the vaccination trial. The trial was initiated only four days following the outbreak, reflecting the urgency of the response while maintaining rigorous ethical and regulatory standards. The trial follows the ring vaccination model, in which primary and secondary contacts of confirmed cases receive the vaccine, to create a protective barrier and help break chains of transmission.<p>The development of the protocols
    and research priorities has been done via the MARVAC Consortium and the Collaborative Open Research Consortium (CORC) for the Filoviridae Family, European Union (EU) Health Emergency Preparedness and Response (HERA) and Canada&rsquo;s International Development Research Centre (IDRC) supported the development of these crucial trial protocols during the inter-epidemic, preparedness phase </p><p>EU HERA and IDRC also provided financial support for the trial, alongside WHO. The Coalition for Epidemic Preparedness Innovations (CEPI) is also providing support with additional support from the Africa Centres for Disease Control and Prevention (Africa CDC). The vaccine itself was donated by IAVI, with additional support from the Africa CDC. </p></li><li><strong>Therapeutics trial</strong>: While several promising candidate therapeutics are currently advancing through clinical development, no licensed treatment is yet available to effectively address potential future outbreaks of Ebola virus disease
    caused by the Sudan virus species. If successful, this trial could play a critical role in enhancing outbreak control measures and supporting the future regulatory approval of the candidate vaccine. Numerous developers facilitated the availability of the candidate vaccine and treatments: MappBio provided their candidate Sudan monoclonal, Gilead provided remdesivir, an antiviral.</li></ul><p><strong>WHO is supporting the national authorities through:</strong></p><ul><li>Risk assessment and investigation.</li><li>Providing operational, financial and technical support to the Ministry of Health to ensure swift response. A total of US$ 3.4 million was released from the Contingency Fund for Emergencies for the three levels of WHO to support the government-led response </li><li>Supporting the national laboratory system to implement sample collection, transport and diagnostic testing.</li><li>Providing strategic, technical and operational support to strengthen infection. prevention and control
    response measures and standards within health facilities and Ebola treatment units in Kampala, Mbale, Luwero districts. This includes supporting IPC ring activation activities, rapid assessments of health facilities, capacity building of health workers, mentorship and supportive supervision at designed health facilities and supporting development of key guidance, SOPs and tools. &nbsp;&nbsp;</li><li>Facilitating access to candidate vaccines and therapeutics and supporting the launch of the vaccine trial. Rings have been defined around all confirmed cases and their contacts have been invited to consent in the trial. &nbsp;As part of this support, the "TOKEMEZA SVD" vaccine trial was launched on 3 February 2025 and the TOKOMEZA immuno (an add-on study) was launched on 1 March 2025.</li><li>Providing technical and operation assistance for the setup of isolation centers for suspected cases and two Ebola treatment units in Kampala and Mbale.</li><li>Mobilizing logistics to complement government
    supplies, including IPC supplies, drugs, resuscitation and monitoring equipment, admission packages, and mattresses. </li><li>Deploying a team of 47 experts to Mbale, Kampala, Wakiso and Jinja districts to support across different response pillars including coordination, surveillance, laboratory, logistics, IPC, RCCE, and case management pillars. </li><li>Supporting RCCE efforts to counter misinformation and enhance community engagement through the deployment of two anthropologists.</li><li>Intensified and integrated risk communication and community engagement, including sensitization and training of Village Health Teams, traditional healers, religious leaders and teachers.&nbsp; </li><li>Collecting social and behavioural data and using evidence to respond to communities&rsquo; anxieties and concern, rumours, misinformation and disinformation</li></ul>'
