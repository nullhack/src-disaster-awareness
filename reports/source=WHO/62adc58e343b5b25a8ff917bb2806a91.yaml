  Advice: <p>In the absence of a licensed vaccine or specific therapeutic treatment for Nipah virus disease, the only way to reduce or prevent infection in people is by raising awareness of the risk factors. This includes providing guidance on measures that people can take to reduce exposure to the Nipah virus, and case management should focus on delivering timely supportive care, supported by an effective laboratory system. Intensive supportive care is recommended for treatment of severe respiratory and neurologic complications.&nbsp;&nbsp;&nbsp;</p><p>Public health educational messages should focus on:</p><p><strong>Reducing the risk of bat-to-human transmission </strong></p><ul type="disc"><li>Efforts to prevent      transmission should first focus on decreasing bat access to date palm sap      and other fresh food products. Freshly collected date palm juice should be      boiled, and fruits should be thoroughly washed and peeled before      consumption. Fruits with signs of bat bites
    should be discarded. Areas      where bats are known to roost should be avoided. </li></ul><p><strong>Reducing the risk of human-to-human transmission. </strong></p><ul type="disc"><li>Close unprotected physical      contact with NiV-infected people should be avoided. Regular hand washing      should be carried out after caring for or visiting sick people.</li><li>Protective measures include      guidelines to limit the spread of the disease both in households and      hospitals (use of protective equipment, isolation, and safe contact with      medical staff).</li><li>The options to prevent      secondary transmissions are active case finding, contact tracing,      isolation and quarantine of cases and their contacts.</li></ul><p><strong>Controlling infection in health care settings</strong></p><ul type="disc"><li>Health and care workers      caring for patients with suspected or confirmed infection, or handling      specimens from them, should implement standard precautions for infection      prevention
    and control at all times.</li><li>As health care-associated infections      and occupational infections of Nipah virus have been reported, in      health-care settings, contact and droplet precautions should be used in      addition to standard precautions, including the use of single-rooms for      isolation. Airborne precautions are required in addition to contact      precautions during aerosol-generating procedures.</li><li>Enhanced environmental      controls in health-care settings are advised, including twice daily      environmental cleaning and disinfection of all surfaces in the patient      care area of patients with suspected or confirmed NiV infection, and to      ensure inpatient care areas meet or exceed the minimum ventilation rate of      at least 60 litres per second per patient.</li><li>Samples taken from people      and animals with suspected NiV infection should be handled by trained      staff working in suitably equipped laboratories.</li></ul><p>&nbsp;Based on
    the currently available information,&nbsp;WHO does not recommend any travel and/or trade restrictions.</p>
  Assessment: <p>Nipah virus (Henipavirus nipahense) is a zoonotic pathogen with a high CFR (40-75%) and no licensed vaccine or treatment. Its reservoirs are fruit bats or flying foxes (bats in the <em>Pteropus</em> genus), which are distributed in the coastal regions and on several islands in the Indian ocean, India, south-east Asia and Oceania. The virus can be transmitted to humans from wild and domestic animals. So far, outbreaks have only been reported in Asia; however, as the disease can be transmitted by domesticated animals and secondary human-to-human transmissions are also possible, it has considerable epidemic or pandemic potential. The disease is endemic in Bangladesh, with seasonal outbreaks linked to bat activities and cultural practices such as the consumption of raw date palm sap.&nbsp; Seasonal outbreaks occur between December and May, coinciding with the harvesting of date palm sap.</p><p>To date, Bangladesh has documented 347 NiV disease cases, with a case fatality rate
    of 71.7%. Nearly half of these cases (n=162) were primary cases with a confirmed history of consuming raw date palm sap (DPS) or tari (fermented date palm sap), while 29% resulted from direct person-to-person transmission. In 2025 to date, four fatal cases of NiV infection have been reported in Bangladesh; however, none of them appear to be linked to each other. While three of the cases presented a seasonal pattern, clustered during the first two months of 2025, the fourth case presented outside of the usual season, with no history of consuming raw date palm sap, and the possible source of infection remains unknown. </p><p>Based on the current available information, <strong>WHO assesses the overall public health risk posed by NiV at the national level to be moderate</strong>, taking into consideration the high case fatality rate, no availability of specific drugs or vaccines for NiV infection and the difficulty of early diagnosis. Although sensitive and specific laboratory methods exist,
    the symptoms during the first phase are not specific and could potentially delay a timely diagnosis, outbreak detection and response. In addition, fruit bats (<em>Pteropus spp</em>.) are the natural reservoir of NiV, and they are present in Bangladesh and repeated spillover of the virus from its reservoir to the human population has been demonstrated. Despite ongoing efforts at risk communication and community engagement to raise awareness, there is continued consumption of raw date palm sap in the community.</p><p>People infected with NiV may remain asymptomatic. Although human-to-human transmission has been reported in previous outbreaks, it has been less frequent in recent years. The yearly number of NiV infection cases reported in Bangladesh has remained under 10 since 2016, except for 2023, when 13 cases were reported. &nbsp;Strong public health measures are implemented in Bangladesh to detect and control outbreaks, including sentinel NiV surveillance, established since 2006, and
    the availability of Rapid Response Team (RRT) at both the central and district levels, along with the capacity to rapidly test samples.</p><p>For neighbouring countries &ndash; India and Myanmar - <strong>WHO assesses the public health risk posed by NiV at the regional level to be moderate.</strong> While there has not been any report of previous cross-border transmission, the risk of spread still remains, given the shared ecological corridor of fruit bats and the occurrence among domestic animals and human cases previously reported in both countries. India has demonstrated capacity and experience in controlling previous NiV outbreaks.</p><p><strong>WHO assesses the public health risk posed by NiV at the global level to be low,</strong> as there have been no confirmed spread of cases outside Bangladesh.&nbsp;</p>
  Overview: '<p>Between 1 January and 29 August 2025, the Bangladesh IHR NFP notified WHO of four confirmed fatal Nipah virus (NiV) infection cases that occurred at different times from four separate districts across three different divisions (Barisal, Dhaka, and Rajshahi) of Bangladesh. All cases were confirmed through Reverse Transcription Polymerase Chain Reaction (PCR) and Enzyme-Linked Immunosorbent Assay (ELISA) testing, and no epidemiological links were reported to have been identified between the cases.</p><p>The first case was a young adult woman from Pabna district, Rajshahi division, with symptom onset on 25 January. She was admitted to a community hospital on 26 January and referred to another hospital the next day. She died on 28 January, and laboratory confirmation of NiV was received on 29 January. A total of 96 contacts were reported to be identified, and all tested negative for NiV.</p><p>The second case was an adult man from Bhola district, Barisal division, who developed
    symptoms on 13 February and was admitted to hospital on 19 February. He was transferred to another hospital the next day and died on 22 February. NiV infection was confirmed on 21 February. A total of 71 contacts were reportedly identified, and all tested negative for NiV.</p><p>The third case was an adult man from Faridpur district, Dhaka division, with symptom onset on 17 February. He was admitted to hospital on 25 February and died the same day. NiV infection was confirmed on 26 February. A total of 66 contacts were identified, and all tested negative for NiV.</p><p>The fourth case was a male child from Naogaon district, Rajshahi division, with symptom onset on 3 August. He was admitted to a hospital on 8 August and moved to the intensive care unit the following day. He died on 14 August. Samples collected on 10 August tested positive for NiV on 22 August. An outbreak investigation team was deployed the same day. A total of 72 contacts were identified, and samples from 11 symptomatic
    contacts were collected. Six tested negative, while the results for the remaining are awaited. This case was reported outside the typical season (December to April).</p><p>The first three cases had a history of consuming raw palm sap. However, the fourth case had no history of consuming raw palm sap, and the likely source/s of infection remain under investigation. None of the cases appears to be linked to each other. Fruit bats, the known reservoir for NiV, are present in the affected regions.</p><p>Since the report of the first case in 2001, human infections have been reported almost every year, with case fatality ratios (CFR) varying between 25% (in 2009) and 100% (in 2024). In 2024, five laboratory-confirmed fatal cases of NiV were reported from Bangladesh (Figure 1, Figure 2).</p><p><strong>Figure 1. Annual number of reported Nipah virus cases and deaths, 1 January 2001 &ndash; 9 September 2025, Bangladesh.</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/default-album/nipah-virus-infection-bangladesh.png?sfvrsn=d6a52175_3"
    height="559" style="max-width:100%;height:auto;" title="Number of Nipah cases by year_ Bangladesh" width="1038" alt="Number of Nipah cases by year_Bangladesh" sf-size="148907" /></p><p>Source: Institute of Epidemiology, Disease Control and Research, Bangladesh. https://iedcr.portal.gov.bd/site/page/d5c87d45-b8cf-4a96-9f94-7170e017c9ce/-&nbsp;</p><p><strong>Figure 2.</strong><strong> Distribution </strong><strong>of Nipah cases in Bangladesh, 2001-2025, as of 14 August 2025</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/default-album/map_nipah-virus-infection-bangladesh.png?sfvrsn=3bcf2a0_3" height="712" style="max-width:100%;height:auto;" title="Map_Nipah virus infection Bangladesh" width="638" alt="Map_Nipah virus infection Bangladesh" sf-size="355405" /><strong></strong></p><p></p>'
