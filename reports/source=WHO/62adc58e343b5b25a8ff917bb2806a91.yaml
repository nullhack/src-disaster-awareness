  Epidemiology: <p>Nipah virus infection is a zoonotic disease transmitted to humans through infected animals (such as bats or pigs), or food contaminated with saliva, urine, and excreta of infected animals. It can also be transmitted directly from person to person through close contact with an infected person. Fruit bats or flying foxes (<em>Pteropus</em> species) are the natural hosts for the virus.</p><p>The incubation period ranges from 4 to 14 days. However, an incubation period of up to 45 days has once been reported. Laboratory diagnosis of a patient with a clinical history of NiV infection can be made during the acute and convalescent phases of the disease by using a combination of tests. The main tests used are RT-PCR from bodily fluids and antibody detection via ELISA.</p><p>Human infections range from asymptomatic infection to acute respiratory infection (mild, severe), and fatal encephalitis (brain swelling).</p><p>Infected people initially develop symptoms including fever, headaches,
    myalgia (muscle pain), vomiting and sore throat. This can be followed by dizziness, drowsiness, altered consciousness, and neurological signs that indicate acute encephalitis. Some people can also experience atypical pneumonia and severe respiratory problems, including acute respiratory distress. Encephalitis and seizures occur in severe cases, progressing to coma within 24 to 48 hours. </p><p>Further information about NiV infection can be found <a href="https://www.who.int/news-room/fact-sheets/detail/nipah-virus">here</a>.</p><p>The CFR in outbreaks across Bangladesh, India, Malaysia, and Singapore range from 40% to 75%, depending on local capabilities for early detection and clinical management. There are currently no drugs or vaccines specific for NiV infection. Intensive supportive care is recommended to treat severe respiratory and neurologic complications. Henipavirus nipahense (Nipah virus) is considered a priority pathogen for the acceleration of medical countermeasures (MCMs)
    to respond to epidemics and pandemics as part of the WHO R&amp;D Blueprint for Epidemics.<sup>[1]</sup></p>
