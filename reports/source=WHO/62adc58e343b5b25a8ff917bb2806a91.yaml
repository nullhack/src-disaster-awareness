  Response: '<p>Several public health measures have been implemented by local authorities, including:</p><ul><li>The Ministry of Health and Family Welfare has conducted investigations in collaboration with other sectors through a One Health coordinated approach.</li><li>Contact tracing has been carried out around the identified cases, with continuous follow-up.</li><li>Surveillance effort has been strengthened and extended beyond the regular active and passive surveillance to ensure early case detection.</li><li>Health education and awareness campaigns, including community engagement and advocacy, are ongoing under the supervision of civil surgeons (the head of the district health systems).</li><li>Nipah information leaflets have been distributed in endemic areas as part of risk communication efforts.</li><li>Clinicians have been sensitized and alerted to NiV.</li><li>Prompt sample collection, transportation, and testing were conducted at the reference laboratories.</li></ul><p>The support
    provided by WHO: </p><ul><li>Provided event communication support at national and international levels, including the timely submission of an official IHR notification to WHO.</li><li>Closely followed up on NiV infection field investigations to support robust data collection and effective contact tracing.</li><li>Supported case management, including infection prevention and control measures at household and health facility levels to prevent secondary cases.</li><li>Monitoring of the evolving outbreak situation, especially during the ongoing Nipah season, including support for data compilation, assessment of epidemiological patterns, risk factors, and geographic spread.</li><li>Provided technical support to the government in developing public health messaging for the prevention and control of the outbreak.&nbsp;</li></ul>'
