  Epidemiology: <p>Animal influenza viruses typically circulate within animal populations, but some have the potential to infect humans. Human infections are predominantly acquired through direct contact with infected animals or exposure to contaminated environments. Based on the original host species, influenza A viruses can be categorized such as avian influenza, swine influenza, and other animal-origin influenza subtypes.<br /></p><p>Human infection with avian influenza viruses may result in a spectrum of illness, ranging from mild upper respiratory tract symptoms to severe, life-threatening conditions. Clinical manifestations include conjunctivitis, respiratory, gastrointestinal symptoms, encephalitis (brain swelling), and encephalopathy (brain damage). In some cases, asymptomatic infections with the A(H5N1) virus have been reported in individuals with known exposure to infected animals and environments.<br /></p><p>A definitive diagnosis of human avian influenza infection requires laboratory
    confirmation. WHO regularly updates its technical guidance on the detection of zoonotic influenza, utilizing molecular diagnostic methods such as RT-PCR. Clinical evidence indicates that certain antiviral agents, particularly neuraminidase inhibitors (e.g., oseltamivir, zanamivir), have been shown to shorten the duration of viral replication and improve patient outcomes in some cases. This antiviral agent should be administered within 48 hours of symptom onset.<br /></p><p>From 2003 to 1 July 2025, 986 cases of human infections with avian influenza A(H5N1), including 473 deaths (CFR 48%), have been reported to WHO from 25 countries. Almost all of these cases have been linked to close contact with infected live or dead birds, or contaminated environments. From 2003 to the present, 83 cases of human infection with influenza A(H5N1), including 49 deaths (case fatality ratio [CFR] of 59%), have been reported in Cambodia.</p>
