  Advice: <p>Based on available information, this event does not change WHO recommendations on public health measures and influenza surveillance.&nbsp;<br /></p><p>Given the observed extent and frequency of avian influenza in poultry, wild birds and some wild and domestic mammals, the public should avoid contact with any sick or dead animals. The public should avoid contact with high-risk environments, such as live animal markets/farms and live poultry or surfaces that might be contaminated by poultry droppings. Individuals should report deceased birds and mammals or request their removal by contacting local wildlife or veterinary authorities. Eggs, poultry meat and other poultry products should be properly cooked and handled during food preparation. Handling sick or dead poultry including slaughtering, butchering, and preparing poultry for consumption, should be avoided.&nbsp; Additionally, maintaining good hand hygiene through frequent hand washing with soap or using alcohol-based hand
    sanitizer is recommended.&nbsp;<br /></p><p>Any person exposed to potentially infected animal or contaminated environments and feels unwell should seek health care promptly and inform their healthcare provider of their possible exposure.&nbsp;<br /></p><p>WHO does not recommend special traveler screening at points of entry or other restrictions due to the current situation of influenza viruses at the human-animal interface.&nbsp;<br /></p><p>In the case of a confirmed or suspected human infection caused by a novel influenza A virus with pandemic potential, including avian influenza viruses, a thorough epidemiologic investigation of the history of animal exposure, travel, and contact tracing should be conducted even while awaiting the confirmatory laboratory results. The epidemiologic investigation should also include early identification of unusual events that could signal person-to-person transmission of the novel virus. Clinical samples collected from confirmed or suspected cases should
    be tested and sent to a WHO collaborating centre (WHOCC) for further characterization. Additional samples should be collected from animals, the environment or any foods suspected to be sources of infection. &nbsp;<br /></p><p>State Parties to the International Health Regulations (2005) are required to immediately notify WHO of any laboratory-confirmed case of a recent human infection caused by a new subtype of influenza virus. Evidence of illness is not required for this notification. WHO has updated the <a href="https://www.who.int/teams/global-influenza-programme/avian-influenza/case-definitions" target="_blank">influenza A(H5) confirmed case definition on the WHO website</a>.&nbsp;</p>
  Assessment: '<p>From 2003 to 1 July 2025, a total of 986 human cases of infection of influenza A(H5N1) have been reported globally to WHO from 25 countries, including this case.&nbsp; Almost all of these have been linked to close contact with A(H5N1) infected live or dead birds or mammals, or contaminated environments. Human infection can cause severe disease with a high mortality rate: of the 986 infections reported globally, there have been 473 deaths (CFR 48%).&nbsp;<br /></p><p>In this event, cases have been reported from seven provinces in 2025. All cases have reported direct exposure to sick/dead poultry. While human-to-human transmission cannot be ruled out, the more likely source of exposure of these cases is infected poultry of contaminated environment.&nbsp;&nbsp;<br /></p><p>Based on information available at this time, the overall public health risk from currently known influenza viruses circulating at the human-animal interface has not changed and remains low. For those occupationally
    exposed to the virus, such as farm workers, the risk is low to moderate, depending on the measures in place. Additional cases in persons with exposure to sick/dead poultry is to be expected. The occurrence of sustained human-to-human transmission in this event based on currently available information is currently considered unlikely. This can, however, change and the risk assessment will be reviewed as needed if additional information becomes available.&nbsp;<br /></p><p>Close analysis of the epidemiological situation, further characterization of the most recent influenza A(H5N1) viruses in both human and animal populations, and serological investigations are critical to update associated risk assessments for public health and promptly adjust risk management measures.&nbsp;<br /></p><p>Current seasonal influenza vaccines are unlikely to protect humans against infections with influenza A(H5N1) viruses. Vaccines against influenza A(H5) infection in humans have been developed and licensed
    in some countries. WHO continues to update the&nbsp;list&nbsp;of zoonotic influenza candidate vaccine viruses (CVVs), which are selected twice a year at the WHO consultation on influenza virus vaccine composition, and on an ad hoc basis as needed. The list of such CVVs is available on the WHO website, see reference below. In addition, the genetic and antigenic characterization of contemporary animal and zoonotic influenza viruses are published&nbsp;<a href="https://www.who.int/teams/global-influenza-programme/vaccines/who-recommendations/zoonotic-influenza-viruses-and-candidate-vaccine-viruses">here</a>.&nbsp;</p>This risk assessment will be reviewed as needed if additional information becomes available.&nbsp;'
  Overview: '<p>Between 1 January and 1 July 2025, the National IHR Focal Point (NFP) of the Kingdom of Cambodia notified WHO of 11 laboratory-confirmed case of human infection with avian influenza A(H5N1) virus (clade 2.3.2.1e- formerly classified as 2.3.2.1c; from cases where virus sequences are available to date) including six deaths [CFR: 54%]. These cases are reported from the provinces of Siem Reap (4), Takeo (2), Kampong Cham (1), Kampong Speu (1), Kratie (1), Prey Veng (1), Svay Rieng (1). Of the total cases reported in 2025, seven cases were reported in June 2025. <br /></p><p>Males account for 63% of the cases. Of the 11 cases, three cases were reported in less than five-year-olds, two cases were between the age of 5 and 18 years and six cases were reported in the age group 18-65 years. All cases had exposure &ndash; handling or culling - of sick poultry, often kept in backyards. <br /></p><p>Avian influenza A(H5N1) was detected for the first time in Cambodia in December 2003,
    initially affecting wild birds. Between 2014 and 2022, there were no reports of human infection with A(H5N1) viruses. However, the re-emergence of human infections with A(H5N1) viruses in Cambodia was reported in February 2023. Since this re-emergence, Cambodia has reported 27 cases of laboratory confirmed human infection with avian influenza A(H5N1) including 12 fatalities (CFR 44%).&nbsp; The cases have been reported from eight provinces: Kampong Cham (1), Kampong Speu (1), Kampot (3), Kratie (3), Prey Veng (6), Svay Rieng (4), Siem Reap (5), Takeo (4).&nbsp;</p><p><strong>Figure 1: &nbsp;Epicurve of Avian Influenza A (H5N1) cases reported in Cambodia by year from 2003- 1 July 2025&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/epicurve-cases-2003-2025.jpg?sfvrsn=4c5a48df_3" height="490" style="max-width:100%;height:auto;" title="Epicurve cases 2003-2025" width="1273" alt="Epicurve 2003-2025"
    sf-size="49960" /></p><p><strong>Figure 2: Geographic distribution of Avian Influenza A (H5N1) cases reported in Cambodia from 1 January &ndash; 1 July 2025.&nbsp;</strong></p><p><img src="https://cdn-auth-cms.who.int/media-aut/images/default-source/emergencies/disease-outbreak-news/geographic-distribution-of-cases-594633602.jpg?sfvrsn=fb78c0d9_4" sf-image-responsive="true" sf-size="51753" width="528" height="482" alt="Geographic distribution of cases" title="Geographic distribution of cases" style="max-width:100%;height:auto;" /></p><p></p><p><strong>Table 1: Details of Avian Influenza A (H5N1) cases reported in Cambodia between 1 January- 1 July 2025</strong> <img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/patient-details.jpg?sfvrsn=db826036_3" height="472" style="max-width:100%;height:auto;" title="Patient details" width="888" alt="Case details" sf-size="126837" /></p>'
