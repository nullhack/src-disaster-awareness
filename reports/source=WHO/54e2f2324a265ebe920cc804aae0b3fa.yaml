  Summary: "Between 1 January and 1 July 2025, the World Health Organization (WHO) was notified by Cambodia’s International Health Regulations (IHR) National Focal Point (NFP) of 11 laboratory-confirmed cases of human infection with avian influenza A(H5N1) virus. Seven of the 11 cases were reported in June, an unusual monthly increase.\r\n\r\nAvian influenza A(H5N1) was first detected in Cambodia, in December 2003, initially affecting wild birds. Since then, 83 cases of human infection with influenza A(H5N1), including 49 deaths (case fatality ratio [CFR] of 59%), have been reported in the country. While the virus continued to circulate in avian species, no human cases were reported between 2014 and 2022, after which, the virus re-emerged in humans in February 2023. Since the re-emergence of human A(H5N1) infections in Cambodia in 2023, a total of 27 cases have been reported (six in 2023, 10 in 2024, and 11 to date in 2025), of which 12 were fatal (CFR 44%). Seventeen of the cases occurred\
    \ in children under 18 years old.\r\nAvian influenza A(H5N1) is circulating in wild birds, poultry and some mammals around the world, and occasional human infections following exposure to infected animals or contaminated environments are expected to occur. In cases detected in Cambodia, exposure to sick poultry, often poultry kept in backyards, has been reported.\r\n\r\nAccording to the IHR, a human infection caused by a novel influenza A virus subtype is an event that has the potential for high public health impact and must be notified to the WHO. Based on currently available information, WHO assesses the current risk to the general population posed by this virus as low. For those occupationally exposed to the virus, such as farm workers, the risk is low to moderate, depending on the measures in place. WHO routinely reassesses this risk to factor in new information."
