  Response: <p>The Ministry of Health's national and sub-national rapid response teams have deployed to conduct further investigations and respond to the outbreak. This is being implemented in coordination with the local authorities, the Ministry of Environment and the Ministry of Agriculture, Forestry, and Fisheries.&nbsp;&nbsp;<br /></p><ul><li data-list="0" data-level="1">Investigations have focussed on identifying the source      of transmission in both humans and animals, conducting enhanced      surveillance, detecting suspected cases, and preventing community      transmission;&nbsp;&nbsp;</li><li data-list="1" data-level="1">Close contacts were monitored for their health status;&nbsp;&nbsp;</li><li data-list="3" data-level="1">Health education campaigns were conducted for      affected villages.&nbsp;<br /></li></ul><p><strong>Animal Health:</strong></p><p>The investigation and response team from the General Directorate of Animal Health and Production (GDAHP) and the&nbsp; sub-national
    animal health team conducted outbreak investigation and response to poultry outbreaks, in coordination with Ministry of Health, provincial health departments and local authorities.<br /></p><ul><li>Investigation on and response to the poultry outbreaks, with the response interventions focusing on disinfection and limiting animal movement across villages; </li><li>Community awareness and health education to affected communities; </li><li>Surveillance and monitoring on poultry diseases in affected villages.</li></ul>
