  Epidemiology: <p>Rabies is a vaccine-preventable, zoonotic, viral disease affecting the central nervous system. Once clinical symptoms appear, rabies is nearly 100% fatal. In up to 99% of cases, domestic dogs are responsible for rabies virus transmission to humans. Yet rabies can affect both domestic and wild animals. It spreads to people and animals via saliva, usually through bites, scratches or direct contact with mucosa (e.g. eyes, mouth or open wounds). Children between the ages of 5 and 14 years are frequent victims. Direct human-to-human transmission has never been documented, however it has occurred from infected organ/tissue donors to transplant recipients.</p><p>The incubation period for rabies is typically 2&ndash;3 months but may vary from 1 week to 1 year, depending on factors such as the location of virus entry and the viral load. Initial symptoms of rabies include generic signs like fever, pain and unusual or unexplained tingling, pricking, or burning sensations at the wound
    site. As the virus moves to the central nervous system, progressive and fatal inflammation of the brain and spinal cord develops. Clinical rabies in people can be managed but very rarely cured, and not without severe neurological deficits. Rabies deaths occur mainly in those who cannot immediately access effective post-exposure prophylaxis. According to the Union Against Rabies Forum (launched by FAO, WHO and WOAH), globally, every nine minutes one person dies from rabies. Almost half of them are children.</p><p>People can be protected against rabies through a vaccine given to individuals as pre-exposure or post-exposure prophylaxis. Post-exposure prophylaxis is the emergency response to a rabies exposure. This prevents the virus from entering the central nervous system, which would invariably result in death.</p>
