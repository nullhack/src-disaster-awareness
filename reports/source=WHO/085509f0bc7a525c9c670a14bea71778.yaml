  Summary: "The Timor-Leste government reported to the World Health Organization on 22 March 2024, its first confirmed fatal human case of rabies. The country is currently classified as rabies-free.\r\nThe case, from Pasabe Sub-Region, Oecusse, with a history of dog bite on 26 December 2023, went to a local health center on 20 March and died on 22 March 2024. \r\nDuring 2024, as of 24 April, a total of 95 exposures to dogs have been reported in Oecusse Municipality. Ten dogs were confirmed positive for rabies using rapid diagnostic tests. Out of the 95 exposures, seven had been bitten by confirmed rabid dogs.\r\n\r\nThe public health response is ongoing and includes vaccination of dogs, risk communication, training of healthcare workers on case management, active surveillance, and ensuring the availability of rabies vaccines and human rabies immunoglobulin.\r\nBased on the currently available information, the WHO assesses the risk posed by this event as high at the national level and low\
    \ at regional and global levels."
