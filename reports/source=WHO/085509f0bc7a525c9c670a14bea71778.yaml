  Advice: '<p>Although highly effective animal vaccines have been available for over a century, rabies remains present on all continents except Antarctica. Rabies is included in <a href="https://www.who.int/teams/control-of-neglected-tropical-diseases/ending-ntds-together-towards-2030#:~:text=New%20road%20map%20for%20neglected%20tropical%20diseases%202021%E2%88%922030&amp;text=Intensified%20cross%2Dcutting%20approaches%20%2D%20integrating,capacity%3B%20mobilizing%20regional%20%26%20global%20resources">WHO&rsquo;s 2021&ndash;2030 Roadmap for the Global Control of Neglected Tropical Diseases</a>, which sets regional, progressive targets for the elimination of targeted diseases. Rabies elimination is feasible and achievable if this goal is prioritized and financially and politically supported. The key to implementing effective rabies elimination programs is to engage with local communities, start small, catalyze long-term investment through stimulus packages, ensure the ownership of governments,
    demonstrate success and cost-effectiveness, and scale up quickly.</p><p>As a zoonotic disease, rabies requires close cross-sectoral coordination at the national, regional and global levels, including:</p><ul><li><em>Risk Communication and Community Engagement (RCCE):</em> Raising awareness of rabies disease through engaging communities and empowering people to seek early treatment whenever they are exposed to a rabid animal. This includes an understanding of how to prevent rabies in animals, when to suspect rabies, and what to do in case of exposure.</li><li><em>Immunization of persons:</em> Very effective rabies vaccines and rabies immunoglobulins are available to immunize people after suspected exposure to rabies (post-exposure prophylaxis). Appropriate wound management and prompt access to quality-assured PEP are almost 100% effective in preventing human rabies deaths. Pre-exposure prophylaxis (PrEP) is recommended for people in certain high-risk occupations (such as laboratory workers
    handling live rabies and rabies-related viruses) and people whose professional or personal activities might lead to direct contact with bats or other mammals that may be infected with rabies (such as animal disease control staff and wildlife rangers). PrEP might also be indicated for outdoor travellers and people living in remote, highly rabies-endemic areas with limited local access to rabies biologics.</li><li><em>Mass dog vaccination: </em>As dogs transmit up to 99% of human rabies cases, the control and elimination of rabies in dogs prevents rabies at its source. Vaccinating dogs, including puppies, is the most cost-effective strategy for preventing rabies in people, and reduces the need for PEP. Mass dog vaccination with high quality and safe vaccines, aiming at 70% coverage in endemic areas interrupts Rabies virus (RABV) transmission at its animal source and saves human lives. Education on dog behaviour and bite prevention for both children and adults is an essential extension
    of rabies vaccination programs and can decrease both the incidence of human rabies and the financial burden of treating dog bites.</li><li><em>Wildlife vaccination: </em>Oral rabies vaccination for use in wildlife is available with efficacy claims for several wildlife species, such as foxes, raccoon dogs, wolves, coyotes and raccoons.</li></ul><p>This event does not interfere with travel and trade. Travellers must be made aware of the risk of contracting rabies while traveling to areas considered at higher risk such as border areas with Indonesia.</p><p>&nbsp;</p>'
  Assessment: <p>The risk at the national level is assessed as &lsquo;High&rsquo; due to the following:</p><ol><li>&nbsp;<span style="background-color:transparent;font-family:inherit;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;font-size:inherit;">The country was previously classified as &ldquo;rabies free&rdquo; and has now reported      the first confirmed human case. As such, experience and awareness of      community and health care workers on rabies are likely limited.</span></li><li>Oecusse, the municipality where the current case was bitten and reported from, is      an enclave of Timor-Leste located within East Nusa Tenggara province (NTT)      in Indonesia where rabies is endemic in both dogs and humans, and where      between 1 January and 15 March 2024, six human rabies deaths have been      recorded.</li><li>Insufficient stock of human rabies vaccines in the government health facilities.</li><li>The health workers in the areas
    considered at high risk of rabies have been      trained for dog-bite management. A recent survey shows that 91% of health      workforce in Oecusse have demonstrated knowledge of dog-bite management      including PEP and RIG administration. However, in other parts of      Timor-Leste health workers have limited knowledge dog bite and scratch      case management including PEP and RIG administration. The      rabies case management guidelines have yet to be finalized and training      needs to be conducted on clinical management.</li><li>Timor-Leste has a significant population owning dogs and more than 70% vaccinated in      the areas bordering Indonesia. </li><li>Dog vaccination programme is continuing very effectively. Currently more than      35,000 dogs are vaccinated as of 24 April 2024. Despite limited human      resources, 102 dog vaccinators are doing door-do-door campaign in the      border areas and Dili to provide dog vaccine. </li><li>The frontliners from human health and
    those considered at higher risk have not      received pre-exposure vaccine due to non-availability of the same.</li></ol><p>Since Timor-Leste's only land border is with NTT province in Indonesia, which is already endemic for rabies (humans and canines), the risk of the international spread of rabies from Timor-Leste to other countries is unlikely. Available data indicates only the current one fatal case of rabies in Timor-Leste, with no links to international travel, tourism or international gatherings.</p>
  Overview: <p>On 22 March 2024, the Timor-Leste Ministry of Health and the Ministry of Agriculture, Fishery and Forestry, reported to the World Health Organization (WHO) its first confirmed fatal human case of rabies. The case is a 19-year-old female from Pasabe Sub-Region, Oecusse, formally known as the Special Administrative Region of Oe-C&uacute;sse Ambeno (RAEOA - Portuguese acronym). The case was confirmed by Real-Time Polymerase Chain Reaction (RT-PCT) at the National Health Laboratory in Timor-Leste on 22 March from a saliva sample taken prior to the individual&rsquo;s death.</p><p>On 20 March, the patient presented to a local health center with symptoms including high fever, vomiting, sore throat, cough, difficulty swallowing food, hydrophobia, photophobia, back pain, and neck stiffness. It was reported that she was bitten on the hands by a dog on 26 December 2023 in Oecusse. During the investigation, residents described the dog as very aggressive, and reported that it had not bitten
    anyone else. The dog died and was buried on 27 December 2023. The patient had not received rabies post-exposure prophylaxis (PEP) after the dog bite. On 21 March, she was transferred to Guido Valadares National Hospital (HNGV) in the capital city of Dili and died on 22 March 2024.</p><p>As of 24 April 2024, a total of 95 exposures to dogs have been reported in Oecusse Municipality. The Tetanus Toxoid (TT) and Rabies PEP vaccines were administered to all. Rapid diagnostic tests have confirmed that ten dogs were infected with rabies. Out of the 95 individuals who were exposed to dogs, seven were bitten by dogs that were confirmed to have rabies. Among these cases, two individuals have completed their post-exposure prophylaxis vaccinations (as of 24 April 2024).</p>   <p>It should be noted that Oecusse is an enclave of Timor-Leste located within Indonesia East Nusa Tenggara province (NTT) where between 1 January and 15 March 2024, six human rabies deaths have been recorded. In 2023, a total
    of 30 human rabies deaths were reported from NTT province.</p>
