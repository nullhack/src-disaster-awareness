  Response: '<p>The Timor-Leste Ministry of Health has taken the following public health response actions: </p><ul><li>Dog vaccination has been conducted in the Municipalities of Covalima, Bobonaro, RAEOA, and Dili achieving a coverage rate of more than 70% as of 24 April 2024. Dog vaccination is ongoing with a target to achieve 100% coverage.</li><li>Risk communication to raise community awareness via social media, community campaign and press conference, advising citizens residing in the border area to vaccinate their dogs, avoid contact with wild animals, observe if there are any changes in dog behavior, report dog bite incidents for immediate treatment and rabies vaccination.</li><li>Providing training to healthcare workers in all health care facilities on investigation and clinical management of suspected rabies exposures.</li><li>Implementing active surveillance, with all dog bite cases now required to be reported to the Community Health Centers (CHCs) with necessary information recorded
    and provided with appropriate case management. Staff have been trained for surveillance and outbreak investigations.</li><li>Ensuring availability of rabies vaccines and human rabies immunoglobulin (HRIG) in all CHCs and regional referral hospitals.</li><li>Community health centers in bordering areas have been provided the human rabies vaccine, and trainings have been conducted on rabies vaccination for health workforce of CHCs.</li><li>WHO supported a joint risk assessment and training for human health and veterinary services professionals on rabies prevention and control.</li><li>Organising Rabies Tripartite Expert Mission to Timor-Leste with Food and Agriculture Organization (FAO), WHO and World Organization for Animal Health (WOAH).</li></ul><p>WHO procured 1000 doses of human rabies vaccines and distributed them to hospitals and health clinics. Funds were further mobilized for fast tracking emergency procurement of additional 5000 rabies vaccine doses and 1000 vials of rabies immunoglobulin
    by WHO.</p><p>Collaboration between the Timor-Leste Ministry of Health and WHO is ongoing to provide additional anti-rabies vaccines and RIG to individuals who have been exposed to a suspected rabid animal.</p><p></p>'
