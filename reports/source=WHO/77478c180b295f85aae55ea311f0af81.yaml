  Title: Measles - Morocco
  Epidemiology: <p>Measles is a highly contagious, acute viral illness that affects people across all age groups and remains a leading cause of death among young children globally. Transmission occurs via airborne droplets or direct contact with respiratory secretions from infected individuals.</p><p>The incubation period typically ranges from 10 to 14 days. Prodromal symptoms include high fever, cough, coryza, and conjunctivitis, followed by the appearance of Koplik spots (small white lesions on the buccal mucosa). A characteristic maculopapular rash emerges approximately 2&ndash;4 days after fever onset, beginning on the face and upper neck before progressing to the trunk and lower limbs. Individuals are considered infectious from approximately four days before until four days after the rash appears.</p><p>While there is no specific antiviral therapy for measles, the majority of patients recover within 2&ndash;3 weeks with supportive care. However, the disease can result in severe complications,
    including pneumonia, diarrhea, otitis media, acute encephalitis, blindness, and death. Post-infectious encephalitis occurs in approximately 1 in 1000 cases. Measles also induces immune amnesia, a phenomenon in which the virus erases previously acquired immune memory, increasing susceptibility to other infections for months or even years after recovery.</p><p>Vaccination remains the cornerstone of measles prevention. The measles-containing vaccine is among the most effective vaccines available, with a two-dose schedule providing approximately 97% lifelong protection. Immunization not only prevents measles but also significantly reduces the risk of its potentially life-threatening complications.</p>
  Advice: <p>WHO recommends maintaining sustained, homogeneous coverage of at least 95% with both the first and second doses of measles-containing vaccine (MCV) to achieve and sustain population immunity. Integrated epidemiological surveillance for measles and rubella should be strengthened across both public and private healthcare sectors to allow for timely detection and confirmation of all suspected cases.</p><p>In countries and areas with high cross-border movement, including high-traffic border regions, WHO advises strengthening epidemiological surveillance, preparedness, and response capacities to ensure rapid identification and control of suspected measles cases. The activation of trained rapid response teams and implementation of established protocols are critical to prevent the re-establishment of endemic transmission following imported cases. Sustained coordination between national, sub-national, and local levels must be ensured, with effective communication channels across all
    tiers of the health system.</p><p>During outbreaks, WHO recommends ensuring adequate case management and infection prevention and control capacity in health facilities to prevent healthcare-associated infection transmission. This includes referring patients to airborne infection isolation rooms, where available, and preventing exposure to other patients in common areas such as waiting rooms.</p><p>WHO recommends ensuring broad access to measles-mumps-rubella (MMR) vaccination, especially for high-risk groups, including health workers and international travellers. Individuals residing in outbreak-affected areas should follow local public health guidance to reduce transmission risk.</p><p>In all settings, post-exposure prophylaxis should be considered for susceptible contacts. This includes administering MCV within 72 hours of exposure or normal human immunoglobulin (NHIG) within six days of exposure for individuals in whom vaccination is contraindicated. Infants, pregnant women, and immunocompromised
    individuals should be prioritized.</p><p>Countries are advised to maintain adequate stocks of MR/MMR vaccines and vaccination supplies, and ensure access to vaccination services for incoming and outgoing international travellers, including those traveling to or from areas with ongoing outbreaks and for vulnerable populations such as displaced persons or indigenous communities.</p><p>International travellers are advised to verify and update their measles vaccination status prior to departure, including those planning travel to Morocco. Individuals who are unvaccinated, have been exposed to measles, or show symptoms compatible with measles virus infection should consult local health authorities before undertaking international travel.</p><p>WHO does not recommend any restrictions on travel or trade to or from Morocco based on currently available information.</p>
  Assessment: '<p>Since October 2023, Morocco has been experiencing a measles outbreak that has spread to all regions of the country, with varying degrees of transmission and notable inter- and intra-regional disparities. In response, the MOHSP launched a nationwide catch-up vaccination campaign in March 2024, targeting individuals under the age of 18. The campaign was conducted through both fixed and mobile teams operating in schools and health centres and brought to light challenges related to vaccine hesitancy.</p><p>At the national level, the risk is considered moderate for unvaccinated or incompletely vaccinated and immunocompromised individuals, based on the following factors:</p><ul><li>A significant improvement in the national epidemiological situation, including resolution of the outbreak in the initially affected regions. However, transmission remains moderate in a few limited areas.</li><li>A declining trend in the number of cases has been observed since 1 February 2025. This
    trend is particularly evident in the most recently affected areas where case numbers have decreased by 64%. Healthcare services have not been significantly impacted, and hospital capacity has remained adequate.</li><li>Morocco has demonstrated strong public health response capacity, including successful management of past health emergencies, supported by active engagement of key stakeholders.<br /></li></ul><p>At the regional and global levels, the risk is assessed as moderate due to: </p><ul><li>Morocco''s geographical location as a crossroads between Africa, Europe and the Middle East.</li><li>High volumes of travel movement, which raise the likelihood of cross-border disease transmission. </li><li>Widening pockets of unvaccinated children have created a pathway for the spread of measles. </li><li>Inadequate immunization coverage globally remains a significant public health concern.</li></ul>'
  Overview: '<p>Since late 2023, Morocco has been experiencing a widespread measles outbreak. The first cases were reported in limited provinces of the Souss Massa region in central Morocco, before spreading to additional provinces within the region during the first quarter of 2024, and subsequently to other regions of the country.</p><p>From 1 October 2023 through 13 April 2025, more than 25 000 suspected measles cases were reported from all 12 regions, 13 706 of which were laboratory-confirmed cases and 184 people died. </p><p>During the week ending 27 April 2025, Morocco reported 995 suspected measles cases, representing an incidence rate of 2.7 per 100,000 population. While a national peak incidence was recorded in week 4 of 2025 (week ending 25 January), a declining trend in case numbers has been observed for ten consecutive weeks, starting from week 5 of 2025.</p><p>The distribution of cases by gender has been nearly equal, with 50.7% of cases among males and 49.3% among females. From
    1 January 2024 to 28 February 2025, 68% of cases occurred among individuals under the age of 18, and 49% of all cases were reported in unvaccinated individuals.</p><p>Genomic characterization of measles virus specimens collected during the 2024&ndash;2025 outbreak revealed exclusive circulation of genotype B3, which is common in many parts of Africa and has been associated with outbreaks globally. One isolated case was associated with genotype D8 and likely indicates a sporadic importation, with no evidence of sustained local transmission.</p><p>The measles vaccine was introduced into Morocco&rsquo;s national immunization schedule in 1987 as a single dose, and a second dose was added in 2014. It is administered in two doses: the first at 9 months of age, and the second between 15 and 18 months. According to WHO/UNICEF Estimates of National Immunization Coverage (WUENIC), Morocco has reported coverage with two doses of measles-containing vaccine (MCV2) above the 95% threshold required
    to achieve the elimination goal. However, this threshold was not achieved in the last three years.</p>'
