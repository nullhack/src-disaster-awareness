  Summary: "Since late 2023, Morocco has been experiencing a widespread measles outbreak. Cases have been recorded across all regions of the country, particularly among children and people who are unvaccinated.\r\nIn response, the Ministry of Health and Social Protection (MOHSP), in collaboration with relevant sectors, activated the National Center for Public Health Emergency Operations, launched urgent catch-up vaccination campaigns, and strengthened surveillance, case management, and risk communication and community engagement efforts.\r\nMeasles is a highly transmissible viral disease that can lead to severe complications and death. While Morocco has made significant progress toward measles elimination, the disease remains endemic in the country.\r\nThe overall risk is assessed as moderate at the national level and moderate at the regional level, particularly given the risk of cross-border transmission in areas with low vaccination coverage."
