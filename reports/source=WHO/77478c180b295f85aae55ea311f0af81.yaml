  Response: <p><strong><em>Leadership and coordination</em></strong></p><p>In response to the ongoing measles outbreak, the National Center for Public Health Emergency Operations at the Ministry of Health and Social Protection (MOHSP) of Morocco was activated to coordinate the response, with other involved sectors, through the national public health emergency management system. This system is supported by 12 regional public health emergency operation centres and 82 rapid epidemiological intervention teams deployed across the country.</p><p><strong><em>Surveillance and case management</em></strong><em></em></p><p>The MOHSP strengthened measles surveillance by establishing a system for early case detection and monitoring, facilitating timely response and continuous epidemiological tracking. In parallel, a laboratory confirmation plan was implemented in coordination with relevant partners to ensure accurate case verification.</p><p>In terms of case management, health facilities were equipped
    with vitamin A supplementation and essential medical supplies, distributed according to need. The national case management protocol was updated, and new protocols were developed and implemented for contact management, outbreak investigation, and infection prevention and control at the facility level.</p><p><strong><em>Vaccination</em></strong></p><p>A nationwide catch-up vaccination campaign was launched on 20 March last year, in collaboration with the Ministry of Interior, Ministry of National Education, Preschool and Sports, and the Ministry of Islamic Affairs. Initially targeting children under six years of age, the campaign was quickly expanded to include all children under 18 years, with encouragement for adult vaccination as part of outbreak control efforts. Provinces were supplied with vaccines, syringes, and vitamin A. The campaign included immunization against measles, as well as rubella, diphtheria-tetanus-pertussis (DTP), and polio.&nbsp;</p><p>Following the national vaccination
    campaign, the immunization status verification rate reached 98.45% as of 25 April 2025, with a total of 10.74 million children whose status has been verified. A rate of 73.6% was achieved for vaccination against measles-rubella (MR), 61.8% for the DTP (diphtheria, tetanus, pertussis) component and 57.7% for oral polio vaccine (OPV).</p><p><strong><em>Risk communication and community engagement</em></strong></p><p>To support risk communication and community engagement (RCCE), the MOHSP developed a communication strategy to raise public awareness and increase vaccination uptake. Activities included:</p><ul type="disc"><li data-list="0" data-level="1">A national media campaign, including a short video broadcast on      television and radio highlighting the importance of measles vaccination.</li><li data-list="0" data-level="1">A digital campaign, comprising five short digital video (reels), over      30 social media posts, articles, and an interactive Q&amp;A.</li><li data-list="0" data-level="1">Community-level
    mobilization, engaging local leaders and actors to      enhance public outreach and promote vaccine acceptance.</li></ul>
