  Advice: <p>Vector control, and protection against bites of sandflies, mosquitos, and ticks, are key measures to prevent transmission of CHPV. Poor housing and domestic sanitary conditions (lack of waste management or open sewerage) may increase sandfly breeding and resting sites, as well as vector access to humans.&nbsp;</p><p>Although there is no specific antiviral treatment and no approved vaccines, early access to care and supportive treatment can improve disease outcome. It is important to ensure that basic supportive care capacities are in place at primary and district health care facilities to manage cases before referral following the protocol (such as standard encephalitis management protocol). As such, increasing frontline health care worker knowledge of symptomology and referral pathways to designated facilities is key for early detection and access to appropriate care. </p><p>Surveillance efforts should be enhanced in high-risk areas, focusing on people at risks, such as children
    younger than 15 years of age presenting with acute onset of fever and central nervous system symptoms. </p><p>It is important to ensure that laboratory diagnostic capacities are available, including for timely collection, transport and testing of serum and cerebrospinal fluid samples for serological and virological investigation at a referral laboratory. </p><p>Risk communication and community engagement is critical to ensure effective vector control activities. Awareness and knowledge of potential risks, prevention methods, symptoms and when to seek testing and treatment should be enhanced among communities at risk. &nbsp;</p><p>WHO does not recommend any general travel or trade restrictions based on the available information.</p>
  Assessment: <p>Although previous outbreaks have been reported in India, this outbreak is considered the largest in the past 20 years. While authorities are making efforts to control the transmission of CHPV, further transmission of CHPV is possible in the coming weeks, considering the favorable conditions for vector populations during the monsoon season in affected areas.&nbsp;</p><p>CHPV infection causes a rapid symptom onset and a high case-fatality ratio (56-75%). There is no specific treatment or vaccine available,&nbsp;and management is symptomatic; timely referral of suspected AES cases to designated facilities can improve outcomes.&nbsp;&nbsp;CHPV infection can cause epidemics with a substantial demand on public health systems, including surveillance, case management, infection prevention and control, and laboratory capacity to diagnose CHPV infection.</p> <p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">WHO
    assessed the risk as moderate at the national level based on above considerations. The risk assessment will be reviewed as the situation of the outbreak evolves.</span><br /></p>
  Overview: <p>Between early June and 15 August 2024, the Ministry of Health and Family Welfare of the Government of India reported 245 cases of AES including 82 deaths (CFR 33%). A total of 43 districts in India are currently reporting AES cases. Cases are sporadically present across various districts as in previous outbreaks. Notably, there is a rise in CHPV outbreaks every four to five years in Gujarat state.</p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">Of the total 245 AES cases reported, CHPV has been confirmed in 64 cases through immunoglobulin M&nbsp;enzyme-linked immunosorbent assay&nbsp;(IgM ELISA) or reverse transcription polymerase chain reaction (RT-PCR). Of the 64 confirmed cases, 61 cases have been reported from Gujarat State and three from Rajasthan State.&nbsp;</span></p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;"></span>A
    declining trend in the number of new cases of AES has been observed daily since 19 July 2024.<sup>[1].[2]</sup><sup></sup><sup> </sup></p><p>To date, no human-to-human transmission has been reported. In 2003, a large outbreak of AES was reported in Andhra Pradesh, with 329 suspected cases and 183 deaths; a study suggests that this was due to CHPV.<sup>[2]</sup><sup></sup></p>
