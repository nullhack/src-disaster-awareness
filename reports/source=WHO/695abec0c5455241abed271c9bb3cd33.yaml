  Summary: "Between early June and 15 August 2024, the Ministry of Health and Family Welfare of the Government of India reported 245 cases of acute encephalitis syndrome (AES) including 82 deaths (CFR 33%). Of these, 64 are confirmed cases of Chandipura virus (CHPV) infection. CHPV is endemic in India, with previous outbreaks occurring regularly. However, the current outbreak is the largest in the past 20 years.  \r\n\r\nCHPV is a member of the Rhabdoviridae family and is known to cause sporadic cases and outbreaks of AES in western, central and southern parts of India, especially during the monsoon season. It is transmitted by vectors such as sandflies, mosquitoes and ticks. The case-fatality ratio from CHPV infection is high (56-75%), and there is no specific treatment or vaccine available. Survival can be increased with early access to care and intensive supportive care of patients.\r\n\r\nAlthough authorities are working to control CHPV transmission, further transmission of the virus\
    \ is possible in the coming weeks, as the monsoon season is creating favorable conditions for vector populations in the affected areas.  WHO recommends vector control, and protection against bites of sandflies, mosquitos, and ticks, to prevent further spread of CHPV."
