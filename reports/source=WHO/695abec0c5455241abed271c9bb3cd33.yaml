  Epidemiology: <p>CHPV is a member of the&nbsp;<em>Rhabdoviridae</em>&nbsp;family and is known to cause sporadic cases and outbreaks of AES in western, central and southern parts of India, especially during the monsoon season. It is transmitted by vectors such as sandflies, mosquitoes and ticks.&nbsp;<em>Phlebotomus papatasi&nbsp;</em>(a sandfly) is reported to be the vector of CHPV disease in Gujarat. CHPV can cause high case fatality ratios, ranging from 56% to 75% as reported during previous outbreaks in India.<sup>&nbsp;</sup>The disease affects mostly children under 15 years and can present with a febrile illness that may progress to convulsions, coma, and in some cases, death. In children, it can lead to high mortality within 48 to 72 hours of symptoms onset, typically presenting with AES. </p><p>CHPV has not been detected in other countries; however, according to a study<sup> [3]</sup><sup></sup>, it may be present in other countries in Asia and Africa. The sandfly vectors are abundant
    in the South-East Asia Region. There is no evidence that this virus has been detected among those travelling from India to other countries.</p>
