  Response: <p>The Ministry of Health and Family Welfare have taken the following prevention and control measures:</p><ul><li><strong>Deployment of National Joint Outbreak Response Team (NJORT):</strong> A specialized team has been dispatched to assist the Gujarat state government in implementing public health measures and conducting detailed epidemiological investigations.</li><li><strong>Vector control measures:</strong> Comprehensive insecticidal spraying and fumigation are being carried out to control vectors, such as sandflies, that transmit the virus.</li><li><strong>Health and awareness campaigns:</strong> Initiatives are underway to provide information to the public and medical personnel about the virus, its symptoms, and preventive measures.</li><li><strong>Research and monitoring:</strong> The Gujarat Biotechnology Research Centre (GBRC) is actively researching to identify other viruses causing encephalitis and is closely monitoring the situation.</li><li><strong>Advisories and
    coordination:</strong> Joint advisories from the National Centre for Disease Control (NCDC) and the National Centre for Vector Borne Diseases Control (NCVBDC) are being issued to guide neighboring states reporting cases of AES.</li></ul><p>The State authorities have taken the following public health response actions.</p><ul><li><strong>Gujarat:</strong>&nbsp;the state has undertaken various public health measures such as insecticidal spray for vector control, community engagement, sensitization of medical personnel and timely referral of cases to designated health facilities.</li><li><strong>Rajasthan:</strong> the health department has issued a <a href="https://www.newsonair.gov.in/rajasthan-health-dept-issues-detailed-advisory-to-take-precautions-for-chandipura-virus-after-child-tests-positive/">detailed advisory</a> to health professionals to take precautions regarding CHPV, after a three-year-old boy tested positive in the Dungarpur district. The department has also issued an alert
    in the Gujarat-bordering districts of Udaipur, Dungarpur, Banswara, Sirohi and Jalore.</li></ul><p><strong>Support provided by WHO </strong><strong></strong></p><p>WHO works closely with the Ministry of Health and Family Welfare (MoHFW), as a member of the Joint Monitoring Group, under the Director General of Health Services. The Group oversees the response efforts, and provides strategic guidance to ensure a coordinated and effective response. A WHO field team is actively engaged with local authorities, discussing and sharing technical information. Additionally, the WHO field team maintains constant communication with key local health officials and clinicians at health facilities to closely monitor the situation, and is supporting verification of signals generated from the event-based surveillance.</p>
