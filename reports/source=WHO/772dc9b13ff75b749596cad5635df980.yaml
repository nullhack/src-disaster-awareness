  Epidemiology: <p>Sudan virus disease is a severe disease, caused by a virus, Sudan virus (SUDV), belonging to the same family as Ebola virus. It can result in high case fatality. It is typically characterized by acute onset of fever with non-specific symptoms/signs (e.g., abdominal pain, anorexia, fatigue, malaise, myalgia, sore throat) usually followed several days later by nausea, vomiting, diarrhoea, and occasionally a variable rash. Hiccups may occur. Severe illness may include haemorrhagic manifestations (e.g., bleeding from puncture sites, ecchymoses, petechiae, visceral effusions), encephalopathy, shock/hypotension, multi-organ failure, and spontaneous abortion in infected pregnant women. Individuals who recover may experience prolonged sequelae (e.g., arthralgia, neurocognitive dysfunction, uveitis sometimes followed by cataract formation), and clinical and subclinical persistent infection may occur in immune-privileged compartments (e.g., central nervous system, eyes, testes).
    Person-to-person transmission occurs by direct contact with blood, other bodily fluids, organs, or contaminated surfaces and materials with transmission risk beginning at the onset of clinical signs and increasing with disease severity. Family members, health and care providers, and participants in burial ceremonies with direct contact with the deceased are at particular risk. The incubation period ranges from 2 to 21 days, but typically is 7&ndash;11 days.&nbsp;</p>
