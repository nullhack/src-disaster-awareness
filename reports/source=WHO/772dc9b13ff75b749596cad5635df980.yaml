  Response: '<p>Health authorities implemented public health measures, including but not limited to the following: <strong></strong></p><p><strong>Coordination: </strong></p><ul><li>The Ministry of Health activated the coordination structures at national and subnational levels, including the National Task Force and the Incident Management Team, and dispatched Rapid Response Teams to the affected districts. </li><li>The country developed a National Response Plan (February-April 2025). The response plan was updated to reflect the response priorities and builds on lessons learned from previous outbreaks. It deployed packages of activities across the districts according to risk.</li></ul><p><strong>Surveillance and contract tracing: </strong></p><ul><li>MoH with support from WHO and partners, conducted alert management including the setup of an alert desk with toll-free numbers to detect and verify alerts from all over the country that meet the case definition. Since 30 January, 3757 signals
    were reported from all over the country and 2700 alerts verified as suspected cases. </li><li>MoH with support from partners allocated teams to conduct detailed case investigations around all confirmed and probable cases to identify and stop the chains of transmission. </li><li>MoH allocated teams to conduct contact listing of cases and perform daily follow-up of contacts.</li><li>Following the declaration of the outbreak, MoH, with support from WHO, established mortality surveillance. Over 2940 non-trauma deaths were tested in communities and health facilities located in the affected districts, and one case tested positive.</li><li>MoH conducted exit screening of SVD signs and symptoms among travelers at Uganda&rsquo;s 13 priority points of entry including Entebbe International Airport</li></ul><p><strong>Case Management: </strong></p><ul><li>MoH with support from WHO and partners set up four designated isolation and treatment units in Fort Portal, Jinja, Kampala, and Mbale where confirmed
    cases receive optimized supportive care. </li><li>MoH scaled up its case management strategy to ensure sufficient capacities to provide care for all probable and confirmed cases in all hotspots.</li><li>Patients who recovered from the disease were included in the survivor care programme for support and care.</li></ul><p><strong>Laboratory:</strong></p><ul><li>MoH and partners strengthened laboratory capacities and deployed a mobile laboratory to Mbale to reduce turnaround time for laboratory results. </li><li>MoH performed <a href="https://virological.org/t/near-real-time-genomic-characterization-of-the-2025-sudan-ebolavirus-outbreak-in-uganda-s-index-case-insights-into-evolutionary-origins/990">full genome sequencing</a> on the sample of the first confirmed case and findings indicate the outbreak was most likely the result of a spillover event from a zoonotic reservoir. Sequencing was also performed on samples of subsequent confirmed cases. </li></ul><p><strong>Infection prevention
    and control (IPC):</strong></p><ul><li>MoH activated the IPC response coordination mechanism including the IPC ring around cases, which included cleaning and disinfection of sites where confirmed cases passed through. </li><li>MoH provided recommendations to health workers, district leaders, and the public to strengthen detection of suspected cases and implement appropriate infection, prevention and control measures. </li><li>MoH strengthened IPC activities, with the support of partners, notably to improve screening, isolation and notification at health facilities in order to better detect suspected cases. </li></ul><p><strong>Risk communication and community engagement (RCCE)</strong></p><ul><li>An integrated community engagement approach was adopted where the RCCE team supported other response teams to gain access to communities. This approach built trust and improved efforts in contact tracing, case investigation, community surveillance, referrals to isolation units and the delivery
    of psychosocial support.<strong></strong></li><li>Anthropological investigations in communities with confirmed cases were essential for an effective response to identify community concerns, risk behaviours, reduce hesitancy from communities and to enhance evidence-informed decisions across pillars.<strong></strong></li><li>Risk communication messages were strategically developed and widely disseminated to encourage protective and health-seeking behaviors. At the same time, ongoing community engagement efforts with religious leaders, schoolteachers, traditional healers and other local influencers helped build trust and supported community cooperation with broader response efforts. &nbsp;&nbsp;<strong></strong><strong></strong></li></ul><p><strong>Research and development</strong></p><ul><li><strong>Research priorities: </strong>The Collaborative Open Research Consortium (CORC) for the Filoviridae Family held two global consultations to deliberate and identify the research priorities for
    <em>Sudan ebolavirus</em> in general and this outbreak in particular. Over 200 scientists from around the world participated in each of the two consultations.</li><li><strong>Ring vaccination trial: </strong>Uganda&rsquo;s Ministry of health, with support from WHO and its partners, launched a vaccine trial against the Ebola Sudan virus, the first to assess the clinical efficacy of a vaccine specific to the Ebola Sudan virus.<strong> </strong>&nbsp;The trial was initiated only four days following the outbreak declaration, reflecting the urgency of the response while maintaining rigorous ethical and regulatory standards. After the outbreak was confirmed on 30 January, researchers from the Uganda Makerere University and the Uganda Virus Research Institute (UVRI), with support from WHO, conducted<strong> </strong>the vaccination trial and rings of contacts of all confirmed cases were defined and randomized. The trial followed the ring vaccination protocol, in which contacts of confirmed
    cases are offered the vaccine in rings that are randomized to receive the vaccine immediately or later to assess vaccine efficacy, safety and immunogenicity. <ul><li>The protocols and research priorities were developed in an open collaborative approach via the Marburg virus vaccine (MARVAC) Consortium and via the Collaborative Open Research Consortium (CORC) for the Filoviridae Family. This was possible because of the dedication of Uganda&rsquo;s health workers, the involvement of communities, the Ministry of Health of Uganda, Makerere Lung Institute and UVRI, and research efforts led by WHO involving hundreds of scientists through its research and development Filoviruses network. Vaccines were donated by International AIDS Vaccine Initiative (IAVI), funding support was provided by the Coalition for Epidemic Preparedness Innovations (CEPI), European Union Health Emergency Preparedness and Response (EU HERA) and Canada&rsquo;s International Development Research Centre (IDRC), with further
    support from Africa CDC.<ul><li><strong>Therapeutics trial</strong>: Several candidate therapeutics are currently advancing through clinical development, no licensed treatment is yet available to effectively address potential future outbreaks of Ebola disease caused by the Sudan virus species. The therapeutics trial did not receive the required Ethics and Regulatory approvals in Uganda and it was not initiated.</li><li>IAVI donated their candidate vaccine, MappBio provided their candidate Sudan monoclonal, and Gilead provided remdesivir, an antiviral.</li></ul></li></ul></li></ul><p><strong style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">WHO supported the national authorities through:</strong></p><ul><li>Risk assessment, active case search, alert notification, case investigation, contact tracing and epidemiological analyses.</li><li>Providing operational, financial and technical support to the Ministry
    of Health to ensure swift response. A total of US$ 3.4 million was released from the Contingency Fund for Emergencies for the three levels of WHO to support the government-led response. Additionally, a total of US$ 4.1 million was mobilized from donors to support the response.</li><li>Supporting the national laboratory system to implement sample collection, transport and diagnostic testing and providing RT-PCR testing kits.</li><li>Providing strategic, technical and operational support to strengthen infection prevention and control response measures and standards within health facilities and Ebola treatment units in Kampala, Mbale, Luwero districts. This includes supporting IPC ring activation activities, rapid assessments of health facilities, capacity building of health workers, mentorship and supportive supervision at designed health facilities and supporting development of key guidance, SOPs and tools. &nbsp;&nbsp;</li><li>Facilitating access to candidate vaccines and therapeutics
    and supporting the launch of the vaccine trial. Rings were defined around all confirmed cases and their contacts were invited to consent in the trial. &nbsp;As part of this support, the "TOKEMEZA SVD" vaccine trial was launched on 3 February 2025 and the TOKOMEZA immuno (an add-on study) was launched on 1 March 2025.</li><li>Providing technical and operation assistance for the setup of isolation centres for suspected cases and two SVD treatment units in Kampala and Mbale.</li><li>Mobilizing logistics to complement government supplies, including IPC supplies, drugs, resuscitation and monitoring equipment, admission packages, and mattresses. </li><li>Deploying a team of 67 experts to Jinja, Kampala, Mbale, and Wakiso districts to support across different response pillars including coordination, surveillance, laboratory, logistics, IPC, RCCE, and case management pillars. </li><li>Supporting RCCE efforts to counter misinformation and enhance community engagement through the deployment of
    two anthropologists.</li><li>Intensified and integrated risk communication and community engagement, including sensitization and training of Village Health Teams, traditional healers, religious leaders and teachers.&nbsp; </li><li>Collecting social and behavioural data and using evidence to respond to communities&rsquo; anxieties and concern, rumours, misinformation and disinformation</li></ul>'
