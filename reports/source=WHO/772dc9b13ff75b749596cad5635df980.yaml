  Advice: <p>Effective Ebola disease outbreak control, including SVD, relies on applying a package of interventions, including case management, surveillance and contact tracing, a strong laboratory system, implementation of infection prevention and control measures in health care and community settings, safe and dignified burials and community engagement and social mobilization. </p><p>Risk communication and community engagement is crucial to successfully controlling SVD outbreaks. This includes raising awareness of symptoms, risk factors for infection, protective measures and the importance of seeking immediate care at a health facility. Sensitive and supportive information about safe and dignified burials is also crucial. Awareness should be built through targeted campaigns and direct work with affected and proximate communities, with special attention to engage with traditional healers, clergy, &lsquo;boda boda&rsquo; drivers and community leaders, who are important sources of information
    for the community. Findings from rapid qualitative assessments should be implemented to collect socio-behavioural data, which can then be used to inform response pillars. Priority areas to strengthen, based on recent evidence are mortality surveillance, contact tracing and safe and dignified burials.&nbsp; Misinformation and rumours should be addressed to foster trust and promote early symptom reporting. </p><p>Early initiation of intensive supportive treatment increases the chances of survival. All above-mentioned interventions need to be thoroughly implemented in affected areas to stop chains of transmission and decrease disease mortality. Cases, contacts and individuals in affected areas who present signs and symptoms compatible with case definitions should be advised not to travel and to seek early care at designated facilities to improve their chances of survival and limit transmission. </p><p>WHO encourages countries to implement a comprehensive care programme to support people
    who have recovered from Ebola disease with any subsequent sequelae and to enable them to access body fluid testing and to mitigate the risk of transmission through infected body fluids by adequate practices.</p><p>Collaboration with neighbouring countries should be enhanced to harmonize reporting mechanisms, conduct joint investigations, and share critical data in real-time. Surrounding countries should enhance readiness activities to enable early case detection, isolation and treatment.</p><p>A range of candidate vaccines and therapeutics are under different stages of development. Since 2020, WHO has convened scientific deliberations and set up an independent process to review candidate medical countermeasures (MCMs) prioritization and clinical trial designs. One candidate vaccine and two candidate therapeutics (a monoclonal antibody and an antiviral) have been recommended and are available in country and are being assessed (clinical efficacy and safety) through randomized clinical
    trial protocols. </p><p>Thanks to preparedness measures that the government took after the previous outbreak in 2022, and a global research collaboration led by WHO (first MARVAC now FILOVIRUS CORC), a trial of a candidate vaccine was launched just four days after the outbreak was declared. </p><p>Based on the current risk assessment and prior evidence on Ebola disease outbreaks, WHO advises against any travel or trade restriction to Uganda.<strong></strong></p>
  Assessment: '<p>The outbreak is declared over, as of 26 April 2025 with no new cases reported for 42 consecutive days.</p><p>Sudan virus disease (SVD) is a severe, often fatal illness affecting humans. Sudan virus (SUDV) was first identified in southern Sudan in June 1976. Since then, the virus has emerged periodically and prior to this outbreak, eight outbreaks caused by SUDV have been reported, five in Uganda and three in Sudan. The case fatality rates of SVD have varied from 41% to 70% in past outbreaks. </p><p>SUDV is enzootic and present in animal reservoirs in the region. Uganda reported five previous SVD outbreaks (one in 2000, one in 2011, two in 2012, and one in 2022). The most recent SVD outbreak was declared over on 11 January 2023. A total of 164 cases with 55 deaths were reported in nine districts. The current outbreak is the sixth SVD outbreak in Uganda.</p> <p>This outbreak showed that re-emergence of SVD is a major public health concern in Uganda.&nbsp; Strengthening of
    surveillance capacities can help to detect future outbreaks, preventing further spread.</p> <p>An investigation is ongoing to determine the source and the scope of the outbreak to ensure no hidden chains of transmission exist and to inform future risk reduction efforts.</p> '
  Overview: '<p>Since the third <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON558">disease outbreak news</a> on this event published on 8 March 2025, no new confirmed cases of Sudan virus disease (SVD) have been reported. The outbreak was declared in Uganda on 30 January 2025, and as of 25 April 2025, 12 confirmed and two probable cases have been reported, including four deaths (two confirmed, two probable) with a case fatality ratio (CFR) of 29%. The age range of confirmed cases is 1.5 years to 55 years, with a mean age of 27 years. Males accounted for 55% of the total cases. The cases were reported from seven districts in the country which comprise Fort Portal City, Jinja, Kampala, Kyegegwa, Mbale, Ntoroko, and Wakiso (Figure 1). </p><p>Ten of the confirmed cases received care at SVD treatment centres, including the last two cases who were discharged on 15 March 2025. As of 24 April 2025, 534 contacts were identified and followed up in Fort Portal City, Jinja,
    Kampala, Mbale, Ntoroko, and Wakiso.&nbsp;&nbsp; </p><p>On 26 April 2025, the Ministry of Health of Uganda declared the end of the outbreak. This declaration came after two consecutive incubation periods (a total of 42 days) since the last person confirmed with SVD tested negative for the virus for the second time on 14 March 2025, according to WHO recommendations. </p><p><strong>Figure 1: Distribution of Sudan virus disease (SVD) confirmed, and probable cases reported from Uganda between 30 January and 25 April 2025</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/don-map-svd-uganda.png?sfvrsn=4575304a_3" height="465" style="max-width:100%;height:auto;display:block;margin-left:auto;margin-right:auto;" title="DON map SVD Uganda" width="513" alt="DON map SVD Uganda" class="-align-center" sf-size="77635" /></p><p><strong>Figure 2: &nbsp;Epidemiological curve of reported confirmed and probable SVD cases
    by symptom onset date, data as of 25 April 2025, (n=14)&nbsp;</strong></p><p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/svd-uganda-epi-curve.png?sfvrsn=209c9ed6_5" height="1025" style="max-width:100%;height:auto;" title="SVD Uganda Epi curve" width="2338" alt="SVD Uganda Epi curve" sf-size="60570" /></p><p></p><p></p>'
