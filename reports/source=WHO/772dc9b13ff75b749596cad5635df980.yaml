  Summary: 'On 26 April 2025, the Ministry of Health (MoH) of Uganda declared the end of the Sudan virus disease (SVD) outbreak after two consecutive incubation periods (a total of 42 days) since the last person confirmed with SVD tested negative for the virus on 14 March 2025. A total of 14 SVD cases (including 12 confirmed cases and two probable cases) including four deaths (two confirmed and two probable) have been reported during this outbreak. WHO and partners provided technical, operational and financial support to the government to contain the outbreak. Although the outbreak has been declared over, health authorities are maintaining surveillance to rapidly identify and respond to any re-emergence. Risk communication and community engagement will also continue to ensure the community stay informed and stigma to those who were affected is minimized.  '
