  Response: '<p>Health authorities are implementing public health measures, including but not limited to the following: </p><p><strong>Coordination: </strong></p><ul><li>The Ministry of Health (MoH) has activated the coordination structures at national and subnational levels, including the Incident Management Team and dispatched Rapid Response Teams to the affected districts. Regional Emergency Operation Centers are being activated in Kampala and Mbale districts.</li><li>In addition, the country has developed a National Response Plan (February - April 2025). The response plan builds on lessons learned from previous outbreaks and deploys the basic minimum packages of activities across the districts according to risk.</li></ul><p><strong>Surveillance and contract tracing: </strong></p><ul><li>MoH with support from WHO and partners are conducting alert management including the setup of an alert desk with toll free numbers to detect and verify alerts from all over the country that meet the case
    definition. Since 30 January, 138 alerts have been reported and discarded following negative laboratory testing. </li><li>MoH with support from partners has allocated teams to conduct detailed case investigations around the first reported case and the eight additional cases to identify the source of the outbreak and the chains of transmission. </li><li>MoH has allocated teams to conduct contact listing of confirmed cases with overall daily contact follow-up rates in the last seven days improving to 100%. Following the declaration of the outbreak, MoH with support from WHO has established mortality surveillance with over 400 non-trauma deaths tested in communities and health facilities located in the affected districts and all have tested negative.</li><li>MoH set up a hotline for notification of suspected cases.</li><li>MoH is conducting exit screening of SVD signs and symptoms among travelers at Uganda&rsquo;s 13 high volume points of entry (POE) including Entebbe International Airport.</li></ul><p><strong>Case
    Management: </strong></p><ul><li>MoH with support from WHO and partners have set up three designated isolation and treatment units in Jinja, Kampala and Mbale where the confirmed cases received optimized supportive care and Remdesivir under the Monitored emergency use of unregistered and experimental interventions (MEURI) protocol. </li><li>Suspected SVD cases are also isolated and receiving care at the isolation units while awaiting test results. </li><li>Patients who recovered from the disease will be included in survivor care programme for support and care.</li></ul><p><strong>Laboratory:</strong></p><ul><li>MoH and partners have strengthened laboratory capacities and deployed a mobile laboratory to Mbale to reduce turnaround time for laboratory results. MoH has performed a <a href="https://virological.org/t/near-real-time-genomic-characterization-of-the-2025-sudan-ebolavirus-outbreak-in-uganda-s-index-case-insights-into-evolutionary-origins/990">full genome sequencing</a> on the
    sample of the first confirmed case and findings indicating the outbreak is most likely the result of a spillover event.</li></ul><p><strong>Infection prevention and control:</strong></p><ul><li>MoH organized a safe and dignified burial of the first reported case.&nbsp; </li><li>In their official press statement, the MoH provided recommendations to health workers, district leaders, and the public to strengthen detection of suspected cases and implement appropriate infection, prevention and control measures.&nbsp;</li></ul><p><strong>WHO is supporting the national authorities, including through:</strong></p><ul><li>Risk assessment and investigation.</li><li>Providing operational, financial and technical support to the Ministry of Health to ensure swift response. A total of US$ 3.4 million was released from the Contingency Fund for Emergency for the three levels of WHO to support the government-led SVD response.</li><li>Supporting the national laboratory system to implement sample collection,
    transport and diagnostic testing.</li><li>Facilitating access to candidate vaccines and therapeutics and supporting launch of the vaccine trial. Rings have been defined around all confirmed cases and their contacts have been invited to consent in the trial. &nbsp;As part of this support, the "TOKEMEZA SVD" vaccine trial was launched on 3rd February 2025.</li><li>Providing technical and operation assistance for the setup of isolation centers for suspected cases and two Ebola treatment units in Kampala and Mbale.</li><li>Mobilizing logistics to complement government supplies, including IPC supplies, drugs, resuscitation and monitoring equipment, admission packages, and mattresses. </li><li>Deploying a team of 47 experts to Mbale, Kampala, Wakiso and Jinja districts to support across different response pillars including coordination, surveillance, laboratory, logistics, IPC, RCCE, and case management pillars. </li><li>Supporting RCCE efforts to counter misinformation and enhance community
    engagement through the deployment of two anthropologists.</li><li>Intensified and integrated risk communication and community engagement, including sensitization and training of Village Health Teams, traditional healers, religious leaders and teachers.&nbsp; </li><li>Collecting social and behavioural data and using evidence to respond to communities&rsquo; anxieties and concern, rumours, misinformation and disinformation.</li></ul>'
