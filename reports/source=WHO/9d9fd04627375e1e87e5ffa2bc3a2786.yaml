  Summary: "As of 20 February 2025, a total of nine confirmed cases of Sudan virus disease, including one death have been reported from Uganda, since the outbreak was declared on 30 January 2025. Eight cases received care at treatment centres in the capital Kampala and in Mbale and were discharged on 18 February after two negative tests 72 hours apart. As of 20 February 2025, 58 contacts that have been identified are still under follow up in designated quarantine facilities located in Jinja, Kampala,and Mbale. \r\nSudan virus disease belongs to the same family as Ebola virus disease. It is caused by Sudan virus (SUDV). It is a severe disease with high case fatality ranging from 41% to 70% in past outbreaks. In the absence of licensed vaccines and therapeutics for the prevention and treatment of SVD, the risk of potential serious public health impact is high.   \r\n \r\nEarly detection, diagnosis, and optimized supportive care may increase the chance of survival. "
