  Advice: <p>Effective Ebola disease outbreak, including SVD, control relies on applying a package of interventions, including case management, surveillance and contact tracing, a strong laboratory system, implementation of infection prevention and control measures in health care and community settings, safe and dignified burials and community engagement and social mobilization. </p><p>Risk communication and community engagement is crucial to successfully controlling SVD outbreaks. This includes raising awareness of symptoms, risk factors for infection, protective measures and the importance of seeking immediate care at a health facility. Sensitive and supportive information about safe and dignified burials is also crucial. Awareness should be built through targeted campaigns and direct work with affected and proximate communities, with special attention to engage with traditional healers, clergy, and community leaders, who are important sources of information for the community. Rapid qualitative
    assessments should be implemented to collect socio-behavioural data, which can then be utilized to guide the response.&nbsp; Misinformation and rumours should be addressed to foster trust and promote early symptom reporting. Early initiation of intensive supportive treatment increases the chances of survival. All above-mentioned interventions need to be thoroughly implemented in affected areas to stop chains of transmission and decrease disease mortality. Cases, contacts and individuals in affected areas who present signs and symptoms compatible with case definitions should be advised not to travel and seek early care at designated facilities to improve their chances of survival and limit transmission. </p><p>WHO encourages countries to implement a comprehensive care programme to support people who recovered from Ebola disease with any subsequent sequelae and to enable them to access body fluid testing and to mitigate the risk of transmission through infected body fluids by adequate
    practices.</p><p>Collaboration with neighbouring countries should be enhanced to harmonize reporting mechanisms, conduct joint investigations, and share critical data in real-time. Surrounding countries should enhance readiness activities to enable early case detection, isolation and treatment.</p><p>A range of candidate vaccines and therapeutics are under different stage of development. Since 2020, WHO has convened scientific deliberations and set up an independent process to review candidate MCMS prioritization and clinical trial designs. One candidate vaccine and two candidate therapeutics (a monoclonal antibody and an antiviral) have been recommended and are available in country and are being assessed (clinical efficacy and safety) through randomized clinical trial protocols. </p><p>Thanks to preparedness measures that the government took after the previous outbreak in 2022, and a global research collaboration led by WHO (first MARVAC now FILOVIRUS CORC), a trial of a candidate vaccine
    was launched just four days after the outbreak was declared. A therapeutics trial will start as soon as national authorities provide approval.</p><p>The two vaccines licensed against Ebola virus disease will not provide cross protection against SVD and cannot be used in this outbreak. </p><p>WHO advises against any restrictions on travel and/or trade to Uganda based on available information for the current outbreak.&nbsp;</p>
  Assessment: <p>Sudan virus disease (SVD) is a severe, often fatal illness affecting humans. Sudan virus (SUDV) was first identified in southern Sudan in June 1976. Since then, the virus has emerged periodically and up to now and prior to this current one, eight outbreaks caused by SUDV have been reported, five in Uganda and three in Sudan. The case fatality rates of SVD have varied from 41% to 70% in past outbreaks. <br /></p> <p>SUDV is enzootic and present in animal reservoirs in the region. Uganda reported five SVD outbreaks (one in 2000, one in 2011, two in 2012, and one in 2022).&nbsp; The current outbreak is the sixth SVD outbreak in Uganda. Uganda also reported a Bundibugyo virus disease outbreak in 2007 and an Ebola virus disease outbreak exported from the Democratic Republic of the Congo in 2019. The latest SVD outbreak in Uganda was declared over on 11 January 2023. A total of 164 cases with 55 deaths were reported in nine districts.<br /></p> <p>Uganda has experience in Ebola
    disease outbreaks including SVD, and in the ongoing outbreak, necessary actions have been initiated and implemented quickly for effective control. <br /></p> <p>In the absence of licensed vaccines and therapeutics for the prevention and treatment of SVD, the risk of potential serious public health impact is high. Community deaths, care of patients in private facilities and hospitals and other community health services as well as at traditional healers with limited protection and infection prevention and control measures entail a high risk of many transmission chains. An investigation is ongoing to determine the source and the scope of the outbreak and the possibility of spread from the capital city, Kampala, to other districts. Exit screening has been set up at different points of entry to reduce the risk of potential exportation of cases to neighbouring countries.</p>
  Overview: '<p>Since the first <a href="https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON555">disease outbreak news</a> on this event was&nbsp;published on 1 February 2025, additional eight laboratory-confirmed cases of Sudan virus disease (SVD) have been reported in Uganda. As of 20 February 2025, a total of nine confirmed cases, including one death have been reported with a case fatality ratio (CFR) of 11%. Cases ages range from 1.5 to 49 years, with a mean age of 27 years and males accounted for 56% of the total cases. The cases were reported from four districts in the country which include Jinja, Kampala, Mbale, and Wakiso (Figure 1). </p><p>The first reported case, who was a health worker, had symptom onset on 19 January in epidemiological week 3 (Figure 2). The case initially self-medicated with antimalarials and sought care in different health facilities located in Wakiso, Kampala and Mbale districts, as well as a traditional healer in Mbale, before being referred
    to Mulago referral hospital, where he died on 29 January 2025. Following the detection and confirmation of SVD on 29 January, the case was accorded a safe and dignified burial on 31 January in Mbale. </p><p>Following the prompt declaration of the outbreak by the Ministry of Health on 30 January, a detailed case investigation was conducted on the first case including comprehensive contact listing in all the districts where the case travelled. Contacts were quarantined in a designated facility and monitored for 21 days. The other eight reported confirmed cases were among the listed contacts and include family members (five cases) and health workers (three) who had direct contact with the first case as they provided care during his illness. &nbsp;The secondary cases had symptom onset between 29 January to 6 February. All were detected at early onset of their disease by contact tracing team while in quarantine. They were referred to Mulago National Referral Hospital (seven cases) and Mbale
    Regional Referral Hospital (one case) for optimized supportive care and received Remdesivir under the Monitored emergency use of unregistered and experimental interventions (MEURI) protocol. All eight cases were discharged on 18 February 2025 after two negative tests carried out 72 hours apart. </p><p><strong>Figure 1: Distribution of confirmed SVD cases reported from Uganda between 30 January-20 February 2025</strong></p><p><strong></strong><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/map-svd-uganda.jpg?sfvrsn=41fc3723_4" style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;" alt="SVD Uganda map" sf-size="43880" /></p><p><strong>Figure 2: &nbsp;Epidemiological curve of confirmed SVD cases by symptom onset date, data as of 20 February 2025, (n=9)</strong>&nbsp;</p><p><img src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/epicurve-svd-uganda.jpg?sfvrsn=7d089370_3"
    alt="Uganda SVD Epicurve" sf-size="35800" /></p><p>Based on the <a href="https://www.who.int/publications/m/item/who-recommended-criteria-for-declaring-the-end-of-the-ebola-virus-disease-outbreak">WHO criteria to declare the end of a filovirus outbreak</a>, a countdown to the end of the human-to-human transmission can be started from the day after the last possible exposure, in this case, the day following negative tests. Should no additional cases be reported, the outbreak will be declared over in 42 days, that is two incubation periods. Several activities including heightened surveillance for a period of 42 days is recommended to ensure that there are no missed chains of transmission.&nbsp; </p><p>As of 20 February, a cumulative of 299 contacts have been listed from affected districts in the country since the start of the outbreak. Over 75% of contacts have completed the 21-day follow-up period. However, 58 are still being monitored in institutional quarantine facilities to complete
    a 21-day since the last contact with a confirmed case. &nbsp;</p><p>Alert levels both from the community and the health facilities have been low. Several activities, including training and active case search are ongoing during the 42-day countdown to strengthen surveillance with integrated approach and increase the number of alerts and suspected cases reported, investigated and tested. Mortality surveillance has also been set up since the declaration of the outbreak and will continue in Jinja, Kampala and Mbale. </p><p>In addition, retrospective investigations are ongoing to find the source of the outbreak through active case search in and around the community and health facilities where the first case was residing and working.&nbsp;</p><p>This is the sixth outbreak of SVD in Uganda, the most recent outbreak was reported in September 2022 with 164 cases and 55 deaths.&nbsp;<br /></p>'
