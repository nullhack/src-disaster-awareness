  Response: <ul type="disc"><li>Enhanced AFP and environmental surveillance to detect further transmission are      ongoing.&nbsp;</li><li>Under the Ministry of Health, a multi-disciplinary emergency response team (ERT)      was established to support the control of outbreaks of cVDPV3 in 2022      followed by cVDPV2 in 2023 and this ERT continues to operate for this      current cVDPV1 outbreak.</li><li>Investigations are ongoing to assess the scale of local circulation and the necessary      responses where relevant.</li><li>Partners of the Global Polio Eradication Initiative, including the WHO European Regional Office, are supporting national and subnational authorities.<br /></li><li>Targeted immunization campaigns with IPV have been ongoing since 2022, focusing on      under-immunized communities. These campaigns are currently being      intensified alongside measles vaccination efforts to maximize coverage. To      enhance vaccine acceptance, the campaigns are supported by tailored,      community-specific
    communication strategies.</li><li>Community- sensitive communication strategies are being developed with tailored      messages to reduce the vaccine hesitancy and increase uptake.</li></ul>
