  Summary: "On 4 August 2025, Israel notified WHO of a circulating vaccine-derived poliovirus type 1 (cVDPV1) outbreak. Between February and July 2025, nine genetically linked virus isolates were found in environmental samples from seven sites, mainly in Jerusalem and the Central Region. No human cases of paralytic polio have been reported.\r\nIsrael discontinued routine use of the bivalent oral polio vaccine in March 2025 but continues using inactivated polio vaccine (IPV) as part of the country’s routine immunization schedule. \r\nWHO and partners of the Global Polio Eradication Initiative are supporting national and subnational authorities.\r\nWHO assesses the risk of international spread of this cVDPV1 outbreak in Israel as low, due to strong overall immunity, surveillance, and response systems. However, the virus is circulating in under-vaccinated, vaccine-sceptic communities with ties to similar groups abroad, posing a potential risk for further spread."
