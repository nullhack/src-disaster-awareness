  Advice: <p>The polio vaccine, given multiple times, can protect a child for life. WHO advises that every country should seek to achieve and maintain high levels of coverage with polio vaccine in support of the global commitment to eradicate polio. WHO recommends that all those who travel to or live in polio-affected areas should be fully vaccinated against polio in compliance with the national schedule. Population pockets with low immunity against polio should be prioritised for targeted interventions to boost immunity and reduce the risk of sustained transmission and spread.</p><p>It is&nbsp;important that all countries, in particular those with frequent travel and contact with polio-affected countries and areas, strengthen surveillance for AFP cases in order to rapidly detect any new virus importation and to facilitate a rapid response. Countries, territories, and areas should also maintain uniformly high routine immunization coverage at the district level to minimize the consequences
    of any new virus introduction.</p><p>As per the advice of the&nbsp;<a href="https://www.who.int/groups/poliovirus-ihr-emergency-committee" target="_blank">Emergency Committee convened under the International Health Regulations (2005)</a>, efforts to limit the international spread of poliovirus remain a PHEIC. Countries affected by poliovirus transmission are subject to&nbsp;<a href="https://www.who.int/news/item/28-07-2025-statement-of-the-forty-second-meeting-of-the-polio-ihr-emergency-committee" target="_blank">Temporary Recommendations</a>. To comply with the Temporary Recommendations issued under the PHEIC, any country infected by poliovirus should declare the outbreak as a national public health emergency, consider vaccination of all international travellers, ensure such travellers are provided with an international certificate of vaccination, restrict at the point of departure the international travel of any resident lacking documentation of appropriate polio vaccination, intensify
    cross-border efforts to substantially increase vaccination coverage of travellers, and intensify efforts to increase routine immunization coverage. Any country subject to the temporary recommendation maintains the measures described above until the following criteria have been met:</p><ol type="1"><li data-list="0" data-level="1">At least six months have passed without new      infections; and</li><li data-list="0" data-level="1">There is documentation of the full application      of high-quality eradication activities in all infected and high-risk      areas.&nbsp;</li></ol><p>In the absence of such documentation, the measures should be maintained until the state meets the above assessment criteria for being no longer infected.</p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">The&nbsp;latest epidemiological information on cVDPVs&nbsp;is updated on a&nbsp;</span><a href="https://polioeradication.org/about-polio/polio-this-week/"
    style="text-align:inherit;text-transform:inherit;word-spacing:normal;white-space:inherit;">weekly basis</a><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">.&nbsp;&nbsp;</span></p><p>WHO does not recommend any travel and/or trade restrictions to Israel based on the current information available for this event.</p>
  Assessment: <p>The international spread of poliovirus was declared a Public Health Emergency of International Concern (PHEIC) by the Director-General of the WHO on 5 May 2014, and most recently, the PHEIC declaration was extended on 28 July 2025. The outbreaks of cVDPV in Israel are covered by the original PHEIC declaration.<br /></p><p><p><span style="background-color:transparent;text-align:inherit;text-transform:inherit;word-spacing:normal;caret-color:auto;white-space:inherit;">There is a high level of vaccination coverage and a robust surveillance system in Israel, however, the risk of further spread in the country is likely to be moderate as immunization gaps persist in known high-risk areas/population groups. Local health authorities are conducting field, epidemiological and virological investigations to better understand the situation and the likely risk of spread. Israel discontinued the use of bOPV in March 2025. The routine immunization schedule includes four doses of IPV-containing
    vaccine until the age of 12 months and a fifth dose during the second year of primary school.&nbsp;</span></p><p>In 2024, a total of 11 cVDPV1 cases were reported, ten in the Democratic Republic of the Congo and one in Mozambique. Despite no cVDPV1 case detection for the past 10 months, continued low routine immunization and IPV coverage in several countries and associated immunity gap, indicate continued risk of cVDPV1 emergence.</p><p>WHO currently assesses the risk of international spread associated with this cVDPV1 detection as low due to high overall population immunity, robust poliovirus surveillance, and response capacity. However, the potential for spread exists, taking into account the fact that circulation is likely occurring in the vaccine-sceptic under vaccinated communities with known close ties to similar communities in other countries. An example of this being the 2022-2023 multi-country circulation of cVDPV2 in the UK, USA, Canada and Israel.&nbsp;</p></p>
  Overview: <p>On 4 August 2025, WHO received an International Health Regulations notification from the IHR National Focal Point (NFP) for Israel reporting the declaration of a circulating vaccine-derived poliovirus type 1<span style="color:#092862;"> </span>(cVDPV1) outbreak in the country.&nbsp;Between February and July 2025, nine genetically related VDPV1 isolates were detected in environmental samples collected from seven sampling sites, four of which are geographically non-overlapping in the Jerusalem district and Central Region. Laboratory analyses and whole-genome sequencing (WGS) indicate that these viruses are genetically linked to each other and to multiple Sabin-like viruses isolated from environmental samples since October 2024. As of 8 August 2025, cVDPV1 has been detected only in environmental samples, with no paralytic cases reported at this stage. However current evidence supports classification of this event as an outbreak of cVDPV1 with sustained community transmission.</p><p>Prior
    to this outbreak a Sabin-like type 1 virus (SL1), related to SL1 viruses detected in environmental surveillance, was the cause of an acute flaccid paralysis (AFP) case in an unvaccinated 17-year-old male from Jerusalem that was reported on 23 December 2024 and classified as vaccine-associated paralytic poliomyelitis (VAPP).&nbsp; </p><p>Israel discontinued routine use of the bivalent oral polio vaccine (bOPV) in March 2025 but continues to administer four doses of inactivated polio vaccine (IPV) as part of the routine immunization schedule up to 12&nbsp;months of age. The WHO/UNICEF Estimates of National Immunization Coverage for three doses of IPV in 2024 was 98%. However, vaccination coverage in Jerusalem is notably lower and below WHO&rsquo;s recommended coverage threshold, which is necessary to maintain sufficient population immunity and prevent poliovirus transmission.</p>
