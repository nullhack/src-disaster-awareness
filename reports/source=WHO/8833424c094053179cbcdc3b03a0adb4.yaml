  Response: <p>WHO is supporting Member States in strengthening preparedness and response.</p><p><strong>Activities in the Kingdom of Saudi Arabia include;</strong></p><ul><li>Strengthened surveillance with immediate notification of all suspected and confirmed cases.</li><li>Strict implementation of infection prevention and control transmission-based precautions (Contact and Droplet precautions) in healthcare facilities for suspect or confirmed patients, and airborne precautions for patients undergoing aerosol-generating procedures.</li><li>Identification of health and care worker contacts and perform risk assessment of their exposure, considering the timely identification of symptomatic patients, implementation of IPC measures, and correct utilization of PPE while treating patients,</li><li>Exposed health and care workers are followed up for 14 days to monitor symptoms. If they develop symptoms, they are to be removed from working with patients until tested and symptoms are fully resolved.</li><li>Patients
    exposed to MERS-CoV in the healthcare setting must be tested to determine their ability to continue working with patients without further transmission, which could potentially lead to outbreaks in the healthcare facility.&nbsp;</li><li>Identification of all potential community contacts and active follow-up to monitor symptoms for 14 days.</li><li>All community acquired cases are investigated for having direct or indirect contact with camels or their products.</li><li>Cases linked to camel exposures are notified to the National Center for Prevention and Control of Plants, Pests, and Animal Diseases (Weqaa) to investigate potential camel sources.</li><li>Camels identified as a presumed source are quarantined and tested for MERS-CoV, and if live virus is detected, the quarantine period will be extended until live virus is no longer detected in camel.</li></ul><p><strong>Activities in France include; </strong></p><ul><li>On 4 December 2025, MoH France published information regarding the
    two imported cases of MERS-CoV in the country (<a href="https://sante.gouv.fr/actualites-presse/presse/communiques-de-presse/article/deux-cas-de-mers-cov-de-retour-de-l-etranger-identifies-sur-le-territoire">link</a>).</li><li>Genomic sequencing was conducted from the first case and reported as being the same lineage that is circulating in the Arabian Peninsula. Further laboratory analyses are ongoing. </li><li>Contact tracing was&nbsp;initiated&nbsp;as soon as the first case was detected&nbsp;for the monitoring and surveillance of fellow&nbsp;travellers&nbsp;and co-exposed individuals, high-risk contacts, and hospital contacts. It&nbsp;was completed in week 51&nbsp;and no additional cases among&nbsp;the travellers&nbsp;have been reported, nor any secondary cases&nbsp;as of 19 December 2025.&nbsp;</li><li>Asymptomatic co-exposed individuals and at-risk contacts&nbsp;located&nbsp;in France&nbsp;were offered a full testing protocol (nasopharyngeal swab,&nbsp;sputum,&nbsp;rectal&nbsp;swab&nbsp;and
    serology)&nbsp;on a voluntary basis up to&nbsp;29 days&nbsp;after their last exposure,&nbsp;even if they did not exhibit any&nbsp;symptoms.</li></ul>
