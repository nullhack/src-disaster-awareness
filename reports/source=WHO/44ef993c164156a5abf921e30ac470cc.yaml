  Response: <div>The Ghanaian government has implemented a series of measures aimed at monitoring, preventing, and controlling the situation.</div><div><br /></div><div>Enhanced case surveillance has been established, alongside the implementation of epidemiological investigations and the monitoring of close contacts.</div><div><br /></div><div>Ongoing public risk communication initiatives are in place to raise public awareness and encourage the adoption of self-protection strategies, particularly among key occupational groups that are at a higher risk of exposure.</div>
