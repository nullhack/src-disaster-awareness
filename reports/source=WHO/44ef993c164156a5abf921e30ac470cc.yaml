  Summary: "On 26 August 2024, the International Health Regulations (IHR) National Focal Point (NFP) for Ghana notified the World Health Organization (WHO) regarding the country's first reported human case of infection with a zoonotic (animal) influenza virus. Subsequent laboratory tests confirmed the presence of the avian influenza A(H9N2) virus. According to epidemiological investigations, the patient, under five years old, had no known history of exposure to poultry or any sick person with similar symptoms prior to the onset of symptoms.\r\nThe Ghanaian government has implemented a series of measures aimed at monitoring, preventing, and controlling the situation.\r\nAccording to the IHR (2005), a human infection caused by a novel influenza A virus subtype is an event that has the potential for high public health impact and must be notified to the WHO. Based on currently available information, WHO assesses the current risk to the general population posed by A(H9N2) viruses as low, but\
    \ is continuing to monitor these viruses and the situation globally."
