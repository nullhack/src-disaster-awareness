  Response: <div>The Ministry of Health of KSA and Pakistan implemented active contact tracing with daily monitoring throughout the 14-day incubation period and laboratory testing for high-risk contacts. Triage for respiratory diseases has been implemented in the hospitals to enable early detection of patients with respiratory symptoms.</div><div><br /></div><div>In addition, comprehensive refresher training on case definition has commenced in Pakistan for all health and care workers to ensure early detection of cases. Concurrently, training sessions focused on the application of infection prevention and control (IPC) standards, as well as transmission-based precautions pertaining to MERS-CoV, are currently in progress, while ensuring the availability of IPC supplies such as hand sanitizers and personal protective equipment (PPE). Additionally, health awareness sessions have been arranged for all family members of the affected individuals.</div><div><br /></div><div>WHO is launching updated
    MERS-CoV Unity Study protocols to support Member States in MERS-CoV studies and investigations.</div>
