  Summary: "The World Health Organization (WHO) was notified of one human case of Middle East respiratory syndrome coronavirus (MERS-CoV) on 5 September 2024, by the Ministry of Health of the Kingdom of Saudi Arabia (KSA). The case is a male from the Eastern Region of KSA aged between 50-55 years, with underlying health conditions. He had no history of contact with camels and was not a health worker. The follow-up of close contacts has been completed, and no secondary cases have been detected.\r\nSince the beginning of the year, five cases including four deaths have been reported from KSA. The notification of this case does not change WHO’s overall risk assessment, which remains moderate at both the global and regional levels."
