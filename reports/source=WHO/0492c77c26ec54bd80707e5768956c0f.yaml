  Advice: "<p>The\r\nWNV can be diagnosed through various tests, including ELISA for IgG and IgM\r\nantibodies, neutralization assays, RT-PCR, and virus isolation in cell culture.\r\nIgM antibodies can be detected in nearly all infected patients at the time of\r\nclinical presentation and may persist for over a year. There are no specific\r\ntreatments for the disease other than supportive care, involving\r\nhospitalization, intravenous fluids, and respiratory support for the patient.\r\nMost people or animals affected recover spontaneously. There is no vaccine\r\navailable for humans.&nbsp;<o:p></o:p><br /></p>\r\n\r\n<p>WNV\r\nis sustained through a mosquito-bird-mosquito transmission cycle, primarily\r\ninvolving <em>Culex</em> mosquitoes. Birds serve as reservoir hosts, while horses\r\nand humans are dead-end hosts, meaning they do not transmit the infection. In\r\nhorses, vaccines have been developed and treatment is supportive.&nbsp;&nbsp;<o:p></o:p><br /></p>\r\n\r\n<p>There\r\nis\
    \ a focus on prevention including raising awareness of risk factors and\r\nmeasures to reduce exposure, such as using mosquito nets, repellents, wearing\r\nclothes that cover legs and arms, and avoiding outdoor activities during peak\r\nmosquito biting times.&nbsp;<o:p></o:p><br /></p>\r\n\r\n<p>Comprehensive\r\nmosquito surveillance and control programs are essential, including source\r\nreduction, water management, and biological and chemical control methods. In\r\nhealthcare settings, health workers should implement standard infection control\r\nprecautions and handle samples carefully in equipped laboratories.&nbsp;<o:p></o:p><br /></p>\r\n\r\n<p>WHO\r\ndoes not recommend any restrictions on travel and/or trade for Barbados based\r\non available information on this event.<o:p></o:p></p>"
  Assessment: "<p>Although\r\nno cases of WNV have been documented in birds or horses in the country, it is\r\npossible that the virus is circulating in these populations undetected. Despite\r\nthis, the overall impact on public health remains limited at this stage, as\r\nthere is currently only one recorded human case and appropriate public health\r\nresponse measures have been implemented, as described above.&nbsp;<o:p></o:p><br /></p><p>The\r\nrisk of international dissemination of WNV from Barbados is low. The virus is\r\nprimarily transmitted through mosquito bites, with birds as the natural hosts.\r\nThere is no evidence to suggest that WNV spreads easily between humans or from\r\nhorses to mosquitoes. Therefore, the potential for widespread international\r\ntransmission remains low.&nbsp;</p><p>Based\r\non these criteria, the overall risk related to the public health remains low.\r\nWHO will continue to evaluate the epidemiological situation in Barbados.&nbsp;</p>"
  Overview: <p>On 13 September 2024, the IHR NFP for Barbados notified WHO of one confirmed human infection with WNV, in a child. This marks the first detected human case of WNV reported from Barbados.<br /></p><p>On 10 June, the patient reported the onset of symptoms including headache, fever, vomiting, neck pain and painful knees, and visited a private clinic on 14 June. A test for dengue conducted on the same day was negative.<br /></p><p>The patient was hospitalized at the Pediatric Intensive Care Unit (PICU) of a hospital on 16 June due to worsening of signs and symptoms, including joint pain, abdominal pain, altered mental status, and slurred speech. Cerebrospinal fluid analysis returned negative results for some bacterial and viral pathogens. Despite treatment, the patient&rsquo;s condition worsened.</p><p>On 3 September 2024, blood samples were collected and sent to the Mayo Clinic in the United States of America for WNV testing. The presence of West Nile virus antibodies (IgG) was
    confirmed on 4 September 2024. The patient is still under care and recovering.<br /></p><p>The patient reported visiting a horse stable in February 2024 and a beach frequented by horses on 8 June 2024, two days before symptom onset. Although these exposures to horses were considered risk factors for WNV infection, the precise source&nbsp;of infection remains unspecified.&nbsp;No other suspected cases of WNV were identified, but public health authorities continue to monitor the situation closely.&nbsp;</p>
