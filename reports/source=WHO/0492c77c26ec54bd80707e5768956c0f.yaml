  Epidemiology: <p>The WNV primarily infects humans through the bites of infected mosquitoes but can also be transmitted through human-origin health products (blood transfusion, organ transplant, etc.). The virus is generally carried by migratory birds and transmitted locally by mosquitoes to humans, horses and other mammals. It is important to note that horses and humans cannot transmit the virus to new mosquitoes. </p><p>WNV infection in humans usually causes mild disease, with approximately 80% of those infected being asymptomatic. The incubation period is usually 3 to 14 days. About 20% of people who become infected with WNV will develop West Nile fever. Symptoms include fever, headache, tiredness, and body aches, nausea, vomiting, occasionally with a skin rash (on the trunk of the body) and swollen lymph glands. </p><p>It is estimated that approximately 1 in 150 persons infected with the WNV will develop a more severe form of disease. The symptoms of severe disease (also called neuroinvasive
    disease, such as West Nile encephalitis or meningitis or West Nile poliomyelitis) include headache, high fever, neck stiffness, stupor, disorientation, coma, tremors, convulsions, muscle weakness, and paralysis. Serious illness can occur in people of any age, however, people over the age of 50 and some immunocompromised persons (for example, transplant patients) are at the highest risk of getting severely ill when infected with WNV. No vaccine currently exists for humans.&nbsp;</p><p>This is the first human case of WNV infection detected in Barbados. Additionally, no infections have been previously documented in birds or horses in this country, making this case both unusual and unexpected. However, the WNV has spread throughout the Caribbean, likely via infected migratory birds. A quantitative risk assessment of the introduction of WNV into Barbados, conducted in 2007, highlighted that the presence of migratory birds and mosquitoes posed an imminent threat to the virus's introduction.&nbsp;</p>
