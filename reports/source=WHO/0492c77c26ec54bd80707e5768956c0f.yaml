  Summary: "On 13 September 2024, the International Health Regulations (IHR) National Focal Point (NFP) for Barbados notified the World Health Organization (WHO) of a confirmed human infection with West Nile Virus (WNV) in a child.\r\n\r\nWNV is generally carried by migratory birds and transmitted locally by mosquitoes to humans, horses and other mammals. WNV infection in humans generally causes mild disease, but there can be neurological symptoms and, in some cases, it can be fatal.\r\n\r\nThis is the first human case of WNV infection detected in Barbados. Additionally, no infections have been previously documented in birds or horses in this country, making this case both unusual and unexpected. However, the WNV has spread throughout the Caribbean, likely via infected migratory birds. It is possible that the virus is circulating in birds and horses undetected. Despite this, the overall impact on public health remains limited at this stage, as there is currently only one recorded human case\
    \ and appropriate public health response measures have been implemented. WHO considers the current risk from WNV as low but will continue to evaluate the epidemiological situation in Barbados."
