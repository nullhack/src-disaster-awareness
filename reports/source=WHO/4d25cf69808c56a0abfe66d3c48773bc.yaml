  Response: '<p><strong>Leadership and coordination:</strong></p><ul><li><strong>Disseminating guidelines:</strong> The government of Saudi Arabia regularly issues the health requirements for Hajj and Umrah, which are published on the Ministry of Health <a href="https://www.moh.gov.sa/en/HealthAwareness/Pilgrims_Health/Pages/default.aspx">(MoH) website</a> and disseminated to all countries through diplomatic channels. A key requirement is that all travelers must receive the MenACWY vaccine before departing from their home country for Umrah and Hajj.</li></ul><p><strong>Surveillance: </strong></p><ul><li><strong>Screening at Points of Entry: </strong>Health authorities at Saudi Arabia''s points of entry conduct screenings during the Hajj and Umrah seasons by visually checking for signs and symptoms of invasive IMD among incoming travelers. They also review travelers'' health documents to ensure compliance with the required health protocols.</li><li><strong>Conducting regular risk assessments:</strong>
    Public health authorities in Saudi Arabia regularly conduct risk assessments. The country has strengthened surveillance for IMD in the Umrah zone, and continuously monitors<em> Neisseria</em> meningitidis carriage in both Makkah and Madinah.</li><li><strong>Electronic surveillance system:</strong> Saudi Arabia has established a comprehensive electronic surveillance system to monitor and control IMD across all healthcare facilities. This system mandates the immediate reporting of all suspected and confirmed cases to public health authorities. Standardized case definitions are provided to ensure accurate and timely identification. Laboratory-based diagnostics, including culture, antimicrobial susceptibility testing, and PCR, are prioritized, along with the collection of detailed demographics, clinical, and epidemiological data to support response efforts. Active surveillance is particularly heightened during mass gatherings to quickly detect and respond to potential outbreaks.</li></ul><p><strong>Clinical
    operations: </strong></p><ul><li><strong>Case management:</strong> Healthcare facilities in Saudi Arabia are well-prepared to effectively manage cases of meningococcal disease and their close contacts. This is ensured through the provision of appropriate medical care, including timely diagnosis and prompt treatment, based on the appropriate use of antibiotics. Infection prevention and control practices are followed to minimize the risk of nosocomial (hospital-acquired) transmission.</li><li><strong>Post-exposure chemoprophylaxis:</strong> Chemoprophylaxis is an essential preventive measure against meningococcal disease. Antimicrobial prophylaxis is administered to close contacts of confirmed cases to prevent secondary transmission. The selection of the drug of choice should be guided by known antimicrobial resistance patterns.</li></ul><p><strong>Vaccination</strong>:</p><p>Targeted vaccination with a conjugate vaccine is used to prevent disease in the community. Most adults in the Umrah
    region had received at least one dose of the conjugate vaccine, in addition to routine meningococcal immunization for children.<br /></p><p><strong>Risk communication and community engagement: </strong></p><ul><li><strong>Awareness campaigns:</strong> Saudi Arabia places strong emphasis on public education and community engagement to promote early detection, timely treatment, and prevention of meningococcal disease. Awareness campaigns are regularly conducted to inform the public on the nature of the disease, its symptoms, and the importance of early medical intervention. These campaigns also highlights the critical role of vaccination, both as part of the national immunization programme and as a mandatory requirement for Hajj and Umrah pilgrims.</li></ul>'
