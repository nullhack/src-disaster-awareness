  Title: Invasive meningococcal disease - Kingdom of Saudi Arabia
  Epidemiology: <p>Invasive meningococcal disease is a life-threatening bacterial infection caused by&nbsp;<em>Neisseria meningitidis</em>, associated with severe long-term complications and a high case fatality rate, despite prompt and appropriate treatment.</p><p>Meningococcal disease occurs worldwide, and can present as a sporadic, clustered or epidemic-prone infection with varying degrees of endemicity across regions. Outbreaks are more likely to occur in settings that facilitate transmission of infection, such as areas with low vaccination coverage, overcrowded living conditions, limited or disrupted access to healthcare services, and mass gatherings, including religious pilgrimages like Hajj and Umrah. &nbsp;In the KSA, public health authorities conduct regular risk assessments and continue to identify meningococcal disease as a significant public health threat during mass gatherings. Thus, the requirement of quadrivalent meningococcal vaccination (MenACWY), which protects against
    serogroups A, C, W, and Y, prior to traveling to KSA for Hajj and Umrah has been maintained in the previous years. &nbsp;However, vaccination compliance for Umrah was declined over the past two years.</p><p>The significant number of pilgrims arriving in KSA from countries with diverse meningococcal disease prevalence increases the risk of international spread. In 2024, 12 cases of meningococcal disease associated to Umrah and/or pilgrimage to KSA were reported from the United States of America, the United Kingdom, and France. Of these, nine patients were unvaccinated, and the vaccination status of remaining three was unknown.  Antimicrobial susceptibility data was available for 11 of the 12 cases, and ciprofloxacin-resistant strains were identified in three cases. In 2025, to date, 17 cases associated with travel to KSA for religious pilgrimage have already been reported from multiple countries.</p>
  Advice: '<p>Meningococcal disease remains a key public health concern at mass gatherings such as Hajj and Umrah.&nbsp;Despite mandatory vaccination policies, declining compliance in recent years has increased transmission risks.</p><p><strong>Preventive and control measures should focus on:</strong></p><ul type="disc"><li data-list="1" data-level="1">Ensuring high      vaccination coverage before travel.</li><li data-list="1" data-level="1">Enhancing timely detection,      investigation and management of cases and their close contacts.</li><li data-list="1" data-level="1">Enhancing real-time surveillance and monitoring antimicrobial resistance trends.</li><li data-list="1" data-level="1">Strengthening risk      communication and community engagement to improve compliance.<br /></li></ul><p><strong>Strengthening vaccination coverage and compliance for Umrah travelers</strong></p><ul><li>WHO strongly advises individuals attending      mass gatherings such as Hajj and Umrah to receive vaccination
    against      meningococcal disease at least 10 days prior to travel. This measure is      considered the most effective strategy to prevent the disease and potential      outbreaks during these events. Specifically, WHO recommends that all      pilgrims receive the quadrivalent meningococcal conjugate vaccine, which      covers serogroups A, C, W, and Y, prior to traveling.​</li><li data-list="0" data-level="1">The authorities of KSA require incoming      pilgrims to hold proof of vaccination with quadrivalent meningococcal      conjugate vaccine ACWY. This, and other health related entry requirements,      are available on the official web site of the Ministry of Health of Saudi      Arabia and other governmental platforms. States Parties shall make aware      immigration authorities and conveyance operators of health-related      requirements implemented by the Saudi Arabia, so that the validity of      heath documents carried by travelers to Saudi Arabia can be duly checked      before
    departure and prior to arrival in Saudi Arabia.</li><li data-list="0" data-level="1">Promotion of coordination among ministries      of health, civil aviation, immigration authorities, and Hajj/Umrah tour      operators to ensure harmonized implementation of vaccination and entry      requirements, including pre-departure checks.<br /></li></ul><p><strong>Enhancing timely case detection, investigation, and management</strong></p><ul><li>Timely detection and confirmation as well as prompt, appropriate management of cases are critical control measures against meningococcal disease. Suspected cases should undergo laboratory confirmation, which requires the isolation of <em>N. meningitidis</em> from a normally sterile body fluid, including blood, cerebrospinal fluid, or less commonly, pleural, pericardial or synovial fluid. Confirmatory tests include culture with antimicrobial susceptibility testing as well as molecular investigations (e.g. PCR). <br /></li><li>Antibiotic therapy, typically
    administered for a total duration of 5 to 7 days, is the cornerstone of treatment. Empiric therapy with intravenous ceftriaxone or cefotaxime should be initiated in suspected cases as soon as possible. Once <em>N. meningitidis</em> is isolated, the antibiotic regimen should be reviewed and adjusted according to AST results. <br /></li><li>Individuals with prolonged exposure while in close proximity to an index case and as well as those directly exposed to their oral secretions are at increased risk of infection. Post-exposure antibiotic prophylaxis is therefore recommended for close contacts as a measure to prevent secondary transmission and eradicate asymptomatic nasopharyngeal carriage. Considering the rising concerns related to ciprofloxacin-resistance among &nbsp;<em>N. meningitidis</em> isolates, the drug of choice for post-exposure prophylaxis should be selected based upon prevalent antimicrobial resistance patterns. Pre-exposure antimicrobial prophylaxis is not recommended.&nbsp;&nbsp;</li><li>Review
    and update contact tracing guidance for meningococcal infections on aircraft to ensure alignment with best practices. The <a href="https://www.ecdc.europa.eu/sites/default/files/media/en/publications/Publications/1012_GUI_RAGIDA_2.pdf">RAGIDA (Risk Assessment Guidelines for Infectious Diseases Transmitted on Aircraft)</a> framework from ECDC provides valuable guidance and can serve as a reference.</li><li>Expand the digital health passport system      to include comprehensive vaccination records, ensuring all required      immunization data for pilgrims is current and verifiable.</li></ul><p><strong>Strengthening surveillance</strong></p><ul><li>WHO emphasizes the importance of robust surveillance systems for meningococcal disease to effectively control and prevent outbreaks and to continue sharing information between concerned health authorities. Host countries should conduct ongoing surveillance and rely on a risk-based approach focused on the evaluation, mitigation, and communication
    of risk to ensure timely and appropriate public health responses.<br /></li><li>WHO also highlights the importance of monitoring antibiotic resistance trends by systematically testing <em>N. meningitidis</em> isolates in order to adequately inform post-exposure prophylaxis and treatment strategies. Available information pertaining to serogroups and genomic sequencing should be timely shared with global surveillance platforms in order to track strain variations and identify potential clusters.<br /></li></ul><p><strong>Risk communication and community engagement</strong></p><ul type="disc"><li data-list="0" data-level="1">Awareness of requirements through policy      briefs to Ministers of Health should be undertaken, emphasizing the      critical role of vaccination in preventing outbreaks.</li><li data-list="0" data-level="1">Risk communication should be undertaken to      raise community awareness and boost coverage by: Engaging religious      leaders (e.g., mosque imams) to advocate
    for vaccination within Muslim      communities, including during the Friday Prayer Khutba. Other RCCE measures      could include: disseminate vaccination requirements through Hajj/Umrah      tour operators, mosques, embassies, and airports; work with religious      leaders (e.g., imams) to promote health messaging, especially during      sermons and gatherings such as Friday prayers; ensure vaccination      messaging is clearly visible on official websites (e.g., Saudi MoH,      embassies) and in travel documents; launching public awareness campaigns      to emphasize the importance and effectiveness of vaccination in preventing      meningococcal disease, utilizing social media, traditional media, and      community outreach initiatives.</li><li data-list="0" data-level="1">An information note should be provided to      close contacts to raise awareness about the signs and symptoms of disease,      along with contact details for reaching health authorities. &nbsp;<br /></li></ul><p>WHO
    does not recommend any restriction on travel and/or trade to the Kingdom of Saudi Arabia on the basis of the information available for the current event.</p>'
  Assessment: <p>Meningococcal disease remains a public health challenge, especially for mass gathering events like Hajj and Umrah.</p><p>Umrah is a year-round pilgrimage to Mecca in KSA. The risk of meningococcal disease at mass gatherings like Hajj and Umrah is increased due to the high population influx, the person-to-person transmission through respiratory droplets, and the presence of pilgrims from diverse geographical regions and prolonged close contact&mdash;resulting from shared accommodations and participation in rituals. In 2024, it was estimated that 24 million pilgrims performed Umrah, with 50% of those being international pilgrims. Mass gatherings such as those occurring during the Umrah pilgrimage can facilitate the transmission of infectious diseases, including IMD. </p><p>Since 2001, strict preventative measures, including mandatory quadrivalent (MenACWY) meningococcal vaccination has mitigated the risk of pilgrimage-associated meningococcal outbreaks. While MenACWY vaccination
    is highly effective in reducing the risk of outbreaks during Hajj and preventing transmission to the home countries of pilgrims, there are challenges in ensuring the vaccination of the pilgrims in their countries of origin since the compliance with the public health advisory is voluntary. As of 10 March, it was estimated by KSA health authorities that only 54% of international Umrah pilgrims have complied with the meningococcal vaccination requirements. &nbsp;As returning travelers may spread the disease to their local communities, this risk is further heightened when there is lower compliance with meningococcal vaccination among pilgrims. &nbsp;</p><p>Preparedness and surveillance efforts must be maintained year-round, with particular emphasis during peak periods like Ramadan and school holidays that often see a sharp increase in pilgrim numbers. In addition, the risk of importation of meningococcal disease is increased during the epidemic season in the countries of the African meningitis
    belt (i.e. December through June), several of which are home to large Muslim populations. This potentially affects not only the pilgrims but also other travelers (including those traveling for non-religious purposes) and the wider community. </p><p>Another risk factor is the emergence of antibiotic resistance for <em>N. meningitidis</em>&nbsp;strains to fluoroquinolones (ciprofloxacin) and potentially third generation cephalosporins, which can complicate post-exposure prophylaxis and treatment options for individuals with IMD. The growing influx of tourists and relatively long incubation period may account for increased risk of international spread.</p>
  Overview: <p>On 13 March 2025, the NFP for KSA reported to WHO 11 confirmed cases of IMD. All cases were associated with individuals who had performed Umrah in KSA between 7 January and 12 March 2025. </p><p>&nbsp;Among the 11 confirmed cases, four were reported from three countries in the WHO Eastern Mediterranean Region, while the remaining cases are individuals with travel history from countries in the WHO South-East Asia Region. The median age of cases was 36 years (range 6 &ndash; 69 years) and 64% were male. The cases were diagnosed between 7 January and 2 March 2025, and none of the affected individuals had a history of vaccination against meningococcal disease. All cases received treatment in hospitals in KSA, fully recovered and were discharged. Serogrouping tests identified the causative strain as <em>Neisseria meningitidis</em> (<em>N. meningitidis) </em>serogroup <em>W135</em>. </p><p>In addition, between 11 February and 18 March 2025, the WHO Eastern Mediterranean Regional
    IHR contact point received reports&mdash;either through notifications or bilateral communication with IHR NFPs &mdash;of six isolated cases of IMD among individuals who had recently returned from Umrah. Of these, three cases were reported from the WHO Europe Region and three cases were from the WHO Eastern Mediterranean Region. The median age of cases was 19 years (range 6 &ndash; 30 years). Serogroup <em>W135 was confirmed </em>in two of the six cases.&nbsp;</p>
