    Hajj&nbsp;</a></li><li data-list="0" data-level="1"><a href="https://www.thelancet.com/journals/lanmic/article/PIIS2666-5247%2825%2900041-2/fulltext">Vaccine Shortages and      Public Health Challenges for Pilgrimage-Related Meningitis      Prevention&nbsp;</a></li><li data-list="0" data-level="1"><a href="https://www.journalofinfection.com/article/S0163-4453%2823%2900542-X/fulltext?utm">Meningococcal Disease in the Middle East: A Report from the Global Meningococcal      Initiative&nbsp;&nbsp;</a></li></ul><p><strong>Citable reference:&nbsp;</strong>World Health Organization (11 April 2025). Disease Outbreak News; Invasive meningococcal disease in Kingdom of Saudi Arabia. Available at:&nbsp;<a href="https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON563">https://www.who.int/emergencies/disease-outbreak-news/item/2025-DON563</a></p><p>&nbsp;</p>'
  Summary: "On 13 March 2025, the International Health Regulations (IHR) National Focal Point (NFP) for the Kingdom of Saudi Arabia (KSA) reported 11 cases of invasive meningococcal disease (IMD) to WHO. Additionally, between 11 February and 18 March 2025, the WHO Eastern Mediterranean Regional IHR contact point received reports of six isolated cases of IMD, either through notification or bilateral communication with IHR NFPs. These cases involve individuals who had recently returned from Umrah. \r\nMeningococcal disease remains a global public health concern, particularly in the context of mass gathering events such as Hajj and Umrah. \r\nThe government of Saudi Arabia regularly issues health requirements for Hajj and Umrah, including vaccination policies. As of 10 March 2025, KSA health authorities estimated that only 54% of international Umrah pilgrims had complied with the meningococcal vaccination requirements. The significant number of pilgrims traveling to KSA from countries with\
    \ varying levels of meningococcal disease incidence presents a risk of international spread during these gatherings. Given the recent notification of these cases linked to Umrah, WHO strongly advises all individuals planning to attend mass gatherings such as Hajj and Umrah to receive vaccination against meningococcal disease at least 10 days prior to travel. "
