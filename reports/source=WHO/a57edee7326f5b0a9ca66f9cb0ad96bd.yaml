  Advice: '<p>Although a highly effective animal vaccine has been available for over a century, rabies remains enzootic in over 150 countries and territories, mainly in Asia and Africa. &nbsp;Rabies is included in WHO&rsquo;s 2021&ndash;2030 Roadmap for the Global Control of Neglected Tropical Diseases, which sets regional, progressive targets for the elimination of targeted diseases. As a zoonotic disease, it requires close cross-sectoral coordination at the national, regional and global levels. The key to implementing effective rabies elimination programs is to engage with local communities, start small, catalyze long-term investment through stimulus packages, ensure the ownership of governments, demonstrate success and cost-effectiveness, and scale up quickly. <br /></p><p>Rabies elimination is feasible and achievable if this goal is prioritized and financially and politically supported.<br /></p><p><strong>Risk Communication and Community Engagement (RCCE)</strong></p><p>Raising awareness
    of rabies disease through engaging communities and empowering people is a cornerstone of response to rabies. RCCE activities should include an understanding of how to prevent rabies in animals, when to suspect rabies, and what to do in case of exposure. Individuals should adequately wash any wounds with soap and copious amounts of water for 15 minutes as a key important first aid measure and to seek early treatment whenever they are exposed to a rabid animal. </p><p>Education on dog behaviour and bite prevention for both children and adults is an essential extension of rabies vaccination programs and can decrease both the incidence of human rabies and the financial burden of treating dog bites.<br /></p><p><strong>Immunization of persons</strong></p><p>Very effective rabies vaccines and rabies immunoglobulins are available to immunize people after suspected exposure to rabies (post-exposure prophylaxis). Appropriate wound management and prompt access to quality-assured PEP is almost
    100% effective in preventing human rabies deaths. <br /></p><p>Pre-exposure prophylaxis (PrEP) is recommended for people in certain high-risk occupations (such as laboratory workers handling live rabies and rabies-related viruses) and people whose professional or personal activities might lead to direct contact with bats or other mammals that may be infected with rabies (such as animal disease control staff and wildlife rangers). PrEP might also be indicated for outdoor travellers and people living in remote, highly rabies-endemic areas with limited local access to rabies biologics. Exposed individuals with PrEP still need booster vaccination; however, abridged regimens apply, and human rabies immunoglobulin (RIG) is not needed.</p><p><strong>Exposure risk and indications for PEP</strong><br /></p><p>Depending on the severity of exposure, administration of a full PEP course is recommended as follows:</p><img sf-image-responsive="true" src="https://cdn.who.int/media/images/default-source/emergencies/disease-outbreak-news/rabies.png?sfvrsn=2ac49801_4"
    height="462" style="max-width:100%;height:auto;" title="Rabies" width="936" alt="Rabies" sf-size="210150" /><p>Source: <a href="https://www.who.int/news-room/fact-sheets/detail/rabies">https://www.who.int/news-room/fact-sheets/detail/rabies</a></p><p><strong>Mass dog vaccination</strong></p><p>As dogs are the source of more than 95% of human rabies cases, the control and elimination of rabies in dogs prevents rabies at its source. Vaccinating dogs, including puppies, is the most cost-effective strategy for preventing rabies in people, and reduces the need for PEP. Mass dog vaccination with high quality and safe vaccines, aiming at 70% coverage over consecutive years in endemic areas interrupts rabies virus (RABV) transmission at its animal source and saves human lives. <br /></p><p>This event does not interfere with travel and trade. Travellers must be made aware of the risk of contracting rabies while travelling to areas considered at higher risk, such as border areas with Indonesia.</p>'
  Assessment: <p>Rabies is a vaccine-preventable, neglected zoonotic disease caused by a neurotropic virus of the Genus <em>Lyssavirus</em>, and it is transmissible to all mammals. Populations of the orders <em>Carnivora</em> and <em>Chiroptera</em> are considered to be the main reservoir hosts and, by the same order, the most common source of exposure of humans to the rabies virus. In up to 99% of cases of rabies in humans, domestic dogs (pets and stray dogs) are responsible for rabies virus transmission to humans. The transmission of rabies is through saliva, usually through bites and non-bites (scratches or licks on open skin/mucosa). The rabies virus is not transmitted through intact skin. </p><p>Post-exposure prophylaxis is the emergency response to a rabies exposure and consists of extensive washing with water and soap for at least 15 minutes and local treatment of the wound as soon as possible after a suspected exposure; a course ofeffective rabies vaccine that meets WHO standards;
    and the administration of rabies immunoglobulin or monoclonal antibodies into the wound, if eligible.&nbsp; <br /></p><p>WHO assesses the risk posed by this event as high at the national level, moderate at the regional level, and low at the global level due to the following:<br /></p><ol type="1"><li data-list="0" data-level="1">The country was previously classified      as &ldquo;rabies free&rdquo; and reported the first cases in 2024. In 2025, several      fatal human cases of rabies have been reported within a short period of      time across multiple municipalities. </li><li data-list="0" data-level="1">As such, experiences and awareness of      community and health care workers on rabies is likely limited. Overall,      health workers have limited knowledge about rabies case management, and      dog bite and scratch case management.</li><li data-list="0" data-level="1">In 2024, dog vaccination coverage in      NTT province, Indonesia was only 5.5% and dog vaccine coverage in      Indonesia
    in 2022, was 24%, while 70% coverage is needed as the main      technical control measure. Vaccination efforts in Timor-Leste have so far      focused on high-risk municipalities; however, expanding these efforts to      other areas remains challenging due to limited resources.</li><li data-list="0" data-level="1">Timor-Leste has a significant      population of stray and unvaccinated dogs including in the areas bordering      Indonesia.</li><li data-list="0" data-level="1">Previously there was no stock of human      rabies vaccines in the government health facilities. WHO Country Office      Timor-Leste has procured 6000 rabies vaccines doses and 1000 vials of      rabies immunoglobulin, and distributed them to the health facilities. </li><li data-list="0" data-level="1">Not all humans bitten by a suspected      rabid animal (mainly dogs) are receiving adequate and timely PEP, due to      several reasons.</li><li data-list="0" data-level="1">NTT province in Indonesia shares land      borders
    with Timor-Leste, and control measures to limit the movement of      animals, particularly unvaccinated dogs, across these borders is      challenging due to the terrain and extent of the land border.</li><li data-list="0" data-level="1">The confirmation of a human rabies case      in Ermera Municipality &ndash; an inland non-border district &ndash; signals potential      wider geographic spread within Timor-Leste and suggests gaps in      surveillance and vaccination coverage beyond previously known high-risk      areas.</li></ol>
  Overview: <p>As of 17 June 2025, a total of four human rabies deaths have been confirmed in Timor-Leste in 2025. These cases occurred in the municipalities of Bobonaro (n=2), Ermera (n=1), and Oecusse (n=1). </p><p>On 17 May 2025, the Timor-Leste Ministry of Health (MoH) confirmed a fatal human case of rabies in an adult male from Ermera Municipality. The person was bitten by a dog in March 2025 and developed symptoms including hydrophobia, photophobia, aggressiveness, convulsions, and hallucinations. On 15 May, the individual sought medical care and was transferred to a national hospital. Rabies infection was confirmed the same day by RT-PCR testing at the National Health Laboratory (NHL) in Timor-Leste, using a saliva sample collected before death. </p><p>On 30 May 2025, a second fatal case of rabies was confirmed in an adult male from Oecusse Municipality. The person had been bitten by a dog in June 2024 and developed symptoms including hydrophobia and photophobia. The individual presented
    to a regional hospital on 27 May 2025. Rabies infection was confirmed on 29 May by RT-PCR testing at the NHL. </p><p>On 13 June 2025, a third fatal case was confirmed in an adult male from Bobonaro Municipality. The person had been bitten by a dog approximately 2&ndash;3 months prior to symptom onset and developed symptoms including hydrophobia and difficulty swallowing. On 12 June, the individual sought medical care and was transferred to a national hospital in Dili. A saliva sample collected before death tested positive for rabies by RT-PCR at the NHL. </p><p>On 17 June 2025, a fourth fatal case was confirmed in a female child from Bobonaro Municipality. The child had been bitten&nbsp; by a dog approximately two months prior to symptom onset and developed symptoms including hydrophobia, insomnia, hallucinations, hyperactivity, difficulty swallowing, and convulsions. On 12 June, the child was taken to medical care. A saliva sample tested positive for rabies by RT-PCR at the NHL on 13
    June. On 14 June 2025, the child was transferred to a national hospital. &nbsp;</p><p>Prior to this, two additional fatal human rabies cases were reported in 2024, bringing the total number of confirmed human rabies deaths since the emergence of the disease in 2024 to six.</p><p>In March 2024, the first confirmed animal cases of rabies (in dogs) were reported in Oecusse Municipality. As of 1 June 2025, a total of 106 animal rabies cases have been confirmed in Timor-Leste. Of these, 103 (97%) were in dogs, two in goats (in Bobonaro and Oecusse), and one in swine (in Bobonaro).</p><p>Oecusse Municipality is an enclave of Timor-Leste located within Indonesia&rsquo;s East Nusa Tenggara province (NTT), where rabies is endemic and human cases are frequently reported. Both fatal human rabies cases reported in 2024 occurred in Oecusse. However, in 2025, one human case was reported in Ermera, an inland municipality that does not border Indonesia. This suggests that rabies may be spreading beyond
    border areas, highlighting the need to expand surveillance, monitor the movement of infected dogs, post-exposure prophylaxis (PEP), dog vaccination, education and awareness raising, and address the risk of undetected transmission in the country&rsquo;s interior regions.</p><p>Between March 2024 and 15 June 2025, a total of 1445 dog scratches and bites were reported in Timor-Leste. Of these, 41% were classified as <a href="https://www.who.int/news-room/fact-sheets/detail/rabies">WHO category III exposures</a>. Only 18% of category III exposures received rabies immunoglobulin. Although 66% of all bite victims began PEP, most did not complete the full course.</p>
