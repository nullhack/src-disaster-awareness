  Response: '<p>The Timor-Leste MoH has taken the following public health response actions: </p><ul type="disc"><li data-list="0" data-level="1">On 16 June, a press conference was held to raise community      awareness, advising citizens to vaccinate their dogs, avoid contact with      wild animals, observe if there are any changes in dog behaviour, report      dog bite incidents for immediate treatment and rabies vaccination.      Recently, a dedicated rabies risk communication and community engagement      (RCCE) strategy for Timor-Leste has been developed with support from the      Australian government and public health communications specialists. Several RCCE      materials including flyers (for adults and children), magazine features,      animation videos, podcast recordings and social media content featuring      prominent and respected Timorese influencers have been developed jointly      by the Ministry of Agriculture, Livestock, Fisheries and Forestry (MALFF), MoH and WHO to raise      awareness
    about rabies, nationally.</li><li data-list="0" data-level="1">Supported by the school health focal point in the WHO country      office (WCO), rabies brochures were distributed among school children in      high-risk areas. </li><li data-list="0" data-level="1">The Government of Timor-Leste has revived the National Task Force on Rabies and adopted      a One Health approach, involving the MoH, the MALFF and other stakeholders      to undertake joint planning and response to rabies. A national rabies      prevention campaign will be launched, increasing rabies vaccine      availability and enhancing human and animal health surveillance, including      the vaccination of dogs.</li><li data-list="0" data-level="1">PEP, including wound washing, anti-rabies vaccine, and human rabies      immunoglobulin (RIG) for passive immunization is currently available in      government health facilities. However, as dog bite cases continue to occur      and spread to neighbouring municipalities, there
    is an urgent need for      additional stockpile requests.</li><li data-list="0" data-level="1">The National Strategic Plan to Eliminate Rabies in Timor-Leste has      been developed with the support of WHO, WOAH, and Australian Aid.</li></ul>'
